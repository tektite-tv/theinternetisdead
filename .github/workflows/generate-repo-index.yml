name: Generate repo-index.json

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-repo-index-json
  cancel-in-progress: false

jobs:
  generate-repo-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dead/pages/repo-index.json
        run: node dead/scripts/build-repo-index.js

      - name: Commit generated repo index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate repo-index.json
          file_pattern: dead/pages/repo-index.json
