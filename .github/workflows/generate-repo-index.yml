name: Generate repo-index.json

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'dead/JSON/repo-index.json'

permissions:
  contents: write

concurrency:
  group: generate-repo-index-json
  cancel-in-progress: false

jobs:
  generate-repo-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dead/JSON/repo-index.json recursively
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repoRoot = process.cwd();
          const outputPath = 'dead/JSON/repo-index.json';

          const ignoredDirs = new Set([
            '.git',
            'node_modules',
            '.next',
            '.cache',
            '.parcel-cache',
            'dist',
            'build'
          ]);

          const ignoredFiles = new Set([
            '.DS_Store',
            'Thumbs.db'
          ]);

          function toPosix(filePath) {
            return filePath.split(path.sep).join('/');
          }

          function hrefFor(relativePath, type) {
            const posix = toPosix(relativePath);
            return type === 'directory' ? `/${posix}/` : `/${posix}`;
          }

          function walk(dirRelative = '') {
            const dirAbsolute = path.join(repoRoot, dirRelative);
            const entries = fs.readdirSync(dirAbsolute, { withFileTypes: true })
              .filter((entry) => {
                if (entry.isDirectory()) return !ignoredDirs.has(entry.name);
                return !ignoredFiles.has(entry.name);
              })
              .sort((a, b) => {
                if (a.isDirectory() !== b.isDirectory()) return a.isDirectory() ? -1 : 1;
                return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
              });

            const results = [];

            for (const entry of entries) {
              const relativePath = toPosix(path.join(dirRelative, entry.name));
              const type = entry.isDirectory() ? 'directory' : 'file';
              const parsed = path.parse(entry.name);
              const parent = toPosix(dirRelative || '.');
              const depth = relativePath.split('/').length - 1;

              const item = {
                type,
                name: entry.name,
                path: relativePath,
                href: hrefFor(relativePath, type),
                parent,
                depth
              };

              if (type === 'file') {
                const stat = fs.statSync(path.join(repoRoot, relativePath));
                item.extension = parsed.ext.replace(/^\./, '').toLowerCase();
                item.size = stat.size;
                item.modified = stat.mtime.toISOString();
              }

              results.push(item);

              if (entry.isDirectory()) {
                results.push(...walk(relativePath));
              }
            }

            return results;
          }

          const items = walk();
          const byPath = Object.fromEntries(items.map((item) => [item.path, item]));
          const generatedAt = new Date().toISOString();

          const repoIndex = {
            generatedAt,
            total: items.length,
            folders: items.filter((item) => item.type === 'directory').length,
            files: items.filter((item) => item.type === 'file').length,
            items,
            byPath
          };

          fs.mkdirSync(path.dirname(outputPath), { recursive: true });
          fs.writeFileSync(outputPath, `${JSON.stringify(repoIndex, null, 2)}\n`);

          console.log(`Wrote ${outputPath}`);
          console.log(`${repoIndex.total} total entries: ${repoIndex.folders} folders, ${repoIndex.files} files`);
          NODE

      - name: Commit generated repo index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate recursive repo-index.json
          file_pattern: dead/JSON/repo-index.json
