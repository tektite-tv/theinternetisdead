name: Generate Canvas Backgrounds Index

on:
  push:
    paths:
      - 'experiments/canvas-backgrounds/**.html'
      - '.github/workflows/generate-canvas-backgrounds-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate experiments/canvas-backgrounds/index.json
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          folder = Path('experiments/canvas-backgrounds')
          folder.mkdir(parents=True, exist_ok=True)

          files = sorted(
              p for p in folder.glob('*.html')
              if p.name.lower() != 'index.html'
          )

          entries = []
          for p in files:
              title = p.stem.replace('-', ' ').replace('_', ' ').strip().title()
              entries.append({
                  'title': title,
                  'file': p.name,
                  'path': f'./{p.name}'
              })

          output = folder / 'index.json'
          output.write_text(json.dumps(entries, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote {output} with {len(entries)} HTML backgrounds.')
          PY

      - name: Commit generated index.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Generate canvas backgrounds index.json'
          file_pattern: experiments/canvas-backgrounds/index.json
