name: Zip theinternetisdead Extension Suite

on:
  push:
    paths:
      - "dead/downloads/extensions/theinternetisdead-extension-suite/**"
      - "dead/downloads/extensions/theinternetisdead-extension-suite.zip"
      - ".github/workflows/zip-theinternetisdead-extension-suite.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-extension-suite-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify committed ZIP matches extension suite folder
        run: |
          set -euo pipefail

          SOURCE_DIR="dead/downloads/extensions/theinternetisdead-extension-suite"
          ZIP_PATH="dead/downloads/extensions/theinternetisdead-extension-suite.zip"
          EXPECTED_ZIP="$(mktemp --suffix=.zip)"
          EXPECTED_DIR="$(mktemp -d)"
          COMMITTED_DIR="$(mktemp -d)"
          EXPECTED_MANIFEST="$(mktemp)"
          COMMITTED_MANIFEST="$(mktemp)"

          if [ ! -f "$ZIP_PATH" ]; then
            echo "::error file=$ZIP_PATH::Extension suite ZIP is missing."
            exit 1
          fi

          git archive \
            --format=zip \
            --prefix=theinternetisdead-extension-suite/ \
            -o "$EXPECTED_ZIP" \
            "HEAD:$SOURCE_DIR"

          unzip -q "$EXPECTED_ZIP" -d "$EXPECTED_DIR"
          unzip -q "$ZIP_PATH" -d "$COMMITTED_DIR"

          if [ ! -d "$COMMITTED_DIR/theinternetisdead-extension-suite" ]; then
            echo "::error file=$ZIP_PATH::Extension suite ZIP must contain theinternetisdead-extension-suite/ at its root."
            exit 1
          fi

          build_manifest() {
            local root="$1"
            local manifest="$2"

            find "$root" -type f -print0 \
              | sort -z \
              | while IFS= read -r -d '' file; do
                  relative_path="${file#"$root"/}"
                  hash="$(sha256sum "$file" | awk '{print $1}')"
                  printf "%s  %s\n" "$hash" "$relative_path"
                done > "$manifest"
          }

          build_manifest "$EXPECTED_DIR/theinternetisdead-extension-suite" "$EXPECTED_MANIFEST"
          build_manifest "$COMMITTED_DIR/theinternetisdead-extension-suite" "$COMMITTED_MANIFEST"

          if ! diff -u "$EXPECTED_MANIFEST" "$COMMITTED_MANIFEST"; then
            echo "::error file=$ZIP_PATH::Extension suite ZIP is stale. Regenerate and commit it with the source changes."
            echo "From repo root on Windows PowerShell:"
            echo "  git add -- dead/downloads/extensions/theinternetisdead-extension-suite"
            echo '  $tree = git write-tree'
            echo '  git archive --format=zip --prefix=theinternetisdead-extension-suite/ -o dead/downloads/extensions/theinternetisdead-extension-suite.zip "$tree`:dead/downloads/extensions/theinternetisdead-extension-suite"'
            echo "  git add -- dead/downloads/extensions/theinternetisdead-extension-suite.zip"
            exit 1
          fi
