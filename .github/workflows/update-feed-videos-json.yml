name: Update feed-videos.json

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feed-videos-json
  cancel-in-progress: false

jobs:
  update-feed-videos-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Build merged feed-videos.json
        run: python dead/scripts/build-feed-videos.py

      - name: Commit updated feed-videos.json
        shell: bash
        run: |
          if git diff --quiet -- dead/pages/feeds/feed-videos.json; then
            echo "feed-videos.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dead/pages/feeds/feed-videos.json
          git commit -m "Update feed-videos.json"
          git push
