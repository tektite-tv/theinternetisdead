name: Collect README copies

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-readme-copies
  cancel-in-progress: false

jobs:
  collect-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Copy README files into dead/readmes
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repoRoot = process.cwd();
          const outputDir = path.join(repoRoot, 'dead', 'readmes');
          const ignoredDirectoryNames = new Set(['.git', 'node_modules']);

          function walk(directory) {
            const entries = fs.readdirSync(directory, { withFileTypes: true });
            const readmes = [];

            for (const entry of entries) {
              if (entry.isDirectory()) {
                if (ignoredDirectoryNames.has(entry.name)) {
                  continue;
                }

                readmes.push(...walk(path.join(directory, entry.name)));
              } else if (entry.isFile() && entry.name === 'README.md') {
                readmes.push(path.join(directory, entry.name));
              }
            }

            return readmes;
          }

          function filenameFor(readmePath) {
            const folderPath = path.dirname(readmePath);
            const relativeFolder = path.relative(repoRoot, folderPath);

            if (!relativeFolder) {
              return 'root-README.md';
            }

            const slug = relativeFolder
              .split(path.sep)
              .map((part) => part.replace(/^\.+/, '').replace(/[^A-Za-z0-9]+/g, '-'))
              .filter(Boolean)
              .join('-')
              .toLowerCase();

            return `${slug}-README.md`;
          }

          fs.mkdirSync(outputDir, { recursive: true });

          for (const entry of fs.readdirSync(outputDir, { withFileTypes: true })) {
            if (entry.isFile() && entry.name.endsWith('-README.md')) {
              fs.unlinkSync(path.join(outputDir, entry.name));
            }
          }

          const readmes = walk(repoRoot).sort();
          const seen = new Set();

          for (const readme of readmes) {
            const filename = filenameFor(readme);

            if (seen.has(filename)) {
              throw new Error(`README filename collision: ${filename}`);
            }

            seen.add(filename);
            fs.copyFileSync(readme, path.join(outputDir, filename));
          }

          console.log(`Copied ${readmes.length} README files into dead/readmes.`);
          NODE

      - name: Commit README copies
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Collect README copies
          file_pattern: dead/readmes/
