name: Update videos.json

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-videos-json
  cancel-in-progress: false

jobs:
  update-videos-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Refresh videos.json from YouTube
        shell: bash
        run: |
          mkdir -p dead/pages/youtube-list-grid
          yt-dlp -J "https://www.youtube.com/channel/UCn3WLZT7k8nO24XimlJVJVQ/videos" > dead/pages/youtube-list-grid/videos.json

      - name: Commit updated videos.json
        shell: bash
        run: |
          if git diff --quiet -- dead/pages/youtube-list-grid/videos.json; then
            echo "videos.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dead/pages/youtube-list-grid/videos.json
          git commit -m "Update videos.json"
          git push
