name: Generate readmes.json

on:
  push:
    paths:
      - 'dead/readmes/**'
      - '.github/workflows/generate-readmes-json.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-readmes-json
  cancel-in-progress: false

jobs:
  generate-readmes-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Generate dead/JSON/readmes.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repoRoot = process.cwd();
          const readmesDir = path.join(repoRoot, 'dead', 'readmes');
          const outputPath = path.join(repoRoot, 'dead', 'JSON', 'readmes.json');

          const files = fs.readdirSync(readmesDir, { withFileTypes: true })
            .filter((entry) => entry.isFile() && /-readme\.md$/i.test(entry.name))
            .map((entry) => entry.name)
            .sort((a, b) => a.localeCompare(b));

          fs.mkdirSync(path.dirname(outputPath), { recursive: true });
          fs.writeFileSync(outputPath, `${JSON.stringify(files, null, 2)}\n`, 'utf8');

          console.log(`Wrote ${path.relative(repoRoot, outputPath)} with ${files.length} README filenames.`);
          NODE

      - name: Commit readmes index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate readmes.json
          file_pattern: dead/JSON/readmes.json
