name: Generate message-list.json

on:
  push:
    paths:
      - 'dead/messages/**'
      - 'dead/scripts/build/build-message-list.js'
      - '.github/workflows/generate-message-list.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-message-list-json
  cancel-in-progress: false

jobs:
  generate-message-list:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dead/JSON/message-list.json
        run: node dead/scripts/build/build-message-list.js

      - name: Commit generated message list
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate message-list.json
          file_pattern: dead/JSON/message-list.json
