name: Generate enemy-gifs.json

on:
  push:
    paths:
      - "legacy/games/shooter-game-legacy/enemy-gifs/**"
      - ".github/workflows/generate-enemy-gifs-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-enemy-gifs-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate enemy-gifs.json
        run: |
          mkdir -p legacy/games/shooter-game-legacy

          find legacy/games/shooter-game-legacy/enemy-gifs \
            -maxdepth 1 \
            -type f \
            \( -iname "*.gif" -o -iname "*.webp" -o -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) \
            -printf '%f\n' \
            | sort \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            > legacy/games/shooter-game-legacy/enemy-gifs.json

          cat legacy/games/shooter-game-legacy/enemy-gifs.json

      - name: Commit generated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate enemy-gifs.json"
          file_pattern: legacy/games/shooter-game-legacy/enemy-gifs.json
