name: Generate enemy-webps.json

on:
  push:
    paths:
      - "dead/games/shooter-game/assets/enemy-webps/**"
      - ".github/workflows/generate-enemy-webps-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-enemy-webps-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate enemy-webps.json
        shell: bash
        run: |
          mkdir -p dead/JSON

          find dead/games/shooter-game/assets/enemy-webps \
            -maxdepth 1 \
            -type f \
            \( -iname "*.webp" \) \
            -printf '%f\n' \
            | sort \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            > dead/games/shooter-game/assets/JSON/enemy-webps.json

          echo "Generated dead/games/shooter-game/assets/JSON/enemy-webps.json:"
          cat dead/games/shooter-game/assets/JSON/enemy-webps.json

      - name: Commit generated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate enemy-webps.json"
          file_pattern: dead/games/shooter-game/assets/JSON/enemy-webps.json
