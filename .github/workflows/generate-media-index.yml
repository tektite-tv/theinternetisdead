name: Generate ugly oldschool media index

on:
  push:
    paths:
      - 'media/**'
      - '.github/workflows/generate-media-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-media-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Generate /media/index.html
        run: |
          python <<'PY'
          from pathlib import Path
          import html

          media_dir = Path("media")
          output_file = media_dir / "index.html"

          folders = ["audio", "images"]
          existing_folders = [
              name for name in folders
              if (media_dir / name).is_dir()
          ]

          rows = []
          rows.append('<tr><th align="left">Name</th></tr>')
          rows.append('<tr><th><hr></th></tr>')

          for folder in existing_folders:
              name = html.escape(folder) + "/"
              href = html.escape(folder) + "/"
              rows.append(f'<tr><td><a href="{href}">{name}</a></td></tr>')

          if not existing_folders:
              rows.append('<tr><td>No folders found.</td></tr>')

          rows.append('<tr><th><hr></th></tr>')

          html_doc = f"""<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2 Final//EN">
          <html>
           <head>
            <title>Index of /media</title>
           </head>
           <body>
          <h1>Index of /media</h1>
          <table>
          {chr(10).join(rows)}
          </table>
           </body>
          </html>
          """

          output_file.write_text(html_doc, encoding="utf-8")
          print(f"Wrote {output_file} with {len(existing_folders)} folder link(s).")
          PY

      - name: Commit updated index.html
        run: |
          if git diff --quiet -- media/index.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/index.html
          git commit -m "Auto-generate ugly media index.html"
          git push
