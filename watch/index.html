<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting | theinternetisdead.org</title>
<script>
(function redirectToHomeWatchState(){
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get("v");
    const target = videoId
        ? `/?v=${encodeURIComponent(videoId)}${window.location.hash || ""}`
        : `/${window.location.hash || ""}`;
    window.location.replace(target);
})();
</script>
</head>
<body></body>
</html>
