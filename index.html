<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>theinternetisdead.org</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #00ff00;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
    }

    body {
      --overlay-height: 76px;
      --root-shell-bg: rgba(0, 0, 0, 1);
      --root-main-frame-bg: rgba(0, 0, 0, 0);
      --root-nav-layer-bg: rgba(0, 0, 0, 0);
      --root-shell-font-scale: 100%;
      background: var(--root-shell-bg);
      font-size: var(--root-shell-font-scale);
    }

    #overlay-container {
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1200;
      background: var(--root-nav-layer-bg);
    }

    #shell-background-canvas {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--overlay-height);
      width: 100%;
      height: calc(100vh - var(--overlay-height));
      display: block;
      background: #000;
      pointer-events: none;
      z-index: 800;
    }

    #content-frame {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--overlay-height);
      width: 100%;
      height: calc(100vh - var(--overlay-height));
      border: none;
      display: block;
      background: var(--root-main-frame-bg);
      z-index: 900;
    }

    #chat-sandbox-frame {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--overlay-height);
      width: 100%;
      height: calc(100dvh - var(--overlay-height));
      border: none;
      display: block;
      background: transparent;
      pointer-events: none;
      z-index: 1100;
    }

    #chat-sandbox-frame.chat-overlay-active {
      pointer-events: auto;
    }

    /* MODIFIED: Let nested gaming-grid video lightboxes cover the full root viewport. */
    body.video-route-active #content-frame {
      top: 0;
      height: 100vh;
      height: 100dvh;
      z-index: 1300;
    }

    .overlay-error {
      padding: 12px 16px;
      background: #111;
      color: #ff6666;
      border-bottom: 1px solid #333;
      font-family: monospace;
    }

  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <canvas id="shell-background-canvas" aria-hidden="true"></canvas>

  <iframe
    id="content-frame"
    src="/dead/stuff/stuff-for-index/feeds/feeds-bridge.html"
    title="TheInternetIsDead page"
    loading="eager"
    allowtransparency="true"
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; clipboard-write; web-share"
    allowfullscreen
  ></iframe>

  <iframe
    id="chat-sandbox-frame"
    src="/dead/experiments/chat-sandbox/"
    title="Chat sandbox overlay"
    loading="eager"
    allowfullscreen
    aria-hidden="true"
  ></iframe>

  <script>
    const DEFAULT_IFRAME_PATH = '/dead/stuff/stuff-for-index/feeds/feeds-bridge.html';
    // feeds-bridge.html owns the nested feed iframe and currently loads /dead/stuff/stuff-for-index/feeds/gaming-grid/gaming-grid.html.
    const REPO_INDEX_PATH = '/dead/JSON/repo-index.json';
    const NAV_PATH = '/dead/stuff/nav/nav.html';
    const ROOT_SHELL_FRAME_KEY = 'deadRootShellFramePath';
    const EXPERIMENT_SHORT_PATHS = new Set([
      'bookmark-manager',
      'canvas-backgrounds',
      'chat-sandbox',
      'gods-eye',
      'mandala-visuals',
      'multimedia-editor',
      'music-player',
      'pdf-viewer',
      'photosphere',
      'sound-machine',
      'stacks',
      'test'
    ]);
    const EXPERIMENT_SHORT_PATH_ALIASES = {
      'bookmarks-manager': 'bookmark-manager'
    };
    const ROOT_SHORT_PATH_REDIRECTS = {
      '/games': '/dead/games/',
      '/games/': '/dead/games/',
      '/experiments': '/dead/experiments/',
      '/experiments/': '/dead/experiments/'
    };

    const overlayContainer = document.getElementById('overlay-container');
    const shellBackgroundCanvas = document.getElementById('shell-background-canvas');
    const contentFrame = document.getElementById('content-frame');
    const chatSandboxFrame = document.getElementById('chat-sandbox-frame');
    let iframeLinks = [DEFAULT_IFRAME_PATH];
    let currentFramePath = DEFAULT_IFRAME_PATH;
    let navHovering = false;
    let chatSandboxVisible = false;
    let chatSandboxDvdActive = false;
    let chatSandboxReady = false;
    let rootHueShiftEnabled = false;
    let rootColorInvertEnabled = false;
    let rootHueShiftDegrees = 0;
    let rootHueShiftAnimationId = null;
    let rootCustomizeAutoShuffleId = null;
    let rootColorElementMode = false;

    const ROOT_CUSTOMIZE_DEFAULTS = {
      shellBackground: { hex: '#000000', alpha: 1 },
      mainFrameBackdrop: { hex: '#000000', alpha: 0 },
      navLayerTint: { hex: '#000000', alpha: 0 },
      fontFamily: '"Courier New", Courier, monospace',
      fontScalePercent: 100
    };

    const rootCustomizeState = JSON.parse(JSON.stringify(ROOT_CUSTOMIZE_DEFAULTS));

    let shellBackgroundStars = [];
    let shellBackgroundReady = false;
    let shellBackgroundLastFrame = performance.now();
    let shellBackgroundTime = 0;
    let shellBackgroundVx = 0;

    const shellBackgroundLayers = [
      { count: 180, baseSpeedY: 40, parallaxX: 0.35, sizeMin: 1, sizeMax: 2 },
      { count: 120, baseSpeedY: 80, parallaxX: 0.60, sizeMin: 1, sizeMax: 3 },
      { count: 70, baseSpeedY: 140, parallaxX: 0.90, sizeMin: 2, sizeMax: 4 }
    ];
    const pendingFramePath = window.sessionStorage.getItem(ROOT_SHELL_FRAME_KEY) || '';
    if (pendingFramePath) {
      window.sessionStorage.removeItem(ROOT_SHELL_FRAME_KEY);
    }
    function getVideoIdFromCurrentUrl() {
      const params = new URLSearchParams(window.location.search);
      const queryVideoId = params.get('vid') || params.get('id') || '';
      if (queryVideoId.trim()) return queryVideoId.trim();

      const videoPathMatch = window.location.pathname.match(/^\/dead\/videos\/([^/]+)\/?$/);
      return videoPathMatch ? decodeURIComponent(videoPathMatch[1]) : '';
    }

    function getVideoRouteUrl(videoId) {
      return `/dead/videos/?vid=${encodeURIComponent(videoId)}`;
    }


    let pendingVideoId = getVideoIdFromCurrentUrl() || window.sessionStorage.getItem('deadVideoId') || '';
    if (pendingVideoId) {
      window.sessionStorage.removeItem('deadVideoId');
    }

    function getExperimentShortPathRedirect(pathname) {
      const normalizedPath = String(pathname || '').replace(/\/{2,}/g, '/');
      const shortPathMatch = normalizedPath.match(/^\/([^/]+)(?:\/(?:index\.html)?)?$/);
      if (!shortPathMatch) return '';

      const requestedFolderName = decodeURIComponent(shortPathMatch[1]);
      const folderName = EXPERIMENT_SHORT_PATH_ALIASES[requestedFolderName] || requestedFolderName;
      return EXPERIMENT_SHORT_PATHS.has(folderName)
        ? `/dead/experiments/${encodeURIComponent(folderName)}/`
        : '';
    }

    function getShortPathRedirect(pathname) {
      const normalizedPath = String(pathname || '').replace(/\/{2,}/g, '/');
      return ROOT_SHORT_PATH_REDIRECTS[normalizedPath] || getExperimentShortPathRedirect(normalizedPath);
    }

    function getStartupFramePathFromUrl() {
      const path = (window.location.pathname || '').replace(/\/{2,}/g, '/');
      const shortPathRedirect = getShortPathRedirect(path);
      if (shortPathRedirect) {
        return `${shortPathRedirect}${window.location.search || ''}${window.location.hash || ''}`;
      }

      if (
        /^\/dead\/games\/(?:[^/]+\/?)?(?:index\.html)?$/i.test(path) ||
        /^\/dead\/experiments\/(?:[^/]+\/?)?(?:index\.html)?$/i.test(path)
      ) {
        return `${path}${window.location.search || ''}${window.location.hash || ''}`;
      }

      return '';
    }

    const startupFramePath = getStartupFramePathFromUrl();

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function resetShellBackground() {
      shellBackgroundStars = shellBackgroundLayers.map(layer => {
        const stars = [];
        for (let i = 0; i < layer.count; i++) {
          stars.push({
            x: Math.random() * shellBackgroundCanvas.width,
            y: Math.random() * shellBackgroundCanvas.height,
            s: randomBetween(layer.sizeMin, layer.sizeMax),
            vyMul: randomBetween(0.7, 1.3)
          });
        }
        return stars;
      });
      shellBackgroundReady = true;
    }

    function resizeShellBackground() {
      const rect = shellBackgroundCanvas.getBoundingClientRect();
      const nextWidth = Math.max(1, Math.floor(rect.width));
      const nextHeight = Math.max(1, Math.floor(rect.height));
      if (shellBackgroundCanvas.width === nextWidth && shellBackgroundCanvas.height === nextHeight) return;
      shellBackgroundCanvas.width = nextWidth;
      shellBackgroundCanvas.height = nextHeight;
      resetShellBackground();
    }

    function drawShellBackground(now) {
      const ctx = shellBackgroundCanvas.getContext('2d');
      const dt = Math.min(0.05, Math.max(0, (now - shellBackgroundLastFrame) / 1000));
      shellBackgroundLastFrame = now;
      shellBackgroundTime += dt;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, shellBackgroundCanvas.width, shellBackgroundCanvas.height);

      if (shellBackgroundReady) {
        const vxIntent = 0.15 * Math.sin(shellBackgroundTime * 0.6);
        const targetVx = vxIntent * 7 * 55;
        shellBackgroundVx += (targetVx - shellBackgroundVx) * Math.min(1, dt * 8);

        for (let li = 0; li < shellBackgroundLayers.length; li++) {
          const layer = shellBackgroundLayers[li];
          const stars = shellBackgroundStars[li];
          const driftX = -shellBackgroundVx * layer.parallaxX;
          const driftY = layer.baseSpeedY;
          const alpha = li === 0 ? 0.35 : (li === 1 ? 0.55 : 0.85);

          ctx.fillStyle = `rgba(255,255,255,${alpha})`;

          for (const star of stars) {
            star.x += driftX * dt;
            star.y += driftY * star.vyMul * dt;

            if (star.y > shellBackgroundCanvas.height + 10) star.y = -10;
            if (star.x < -10) star.x = shellBackgroundCanvas.width + 10;
            if (star.x > shellBackgroundCanvas.width + 10) star.x = -10;

            ctx.fillRect(star.x, star.y, star.s, star.s);
          }
        }
      }

      requestAnimationFrame(drawShellBackground);
    }

    function normalizeIframePath(value) {
      const rawValue = String(value || '').trim();
      if (!rawValue) return DEFAULT_IFRAME_PATH;

      try {
        const url = new URL(rawValue, window.location.origin);
        if (url.origin !== window.location.origin) return DEFAULT_IFRAME_PATH;
        const shortPathRedirect = getShortPathRedirect(url.pathname);
        return `${shortPathRedirect || url.pathname}${url.search}${url.hash}`;
      } catch (error) {
        const withLeadingSlash = rawValue.startsWith('/') ? rawValue : `/${rawValue}`;
        const normalizedPath = withLeadingSlash.replace(/\/{2,}/g, '/');
        return getShortPathRedirect(normalizedPath) || normalizedPath;
      }
    }

    function setFrameSource(value, options = {}) {
      const historyMode = options === true ? 'replace' : options && options.historyMode;
      const nextPath = normalizeIframePath(value);
      contentFrame.src = nextPath;
      currentFramePath = nextPath;

      if (historyMode === 'push' || historyMode === 'replace') {
        const historyUrl = nextPath === DEFAULT_IFRAME_PATH ? '/' : nextPath;
        const historyState = { framePath: nextPath };
        if (historyMode === 'replace') {
          window.history.replaceState(historyState, '', historyUrl);
        } else if (window.location.pathname !== historyUrl) {
          window.history.pushState(historyState, '', historyUrl);
        }
      }

      window.dispatchEvent(new CustomEvent('indexFrameChange', {
        detail: { src: nextPath, links: iframeLinks.slice() }
      }));
    }

    async function loadNav() {
      try {
        const response = await fetch(NAV_PATH, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Failed to load ${NAV_PATH}`);

        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
          if (node.nodeName && node.nodeName.toLowerCase() === 'script') {
            scripts.push(node);
          } else {
            fragment.appendChild(node.cloneNode(true));
          }
        });

        overlayContainer.innerHTML = '';
        overlayContainer.appendChild(fragment);

        scripts.forEach((oldScript) => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach((attr) => {
            newScript.setAttribute(attr.name, attr.value);
          });
          newScript.textContent = oldScript.textContent;
          overlayContainer.appendChild(newScript);
        });

        syncOverlayHeight();
        requestFeedHeaderState();
        requestAnimationFrame(syncOverlayHeight);
      } catch (error) {
        console.error(`Error loading ${NAV_PATH}`, error);
        overlayContainer.innerHTML = `<div class="overlay-error">Error loading ${NAV_PATH}</div>`;
      }
    }

    function syncOverlayHeight() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root');
      const overlayHeight = overlayRoot
        ? Math.ceil(overlayRoot.getBoundingClientRect().height)
        : Math.ceil(overlayContainer.getBoundingClientRect().height);
      document.body.style.setProperty('--overlay-height', `${Math.max(overlayHeight, 1)}px`);
      resizeShellBackground();
    }

    async function loadRepoLinks() {
      try {
        const response = await fetch(REPO_INDEX_PATH, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Failed to load ${REPO_INDEX_PATH}`);
        const repoIndex = await response.json();
        const folders = Array.isArray(repoIndex.folders) ? repoIndex.folders : [];
        iframeLinks = Array.from(new Set([DEFAULT_IFRAME_PATH, ...folders]))
          .map(normalizeIframePath)
          .sort((a, b) => a.localeCompare(b));

        window.dispatchEvent(new CustomEvent('indexFrameLinksReady', {
          detail: { src: currentFramePath, links: iframeLinks.slice() }
        }));
      } catch (error) {
        console.error(`Error loading ${REPO_INDEX_PATH}`, error);
      }
    }

    window.indexFrameController = {
      defaultPath: DEFAULT_IFRAME_PATH,
      getCurrentSource() {
        return currentFramePath;
      },
      getLinks() {
        return iframeLinks.slice();
      },
      setSource(value, options = {}) {
        setFrameSource(value, options);
      }
    };

    function postToChatSandbox(message) {
      if (!chatSandboxFrame || !chatSandboxFrame.contentWindow) return;
      chatSandboxFrame.contentWindow.postMessage(message, '*');
    }

    function syncChatSandboxOverlayState() {
      const isActive = chatSandboxVisible || chatSandboxDvdActive;
      chatSandboxFrame.classList.toggle('chat-overlay-active', isActive);
      chatSandboxFrame.setAttribute('aria-hidden', isActive ? 'false' : 'true');
    }

    function postPageChatResult(command, message, options = {}) {
      postToChatSandbox({
        type: 'pageChatResult',
        command,
        message,
        announce: options.announce !== false,
        ...options
      });
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function normalizeHexColor(value, fallback = '#000000') {
      const raw = String(value || '').trim();
      return /^#?[0-9a-fA-F]{6}$/.test(raw) ? (raw.startsWith('#') ? raw : `#${raw}`) : fallback;
    }

    function hexToRgba(hex, alpha = 1) {
      const safeHex = normalizeHexColor(hex).slice(1);
      const red = parseInt(safeHex.slice(0, 2), 16);
      const green = parseInt(safeHex.slice(2, 4), 16);
      const blue = parseInt(safeHex.slice(4, 6), 16);
      const safeAlpha = clampNumber(alpha, 0, 1, 1);
      return `rgba(${red}, ${green}, ${blue}, ${safeAlpha})`;
    }

    function randomHexColor() {
      return `#${Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0')}`;
    }

    function applyRootCustomizeState() {
      document.body.style.setProperty('--root-shell-bg', hexToRgba(rootCustomizeState.shellBackground.hex, rootCustomizeState.shellBackground.alpha));
      document.body.style.setProperty('--root-main-frame-bg', hexToRgba(rootCustomizeState.mainFrameBackdrop.hex, rootCustomizeState.mainFrameBackdrop.alpha));
      document.body.style.setProperty('--root-nav-layer-bg', hexToRgba(rootCustomizeState.navLayerTint.hex, rootCustomizeState.navLayerTint.alpha));
      document.body.style.setProperty('--root-shell-font-scale', `${clampNumber(rootCustomizeState.fontScalePercent, 10, 500, 100)}%`);
      document.body.style.fontFamily = rootCustomizeState.fontFamily || ROOT_CUSTOMIZE_DEFAULTS.fontFamily;
    }

    function getRootCustomizePayload(options = {}) {
      return {
        type: 'pageChatResult',
        panel: 'homepageCustomize',
        command: '/customize',
        message: '/customize executed',
        includeBaseCustomize: options.includeBaseCustomize !== false,
        announce: options.announce !== false,
        state: JSON.parse(JSON.stringify(rootCustomizeState)),
        fontOptions: [
          '"Courier New", Courier, monospace',
          'Arial, Helvetica, sans-serif',
          'Verdana, Geneva, sans-serif',
          'Georgia, serif',
          '"Times New Roman", Times, serif',
          '"Lucida Console", Monaco, monospace'
        ],
        controls: [
          { key: 'shellBackground', label: 'Shell Background' },
          { key: 'mainFrameBackdrop', label: 'Main Iframe Backdrop' },
          { key: 'navLayerTint', label: 'Nav Layer Tint' }
        ]
      };
    }

    function sendPageCustomizePanel(options = {}) {
      postToChatSandbox(getRootCustomizePayload(options));
    }

    window.sendPageCustomizePanel = sendPageCustomizePanel;

    function setRootCustomizeColor(key, value = {}) {
      if (!Object.prototype.hasOwnProperty.call(rootCustomizeState, key)) return false;
      const fallback = rootCustomizeState[key] || ROOT_CUSTOMIZE_DEFAULTS[key];
      rootCustomizeState[key] = {
        hex: normalizeHexColor(value.hex, fallback.hex),
        alpha: clampNumber(value.alpha, 0, 1, fallback.alpha)
      };
      applyRootCustomizeState();
      return true;
    }

    function randomizeRootCustomizeColors() {
      ['shellBackground', 'mainFrameBackdrop', 'navLayerTint'].forEach((key) => {
        rootCustomizeState[key] = {
          hex: randomHexColor(),
          alpha: key === 'shellBackground' ? 1 : Math.random()
        };
      });
      applyRootCustomizeState();
      sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
    }

    function setRootCustomizeAutoShuffle(enabled) {
      const shouldEnable = !!enabled;
      if (rootCustomizeAutoShuffleId !== null) {
        clearInterval(rootCustomizeAutoShuffleId);
        rootCustomizeAutoShuffleId = null;
      }
      if (shouldEnable) {
        randomizeRootCustomizeColors();
        rootCustomizeAutoShuffleId = window.setInterval(randomizeRootCustomizeColors, 1000);
      }
    }

    function resetRootCustomizeState() {
      Object.assign(rootCustomizeState, JSON.parse(JSON.stringify(ROOT_CUSTOMIZE_DEFAULTS)));
      setRootCustomizeAutoShuffle(false);
      applyRootCustomizeState();
      sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
    }

    function applyRootGlobalEffects() {
      const filterParts = [];
      if (rootColorInvertEnabled) filterParts.push('invert(1)');
      if (rootHueShiftEnabled) filterParts.push(`hue-rotate(${rootHueShiftDegrees}deg)`);
      const filterValue = filterParts.length ? filterParts.join(' ') : '';
      [overlayContainer, shellBackgroundCanvas, contentFrame].forEach((element) => {
        element.style.filter = filterValue;
      });
    }

    function updateRootHueShiftLoop() {
      if (rootHueShiftAnimationId !== null) {
        cancelAnimationFrame(rootHueShiftAnimationId);
        rootHueShiftAnimationId = null;
      }
      if (!rootHueShiftEnabled) {
        rootHueShiftDegrees = 0;
        applyRootGlobalEffects();
        return;
      }
      const spin = () => {
        rootHueShiftDegrees = (rootHueShiftDegrees + 1.25) % 360;
        applyRootGlobalEffects();
        rootHueShiftAnimationId = requestAnimationFrame(spin);
      };
      rootHueShiftAnimationId = requestAnimationFrame(spin);
    }

    function setRootHueShift(enabled) {
      rootHueShiftEnabled = !!enabled;
      updateRootHueShiftLoop();
    }

    function setRootColorInvert(enabled) {
      rootColorInvertEnabled = !!enabled;
      applyRootGlobalEffects();
    }

    function resetRootGlobalEffects() {
      setRootHueShift(false);
      setRootColorInvert(false);
      resetRootCustomizeState();
    }

    function setOverlayClockPatch(nextState) {
      if (typeof window.setOverlayClockState !== 'function') return null;
      return window.setOverlayClockState(nextState);
    }

    function normalizeClockZone(value) {
      const requested = String(value || '').trim();
      const zones = typeof window.getOverlaySupportedTimeZones === 'function'
        ? window.getOverlaySupportedTimeZones()
        : ['America/Toronto', 'UTC'];
      return zones.includes(requested) ? requested : '';
    }

    window.__indexOpenChatOverlay = function openIndexChatOverlay(options = {}) {
      chatSandboxVisible = true;
      syncChatSandboxOverlayState();
      postToChatSandbox({
        type: 'chatSandboxOpen',
        focus: options.focus !== false,
        seedSlash: !!options.seedSlash
      });
    };

    function registerIndexChatCommands() {
      postToChatSandbox({
        type: 'pageChatRegister',
        pageOnly: false,
        pageId: 'index-shell',
        title: 'The Internet Is Dead',
        sourceKey: 'index-shell',
        commands: [
          { name: '/home', usage: '/home', desc: 'return the main iframe to the front feed', execute: true },
          { name: '/goto', usage: '/goto ', desc: 'load a site path in the main iframe', execute: false, suggestions: iframeLinks.slice() },
          { name: '/games', usage: '/games', desc: 'load the games index in the main iframe', execute: true },
          { name: '/experiments', usage: '/experiments', desc: 'load the experiments index in the main iframe', execute: true },
          { name: '/customize', usage: '/customize', desc: 'open shell/page customize controls', execute: true, replaceBuiltIn: true, passthroughBuiltIn: false },
          { name: '/color_element', usage: '/color_element', desc: 'toggle shell click-to-pick color mode placeholder', execute: true },
          { name: '/clock_time', usage: '/clock_time 4:20pm', desc: 'set the nav clock to a manual time string', execute: false, suggestions: ['4:20pm', '07:10am', '23:59:59'] },
          { name: '/clock_date', usage: '/clock_date Saturday / March 28 / 2026', desc: 'set the nav clock to a manual date string', execute: false, suggestions: ['Saturday / March 28 / 2026', 'Thursday / April 9 / 2026'] },
          { name: '/clock_zone', usage: '/clock_zone America/Toronto', desc: 'sync the nav clock to a named timezone', execute: false, suggestions: typeof window.getOverlaySupportedTimeZones === 'function' ? window.getOverlaySupportedTimeZones() : ['America/Toronto', 'UTC'] },
          { name: '/clock_reset', usage: '/clock_reset', desc: 'reset the nav clock to live Toronto time', execute: true }
        ]
      });
    }

    function handleIndexChatCommand(data) {
      const commandName = String(data.command || '').trim().toLowerCase();
      const rawCommand = typeof data.raw === 'string' ? data.raw.trim() : '';
      const commandValue = rawCommand ? rawCommand.slice(commandName.length).trim() : '';

      if (commandName === '/home') {
        setFrameSource(DEFAULT_IFRAME_PATH, { historyMode: 'push' });
        postPageChatResult('/home', '/home executed: loaded the front feed');
        return true;
      }

      if (commandName === '/games') {
        setFrameSource('/dead/games/', { historyMode: 'push' });
        postPageChatResult('/games', '/games executed: loaded /dead/games/');
        return true;
      }

      if (commandName === '/experiments') {
        setFrameSource('/dead/experiments/', { historyMode: 'push' });
        postPageChatResult('/experiments', '/experiments executed: loaded /dead/experiments/');
        return true;
      }

      if (commandName === '/customize') {
        sendPageCustomizePanel({ includeBaseCustomize: true, announce: true });
        return true;
      }

      if (commandName === '/color_element') {
        rootColorElementMode = !rootColorElementMode;
        document.body.style.cursor = rootColorElementMode ? 'crosshair' : '';
        postPageChatResult('/color_element', rootColorElementMode
          ? '/color_element enabled: shell picker placeholder active'
          : '/color_element disabled', { announce: true });
        return true;
      }

      if (commandName === '/clock_time') {
        if (!commandValue) {
          postPageChatResult('/clock_time', 'Usage: /clock_time [time]');
          return true;
        }
        setOverlayClockPatch({ mode: 'time', manualTime: commandValue, manualDate: '' });
        postPageChatResult('/clock_time', `/clock_time executed: ${commandValue}`);
        return true;
      }

      if (commandName === '/clock_date') {
        if (!commandValue) {
          postPageChatResult('/clock_date', 'Usage: /clock_date [date]');
          return true;
        }
        setOverlayClockPatch({ mode: 'date', manualDate: commandValue, manualTime: '' });
        postPageChatResult('/clock_date', `/clock_date executed: ${commandValue}`);
        return true;
      }

      if (commandName === '/clock_zone') {
        if (!commandValue) {
          postPageChatResult('/clock_zone', 'Usage: /clock_zone [timezone]');
          return true;
        }
        const nextZone = normalizeClockZone(commandValue);
        if (!nextZone) {
          postPageChatResult('/clock_zone', `Unknown timezone: ${commandValue}`);
          return true;
        }
        setOverlayClockPatch({ mode: 'time', zone: nextZone, manualTime: '', manualDate: '' });
        postPageChatResult('/clock_zone', `/clock_zone executed: synced to ${nextZone}`);
        return true;
      }

      if (commandName === '/clock_reset') {
        setOverlayClockPatch({ mode: 'time', zone: 'America/Toronto', manualTime: '', manualDate: '' });
        postPageChatResult('/clock_reset', '/clock_reset executed: synced to America/Toronto');
        return true;
      }

      if (commandName === '/goto') {
        if (!commandValue) {
          postToChatSandbox({
            type: 'pageChatResult',
            panel: 'gotoFolders',
            command: '/goto',
            message: '/goto executed',
            folders: iframeLinks.slice(),
            announce: true
          });
          return true;
        }
        const nextPath = normalizeIframePath(commandValue);
        const nextUrl = new URL(nextPath, window.location.origin);
        if (nextUrl.searchParams.get('standalone') === 'true') {
          window.location.href = nextUrl.href;
          return true;
        }
        setFrameSource(nextPath, { historyMode: 'push' });
        postPageChatResult('/goto', `/goto executed: ${nextPath}`);
        return true;
      }

      return false;
    }

    function postNavHoverState() {
      if (!contentFrame.contentWindow) return;
      contentFrame.contentWindow.postMessage({
        type: 'indexNavHoverState',
        hovering: navHovering
      }, '*');
    }

    window.openNavFeedStateVideo = function openNavFeedStateVideo(videoId) {
      const requestedId = String(videoId || '').trim();
      if (!requestedId || !contentFrame.contentWindow) return;
      contentFrame.contentWindow.postMessage({
        type: 'feedGridHeaderCommand',
        action: 'openVideo',
        videoId: requestedId
      }, '*');
    };

    window.toggleIndexMobileFeedHeader = function toggleIndexMobileFeedHeader() {
      if (!contentFrame.contentWindow) return;
      contentFrame.contentWindow.postMessage({
        type: 'indexMobileFeedHeaderToggle'
      }, '*');
    };

    function requestFeedHeaderState() {
      if (!contentFrame.contentWindow) return;
      contentFrame.contentWindow.postMessage({
        type: 'feedGridHeaderCommand',
        action: 'requestState'
      }, '*');
    }

    function patchContentFrameShellLinks() {
      let frameDocument;
      try {
        frameDocument = contentFrame.contentDocument;
      } catch (error) {
        return;
      }
      if (!frameDocument) return;

      frameDocument.querySelectorAll('a[href*="/dead/games/shooter-game/"]').forEach((link) => {
        link.setAttribute('href', '/dead/games/shooter-game/');
        link.setAttribute('data-index-frame-src', '/dead/games/shooter-game/');
        link.removeAttribute('target');
      });

      if (frameDocument.documentElement.dataset.indexFrameLinkPatch === 'true') return;
      frameDocument.documentElement.dataset.indexFrameLinkPatch = 'true';

      frameDocument.addEventListener('click', (event) => {
        const link = event.target && event.target.closest
          ? event.target.closest('[data-index-frame-src]')
          : null;
        if (!link) return;

        const frameSrc = link.getAttribute('data-index-frame-src');
        if (!frameSrc) return;

        event.preventDefault();
        if (event.shiftKey) {
          const standaloneUrl = new URL(frameSrc, window.location.origin);
          standaloneUrl.pathname = standaloneUrl.pathname.replace(/\/?$/, '/index.html');
          standaloneUrl.searchParams.set('standalone', 'true');
          window.location.href = standaloneUrl.href;
          return;
        }

        setFrameSource(frameSrc, { historyMode: 'push' });
      }, true);

      frameDocument.addEventListener('keydown', handleShellSlashKeydown, true);
    }

    function isTextEntryTarget(target) {
      if (!target) return false;
      const tagName = String(target.tagName || '').toLowerCase();
      return target.isContentEditable ||
        tagName === 'input' ||
        tagName === 'textarea' ||
        tagName === 'select';
    }

    function handleShellSlashKeydown(event) {
      const fromChatSandboxFrame = event.target && event.target.ownerDocument === chatSandboxFrame.contentDocument;
      const shouldRespectTextEntry = isTextEntryTarget(event.target) && (chatSandboxVisible || !fromChatSandboxFrame);
      if (event.key !== '/' || event.altKey || event.ctrlKey || event.metaKey || shouldRespectTextEntry) {
        return;
      }

      event.preventDefault();
      window.__indexOpenChatOverlay({ focus: true, seedSlash: true });
    }

    function patchChatSandboxSlashKey() {
      let frameDocument;
      try {
        frameDocument = chatSandboxFrame.contentDocument;
      } catch (error) {
        return;
      }
      if (!frameDocument || frameDocument.documentElement.dataset.indexShellSlashPatch === 'true') return;

      frameDocument.documentElement.dataset.indexShellSlashPatch = 'true';
      frameDocument.addEventListener('keydown', handleShellSlashKeydown, true);
    }

    window.addEventListener('keydown', handleShellSlashKeydown, true);

    overlayContainer.addEventListener('mouseenter', () => {
      navHovering = true;
      postNavHoverState();
    });

    overlayContainer.addEventListener('mouseleave', () => {
      navHovering = false;
      postNavHoverState();
    });

    contentFrame.addEventListener('load', () => {
      patchContentFrameShellLinks();
      postNavHoverState();
      requestFeedHeaderState();
      if (!pendingVideoId || !contentFrame.contentWindow) return;
      contentFrame.contentWindow.postMessage({ type: 'feedGridOpenVideo', videoId: pendingVideoId }, '*');
      pendingVideoId = '';
    });

    chatSandboxFrame.addEventListener('load', () => {
      chatSandboxReady = true;
      registerIndexChatCommands();
      syncChatSandboxOverlayState();
      patchChatSandboxSlashKey();
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (event.source === chatSandboxFrame.contentWindow) {
        if (data.type === 'chatSandboxState') {
          chatSandboxVisible = !!data.visible || !!data.valuePickerActive;
          syncChatSandboxOverlayState();
          if (chatSandboxReady) {
            registerIndexChatCommands();
          }
          return;
        }

        if (data.type === 'chatSandboxDvdState') {
          chatSandboxDvdActive = !!data.active;
          syncChatSandboxOverlayState();
          if (chatSandboxReady) {
            registerIndexChatCommands();
          }
          return;
        }

        if (data.type === 'pageChatExecute') {
          handleIndexChatCommand(data);
          return;
        }

        if (data.type === 'pageGlobalHueShiftToggle') {
          setRootHueShift(!rootHueShiftEnabled);
          return;
        }

        if (data.type === 'pageGlobalHueShiftSet') {
          setRootHueShift(!!data.enabled);
          return;
        }

        if (data.type === 'pageGlobalColorInvertToggle') {
          setRootColorInvert(!rootColorInvertEnabled);
          return;
        }

        if (data.type === 'pageGlobalColorInvertSet') {
          setRootColorInvert(!!data.enabled);
          return;
        }

        if (data.type === 'pageGlobalEffectsReset') {
          resetRootGlobalEffects();
          return;
        }

        if (data.type === 'pageCustomizeSet') {
          setRootCustomizeColor(data.key, data.value);
          return;
        }

        if (data.type === 'pageCustomizeFontFamily') {
          rootCustomizeState.fontFamily = String(data.value || ROOT_CUSTOMIZE_DEFAULTS.fontFamily);
          applyRootCustomizeState();
          return;
        }

        if (data.type === 'pageCustomizeFontScale') {
          rootCustomizeState.fontScalePercent = clampNumber(data.value, 10, 500, 100);
          applyRootCustomizeState();
          return;
        }

        if (data.type === 'pageCustomizeReset') {
          resetRootCustomizeState();
          return;
        }

        if (data.type === 'pageCustomizeAction') {
          if (data.action === 'reset') resetRootCustomizeState();
          return;
        }

        if (data.type === 'pageCustomizeSetRandomizeTintOpacities') {
          randomizeRootCustomizeColors();
          return;
        }

        if (data.type === 'pageCustomizeAutoShuffleSet') {
          setRootCustomizeAutoShuffle(!!data.enabled);
          return;
        }

        if (data.type === 'refreshParentPage') {
          window.location.reload();
          return;
        }

        if (data.type === 'pageScreenshotCapture') {
          postToChatSandbox({ type: 'pageScreenshotStatus', ok: false, message: 'Root shell screenshot capture is not wired yet.' });
          return;
        }

        if (data.type === 'pageScreenshotAnimationCapture') {
          postToChatSandbox({ type: 'pageScreenshotAnimationStatus', ok: false, message: 'Root shell animation capture is not wired yet.' });
          return;
        }

        if (data.type === 'pageExit') {
          document.documentElement.innerHTML = '<head><title>System Exit</title></head><body style="margin:0;min-height:100vh;background:#000;color:#00ff00;font-family:Courier New,monospace;display:grid;place-items:center;text-align:center;"><div><div style="font-size:72px;">☠</div><div>System exited.</div><div style="margin-top:12px;font-size:12px;opacity:.7;">Refresh to resurrect the iframe crypt.</div></div></body>';
          return;
        }

        return;
      }

      if (data.type === 'openChatFromChild') {
        window.__indexOpenChatOverlay({ focus: true, seedSlash: !!data.seedSlash });
        return;
      }

      if (event.source !== contentFrame.contentWindow) return;

      if (data.type === 'feedGridHeaderState') {
        if (typeof window.updateNavFeedState === 'function') {
          window.updateNavFeedState(data);
        }
        return;
      }

      if (data.type !== 'indexFrameVideoRoute') return;

      const videoId = String(data.videoId || '').trim();
      const isVideoOpen = data.action === 'open' && videoId;
      const nextUrl = isVideoOpen ? getVideoRouteUrl(videoId) : '/';
      // MODIFIED: A video opened from gaming-grid.html now promotes the content iframe above the root nav.
      document.body.classList.toggle('video-route-active', !!isVideoOpen);

      // Keep root index.html as the only public shell. Video URLs are URL state only;
      // the content iframe stays on the feed bridge so nav/header iframes do not duplicate.
      if (normalizeIframePath(currentFramePath) !== normalizeIframePath(DEFAULT_IFRAME_PATH)) {
        setFrameSource(DEFAULT_IFRAME_PATH);
      }

      window.history.pushState({ videoId: videoId || null }, '', nextUrl);
      if (typeof window.updateNavVideoRouteState === 'function') {
        window.updateNavVideoRouteState({
          action: data.action,
          videoId,
          videoTitle: String(data.videoTitle || '').trim(),
          url: nextUrl
        });
      }
      if (data.action !== 'open') {
        requestFeedHeaderState();
      }
    });

    window.addEventListener('resize', syncOverlayHeight);
    window.addEventListener('orientationchange', syncOverlayHeight);

    const resizeObserver = new ResizeObserver(syncOverlayHeight);
    resizeObserver.observe(overlayContainer);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch((error) => {
        console.warn('Unable to register service worker', error);
      });
    }

    applyRootCustomizeState();
    resizeShellBackground();
    requestAnimationFrame(drawShellBackground);

    loadNav();
    loadRepoLinks();

    if (pendingFramePath) {
      setFrameSource(pendingFramePath, { historyMode: 'replace' });
    } else if (startupFramePath) {
      setFrameSource(startupFramePath, { historyMode: 'replace' });
    } else if (pendingVideoId) {
      document.body.classList.add('video-route-active');
      window.history.replaceState({ videoId: pendingVideoId }, '', getVideoRouteUrl(pendingVideoId));
      window.dispatchEvent(new CustomEvent('indexFrameChange', {
        detail: { src: currentFramePath, links: iframeLinks.slice() }
      }));
    } else {
      window.dispatchEvent(new CustomEvent('indexFrameChange', {
        detail: { src: currentFramePath, links: iframeLinks.slice() }
      }));
    }
  </script>
</body>
</html>
