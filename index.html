<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>theinternetisdead.org</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
      --overlay-height: 76px;
    }

    /* ADDED: scale the actual site layer to 75% so the page appears zoomed out by 25%
       without shrinking the separate chat overlay iframe. */
    #site-shell {
      position: fixed;
      left: 0;
      top: var(--overlay-height, 76px);
      width: 133.333333%;
      height: calc((100vh - var(--overlay-height, 76px)) / 0.75);
      transform: scale(0.75);
      transform-origin: top left;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #overlay-container {
      width: 100%;
      flex: 0 0 auto;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    #main-content {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    #chat-sandbox-frame.dvd-active {
      opacity: 1;
      visibility: visible;
      pointer-events: none;
    }

    .overlay-error {
      padding: 12px 16px;
      background: #111;
      color: #ff6666;
      border-bottom: 1px solid #333;
      font-family: monospace;
    }

    body.page-exited > *:not(#page-exit-overlay) {
      display: none !important;
    }

    #page-exit-overlay {
      position: fixed;
      inset: 0;
      display: none;
      padding: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 0, 80, 0.28), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(0, 255, 120, 0.24), transparent 26%),
        radial-gradient(circle at 50% 80%, rgba(0, 140, 255, 0.24), transparent 30%),
        #000;
      color: #00ff66;
      z-index: 2147483647;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
      cursor: crosshair;
    }

    body.page-exited #page-exit-overlay {
      display: block;
    }

    .page-exit-overlay-bg {
      position: absolute;
      inset: -12%;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 0, 64, 0.24), transparent 22%),
        radial-gradient(circle at 82% 24%, rgba(0, 255, 102, 0.22), transparent 24%),
        radial-gradient(circle at 48% 78%, rgba(0, 110, 255, 0.24), transparent 26%),
        linear-gradient(135deg, rgba(255, 0, 0, 0.09), rgba(0, 255, 0, 0.09), rgba(0, 90, 255, 0.09));
      filter: blur(28px) saturate(170%);
      transform: translate3d(0, 0, 0) scale(1.08);
      pointer-events: none;
      animation: pageExitRgbPulse 2.3s ease-in-out infinite alternate;
    }

    .page-exit-overlay-inner {
      position: absolute;
      left: 24px;
      top: 24px;
      width: max-content;
      max-width: min(calc(100vw - 48px), 72ch);
      padding: 18px 20px;
      white-space: pre;
      font-size: clamp(10px, 1.35vw, 16px);
      line-height: 1.1;
      color: #00ff66;
      text-shadow: 0 0 8px rgba(0, 255, 102, 0.35);
      background: rgba(0, 0, 0, 0.38);
      box-shadow: 0 0 0 1px rgba(0, 255, 102, 0.18), inset 0 0 24px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      will-change: transform;
      animation: pageExitWave 1.8s ease-in-out infinite;
    }

    @keyframes pageExitWave {
      0% { filter: hue-rotate(0deg); }
      25% { filter: hue-rotate(12deg); }
      50% { filter: hue-rotate(-10deg); }
      75% { filter: hue-rotate(8deg); }
      100% { filter: hue-rotate(0deg); }
    }

    @keyframes pageExitRgbPulse {
      0% { opacity: 0.68; transform: translate3d(-1.5%, -1%, 0) scale(1.04); }
      100% { opacity: 1; transform: translate3d(1.5%, 1%, 0) scale(1.12); }
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <div id="site-shell">
    <div id="main-content">
      <iframe
        id="tektite-frame"
        src="/dead/pages/feeds/feeds.html"
        title="Tektite Index"
        loading="eager"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/dead/experiments/chat-sandbox/chat-sandbox.html"
    title="Chat Sandbox Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <input id="overlay-logo-upload-input" type="file" accept="image/*" hidden />
  <input id="tektite-logo-upload-input" type="file" accept="image/*" multiple hidden />

  <script>
    const overlayContainer = document.getElementById('overlay-container');
    const chatSandboxFrame = document.getElementById('chat-sandbox-frame');
    const tektiteFrame = document.getElementById('tektite-frame');
    const overlayLogoUploadInput = document.getElementById('overlay-logo-upload-input');
    const tektiteLogoUploadInput = document.getElementById('tektite-logo-upload-input');
    let chatSandboxVisible = false;
    let chatSandboxDvdActive = false;
    let chatSandboxReady = false;
    let pendingChatOpenOptions = null;

    window.indexGotoSuggestions = ['/'];

    function normalizeIndexGotoSuggestions(values) {
      const folders = Array.isArray(values) ? values : [];
      return Array.from(new Set(['/', ...folders
        .map((value) => String(value || '').trim())
        .filter((value) => value.startsWith('/'))
        .map((value) => value === '/' ? '/' : `${value.replace(/\/+$/, '')}/`)]))
        .sort((a, b) => {
          if (a === '/') return -1;
          if (b === '/') return 1;
          return a.localeCompare(b);
        });
    }

    function loadIndexGotoSuggestions() {
      fetch('/dead/JSON/repo-index.json', { cache: 'no-store' })
        .then((response) => response.ok ? response.json() : null)
        .then((repoIndex) => {
          const folders = repoIndex && Array.isArray(repoIndex.folders) ? repoIndex.folders : [];
          window.indexGotoSuggestions = normalizeIndexGotoSuggestions(folders);
          registerPageCommands();
        })
        .catch(() => {
          window.indexGotoSuggestions = normalizeIndexGotoSuggestions(window.indexGotoSuggestions);
        });
    }

    // ADDED: Homepage navigation shortcut. It registers for autocomplete and execution.
    window.TektiteIndexChatController = {
      getRegistrationPayload() {
        const gotoSuggestions = normalizeIndexGotoSuggestions(window.indexGotoSuggestions);
        window.indexGotoSuggestions = gotoSuggestions;
        return {
          type: 'pageChatRegister',
          pageOnly: false,
          pageId: 'tektite-index',
          title: 'TheInternetIsDead.org Index',
          sourceKey: 'tektite-index',
          commands: [
            {
              name: '/goto',
              usage: '/goto /',
              desc: 'go to a folder on the site',
              execute: false,
              suggestions: gotoSuggestions,
              replaceBuiltIn: true
            }
          ]
        };
      },
      handlePageChatExecute(eventData = {}) {
        const commandName = String(eventData.command || '').trim().toLowerCase();
        if (commandName !== '/goto') {
          return false;
        }
        const rawCommand = typeof eventData.raw === 'string' ? eventData.raw.trim() : '';
        const commandValue = rawCommand ? rawCommand.slice(commandName.length).trim() : '';
        const gotoSuggestions = normalizeIndexGotoSuggestions(window.indexGotoSuggestions);
        if (!commandValue) {
          postToChatSandbox({
            type: 'pageChatResult',
            panel: 'gotoFolders',
            command: '/goto',
            message: '/goto executed',
            folders: gotoSuggestions,
            announce: true
          });
          return true;
        }
        const target = gotoSuggestions.includes(commandValue) ? commandValue : '/';
        window.location.href = target === '/' ? '/index.html' : target;
        return true;
      }
    };
    loadIndexGotoSuggestions();

    const defaultClockZone = 'America/Toronto';
    const supportedClockZones = (typeof Intl.supportedValuesOf === 'function'
      ? Intl.supportedValuesOf('timeZone')
      : ['America/Toronto', 'UTC']);
    const allClockZones = Array.from(new Set([defaultClockZone, ...supportedClockZones])).sort((a, b) => a.localeCompare(b));
    let overlayClockState = {
      mode: 'time',
      zone: defaultClockZone,
      manualTime: '',
      manualDate: ''
    };

    window.defaultClockZone = defaultClockZone;
    window.allClockZones = allClockZones;
    window.overlayClockState = overlayClockState;

    const pageCustomizeDefaults = {
      fontFamily: '"Courier New", Courier, monospace',
      fontScalePercent: 100,
      colors: {
        pageBg: { label: 'Page Background', hex: '#000000', alpha: 1 },
        pageText: { label: 'Page Text Color', hex: '#00ff00', alpha: 1 },
        overlayTopBarBg: { label: 'Overlay Top Bar', hex: '#4b0076', alpha: 1 },
        headerBg: { label: 'Page Header', hex: '#4b0076', alpha: 0.5 },
        accent: { label: 'Buttons / Borders', hex: '#00ff00', alpha: 1 },
        panelBg: { label: 'Panels / Inputs', hex: '#4b0076', alpha: 1 },
        sidebarBg: { label: 'Sidebar Background', hex: '#110019', alpha: 1 },
        overlayLogoTint: { label: 'Overlay Logo Tint', hex: '#00ff00', alpha: 0 },
        overlayClockTint: { label: 'Overlay Clock Font', hex: '#00ff00', alpha: 1 },
        tektiteLogoTint: { label: 'OldTube Logo Tint', hex: '#00ff00', alpha: 0 },
        thumbnailTint: { label: 'Thumbnail Tint', hex: '#00ff00', alpha: 0 }
      }
    };
    let pageCustomizeState = createDefaultPageCustomizeState();
    let customOverlayLogoUrl = '';
    let customTektiteLogoUrls = [];
    let lastCustomOverlayLogoObjectUrl = '';
    let lastCustomTektiteLogoObjectUrls = [];
    let pageAutoShuffleIntervalId = null;
    const pageAutoShuffleIntervalMs = 1000;
    const pageControlShuffleIntervals = new Map();
    const pageFontOptions = [
      '"Courier New", Courier, monospace',
      'Arial, Helvetica, sans-serif',
      '"Times New Roman", Times, serif',
      'Verdana, Geneva, sans-serif',
      'Georgia, serif',
      '"Trebuchet MS", sans-serif',
      '"Lucida Console", Monaco, monospace'
    ];
    let pageGlobalColorInvertEnabled = false;
    let pageGlobalHueShiftEnabled = false;
    let pageGlobalHueShiftFrameId = null;
    let pageGlobalHueShiftStartTime = 0;
    let pageGlobalHueShiftFrozenAngle = null;
    const pageGlobalHueShiftDurationMs = 4000;
    let pageScreenshotAnimationActive = false;
    let colorElementModeEnabled = false;
    let colorElementHotspotRefreshId = null;
    let colorElementOverlay = null;
    let colorElementPickerInput = null;
    let colorElementModeLabel = null;
    let pendingColorElementHotspotKey = '';

    function cloneState(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function createDefaultPageCustomizeState() {
      const state = {
        fontFamily: pageCustomizeDefaults.fontFamily,
        fontScalePercent: pageCustomizeDefaults.fontScalePercent,
        colors: {}
      };
      Object.entries(pageCustomizeDefaults.colors).forEach(([key, value]) => {
        state.colors[key] = { hex: value.hex, alpha: value.alpha };
      });
      return state;
    }

    function clampAlpha(value, fallback = 1) {
      const num = Number(value);
      return Number.isFinite(num) ? Math.max(0, Math.min(1, num)) : fallback;
    }

    function clampScale(value) {
      const num = Number(value);
      return Number.isFinite(num) ? Math.max(10, Math.min(500, Math.round(num))) : pageCustomizeDefaults.fontScalePercent;
    }

    function hexToRgba(hex, alpha = 1) {
      const safe = typeof hex === 'string' && /^#?[0-9a-fA-F]{6}$/.test(hex.trim()) ? hex.trim().replace('#', '') : '000000';
      const r = parseInt(safe.slice(0, 2), 16);
      const g = parseInt(safe.slice(2, 4), 16);
      const b = parseInt(safe.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${clampAlpha(alpha)})`;
    }

    function randomHex() {
      return `#${Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0')}`;
    }

    function getChatWindow() {
      return chatSandboxFrame && chatSandboxFrame.contentWindow ? chatSandboxFrame.contentWindow : null;
    }


    function sanitizeClockZone(zone) {
      const safeZone = typeof zone === 'string' ? zone.trim() : '';
      return allClockZones.includes(safeZone) ? safeZone : defaultClockZone;
    }

    let siteClockState = {
      zone: sanitizeClockZone(overlayClockState.zone),
      overrideTimestampMs: null,
      overrideStartedRealMs: null
    };

    function getTimeZoneFormatter(zone) {
      const safeZone = sanitizeClockZone(zone);
      window.__siteClockFormatters = window.__siteClockFormatters || {};
      if (!window.__siteClockFormatters[safeZone]) {
        window.__siteClockFormatters[safeZone] = new Intl.DateTimeFormat('en-CA', {
          timeZone: safeZone,
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hourCycle: 'h23'
        });
      }
      return window.__siteClockFormatters[safeZone];
    }

    function getTimeZoneParts(date = new Date(), zone = defaultClockZone) {
      const safeDate = date instanceof Date ? date : new Date(date);
      const safeZone = sanitizeClockZone(zone);
      const parts = getTimeZoneFormatter(safeZone).formatToParts(safeDate);
      const read = (type) => Number(parts.find((part) => part.type === type)?.value || 0);
      return {
        year: read('year'),
        month: read('month'),
        day: read('day'),
        hour: read('hour'),
        minute: read('minute'),
        second: read('second')
      };
    }

    function getTimeZoneOffsetMs(date = new Date(), zone = defaultClockZone) {
      const parts = getTimeZoneParts(date, zone);
      const asUtc = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second, 0);
      return asUtc - date.getTime();
    }

    function zonedDateTimeToUtc(parts = {}, zone = defaultClockZone) {
      const year = Number(parts.year) || 1970;
      const month = Number(parts.month) || 1;
      const day = Number(parts.day) || 1;
      const hour = Number(parts.hour) || 0;
      const minute = Number(parts.minute) || 0;
      const second = Number(parts.second) || 0;
      const safeZone = sanitizeClockZone(zone);

      let guess = Date.UTC(year, month - 1, day, hour, minute, second, 0);
      for (let i = 0; i < 4; i += 1) {
        const offset = getTimeZoneOffsetMs(new Date(guess), safeZone);
        const nextGuess = Date.UTC(year, month - 1, day, hour, minute, second, 0) - offset;
        if (Math.abs(nextGuess - guess) < 1000) {
          guess = nextGuess;
          break;
        }
        guess = nextGuess;
      }
      return guess;
    }

    function parseClockTimeInput(input = '') {
      const normalized = String(input || '').trim().toLowerCase();
      const match = normalized.match(/^(\d{1,2})(?::(\d{2}))?(?::(\d{2}))?\s*([ap]m)?$/i);
      if (!match) return null;
      let hour = Number(match[1]);
      const minute = Number(match[2] || '0');
      const second = Number(match[3] || '0');
      const meridiem = match[4] || '';
      if (minute > 59 || second > 59) return null;
      if (meridiem) {
        if (hour < 1 || hour > 12) return null;
        if (meridiem === 'am') {
          if (hour === 12) hour = 0;
        } else if (hour !== 12) {
          hour += 12;
        }
      } else if (hour > 23) {
        return null;
      }
      return { hour, minute, second };
    }

    function parseClockDateInput(input = '') {
      const normalized = String(input || '').trim().replace(/\//g, ' ');
      if (!normalized) return null;
      const parsed = new Date(normalized);
      if (Number.isNaN(parsed.getTime())) return null;
      return {
        year: parsed.getFullYear(),
        month: parsed.getMonth() + 1,
        day: parsed.getDate()
      };
    }

    function getSiteClockStateSnapshot() {
      return {
        zone: sanitizeClockZone(siteClockState.zone),
        overrideTimestampMs: Number.isFinite(siteClockState.overrideTimestampMs) ? siteClockState.overrideTimestampMs : null,
        overrideStartedRealMs: Number.isFinite(siteClockState.overrideStartedRealMs) ? siteClockState.overrideStartedRealMs : null
      };
    }

    function syncSiteClockState() {
      const state = getSiteClockStateSnapshot();
      window.__siteClockState = { ...state };
      return state;
    }

    function setSiteClockStateFromPage(nextState = {}) {
      const current = getSiteClockStateSnapshot();
      siteClockState = {
        zone: sanitizeClockZone(nextState.zone !== undefined ? nextState.zone : current.zone),
        overrideTimestampMs: nextState.overrideTimestampMs === null
          ? null
          : (Number.isFinite(nextState.overrideTimestampMs) ? Number(nextState.overrideTimestampMs) : current.overrideTimestampMs),
        overrideStartedRealMs: nextState.overrideStartedRealMs === null
          ? null
          : (Number.isFinite(nextState.overrideStartedRealMs) ? Number(nextState.overrideStartedRealMs) : current.overrideStartedRealMs)
      };
      return syncSiteClockState();
    }

    function getSiteNow() {
      const state = getSiteClockStateSnapshot();
      if (state.overrideTimestampMs !== null && state.overrideStartedRealMs !== null) {
        return new Date(state.overrideTimestampMs + (Date.now() - state.overrideStartedRealMs));
      }
      return new Date();
    }

    function getSiteNowParts(zone = sanitizeClockZone(siteClockState.zone)) {
      return getTimeZoneParts(getSiteNow(), zone);
    }

    function setSiteTimeFromInput(input = '', zone = sanitizeClockZone(siteClockState.zone)) {
      const parsed = parseClockTimeInput(input);
      if (!parsed) return null;
      const currentParts = getSiteNowParts(zone);
      const timestamp = zonedDateTimeToUtc({
        year: currentParts.year,
        month: currentParts.month,
        day: currentParts.day,
        hour: parsed.hour,
        minute: parsed.minute,
        second: parsed.second
      }, zone);
      return setSiteClockStateFromPage({
        zone,
        overrideTimestampMs: timestamp,
        overrideStartedRealMs: Date.now()
      });
    }

    function setSiteDateFromInput(input = '', zone = sanitizeClockZone(siteClockState.zone)) {
      const parsed = parseClockDateInput(input);
      if (!parsed) return null;
      const currentParts = getSiteNowParts(zone);
      const timestamp = zonedDateTimeToUtc({
        year: parsed.year,
        month: parsed.month,
        day: parsed.day,
        hour: currentParts.hour,
        minute: currentParts.minute,
        second: currentParts.second
      }, zone);
      return setSiteClockStateFromPage({
        zone,
        overrideTimestampMs: timestamp,
        overrideStartedRealMs: Date.now()
      });
    }

    window.getSiteNow = getSiteNow;
    window.getSiteClockState = getSiteClockStateSnapshot;
    window.setSiteClockState = setSiteClockStateFromPage;

    function getOverlayClockStateSnapshot() {
      return {
        mode: overlayClockState.mode === 'date' ? 'date' : 'time',
        zone: sanitizeClockZone(overlayClockState.zone),
        manualTime: typeof overlayClockState.manualTime === 'string' ? overlayClockState.manualTime : '',
        manualDate: typeof overlayClockState.manualDate === 'string' ? overlayClockState.manualDate : ''
      };
    }

    function syncOverlayClockState() {
      const clockState = getOverlayClockStateSnapshot();
      if (typeof window.setOverlayClockState === 'function') {
        try {
          window.setOverlayClockState(clockState);
        } catch (error) {
          console.warn('Unable to sync overlay clock state', error);
        }
      } else {
        window.__overlayClockState = clockState;
      }
    }

    function setOverlayClockStateFromPage(nextState = {}) {
      overlayClockState = {
        ...getOverlayClockStateSnapshot(),
        ...(nextState && typeof nextState === 'object' ? nextState : {})
      };
      overlayClockState.mode = overlayClockState.mode === 'date' ? 'date' : 'time';
      overlayClockState.zone = sanitizeClockZone(overlayClockState.zone);
      overlayClockState.manualTime = typeof overlayClockState.manualTime === 'string' ? overlayClockState.manualTime.trim() : '';
      overlayClockState.manualDate = typeof overlayClockState.manualDate === 'string' ? overlayClockState.manualDate.trim() : '';
      setSiteClockStateFromPage({ zone: overlayClockState.zone });
      syncOverlayClockState();
      return getOverlayClockStateSnapshot();
    }

    async function loadOverlay() {
      try {
        const response = await fetch('/dead/pages/overlay.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load /dead/pages/overlay.html');
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fragment = document.createDocumentFragment();
        const scripts = [];
        Array.from(temp.childNodes).forEach((node) => {
          if (node.nodeName.toLowerCase() === 'script') scripts.push(node);
          else fragment.appendChild(node.cloneNode(true));
        });
        overlayContainer.innerHTML = '';
        overlayContainer.appendChild(fragment);
        scripts.forEach((oldScript) => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach((attr) => newScript.setAttribute(attr.name, attr.value));
          newScript.textContent = oldScript.textContent;
          overlayContainer.appendChild(newScript);
        });
        requestAnimationFrame(() => {
          syncOverlayLayoutHeight();
          requestAnimationFrame(syncOverlayLayoutHeight);
        });
        applyPageCustomizeState();
        syncOverlayClockState();
      } catch (error) {
        console.error(error);
        overlayContainer.innerHTML = '<div class="overlay-error">Error loading /dead/pages/overlay.html</div>';
      }
    }

    function syncOverlayLayoutHeight() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root');
      const overlayHeight = overlayRoot ? Math.ceil(overlayRoot.getBoundingClientRect().height) : 76;
      document.body.style.setProperty('--overlay-height', `${Math.max(overlayHeight, 1)}px`);
    }

    window.addEventListener('resize', () => {
      syncOverlayLayoutHeight();
    });

    function updateChatFramePresentation() {
      chatSandboxFrame.classList.toggle('visible', !!chatSandboxVisible);
      chatSandboxFrame.classList.toggle('dvd-active', !chatSandboxVisible && !!chatSandboxDvdActive);
    }

    function setChatFrameVisible(visible) {
      chatSandboxVisible = !!visible;
      updateChatFramePresentation();
    }

    function setChatSandboxDvdActive(active) {
      chatSandboxDvdActive = !!active;
      updateChatFramePresentation();
    }

    function postToChatSandbox(message) {
      const chatWindow = getChatWindow();
      if (!chatWindow) return false;
      chatWindow.postMessage(message, '*');
      return true;
    }


    async function loadHtml2CanvasInto(doc, win) {
      if (!doc || !win) {
        throw new Error('Screenshot target is not ready.');
      }
      if (typeof win.html2canvas === 'function') {
        return win.html2canvas;
      }
      const existing = doc.querySelector('script[data-html2canvas-loader="true"]');
      if (existing) {
        await new Promise((resolve, reject) => {
          if (typeof win.html2canvas === 'function') {
            resolve();
            return;
          }
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('Unable to load screenshot renderer.')), { once: true });
        });
        if (typeof win.html2canvas === 'function') {
          return win.html2canvas;
        }
      }
      await new Promise((resolve, reject) => {
        const script = doc.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        script.async = true;
        script.dataset.html2canvasLoader = 'true';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('Unable to load screenshot renderer.'));
        (doc.head || doc.documentElement || doc.body).appendChild(script);
      });
      if (typeof win.html2canvas !== 'function') {
        throw new Error('Screenshot renderer did not initialize.');
      }
      return win.html2canvas;
    }

    function waitForImagesInDocument(doc) {
      if (!doc) return Promise.resolve();
      const images = Array.from(doc.images || []);
      return Promise.all(images.map((img) => {
        if (img.complete && img.naturalWidth > 0) {
          return Promise.resolve();
        }
        return new Promise((resolve) => {
          const done = () => resolve();
          img.addEventListener('load', done, { once: true });
          img.addEventListener('error', done, { once: true });
        });
      }));
    }

    async function renderOverlayCanvas() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root') || overlayContainer;
      const overlayRect = overlayContainer.getBoundingClientRect();
      if (!overlayRoot || overlayRect.width <= 0 || overlayRect.height <= 0) {
        throw new Error('Overlay is not ready yet.');
      }
      const html2canvas = await loadHtml2CanvasInto(document, window);
      await waitForImagesInDocument(document);
      const canvas = await html2canvas(overlayRoot, {
        backgroundColor: null,
        useCORS: true,
        allowTaint: true,
        logging: false,
        scale: 1,
        width: Math.round(overlayRect.width),
        height: Math.round(overlayRect.height),
        scrollX: 0,
        scrollY: 0,
        windowWidth: document.documentElement.clientWidth,
        windowHeight: document.documentElement.clientHeight,
      });
      return { canvas, rect: overlayRect };
    }

    async function renderTektiteCanvas() {
      const tektiteDoc = tektiteFrame.contentDocument || (tektiteFrame.contentWindow && tektiteFrame.contentWindow.document);
      const tektiteWindow = tektiteFrame.contentWindow;
      const frameRect = tektiteFrame.getBoundingClientRect();
      if (!tektiteDoc || !tektiteWindow || !tektiteDoc.documentElement) {
        throw new Error('The tektite frame is not ready yet.');
      }
      if (frameRect.width <= 0 || frameRect.height <= 0) {
        throw new Error('The tektite frame has no visible size.');
      }
      const html2canvas = await loadHtml2CanvasInto(tektiteDoc, tektiteWindow);
      await waitForImagesInDocument(tektiteDoc);
      const rawFrameWidth = Math.max(1, tektiteFrame.clientWidth || Math.round(frameRect.width));
      const rawFrameHeight = Math.max(1, tektiteFrame.clientHeight || Math.round(frameRect.height));
      const canvas = await html2canvas(tektiteDoc.documentElement, {
        backgroundColor: tektiteWindow.getComputedStyle(tektiteDoc.body).backgroundColor || null,
        useCORS: true,
        allowTaint: true,
        logging: false,
        scale: 1,
        x: Math.max(0, Math.round(tektiteWindow.scrollX || 0)),
        y: Math.max(0, Math.round(tektiteWindow.scrollY || 0)),
        width: rawFrameWidth,
        height: rawFrameHeight,
        scrollX: 0,
        scrollY: 0,
        windowWidth: Math.max(rawFrameWidth, tektiteDoc.documentElement.scrollWidth || rawFrameWidth),
        windowHeight: Math.max(rawFrameHeight, tektiteDoc.documentElement.scrollHeight || rawFrameHeight),
      });
      return { canvas, rect: frameRect };
    }

    function sleep(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function canvasToBlob(canvas, type = 'image/png', quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error(`Unable to encode ${type} blob.`));
        }, type, quality);
      });
    }

    function downloadBlob(blob, filename) {
      const blobUrl = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = blobUrl;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      return blobUrl;
    }


    async function renderSiteCompositeCanvas() {
      const [{ canvas: overlayCanvas, rect: overlayRect }, { canvas: tektiteCanvas, rect: frameRect }] = await Promise.all([
        renderOverlayCanvas(),
        renderTektiteCanvas()
      ]);

      const width = Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || 1));
      const height = Math.max(1, Math.round(window.innerHeight || document.documentElement.clientHeight || 1));
      const outputCanvas = document.createElement('canvas');
      outputCanvas.width = width;
      outputCanvas.height = height;
      const context = outputCanvas.getContext('2d');
      if (!context) {
        throw new Error('Unable to create screenshot canvas.');
      }

      const rootFilter = (window.getComputedStyle(document.documentElement).filter || 'none').trim();
      context.fillStyle = window.getComputedStyle(document.body).backgroundColor || '#000';
      context.fillRect(0, 0, width, height);
      context.filter = rootFilter && rootFilter !== 'none' ? rootFilter : 'none';
      context.drawImage(
        tektiteCanvas,
        0, 0, tektiteCanvas.width, tektiteCanvas.height,
        Math.round(frameRect.left), Math.round(frameRect.top), Math.round(frameRect.width), Math.round(frameRect.height)
      );
      context.drawImage(
        overlayCanvas,
        0, 0, overlayCanvas.width, overlayCanvas.height,
        Math.round(overlayRect.left), Math.round(overlayRect.top), Math.round(overlayRect.width), Math.round(overlayRect.height)
      );
      context.filter = 'none';
      return outputCanvas;
    }

    const zipCrc32Table = (() => {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n += 1) {
        let c = n;
        for (let k = 0; k < 8; k += 1) {
          c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        }
        table[n] = c >>> 0;
      }
      return table;
    })();

    function getUtf8Bytes(text) {
      return new TextEncoder().encode(String(text));
    }

    function crc32ForBytes(bytes) {
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < bytes.length; i += 1) {
        crc = zipCrc32Table[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    function uint16Bytes(value) {
      const safe = value & 0xFFFF;
      return Uint8Array.from([safe & 0xFF, (safe >>> 8) & 0xFF]);
    }

    function uint32Bytes(value) {
      const safe = value >>> 0;
      return Uint8Array.from([
        safe & 0xFF,
        (safe >>> 8) & 0xFF,
        (safe >>> 16) & 0xFF,
        (safe >>> 24) & 0xFF
      ]);
    }

    function createStoredZipBlob(entries) {
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      entries.forEach((entry) => {
        const nameBytes = getUtf8Bytes(entry.name);
        const size = (entry.size >>> 0);
        const crc = (entry.crc >>> 0);
        const dataPart = entry.blob || entry.bytes || new Uint8Array();

        const localHeader = new Uint8Array([
          ...uint32Bytes(0x04034b50),
          ...uint16Bytes(20),
          ...uint16Bytes(0x0800),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint32Bytes(crc),
          ...uint32Bytes(size),
          ...uint32Bytes(size),
          ...uint16Bytes(nameBytes.length),
          ...uint16Bytes(0)
        ]);
        localParts.push(localHeader, nameBytes, dataPart);

        const centralHeader = new Uint8Array([
          ...uint32Bytes(0x02014b50),
          ...uint16Bytes(20),
          ...uint16Bytes(20),
          ...uint16Bytes(0x0800),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint32Bytes(crc),
          ...uint32Bytes(size),
          ...uint32Bytes(size),
          ...uint16Bytes(nameBytes.length),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint16Bytes(0),
          ...uint32Bytes(0),
          ...uint32Bytes(offset)
        ]);
        centralParts.push(centralHeader, nameBytes);

        offset += localHeader.length + nameBytes.length + size;
      });

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const centralOffset = offset;
      const endRecord = new Uint8Array([
        ...uint32Bytes(0x06054b50),
        ...uint16Bytes(0),
        ...uint16Bytes(0),
        ...uint16Bytes(entries.length),
        ...uint16Bytes(entries.length),
        ...uint32Bytes(centralSize),
        ...uint32Bytes(centralOffset),
        ...uint16Bytes(0)
      ]);

      return new Blob([...localParts, ...centralParts, endRecord], { type: 'application/zip' });
    }

    async function readBlobAsUint8Array(blob) {
      if (blob && typeof blob.arrayBuffer === 'function') {
        return new Uint8Array(await blob.arrayBuffer());
      }
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(new Uint8Array(reader.result));
        reader.onerror = () => reject(new Error('Unable to read blob bytes.'));
        reader.readAsArrayBuffer(blob);
      });
    }

    async function createZipEntryFromBlob(name, blob) {
      const bytes = await readBlobAsUint8Array(blob);
      return {
        name,
        blob,
        size: blob.size >>> 0,
        crc: crc32ForBytes(bytes)
      };
    }


    async function captureSiteScreenshot() {
      const previousVisibility = chatSandboxFrame.style.visibility;
      const previousPointerEvents = chatSandboxFrame.style.pointerEvents;
      const previousOpacity = chatSandboxFrame.style.opacity;
      const previousDisplay = chatSandboxFrame.style.display;

      chatSandboxFrame.style.visibility = 'hidden';
      chatSandboxFrame.style.pointerEvents = 'none';
      chatSandboxFrame.style.opacity = '0';
      chatSandboxFrame.style.display = 'none';

      try {
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const [{ canvas: overlayCanvas, rect: overlayRect }, { canvas: tektiteCanvas, rect: frameRect }] = await Promise.all([
          renderOverlayCanvas(),
          renderTektiteCanvas()
        ]);

        const width = Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || 1));
        const height = Math.max(1, Math.round(window.innerHeight || document.documentElement.clientHeight || 1));
        const outputCanvas = document.createElement('canvas');
        outputCanvas.width = width;
        outputCanvas.height = height;
        const context = outputCanvas.getContext('2d');
        if (!context) {
          throw new Error('Unable to create screenshot canvas.');
        }

        context.fillStyle = window.getComputedStyle(document.body).backgroundColor || '#000';
        context.fillRect(0, 0, width, height);
        context.drawImage(tektiteCanvas, 0, 0, tektiteCanvas.width, tektiteCanvas.height, Math.round(frameRect.left), Math.round(frameRect.top), Math.round(frameRect.width), Math.round(frameRect.height));
        context.drawImage(overlayCanvas, 0, 0, overlayCanvas.width, overlayCanvas.height, Math.round(overlayRect.left), Math.round(overlayRect.top), Math.round(overlayRect.width), Math.round(overlayRect.height));

        const pngBlob = await new Promise((resolve, reject) => {
          outputCanvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('Unable to encode screenshot PNG.'));
          }, 'image/png');
        });
        const filename = `site-screenshot-${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
        downloadBlob(pngBlob, filename);
        postToChatSandbox({ type: 'pageScreenshotStatus', ok: true });
      } catch (error) {
        console.error(error);
        postToChatSandbox({ type: 'pageScreenshotStatus', ok: false, message: 'Unable to save page screenshot' });
      } finally {
        chatSandboxFrame.style.visibility = previousVisibility;
        chatSandboxFrame.style.pointerEvents = previousPointerEvents;
        chatSandboxFrame.style.opacity = previousOpacity;
        chatSandboxFrame.style.display = previousDisplay;
      }
    }


    async function captureSiteAnimationFrames(options = {}) {
      if (pageScreenshotAnimationActive) {
        postToChatSandbox({ type: 'pageScreenshotAnimationStatus', ok: false, message: 'Animation capture already running' });
        return;
      }

      const frameCount = Math.max(1, Math.min(60, Number(options.frameCount) || 15));
      const frameDelay = Math.max(50, Number(options.frameDelay) || 2000);
      pageScreenshotAnimationActive = true;

      const previousVisibility = chatSandboxFrame.style.visibility;
      const previousPointerEvents = chatSandboxFrame.style.pointerEvents;
      const previousOpacity = chatSandboxFrame.style.opacity;
      const previousDisplay = chatSandboxFrame.style.display;

      chatSandboxFrame.style.visibility = 'hidden';
      chatSandboxFrame.style.pointerEvents = 'none';
      chatSandboxFrame.style.opacity = '0';
      chatSandboxFrame.style.display = 'none';

      try {
        const entries = [];
        for (let frameIndex = 0; frameIndex < frameCount; frameIndex += 1) {
          await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
          const outputCanvas = await renderSiteCompositeCanvas();
          const pngBlob = await canvasToBlob(outputCanvas, 'image/png');
          const frameNumber = String(frameIndex + 1).padStart(2, '0');
          entries.push(await createZipEntryFromBlob(`screenshot-animation/frame-${frameNumber}.png`, pngBlob));
          if (frameIndex < frameCount - 1) {
            await sleep(frameDelay);
          }
        }
        const metadata = {
          createdAt: new Date().toISOString(),
          frameCount,
          frameDelayMs: frameDelay,
          source: '/dead/pages/overlay.html + /dead/pages/feeds/feeds.html composite'
        };
        const manifestBlob = new Blob([JSON.stringify(metadata, null, 2)], { type: 'application/json' });
        entries.push(await createZipEntryFromBlob('screenshot-animation/manifest.json', manifestBlob));

        const zipBlob = createStoredZipBlob(entries);
        const filename = `site-screenshot-animation-${new Date().toISOString().replace(/[:.]/g, '-')}.zip`;
        downloadBlob(zipBlob, filename);
        postToChatSandbox({ type: 'pageScreenshotAnimationStatus', ok: true });
      } catch (error) {
        console.error(error);
        postToChatSandbox({ type: 'pageScreenshotAnimationStatus', ok: false, message: `Unable to save page animation frames${error && error.message ? `: ${error.message}` : ''}` });
      } finally {
        pageScreenshotAnimationActive = false;
        chatSandboxFrame.style.visibility = previousVisibility;
        chatSandboxFrame.style.pointerEvents = previousPointerEvents;
        chatSandboxFrame.style.opacity = previousOpacity;
        chatSandboxFrame.style.display = previousDisplay;
      }
    }

    function getAbsoluteRectFromNode(node, frameRect = null) {
      if (!node || typeof node.getBoundingClientRect !== 'function') return null;
      const rect = node.getBoundingClientRect();
      if (!rect || rect.width <= 0 || rect.height <= 0) return null;
      return frameRect
        ? { left: frameRect.left + rect.left, top: frameRect.top + rect.top, width: rect.width, height: rect.height }
        : { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
    }

    function getColorElementHotspots() {
      const spots = [];
      const overlayRoot = overlayContainer.querySelector('#overlay-root') || overlayContainer;
      const overlayTopBar = overlayRoot ? overlayRoot.querySelector('.topbar') : null;
      const overlayLogo = overlayRoot ? overlayRoot.querySelector('#dead-logo') : null;
      const overlayClock = overlayRoot ? overlayRoot.querySelector('#native-clock') : null;
      const overlaySidebar = overlayRoot ? overlayRoot.querySelector('#sidebar') : null;
      const overlaySidebarVisible = !!(overlaySidebar && overlaySidebar.getAttribute('aria-hidden') === 'false');

      const overlayTopBarRect = getAbsoluteRectFromNode(overlayTopBar);
      if (overlayTopBarRect) spots.push({ key: 'overlayTopBarBg', label: pageCustomizeDefaults.colors.overlayTopBarBg.label, rect: overlayTopBarRect });
      const overlayLogoRect = getAbsoluteRectFromNode(overlayLogo);
      if (overlayLogoRect) spots.push({ key: 'overlayLogoTint', label: pageCustomizeDefaults.colors.overlayLogoTint.label, rect: overlayLogoRect });
      const overlayClockRect = getAbsoluteRectFromNode(overlayClock);
      if (overlayClockRect) spots.push({ key: 'overlayClockTint', label: pageCustomizeDefaults.colors.overlayClockTint.label, rect: overlayClockRect });
      const sidebarRect = overlaySidebarVisible ? getAbsoluteRectFromNode(overlaySidebar) : null;
      if (sidebarRect) {
        spots.push({ key: 'sidebarBg', label: pageCustomizeDefaults.colors.sidebarBg.label, rect: sidebarRect });
      } else if (overlayTopBarRect) {
        spots.push({ key: 'sidebarBg', label: pageCustomizeDefaults.colors.sidebarBg.label, rect: { left: overlayTopBarRect.left + 10, top: overlayTopBarRect.top + overlayTopBarRect.height + 10, width: 160, height: 42 } });
      }

      const frameRect = tektiteFrame.getBoundingClientRect();
      if (frameRect && frameRect.width > 0 && frameRect.height > 0) {
        spots.push({ key: 'pageBg', label: pageCustomizeDefaults.colors.pageBg.label, rect: { left: frameRect.left + 8, top: frameRect.top + 8, width: Math.max(120, frameRect.width - 16), height: Math.max(80, frameRect.height - 16) } });
      }

      try {
        const tektiteDoc = tektiteFrame.contentDocument || (tektiteFrame.contentWindow && tektiteFrame.contentWindow.document);
        if (tektiteDoc) {
          const channelHeader = tektiteDoc.querySelector('.channelHeader');
          const channelTitle = tektiteDoc.querySelector('.channelTitle');
          const channelLogo = tektiteDoc.querySelector('.channelLogo');
          const searchInput = tektiteDoc.querySelector('#videoSearch');
          const accentTarget = tektiteDoc.querySelector('#listBtn') || tektiteDoc.querySelector('#gridBtn') || tektiteDoc.querySelector('#loadMore');
          const firstThumb = tektiteDoc.querySelector('.thumb-grid, .thumb-list');

          const headerRect = getAbsoluteRectFromNode(channelHeader, frameRect);
          if (headerRect) spots.push({ key: 'headerBg', label: pageCustomizeDefaults.colors.headerBg.label, rect: headerRect });
          const textRect = getAbsoluteRectFromNode(channelTitle, frameRect);
          if (textRect) spots.push({ key: 'pageText', label: pageCustomizeDefaults.colors.pageText.label, rect: textRect });
          const tektiteLogoRect = getAbsoluteRectFromNode(channelLogo, frameRect);
          if (tektiteLogoRect) spots.push({ key: 'tektiteLogoTint', label: pageCustomizeDefaults.colors.tektiteLogoTint.label, rect: tektiteLogoRect });
          const panelRect = getAbsoluteRectFromNode(searchInput, frameRect);
          if (panelRect) spots.push({ key: 'panelBg', label: pageCustomizeDefaults.colors.panelBg.label, rect: panelRect });
          const accentRect = getAbsoluteRectFromNode(accentTarget, frameRect);
          if (accentRect) spots.push({ key: 'accent', label: pageCustomizeDefaults.colors.accent.label, rect: accentRect });
          const thumbRect = getAbsoluteRectFromNode(firstThumb, frameRect);
          if (thumbRect) spots.push({ key: 'thumbnailTint', label: pageCustomizeDefaults.colors.thumbnailTint.label, rect: thumbRect });
        }
      } catch (error) {

    function attachManagedTektiteLogoHover(doc, logoUrls) {
      if (!doc) return;
      const sequence = Array.isArray(logoUrls) ? logoUrls.filter((url) => typeof url === 'string' && url.trim()) : [];
      if (sequence.length < 2) return;

      doc.querySelectorAll('.channelLogo').forEach((img) => {
        if (!(img instanceof Element)) return;

        const stopHoverCycle = () => {
          if (img.__managedHoverIntervalId) {
            window.clearInterval(img.__managedHoverIntervalId);
            img.__managedHoverIntervalId = null;
          }
          img.__managedHoverIndex = 0;
          img.src = sequence[0];
          setTektiteLogoTintMask(doc, sequence[0]);
        };

        const startHoverCycle = () => {
          if (img.__managedHoverIntervalId || sequence.length < 2) return;
          img.__managedHoverIndex = 1;
          img.src = sequence[img.__managedHoverIndex];
          setTektiteLogoTintMask(doc, sequence[img.__managedHoverIndex]);
          img.__managedHoverIntervalId = window.setInterval(() => {
            img.__managedHoverIndex = (img.__managedHoverIndex + 1) % sequence.length;
            img.src = sequence[img.__managedHoverIndex];
            setTektiteLogoTintMask(doc, sequence[img.__managedHoverIndex]);
          }, tektiteLogoHoverIntervalMs);
        };

        if (img.__managedHoverIntervalId) {
          window.clearInterval(img.__managedHoverIntervalId);
        }
        if (img.__managedHoverLeaveHandler) {
          img.removeEventListener('mouseleave', img.__managedHoverLeaveHandler);
        }
        if (img.__managedHoverEnterHandler) {
          img.removeEventListener('mouseenter', img.__managedHoverEnterHandler);
        }

        img.__managedHoverSequence = sequence.slice();
        img.__managedHoverIndex = 0;
        img.__managedHoverEnterHandler = startHoverCycle;
        img.__managedHoverLeaveHandler = stopHoverCycle;
        img.addEventListener('mouseenter', startHoverCycle);
        img.addEventListener('mouseleave', stopHoverCycle);

    function getPageGlobalHueShiftAngle(now = performance.now()) {

    function renderPageGlobalColorEffects() {

    function stopPageGlobalHueShiftLoop() {

    function runPageGlobalHueShiftLoop() {
      renderPageGlobalColorEffects();

        stopPageGlobalHueShiftLoop();

        if (!shouldEnable) {
          pageGlobalHueShiftFrozenAngle = null;

        renderPageGlobalColorEffects();
        return pageGlobalHueShiftEnabled;

      pageGlobalHueShiftEnabled = shouldEnable;
      if (pageGlobalHueShiftEnabled) {
        const startingAngle = pageGlobalHueShiftFrozenAngle;
        pageGlobalHueShiftFrozenAngle = null;
        pageGlobalHueShiftStartTime = performance.now() - (((startingAngle ?? 0) / 360) * pageGlobalHueShiftDurationMs);
        stopPageGlobalHueShiftLoop();
        runPageGlobalHueShiftLoop();
      } else {
        pageGlobalHueShiftFrozenAngle = null;
        stopPageGlobalHueShiftLoop();

      const bg = overlay.querySelector('.page-exit-overlay-bg');
      const state = {
        x: 48,
        y: 48,
        vx: 8.2,
        vy: 6.9,
        mouseX: window.innerWidth * 0.5,
        mouseY: window.innerHeight * 0.5,
        mouseActive: false
      };

      function stopLoop() {
        if (overlay._exitAnimationFrame) {
          cancelAnimationFrame(overlay._exitAnimationFrame);
          overlay._exitAnimationFrame = null;
        }
        if (overlay._exitPointerMove) {
          overlay.removeEventListener('pointermove', overlay._exitPointerMove);
        }
        if (overlay._exitPointerLeave) {
          overlay.removeEventListener('pointerleave', overlay._exitPointerLeave);
        }
      }

      stopLoop();

      const handlePointerMove = (event) => {
        state.mouseX = event.clientX;
        state.mouseY = event.clientY;
        state.mouseActive = true;
      };
      const handlePointerLeave = () => {
        state.mouseActive = false;
      };

      overlay._exitPointerMove = handlePointerMove;
      overlay._exitPointerLeave = handlePointerLeave;
      overlay.addEventListener('pointermove', handlePointerMove);
      overlay.addEventListener('pointerleave', handlePointerLeave);

      function animate() {
        const overlayWidth = overlay.clientWidth || window.innerWidth;
        const overlayHeight = overlay.clientHeight || window.innerHeight;
        const measuredWidth = inner.offsetWidth || 520;
        const measuredHeight = inner.offsetHeight || 520;
        const maxX = Math.max(24, overlayWidth - measuredWidth - 24);
        const maxY = Math.max(24, overlayHeight - measuredHeight - 24);

        const centerX = state.x + measuredWidth * 0.5;
        const centerY = state.y + measuredHeight * 0.5;

        if (state.mouseActive) {
          const dx = centerX - state.mouseX;
          const dy = centerY - state.mouseY;
          const distance = Math.hypot(dx, dy) || 1;
          const panicRadius = Math.max(180, Math.min(overlayWidth, overlayHeight) * 0.24);
          if (distance < panicRadius) {
            const force = ((panicRadius - distance) / panicRadius) * 5.2;
            state.vx += (dx / distance) * force;
            state.vy += (dy / distance) * force;
          }
        }

        state.vx = Math.max(-18, Math.min(18, state.vx * 0.996));
        state.vy = Math.max(-18, Math.min(18, state.vy * 0.996));
        state.x += state.vx;
        state.y += state.vy;

        if (state.x <= 24) {
          state.x = 24;
          state.vx = Math.abs(state.vx);
        } else if (state.x >= maxX) {
          state.x = maxX;
          state.vx = -Math.abs(state.vx);
        }

        if (state.y <= 24) {
          state.y = 24;
          state.vy = Math.abs(state.vy);
        } else if (state.y >= maxY) {
          state.y = maxY;
          state.vy = -Math.abs(state.vy);
        }

        const time = performance.now() * 0.0065;

        const rippleY = Math.cos(time * 1.17 + state.x * 0.012) * 8;
        inner.style.transform = `translate3d(${Math.round(state.x + rippleX)}px, ${Math.round(state.y + rippleY)}px, 0) skewX(${Math.sin(time * 0.7) * 1.9}deg) skewY(${Math.cos(time * 0.85) * 1.3}deg)`;

          bg.style.transform = `translate3d(${Math.sin(time * 0.37) * 28}px, ${Math.cos(time * 0.31) * 24}px, 0) scale(${1.08 + Math.sin(time * 0.9) * 0.05})`;
          bg.style.filter = `blur(28px) saturate(170%) hue-rotate(${Math.sin(time * 0.55) * 32}deg)`;
        }

        overlay._exitAnimationFrame = requestAnimationFrame(animate);
      }

      overlay.style.display = 'block';
      document.documentElement.style.background = '#000';
      document.body.style.background = '#000';
      document.body.classList.add('page-exited');
      overlay._exitAnimationFrame = requestAnimationFrame(animate);

              mode: 'time',
              manualTime: '',
              manualDate: ''
            });
            postToChatSandbox({
              type: 'pageChatResult',
              command: '/clock_time',
              message: `/clock_time executed: ${commandValue}`,
              announce: true
            });
            return;
          }

          if (commandName === '/clock_date') {
            if (!commandValue) {
              postToChatSandbox({
                type: 'pageChatResult',
                command: '/clock_date',
                message: 'Usage: /clock_date [date]',
                announce: true
              });
              return;
            }
            const nextSiteClock = setSiteDateFromInput(commandValue, sanitizeClockZone(overlayClockState.zone));
            if (!nextSiteClock) {
              postToChatSandbox({
                type: 'pageChatResult',
                command: '/clock_date',
                message: 'Invalid date. Try YYYY-MM-DD or a readable month/day/year.',
                announce: true
              });
              return;
            }
            setOverlayClockStateFromPage({
              mode: 'date',
              manualTime: '',
              manualDate: ''
            });
            postToChatSandbox({
              type: 'pageChatResult',
              command: '/clock_date',
              message: `/clock_date executed: ${commandValue}`,
              announce: true
            });
            return;
          }

          if (commandName === '/color_element') {
            const enabled = toggleColorElementMode();
            closeChatFromParent();
            postToChatSandbox({
              type: 'pageChatResult',
              command: '/color_element',
              message: enabled ? '/color_element click mode enabled' : '/color_element click mode disabled',
              announce: false
            });
            return;
          }

          if (commandName === '/clock_reset') {
            setSiteClockStateFromPage({
              zone: defaultClockZone,
              overrideTimestampMs: null,
              overrideStartedRealMs: null
            });
            setOverlayClockStateFromPage({
              mode: 'time',
              zone: defaultClockZone,
              manualTime: '',
              manualDate: ''
            });
            postToChatSandbox({
              type: 'pageChatResult',
              command: '/clock_reset',
              message: '/clock_reset executed: synced to America/Toronto',
              announce: true
            });
            return;
          }

          if (commandName === '/clock_zone') {
            const nextZone = sanitizeClockZone(commandValue);
            if (!commandValue) {
              postToChatSandbox({
                type: 'pageChatResult',
                command: '/clock_zone',
                message: 'Usage: /clock_zone [timezone]',
                announce: true
              });
              return;
            }
            if (nextZone !== commandValue.trim()) {
              postToChatSandbox({
                type: 'pageChatResult',
                command: '/clock_zone',
                message: `Unknown timezone: ${commandValue}`,
                announce: true
              });
              return;
            }
            setSiteClockStateFromPage({ zone: nextZone });
            setOverlayClockStateFromPage({
              zone: nextZone,
              manualTime: '',
              manualDate: ''
            });
            postToChatSandbox({
              type: 'pageChatResult',
              command: '/clock_zone',
              message: `/clock_zone executed: synced to ${nextZone}`,
              announce: true
            });
            return;
          }

          return;
        }

        if (event.data.type === 'pageCustomizeSet') {
          setPageColor(event.data.key, event.data.value || {});
          return;
        }

        if (event.data.type === 'pageCustomizeAction') {
          if (event.data.action === 'uploadOverlayLogo') {
            triggerCustomLogoUpload('overlay');
          } else if (event.data.action === 'uploadTektiteLogo') {
            triggerCustomLogoUpload('tektite');
          }
          return;
        }

        if (event.data.type === 'pageCustomizeReset') {
          stopPageAutoShuffle();
          Array.from(pageControlShuffleIntervals.values()).forEach((intervalId) => window.clearInterval(intervalId));
          pageControlShuffleIntervals.clear();
          pageCustomizeState = createDefaultPageCustomizeState();
          applyPageCustomizeState();
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeRandomize') {
          randomizePageCustomizeState();
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeRandomizeKey') {
          if (typeof event.data.key === 'string') {
            randomizePageCustomizeKey(event.data.key);
            applyPageCustomizeState();
            sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          }
          return;
        }

        if (event.data.type === 'pageCustomizeControlAutoShuffleToggle') {
          if (typeof event.data.key === 'string') {
            togglePageControlAutoShuffle(event.data.key);
            sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          }
          return;
        }

        if (event.data.type === 'pageCustomizeFontRandomize') {
          randomizePageFontFamily();
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeFontAutoShuffleToggle') {
          togglePageControlAutoShuffle('__pageFontFamily');
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeAutoShuffleToggle') {
          setPageAutoShuffleEnabled(pageAutoShuffleIntervalId === null);
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeSetRandomizeTintOpacities') {
          setRandomizeTintOpacitiesFull();
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageCustomizeAutoShuffleSet') {
          // ADDED: Lets /randomize in embedded chat keep page-color shuffling locked to the same toggle state.
          setPageAutoShuffleEnabled(!!event.data.enabled);
          sendPageCustomizePanel({ includeBaseCustomize: false, announce: false });
          return;
        }

        if (event.data.type === 'pageGlobalColorInvertToggle') {
          togglePageGlobalColorInvert();
          return;
        }

        if (event.data.type === 'pageGlobalColorInvertSet') {
          setPageGlobalColorInvert(!!event.data.enabled);
          return;
        }

        if (event.data.type === 'pageGlobalHueShiftToggle') {
          togglePageGlobalHueShift();
          return;
        }

        if (event.data.type === 'pageGlobalHueShiftSet') {
          setPageGlobalHueShift(!!event.data.enabled);
          return;
        }

        if (event.data.type === 'pageGlobalEffectsReset') {
          resetPageGlobalEffects();
          setPageAutoShuffleEnabled(false);
          pageCustomizeState = createDefaultPageCustomizeState();
          applyPageCustomizeState();
          return;
        }

        if (event.data.type === 'pageExit') {
          renderPageExitScreen();
          return;
        }

        if (event.data.type === 'pageRefresh') {
          window.location.reload();
          return;
        }

        if (event.data.type === 'pageScreenshotCapture') {
          captureSiteScreenshot();
          return;
        }

        if (event.data.type === 'pageScreenshotAnimationCapture') {
          captureSiteAnimationFrames({
            frameCount: event.data.frameCount,
            frameDelay: event.data.frameDelay
          });
          return;
        }

        if (event.data.type === 'pageCustomizeFontFamily') {
          if (typeof event.data.value === 'string' && event.data.value.trim()) {
            pageCustomizeState.fontFamily = event.data.value.trim();
            applyPageCustomizeState();
          }
          return;
        }

        if (event.data.type === 'pageCustomizeFontScale') {
          pageCustomizeState.fontScalePercent = clampScale(event.data.value);
          applyPageCustomizeState();
          return;
        }
      }

      if (event.data.type === 'openChatFromChild') {
        openChatFromParent({ focus: true, seedSlash: !!event.data.seedSlash });
        return;
      }
    });

    function shouldIgnoreChatShortcutFromEvent(event) {
      const view = event.view || window;
      const doc = view.document || document;
      const activeElement = doc.activeElement;
      const activeTag = activeElement && activeElement.tagName ? activeElement.tagName.toUpperCase() : '';
      return !!(activeElement && (
        activeTag === 'INPUT' ||
        activeTag === 'TEXTAREA' ||
        activeTag === 'SELECT' ||
        activeElement.isContentEditable
      ));
    }

    function handleChatShortcutKeydown(event) {
      if (pageScreenshotAnimationActive) {
        if (event.key === '/' || event.key === 'Escape') {
          event.preventDefault();
          event.stopPropagation();
        }
        return;
      }
      if (event.key === '/' && !event.ctrlKey && !event.metaKey && !event.altKey) {
        if (shouldIgnoreChatShortcutFromEvent(event)) return;
        event.preventDefault();
        event.stopPropagation();
        openChatFromParent({ focus: true, seedSlash: true });
        return;
      }

      if (event.key === 'Escape' && chatSandboxVisible) {
        event.preventDefault();
        event.stopPropagation();
        closeChatFromParent();
      }
    }

    function bindChatShortcutToFrame(frame) {
      try {
        const frameWindow = frame && frame.contentWindow;
        const frameDoc = frameWindow && frameWindow.document;
        if (!frameWindow || !frameDoc || frameWindow.__indexChatShortcutBound) return;
        frameWindow.addEventListener('keydown', handleChatShortcutKeydown, true);
        frameDoc.addEventListener('keydown', handleChatShortcutKeydown, true);
        frameWindow.__indexChatShortcutBound = true;
      } catch (error) {
        console.warn('Unable to bind chat shortcut to frame', error);
      }
    }


    overlayLogoUploadInput.addEventListener('change', (event) => {
      const files = Array.from(event.target.files || []);
      event.target.value = '';
      if (!files.length) return;
      replaceCustomLogo('overlay', files);
    });

    tektiteLogoUploadInput.addEventListener('change', (event) => {
      const files = Array.from(event.target.files || []);
      event.target.value = '';
      if (!files.length) return;
      replaceCustomLogo('tektite', files);
    });

    window.addEventListener('keydown', handleChatShortcutKeydown, true);
    window.addEventListener('resize', () => { if (colorElementModeEnabled) refreshColorElementHotspots(); });
    window.addEventListener('scroll', () => { if (colorElementModeEnabled) refreshColorElementHotspots(); }, true);

    chatSandboxFrame.addEventListener('load', () => {
      chatSandboxReady = true;
      flushPendingChatOpen();
      registerPageCommands();
      bindChatShortcutToFrame(chatSandboxFrame);
    });

    const initialRootPath = '/';

    function normalizeInitialRootVideoRoute() {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');
      if (!videoId) return;

      const canonicalPath = '/dead/videos/';
      if (window.location.pathname === canonicalPath) return;

      window.history.replaceState(
        { videoId },
        '',
        `${canonicalPath}?v=${encodeURIComponent(videoId)}`
      );
    }

    function updateRootVideoRoute(action, videoId) {
      const nextUrl = action === 'open' && videoId
        ? `/dead/videos/?v=${encodeURIComponent(videoId)}`
        : initialRootPath;
      window.history.replaceState({ videoId: videoId || null }, '', nextUrl);
    }

    function sendInitialRootVideoToFrame() {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');
      if (!videoId || !tektiteFrame.contentWindow) return;
      tektiteFrame.contentWindow.postMessage({ type: 'feedGridOpenVideo', videoId }, '*');
    }

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (event.source === tektiteFrame.contentWindow && data.type === 'feedGridVideoState') {
        updateRootVideoRoute(data.action, String(data.videoId || ''));
      }
    });

    normalizeInitialRootVideoRoute();

    tektiteFrame.addEventListener('load', () => {
      applyPageCustomizeState();
      bindChatShortcutToFrame(tektiteFrame);
      sendInitialRootVideoToFrame();
      if (colorElementModeEnabled) {
        window.setTimeout(refreshColorElementHotspots, 150);
      }
    });

    loadOverlay();
    ensureColorElementUi();
  </script>
  <script src="/dead/scripts/screenshot-shortcut.js"></script>
  <script src="/dead/scripts/hide-overlay.js"></script>
  <script src="/dead/scripts/time-easter-egg.js"></script>
  <script src="/dead/scripts/index-chat.js"></script>
</body>
</html>
