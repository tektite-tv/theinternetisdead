<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local Chat v0.1</title>
</head>
<body>

  <h2>Local Chat v0.1</h2>

  <!-- Chat log -->
  <div id="chatLog" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:auto;">
  </div>

  <!-- Input area -->
  <textarea id="userInput" rows="3" style="width:100%;" placeholder="Type a message..."></textarea>

  <!-- Send button -->
  <button id="sendBtn">Send</button>

  <script>
    // --- STATE ---
    // Load messages from localStorage or start empty
    let messages = JSON.parse(localStorage.getItem("chatMessages")) || [];

    const chatLog = document.getElementById("chatLog");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // --- RENDER FUNCTION ---
    function renderMessages() {
      chatLog.innerHTML = "";

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.textContent = `${msg.role}: ${msg.content}`;
        chatLog.appendChild(div);
      });

      // Scroll to bottom
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // --- SAVE FUNCTION ---
    function saveMessages() {
      localStorage.setItem("chatMessages", JSON.stringify(messages));
    }

    // --- SEND HANDLER ---
    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // Add user message
      messages.push({ role: "user", content: text });

      // Fake assistant response (placeholder for now)
      messages.push({ role: "assistant", content: "..." });

      saveMessages();
      renderMessages();

      userInput.value = "";
    }

    // --- EVENTS ---
    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // --- INIT ---
    renderMessages();
  </script>

</body>
</html>
