<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tektite Explorer</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111;
    font-family: "Courier New", monospace;
    overflow: hidden;
}
:root {
    --overlay-height: 60px;
    --modebar-height: 56px;
}
#app-shell {
    position: relative;
    width: 100%;
    height: 100dvh;
    min-height: 100svh;
    overflow: hidden;
    background: #000;
}
#overlay-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    width: 100%;
    min-height: 60px;
}
#content-shell {
    position: absolute;
    top: var(--overlay-height);
    left: 0;
    width: 100%;
    height: calc(100dvh - var(--overlay-height));
    overflow: hidden;
    background: #000;
}
#explorer-mode-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: var(--modebar-height);
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(102, 0, 204, 0.5);
    z-index: 10;
}
#explorer-mode-select {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 12px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    outline: none;
}
#app-view {
    position: absolute;
    top: var(--modebar-height);
    left: 0;
    width: 100%;
    height: calc(100% - var(--modebar-height));
    overflow: hidden;
    background: #000;
}
#nerd-stats {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 280px;
    background: black;
    color: lime;
    font-size: 12px;
    padding: 10px;
    border: 2px solid lime;
    display: none;
    z-index: 999999;
}
#app-view > * {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
<div id="app-shell">
    <div id="overlay-container"></div>
    <div id="content-shell">
        <div id="explorer-mode-bar">
            <select id="explorer-mode-select" aria-label="Select Explorer Mode">
                <option value="file-browser">File Browser</option>
                <option value="music-player">Music Player</option>
            </select>
        </div>
        <div id="app-view"></div>
    </div>
    <div id="nerd-stats"></div>
</div>

<script>
const APP_SOURCES = {
  "file-browser": {"body": "<div id=\"app-scale-shell\">\n  <section class=\"toolbar\">\n    <button id=\"openBtn\">OPEN FOLDER</button>\n    <button id=\"upBtn\" class=\"small\">↑</button>\n    <button id=\"refreshBtn\" class=\"small\">⟳</button>\n    <button id=\"gridBtn\" class=\"active\">GRID</button>\n    <button id=\"listBtn\">LIST</button>\n    <input id=\"searchInput\" type=\"text\" placeholder=\"Search files...\" />\n  </section>\n\n  <section class=\"pathbar\">\n    <div class=\"pathtext\" id=\"pathBox\">No folder opened yet.</div>\n    <div class=\"status\" id=\"statusText\">Ready.</div>\n  </section>\n\n  <main class=\"main\" id=\"fileview\">\n    <div class=\"empty\">Open a folder to begin. Revolutionary concept, I know.</div>\n  </main>\n\n  <div class=\"modal\" id=\"previewModal\">\n    <div class=\"modal-card\">\n      <div class=\"modal-head\">\n        <div class=\"modal-title\" id=\"modalTitle\">Preview</div>\n        <button id=\"closePreviewBtn\" class=\"small\">✕</button>\n      </div>\n      <div id=\"modalBody\"></div>\n    </div>\n  </div>\n\n  <input class=\"hidden-input\" id=\"fallbackPicker\" type=\"file\" webkitdirectory multiple />\n\n  \n  </div>", "styles": "\n    :root {\n      --bg: #120018;\n      --bg2: #1a0025;\n      --panel: #1b0027;\n      --line: #00ff00;\n      --text: #00ff00;\n      --text-dim: #8cff8c;\n      --text-soft: #58c758;\n      --shadow: 0 0 0 1px rgba(0,255,0,0.28), 0 0 18px rgba(0,255,0,0.08);\n      --font-main: \"Consolas\", \"Lucida Console\", \"Courier New\", monospace;\n    }\n\n    * { box-sizing: border-box; }\n\n    html, body {\n      margin: 0;\n      height: 100%;\n      background: linear-gradient(180deg, #1d002a 0px, #14001d 120px, #120018 100%);\n      color: var(--text);\n      font-family: var(--font-main);\n      overflow: hidden;\n    }\n\n    body {\n      margin: 0;\n      overflow: hidden;\n    }\n\n    #app-scale-shell {\n      width: 125%;\n      height: 125%;\n      transform: scale(0.8);\n      transform-origin: top left;\n      display: grid;\n      grid-template-rows: auto auto 1fr;\n    }\n\n    button, input {\n      font: inherit;\n    }\n\n    button, input[type=\"text\"] {\n      background: #000;\n      color: var(--text);\n      border: 2px solid var(--line);\n    }\n\n    button {\n      cursor: pointer;\n      padding: 10px 14px;\n      transition: background 0.15s ease, transform 0.08s ease;\n    }\n\n    button:hover { background: #0d0d0d; }\n    button:active { transform: translateY(1px); }\n    button.small { padding: 8px 12px; min-width: 44px; }\n    button.active { background: var(--line); color: #000; font-weight: bold; }\n\n    input[type=\"text\"] {\n      width: 100%;\n      padding: 10px 12px;\n      outline: none;\n    }\n\n    input[type=\"text\"]::placeholder { color: var(--text-soft); }\n\n    .toolbar {\n      display: grid;\n      grid-template-columns: auto auto auto auto auto 1fr;\n      gap: 12px;\n      align-items: center;\n      padding: 14px 18px;\n      background: rgba(26, 0, 38, 0.96);\n      border-bottom: 1px solid rgba(0,255,0,0.2);\n    }\n\n    .pathbar {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      min-width: 0;\n      padding: 10px 18px;\n      background: rgba(15, 0, 22, 0.92);\n      border-bottom: 1px solid rgba(0,255,0,0.15);\n      color: var(--text-dim);\n      font-size: 13px;\n    }\n\n    .pathtext {\n      min-width: 0;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .status {\n      white-space: nowrap;\n      color: var(--text-soft);\n    }\n\n    .main {\n      min-height: 0;\n      overflow: auto;\n      padding: 18px;\n    }\n\n    .empty {\n      padding: 28px;\n      color: var(--text-soft);\n      text-align: center;\n      border: 2px dashed rgba(0,255,0,0.25);\n      background: rgba(0,0,0,0.3);\n    }\n\n    .grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));\n      gap: 16px;\n    }\n\n    .file-card {\n      background: rgba(0,0,0,0.68);\n      border: 2px solid rgba(0,255,0,0.28);\n      box-shadow: var(--shadow);\n      min-height: 148px;\n      display: grid;\n      grid-template-rows: 104px auto auto;\n      overflow: hidden;\n      cursor: pointer;\n    }\n\n    .file-card:hover {\n      border-color: var(--line);\n      background: rgba(0,255,0,0.05);\n    }\n\n    .thumb {\n      display: grid;\n      place-items: center;\n      font-size: 40px;\n      background: linear-gradient(135deg, rgba(0,255,0,0.06), rgba(0,255,0,0.01)), #050505;\n      border-bottom: 1px solid rgba(0,255,0,0.18);\n      overflow: hidden;\n    }\n\n    .thumb img, .thumb video {\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n    }\n\n    .file-name {\n      padding: 10px 12px 6px;\n      word-break: break-word;\n      line-height: 1.25;\n    }\n\n    .file-meta {\n      padding: 0 12px 12px;\n      font-size: 12px;\n      color: var(--text-soft);\n    }\n\n    .list {\n      display: grid;\n      gap: 8px;\n    }\n\n    .list-row {\n      display: grid;\n      grid-template-columns: 44px minmax(0,1.6fr) 120px 150px minmax(0,1fr);\n      gap: 12px;\n      align-items: center;\n      background: rgba(0,0,0,0.68);\n      border: 1px solid rgba(0,255,0,0.24);\n      padding: 10px 12px;\n      cursor: pointer;\n    }\n\n    .list-row:hover {\n      border-color: var(--line);\n      background: rgba(0,255,0,0.05);\n    }\n\n    .list-head {\n      position: sticky;\n      top: 0;\n      z-index: 2;\n      background: #130018;\n      border-color: rgba(0,255,0,0.35);\n      font-weight: bold;\n      color: var(--text);\n      cursor: default;\n    }\n\n    .list-row > div {\n      min-width: 0;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .modal {\n      position: fixed;\n      inset: 0;\n      z-index: 30;\n      display: none;\n      align-items: center;\n      justify-content: center;\n      padding: 24px;\n      background: rgba(0,0,0,0.72);\n      backdrop-filter: blur(3px);\n    }\n\n    .modal.open { display: flex; }\n\n    .modal-card {\n      width: min(960px, 100%);\n      max-height: 90vh;\n      overflow: auto;\n      background: rgba(12,0,18,0.98);\n      border: 2px solid var(--line);\n      box-shadow: 0 0 0 1px var(--line), 0 0 28px rgba(0,255,0,0.12);\n      padding: 16px;\n    }\n\n    .modal-head {\n      display: flex;\n      justify-content: space-between;\n      gap: 12px;\n      align-items: center;\n      margin-bottom: 14px;\n    }\n\n    .modal-title {\n      min-width: 0;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n      font-weight: bold;\n    }\n\n    .preview-box {\n      min-height: 260px;\n      border: 1px solid rgba(0,255,0,0.24);\n      background: #000;\n      display: grid;\n      place-items: center;\n      margin-bottom: 14px;\n      overflow: hidden;\n    }\n\n    .preview-box img,\n    .preview-box video {\n      width: 100%;\n      max-height: 70vh;\n      object-fit: contain;\n      background: #000;\n    }\n\n    .preview-box audio {\n      width: min(720px, 100%);\n      margin: 24px;\n    }\n\n    .preview-text {\n      margin: 0;\n      width: 100%;\n      padding: 16px;\n      color: var(--text-dim);\n      white-space: pre-wrap;\n      word-break: break-word;\n      overflow: auto;\n    }\n\n    .meta {\n      color: var(--text-dim);\n      white-space: pre-wrap;\n      line-height: 1.45;\n    }\n\n    .actions {\n      display: flex;\n      gap: 10px;\n      flex-wrap: wrap;\n      margin-top: 14px;\n    }\n\n    .actions a {\n      color: var(--text);\n      text-decoration: none;\n      border: 1px solid rgba(0,255,0,0.35);\n      background: #000;\n      padding: 8px 10px;\n      display: inline-block;\n    }\n\n    .actions a:hover { border-color: var(--line); }\n\n    .hidden-input { display: none; }\n\n    ::-webkit-scrollbar {\n      width: 12px;\n      height: 12px;\n      background: #100014;\n    }\n\n    ::-webkit-scrollbar-thumb {\n      background: #1f4f1f;\n      border: 2px solid #100014;\n    }\n\n    @media (max-width: 980px) {\n      .toolbar {\n        grid-template-columns: auto auto auto auto auto;\n      }\n      #searchInput {\n        grid-column: 1 / -1;\n      }\n      .list-row {\n        grid-template-columns: 40px minmax(0,1fr) 110px 140px;\n      }\n      .list-row > div:last-child { display: none; }\n    }\n\n    @media (max-width: 700px) {\n      .toolbar {\n        grid-template-columns: repeat(5, auto);\n      }\n      .pathbar {\n        flex-direction: column;\n        align-items: flex-start;\n      }\n      .grid {\n        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));\n      }\n      .list-row {\n        grid-template-columns: 34px minmax(0,1fr) 90px;\n      }\n      .list-row > div:nth-child(4),\n      .list-row > div:nth-child(5) { display: none; }\n      .main {\n        padding: 12px;\n      }\n    }\n  ", "scripts": [{"src": "", "content": "\n    const AUDIO_EXTS = [\"mp3\",\"wav\",\"ogg\",\"flac\",\"m4a\",\"aac\",\"opus\"];\n    const IMAGE_EXTS = [\"png\",\"jpg\",\"jpeg\",\"gif\",\"webp\",\"bmp\",\"svg\",\"avif\"];\n    const VIDEO_EXTS = [\"mp4\",\"webm\",\"mov\",\"mkv\",\"avi\"];\n    const TEXT_EXTS = [\"txt\",\"md\",\"json\",\"js\",\"html\",\"css\",\"py\",\"xml\",\"csv\",\"log\"];\n\n    const state = {\n      rootHandle: null,\n      rootName: \"\",\n      currentFolderPath: \"\",\n      view: \"grid\",\n      search: \"\",\n      fallbackMode: false,\n      fallbackFiles: [],\n      folderMap: new Map(),\n      objectUrls: new Map()\n    };\n\n    const el = {\n      openBtn: document.getElementById(\"openBtn\"),\n      upBtn: document.getElementById(\"upBtn\"),\n      refreshBtn: document.getElementById(\"refreshBtn\"),\n      gridBtn: document.getElementById(\"gridBtn\"),\n      listBtn: document.getElementById(\"listBtn\"),\n      searchInput: document.getElementById(\"searchInput\"),\n      pathBox: document.getElementById(\"pathBox\"),\n      statusText: document.getElementById(\"statusText\"),\n      fileview: document.getElementById(\"fileview\"),\n      fallbackPicker: document.getElementById(\"fallbackPicker\"),\n      previewModal: document.getElementById(\"previewModal\"),\n      modalTitle: document.getElementById(\"modalTitle\"),\n      modalBody: document.getElementById(\"modalBody\"),\n      closePreviewBtn: document.getElementById(\"closePreviewBtn\")\n    };\n\n    function escapeHtml(str = \"\") {\n      return String(str).replace(/[&<>\"']/g, m => ({\n        \"&\": \"&amp;\",\n        \"<\": \"&lt;\",\n        \">\": \"&gt;\",\n        '\"': \"&quot;\",\n        \"'\": \"&#39;\"\n      }[m]));\n    }\n\n    function normalizePath(path) {\n      if (path == null) return \"\";\n      const s = String(path).replace(/\\\\/g, \"/\").replace(/^\\/+|\\/+$/g, \"\");\n      return s === \".\" ? \"\" : s;\n    }\n\n    function splitPath(path) {\n      const p = normalizePath(path);\n      return p ? p.split(\"/\") : [];\n    }\n\n    function joinPath(...parts) {\n      return parts.map(p => normalizePath(p)).filter(Boolean).join(\"/\");\n    }\n\n    function getParentPath(path) {\n      const parts = splitPath(path);\n      parts.pop();\n      return parts.join(\"/\");\n    }\n\n    function folderDisplayName(path) {\n      const p = normalizePath(path);\n      if (!p) return state.rootName || \"ROOT\";\n      const parts = p.split(\"/\");\n      return parts[parts.length - 1];\n    }\n\n    function formatBytes(bytes = 0) {\n      if (!bytes && bytes !== 0) return \"\";\n      const units = [\"B\", \"KB\", \"MB\", \"GB\", \"TB\"];\n      let i = 0;\n      let n = bytes;\n      while (n >= 1024 && i < units.length - 1) {\n        n /= 1024;\n        i++;\n      }\n      return `${n.toFixed(n >= 100 || i === 0 ? 0 : 1)} ${units[i]}`;\n    }\n\n    function formatDate(d) {\n      if (!d) return \"\";\n      const date = d instanceof Date ? d : new Date(d);\n      if (isNaN(date)) return \"\";\n      return date.toLocaleString();\n    }\n\n    function getExt(name = \"\") {\n      const i = name.lastIndexOf(\".\");\n      return i >= 0 ? name.slice(i + 1).toLowerCase() : \"\";\n    }\n\n    function getKindIcon(item) {\n      if (item.kind === \"directory\") return \"📁\";\n      const ext = getExt(item.name);\n      if (IMAGE_EXTS.includes(ext)) return \"🖼\";\n      if (VIDEO_EXTS.includes(ext)) return \"🎬\";\n      if (AUDIO_EXTS.includes(ext)) return \"🎵\";\n      if (TEXT_EXTS.includes(ext)) return \"📄\";\n      if ([\"zip\",\"7z\",\"rar\",\"tar\",\"gz\"].includes(ext)) return \"🗜\";\n      return \"◼\";\n    }\n\n    function getMimeFromExt(ext) {\n      const map = {\n        png: \"image/png\", jpg: \"image/jpeg\", jpeg: \"image/jpeg\", gif: \"image/gif\",\n        webp: \"image/webp\", bmp: \"image/bmp\", svg: \"image/svg+xml\", avif: \"image/avif\",\n        mp4: \"video/mp4\", webm: \"video/webm\", mp3: \"audio/mpeg\", wav: \"audio/wav\",\n        ogg: \"audio/ogg\", flac: \"audio/flac\", m4a: \"audio/mp4\", aac: \"audio/aac\",\n        opus: \"audio/ogg\", txt: \"text/plain\", md: \"text/markdown\", html: \"text/html\",\n        css: \"text/css\", js: \"text/javascript\", json: \"application/json\", py: \"text/plain\",\n        csv: \"text/csv\", log: \"text/plain\"\n      };\n      return map[ext] || \"application/octet-stream\";\n    }\n\n    function compareItems(a, b) {\n      if (a.kind !== b.kind) return a.kind === \"directory\" ? -1 : 1;\n      return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: \"base\" });\n    }\n\n    function clearObjectUrls() {\n      for (const url of state.objectUrls.values()) {\n        try { URL.revokeObjectURL(url); } catch {}\n      }\n      state.objectUrls.clear();\n    }\n\n    function makeFolderRecord(path, handle = null, parentPath = \"\") {\n      const normalized = normalizePath(path);\n      return {\n        kind: \"directory\",\n        path: normalized,\n        name: normalized ? folderDisplayName(normalized) : (state.rootName || \"ROOT\"),\n        parentPath: normalizePath(parentPath),\n        handle,\n        directories: [],\n        files: [],\n        loaded: false,\n        loading: false,\n        error: null\n      };\n    }\n\n    function getFolder(path) {\n      return state.folderMap.get(normalizePath(path)) || null;\n    }\n\n    function ensureFolderRecord(path, handle = null, parentPath = \"\") {\n      const normalized = normalizePath(path);\n      if (!state.folderMap.has(normalized)) {\n        state.folderMap.set(normalized, makeFolderRecord(normalized, handle, parentPath));\n      }\n      const folder = state.folderMap.get(normalized);\n      if (handle && !folder.handle) folder.handle = handle;\n      folder.name = normalized ? folderDisplayName(normalized) : (state.rootName || \"ROOT\");\n      return folder;\n    }\n\n    async function loadFolder(path) {\n      const normalized = normalizePath(path);\n      const folder = getFolder(normalized);\n      if (!folder) return null;\n      if (folder.loaded || folder.loading) return folder;\n      if (state.fallbackMode) return folder;\n      if (!folder.handle) return folder;\n\n      folder.loading = true;\n      folder.error = null;\n\n      try {\n        const directories = [];\n        const files = [];\n\n        for await (const [name, handle] of folder.handle.entries()) {\n          if (handle.kind === \"directory\") {\n            const childPath = joinPath(normalized, name);\n            ensureFolderRecord(childPath, handle, normalized);\n            directories.push({\n              kind: \"directory\",\n              name,\n              path: childPath,\n              parentPath: normalized,\n              handle\n            });\n          } else {\n            let file;\n            try {\n              file = await handle.getFile();\n            } catch {\n              continue;\n            }\n\n            files.push({\n              kind: \"file\",\n              name,\n              path: joinPath(normalized, name),\n              parentPath: normalized,\n              handle,\n              size: file.size,\n              lastModified: file.lastModified,\n              type: file.type || getMimeFromExt(getExt(name))\n            });\n          }\n        }\n\n        directories.sort(compareItems);\n        files.sort(compareItems);\n\n        folder.directories = directories;\n        folder.files = files;\n        folder.loaded = true;\n        folder.loading = false;\n        folder.error = null;\n        return folder;\n      } catch (err) {\n        console.error(err);\n        folder.loading = false;\n        folder.loaded = true;\n        folder.error = err?.message || \"Could not open folder\";\n        folder.directories = [];\n        folder.files = [];\n        return folder;\n      }\n    }\n\n    function buildFallbackStructure(fileList) {\n      clearObjectUrls();\n      state.folderMap.clear();\n      state.fallbackMode = true;\n      state.fallbackFiles = Array.from(fileList);\n      state.currentFolderPath = \"\";\n\n      const root = ensureFolderRecord(\"\", null, \"\");\n      root.loaded = true;\n\n      for (const file of state.fallbackFiles) {\n        const rel = (file.webkitRelativePath || file.name).replace(/\\\\/g, \"/\");\n        const parts = rel.split(\"/\");\n        const name = parts.pop();\n        const parentPath = normalizePath(parts.join(\"/\"));\n\n        let acc = \"\";\n        for (const seg of parts) {\n          const current = acc;\n          const next = joinPath(acc, seg);\n\n          const parentFolder = ensureFolderRecord(current, null, getParentPath(current));\n          const nextFolder = ensureFolderRecord(next, null, current);\n          parentFolder.loaded = true;\n\n          if (!parentFolder.directories.find(d => d.path === next)) {\n            parentFolder.directories.push({\n              kind: \"directory\",\n              name: seg,\n              path: next,\n              parentPath: current,\n              handle: null\n            });\n          }\n\n          acc = next;\n          nextFolder.loaded = true;\n        }\n\n        const folder = ensureFolderRecord(parentPath, null, getParentPath(parentPath));\n        folder.loaded = true;\n\n        folder.files.push({\n          kind: \"file\",\n          name,\n          path: normalizePath(rel),\n          parentPath,\n          handle: null,\n          file,\n          size: file.size,\n          lastModified: file.lastModified,\n          type: file.type || getMimeFromExt(getExt(name))\n        });\n      }\n\n      for (const folder of state.folderMap.values()) {\n        folder.directories.sort(compareItems);\n        folder.files.sort(compareItems);\n      }\n\n      setStatus(`Loaded ${state.fallbackFiles.length} files.`);\n      renderAll();\n    }\n\n    async function getFileFromItem(item) {\n      try {\n        if (item.file) return item.file;\n        if (item.handle && item.kind === \"file\") return await item.handle.getFile();\n      } catch (err) {\n        console.error(err);\n      }\n      return null;\n    }\n\n    async function getObjectUrl(item) {\n      if (state.objectUrls.has(item.path)) return state.objectUrls.get(item.path);\n      const file = await getFileFromItem(item);\n      if (!file) return null;\n      const url = URL.createObjectURL(file);\n      state.objectUrls.set(item.path, url);\n      return url;\n    }\n\n    function getCurrentFolder() {\n      return getFolder(state.currentFolderPath) || getFolder(\"\") || null;\n    }\n\n    function getVisibleItems() {\n      const folder = getCurrentFolder();\n      if (!folder) return [];\n      const items = [...folder.directories, ...folder.files];\n      const q = state.search.trim().toLowerCase();\n      if (!q) return items;\n      return items.filter(item => item.name.toLowerCase().includes(q));\n    }\n\n    function findItemByPath(path) {\n      const normalized = normalizePath(path);\n      const folder = getFolder(normalized);\n      if (folder) {\n        return {\n          kind: \"directory\",\n          name: folder.name,\n          path: folder.path,\n          parentPath: folder.parentPath,\n          handle: folder.handle,\n          error: folder.error || null\n        };\n      }\n\n      for (const folder of state.folderMap.values()) {\n        const file = folder.files.find(x => x.path === normalized);\n        if (file) return file;\n      }\n      return null;\n    }\n\n    async function openFolder(path) {\n      const normalized = normalizePath(path);\n      const folder = getFolder(normalized);\n      if (!folder) return;\n      state.currentFolderPath = normalized;\n      await loadFolder(normalized);\n      renderAll();\n    }\n\n    function setStatus(text) {\n      el.statusText.textContent = text;\n    }\n\n    function updatePathBar() {\n      const current = state.currentFolderPath ? ` / ${state.currentFolderPath}` : \"\";\n      el.pathBox.textContent = `${state.rootName || \"ROOT\"}${current}`;\n      const folder = getCurrentFolder();\n      const count = folder ? folder.directories.length + folder.files.length : 0;\n      setStatus(`${count} items`);\n    }\n\n    function fileCardTemplate(item) {\n      const typeText = item.kind === \"directory\" ? \"Folder\" : (getExt(item.name).toUpperCase() || \"FILE\");\n      const meta = item.kind === \"directory\"\n        ? \"Directory\"\n        : `${formatBytes(item.size)} • ${formatDate(item.lastModified)}`;\n\n      return `\n        <div class=\"file-card\" data-item-path=\"${escapeHtml(item.path)}\">\n          <div class=\"thumb\" data-thumb-path=\"${escapeHtml(item.path)}\">${escapeHtml(getKindIcon(item))}</div>\n          <div class=\"file-name\">${escapeHtml(item.name)}</div>\n          <div class=\"file-meta\">${escapeHtml(typeText)}<br>${escapeHtml(meta)}</div>\n        </div>\n      `;\n    }\n\n    function fileRowTemplate(item, isHead = false) {\n      if (isHead) {\n        return `\n          <div class=\"list-row list-head\">\n            <div>TYPE</div>\n            <div>NAME</div>\n            <div>SIZE</div>\n            <div>MODIFIED</div>\n            <div>PATH</div>\n          </div>\n        `;\n      }\n\n      return `\n        <div class=\"list-row\" data-item-path=\"${escapeHtml(item.path)}\">\n          <div>${escapeHtml(getKindIcon(item))}</div>\n          <div>${escapeHtml(item.name)}</div>\n          <div>${item.kind === \"directory\" ? \"—\" : escapeHtml(formatBytes(item.size))}</div>\n          <div>${item.kind === \"directory\" ? \"—\" : escapeHtml(formatDate(item.lastModified))}</div>\n          <div>${escapeHtml(item.path || \"\\\\\")}</div>\n        </div>\n      `;\n    }\n\n    async function hydrateThumbs(items) {\n      for (const item of items) {\n        if (item.kind !== \"file\") continue;\n        const ext = getExt(item.name);\n        const escapedPath = CSS.escape(item.path);\n        const thumbEl = document.querySelector(`.thumb[data-thumb-path=\"${escapedPath}\"]`);\n        if (!thumbEl) continue;\n\n        try {\n          if (IMAGE_EXTS.includes(ext)) {\n            const url = await getObjectUrl(item);\n            if (url && thumbEl.isConnected) {\n              thumbEl.innerHTML = `<img src=\"${url}\" alt=\"${escapeHtml(item.name)}\">`;\n            }\n          } else if ([\"mp4\",\"webm\"].includes(ext)) {\n            const url = await getObjectUrl(item);\n            if (url && thumbEl.isConnected) {\n              thumbEl.innerHTML = `<video src=\"${url}\" muted playsinline></video>`;\n            }\n          }\n        } catch (err) {\n          console.error(err);\n        }\n      }\n    }\n\n    function renderFileView() {\n      if (!state.rootHandle && !state.fallbackMode) {\n        el.fileview.innerHTML = `<div class=\"empty\">Open a folder to begin. We have reduced the ceremony.</div>`;\n        updatePathBar();\n        return;\n      }\n\n      const items = getVisibleItems();\n      if (!items.length) {\n        el.fileview.innerHTML = `<div class=\"empty\">Nothing here matching that search.</div>`;\n        updatePathBar();\n        return;\n      }\n\n      if (state.view === \"grid\") {\n        el.fileview.innerHTML = `<div class=\"grid\">${items.map(fileCardTemplate).join(\"\")}</div>`;\n        hydrateThumbs(items);\n      } else {\n        el.fileview.innerHTML = `<div class=\"list\">${fileRowTemplate(null, true)}${items.map(item => fileRowTemplate(item)).join(\"\")}</div>`;\n      }\n\n      updatePathBar();\n    }\n\n    async function previewFile(item) {\n      const file = await getFileFromItem(item);\n      const url = await getObjectUrl(item);\n      const ext = getExt(item.name);\n\n      let previewHtml = `<div class=\"preview-box\">${escapeHtml(getKindIcon(item))}</div>`;\n\n      if (file && url) {\n        if (IMAGE_EXTS.includes(ext)) {\n          previewHtml = `<div class=\"preview-box\"><img src=\"${url}\" alt=\"${escapeHtml(item.name)}\"></div>`;\n        } else if ([\"mp4\",\"webm\",\"mov\"].includes(ext)) {\n          previewHtml = `<div class=\"preview-box\"><video src=\"${url}\" controls></video></div>`;\n        } else if (AUDIO_EXTS.includes(ext)) {\n          previewHtml = `<div class=\"preview-box\"><audio src=\"${url}\" controls></audio></div>`;\n        } else if (TEXT_EXTS.includes(ext)) {\n          try {\n            const text = await file.text();\n            previewHtml = `<div class=\"preview-box\"><pre class=\"preview-text\">${escapeHtml(text.slice(0, 30000))}</pre></div>`;\n          } catch (err) {\n            console.error(err);\n          }\n        }\n      }\n\n      el.modalTitle.textContent = item.name;\n      el.modalBody.innerHTML = `\n        ${previewHtml}\n        <div class=\"meta\">Path: ${escapeHtml(item.path)}\nType: ${escapeHtml(file?.type || item.type || \"unknown\")}\nExtension: ${escapeHtml(ext || \"none\")}\nSize: ${escapeHtml(formatBytes(file?.size ?? item.size ?? 0))}\nModified: ${escapeHtml(formatDate(file?.lastModified ?? item.lastModified))}</div>\n        <div class=\"actions\">\n          ${url ? `<a href=\"${url}\" target=\"_blank\" rel=\"noopener noreferrer\">OPEN</a>` : \"\"}\n          ${url ? `<a href=\"${url}\" download=\"${escapeHtml(item.name)}\">DOWNLOAD</a>` : \"\"}\n        </div>\n      `;\n      el.previewModal.classList.add(\"open\");\n    }\n\n    async function activateItem(path) {\n      const item = findItemByPath(path);\n      if (!item) return;\n\n      if (item.kind === \"directory\") {\n        await openFolder(item.path);\n        return;\n      }\n\n      await previewFile(item);\n    }\n\n    async function refreshCurrentFolder() {\n      const folder = getCurrentFolder();\n      if (!folder) return;\n      if (!state.fallbackMode) {\n        folder.loaded = false;\n        folder.loading = false;\n        folder.error = null;\n        await loadFolder(folder.path);\n      }\n      renderAll();\n    }\n\n    async function openRootFolder() {\n      try {\n        state.fallbackMode = false;\n        clearObjectUrls();\n        state.folderMap.clear();\n        state.currentFolderPath = \"\";\n        state.search = \"\";\n        el.searchInput.value = \"\";\n\n        if (\"showDirectoryPicker\" in window) {\n          const dirHandle = await window.showDirectoryPicker({ mode: \"read\" });\n          state.rootHandle = dirHandle;\n          state.rootName = dirHandle.name || \"ROOT\";\n          ensureFolderRecord(\"\", dirHandle, \"\");\n          await loadFolder(\"\");\n          renderAll();\n          setStatus(`Loaded ${state.rootName}.`);\n          return;\n        }\n\n        el.fallbackPicker.click();\n      } catch (err) {\n        if (err && err.name === \"AbortError\") {\n          setStatus(\"Folder selection cancelled.\");\n          return;\n        }\n        console.error(err);\n        setStatus(\"Could not open folder.\");\n      }\n    }\n\n    function closePreview() {\n      el.previewModal.classList.remove(\"open\");\n    }\n\n    async function renderAll() {\n      renderFileView();\n    }\n\n    el.openBtn.addEventListener(\"click\", openRootFolder);\n\n    el.upBtn.addEventListener(\"click\", async () => {\n      if (!state.currentFolderPath) return;\n      await openFolder(getParentPath(state.currentFolderPath));\n    });\n\n    el.refreshBtn.addEventListener(\"click\", refreshCurrentFolder);\n\n    el.gridBtn.addEventListener(\"click\", () => {\n      state.view = \"grid\";\n      el.gridBtn.classList.add(\"active\");\n      el.listBtn.classList.remove(\"active\");\n      renderFileView();\n    });\n\n    el.listBtn.addEventListener(\"click\", () => {\n      state.view = \"list\";\n      el.listBtn.classList.add(\"active\");\n      el.gridBtn.classList.remove(\"active\");\n      renderFileView();\n    });\n\n    el.searchInput.addEventListener(\"input\", () => {\n      state.search = el.searchInput.value || \"\";\n      renderFileView();\n    });\n\n    el.fileview.addEventListener(\"click\", async (e) => {\n      const row = e.target.closest(\"[data-item-path]\");\n      if (!row) return;\n      await activateItem(row.dataset.itemPath);\n    });\n\n    el.fallbackPicker.addEventListener(\"change\", (e) => {\n      const files = e.target.files;\n      if (!files || !files.length) return;\n      const first = files[0];\n      const rel = first.webkitRelativePath || \"\";\n      state.rootName = rel ? rel.split(\"/\")[0] : \"ROOT\";\n      buildFallbackStructure(files);\n      e.target.value = \"\";\n    });\n\n    el.closePreviewBtn.addEventListener(\"click\", closePreview);\n\n    el.previewModal.addEventListener(\"click\", (e) => {\n      if (e.target === el.previewModal) closePreview();\n    });\n\n    window.addEventListener(\"keydown\", async (e) => {\n      if (e.target.matches(\"input, textarea\")) {\n        if (e.key === \"Escape\") {\n          e.target.blur();\n        }\n        return;\n      }\n\n      if (e.key === \"/\") {\n        e.preventDefault();\n        el.searchInput.focus();\n        el.searchInput.select();\n        return;\n      }\n\n      if (e.key === \"Escape\") {\n        closePreview();\n        return;\n      }\n\n      if (e.key === \"Backspace\") {\n        e.preventDefault();\n        if (state.currentFolderPath) {\n          await openFolder(getParentPath(state.currentFolderPath));\n        }\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"r\") {\n        e.preventDefault();\n        await refreshCurrentFolder();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"g\") {\n        state.view = \"grid\";\n        el.gridBtn.classList.add(\"active\");\n        el.listBtn.classList.remove(\"active\");\n        renderFileView();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"l\") {\n        state.view = \"list\";\n        el.listBtn.classList.add(\"active\");\n        el.gridBtn.classList.remove(\"active\");\n        renderFileView();\n      }\n    });\n\n    renderAll();\n  "}]},
  "music-player": {"body": "<div class=\"app-shell\">\n    <section class=\"toolbar\">\n      <button id=\"openBtn\">OPEN MUSIC FOLDER</button>\n      <button id=\"playTopBtn\" class=\"small\"><span class=\"btn-label\">▶</span></button>\n      <div class=\"toolbar-title\" id=\"toolbarTitle\"><span>Ready for a folder full of audio. </span></div>\n      <button id=\"fullscreenBtn\"><span class=\"btn-label\">FULLSCREEN VISUALIZER</span></button>\n    </section>\n\n    <section class=\"top-status\">\n      <div class=\"status-line\">Dual-pane player layout: stage on the left, playlist on the right, fullscreen as the expanded twin.</div>\n      <div id=\"statusText\"></div>\n    </section>\n\n    <main class=\"main\">\n      <section class=\"panel player-shell\">\n        <div class=\"player-header player-topbar\">\n          <div class=\"player-top-info\">\n            <div class=\"now-playing-label\">NOW PLAYING</div>\n            <div class=\"track-title\" id=\"trackTitle\">No track selected</div>\n          </div>\n          <div class=\"player-top-actions\">\n            <button id=\"visualModeBtn\" class=\"small\">MODE</button>\n          </div>\n        </div>\n\n        <div class=\"visual-wrap\" id=\"visualWrap\">\n          <canvas id=\"visualizerCanvas\"></canvas>\n          <div class=\"artwork-layer\" id=\"artworkLayer\">\n            <div class=\"artwork-card\">\n              <div class=\"artwork-media\">\n                <img id=\"artworkImage\" alt=\"Album or artist artwork\" hidden />\n                <div class=\"artwork-fallback\" id=\"artworkFallback\">NO ART<br />YET</div>\n              </div>\n              <div class=\"artwork-copy\">\n                <div class=\"artwork-kicker\" id=\"artworkKicker\">ARTWORK MODE</div>\n                <div class=\"artwork-headline\" id=\"artworkHeadline\">Load a song to search for album art.</div>\n                <div class=\"artwork-subline\" id=\"artworkSubline\">Album first. Artist fallback second. Because <img id=\"fsArtworkImage\" alt=\"Album or artist artwork\" hidden />\n              <div class=\"artwork-fallback\" id=\"fsArtworkFallback\">NO ART<br />YET</div>\n            </div>\n            <div class=\"artwork-copy\">\n              <div class=\"artwork-kicker\" id=\"fsArtworkKicker\">ARTWORK MODE</div>\n              <div class=\"artwork-headline\" id=\"fsArtworkHeadline\">Load a song to search for album art.</div>\n              <div class=\"artwork-subline\" id=\"fsArtworkSubline\">Album first. Artist fallback second. Because browsers need hobbies.</div>\n              <div class=\"artwork-status\" id=\"fsArtworkStatusText\">Waiting for track metadata.</div>\n              <div class=\"artwork-credit\" id=\"fsArtworkCreditText\"></div>\n            </div>\n          </div>\n        </div>\n        <div class=\"visual-overlay\">\n          <span id=\"fsSampleText\">TIME DOMAIN / <span id=\"fsModeText\">OSCILLOSCOPE</span></span>\n          <span id=\"fsVisualStatus\">No signal.</span>\n        </div>\n      </div>\n\n      <div class=\"track-card\">\n        <div class=\"track-meta\">\n          <span id=\"fsTrackFolder\">Folder: none</span>\n          <span id=\"fsTrackCount\">0 tracks</span>\n          <span id=\"fsTrackDurationMeta\">Duration: --:--</span>\n        </div>\n      </div>\n\n      <div class=\"seek-wrap\">\n        <div class=\"time-row\">\n          <span id=\"fsCurrentTime\">0:00</span>\n          <span id=\"fsTimeHint\">SPACE play/pause • ←/→ seek • ESC exit</span>\n          <span id=\"fsTotalTime\">0:00</span>\n        </div>\n        <input id=\"fsSeekBar\" type=\"range\" min=\"0\" max=\"1000\" value=\"0\" step=\"1\" />\n      </div>\n\n      <div class=\"controls\">\n        <div class=\"control-group\">\n          <button id=\"fsPrevBtn\" class=\"small\">⏮</button>\n          <button id=\"fsPlayBtn\"><span class=\"btn-label\">▶ PLAY</span></button>\n          <button id=\"fsNextBtn\" class=\"small\">⏭</button>\n        </div>\n ath) {\n      const normalized = normalizePath(path);\n      if (!normalized) return state.rootName || \"MUSIC\";\n      const parts = normalized.split(\"/\");\n      return parts[parts.length - 1] || normalized;\n    }\n\n    function getParentPath(path) {\n      const normalized = normalizePath(path);\n      if (!normalized) return \"\";\n      const parts = normalized.split(\"/\");\n      parts.pop();\n      return parts.join(\"/\");\n    }\n\n    function createPlaylistTree(indexes) {\n      const root = { path: \"\", name: state.rootName || \"MUSIC\", depth: 0, folders: new Map(), tracks: [] };\n\n      for (const index of indexes) {\n        const track = state.tracks[index];\n        const folderPath = normalizePath(track.folder === state.rootName ? \"\" : track.folder);\n        let node = root;\n        let acc = \"\";\n\n        if (folderPath) {\n          for (const part of folderPath.split(\"/\")) {\n            acc = normalizePath(acc ? `${acc}/${part}` : part);\n            if (!node.folders.has(part)) {\n              node.folders.set(part, {\n                path: acc,\n                name: part,\n                depth: acc.split(\"/\").length,\n                folders: new Map(),\n                tracks: []\n              });\n            }\n            node = node.folders.get(part);\n          }\n        }\n\n        node.tracks.push(index);\n      }\n\n      return root;\n    }\n\n    function renderPlaylistNode(node, counters) {\n      const indent = node.path ? node.depth : 0;\n      const folderOpen = state.expandedFolders.has(node.path);\n      const folderRows = [];\n\n      if (node.path || state.rootName) {\n        const trackTotal = countTracksInTree(node);\n        folderRows.push(`\n          <div class=\"folder-row${folderOpen ? ' open' : ''}\" data-folder-path=\"${escapeHtml(node.path)}\" style=\"--depth:${indent}\">\n            <div class=\"folder-toggle\"><span class=\"folder-icon\">📁</span><span class=\"folder-arrow\">${folderOpen ? '▾' : '▸'}</span></div>\n            <div class=\"folder-copy\">\n              <div class=\"folder-name\">${escapeHtml(node.path ? node.name : (state.rootName || 'MUSIC'))}</div>\n              <div class=\"folder-meta\">${trackTotal} track${trackTotal === 1 ? '' : 's'}</div>\n            </div>\n          </div>\n        `);\n      }\n\n      const childHtml = [];\n      if (!node.path || folderOpen) {\n        const childFolders = Array.from(node.folders.values()).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));\n        for (const folder of childFolders) {\n          childHtml.push(renderPlaylistNode(folder, counters));\n        }\n        for (const index of node.tracks) {\n          const track = state.tracks[index];\n          const active = index === state.currentIndex ? ' active' : '';\n          const duration = state.durationCache.get(track.path);\n          counters.value += 1;\n          childHtml.push(`\n            <div class=\"track-row${active}\" data-track-index=\"${index}\" style=\"--depth:${node.depth + 1}\">\n              <div class=\"track-index\"><span class=\"track-icon\">🎵</span><span class=\"track-arrow\">${counters.value}</span></div>\n              <div class=\"track-copy\">\n                <div class=\"track-name\">${escapeHtml(getDisplayTitle(track))}</div>\n                <div class=\"track-path\">${escapeHtml(track.path)}</div>\n              </div>\n              <div class=\"track-duration\">${duration ? escapeHtml(formatTime(duration)) : '--:--'}</div>\n            </div>\n          `);\n        }\n      }\n\n      return folderRows.join('') + childHtml.join('');\n    }\n\n    function countTracksInTree(node) {\n      let total = node.tracks.length;\n      for (const child of node.folders.values()) total += countTracksInTree(child);\n      return total;\n    }\n\n    function formatTime(seconds = 0) {\n      if (!isFinite(seconds) || seconds < 0) return \"0:00\";\n      const state.tracks = tracks.sort(sortTracks);\n      state.currentIndex = -1;\n      state.metadataCache.clear();\n      state.artworkCache.clear();\n      state.expandedFolders = new Set([\"\"]);\n      stopPlayback(true);\n      updatePathBar();\n      updateFilter();\n      hideSearchSuggestions();\n      updateTransportButtons();\n      updateNowPlaying();\n\n      if (state.tracks.length) {\n        setStatus(`Loaded ${state.tracks.length} tracks.`);\n        setTrackPathLabel(el.toolbarTitle, `${state.rootName} loaded with ${state.tracks.length} track${state.tracks.length === 1 ? \"\" : \"s\"}.`);\n        primeDurations();\n      } else {\n        setStatus(\"No supported audio files found.\");\n        setTrackPathLabel(el.toolbarTitle, \"No supported audio files were found in that folder.\");\n      }\n    }\n\n    async function getFileForTrack(track) {\n      if (track.file) return track.file;\n      if (track.handle) {\n        const file = await track.handle.getFile();\n        track.file = file;\n        track.size = file.size;\n        track.type = file.type || \"audio\";\n        return file;\n      }\n      return null;\n    }\n\n    async function getObjectUrlForTrack(track) {\n      if (state.objectUrls.has(track.path)) return state.objectUrls.get(track.path);\n      const file = await getFileForTrack(track);\n      if (!file) return null;\n      const url = URL.createObjectURL(file);\n      state.objectUrls.set(track.path, url);\n      return url;\n    }\n\n    function getTrack(index = state.currentIndex) {\n      return state.tracks[index] || null;\n    }\n\n    function getDisplayTitle(track) {\n      return track ? track.name.replace(/\\.[^.]+$/, \"\") : \"No track selected\";\n    }\n\n    function getTrackExtension(track) {\n      return (track?.name.match(/\\.([^.]+)$/)?.[1] || '').toUpperCase();\n    }\n\n    function getPathWithoutExtension(path = '') {\n      return String(path).replace(/\\.[^.]+$/, '');\n    }\n\n    function stripLeadingTrackNumber(value = '') {\n      return String(value)\n        .replace(/^\\s*\\d{1,3}\\s*[-._)\\]]+\\s*/g, '')\n        .replace(/^\\s*\\d{1,3}\\s+/g, '')\n        .trim();\n    }\n\n    function normalizeSearchText(value = '') {\n      return stripLeadingTrackNumber(String(value))\n        .toLowerCase()\n        .replace(/[\\[\\](){},.!?:;'\"`~@#$%^&*+=\\/|<>_-]+/g, ' ')\n        .replace(/\\s+/g, ' ')\n        .trim();\n    }\n\n    function escapeRegExp(value = '') {\n      return String(value).replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n    }\n\n    function getDisplayLabel(track) {\n      if (!track) return \"\";\n      return getPathWithoutExtension(track.path || track.name || \"\");\n    }\n\n    function sanitizeTagValue(value = \"\") {\n      if (value == null) return \"\";\n      return String(value)\n        .replace(/\\u0000/g, \"\")\n        .replace(/[_]+/g, \" \")\n        .replace(/\\s+/g, \" \")\n        .trim();\n    }\n\n    function titleCaseWords(value = \"\") {\n      return String(value).replace(/\\b([a-z])/g, (m, ch) => ch.toUpperCase());\n    }\n\n    function fallbackTrackMetadata(track) {\n      const folderBits = normalizePath(track?.folder || \"\").split(\"/\").filter(Boolean);\n      const maybeArtist = sanitizeTagValue(folderBits.length ? folderBits[folderBits.length - 1] : state.rootName || \"\");\n      const cleanedTitle = sanitizeTagValue(stripLeadingTrackNumber(getDisplayTitle(track)));\n      return {\n        title: cleanedTitle || getDisplayTitle(track),\n        artist: maybeArtist || \"\",\n        album: \"\",\n        albumArtist: maybeArtist || \"\",\n        source: \"filename\"\n      };\n    }\n\n    function getPrimaryArtist(metadata = {}) {\n      return sanitizeTagValue(metadata.albumArtist || metadata.artist || \"\");\n    }\n\n    function buildArtworkSearchKey(track, metadata = {}) {\n      return JSON.stringify({\n        path: track?.path || \"\",\n        artist: getPrimaryArtist(metadata),\n        album: sanitizeTagValue(metadata.album || \"\"),\n        title: sanitizeTagValue(metadata.title || \"\")\n      });\n    }\n\n    function setArtworkLayerLoading(loading) {\n      el.artworkLayer?.classList.toggle(\"loading\", !!loading);\n      el.fsArtworkLayer?.classList.toggle(\"loading\", !!loading);\n    }\n\n    function setArtworkDisplay(data = {}) {\n      state.currentArtwork = data;\n      const imageUrl = data.imageUrl || \"\";\n      const fallbackText = data.fallbackText || \"NO ART\";\n      const kicker = data.kicker || \"ARTWORK MODE\";\n      const headline = data.headline || \"No artwork found.\";\n      const subline = data.subline || \"Album lookup failed. Artist lookup failed. Humanity remains consistent.\";\n      const status = data.status || \"No artwork available for this track.\";\n      const creditHtml = data.creditHtml || \"\";\n\n      [el.artworkKicker, el.fsArtworkKicker].forEach(node => { if (node) node.textContent = kicker; });\n      [el.artworkHeadline, el.fsArtworkHeadline].forEach(node => { if (node) node.textContent = headline; });\n      [el.artworkSubline, el.fsArtworkSubline].forEach(node => { if (node) node.textContent = subline; });\n      [el.artworkStatusText, el.fsArtworkStatusText].forEach(node => { if (node) node.textContent = status; });\n      [el.artworkCreditText, el.fsArtworkCreditText].forEach(node => { if (node) node.innerHTML = creditHtml; });\n      [el.artworkFallback, el.fsArtworkFallback].forEach(node => { if (node) node.innerHTML = escapeHtml(fallbackText).replace(/\\n/g, \"<br />\"); });\n\n      [[el.artworkImage, imageUrl], [el.fsArtworkImage, imageUrl]].forEach(([img, url]) => {\n        if (!img) return;\n        if (url) {\n          img.src = url;\n          img.hidden = false;\n        } else {\n          img.removeAttribute(\"src\");\n          img.hidden = true;\n        }\n      });\n    }\n\n    function setArtworkModeVisible() {\n      const enabled = state.visualMode === \"artwork\";\n      el.visua l)}</a>`);\n      } else if (sourceLabel) {\n        bits.push(escapeHtml(sourceLabel));\n      }\n      if (extra) bits.push(escapeHtml(extra));\n      return bits.join(\" • \");\n    }\n\n    function pickSummaryImage(summary) {\n      return summary?.originalimage?.source || summary?.thumbnail?.source || \"\";\n    }\n\n    async function lookupWikipediaSummary(candidates = []) {\n      for (const candidate of candidates) {\n        const query = sanitizeTagValue(candidate);\n        if (!query) continue;\n        try {\n          const summary = await fetchJson(buildWikiSummaryUrl(query));\n          const imageUrl = pickSummaryImage(summary);\n          if (!summary?.title) continue;\n          return {\n            title: summary.title,\n            pageUrl: summary.content_urls?.desktop?.page || \"\",\n            imageUrl,\n            description: sanitizeTagValue(summary.description || \"\"),\n            extract: sanitizeTagValue(summary.extract || \"\")\n          };\n        } catch (err) {}\n      }\n      return null;\n    }\n\n    async function searchCommonsImage(query = \"\") {\n      const clean = sanitizeTagValue(query);\n      if (!clean) return null;\n      const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrlimit=1&gsrsearch=${encodeURIComponent(clean)}&prop=imageinfo&iiprop=url&iiurlwidth=800&format=json&origin=*`;\n      try {\n        const data = await fetchJson(url);\n        const pages = Object.values(data?.query?.pages || {});\n        const page = pages.find((entry) => entry?.imageinfo?.[0]?.thumburl || entry?.imageinfo?.[0]?.url);\n        if (!page) return null;\n        const info = page.imageinfo?.[0] || {};\n        return {\n          title: page.title?.replace(/^File:/, \"\") || clean,\n          pageUrl: `https://commons.wikimedia.org/wiki/${encodeURIComponent(page.title || \"\")}`,\n          imageUrl: info.thumburl || info.url || \"\"\n        };\n      } catch (err) {\n        return null;\n      }\n    }\n\n    async function resolveArtworkForTrack(track) {\n      if (!track) {\n        setArtworkDisplay({\n          headline: \"No track selected\",\n          subline: \"Pick a file and the machine will start rummaging through public encyclopedias.\",\n          status: \"Waiting for audio.\",\n          fallbackText: \"NO\\nTRACK\"\n        });\n        return;\n      }\n\n      const lookupToken = ++state.artworkLookupToken;\n      setArtworkLayerLoading(true);\n\n      const metadata = await readTrackMetadata(track);\n      if (lookupToken !== state.artworkLookupToken) return;\n\n      const cacheKey = buildArtworkSearchKey(track, metadata);\n      if (state.artworkCache.has(cacheKey)) {\n        setArtworkLayerLoading(false);\n        setArtworkDisplay(state.artworkCache.get(cacheKey));\n        return;\n      }\n\n      const artist = getPrimaryArtist(metadata);\n      const album = sanitizeTagValue(metadata.album || \"\");\n      const title = sanitizeTagValue(metadata.title || getDisplayTitle(track));\n      const albumQueries = [\n        album && artist ? `${album} (${artist} album)` : \"\",\n        album && artist ? `${album} ${artist} album` : \"\",\n        album ? `${album} album` : \"\"\n      ].filter(Boolean);\n      const artistQueries = [\n        artist,\n        artist ? `${artist} musician` : \"\",\n        artist ? `${artist} band` : \"\"\n      ].filter(Boolean);\n\n      let artworkData = null;\n      let sourceHint = \"\";\n\n      if (albumQueries.length) {\n        const albumResult = await lookupWikipediaSummary(albumQueries);\n        if (lookupToken !== state.artworkLookupToken) return;\n        if (albumResult?.imageUrl) {\n          sourceHint = \"Album image from Wikipedia\";\n          artworkData = {\n            imageUrl: albumResult.imageUrl,\n            kicker: \"ALBUM MATCH\",\n            headline: album || albumResult.title || title,\n            subline: artist || metadata.artist || \"Unknown eUrl, commonsResult.title || \"\"),\n            fallbackText: `${artist || title}`.trim()\n          };\n        }\n      }\n\n      if (!artworkData) {\n        artworkData = {\n          imageUrl: \"\",\n          kicker: metadata.source === \"tags\" ? \"METADATA FOUND\" : \"FILENAME GUESS\",\n          headline: album || artist || title || \"Unknown track\",\n          subline: [artist, album].filter(Boolean).join(\" • \") || \"No public image match found.\",\n          status: \"Could not match album art or artist art from the public sources used here.\",\n          creditHtml: \"Sources checked: Wikipedia / Wikimedia Commons\",\n          fallbackText: `${album || artist || title || \"NO ART\"}`\n        };\n      }\n\n      state.artworkCache.set(cacheKey, artworkData);\n      setArtworkLayerLoading(false);\n      setArtworkDisplay(artworkData);\n    }\n\n    function scoreTrackMatch(track, query = state.search || '') {\n      const normalizedQuery = normalizeSearchText(query);\n      if (!normalizedQuery) return -Infinity;\n\n      const pathLabel = getPathWithoutExtension(track.path || track.name || '');\n      const pathParts = pathLabel.split('/');\n      const basename = pathParts[pathParts.length - 1] || pathLabel;\n      const title = getDisplayTitle(track);\n      const folder = track.folder || '';\n\n      const normalizedTitle = normalizeSearchText(title);\n      const normalizedBase = normalizeSearchText(basename);\n      const normalizedPath = normalizeSearchText(pathLabel);\n      const normalizedFolder = normalizeSearchText(folder);\n      const tokens = normalizedQuery.split(' ').filter(Boolean);\n\n      const combined = `${normalizedTitle} ${normalizedBase} ${normalizedFolder} ${normalizedPath}`.trim();\n      const containsWholeQuery = combined.includes(normalizedQuery);\n      const containsAllTokens = tokens.every((token) => combined.includes(token));\n      if (!containsWholeQuery && !containsAllTokens) return -Infinity;\n\n      let scor t = currentText;\n      el.fsCurrentTime.textContent = currentText;\n      el.totalTime.textContent = totalText;\n      el.fsTotalTime.textContent = totalText;\n      const track = getTrack();\n      if (track && isFinite(duration) && duration > 0) {\n        state.durationCache.set(track.path, duration);\n      }\n    }\n\n    function focusCurrentTrack() {\n      if (state.currentIndex < 0) return;\n      const row = el.playlistView.querySelector(`.track-row[data-track-index=\"${state.currentIndex}\"]`);\n      row?.scrollIntoView({ block: \"center\", behavior: \"smooth\" });\n    }\n\n    function resizeCanvas(canvas) {\n      const dpr = Math.max(1, window.devicePixelRatio || 1);\n      const rect = canvas.getBoundingClientRect();\n      const width = Math.max(1, Math.floor(rect.width * dpr));\n      const height = Math.max(1, Math.floor(rect.height * dpr));\n      if (canvas.width !== width || canvas.height !== height) {\n        canvas.width = width;\n        canvas.height = height;\n      }\n      const ctx = canvas.getContext(\"2d\");\n      ctx.setTransform(1, 0, 0, 1, 0, 0);\n      ctx.scale(dpr, dpr);\n      return { ctx, width: rect.width, height: rect.height };\n    }\n\n    function drawBackground(ctx, width, height) {\n      const grad = ctx.createLinearGradient(0, 0, 0, height);\n      grad.addColorStop(0, \"rgba(0,0,0,0.18)\");\n      grad.addColorStop(1, \"rgba(7,0,12,0.36)\");\n      ctx.fillStyle = grad;\n      ctx.fillRect(0, 0, width, height);\n\n      ctx.strokeStyle = \"rgba(0,255,0,0.06)\";\n      ctx.lineWidth = 1;\n      for (let y = 0; y < height; y += 24) {\n        ctx.beginPath();\n        ctx.moveTo(0, y + 0.5);\n        ctx.lineTo(width, y + 0.5);\n        ctx.stroke();\n      }\n    }\n\n    function drawOscilloscope(ctx, width, height, data) {\n      ctx.lineWidth = 2;\n      ctx.strokeStyle = \"rgba(0,255,0,0.95)\";\n      ctx.shadowBlur = 12;\n      ctx.shadowColor = \"rgba(0,255,0,0.5)\";\n      ctx.beginPath();\n      const sliceWidth = width / data.length;\n      let x = 0;\n      for (let i = 0; i < data.length; i++) {\n        const v = data[i] / 255;\n        const y = v * height;\n        if (i === 0) ctx.moveTo(x, y);\n        else ctx.lineTo(x, y);\n        x += sliceWidth;\n      }\n      ctx.stroke();\n      ctx.shadowBlur = 0;\n    }\n\n    function drawSpectrum(ctx, width, height, data) {\n      ctx.lineWidth = 2;\n      ctx.strokeStyle = \"rgba(0,255,0,0.92)\";\n      ctx.shadowBlur = 12;\n      ctx.shadowColor = \"rgba(0,255,0,0.4)\";\n      ctx.beginPath();\n      const usable = Math.floor(data.length * 0.58);\n      const step = width / Math.max(1, usable - 1);\n      for (let i = 0; i < usable; i++) {\n        const v = data[i] / 255;\n        const curve = Math.pow(v, 1.15);\n        const y = height - (curve * height * 0.95);\n        const x = i * step;\n        if (i === 0) ctx.moveTo(x, y);\n        else ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n      ctx.shadowBlur = 0;\n    }\n\n    function drawHybrid(ctx, width, height, timeData, freqData) {\n      drawSpectrum(ctx, width, height, freqData);\n      ctx.globalAlpha = 0.78;\n      drawOscilloscope(ctx, width, height, timeData);\n      ctx.globalAlpha = 1;\n    }\n\n    function renderVisualizerToCanvas(canvas) {\n      const { ctx, width, height } = resizeCanvas(canvas);\n      ctx.clearRect(0, 0, width, height);\n      drawBackground(ctx, width, height);\n\n      if (!state.analyser) {\n        ctx.strokeStyle = \"rgba(0,255,0,0.25)\";\n        ctx.beginPath();\n        ctx.moveTo(0, height / 2);\n        ctx.lineTo(width, height / 2);\n        ctx.stroke();\n        return;\n      }\n\n      const timeData = new Uint8Array(state.analyser.fftSize);\n      const freqData = new Uint8Array(state.analyser.frequencyBinCount);\n      state.analyser.getByteTimeDomainData(timeData);\n      state.analyser.getByteFrequencyData(freqData);\n\n      if (state.visualMode === \"oscilloscope\") {\n        drawOscilloscope(ctx, width, height, timeData);\n      } else if (state.visualMode === \"line-spectrum\") {\n        drawSpectrum(ctx, width, height, freqData);\n      } else if (state.visualMode === \"hybrid\") {\n        drawHybrid(ctx, width, height, timeData, freqData);\n      } else {\n        drawSpectrum(ctx, width, height, freqData);\n      }\n    }\n\n    function updateVisualModeEffects() {\n      const glitchOn = state.visualMode === \"hybrid\";\n      el.fullscreenOverlay.classList.toggle(\"glitch-mode\", glitchOn);\n      setArtworkModeVisible();\n    }\n\n    function updateFullscreenReactiveMotion() {\n      const shell = document.querySelector(\".fullscreen-player-shell\");\n      if (!shell) return;\n      shell.style.removeProperty(\"--fs-audio-bounce\");\n    }\n\n    function animateVisualizer() {\n      renderVisualizerToCanvas(el.visualizerCanvas);\n      if (el.fullscreenOverlay.classList.contains(\"open\")) {\n        renderVisualizerToCanvas(el.fullscreenCanvas);\n      }\n      updateFullscreenReactiveMotion();\n      state.animationFrame = requestAnimationFrame(animateVisualizer);\n    }\n\n    function cycleVisualMode() {\n      const current = VISUAL_MODES.indexOf(state.visualMode);\n      state.visualMode = VISUAL_MODES[(current + 1) % VISUAL_MODES.length];\n      const modeLabel = state.visualMode.toUpperCase();\n      const sampleLabel = state.visualMode === \"line-spectrum\"\n        ? \"FREQUENCY DOMAIN\"\n        : state.visualMode === \"artwork\"\n          ? \"METADATA / PUBLIC IMAGE\"\n          : \"TIME DOMAIN\";\n      el.modeText.textContent = modeLabel;\n      el.fsModeText.textContent = modeLabel;\n      el.sampleText.innerHTML = state.visualMode === \"artwork\"\n        ? `METADATA / <span id=\"modeText\">${modeLabel}</span>`\n        : `${sampleLabel} / ${modeLabel}`;\n      el.fsSampleText.innerHTML = state.visualMode === \"artwork\"\n        ? `METADATA / <span id=\"fsModeText\">${modeLabel}</span>`\n        : `${sampleLabel} / ${modeLab         try {\n            await exitRealFullscreen();\n          } catch (err) {\n            console.warn(\"Exiting fullscreen failed:\", err);\n          }\n        }\n      }\n    }\n\n    async function primeDurations() {\n      for (const track of state.tracks.slice(0, 120)) {\n        if (state.durationCache.has(track.path)) continue;\n        try {\n          const file = await getFileForTrack(track);\n          if (!file) continue;\n          const url = URL.createObjectURL(file);\n          const audio = document.createElement(\"audio\");\n          audio.preload = \"metadata\";\n          audio.src = url;\n          await new Promise(resolve => {\n            const done = () => {\n              state.durationCache.set(track.path, isFinite(audio.duration) ? audio.duration : 0);\n              URL.revokeObjectURL(url);\n              resolve();\n            };\n            audio.addEventListener(\"loadedmetadata\", done, { once: true });\n            audio.addEventListener(\"error\", done, { once: true });\n          });\n        } catch (err) {\n          console.error(err);\n        }\n      }\n      renderPlaylist();\n      updateNowPlaying();\n    }\n\n    el.openBtn.addEventListener(\"click\", loadPickedDirectory);\n    el.playBtn.addEventListener(\"click\", () => handlePlayPauseClick(el.playBtn));\n    el.playTopBtn.addEventListener(\"click\", () => handlePlayPauseClick(el.playTopBtn));\n    el.prevBtn.addEventListener(\"click\", () => playAdjacent(-1));\n    el.nextBtn.addEventListener(\"click\", () => playAdjacent(1));\n    el.fsPrevBtn.addEventListener(\"click\", () => playAdjacent(-1));\n    el.fsNextBtn.addEventListener(\"click\", () => playAdjacent(1));\n    el.fsPlayBtn.addEventListener(\"click\", () => handlePlayPauseClick(el.fsPlayBtn));\n\n    el.stopBtn.addEventListener(\"click\", () => stopPlayback(false));\n    el.fsStopBtn.addEventListener(\"click\", () => stopPlayback(false));\n\n    const syncToggleButtons = () => {\n      el.shuffleBtn.classList.toggle(\"active\", state.shuffle);\n      el.repeatBtn.classList.toggle(\"active\", state.repeat);\n      el.fsShuffleBtn.classList.toggle(\"active\", state.shuffle);\n      el.fsRepeatBtn.classList.toggle(\"active\", state.repeat);\n    };\n\n    const toggleShuffle = () => {\n      state.shuffle = !state.shuffle;\n      syncToggleButtons();\n      updatePlaylistStats();\n    };\n\n    const toggleRepeat = () => {\n      state.repeat = !state.repeat;\n      syncToggleButtons();\n      updatePlaylistStats();\n    };\n\n    el.shuffleBtn.addEventListener(\"click\", toggleShuffle);\n    el.fsShuffleBtn.addEventListener(\"click\", toggleShuffle);\n    el.repeatBtn.addEventListener(\"click\", toggleRepeat);\n    el.fsRepeatBtn.addEventListener(\"click\", toggleRepeat);\n\n    el.visualModeBtn.addEventListener(\"click\", cycleVisualMode);\n    el.fsVisualModeBtn.addEventListener(\"click\", cycleVisualMode);\n    el.fsPlaylistToggleBtn.addEventListener(\"click\", () => setFsPlaylistOpen(!state.fsPlaylistOpen));\n\n    window.addEventListener(\"resize\", () => {\n      if (state.fsPlaylistOpen) positionFsPlaylistPopup();\n    });\n\n    function handleSeekInput(sourceBar, targetTimeEl) {\n      state.isSeeking = true;\n      const duration = el.audioPlayer.duration || 0;\n      const value = Number(sourceBar.value) / 1000;\n      el.seekBar.value = sourceBar.value;\n      el.fsSeekBar.value = sourceBar.value;\n      syncSeekProgress(el.seekBar);\n      syncSeekProgress(el.fsSeekBar);\n      el.currentTime.textContent = formatTime(duration * value);\n      el.fsCurrentTime.textContent = formatTime(duration * value);\n      targetTimeEl.textContent = formatTime(duration * value);\n    }\n\n    function handleSeekChange(sourceBar) {\n      const duration = el.audioPlayer.duration || 0;\n      const value = Number(sourceBar.value) / 1000;\n      el.audioPlayer.currentTime = duration * value;\n      el.seekBar.value = sourceBar.value;\n      el.fsSeekBar.value = sourceBar.value;\n      state.isSeeking = false;\n      updateSeekBar();\n    }\n\n    el.seekBar.addEventListener(\"input\", () => handleSeekInput(el.seekBar, el.currentTime));\n    el.fsSeekBar.addEventListener(\"input\", () => handleSeekInput(el.fsSeekBar, el.fsCurrentTime));\n\n    el.seekBar.addEventListener(\"change\", () => handleSeekChange(el.seekBar));\n    el.fsSeekBar.addEventListener(\"change\", () => handleSeekChange(el.fsSeekBar));\n    bindSeekThumbState(el.seekBar);\n    bindSeekThumbState(el.fsSeekBar);\n\n    function syncVolumeSliders(value) {\n      el.volumeSlider.value = String(value);\n      el.fsVolumeSlider.value = String(value);\n      const percentText = `${Math.round(Number(value) * 100)}%`;\n      if (el.volumePercent) el.volumePercent.textContent = percentText;\n      if (el.fsVolumePercent) el.fsVolumePercent.textContent = percentText;\n    }\n\n    function syncSeekProgress(bar) {\n      const min = Number(bar.min || 0);\n      const max = Number(bar.max || 100);\n      const value = Number(bar.value || 0);\n      const percent = max > min ? ((value - min) / (max - min)) * 100 : 0;\n      bar.style.setProperty(\"--seek-progress\", `${percent}%`);\n    }\n\n    function bindSeekThumbState(bar) {\n      if (!bar) return;\n      syncSeekProgress(bar);\n      [\"pointerdown\", \"mousedown\", \"touchstart\"].forEach(evt => {\n        bar.addEventListener(evt, () => bar.classList.add(\"dragging\"));\n      });\n      [\"pointerup\", \"mouseup\", \"touchend\", \"blur\", \"change\"].forEach(evt => {\n        bar.addEventListener(evt, () => bar.classList.remove(\"dragging\"));\n      });\n    }\n\n    el.volumeSlider.addEventListener(\"input\", () => {\n      el.audioPlayer.volume = Number(el.volumeSlider.value);\n      syncVolumeSliders(el.audioPlayer.volume);\n      if (el.audioPlayer.volume > 0 && el.audioPlayer.muted) {\n        el.audioPlayer.muted = false;\n      }\n      syncMuteButtons();\n    });\n\n    el.fsVolumeSlider.addEventListener estionValue);\n        if (!Number.isNaN(index)) {\n          await loadTrack(index, true);\n        }\n        return;\n      }\n\n      await playTopSuggestion(e.currentTarget.value || '');\n    }\n\n    el.searchInput.addEventListener('keydown', handleSearchEnter);\n    el.fsSearchInput.addEventListener('keydown', handleSearchEnter);\n\n    el.clearSearchBtn.addEventListener(\"click\", () => {\n      state.search = \"\";\n      el.searchInput.value = \"\";\n      el.fsSearchInput.value = \"\";\n      hideSearchSuggestions();\n      updateFilter();\n    });\n\n    el.fsClearSearchBtn.addEventListener(\"click\", () => {\n      state.search = \"\";\n      el.searchInput.value = \"\";\n      el.fsSearchInput.value = \"\";\n      hideSearchSuggestions();\n      updateFilter();\n    });\n\n    async function handleSuggestionClick(e) {\n      const button = e.target.closest('[data-suggestion-value]');\n      if (!button) return;\n      const index = Number(button.dataset.trackIndex);\n      applySuggestionValue(button.dataset.suggestionValue || '');\n      if (Number.isNaN(index)) return;\n      await loadTrack(index, true);\n    }\n\n    el.searchSuggestionsPanel.addEventListener('mousedown', (e) => {\n      e.preventDefault();\n      handleSuggestionClick(e);\n    });\n\n    el.fsSearchSuggestionsPanel.addEventListener('mousedown', (e) => {\n      e.preventDefault();\n      handleSuggestionClick(e);\n    });\n\n    async function handlePlaylistClick(e) {\n      const folderRow = e.target.closest(\"[data-folder-path]\");\n      if (folderRow) {\n        const path = normalizePath(folderRow.dataset.folderPath);\n        if (state.expandedFolders.has(path)) state.expandedFolders.delete(path);\n        else state.expandedFolders.add(path);\n        renderPlaylist();\n        return;\n      }\n\n      const row = e.target.closest(\".track-row[data-track-index]\");\n      if (!row) return;\n      const index = Number(row.dataset.trackIndex);\n      if (Number.isNaN(index)) return;\n      await loadTrack(index, true);\n    }\n\n    el.playlistView.addEventListener(\"click\", handlePlaylistClick);\n    el.fsPlaylistView.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n      handlePlaylistClick(e);\n    });\n    el.fsPlaylistPopup.addEventListener(\"click\", (e) => {\n      e.stopPropagation();\n    });\n    el.fsPlaylistPopup.addEventListener(\"mousedown\", (e) => {\n      e.stopPropagation();\n    });\n\n    el.fallbackPicker.addEventListener(\"change\", (e) => {\n      const files = e.target.files;\n      if (files?.length) buildTracksFromFallback(files);\n      e.target.value = \"\";\n    });\n\n    el.audioPlayer.addEventListener(\"play\", updatePlayButtons);\n    el.audioPlayer.addEventListener(\"pause\", updatePlayButtons);\n    el.audioPlayer.addEventListener(\"timeupdate\", () => {\n      updateSeekBar();\n      updateNowPlaying();\n    });\n    el.audioPlayer.addEventListener(\"loadedmetadata\", () => {\n      updateSeekBar();\n      updateNowPlaying();\n    });\n    el.audioPlayer.addEventListener(\"ended\", async () => {\n      if (state.repeat && !state.shuffle && getNextPlayableIndex(1) === -1) {\n        await loadTrack(getFilteredOrder()[0] ?? 0, true);\n        return;\n      }\n      await playAdjacent(1);\n    });\n\n    el.fullscreenBtn.addEventListener(\"click\", toggleFullscreenOverlay);\n    el.fullscreenCloseBtn.addEventListener(\"click\", toggleFullscreenOverlay);\n    el.fullscreenOverlay.addEventListener(\"click\", (e) => {\n      if (!state.fsPlaylistOpen) return;\n      if (e.target.closest(\"#fsPlaylistPopup\") || e.target.closest(\"#fsPlaylistToggleBtn\")) return;\n      setFsPlaylistOpen(false);\n    });\n\n    document.addEventListener(\"fullscreenchange\", () => {\n      if (!getFullscreenElement() && el.fullscreenOverlay.classList.contains(\"open\")) {\n        closeFullscreenOverlayUI();\n      }\n    });\n\n    document.addEventListener(\"webkitfullscreenchange\", () => {\n      if (!getFullscreenElement() && el.fullscreenOverlay.classList.contains(\"open\")) {\n        closeFullscreenOverlayUI();\n      }\n    });\n\n    window.addEventListener(\"keydown\", async (e) => {\n      const tag = (e.target.tagName || \"\").toLowerCase();\n      const editing = tag === \"input\" || tag === \"textarea\";\n\n      if (editing) {\n        if (e.key === \"Escape\") e.target.blur();\n        return;\n      }\n\n      if (e.code === \"Space\") {\n        e.preventDefault();\n        await togglePlay();\n        return;\n      }\n\n      if (e.key === \"ArrowRight\") {\n        e.preventDefault();\n        el.audioPlayer.currentTime = Math.min((el.audioPlayer.duration || 0), (el.audioPlayer.currentTime || 0) + 5);\n        updateSeekBar();\n        return;\n      }\n\n      if (e.key === \"ArrowLeft\") {\n        e.preventDefault();\n        el.audioPlayer.currentTime = Math.max(0, (el.audioPlayer.currentTime || 0) - 5);\n        updateSeekBar();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"f\") {\n        e.preventDefault();\n        toggleFullscreenOverlay();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"m\") {\n        e.preventDefault();\n        toggleMute();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"s\") {\n        e.preventDefault();\n        state.shuffle = !state.shuffle;\n        el.shuffleBtn.classList.toggle(\"active\", state.shuffle);\n        updatePlaylistStats();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"r\") {\n        e.preventDefault();\n        state.repeat = !state.repeat;\n        el.repeatBtn.classList.toggle(\"active\", state.repeat);\n        updatePlaylistStats();\n        return;\n      }\n\n      if (e.key.toLowerCase() === \"v\") {\n        e.preventDefault();\n        cycleVisualMode();\n        return;\n      }\n\n      if (e.key === \"Escape\" && el.fullscreenOverlay.classList.contains(\"open\")) {\n        e.preventDefault();\n        toggleF function getModeFromUrl() {
    const params = new URLSearchParams(location.search);
    const mode = params.get("mode");
    return APP_SOURCES[mode] ? mode : "file-browser";
}

function setModeInUrl(mode) {
    const url = new URL(location.href);
    url.searchParams.set("mode", mode);
    location.href = url.toString();
}

function updateLayoutOffset() {
    const overlay = document.getElementById("overlay-container");
    const h = Math.ceil(overlay.getBoundingClientRect().height || 60);
    document.documentElement.style.setProperty("--overlay-height", h + "px");
}

async function loadOverlay() {
    const container = document.getElementById("overlay-container");
    const overlayPaths = ["./overlay.html", "/overlay.html", "overlay.html"];

    for (const path of overlayPaths) {
        try {
            const res = await fetch(path, { cache: "no-store" });
            if (!res.ok) continue;

            const html = await res.text();
            const temp = document.createElement("div");
            temp.innerHTML = html;

            const fragment = document.createDocumentFragment();
            const scripts = [];

            Array.from(temp.childNodes).forEach((node) => {
                if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                    scripts.push(node);
                } else {
                    fragment.appendChild(node.cloneNode(true));
                }
            });

            container.innerHTML = "";
            container.appendChild(fragment);

            scripts.forEach((oldScript) => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach((attr) => {
                    newScript.setAttribute(attr.name, attr.value);
                });
                newScript.textContent = oldScript.textContent;
                container.appendChild(newScript);
            });

            requestAnimationFrame(() => {
                updateLayoutOffset();
                requestAnimationFrame(updateLayoutOffset);
            });

            if (!window.__mergedOverlayResizeBound) {
                window.addEventListener("resize", updateLayoutOffset);
                window.addEventListener("orientationchange", updateLayoutOffset);
                window.__mergedOverlayResizeBound = true;
            }

            if (window.ResizeObserver && !window.__mergedOverlayResizeObserver) {
                window.__mergedOverlayResizeObserver = new ResizeObserver(updateLayoutOffset);
            }

            if (window.__mergedOverlayResizeObserver) {
                window.__mergedOverlayResizeObserver.disconnect();
                window.__mergedOverlayResizeObserver.observe(container);
            }

            return;
        } catch (err) {
            console.error(`Overlay load failed from ${path}:`, err);
        }
    }

    console.error("Error loading overlay: no overlay.html path succeeded.");
}

function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    if (sidebar) sidebar.classList.toggle("open");
}

function toggleStatsPanel() {
    const panel = document.getElementById("nerd-stats");
    if (panel.style.display === "block") {
        panel.style.display = "none";
        return;
    }
    panel.style.display = "block";
    updateStats();
}

function updateStats() {
    const panel = document.getElementById("nerd-stats");
    const domNodes = document.querySelectorAll("*").length;
    const resources = performance.getEntriesByType("resource").length;
    let memory = "N/A";
    if (performance.memory) memory = Math.round(performance.memory.usedJSHeapSize / 1048576) + " MB";
    const runtime = Math.round(performance.now());
    panel.innerHTML = `<b>Stats for Nerds</b><br><br>
DOM Nodes: ${domNodes}<br>
Resources Loaded: ${resources}<br>
Heap Memory: ${memory}<br>
Page Runtime: ${runtime} ms`;
}

window.addEventListener("message", e => {
    if (e.data && e.data.type === "openStats") toggleStatsPanel();
});

function removeInjectedAppArtifacts() {
    document.querySelectorAll("[data-injected-app-style]").forEach(el => el.remove());
    document.querySelectorAll("[data-injected-app-script-src]").forEach(el => el.remove());
}

async function injectApp(mode) {
    const source = APP_SOURCES[mode];
    const appView = document.getElementById("app-view");
    removeInjectedAppArtifacts();

    if (source.styles) {
        const style = document.createElement("style");
        style.setAttribute("data-injected-app-style", mode);
        style.textContent = source.styles;
        document.head.appendChild(style);
    }

    appView.innerHTML = source.body;

    for (const scriptDef of source.scripts) {
        if (scriptDef.src) {
            if (document.querySelector(`script[data-injected-app-script-src="${scriptDef.src}"]`)) continue;
            await new Promise((resolve, reject) => {
                const s = document.createElement("script");
                s.src = scriptDef.src;
                s.async = false;
                s.setAttribute("data-injected-app-script-src", scriptDef.src);
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        } else if (scriptDef.content && scriptDef.content.trim()) {
            const s = document.createElement("script");
            s.textContent = `(function(){\n${scriptDef.content.replace(/<\/script>/gi, '<\\/script>')}\n})();`;
            document.body.appendChild(s);
            s.remove();
        }
    }
}

document.getElementById("explorer-mode-select").addEventListener("change", (e) => {
    setModeInUrl(e.target.value);
});

const currentMode = getModeFromUrl();
document.getElementById("explorer-mode-select").value = currentMode;
injectApp(currentMode).catch(err => console.error("Error loading app:", err));
loadOverlay();
window.addEventListener("resize", updateLayoutOffset);
window.addEventListener("orientationchange", updateLayoutOffset);
window.addEventListener("load", updateLayoutOffset);
</script>
