<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite's Chat</title>

<style>

html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:"Courier New", monospace;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    border:none;
    overflow:hidden;
    z-index:1000;
}

/* main content iframe fills remaining space under overlay */
#main-frame{
    position:absolute;
    top:60px;
    left:0;
    width:100vw;
    height:calc(100vh - 60px);
    border:none;
    display:block;
}

/* Stats panel */

#nerd-stats{
    position:fixed;
    bottom:10px;
    right:10px;
    width:280px;
    background:black;
    color:lime;
    font-size:12px;
    padding:10px;
    border:2px solid lime;
    display:none;
    z-index:999999;
}

</style>

</head>

<body>

<div id="overlay-container"></div>

<div id="main-frame">
    <script id="cid0020000434258031574" data-cfasync="false" async src="//st.chatango.com/js/gz/emb.js" style="width: 100%;height: 100%;">{"handle":"theinternetisdead","arch":"js","styles":{"a":"6600cc","b":100,"c":"FFFFFF","d":"FFFFFF","k":"6600cc","l":"6600cc","m":"6600cc","n":"FFFFFF","p":"12.78","q":"6600cc","r":100}}</script>
</div>

<div id="nerd-stats"></div>

<script>

/* load overlay */

fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

/* listen for overlay messages */

window.addEventListener("message", e=>{
    if(e.data && e.data.type==="openStats"){
        toggleStatsPanel();
    }
});

/* stats panel */

function toggleStatsPanel(){

    const panel=document.getElementById("nerd-stats");

    if(panel.style.display==="block"){
        panel.style.display="none";
        return;
    }

    panel.style.display="block";

    updateStats();

}

function updateStats(){

    const panel=document.getElementById("nerd-stats");

    const domNodes=document.querySelectorAll("*").length;
    const resources=performance.getEntriesByType("resource").length;

    let memory="N/A";
    if(performance.memory){
        memory=Math.round(performance.memory.usedJSHeapSize/1048576)+" MB";
    }

    const runtime=Math.round(performance.now());

    panel.innerHTML=`
<b>Stats for Nerds</b><br><br>
DOM Nodes: ${domNodes}<br>
Resources Loaded: ${resources}<br>
Heap Memory: ${memory}<br>
Page Runtime: ${runtime} ms
`;

}

</script>

</body>
</html>
