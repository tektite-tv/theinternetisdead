<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>theinternetisdead.org | feeds</title>

<style>
:root{
--page-bg:black;
--page-background:var(--page-bg);
--panel-bg:rgba(75,0,118,.5);
--panel-background:var(--panel-bg);
--page-text:#00ff00;
--accent-color:var(--page-text);
--header-bg:rgba(75,0,118,.5);
--button-hover-bg:#001a00;
--tektite-logo-filter: rgba(0, 255, 0, 0);
--thumbnail-filter: rgba(0, 255, 0, 0);
--page-font-family:"Courier New", monospace;
--page-font-scale:1;
}
html,body{
overflow-x:hidden;

background:var(--page-background);
color:var(--page-text);
font-family:var(--page-font-family);
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
font-size:calc(16px * var(--page-font-scale));
}

/* MODIFIED: page font scaling should affect text only.
   It must ignore images, so do not zoom the full document. */
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:var(--header-bg);
position:relative;
z-index:20;
}

.channelHeader{display:flex;align-items:center;gap:18px;}
.channelHeader a{
display:flex;
align-items:center;
text-decoration:none;
color:inherit;
}
.channelHeader .logoLink{
position:relative;
display:inline-flex;
align-items:center;
isolation:isolate;
background:#000;
border:1px solid var(--accent-color);
padding:6px 8px;
}
.channelLogo{height:50px;width:auto;display:block;}
.channelLogoTintLayer,
.thumbTintLayer{
position:absolute;
inset:0;
pointer-events:none;
mix-blend-mode:color;
-webkit-mask-image:var(--tint-mask);
mask-image:var(--tint-mask);
-webkit-mask-repeat:no-repeat;
mask-repeat:no-repeat;
-webkit-mask-position:center;
mask-position:center;
-webkit-mask-size:contain;
mask-size:contain;
}
.channelLogoTintLayer{
background:var(--tektite-logo-filter);
}

.thumbTintLayer{
background:var(--thumbnail-filter);
-webkit-mask-size:cover;
mask-size:cover;
}
.channelTitle{
font-size:calc(21px * var(--page-font-scale));
font-weight:bold;
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}
.channelHandleLink{
display:inline-flex !important;
align-items:center;
gap:8px;
color:inherit;
text-decoration:none;
line-height:1;
background:#000;
border:1px solid var(--accent-color);
padding:6px 10px;
}
.channelHandleAvatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
display:block;
border:1px solid var(--accent-color);
}
.channelHandleSeparator{
display:inline-flex;
align-items:center;
line-height:1;
}

.controls{display:flex;align-items:center;gap:12px;position:relative;z-index:21;}

@keyframes overlay-ui-hueshift {
from { filter: hue-rotate(0deg); }
to { filter: hue-rotate(360deg); }
}

a:hover,
a:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
}

#videoTitle a[href*="youtube.com"],
#videoTitle a[href*="youtu.be"]{
display:inline-flex;
align-items:center;
justify-content:center;
background:#000;
border:1px solid var(--accent-color);
padding:6px 10px;
}

#videoSearch{
width:220px;height:40px;
border:2px solid var(--accent-color);
background:var(--panel-background);
color:var(--page-text);
padding:0 12px;
font-family:var(--page-font-family);
}

#videoSearch::placeholder{
color:var(--page-text);
opacity:1;
}

button{
height:40px;padding:0 16px;
border:2px solid var(--accent-color);
background:var(--panel-background);color:var(--page-text);
cursor:pointer;
font-family:var(--page-font-family);
}

button:hover{background:var(--button-hover-bg);}

#gridMenu{
position:absolute;
top:50px;
right:0;
background:var(--panel-background);
border:2px solid var(--accent-color);
padding:25px;
display:none;
z-index:999;
}

#gridControl{
width:220px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.gridMenuLabel{
font-size:calc(14px * var(--page-font-scale));
white-space:nowrap;
}

#gridPageSelect{
height:40px;
min-width:108px;
border:2px solid var(--accent-color);
background:var(--panel-background);
color:var(--page-text);
padding:0 12px;
font-family:var(--page-font-family);
}

#posts{padding:20px;}

.grid{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:20px;}

.list .post{
display:flex;
align-items:center;
gap:16px;
margin-bottom:16px;
border:2px solid var(--accent-color);
padding:10px;
background:var(--panel-background);
}

.grid .post{
border:2px solid var(--accent-color);
padding:10px;
cursor:pointer;
background:var(--panel-background);
}

.thumb-grid{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid var(--accent-color);
margin-bottom:10px;
background:var(--panel-background);
position:relative;
isolation:isolate;
}

.thumb-grid img{width:100%;height:100%;object-fit:cover;display:block;}

.thumb-list{width:160px;border:2px solid var(--accent-color);background:var(--panel-background);position:relative;overflow:hidden;isolation:isolate;}
.thumb-list img{width:100%;display:block;}

.post-title{font-size:calc(16px * var(--page-font-scale));}
.post-date{font-size:calc(12px * var(--page-font-scale));opacity:.7;}

#loadMore{
display:block;
margin:40px auto 60px auto;
padding:12px 30px;
font-size:calc(18px * var(--page-font-scale));
border:2px solid var(--accent-color);
background:var(--panel-background);
color:var(--page-text);
cursor:pointer;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:var(--panel-background);
display:none;
flex-direction:column;
align-items:center;
justify-content:flex-start;
z-index:99999;
padding-top:0;
}

#videoTitle{
padding-top:5px;
font-size:calc(22px * var(--page-font-scale));
margin:0 0 16px 0;
text-align:center;
max-width:90vw;
}

#lightbox iframe{
width:min(48vw,640px);
aspect-ratio:16/9;
height:auto;
display:block;
margin:0 auto;
border:2px solid var(--accent-color);
}


#videoExcerpt{
font-size:calc(22px * var(--page-font-scale));
color:var(--page-text);
text-align:center;
max-width:80vw;
margin-top:10px;
}

#videoExcerpt a{
color:var(--page-text);
text-decoration:none;
cursor:pointer;
}

#videoFull{
max-width:80vw;
margin:16px auto 10px;
display:none;
line-height:1.4;
white-space:pre-wrap;
text-align:center;
border-top:1px solid var(--accent-color);
padding-top:16px;
}


#closeVideo{
font-size:calc(22px * var(--page-font-scale));
color:var(--page-text);
text-align:center;
cursor:pointer;
margin:12px 0;
}
#closeVideo:hover{
text-decoration:underline;
}

#videoMeta{
margin-top:18px;
font-size:calc(20px * var(--page-font-scale));
font-weight:700;
opacity:1;
color:var(--accent-color);
text-align:center;
max-width:80vw;
line-height:1.4;
}

#videoMeta .videoMetaLine{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
gap:10px;
}

#videoMeta .videoMetaChannelLink{
display:inline-flex;
align-items:center;
gap:10px;
color:inherit;
text-decoration:none;
}

#videoMeta .videoMetaAvatar{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
display:block;
border:1px solid var(--accent-color);
}

#videoMeta .videoMetaDivider{
opacity:.85;
}

#lightboxClose{
position:absolute;
top:20px;right:20px;
font-size:calc(28px * var(--page-font-scale));
cursor:pointer;
}

.status{text-align:center;padding:10px;}


@media (max-width: 768px){
header{
padding:14px 12px 12px;
flex-direction:column;
align-items:stretch;
gap:10px;
}

.channelHeader{
gap:12px;
flex-wrap:nowrap;
align-items:center;
}

.channelHeader a{
min-width:0;
}

.channelLogo{
height:50px;
width:auto;
flex:0 0 auto;
}

.channelTitle{
font-size:calc(22px * var(--page-font-scale));
line-height:1.05;
white-space:normal;
overflow:visible;
text-overflow:clip;
text-align:left;
min-width:0;
flex:1 1 auto;
}

.controls{
width:100%;
display:block;
}

#videoSearch{
width:100%;
height:46px;
box-sizing:border-box;
font-size:calc(16px * var(--page-font-scale));
}

#listBtn,
#gridBtn,
#modeBtn,
#gridMenu{
display:none !important;
}

#posts{
padding:12px 8px 20px;
}

.grid{
grid-template-columns:1fr;
gap:14px;
}

.grid .post,
.list .post{
padding:8px;
}

.post-title{
font-size:calc(15px * var(--page-font-scale));
line-height:1.2;
}

#loadMore{
margin:28px auto 40px;
font-size:calc(16px * var(--page-font-scale));
padding:10px 22px;
}

#lightbox iframe{
width:92vw;
}
}


</style>
</head>

<body>


<header>

<div class="channelHeader">
<a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="logoLink" id="channelHomeLink">
<img src="/media/images/png/oldtube.png" class="channelLogo" alt="Channel feed logo">
<span class="channelLogoTintLayer" aria-hidden="true" style="--tint-mask: url('/media/images/png/oldtube.png');"></span>
</a>
<div class="channelTitle" id="channelTitle"><a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/media/images/png/honestly-thomas.png" class="channelHandleAvatar" alt="Honestly Thomas avatar"><span>@Honestly_Thomas</span></a><span class="channelHandleSeparator">+</span><a href="https://www.youtube.com/@Cryptid_Memes" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/media/images/png/cryptid-memes.png" class="channelHandleAvatar" alt="Cryptid Memes avatar"><span>@Cryptid_Memes</span></a></div>
</div>

<input id="videoSearch" placeholder="Search Feed...">

<select id="gridPageSelect"></select>

</div>

</div>

</div>

</header>

<div id="posts" class="grid"></div>
<div id="cubeContainer" style="display:none;width:100%;height:70vh;position:relative;"></div>
<div id="status" class="status">LOADING FEED...</div>

<button id="loadMore">Load More</button>

<div id="lightbox">
<div id="videoTitle"></div>
<iframe id="lightboxFrame" src="" allowfullscreen></iframe>
<div id="videoFull"></div>
<div id="videoMeta"></div>
<div id="closeVideo">[CLOSE VIDEO]</div>
</div>

<script>

const FEED_DATA_PATH="/pages/feeds/feed-videos.json";
const FALLBACK_FEED_DATA_PATH="/pages/youtube-list-grid/videos.json";
const HONESTLY_THOMAS_URL="https://www.youtube.com/@Honestly_Thomas";
const CRYPTID_MEMES_URL="https://www.youtube.com/@Cryptid_Memes";
const HONESTLY_THOMAS_AVATAR="/media/images/png/honestly-thomas.png";
const CRYPTID_MEMES_AVATAR="/media/images/png/cryptid-memes.png";

function updateTintFilters(){
  // Tints are handled by mask-based overlay layers, matching overlay.html.
  return true;
}

window.updateTintFilters = updateTintFilters;

let posts=[];
let filtered=[];
let view="grid";
const sortModes=["newest","oldest","most-viewed","least-viewed"];
let sortModeIndex=2;

let gridSize=3;
let gridPageCount=1;
let visible=9;

function isMobile(){
return window.matchMedia("(max-width: 768px)").matches;
}

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const searchInput=document.getElementById("videoSearch");
const loadBtn=document.getElementById("loadMore");
const gridMenu=document.getElementById("gridMenu");
const gridBtn=document.getElementById("gridBtn");
const channelHomeLink=document.getElementById("channelHomeLink");
const channelTitleEl=document.getElementById("channelTitle");

const gridPageSelect=document.getElementById("gridPageSelect");

const lightbox=document.getElementById("lightbox");
const frame=document.getElementById("lightboxFrame");
const modeBtn=document.getElementById("modeBtn");
const channelLogoLinks = Array.from(document.querySelectorAll('.logoLink'));
const defaultChannelLogoUrls = [
"/media/images/png/oldtube.png",
"/media/images/png/oldtube-alt-1.png",
"/media/images/png/oldtube-alt-2.png"
];
let customChannelLogoUrls = [];
let channelLogoHoverIntervalId = null;
let channelLogoHoverIndex = 0;
const channelLogoHoverIntervalMs = 2000;

function getActiveChannelLogoUrls(){
return customChannelLogoUrls.length ? [...customChannelLogoUrls] : [...defaultChannelLogoUrls];
}

function getPrimaryChannelLogoUrl(){
return customChannelLogoUrls.length ? customChannelLogoUrls[0] : "/media/images/png/oldtube.png";
}

function applyChannelLogoAsset(logoSrc){
channelLogoLinks.forEach((link)=>{
const img = link.querySelector('.channelLogo');
const layer = link.querySelector('.channelLogoTintLayer');
if(img){
img.src = logoSrc;
img.style.objectFit = 'fill';
}
if(layer){
const safeUrl = String(logoSrc).replace(/'/g, "\'");
layer.style.setProperty('--tint-mask', `url('${safeUrl}')`);
layer.style.webkitMaskSize = '100% 100%';
layer.style.maskSize = '100% 100%';
}
});
}

function stopChannelLogoHoverCycle(resetToPrimary = true){
if(channelLogoHoverIntervalId !== null){
window.clearInterval(channelLogoHoverIntervalId);
channelLogoHoverIntervalId = null;
}
channelLogoHoverIndex = 0;
if(resetToPrimary){
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
}
}

function startChannelLogoHoverCycle(){
const urls = getActiveChannelLogoUrls();
if(urls.length <= 1) return;
stopChannelLogoHoverCycle(false);
channelLogoHoverIndex = 1 % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
channelLogoHoverIntervalId = window.setInterval(()=>{
channelLogoHoverIndex = (channelLogoHoverIndex + 1) % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
}, channelLogoHoverIntervalMs);
}

function bindChannelLogoHoverCycle(){
channelLogoLinks.forEach((link)=>{
if(link.dataset.hoverCycleBound === 'true') return;
link.addEventListener('mouseenter', ()=>{
if(getActiveChannelLogoUrls().length > 1){
startChannelLogoHoverCycle();
}
});
link.addEventListener('mouseleave', ()=>{
stopChannelLogoHoverCycle(true);
});
link.dataset.hoverCycleBound = 'true';
});
}

window.setTektiteLogoUrls = function setTektiteLogoUrls(urls){
customChannelLogoUrls = Array.isArray(urls)
? urls.map((url)=>String(url || '').trim()).filter(Boolean)
: [];
stopChannelLogoHoverCycle(false);
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
updateTintFilters();
return true;
};

window.resetTektiteLogoUrls = function resetTektiteLogoUrls(){
customChannelLogoUrls = [];
stopChannelLogoHoverCycle(false);
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
updateTintFilters();
return true;
};

function getGridVisibleCount(){
return isMobile()
? gridPageCount * gridSize
: gridSize * (gridSize + gridPageCount - 1);
}

function getMaxGridPages(){
if(isMobile()){
return Math.max(1, Math.ceil(filtered.length / gridSize));
}
const baseVisible = gridSize * gridSize;
return Math.max(1, Math.ceil(Math.max(filtered.length - baseVisible, 0) / gridSize) + 1);
}

function updateGridPageOptions(){
const maxPages = getMaxGridPages();
gridPageCount = Math.max(1, Math.min(gridPageCount, maxPages));
gridPageSelect.innerHTML = "";

for(let page=1; page<=maxPages; page++){
const option=document.createElement("option");
option.value=String(page);
option.textContent=`Page ${page}`;
gridPageSelect.appendChild(option);
}

gridPageSelect.value=String(gridPageCount);
}

function syncGridPaging(){
updateGridPageOptions();
visible = view==="list" ? 3 : getGridVisibleCount();
}

gridPageSelect.addEventListener("change",()=>{
gridPageCount=Math.max(1, parseInt(gridPageSelect.value, 10) || 1);
if(view==="grid"){
visible=getGridVisibleCount();
render();
}
});

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");
}

function parseUploadDate(value){
const raw = String(value || "").trim();
if(!/^\d{8}$/.test(raw)) return 0;
const year = Number(raw.slice(0,4));
const month = Number(raw.slice(4,6)) - 1;
const day = Number(raw.slice(6,8));
return Date.UTC(year, month, day) / 1000;
}

function getSortableTimestamp(video){
if(Number.isFinite(video.release_timestamp)) return video.release_timestamp;
if(Number.isFinite(video.timestamp)) return video.timestamp;
const parsedUploadDate = parseUploadDate(video.upload_date);
if(parsedUploadDate) return parsedUploadDate;
return 0;
}

function formatVideoDate(post){
const timestamp = Number(post.sortTimestamp || 0);
if(!timestamp) return "";
return new Date(timestamp * 1000).toLocaleDateString(undefined, {
year: "numeric",
month: "short",
day: "numeric"
});
}

function formatViewCount(value){
const count = Number(value || 0);
if(!Number.isFinite(count) || count <= 0) return "";
return `${count.toLocaleString()} view${count === 1 ? "" : "s"}`;
}

function buildPostMeta(post){
const bits = [];
const sourceLabel = post.channel || post.uploader || "";
const formattedDate = formatVideoDate(post);
const formattedViews = formatViewCount(post.views);
if(sourceLabel) bits.push(sourceLabel);
if(formattedDate) bits.push(formattedDate);
if(formattedViews) bits.push(formattedViews);
return bits.join(" | ");
}

function getChannelAvatarUrl(post){
const sourceLabel = `${post.channel || post.uploader || ""}`.toLowerCase();
return sourceLabel.includes("cryptid") ? CRYPTID_MEMES_AVATAR : HONESTLY_THOMAS_AVATAR;
}

function buildVideoMetaHtml(post){
const items = [];
const sourceLabel = post.channel || post.uploader || "";
const formattedDate = formatVideoDate(post);
const formattedViews = formatViewCount(post.views);

if(sourceLabel){
const avatarSrc = escapeHtml(getChannelAvatarUrl(post));
const safeLabel = escapeHtml(sourceLabel);
const safeUrl = escapeHtml(post.channelUrl || "");
const channelInner = `<img src="${avatarSrc}" class="videoMetaAvatar" alt="${safeLabel} avatar"><span>${safeLabel}</span>`;
items.push(safeUrl
? `<a class="videoMetaChannelLink" href="${safeUrl}" target="_blank" rel="noopener noreferrer">${channelInner}</a>`
: `<span class="videoMetaChannelLink">${channelInner}</span>`);
}

if(formattedDate){
items.push(`<span>${escapeHtml(formattedDate)}</span>`);
}

if(formattedViews){
items.push(`<span>${escapeHtml(formattedViews)}</span>`);
}

const content = items.flatMap((item, index)=>index ? [`<span class="videoMetaDivider" aria-hidden="true">|</span>`, item] : [item]).join("");
return `<div class="videoMetaLine">${content}</div>`;
}

function buildThumbnailCandidates(video){
const thumbs = Array.isArray(video.thumbnails) ? video.thumbnails.filter(Boolean) : [];
const thumbUrls = thumbs.map((thumb)=>String(thumb && thumb.url || "")).filter(Boolean);
const rankedPatterns = [
/maxresdefault\.(jpg|webp)/i,
/sddefault\.(jpg|webp)/i,
/hqdefault\.(jpg|webp)/i,
/mqdefault\.(jpg|webp)/i,
/default\.(jpg|webp)/i
];
const candidates = [];

function addCandidate(url){
if(url && !candidates.includes(url)) candidates.push(url);
}

for(const pattern of rankedPatterns){
const match = thumbUrls.find((url)=>pattern.test(url));
addCandidate(match);
}

thumbUrls.forEach(addCandidate);
[
`https://i.ytimg.com/vi/${video.id}/maxresdefault.jpg`,
`https://i.ytimg.com/vi/${video.id}/sddefault.jpg`,
`https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`,
`https://i.ytimg.com/vi/${video.id}/mqdefault.jpg`,
`https://i.ytimg.com/vi/${video.id}/default.jpg`
].forEach(addCandidate);

return candidates;
}

function pickThumbnailUrl(video){
return buildThumbnailCandidates(video)[0] || `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;
}

function applyThumbnailSource(img, layer, url){
img.src = url;
if(layer){
const safeUrl = String(url).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
}
}

function attachThumbnailFallback(post, card){
const img = card.querySelector("img");
const layer = card.querySelector(".thumbTintLayer");
const candidates = Array.isArray(post.thumbCandidates) && post.thumbCandidates.length
? post.thumbCandidates
: [post.thumb].filter(Boolean);

if(!img || !candidates.length) return;

let thumbIndex = 0;
img.onerror = ()=>{
thumbIndex += 1;
if(thumbIndex >= candidates.length){
img.onerror = null;
return;
}
applyThumbnailSource(img, layer, candidates[thumbIndex]);
};

applyThumbnailSource(img, layer, candidates[thumbIndex]);
}

function getRandomChannelUrl(){
return Math.random() < 0.5 ? HONESTLY_THOMAS_URL : CRYPTID_MEMES_URL;
}

function getFilteredPosts(query){
const normalizedQuery = String(query || "").trim().toLowerCase();
const matches = normalizedQuery
? posts.filter((post)=>`${post.title} ${post.description} ${post.channel} ${post.uploader}`.toLowerCase().includes(normalizedQuery))
: [...posts];
return matches.sort((a,b)=>{
const aTimestamp = Number(a.sortTimestamp || 0);
const bTimestamp = Number(b.sortTimestamp || 0);
const aViews = Number(a.views || 0);
const bViews = Number(b.views || 0);
const sortMode = sortModes[sortModeIndex];

if(sortMode === "newest" || sortMode === "oldest"){
if(aTimestamp !== bTimestamp){
return sortMode === "newest" ? bTimestamp - aTimestamp : aTimestamp - bTimestamp;
}
if(aViews !== bViews){
return bViews - aViews;
}
}else{
if(aViews !== bViews){
return sortMode === "most-viewed" ? bViews - aViews : aViews - bViews;
}
if(aTimestamp !== bTimestamp){
return bTimestamp - aTimestamp;
}
}
return a.sourceIndex - b.sourceIndex;
});
}

function refreshFilteredPosts(){
filtered = getFilteredPosts(searchInput.value);
}

function updateSortButton(){
const sortMode = sortModes[sortModeIndex];
if(sortMode === "newest"){
modeBtn.textContent = "NEWEST ↓";
modeBtn.title = "Sorting newest to oldest";
}else if(sortMode === "oldest"){
modeBtn.textContent = "OLDEST ↑";
modeBtn.title = "Sorting oldest to newest";
}else if(sortMode === "most-viewed"){
modeBtn.textContent = "VIEWS ↓";
modeBtn.title = "Sorting highest views to lowest";
}else{
modeBtn.textContent = "VIEWS ↑";
modeBtn.title = "Sorting lowest views to highest";
}
modeBtn.setAttribute("aria-label", modeBtn.title);
}

}

async function fetchJson(path){
const response = await fetch(path, { cache: "no-store" });
if(!response.ok) throw new Error(`${path} failed`);
return response.json();
}

function normalizeLegacyFeedData(data){
const channelMeta = {
channel: data.channel || data.uploader || "",
channel_id: data.channel_id || data.id || "",
channel_url: data.channel_url || data.uploader_url || "",
uploader: data.uploader || data.channel || "",
uploader_url: data.uploader_url || data.channel_url || ""
};

const entries = Array.isArray(data.entries)
? data.entries.map((entry)=>({
...entry,
channel: entry?.channel || channelMeta.channel,
channel_id: entry?.channel_id || channelMeta.channel_id,
channel_url: entry?.channel_url || channelMeta.channel_url,
uploader: entry?.uploader || channelMeta.uploader,
uploader_url: entry?.uploader_url || channelMeta.uploader_url
}))
: [];

return {
title: data.title || "Channel Feed",
channels: channelMeta.channel || channelMeta.uploader ? [channelMeta] : [],
entries
};
}

async function loadFeedData(){
let primaryData = null;
let primaryError = null;

try{
primaryData = await fetchJson(FEED_DATA_PATH);
const primaryEntries = Array.isArray(primaryData.entries) ? primaryData.entries : [];
if(primaryEntries.length){
return primaryData;
}
console.warn(`Primary feed at ${FEED_DATA_PATH} is empty; falling back to ${FALLBACK_FEED_DATA_PATH}.`);
}catch(error){
primaryError = error;
console.warn(`Unable to load ${FEED_DATA_PATH}; falling back to ${FALLBACK_FEED_DATA_PATH}.`, error);
}

try{
const fallbackData = normalizeLegacyFeedData(await fetchJson(FALLBACK_FEED_DATA_PATH));
if(Array.isArray(fallbackData.entries) && fallbackData.entries.length){
return fallbackData;
}
}catch(fallbackError){
console.error(`Unable to load fallback feed from ${FALLBACK_FEED_DATA_PATH}.`, fallbackError);
if(primaryError){
throw primaryError;
}
throw fallbackError;
}

return primaryData || { title: "Channel Feed", channels: [], entries: [] };
}




async function loadPosts(){

try{
const data = await loadFeedData();
applyFeedMetadata(data);

posts = (data.entries || []).map((v, index) => {
const thumbCandidates = buildThumbnailCandidates(v);
return ({

id: v.id,
title: v.title || "",
description: v.description || "",
date: "",
duration: v.duration || 0,
views: v.view_count || 0,
thumb: thumbCandidates[0] || pickThumbnailUrl(v),
thumbCandidates,
channel: v.channel || v.uploader || data.channel || data.uploader || "",
uploader: v.uploader || v.channel || data.uploader || data.channel || "",
channelUrl: v.channel_url || v.uploader_url || data.channel_url || data.uploader_url || "",
sourceIndex: index,
sortTimestamp: getSortableTimestamp(v)
});
});

refreshFilteredPosts();

if(!posts.length){
statusEl.textContent="NO FEED ITEMS FOUND";
statusEl.style.display="block";
modeBtn.disabled=true;
loadBtn.style.display="none";
render();
return;
}

statusEl.style.display="none";
modeBtn.disabled=false;

updateSortButton();
syncGridPaging();
render();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED DATA";

}

}



const initialStandalonePath = window.location.pathname;

function notifyVideoRouteChange(action,id){
try{
if(window.parent && window.parent !== window){
window.parent.postMessage({
 type:"feedGridVideoState",
 action,
 videoId:id || ""
}, "*");
return;
}
}catch(e){
console.warn("Unable to notify parent about feed route change", e);
}

const nextUrl = action === "open" && id
 ? `/watch/?v=${encodeURIComponent(id)}`
 : initialStandalonePath;
window.history.replaceState({ videoId: id || null }, "", nextUrl);
}

function closeVideo(){
lightbox.style.display="none";
frame.src="";
notifyVideoRouteChange("close","");
}

function openVideo(post){
if(!post || !post.id) return;
const id = post.id;
const title = post.title || "";
const description = post.description || "";

frame.src="https://www.youtube.com/embed/"+id;
notifyVideoRouteChange("open",id);

document.getElementById("videoTitle").innerHTML =
`<a href="https://youtube.com/watch?v=${id}" target="_blank" style="color:var(--page-text);text-decoration:none;">${title}</a>`;

let clean=(description||"")
.replace(/<br\s*\/?>/gi,"\n")
.replace(/<[^>]*>/g,"")
.trim();

document.getElementById("videoMeta").innerHTML = buildVideoMetaHtml(post);
const videoFullEl = document.getElementById("videoFull");
videoFullEl.textContent = clean;
videoFullEl.style.display = clean ? "block" : "none";

lightbox.style.display="flex";

document.getElementById("closeVideo").onclick = closeVideo;

}

const cubeContainer=document.getElementById("cubeContainer");

function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

modeBtn.onclick=()=>{

if(!posts.length) return;

sortModeIndex = (sortModeIndex + 1) % sortModes.length;
updateSortButton();
refreshFilteredPosts();
render();

}

function buildCube(){

cubeContainer.innerHTML="";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(
70,
cubeContainer.clientWidth/cubeContainer.clientHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
cubeContainer.appendChild(renderer.domElement);

camera.position.z=6;

const light=new THREE.AmbientLight(0xffffff,1);
scene.add(light);

let shuffled=shuffle(filtered);

const materials=[];

function buildFaceTexture(face){

let canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=512;
let ctx=canvas.getContext("2d");

let texture=new THREE.CanvasTexture(canvas);

let cell=canvas.width/gridSize;

for(let y=0;y<gridSize;y++){
for(let x=0;x<gridSize;x++){

let i=face*(gridSize*gridSize)+y*gridSize+x;
let v=shuffled[i];
if(!v) continue;

let img=new Image();
img.crossOrigin="anonymous";
img.src=v.thumb;

img.onload=()=>{
ctx.drawImage(img,x*cell,y*cell,cell,cell);
texture.needsUpdate=true;
};

}
}

return texture;
}

for(let f=0;f<6;f++){
materials.push(new THREE.MeshBasicMaterial({map:buildFaceTexture(f)}));
}

const cube=new THREE.Mesh(
new THREE.BoxGeometry(4,4,4),
materials
);

scene.add(cube);

let dragging=false;
let px=0,py=0;

renderer.domElement.addEventListener("mousedown",e=>{
dragging=true;
px=e.clientX;
py=e.clientY;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",e=>{

if(!dragging) return;

let dx=e.clientX-px;
let dy=e.clientY-py;

cube.rotation.y+=dx*0.01;
cube.rotation.x+=dy*0.01;

px=e.clientX;
py=e.clientY;

});

renderer.domElement.addEventListener("click",e=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((e.clientX-rect.left)/rect.width)*2-1,
-((e.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hits=raycaster.intersectObject(cube);

if(hits.length){

let face=Math.floor(hits[0].faceIndex/2);
let uv=hits[0].uv;

let cellX=Math.floor(uv.x*gridSize);
let cellY=Math.floor((1-uv.y)*gridSize);

let index=face*(gridSize*gridSize)+cellY*gridSize+cellX;

let video=shuffled[index];

if(video){
openVideo(video);
}

}

});

window.addEventListener("resize",()=>{
renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
camera.aspect=cubeContainer.clientWidth/cubeContainer.clientHeight;
camera.updateProjectionMatrix();
});

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

}


window.addEventListener("resize",()=>{
if(view==="grid"){
syncGridPaging();
}
render();
});

window.addEventListener("message", (event) => {
const data = event.data || {};
if (data.type !== "feedGridOpenVideo") return;
const requestedId = String(data.videoId || "").trim();
if (!requestedId) return;
const video = posts.find((post) => post.id === requestedId);
if (!video) return;
openVideo(video);
});

window.tektiteChatApi = {
  setView(nextView){
    view = nextView === 'list' ? 'list' : 'grid';
    if (view === 'list') {
      visible = 3;
      gridMenu.style.display = 'none';
    } else {
      syncGridPaging();
    }
    render();
    return `View set to ${view}`;
  },
  setGridPage(nextPage){
    gridPageCount = Math.max(1, Math.min(getMaxGridPages(), parseInt(nextPage, 10) || 1));
    syncGridPaging();
    render();
    return `Grid page set to ${gridPageCount}`;
  },
  setGridSize(nextSize){
    return this.setGridPage(nextSize);
  },
  search(term){
    const query = String(term || '').trim().toLowerCase();
    searchInput.value = term || '';
    refreshFilteredPosts();
    syncGridPaging();
    render();
    return query ? `Showing ${filtered.length} result(s) for "${term}"` : 'Search cleared';
  },
  toggleSort(){
    modeBtn.click();
    return `Sort is now ${modeBtn.title.toLowerCase()}`;
  },
  toggleMode(){
    return this.toggleSort();
  }
};


document.addEventListener("DOMContentLoaded",()=>{
  channelHomeLink.addEventListener("click", ()=>{

  });
  applyChannelLogoAsset(getPrimaryChannelLogoUrl());
  bindChannelLogoHoverCycle();
  updateTintFilters();
  loadPosts().then(() => {
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get("v");
    if (!requestedId) return;
    const video = posts.find((post) => post.id === requestedId);
    if (!video) return;
    openVideo(video);
  });
});
