<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/media/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>/404.html</title>

<style>
:root{
    --page-bg:#000;
    --page-text:#00ff00;
    --panel-bg:#4b0076;
    --header-bg:rgba(75,0,118,.7);
    --accent:var(--page-text);
    --shadow:0 0 0 2px rgba(0,255,0,.5), 0 0 28px rgba(0,255,0,.18);
}

html,
body{
    margin:0;
    width:100%;
    min-height:100%;
    background:var(--page-bg);
    color:var(--page-text);
    font-family:"Courier New", Courier, monospace;
    overflow-x:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

*{
    box-sizing:border-box;
}

#app-shell{
    position:relative;
    width:100%;
    min-height:100dvh;
    background:
        radial-gradient(circle at top left, rgba(0,255,0,.12), transparent 24%),
        radial-gradient(circle at top right, rgba(128,0,255,.2), transparent 30%),
        linear-gradient(180deg, rgba(75,0,118,.12), transparent 24%),
        #000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#not-found{
    position:relative;
    width:min(760px, calc(100% - 32px));
    margin:0 auto;
    padding:120px 0 40px;
}

#not-found::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        repeating-linear-gradient(
            180deg,
            rgba(255,255,255,.04) 0,
            rgba(255,255,255,.04) 1px,
            transparent 1px,
            transparent 4px
        );
    opacity:.18;
    pointer-events:none;
    mix-blend-mode:screen;
}

.panel{
    position:relative;
    border:2px solid var(--accent);
    background:var(--panel-bg);
    box-shadow:var(--shadow);
    overflow:hidden;
}

.panel-header{
    padding:10px 14px;
    background:var(--header-bg);
    border-bottom:2px solid var(--accent);
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
}

.panel-body{
    padding:24px 22px;
}

.code-404{
    color: #ff0000;
    margin:0;
    font-size:clamp(60px, 14vw, 144px);
    line-height:.92;
    text-shadow:0 0 14px rgba(0,255,0,.4);
}

.headline{
    margin:14px 0 0;
    font-size:clamp(22px, 3.4vw, 34px);
    line-height:1.15;
}

#missing-path {
    color: #ff0000;
}

@media (max-width: 560px){
    #not-found{
        width:min(100% - 20px, 760px);
        padding-top:92px;
    }

    .panel-body{
        padding:18px 16px;
    }
}
</style>
</head>
<body>

<div id="app-shell">
    <div id="overlay-container"></div>

    <main id="not-found" aria-labelledby="missing-page-title">
        <article class="panel">
            <div class="panel-header">Link Rot Detected</div>
            <div class="panel-body">
                <h1 class="code-404">404</h1>
                <h2 class="headline" id="missing-page-title"><span id="missing-path">/404</span> is a dead link <br>you killed it <span id="missing-path">X_X</span></h2>
            </div>
        </article>
    </main>
</div>

<script>
function redirectKnownWatchRoutes(){
    const redirects = {
        "/watch": "/watch/",
        "/pages/feeds/watch": "/dead/pages/feeds/watch/",
        "/pages/youtube-list-grid/watch": "/dead/pages/youtube-list-grid/watch/",
        "/dead/pages/feeds/watch": "/dead/pages/feeds/watch/",
        "/dead/pages/youtube-list-grid/watch": "/dead/pages/youtube-list-grid/watch/"
    };

    const nextPath = redirects[window.location.pathname];
    if(!nextPath) return false;

    window.location.replace(nextPath + (window.location.search || "") + (window.location.hash || ""));
    return true;
}

function renderMissingPath(){
    const missingPath = document.getElementById("missing-path");
    const query = window.location.search || "";
    const hash = window.location.hash || "";
    missingPath.textContent = window.location.pathname + query + hash;
}

async function loadOverlay(){
    try{
        const res = await fetch("/dead/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /dead/pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if(node.nodeName && node.nodeName.toLowerCase() === "script"){
                scripts.push(node);
            }else{
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const notFound = document.getElementById("not-found");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    notFound.style.paddingTop = (overlayHeight + 24) + "px";
}

window.syncOverlayLayout = syncLayout;

if(redirectKnownWatchRoutes()){
    document.documentElement.style.visibility = "hidden";
}

renderMissingPath();
loadOverlay();

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>

<script src="/dead/scripts/screenshot-shortcut.js"></script>
<script src="/dead/scripts/hide-overlay.js"></script>
</body>
</html>
