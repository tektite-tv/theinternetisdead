<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.com/experiments/chat-sandbox/</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#chat-sandbox-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="chat-sandbox-frame" src="/experiments/chat-sandbox/chat-sandbox.html"></iframe>
</div>

<script>
async function loadOverlay(){
    try{
        const res = await fetch("/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

const frame = document.getElementById("chat-sandbox-frame");

const DEFAULT_CLOCK_ZONE = "America/Toronto";
const getSupportedClockZones = (() => {
    let cache = null;
    return () => {
        if (Array.isArray(cache) && cache.length) return cache.slice();
        const zones = typeof Intl.supportedValuesOf === "function"
            ? Intl.supportedValuesOf("timeZone")
            : [DEFAULT_CLOCK_ZONE, "UTC"];
        cache = Array.from(new Set([DEFAULT_CLOCK_ZONE, ...zones])).sort((a, b) => a.localeCompare(b));
        return cache.slice();
    };
})();

function sanitizeClockZone(zone){
    const safeZone = typeof zone === "string" ? zone.trim() : "";
    return getSupportedClockZones().includes(safeZone) ? safeZone : DEFAULT_CLOCK_ZONE;
}

let overlayClockState = {
    mode: "time",
    zone: DEFAULT_CLOCK_ZONE,
    manualTime: "",
    manualDate: ""
};

let siteClockState = {
    zone: DEFAULT_CLOCK_ZONE,
    overrideTimestampMs: null,
    overrideStartedRealMs: null
};

function getTimeZoneFormatter(zone){
    const safeZone = sanitizeClockZone(zone);
    window.__siteClockFormatters = window.__siteClockFormatters || {};
    if (!window.__siteClockFormatters[safeZone]) {
        window.__siteClockFormatters[safeZone] = new Intl.DateTimeFormat("en-CA", {
            timeZone: safeZone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hourCycle: "h23"
        });
    }
    return window.__siteClockFormatters[safeZone];
}

function getTimeZoneParts(date = new Date(), zone = DEFAULT_CLOCK_ZONE){
    const parts = getTimeZoneFormatter(zone).formatToParts(date instanceof Date ? date : new Date(date));
    const read = (type) => Number(parts.find((part) => part.type === type)?.value || 0);
    return {
        year: read("year"),
        month: read("month"),
        day: read("day"),
        hour: read("hour"),
        minute: read("minute"),
        second: read("second")
    };
}

function getTimeZoneOffsetMs(date = new Date(), zone = DEFAULT_CLOCK_ZONE){
    const parts = getTimeZoneParts(date, zone);
    return Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second, 0) - date.getTime();
}

function zonedDateTimeToUtc(parts = {}, zone = DEFAULT_CLOCK_ZONE){
    let guess = Date.UTC(parts.year || 1970, (parts.month || 1) - 1, parts.day || 1, parts.hour || 0, parts.minute || 0, parts.second || 0, 0);
    for(let i = 0; i < 4; i += 1){
        const offset = getTimeZoneOffsetMs(new Date(guess), zone);
        const nextGuess = Date.UTC(parts.year || 1970, (parts.month || 1) - 1, parts.day || 1, parts.hour || 0, parts.minute || 0, parts.second || 0, 0) - offset;
        if(Math.abs(nextGuess - guess) < 1000){
            guess = nextGuess;
            break;
        }
        guess = nextGuess;
    }
    return guess;
}

function parseClockTimeInput(input = ""){
    const normalized = String(input || "").trim().toLowerCase();
    const match = normalized.match(/^(\d{1,2})(?::(\d{2}))?(?::(\d{2}))?\s*([ap]m)?$/i);
    if(!match) return null;
    let hour = Number(match[1]);
    const minute = Number(match[2] || "0");
    const second = Number(match[3] || "0");
    const meridiem = match[4] || "";
    if(minute > 59 || second > 59) return null;
    if(meridiem){
        if(hour < 1 || hour > 12) return null;
        if(meridiem === "am"){
            if(hour === 12) hour = 0;
        }else if(hour !== 12){
            hour += 12;
        }
    }else if(hour > 23){
        return null;
    }
    return { hour, minute, second };
}

function parseClockDateInput(input = ""){
    const normalized = String(input || "").trim().replace(/\//g, " ");
    if(!normalized) return null;
    const parsed = new Date(normalized);
    if(Number.isNaN(parsed.getTime())) return null;
    return {
        year: parsed.getFullYear(),
        month: parsed.getMonth() + 1,
        day: parsed.getDate()
    };
}

function getSiteClockState(){
    return {
        zone: sanitizeClockZone(siteClockState.zone),
        overrideTimestampMs: Number.isFinite(siteClockState.overrideTimestampMs) ? siteClockState.overrideTimestampMs : null,
        overrideStartedRealMs: Number.isFinite(siteClockState.overrideStartedRealMs) ? siteClockState.overrideStartedRealMs : null
    };
}

function setSiteClockState(nextState = {}){
    const current = getSiteClockState();
    siteClockState = {
        zone: sanitizeClockZone(nextState.zone !== undefined ? nextState.zone : current.zone),
        overrideTimestampMs: nextState.overrideTimestampMs === null ? null : (Number.isFinite(nextState.overrideTimestampMs) ? Number(nextState.overrideTimestampMs) : current.overrideTimestampMs),
        overrideStartedRealMs: nextState.overrideStartedRealMs === null ? null : (Number.isFinite(nextState.overrideStartedRealMs) ? Number(nextState.overrideStartedRealMs) : current.overrideStartedRealMs)
    };
    window.__siteClockState = { ...getSiteClockState() };
    return getSiteClockState();
}

function getSiteNow(){
    const state = getSiteClockState();
    if(state.overrideTimestampMs !== null && state.overrideStartedRealMs !== null){
        return new Date(state.overrideTimestampMs + (Date.now() - state.overrideStartedRealMs));
    }
    return new Date();
}

function getSiteNowParts(zone = sanitizeClockZone(siteClockState.zone)){
    return getTimeZoneParts(getSiteNow(), zone);
}

function setOverlayClockState(nextState = {}){
    overlayClockState = {
        ...overlayClockState,
        ...(nextState && typeof nextState === "object" ? nextState : {})
    };
    overlayClockState.mode = overlayClockState.mode === "date" ? "date" : "time";
    overlayClockState.zone = sanitizeClockZone(overlayClockState.zone);
    overlayClockState.manualTime = typeof overlayClockState.manualTime === "string" ? overlayClockState.manualTime.trim() : "";
    overlayClockState.manualDate = typeof overlayClockState.manualDate === "string" ? overlayClockState.manualDate.trim() : "";
    setSiteClockState({ zone: overlayClockState.zone });
    if(typeof window.setOverlayClockState === "function"){
        window.setOverlayClockState(overlayClockState);
    }else{
        window.__overlayClockState = { ...overlayClockState };
    }
    return { ...overlayClockState };
}

function setSiteTimeFromInput(input = "", zone = sanitizeClockZone(siteClockState.zone)){
    const parsed = parseClockTimeInput(input);
    if(!parsed) return null;
    const currentParts = getSiteNowParts(zone);
    const timestamp = zonedDateTimeToUtc({
        year: currentParts.year,
        month: currentParts.month,
        day: currentParts.day,
        hour: parsed.hour,
        minute: parsed.minute,
        second: parsed.second
    }, zone);
    return setSiteClockState({ zone, overrideTimestampMs: timestamp, overrideStartedRealMs: Date.now() });
}

function setSiteDateFromInput(input = "", zone = sanitizeClockZone(siteClockState.zone)){
    const parsed = parseClockDateInput(input);
    if(!parsed) return null;
    const currentParts = getSiteNowParts(zone);
    const timestamp = zonedDateTimeToUtc({
        year: parsed.year,
        month: parsed.month,
        day: parsed.day,
        hour: currentParts.hour,
        minute: currentParts.minute,
        second: currentParts.second
    }, zone);
    return setSiteClockState({ zone, overrideTimestampMs: timestamp, overrideStartedRealMs: Date.now() });
}

window.getSiteNow = getSiteNow;
window.getSiteClockState = getSiteClockState;
window.setSiteClockState = setSiteClockState;

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.syncOverlayLayout = syncLayout;

loadOverlay();


function postToChatSandbox(message = {}){
    if(frame && frame.contentWindow){
        frame.contentWindow.postMessage(message, "*");
    }
}

function registerPageCommands(){
    postToChatSandbox({
        type: "pageChatRegister",
        pageOnly: false,
        pageId: "experiment-chat-sandbox",
        title: "Chat Sandbox",
        sourceKey: "experiment-chat-sandbox",
        commands: [
            {
                name: "/clock_time",
                usage: "/clock_time ",
                desc: "set the overlay clock to a starting time that keeps running",
                execute: false
            },
            {
                name: "/clock_date",
                usage: "/clock_date ",
                desc: "set the overlay clock to a starting date that keeps running",
                execute: false
            },
            {
                name: "/clock_reset",
                usage: "/clock_reset",
                desc: "reset the overlay clock to live Toronto time",
                execute: true
            },
            {
                name: "/clock_zone",
                usage: "/clock_zone ",
                desc: "sync the overlay clock to a named timezone",
                execute: false,
                suggestions: getSupportedClockZones()
            }
        ]
    });
}

window.addEventListener("message", (event) => {
    if(!event.data) return;

    if(event.data.type === "chatSandboxReady" || event.data.type === "chatSandboxState" || event.data.type === "chatSandboxDvdState"){
        registerPageCommands();
        return;
    }

    if(event.data.type !== "pageChatExecute") return;

    const commandName = String(event.data.command || "").toLowerCase();
    const rawCommand = typeof event.data.raw === "string" ? event.data.raw.trim() : "";
    const commandValue = rawCommand ? rawCommand.slice(commandName.length).trim() : "";

    if(commandName === "/clock_time"){
        if(!commandValue){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_time", message: "Usage: /clock_time [time]", announce: true });
            return;
        }
        const result = setSiteTimeFromInput(commandValue, sanitizeClockZone(overlayClockState.zone));
        if(!result){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_time", message: "Invalid time. Use h:mm, h:mm:ss, or add am/pm.", announce: true });
            return;
        }
        setOverlayClockState({ mode: "time", manualTime: "", manualDate: "" });
        postToChatSandbox({ type: "pageChatResult", command: "/clock_time", message: `/clock_time executed: ${commandValue}`, announce: true });
        return;
    }

    if(commandName === "/clock_date"){
        if(!commandValue){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_date", message: "Usage: /clock_date [date]", announce: true });
            return;
        }
        const result = setSiteDateFromInput(commandValue, sanitizeClockZone(overlayClockState.zone));
        if(!result){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_date", message: "Invalid date. Try YYYY-MM-DD or a readable month/day/year.", announce: true });
            return;
        }
        setOverlayClockState({ mode: "date", manualTime: "", manualDate: "" });
        postToChatSandbox({ type: "pageChatResult", command: "/clock_date", message: `/clock_date executed: ${commandValue}`, announce: true });
        return;
    }

    if(commandName === "/clock_reset"){
        setSiteClockState({ zone: DEFAULT_CLOCK_ZONE, overrideTimestampMs: null, overrideStartedRealMs: null });
        setOverlayClockState({ mode: "time", zone: DEFAULT_CLOCK_ZONE, manualTime: "", manualDate: "" });
        postToChatSandbox({ type: "pageChatResult", command: "/clock_reset", message: "/clock_reset executed: synced to America/Toronto", announce: true });
        return;
    }

    if(commandName === "/clock_zone"){
        if(!commandValue){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_zone", message: "Usage: /clock_zone [timezone]", announce: true });
            return;
        }
        const nextZone = sanitizeClockZone(commandValue);
        if(nextZone !== commandValue.trim()){
            postToChatSandbox({ type: "pageChatResult", command: "/clock_zone", message: `Unknown timezone: ${commandValue}`, announce: true });
            return;
        }
        setSiteClockState({ zone: nextZone });
        setOverlayClockState({ zone: nextZone, manualTime: "", manualDate: "" });
        postToChatSandbox({ type: "pageChatResult", command: "/clock_zone", message: `/clock_zone executed: synced to ${nextZone}`, announce: true });
    }
});

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>
  <script src="/scripts/hide-overlay.js"></script>
</body>
