<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.com/experiments/chat-sandbox/</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#chat-sandbox-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="chat-sandbox-frame" src="/experiments/chat-sandbox/chat-sandbox.html"></iframe>
</div>

<script>
const frame = document.getElementById("chat-sandbox-frame");
const defaultClockZone = "America/Toronto";
const supportedClockZones = (typeof Intl.supportedValuesOf === "function"
    ? Intl.supportedValuesOf("timeZone")
    : [defaultClockZone, "UTC"]);
const allClockZones = Array.from(new Set([defaultClockZone, ...supportedClockZones])).sort((a, b) => a.localeCompare(b));

let overlayClockState = {
    mode: "time",
    zone: defaultClockZone,
    manualTime: "",
    manualDate: ""
};

let chatSandboxReady = false;
let pendingChatOpenOptions = null;
let siteClockState = {
    enabled: false,
    baseTimestamp: 0,
    startedAt: 0,
    zone: defaultClockZone
};

function sanitizeClockZone(zone){
    const safeZone = typeof zone === "string" ? zone.trim() : "";
    return allClockZones.includes(safeZone) ? safeZone : defaultClockZone;
}

function getOverlayClockStateSnapshot(){
    return {
        mode: overlayClockState.mode === "date" ? "date" : "time",
        zone: sanitizeClockZone(overlayClockState.zone),
        manualTime: typeof overlayClockState.manualTime === "string" ? overlayClockState.manualTime : "",
        manualDate: typeof overlayClockState.manualDate === "string" ? overlayClockState.manualDate : ""
    };
}

function syncOverlayClockState(){
    const clockState = getOverlayClockStateSnapshot();
    if (typeof window.setOverlayClockState === "function") {
        try {
            window.setOverlayClockState(clockState);
        } catch (error) {
            console.warn("Unable to sync overlay clock state", error);
        }
    } else {
        window.__overlayClockState = clockState;
    }
}

function setOverlayClockStateFromPage(nextState = {}){
    overlayClockState = {
        ...getOverlayClockStateSnapshot(),
        ...(nextState && typeof nextState === "object" ? nextState : {})
    };
    overlayClockState.mode = overlayClockState.mode === "date" ? "date" : "time";
    overlayClockState.zone = sanitizeClockZone(overlayClockState.zone);
    overlayClockState.manualTime = typeof overlayClockState.manualTime === "string" ? overlayClockState.manualTime.trim() : "";
    overlayClockState.manualDate = typeof overlayClockState.manualDate === "string" ? overlayClockState.manualDate.trim() : "";
    syncOverlayClockState();
    window.dispatchEvent(new CustomEvent("siteclockchange", { detail: getSiteNow() }));
    return getOverlayClockStateSnapshot();
}

function postToChatSandbox(payload = {}){
    if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(payload, "*");
    }
}

function registerPageCommands(){
    postToChatSandbox({
        type: "pageChatRegister",
        pageOnly: false,
        pageId: "chat-sandbox-experiment",
        title: "Chat Sandbox Experiment",
        sourceKey: "chat-sandbox-experiment",
        commands: [
            {
                name: "/clock_time",
                usage: "/clock_time ",
                desc: "set the overlay clock to a manual time string",
                execute: false,
                suggestions: ["4:20pm", "7:10am", "16:20", "19:10"]
            },
            {
                name: "/clock_date",
                usage: "/clock_date ",
                desc: "set the overlay clock to a manual date string",
                execute: false,
                suggestions: ["2026-04-07", "April 7 2026"]
            },
            {
                name: "/clock_reset",
                usage: "/clock_reset",
                desc: "reset the overlay clock to live Toronto time",
                execute: true
            },
            {
                name: "/clock_zone",
                usage: "/clock_zone ",
                desc: "sync the overlay clock to a named timezone",
                execute: false,
                suggestions: allClockZones
            }
        ]
    });
}

function flushPendingChatOpen(){
    if (!pendingChatOpenOptions || !chatSandboxReady) return;
    const options = pendingChatOpenOptions;
    pendingChatOpenOptions = null;
    postToChatSandbox({ type: "chatSandboxOpen", focus: options.focus !== false, seedSlash: !!options.seedSlash });
}

function parseDatePartsInZone(date, zone){
    const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: zone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
    }).formatToParts(date);
    const map = Object.fromEntries(parts.filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
    return {
        year: Number(map.year),
        month: Number(map.month),
        day: Number(map.day),
        hour: Number(map.hour),
        minute: Number(map.minute),
        second: Number(map.second)
    };
}

function getZoneOffsetMinutes(timestamp, zone){
    const parts = parseDatePartsInZone(new Date(timestamp), zone);
    const utcEquivalent = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
    return (utcEquivalent - timestamp) / 60000;
}

function zonedPartsToTimestamp(parts, zone){
    let guess = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second || 0);
    for (let i = 0; i < 4; i += 1) {
        const offsetMinutes = getZoneOffsetMinutes(guess, zone);
        const nextGuess = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second || 0) - (offsetMinutes * 60000);
        if (Math.abs(nextGuess - guess) < 1000) {
            guess = nextGuess;
            break;
        }
        guess = nextGuess;
    }
    return guess;
}

function parseManualTimeInput(input){
    const value = String(input || "").trim();
    const match = value.match(/^(\d{1,2})(?::(\d{2}))?(?::(\d{2}))?\s*([ap]m)?$/i);
    if (!match) return null;
    let hour = Number(match[1]);
    const minute = Number(match[2] || 0);
    const second = Number(match[3] || 0);
    const meridiem = match[4] ? match[4].toLowerCase() : "";
    if (minute > 59 || second > 59) return null;
    if (meridiem) {
        if (hour < 1 || hour > 12) return null;
        if (hour === 12) hour = 0;
        if (meridiem === "pm") hour += 12;
    } else if (hour > 23) {
        return null;
    }
    return { hour, minute, second };
}

function parseManualDateInput(input, zone){
    const raw = String(input || "").trim();
    if (!raw) return null;
    const isoMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (isoMatch) {
        return { year: Number(isoMatch[1]), month: Number(isoMatch[2]), day: Number(isoMatch[3]) };
    }
    const parsed = new Date(raw);
    if (Number.isNaN(parsed.getTime())) return null;
    const parts = parseDatePartsInZone(parsed, zone);
    return { year: parts.year, month: parts.month, day: parts.day };
}

function setSimulatedSiteClock(timestamp, zone){
    siteClockState = {
        enabled: true,
        baseTimestamp: Number(timestamp) || Date.now(),
        startedAt: Date.now(),
        zone: sanitizeClockZone(zone)
    };
    window.dispatchEvent(new CustomEvent("siteclockchange", { detail: getSiteNow() }));
}

function resetSimulatedSiteClock(){
    siteClockState = {
        enabled: false,
        baseTimestamp: 0,
        startedAt: 0,
        zone: sanitizeClockZone(overlayClockState.zone)
    };
    window.dispatchEvent(new CustomEvent("siteclockchange", { detail: getSiteNow() }));
}

function getSiteNow(){
    if (!siteClockState.enabled) {
        return new Date();
    }
    const elapsed = Date.now() - siteClockState.startedAt;
    return new Date(siteClockState.baseTimestamp + elapsed);
}
window.getSiteNow = getSiteNow;

function applyManualTime(value){
    const zone = sanitizeClockZone(overlayClockState.zone);
    const timeParts = parseManualTimeInput(value);
    if (!timeParts) return { ok: false, message: `Invalid time: ${value}` };
    const currentParts = parseDatePartsInZone(getSiteNow(), zone);
    const timestamp = zonedPartsToTimestamp({
        year: currentParts.year,
        month: currentParts.month,
        day: currentParts.day,
        hour: timeParts.hour,
        minute: timeParts.minute,
        second: timeParts.second
    }, zone);
    setSimulatedSiteClock(timestamp, zone);
    setOverlayClockStateFromPage({ mode: "time", zone, manualTime: "", manualDate: "" });
    return { ok: true, message: `/clock_time executed: ${value}` };
}

function applyManualDate(value){
    const zone = sanitizeClockZone(overlayClockState.zone);
    const dateParts = parseManualDateInput(value, zone);
    if (!dateParts) return { ok: false, message: `Invalid date: ${value}` };
    const currentParts = parseDatePartsInZone(getSiteNow(), zone);
    const timestamp = zonedPartsToTimestamp({
        year: dateParts.year,
        month: dateParts.month,
        day: dateParts.day,
        hour: currentParts.hour,
        minute: currentParts.minute,
        second: currentParts.second
    }, zone);
    setSimulatedSiteClock(timestamp, zone);
    setOverlayClockStateFromPage({ mode: "date", zone, manualTime: "", manualDate: "" });
    return { ok: true, message: `/clock_date executed: ${value}` };
}

function applyClockZone(value){
    const nextZone = sanitizeClockZone(value);
    if (!value) return { ok: false, message: "Usage: /clock_zone [timezone]" };
    if (nextZone !== String(value).trim()) return { ok: false, message: `Unknown timezone: ${value}` };
    const now = getSiteNow();
    if (siteClockState.enabled) {
        setSimulatedSiteClock(now.getTime(), nextZone);
    }
    setOverlayClockStateFromPage({ zone: nextZone, manualTime: "", manualDate: "" });
    return { ok: true, message: `/clock_zone executed: synced to ${nextZone}` };
}

async function loadOverlay(){
    try{
        const res = await fetch("/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncOverlayClockState();
        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.syncOverlayLayout = syncLayout;

loadOverlay();

window.addEventListener("message", (event) => {
    if (!event.data) return;

    if (event.source === (frame && frame.contentWindow ? frame.contentWindow : null)) {
        if (event.data.type === "chatSandboxState") {
            chatSandboxReady = true;
            flushPendingChatOpen();
            registerPageCommands();
            return;
        }

        if (event.data.type === "pageChatExecute") {
            const commandName = String(event.data.command || "").toLowerCase();
            const rawCommand = typeof event.data.raw === "string" ? event.data.raw.trim() : "";
            const commandValue = rawCommand ? rawCommand.slice(commandName.length).trim() : "";
            let result = null;

            if (commandName === "/clock_time") {
                result = commandValue ? applyManualTime(commandValue) : { ok: false, message: "Usage: /clock_time [time]" };
            } else if (commandName === "/clock_date") {
                result = commandValue ? applyManualDate(commandValue) : { ok: false, message: "Usage: /clock_date [date]" };
            } else if (commandName === "/clock_reset") {
                resetSimulatedSiteClock();
                setOverlayClockStateFromPage({ mode: "time", zone: defaultClockZone, manualTime: "", manualDate: "" });
                result = { ok: true, message: "/clock_reset executed: synced to America/Toronto" };
            } else if (commandName === "/clock_zone") {
                result = applyClockZone(commandValue);
            }

            if (result) {
                postToChatSandbox({
                    type: "pageChatResult",
                    command: commandName,
                    message: result.message,
                    announce: true
                });
            }
        }
    }
});

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>

</body>
