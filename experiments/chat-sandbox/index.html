<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.com/experiments/chat-sandbox/</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#chat-sandbox-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="chat-sandbox-frame" src="/experiments/chat-sandbox/chat-sandbox.html"></iframe>
</div>

<script>
async function loadOverlay(){
    try{
        const res = await fetch("/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

const frame = document.getElementById("chat-sandbox-frame");
const defaultClockZone = "America/Toronto";
const supportedClockZones = (typeof Intl.supportedValuesOf === "function"
    ? Intl.supportedValuesOf("timeZone")
    : [defaultClockZone, "UTC"]);
const allClockZones = Array.from(new Set([defaultClockZone, ...supportedClockZones])).sort((a, b) => a.localeCompare(b));

function registerPageCommands(){
    if (!frame || !frame.contentWindow) return;
    frame.contentWindow.postMessage({
        type: "pageChatRegister",
        pageOnly: false,
        pageId: "chat-sandbox-overlay",
        title: "Chat Sandbox",
        sourceKey: "chat-sandbox-overlay",
        commands: [
            {
                name: "/clock_time",
                usage: "/clock_time ",
                desc: "set the overlay clock to a manual time string",
                execute: false
            },
            {
                name: "/clock_date",
                usage: "/clock_date ",
                desc: "set the overlay clock to a manual date string",
                execute: false
            },
            {
                name: "/clock_reset",
                usage: "/clock_reset",
                desc: "reset the overlay clock to live Toronto time",
                execute: true
            },
            {
                name: "/clock_zone",
                usage: "/clock_zone ",
                desc: "sync the overlay clock to a named timezone",
                execute: false,
                suggestions: allClockZones
            }
        ]
    }, "*");
}

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.addEventListener("message", (event) => {
    if (!event.data) return;
    if (event.source !== frame.contentWindow) return;

    if (event.data.type === "chatSandboxState" || event.data.type === "chatSandboxDvdState") {
        registerPageCommands();
        return;
    }

    if (event.data.type === "pageChatExecute") {
        const commandName = String(event.data.command || "").toLowerCase();
        const rawCommand = typeof event.data.raw === "string" ? event.data.raw.trim() : "";
        const commandValue = rawCommand ? rawCommand.slice(commandName.length).trim() : "";
        const applyClockState = typeof window.setOverlayClockState === "function"
            ? window.setOverlayClockState
            : null;

        if (!applyClockState) {
            frame.contentWindow.postMessage({
                type: "pageChatResult",
                ok: false,
                command: commandName,
                message: "Overlay clock is not ready"
            }, "*");
            return;
        }

        if (commandName === "/clock_time") {
            if (!commandValue) {
                frame.contentWindow.postMessage({
                    type: "pageChatResult",
                    ok: false,
                    command: "/clock_time",
                    message: "Usage: /clock_time [time]"
                }, "*");
                return;
            }
            applyClockState({ mode: "time", manualTime: commandValue });
            frame.contentWindow.postMessage({
                type: "pageChatResult",
                ok: true,
                command: "/clock_time",
                message: `/clock_time executed: ${commandValue}`
            }, "*");
            return;
        }

        if (commandName === "/clock_date") {
            if (!commandValue) {
                frame.contentWindow.postMessage({
                    type: "pageChatResult",
                    ok: false,
                    command: "/clock_date",
                    message: "Usage: /clock_date [date]"
                }, "*");
                return;
            }
            applyClockState({ mode: "date", manualDate: commandValue });
            frame.contentWindow.postMessage({
                type: "pageChatResult",
                ok: true,
                command: "/clock_date",
                message: `/clock_date executed: ${commandValue}`
            }, "*");
            return;
        }

        if (commandName === "/clock_reset") {
            applyClockState({ mode: "time", zone: defaultClockZone, manualTime: "", manualDate: "" });
            frame.contentWindow.postMessage({
                type: "pageChatResult",
                ok: true,
                command: "/clock_reset",
                message: "/clock_reset executed: synced to America/Toronto"
            }, "*");
            return;
        }

        if (commandName === "/clock_zone") {
            if (!commandValue) {
                frame.contentWindow.postMessage({
                    type: "pageChatResult",
                    ok: false,
                    command: "/clock_zone",
                    message: "Usage: /clock_zone [timezone]"
                }, "*");
                return;
            }

            const nextZone = allClockZones.includes(commandValue) ? commandValue : null;
            if (!nextZone) {
                frame.contentWindow.postMessage({
                    type: "pageChatResult",
                    ok: false,
                    command: "/clock_zone",
                    message: `Unknown timezone: ${commandValue}`
                }, "*");
                return;
            }

            applyClockState({ zone: nextZone, manualTime: "", manualDate: "" });
            frame.contentWindow.postMessage({
                type: "pageChatResult",
                ok: true,
                command: "/clock_zone",
                message: `/clock_zone executed: synced to ${nextZone}`
            }, "*");
        }
    }
});

window.syncOverlayLayout = syncLayout;

loadOverlay();
frame.addEventListener("load", registerPageCommands);

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>
  <script src="/scripts/hide-overlay.js"></script>
</body>
</html>
