        : (group === 'dvd_slideshow' ? dvdSlideshowSources.length : getDvdActiveCap());
      if (!dvdOverlay || groupInstances.length >= groupCap) return null;

      const img = document.createElement('img');
      img.className = 'dvdLogo';

      img.dataset.dvdId = `dvd-${++dvdLogoCounter}`;
      img.dataset.dvdGroup = group;

      const instanceIndex = groupInstances.length;
      const instance = {
        id: img.dataset.dvdId,
        group,
        el: img,
        x: 24 + ((instanceIndex * 37) % 320),
        y: 24 + ((instanceIndex * 29) % 220),
        vx: (instanceIndex % 2 === 0 ? 1 : -1) * (0.065 + (instanceIndex * 0.009)),
        vy: (instanceIndex % 3 === 0 ? -1 : 1) * (0.055 + (instanceIndex * 0.008)),
        hue: (instanceIndex * 36) % 360,
        initialized: false,
        clickHref: group === 'subscribe' ? subscribeClickHref : ''
      };

      img.addEventListener('click', (event) => {
        const href = String(instance.clickHref || '').trim();
        if (!href) return;
        event.preventDefault();
        event.stopPropagation();
        window.open(href, '_blank', 'noopener,noreferrer');
      });

      img.src = String(sourceOverride || '').trim() || getDvdSourceForIndex(instanceIndex, group);
      instance.customSource = String(sourceOverride || '').trim();
      img.onload = () => {

      groupInstances.push(instance);

    function ensureDvdInstanceCount(count, group = 'dvd') {

        : (group === 'dvd_slideshow' ? dvdSlideshowSources.length : getDvdActiveCap());
      const target = Math.max(0, Math.min(groupCap, Number(count) || 0));
      while (groupInstances.length < target) {
        const instance = createDvdInstance(group);
        if (!instance) break;
      }
      return groupInstances.length;

      const viewportHeight = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, 1);

      if (!instance.initialized || force) {

        }
        const enabled = isEmbeddedInIndex()
          ? (postToParentPage({ type: 'pageGlobalColorInvertToggle' }), null)
          : toggleGlobalColorInvert();
        addSystemMessage(formatCommandExecutionMessage('/color_invert', (enabled === null ? 'toggled' : (enabled ? 'enabled' : 'disabled'))));
        return true;
      }

      if (command === '/color_hueshift') {
        if (colorPartyEnabled) {
          setColorPartyEnabled(false);
        }
        const enabled = isEmbeddedInIndex()
          ? (postToParentPage({ type: 'pageGlobalHueShiftToggle' }), null)
          : toggleGlobalHueShift();
        addSystemMessage(formatCommandExecutionMessage('/color_hueshift', (enabled === null ? 'toggled' : (enabled ? 'enabled' : 'disabled'))));
        return true;
      }

      if (command === '/color_party') {
        const enabled = setColorPartyEnabled(!colorPartyEnabled);
        addSystemMessage(formatCommandExecutionMessage('/color_party', enabled ? 'enabled' : 'disabled'));
        return true;
      }

      if (command === '/customize') {
        addSystemMessage(formatCommandExecutionMessage('/customize'));
        addMessage(createCustomizeMessageNode(), 'system');
        return true;
      }

      if (command === '/stop') {
        const wasShuffleRunning = autoShuffleIntervalId !== null;
        const wasScriptRunning = !!(activeScriptRun && !activeScriptRun.done);
        const wasHueShiftEnabled = globalHueShiftEnabled;
        const wasColorInvertEnabled = globalColorInvertEnabled;
        const wasColorPartyEnabled = colorPartyEnabled;
        if (wasColorPartyEnabled) {
          setColorPartyEnabled(false);
        }
        stopAutoShuffleColors();
        if (wasHueShiftEnabled) {
          freezeGlobalHueShiftAtCurrentAngle();
        }
        setGlobalColorInvert(false);
        if (isEmbeddedInIndex()) {
          postToParentPage({ type: 'pageGlobalColorInvertSet', enabled: false });
          postToParentPage({ type: 'pageGlobalHueShiftSet', enabled: false });
          postToParentPage({ type: 'pageCustomizeAutoShuffleSet', enabled: false });
        }
        if (wasScriptRunning && activeScriptRun) {
          activeScriptRun.cancelled = true;
        }
        if (wasShuffleRunning || wasScriptRunning || wasHueShiftEnabled || wasColorInvertEnabled || wasColorPartyEnabled) {
          addSystemMessage(formatCommandExecutionMessage('/stop'));
        } else {
          addSystemMessage('No auto color or script effects are currently running');
        }
        return true;
      }

      if (command === '/randomize' || command === '/color_randomize') {
        if (colorPartyEnabled) {
          setColorPartyEnabled(false);
        }
        const enableRandomize = autoShuffleIntervalId === null;
        if (!enableRandomize) {
          stopAutoShuffleColors();
          // ADDED: Keep page-side randomization in sync with chat-side /randomize when embedded in index.html.
          if (isEmbeddedInIndex()) {
            postToParentPage({ type: 'pageCustomizeAutoShuffleSet', enabled: false });
          }
          addSystemMessage(formatCommandExecutionMessage('/color_randomize', 'disabled'));
        } else {
          startAutoShuffleColors();
          // ADDED: Trigger the parent page's Customize Page auto-shuffle on the same interval without changing UI.
          if (isEmbeddedInIndex()) {
            postToParentPage({ type: 'pageCustomizeSetRandomizeTintOpacities' });
            postToParentPage({ type: 'pageCustomizeAutoShuffleSet', enabled: true });
          }
          addSystemMessage(formatCommandExecutionMessage('/color_randomize', 'enabled'));
        }
        return true;
      }

      if (command === '/color_reset') {
        setColorPartyEnabled(false);
        applyCustomizeDefaults();
        if (isEmbeddedInIndex()) {
          postToParentPage({ type: 'pageGlobalEffectsReset' });
        }
        addSystemMessage(formatCommandExecutionMessage('/color_reset'));
        return true;
      }

      if (command === '/settings_save') {
        downloadSettingsFile();
        addSystemMessage(formatCommandExecutionMessage('/settings_save'));
        return true;
      }

      if (command === '/screenshot') {
        try {
          await captureVisiblePageScreenshot();
        } catch (error) {
          console.error(error);
          addSystemMessage('Unable to save page screenshot');
        }
        return true;
      }

      if (command === '/screenshot_animation') {
        try {
          screenshotAnimationActive = true;
          chatBar.value = '';
          updateChatBarVisualState();
          historyIndex = -1;
          historyDraft = '';
          resetCommandCycle();
          chatBarWrap.classList.remove('visible');
          document.body.classList.remove('chat-open');
          disarmChatInput();
          chatBar.blur();
          notifyParentChatSandboxState();
          await captureVisiblePageAnimation();
        } catch (error) {
          screenshotAnimationActive = false;
          console.error(error);
          addSystemMessage('Unable to save page animation frames');
        }
        return true;
      }

      if (command === '/settings_load') {
        triggerSettingsLoad();
        addSystemMessage(formatCommandExecutionMessage('/settings_load'));
        return true;
      }

      if (command === '/script_load') {
        triggerScriptLoad();
        addSystemMessage(formatCommandExecutionMessage('/script_load'));
        return true;
      }

      if (command === '/iframe') {
        const rawUrl = trimmed.slice(parts[0].length).trim();
        const sanitizedUrl = sanitizeUrl(rawUrl);
        if (!sanitizedUrl) {
          addSystemMessage('Invalid iframe URL. Use /iframe https://example.com/');
          return true;
        }
        addSystemMessage(formatCommandExecutionMessage('/iframe'));
        addMessage(createIframeMessageNode(sanitizedUrl), 'system');
        return true;
      }

      if (command === '/upload_folder') {
        triggerGenericFolderUpload();
        return true;
      }

      if (command === '/upload_file') {
        triggerGenericUpload();
        return true;
      }

      if (command === '/clear') {
        Array.from(messages.children).forEach((child) => {
          child.remove();
        });
        homepageCustomizePanelVisible = false;
        clearAllDvdMedia();
        updateMessagesVisibility();
        return true;
      }

      if (command === '/refresh') {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.location.reload();
          } else if (window.top && window.top !== window) {
            window.top.location.reload();
          } else {
            triggerIndexRefresh();
          }
        } catch (error) {
          triggerIndexRefresh();
        }
        return true;
      }

      if (pageCommand) {
        dispatchPageCommand(command, raw, parts.slice(1));
        return true;
      }

      return false;
    }

    async function submitMessage() {
      const raw = chatBar.value;
      if (!raw.trim()) return;

      inputHistory.push(raw);
      resetHistoryNavigation();

      const trimmed = raw.trim();
      const handled = await handleCommand(raw);

      if (!handled) {
        if (trimmed.startsWith('/')) {
          const commandToken = trimmed.split(/\s+/)[0];
          addSystemMessage(`${commandToken} is not a known command`);
        } else {
          addMessage(`${currentNickname}: ${raw}`, 'user');
        }
      }

      chatBar.value = '';
      updateChatBarVisualState();
      resetCommandCycle();
    }

    renderCommandHueShiftFrame();
    updateChatBarState();
    renderInlineSuggestion();

    chatBar.addEventListener('input', () => {
      if (historyIndex !== -1) {
        historyIndex = -1;
      }
      updateChatBarVisualState();
      renderInlineSuggestion();
      resetCommandCycle();
    });

    chatBar.addEventListener('keyup', () => {
      updateChatBarVisualState();
      renderInlineSuggestion();
    });

    chatBar.addEventListener('focus', () => {
      updateChatBarVisualState();
      renderInlineSuggestion();
    });

    chatBar.addEventListener('keydown', (event) => {
      if (!chatInputArmed) {
        event.preventDefault();
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        const trimmedValue = chatBar.value.trim();
        if (!trimmedValue || trimmedValue === '/') {
          hideChatBar();
          return;
        }
        submitMessage();
        return;
      }

      const commandInfo = getCommandTokenInfo();

      if (event.key === 'Tab') {
        // Keep Tab cycling command names directly whenever the caret is still
        // inside the command token. Otherwise `/` just accepts the first ghost
        // suggestion and immediately traps the cycle on that exact command.
        if (commandInfo) {
          event.preventDefault();
          cycleCommandSuggestion(event.shiftKey ? -1 : 1);
          renderInlineSuggestion();
          return;
        }
        if (cycleCommandArgumentSuggestion(event.shiftKey ? -1 : 1)) {
          event.preventDefault();
          renderInlineSuggestion();
          return;
        }
        if (acceptInlineSuggestion()) {
          event.preventDefault();
          return;
        }
        return;
      }

      if (event.key === 'ArrowUp') {
        if (commandInfo) {
          event.preventDefault();
          cycleCommandSuggestion(-1);
          renderInlineSuggestion();
        } else {
          event.preventDefault();
          recallOlderHistory();
        }
        return;
      }

      if (event.key === 'ArrowDown') {
        if (commandInfo) {
          event.preventDefault();
          cycleCommandSuggestion(1);
          renderInlineSuggestion();
        } else {
          event.preventDefault();
          recallNewerHistory();
        }
        return;
      }

      if (event.key === 'Escape') {
        event.preventDefault();
        hideChatBar();
      }
    });

    chatBar.addEventListener('click', () => {
      if (!chatInputArmed) {
        armChatInput();
        return;
      }
      chatBar.focus();
    });

    updateMessagesVisibility();

    chatBarWrap.addEventListener('click', (event) => {
      if (event.target !== chatClose) {
        armChatInput();
      }
    });

    chatClose.addEventListener('click', (event) => {
      event.stopPropagation();
      hideChatBar();
    });

    iframeOverlayClose.addEventListener('click', () => {
      closeIframeOverlay();
    });

    mediaOverlayClose.addEventListener('click', () => {
      closeMediaOverlay();
    });

    uploadFileInput.addEventListener('change', (event) => {
      handleGenericMediaSelection(event);
    });

    uploadFolderInput.addEventListener('change', (event) => {
      handleGenericFolderSelection(event);
    });

    settingsLoadInput.addEventListener('change', (event) => {
      handleSettingsLoadSelection(event);
    });

    scriptLoadInput.addEventListener('change', (event) => {
      handleScriptLoadSelection(event);
    });

    imageUploadInput.addEventListener('change', (event) => {
      handleMediaSelection('image', event);
    });

    videoUploadInput.addEventListener('change', (event) => {
      handleMediaSelection('video', event);
    });

    audioUploadInput.addEventListener('change', (event) => {
      handleMediaSelection('audio', event);
    });

    imageFolderInput.addEventListener('change', (event) => {
      handleMediaFolderSelection('image', event);
    });

    videoFolderInput.addEventListener('change', (event) => {
      handleMediaFolderSelection('video', event);
    });

    audioFolderInput.addEventListener('change', (event) => {
      handleMediaFolderSelection('audio', event);
    });



    document.addEventListener('pointerdown', (event) => {
      handleOutsideChatPointerDown(event);
      if (isVoidTarget(event.target)) {
        clearStrayFocus();
      }
    }, true);

    document.addEventListener('click', (event) => {
      if (isVoidTarget(event.target)) {
        event.preventDefault();
        clearStrayFocus();
      }
    }, true);

    window.addEventListener('resize', () => {
      if (dvdEnabled || dvdInstances.length || subscribeInstances.length || dvdSlideshowInstances.length) {
        positionAllDvdInstances(true);
      }
    });

    if (dvdImageUploadInput) {
      dvdImageUploadInput.addEventListener('change', () => {
        const availableSlots = Math.max(0, getDvdActiveCap() - dvdInstances.length);
        const files = Array.from(dvdImageUploadInput.files || []).slice(0, availableSlots || getDvdActiveCap());
        if (!files.length) return;

        const sources = files.map((file) => {
          const objectUrl = URL.createObjectURL(file);
          dvdCustomObjectUrls.push(objectUrl);
          return objectUrl;
        });

        addSpawnedDvdSources(sources);
        dvdUploadMode = 'dvd_image';
        dvdImageUploadInput.value = '';
      });
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;

      if (event.data.type === 'chatSandboxOpen') {
        if (isScreenshotAnimationLocked()) return;
        showChatBar();
        if (event.data.focus !== false) {
          armChatInput();
        }
        if (event.data.seedSlash) {
          chatBar.value = '/';
          updateChatBarVisualState();
          moveCursorToEnd();
        }
        return;
      }

      if (event.data.type === 'chatSandboxClose') {
        if (isScreenshotAnimationLocked()) return;
        hideChatBar();
        return;
      }

      if (event.data.type === 'chatSandboxExecuteCommand') {
        const rawCommand = typeof event.data.command === 'string' ? event.data.command.trim() : '';
        const commandId = typeof event.data.commandId === 'string' ? event.data.commandId : '';
        if (!rawCommand) return;
        if (event.data.openChat) {
          showChatBar();
          if (event.data.focus !== false) {
            armChatInput();
          }
        }
        handleCommand(rawCommand).then((handled) => {
          if (!handled && rawCommand.startsWith('/')) {
            const commandToken = rawCommand.split(/\s+/)[0];
            addSystemMessage(`${commandToken} is not a known command`);
          }
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'chatSandboxCommandResult',
              ok: !!handled,
              command: rawCommand,
              commandId
            }, '*');
          }
        }).catch((error) => {
          console.error('Unable to execute external chat command:', error);
          addSystemMessage('Unable to execute requested chat command');
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'chatSandboxCommandResult',
              ok: false,
              command: rawCommand,
              commandId,
              message: 'Unable to execute requested chat command'
            }, '*');
          }
        });
        return;
      }

      if (event.data.type === 'chatSandboxActivateHelpCommand') {
        const command = typeof event.data.command === 'string' ? event.data.command.trim().toLowerCase() : '';
        const item = command
          ? Array.from(document.querySelectorAll('.helpItem[data-command]')).find((node) => String(node.dataset.command || '').trim().toLowerCase() === command)
          : null;
        if (item && activateHelpCommandItem(item)) {
          return;
        }
        const activeItem = document.activeElement && document.activeElement.closest
          ? document.activeElement.closest('.helpItem')
          : null;
        if (activeItem && activateHelpCommandItem(activeItem)) {
          return;
        }
        return;
      }

      if (event.data.type === 'pageScreenshotStatus') {
        if (!event.data.ok) {
          addSystemMessage(event.data.message || 'Unable to save page screenshot');
        }
        return;
      }

      if (event.data.type === 'pageScreenshotAnimationStatus') {
        screenshotAnimationActive = false;
        if (!event.data.ok) {
          addSystemMessage(event.data.message || 'Unable to save page animation frames');
        }
        return;
      }

      if (event.data.type === 'pageChatRegister') {
        setPageCommands({
          commands: Array.isArray(event.data.commands) ? event.data.commands : [],
          pageOnly: !!event.data.pageOnly,
          pageId: event.data.pageId || '',
          title: event.data.title || '',
          sourceKey: event.data.sourceKey || ''
        });
        refreshVisibleHelpMessages();
        initialWelcomeMessage = normalizeWelcomeMessage(event.data.welcomeMessage || DEFAULT_WELCOME_MESSAGE);
        if (chatBarWrap.classList.contains('visible')) {
          ensureInitialWelcomeMessage();
          requestAnimationFrame(scrollToBottom);
        }
        return;
      }

      if (event.data.type === 'pageChatClear') {
        setPageCommands({ commands: [], pageOnly: false, pageId: '', title: '', sourceKey: '' });
        initialWelcomeMessage = DEFAULT_WELCOME_MESSAGE;
        if (chatBarWrap.classList.contains('visible')) {
          ensureInitialWelcomeMessage();
          requestAnimationFrame(scrollToBottom);
        }
        return;
      }

      if (event.data.type === 'pageChatResult') {
        if (typeof event.data.nickname === 'string' && event.data.nickname.trim()) {
          currentNickname = event.data.nickname.trim();
          saveNickname(currentNickname);
        }

        const message = event.data.message || `${event.data.command || 'Page command'} executed`;
        if (event.data.panel === 'homepageCustomize') {
          const shouldAnnounce = event.data.announce !== false;
          if (shouldAnnounce) {
            homepageCustomizePanelVisible = true;
            addSystemMessage(formatCommandExecutionMessage(event.data.command || '/customize'));
            if (event.data.includeBaseCustomize) {
              const existingChatPanel = messages.querySelector('.message .customizePanel[data-panel-type="chatCustomize"]')?.closest('.message');
              if (!existingChatPanel) {
                addMessage(createCustomizeMessageNode(), 'system');
              }
            }
          }
          if (homepageCustomizePanelVisible) {
            upsertNamedPanelMessage('homepageCustomize', () => createHomepageCustomizeMessageNode(event.data));
          }
        } else if (event.data.announce !== false) {
          addSystemMessage(message);
        }
        pendingPageCommand = null;
      }
    });

    if (window.parent && window.parent !== window) {
      document.documentElement.classList.add('embedded');
      document.body.classList.add('embedded');
    }

    notifyParentChatSandboxState();

    if (!isEmbeddedInIndex()) {
      showChatBar();
    }

    window.addEventListener('keydown', (event) => {
      if (isScreenshotAnimationLocked()) {
        if (event.key === '/' || event.key === 'Escape' || event.key === 'Enter') {
          event.preventDefault();
          event.stopPropagation();
        }
        return;
      }
      const activeElement = document.activeElement;
      const active = activeElement === chatBar;
      const visible = chatBarWrap.classList.contains('visible');
      const printable = event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey;
      const activeTag = activeElement && activeElement.tagName ? activeElement.tagName.toUpperCase() : '';
      const interactingWithCustomizeControl = !!(activeElement && activeElement.closest && activeElement.closest('.customizePanel') && (
        activeTag === 'INPUT' || activeTag === 'SELECT' || activeTag === 'TEXTAREA' || activeElement.isContentEditable
      ));

      if (event.key === 'Escape') {
        if (iframeOverlay.classList.contains('visible')) {
          event.preventDefault();
          closeIframeOverlay();
          return;
        }
        if (mediaOverlay.classList.contains('visible')) {
          event.preventDefault();
          closeMediaOverlay();
          return;
        }
      }

      if (event.key === '/') {
        if (!visible) {
          event.preventDefault();
          showChatBar();
          return;
        }

        if (!chatInputArmed) {
          event.preventDefault();
          armChatInput();
          chatBar.value += '/';
          moveCursorToEnd();
          return;
        }

        if (!active) {
          event.preventDefault();
          chatBar.focus();
          chatBar.value += '/';
          moveCursorToEnd();
          return;
        }

        return;
      }

      if (!visible && event.key === 'Enter' && !event.shiftKey && !interactingWithCustomizeControl) {
        event.preventDefault();
        showChatBar();
        return;
      }

      if (!visible && printable) {
        event.preventDefault();
        return;
      }

      if (visible && !chatInputArmed && event.key === 'Enter' && !event.shiftKey && !interactingWithCustomizeControl) {
        event.preventDefault();
        armChatInput();
        chatBar.value = '';
        updateChatBarVisualState();
        return;
      }

      if (visible && !chatInputArmed && printable) {
        event.preventDefault();
        return;
      }

      if (visible && chatInputArmed && !active && !interactingWithCustomizeControl && event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitMessage();
        return;
      }

      if (visible && chatInputArmed && !active && printable && !interactingWithCustomizeControl) {
        event.preventDefault();
        chatBar.focus();
        chatBar.value += event.key;
        moveCursorToEnd();
      }
    });

</script>
</body>
</html>
