<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Sandbox</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--document-bg, #000);
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
      --document-bg: rgba(0, 0, 0, 1);
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      --font-scale: 1;
      --global-font-family: "Courier New", Courier, monospace;
      --chatbar-bg: rgba(0, 0, 0, 0.7);
      --messages-bg: rgba(0, 0, 0, 0.5);
      --nickname-color: rgba(255, 0, 0, 1);
      --chatbar-text: rgba(255, 255, 255, 1);
      --chat-bg: rgba(0, 0, 0, 0);
      --message-text-color: rgba(255, 255, 255, 1);
      will-change: filter;
    }

    html.embedded, body.embedded {
      background: transparent !important;
    }

    #messagesWrap {
      flex: 1;
      background: var(--chat-bg);
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: none;
      padding-bottom: 0;
    }

    body.chat-open #messagesWrap {
      padding-bottom: 56px;
    }

    #messagesWrap.visible {
      display: none;
    }

    body.chat-open #messagesWrap.visible {
      display: block;
    }

    #messagesWrap::-webkit-scrollbar {
      display: none;
    }

    #messages {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: var(--message-text-color);
      font-size: calc(20px * var(--font-scale));
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 0 16px;
    }


    #messagesWrap {
      position: relative;
      z-index: 30;
    }

    .message {
      width: calc(100% + 32px);
      margin-left: -16px;
      margin-right: -16px;
      padding: 8px 16px 10px 16px;
      border-top: 1px solid #666;
      background: var(--messages-bg);
    }

    .message:first-child {
      border-top: none;
    }

    body.debug .message:nth-child(odd) {
      background: rgba(215, 215, 215, 1);
      color: #000;
    }

    body.debug .message:nth-child(odd) .messageText,
    body.debug .message:nth-child(odd) .timestamp {
      color: #000;
    }

    body.debug .message:nth-child(even) {
      background: rgba(95, 95, 95, 1);
    }

    body.debug .message:hover {
      background: rgba(0, 255, 0, 1);
    }

    .messageMeta {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .timestamp {
      font-size: calc(12px * var(--font-scale));
      line-height: 1.2;
      color: #aaa;
      white-space: nowrap;
    }

    .messageRow {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .messageText {
      flex: 1 1 auto;
      min-width: 0;
    }

    .messageText strong {
      font-weight: 700;
    }

    .helpList {
      margin-top: 8px;
    }

    .helpItem {
      display: block;
      width: fit-content;
      color: var(--message-text-color);
      text-decoration: none;
      cursor: pointer;
      margin: 4px 0;
      line-height: 1.35;
    }

    .helpCommandName {
      text-decoration: underline;
      font-weight: 700;
    }

    .helpCommandDesc {
      margin-left: 8px;
      opacity: 0.9;
    }

    .helpItem:focus {
      outline: none;
    }

    .helpItem:focus .helpCommandName {
      text-decoration-thickness: 2px;
    }

    .helpItem.commandNumberPickerOpen .helpCommandName,
    .helpItem.commandNumberPickerOpen .helpCommandDesc {
      color: #d7ffd7;
    }

    .helpNumberPicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      outline: 1px solid rgba(0,255,102,0.4);
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 2px rgba(0,255,102,0.12);
      vertical-align: middle;
      white-space: nowrap;
    }

    .helpNumberPickerLabel {
      opacity: 0.78;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .helpNumberPickerValue {
      min-width: 2ch;
      font-weight: 700;
      color: #baffc9;
      text-align: right;
    }

    .helpColorPicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      outline: 1px solid rgba(0,255,102,0.4);
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 2px rgba(0,255,102,0.12);
      vertical-align: middle;
      white-space: nowrap;
    }

    .helpColorPickerSwatch {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
      flex: 0 0 auto;
    }

    .helpColorPickerValue {
      min-width: 8ch;
      font-weight: 700;
      color: #baffc9;
      text-transform: lowercase;
    }

    .helpColorPickerHint {
      opacity: 0.72;
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .helpChoicePicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      outline: 1px solid rgba(0,255,102,0.4);
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 2px rgba(0,255,102,0.12);
      vertical-align: middle;
      white-space: nowrap;
    }

    .helpChoicePickerLabel {
      opacity: 0.78;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .helpChoicePickerValue {
      min-width: 9ch;
      font-weight: 700;
      color: #baffc9;
      text-transform: lowercase;
    }

    .helpChoicePickerHint {
      opacity: 0.72;
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .helpTextPicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 8px;
      padding: 3px 6px;
      border-radius: 8px;
      outline: 1px solid rgba(0,255,102,0.45);
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 2px rgba(0,255,102,0.10);
      vertical-align: middle;
      white-space: nowrap;
    }

    .helpTextPickerInput {
      width: 16ch;
      max-width: 42vw;
      border: 0;
      outline: 0;
      background: transparent;
      color: #00ff66;
      font-family: inherit;
      font-size: 12px;
    }

    .helpTextPickerInput::placeholder {
      color: rgba(186,255,201,0.68);
    }

    .helpTextPickerHint {
      opacity: 0.72;
      font-size: 11px;
      letter-spacing: 0.02em;
    }


    .overclockRefreshLink {
      color: #00ffff;
      text-decoration: underline;
      cursor: pointer;
    }

    .overclockRefreshLink:visited {
      color: #00ffff;
    }

    .overclockRefreshLink:hover,
    .overclockRefreshLink:focus {
      color: #00ffff;
      text-decoration: underline;
      outline: none;
    }

    .subscribePromoTag {
      display: inline-block;
      vertical-align: baseline;
      width: auto;
      max-width: 100%;
      padding: 2px 8px;
      margin: 0 10px 0 0;
      color: #00ff00;
      font-weight: 700;
      font-size: inherit;
      line-height: inherit;
      text-align: center;
      white-space: nowrap;
      background: rgba(59, 0, 102, 0.5);
      border: 1px solid #00ff00;
    }

    .subscribePromoMessage {
      display: inline;
      width: auto;
      max-width: 100%;
      text-align: left;
      font-size: inherit;
      line-height: inherit;
    }

    .subscribePromoBody {
      display: inline;
      width: auto;
      max-width: 100%;
      font-size: inherit;
      line-height: inherit;
      text-align: left;
      white-space: normal;
    }

    .subscribePromoChannelLink,
    .subscribePromoChannelLink:visited {
      color: #00ffff;
      text-decoration: underline;
    }

    .subscribePromoRefreshLink,
    .subscribePromoRefreshLink:visited {
      color: #ff3b3b;
      text-decoration: underline;
      cursor: pointer;
    }

    .subscribePromoChannelLink:hover,
    .subscribePromoChannelLink:focus,
    .subscribePromoRefreshLink:hover,
    .subscribePromoRefreshLink:focus {
      outline: none;
      text-decoration: underline;
    }

    .messageDelete {
      display: none;
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: #fff;
      font-family: "Courier New", Courier, monospace;
      font-size: calc(16px * var(--font-scale));
      font-weight: 700;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .messageDelete:focus {
      outline: none;
    }

    body.debug .messageMeta {
      display: flex;
    }

    body.debug .timestamp {
      color: #000;
      font-weight: 700;
      user-select: none;
    }

    body.debug .message {
      cursor: pointer;
    }

    body.debug .message:hover .messageText {
      text-decoration: underline;
    }

    body.debug .messageDelete {
      display: flex;
    }

    body.debug .message[data-role="system"] .messageText {
      color: #ff2a2a;
    }

    body.debug #chatBarWrap,
    body.debug .chatPrompt,
    body.debug .chatClose,
    body.debug #chatBar {
      background: #000;
      color: #fff;
      opacity: 1;
    }

    body.debug #chatBar::placeholder {
      color: #fff;
      opacity: 1;
    }



    .nicknameLabel {
      color: var(--nickname-color);
      font-weight: 700;
    }

    .speakerPrefixLabel {
      font-weight: 700;
      color: inherit;
    }

    .message[data-role="system"] .speakerPrefixLabel {
      color: #ff2a2a;
    }

    .systemCommandLabel {
      font-weight: 700;
      color: inherit;
    }

    .unknownCommandLabel {
      font-weight: 700;
      color: #ffffff;
    }

    .customizePanel {
      margin-top: 8px;
      padding: 12px;
      border: 1px solid #666;
      background: rgba(255, 255, 255, 0.06);
      caret-color: transparent;
    }

    .customizeTitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      margin-bottom: 10px;
      user-select: none;
      caret-color: transparent;
      pointer-events: none;
    }

    .customizeTitleText {
      font-weight: 700;
      user-select: none;
      caret-color: transparent;
      pointer-events: none;
    }

    .customizeActionButtons {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .customizeResetButton,
    .customizeRandomizeButton {
      pointer-events: auto;
      appearance: none;
      border: 1px solid #666;
      background: rgba(158, 158, 158, 0.95);
      color: #000;
      font-family: inherit;
      font-size: calc(14px * var(--font-scale));
      font-weight: 900;
      line-height: 1;
      padding: 6px 12px;
      min-height: 36px;
      cursor: pointer;
      border-radius: 0;
    }

    .customizeResetButton:hover,
    .customizeResetButton:focus-visible,
    .customizeRandomizeButton:hover,
    .customizeRandomizeButton:focus-visible {
      outline: 1px solid #fff;
      outline-offset: 1px;
    }

    .customizeRow {
      display: grid;
      grid-template-columns: minmax(140px, 220px) 1fr;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }

    .customizeRow label {
      font-weight: 700;
      user-select: none;
      caret-color: transparent;
    }

    .customizeRow select,
    .customizeRow input {
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
      font-size: calc(16px * var(--font-scale));
      line-height: 1.2;
      color: #000;
      border: 1px solid #000;
      padding: 6px 8px;
      min-width: 0;
      min-height: 36px;
      height: 36px;
      border-radius: 0;
    }

    .customizeRow select,
    .customizeRow input[type="text"] {
      background: rgba(158, 158, 158, 0.95);
      color: #000;
      font-weight: 900;
      text-shadow: 0 0 0 #000;
      -webkit-text-fill-color: #000;
      caret-color: #000;
    }

    .customizeRow select option {
      background: rgb(158, 158, 158);
      color: #000;
      font-weight: 900;
    }

    .customizeRow input[type="range"] {
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      width: 100%;
      min-width: 0;
      min-height: 0;
      height: auto;
      box-shadow: none;
    }


    .fontControlGroup {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) 44px minmax(0, 1fr);
      gap: 8px;
      align-items: end;
      min-width: 0;
    }

    .fontControlGroup select {
      width: 100%;
      min-width: 0;
      grid-column: 1;
    }

    .fontScaleBlock {
      display: contents;
    }

    .fontScaleCaption {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 36px;
      margin: 0;
      color: #fff;
      font-size: calc(11px * var(--font-scale));
      font-weight: 700;
      white-space: nowrap;
      grid-column: 2;
      user-select: none;
      caret-color: transparent;
    }

    .fontScaleRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      min-height: 36px;
      grid-column: 3;
    }

    .fontScaleValue {
      color: #fff;
      font-size: calc(12px * var(--font-scale));
      font-weight: 700;
      white-space: nowrap;
    }

    .rgbaGroup {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) auto auto minmax(0, 1fr);
      gap: 8px;
      align-items: end;
      min-width: 0;
    }

    .rgbaGroup label {
      min-width: 0;
    }

    .rgbaGroup span {
      display: block;
      font-size: calc(11px * var(--font-scale));
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .colorPickerButton {
      width: 44px;
      min-width: 44px;
      height: 36px;
      padding: 0;
      border: 1px solid #000;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
      align-self: end;
    }

    .rgbaRandomizeButton {
      appearance: none;
      border: 1px solid #000;
      background: rgba(158, 158, 158, 0.95);
      color: #000;
      font-family: inherit;
      font-size: calc(14px * var(--font-scale));
      font-weight: 900;
      line-height: 1;
      padding: 6px 10px;
      min-height: 36px;
      height: 36px;
      cursor: pointer;
      border-radius: 0;
      align-self: end;
      white-space: nowrap;
    }

    .rgbaRandomizeButton:hover,
    .rgbaRandomizeButton:focus-visible {
      outline: 1px solid #fff;
      outline-offset: 1px;
    }

    .colorPickerInput {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      display: block;
    }

    .colorPickerInput::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .colorPickerInput::-webkit-color-swatch {
      border: none;
    }

    .colorPickerInput::-moz-color-swatch {
      border: none;
    }

    #focusSink {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
    }

    #focusSink:focus {
      outline: none;
    }

    #chatInputStack {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
    }

    #chatGhost {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0;
      border: none;
      pointer-events: none;
      overflow: hidden;
      white-space: pre;
      font-family: "Courier New", Courier, monospace;
      font-size: calc(22px * var(--font-scale));
      font-weight: 900;
      line-height: 1;
      color: rgba(255, 255, 255, 0.34);
      z-index: 0;
    }

    #chatGhostTyped {
      visibility: hidden;
      white-space: pre;
      flex: 0 0 auto;
    }

    #chatGhostRemainder {
      white-space: pre;
      flex: 0 0 auto;
    }

    #chatBarWrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 56px;
      background: var(--chatbar-bg);
      display: none;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex: 0 0 auto;
      pointer-events: none;
      visibility: hidden;
      z-index: 31;
    }

    #chatBarWrap.visible {
      display: flex;
      pointer-events: auto;
      visibility: visible;
    }

    #chatPrompt {
      color: var(--chatbar-text);
      font-family: "Courier New", Courier, monospace;
      font-size: calc(22px * var(--font-scale));
      font-weight: 900;
      line-height: 1;
      flex: 0 0 32px;
      width: 32px;
      min-width: 32px;
      box-sizing: border-box;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      padding: 0;
    }

    #chatBar {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--chatbar-text);
      -webkit-text-fill-color: var(--chatbar-text);
      opacity: 1;
      font-family: "Courier New", Courier, monospace;
      font-size: calc(22px * var(--font-scale));
      font-weight: 900;
      font-synthesis-weight: none;
      padding: 0;
      height: 100%;
      flex: 1 1 auto;
      min-width: 0;
      caret-color: transparent;
      cursor: default;
    }

    #chatBar,
    #chatBar[readonly],
    #chatBar:not(:focus),
    #chatBar:not(.armed) {
      color: var(--chatbar-text);
      -webkit-text-fill-color: var(--chatbar-text);
      font-weight: 900;
      opacity: 1;
    }

    #chatBar.armed {
      caret-color: auto;
      cursor: text;
    }
    .commandStyledText {
      font-weight: 900;
      color: transparent;
      background-image: linear-gradient(
        90deg,
        #ff0000 0%,
        #ff7a00 16%,
        #ffee00 32%,
        #00ff66 48%,
        #00d5ff 64%,
        #2f6bff 80%,
        #b000ff 100%
      );
      background-size: 300% 100%;
      background-position: var(--command-shift-position, 0%) 50%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: hue-rotate(var(--command-shift-rotate, 0deg));
      -webkit-text-stroke: 1px #000;
      text-shadow: none;
      display: inline-block;
    }

    #chatBarWrap.commandMode {
      filter: hue-rotate(var(--command-shift-rotate, 0deg));
      gap: 0;
    }

    #chatBar.commandMode,
    #chatBar.commandMode[readonly],
    #chatBar.commandMode:not(:focus),
    #chatBar.commandMode:not(.armed),
    #chatBar.commandMode:focus,
    #chatBarWrap.commandMode #chatBar {
      color: #fff !important;
      -webkit-text-fill-color: #fff !important;
      caret-color: transparent;
      font-weight: 900 !important;
      font-synthesis-weight: none;
      -webkit-text-stroke: 0 !important;
      text-shadow: none !important;
      background: #000 !important;
      background-image: none !important;
      -webkit-background-clip: border-box !important;
      background-clip: border-box !important;
      filter: none !important;
      opacity: 1 !important;
      padding: 6px 6px 6px 2px !important;
      height: auto;
      min-height: calc(100% - 12px);
      align-self: center;
      border-radius: 0 4px 4px 0;
    }

    #chatPrompt.commandMode,
    #chatBarWrap.commandMode #chatPrompt {
      color: #000 !important;
      -webkit-text-fill-color: #000 !important;
      caret-color: transparent;
      font-weight: 900 !important;
      font-synthesis-weight: none;
      -webkit-text-stroke: 0 !important;
      text-shadow: none !important;
      background: #000 !important;
      background-image: none !important;
      -webkit-background-clip: border-box !important;
      background-clip: border-box !important;
      filter: none !important;
      opacity: 1 !important;
      padding: 6px 0 !important;
      height: auto;
      min-height: calc(100% - 12px);
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px 0 0 4px;
    }

    body:not(.global-hueshift) #chatBarWrap.commandMode #chatPrompt,
    body:not(.global-hueshift) #chatPrompt.commandMode {
      color: #fff !important;
      -webkit-text-fill-color: #fff !important;
      font-weight: 900 !important;
    }

    body.global-hueshift .commandStyledText,
    body.global-hueshift #chatBarWrap.commandMode {
      filter: none !important;
    }
      to {
        background-position: 300% 50%;
        filter: hue-rotate(360deg);
      }
    }

    #chatBar::placeholder {
      color: var(--chatbar-text);
      -webkit-text-fill-color: var(--chatbar-text);
      opacity: 1;
      font-weight: 900;
    }

    #chatBar:focus.armed::placeholder {
      color: var(--chatbar-text);
      -webkit-text-fill-color: var(--chatbar-text);
      font-weight: 400;
    }

    #chatBarWrap.commandMode #chatBar::placeholder,
    #chatBar.commandMode::placeholder {
      color: #000 !important;
      -webkit-text-fill-color: #000 !important;
      font-weight: 900 !important;
      opacity: 1 !important;
    }


    #chatClose {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--chatbar-text);

    function appendStyledSystemText(messageText, rawContent, repeatCount = 1, repeatLabel = '') {
      messageText.innerHTML = '';

      const appendRepeatSuffix = (parentNode, label) => {
        if (!label) return;

        if (label === 'INFINITE') {
          const infiniteSpan = document.createElement('span');
          infiniteSpan.className = 'commandStyledText infiniteRepeatLabel';

          parentNode.appendChild(infiniteSpan);
        } else {
          parentNode.appendChild(document.createTextNode(label));

      };
      const executionMatch = rendered.match(/^(System:\s+)?(\/\S+)(\s+command)?\s+(executed|enabled|disabled|overclocked)\s+by\s+(.+)$/i);
      const unknownCommandMatch = rendered.match(/^(System:\s+)?(\/\S+)\s+is\s+not\s+a\s+known\s+command$/i);

      if (executionMatch) {
        const [, prefix = '', commandToken, commandQualifier = '', actionWord, nicknameText] = executionMatch;

        if (prefix) {
          appendSpeakerPrefix(messageText, prefix.trimEnd(), 'speakerPrefixLabel');
          messageText.appendChild(document.createTextNode(' '));
        }

        const commandSpan = document.createElement('span');
        commandSpan.className = 'systemCommandLabel';
        commandSpan.textContent = commandToken;
        messageText.appendChild(commandSpan);

        if (commandQualifier) {
          messageText.appendChild(document.createTextNode(commandQualifier));
        }

        messageText.appendChild(document.createTextNode(` ${actionWord} by `));

        const nicknameSpan = document.createElement('span');
        nicknameSpan.className = 'nicknameLabel';
        if (actionWord.toLowerCase() === 'overclocked' && repeatLabel === 'INFINITE') {
          nicknameSpan.classList.add('overclockNicknameLabel');
          nicknameSpan.dataset.overclockNickname = 'true';
        }
        nicknameSpan.textContent = nicknameText;
        messageText.appendChild(nicknameSpan);

        if (repeatCount > 1 || repeatLabel) {
          appendRepeatSuffix(messageText, repeatLabel || String(repeatCount));
        }
        return;
      }

      if (unknownCommandMatch) {
        const [, prefix = '', commandToken] = unknownCommandMatch;

        if (prefix) {
          appendSpeakerPrefix(messageText, prefix.trimEnd(), 'speakerPrefixLabel');
          messageText.appendChild(document.createTextNode(' '));
        }

        const commandSpan = document.createElement('span');
        commandSpan.className = 'unknownCommandLabel';
        commandSpan.textContent = commandToken;
        messageText.appendChild(commandSpan);

        messageText.appendChild(document.createTextNode(' is not a known command'));

        if (repeatCount > 1 || repeatLabel) {
          appendRepeatSuffix(messageText, repeatLabel || String(repeatCount));
        }
        return;
      }

      const suffix = repeatLabel || (repeatCount > 1 ? String(repeatCount) : '');
      const finalText = suffix ? `${rendered} (${suffix})` : rendered;
      const genericPrefixMatch = finalText.match(/^([^:]+:)(\s*)(.*)$/);

        return;

        cloneMessages.style.minHeight = `${screenshotHeight}px`;
        cloneMessages.style.overflow = 'visible';
      }

      const wrapper = document.createElement('div');
      wrapper.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
      wrapper.style.width = `${screenshotWidth}px`;
      wrapper.style.height = `${screenshotHeight}px`;
      wrapper.style.margin = '0';
      wrapper.style.padding = '0';
      wrapper.style.overflow = 'hidden';
      wrapper.appendChild(clone);

      return { wrapper, screenshotWidth, screenshotHeight };
    }

    function renderCloneToPngBlob(wrapper, width, height) {
      return new Promise((resolve, reject) => {
        const serializedMarkup = new XMLSerializer().serializeToString(wrapper);
        const svgMarkup = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
            <foreignObject x="0" y="0" width="100%" height="100%">${serializedMarkup}</foreignObject>
          </svg>
        `;

        const loadImageFromSource = (source) => new Promise((innerResolve, innerReject) => {
          const image = new Image();
          image.decoding = 'sync';
          image.onload = () => innerResolve(image);
          image.onerror = () => innerReject(new Error('The browser could not render the chat screenshot image.'));
          image.src = source;
        });

        const svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
        const svgObjectUrl = URL.createObjectURL(svgBlob);
        const svgDataUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgMarkup)}`;

        (async () => {
          let image = null;
          let lastError = null;

          try {
            image = await loadImageFromSource(svgDataUrl);
          } catch (error) {
            lastError = error;
            try {
              image = await loadImageFromSource(svgObjectUrl);
            } catch (fallbackError) {
              lastError = fallbackError;
            }
          }

          URL.revokeObjectURL(svgObjectUrl);

          if (!image) {
            reject(lastError || new Error('The browser could not render the chat screenshot image.'));
            return;
          }

          try {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d');
            if (!context) {
              reject(new Error('The browser could not create a drawing context for the screenshot.'));
              return;
            }
            context.drawImage(image, 0, 0, width, height);
            canvas.toBlob((blob) => {
              if (blob) {
                resolve(blob);
              } else {
                reject(new Error('Canvas export returned an empty blob.'));
              }
            }, 'image/png');
          } catch (error) {
            reject(error);
          }
        })();
      });
    }

    function downloadBlob(blob, filename) {
      const blobUrl = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = blobUrl;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      return blobUrl;
    }

    function renderUserMessage(line, messageTextEl = null) {
      const rawContent = line.dataset.rawContent || '';
      const separatorIndex = rawContent.indexOf(':');
      const messageText = messageTextEl || line.querySelector('.messageText');
      if (!messageText) return;
      if (separatorIndex === -1) {
        messageText.textContent = rawContent;
        return;
      }
      const nickname = rawContent.slice(0, separatorIndex).trim();
      const bodyText = rawContent.slice(separatorIndex + 1).replace(/^\s*/, '');

      appendSpeakerPrefix(messageText, `${nickname}:`, 'nicknameLabel');

    function formatTimestamp(date = new Date()) {
      return date.toLocaleTimeString([], {
        hour: 'numeric',

        second: '2-digit'
      });

    async function copyMessageWithTimestamp(line) {
      if (!line) return;
      const timestampText = (line.querySelector('.timestamp')?.textContent || '').trim();
      const rawContent = (line.dataset.rawContent || '').trim();
      let messageText = rawContent;

      if (!messageText) {
        const messageTextEl = line.querySelector('.messageText');
        messageText = (messageTextEl?.textContent || '').trim();
      }

      const combinedText = timestampText ? `${timestampText} ${messageText}` : messageText;
      if (!combinedText) return;

      try {
        await navigator.clipboard.writeText(combinedText);
      } catch (error) {
        const fallbackTextArea = document.createElement('textarea');
        fallbackTextArea.value = combinedText;
        fallbackTextArea.setAttribute('readonly', '');
        fallbackTextArea.style.position = 'fixed';
        fallbackTextArea.style.top = '-9999px';
        fallbackTextArea.style.opacity = '0';
        document.body.appendChild(fallbackTextArea);
        fallbackTextArea.select();
        document.execCommand('copy');
        fallbackTextArea.remove();
      }
    }

    function addMessage(content, role = 'user', isHtml = false) {
      const wasPinnedToBottom = isNearBottom();
      const line = document.createElement('div');
      line.className = 'message';
      line.dataset.role = role;
      line.addEventListener('click', async (event) => {
        if (!document.body.classList.contains('debug')) return;
        if (event.target.closest('.messageDelete')) return;
        await copyMessageWithTimestamp(line);
      });

      const meta = document.createElement('div');
      meta.className = 'messageMeta';

      const timestamp = document.createElement('div');
      timestamp.className = 'timestamp';
      timestamp.textContent = formatTimestamp();

      meta.appendChild(timestamp);

      const row = document.createElement('div');
      row.className = 'messageRow';

      const messageText = document.createElement('div');
      messageText.className = 'messageText';

      if (content instanceof Node) {
        if (content && content.dataset && content.dataset.commandPanelType) {
          line.dataset.commandPanelType = content.dataset.commandPanelType;
        }
        messageText.appendChild(content);
      } else if (isHtml) {
        messageText.innerHTML = content;
      } else {
        let displayContent = content;
        if (typeof displayContent === 'string') {
          line.dataset.rawContent = displayContent;
        }
        if (role === 'system' && typeof displayContent === 'string') {
          appendStyledSystemText(messageText, displayContent, Number(line.dataset.repeatCount || '1'), line.dataset.repeatLabel || '');
        } else if (role === 'user' && typeof displayContent === 'string') {
          renderUserMessage(line, messageText);
        } else {
          messageText.textContent = displayContent;
        }
      }

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'messageDelete';
      deleteBtn.type = 'button';
      deleteBtn.setAttribute('aria-label', 'Delete message');
      deleteBtn.textContent = 'x';
      deleteBtn.addEventListener('click', () => {
        const wasNearBottom = Math.abs(
          messagesWrap.scrollHeight - messagesWrap.clientHeight - messagesWrap.scrollTop
        ) < 8;
        const homepagePanel = line.querySelector('.customizePanel[data-panel-type="homepageCustomize"]');
        if (homepagePanel) {
          homepageCustomizePanelVisible = false;
        }
        const containsCustomizePanel = line.querySelector('.customizePanel');
        if (containsCustomizePanel && autoShuffleIntervalId !== null) {
          line.style.display = 'none';
        } else {
          line.remove();
        }
        updateMessagesVisibility();
        if (wasNearBottom && Array.from(messages.children).some((child) => child.style.display !== 'none')) {
          scrollToBottom();
        }
      });

      row.appendChild(messageText);
      row.appendChild(deleteBtn);

      line.appendChild(meta);
      line.appendChild(row);
      messages.appendChild(line);
      updateMessagesVisibility();
      if (wasPinnedToBottom || role !== 'system') {
        requestAnimationFrame(scrollToBottom);
      }
      return line;
    }

    function addSystemMessage(text, options = {}) {
      const baseText = getSystemBaseText(text);
      const matchingMessages = Array.from(messages.querySelectorAll('.message[data-role="system"]')).filter((line) => {
        return getSystemBaseText(line.dataset.rawContent || '') === baseText;
      });
      const priorRepeatCount = matchingMessages.reduce((maxCount, line) => Math.max(maxCount, Number(line.dataset.repeatCount || '1')), 0);
      const repeatCount = Number(options.repeatCount || (priorRepeatCount ? (priorRepeatCount + 1) : 1));
      const repeatLabel = typeof options.repeatLabel === 'string' ? options.repeatLabel : '';
      matchingMessages.forEach((line) => line.remove());

      const line = addMessage(baseText, 'system');
      if (line) {
        line.dataset.rawContent = baseText;
        line.dataset.repeatCount = String(repeatCount);
        if (repeatLabel) {
          line.dataset.repeatLabel = repeatLabel;
        } else {
          delete line.dataset.repeatLabel;
        }
        if (options.overclockAlias) {
          line.dataset.overclockAlias = 'true';
          dvdOverclockAliasLine = line;
        }
        const messageText = line.querySelector('.messageText');
        if (messageText) {
          appendStyledSystemText(messageText, baseText, repeatCount, repeatLabel);
        }
      }
      return line;
    }

    function recallOlderHistory() {
      if (inputHistory.length === 0) return;

      if (historyIndex === -1) {
        historyDraft = chatBar.value;
        historyIndex = inputHistory.length - 1;
      } else if (historyIndex > 0) {

    function clampFontScalePercent(value) {
      if (!Number.isFinite(value)) return null;
      return Math.min(500, Math.max(10, value));
    }

    function applyFontScale(percent) {
      const safePercent = clampFontScalePercent(percent);
      if (safePercent === null) return false;
      document.body.style.setProperty('--font-scale', String(safePercent / 100));
      return true;
    }


    function clampChannel(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 0;
      return Math.min(255, Math.max(0, Math.round(num)));
    }

    function clampAlpha(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 1;
      return Math.min(1, Math.max(0, num));
    }

    function toRgbaString(r, g, b, a) {
      return `rgba(${clampChannel(r)}, ${clampChannel(g)}, ${clampChannel(b)}, ${clampAlpha(a)})`;
    }

    function colorToRgbaChannels(value, fallback = { r: 255, g: 255, b: 255, a: 1 }) {
      const probe = document.createElement('div');
      probe.style.color = '';
      probe.style.color = String(value || '').trim();
      if (!probe.style.color) return { ...fallback };
      document.body.appendChild(probe);
      const computed = getComputedStyle(probe).color;
      probe.remove();
      const match = computed.match(/rgba?\(([^)]+)\)/i);
      if (!match) return { ...fallback };
      const parts = match[1].split(',').map(part => part.trim());
      return {
        r: clampChannel(parts[0]),
        g: clampChannel(parts[1]),
        b: clampChannel(parts[2]),
        a: parts.length > 3 ? clampAlpha(parts[3]) : 1
      };
    }

    function rgbaChannelsToHex(channels) {
      return `#${[channels.r, channels.g, channels.b].map((value) => clampChannel(value).toString(16).padStart(2, '0')).join('')}`;
    }

    function generateRandomHexColor() {
      const randomChannel = () => Math.floor(Math.random() * 256);
      return rgbaChannelsToHex({
        r: randomChannel(),
        g: randomChannel(),
        b: randomChannel()
      });
    }

    function parseCssColorWithOpacity(value, fallback = { r: 255, g: 255, b: 255, a: 1 }) {
      const rgba = colorToRgbaChannels(value, fallback);
      return {
        color: rgbaChannelsToHex(rgba),
        opacityPercent: Math.round(clampAlpha(rgba.a) * 100)
      };
    }

    function applyGlobalFontFamily(fontFamily) {
      const safeFont = String(fontFamily || '').trim() || '"Courier New", Courier, monospace';
      document.documentElement.style.setProperty('--global-font-family', safeFont);
      document.body.style.fontFamily = safeFont;
      document.querySelectorAll('input, button, select, textarea').forEach((el) => {
        el.style.fontFamily = safeFont;
      });
    }


    function getStyleTargetForCssVar(cssVarName) {
      return cssVarName === '--document-bg' ? document.documentElement : document.body;
    }

    function getComputedCssVarValue(cssVarName) {
      return getComputedStyle(getStyleTargetForCssVar(cssVarName)).getPropertyValue(cssVarName).trim();
    }

    function applyCssVarColor(cssVarName, color, opacityPercent, fallback) {
      const parsed = colorToRgbaChannels(color, fallback);
      getStyleTargetForCssVar(cssVarName).style.setProperty(
        cssVarName,
        toRgbaString(parsed.r, parsed.g, parsed.b, clampAlpha((Number.isFinite(opacityPercent) ? opacityPercent : 100) / 100))
      );
    }


    function syncCustomizePanelUi(bindingSet) {
      if (!bindingSet) return;
      const { fontSelect, fontScaleInput, fontScaleValue, controlBindings } = bindingSet;
      if (fontSelect) {
        fontSelect.value = getComputedStyle(document.documentElement).getPropertyValue('--global-font-family').trim() || customizeDefaults.fontFamily;
      }
      if (fontScaleInput && fontScaleValue) {
        const currentScaleValue = parseFloat(getComputedStyle(document.body).getPropertyValue('--font-scale'));
        const currentScalePercent = Number.isFinite(currentScaleValue) && currentScaleValue > 0 ? Math.round(currentScaleValue * 100) : customizeDefaults.fontScalePercent;
        fontScaleInput.value = String(currentScalePercent);
        fontScaleValue.textContent = `${currentScalePercent}%`;
      }
      (controlBindings || []).forEach((binding) => {
        if (!binding?.textInput || !binding?.pickerInput || !binding?.opacityInput || !binding?.opacityValue) return;
        const current = parseCssColorWithOpacity(getComputedCssVarValue(binding.cssVar), binding.fallback);
        binding.textInput.value = current.color;
        binding.pickerInput.value = current.color;
        binding.opacityInput.value = String(current.opacityPercent);
        binding.opacityValue.textContent = `${current.opacityPercent}%`;
      });
    }

    function syncAllCustomizePanels() {
      customizeBindingSets.forEach((bindingSet) => {
        if (!bindingSet?.wrapper?.isConnected) {
          customizeBindingSets.delete(bindingSet);
          return;
        }
        syncCustomizePanelUi(bindingSet);
      });
    }

    function getCurrentSettingsSnapshot() {
      const computedRoot = getComputedStyle(document.documentElement);
      const computedBody = getComputedStyle(document.body);
      const fontFamily = computedRoot.getPropertyValue('--global-font-family').trim() || computedBody.fontFamily || customizeDefaults.fontFamily;
      const scaleValue = parseFloat(computedBody.getPropertyValue('--font-scale'));
      const fontScalePercent = Number.isFinite(scaleValue) && scaleValue > 0 ? Math.round(scaleValue * 100) : customizeDefaults.fontScalePercent;
      const colors = {};
      Object.entries(customizeDefaults.colors).forEach(([cssVar, defaults]) => {
        colors[cssVar] = parseCssColorWithOpacity(getComputedCssVarValue(cssVar), defaults.fallback);
      });
      return {
        version: 1,
        nickname: currentNickname,
        debugMode: !!debugMode,
        showSystemPrefix: !!showSystemPrefix,
        autoShuffleActive: autoShuffleIntervalId !== null,
        colorInvertEnabled: !!globalColorInvertEnabled,
        colorHueShiftEnabled: !!globalHueShiftEnabled,
        customize: {
          fontFamily,
          fontScalePercent,
          colors,
        },
      };
    }

    function applySettingsSnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== 'object') {
        throw new Error('Settings file is invalid');
      }

      if (typeof snapshot.nickname === 'string' && snapshot.nickname.trim()) {
        currentNickname = snapshot.nickname.trim();
      }

      if (typeof snapshot.showSystemPrefix === 'boolean') {
        showSystemPrefix = snapshot.showSystemPrefix;
      }

      if (typeof snapshot.debugMode === 'boolean') {
        setDebugMode(snapshot.debugMode);
        debugMode = snapshot.debugMode;
      }

      if (typeof snapshot.colorInvertEnabled === 'boolean') {
        setGlobalColorInvert(snapshot.colorInvertEnabled);
      }

      if (typeof snapshot.colorHueShiftEnabled === 'boolean') {
        setGlobalHueShift(snapshot.colorHueShiftEnabled);
      }

      const customize = snapshot.customize;
      if (customize && typeof customize === 'object') {
        if (typeof customize.fontFamily === 'string' && customize.fontFamily.trim()) {
          applyGlobalFontFamily(customize.fontFamily.trim());
        }
        if (customize.fontScalePercent != null) {
          applyFontScale(clampFontScalePercent(Number(customize.fontScalePercent)) || customizeDefaults.fontScalePercent);
        }
        if (customize.colors && typeof customize.colors === 'object') {
          Object.entries(customizeDefaults.colors).forEach(([cssVar, defaults]) => {
            const entry = customize.colors[cssVar];
            if (!entry || typeof entry !== 'object') return;
            const color = typeof entry.color === 'string' && entry.color.trim() ? entry.color.trim() : defaults.color;
            const opacityPercent = Math.max(0, Math.min(100, Number(entry.opacityPercent)));
            applyCssVarColor(cssVar, color, Number.isFinite(opacityPercent) ? opacityPercent : defaults.opacityPercent, defaults.fallback);
          });
        }
      }

      syncAllCustomizePanels();

      if (snapshot.autoShuffleActive) {
        startAutoShuffleColors();
      } else {
        stopAutoShuffleColors();
      }
    }

    function downloadSettingsFile() {
      const snapshot = getCurrentSettingsSnapshot();
      const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'settings.json';
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function handleSettingsLoadSelection(event) {
      const [file] = Array.from(event.target.files || []);
      event.target.value = '';
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || '{}'));
          applySettingsSnapshot(parsed);
          
        } catch (error) {
          addSystemMessage(`Failed to load settings.json: ${error && error.message ? error.message : 'Invalid file'}`);
        }
      };
      reader.onerror = () => {
        addSystemMessage('Failed to read settings.json');
      };
      reader.readAsText(file);
    }

      const current = colorToRgbaChannels(getComputedCssVarValue('--messages-bg'), { r: 0, g: 0, b: 0, a: 0 });
      return toRgbaString(255 - current.r, 255 - current.g, 255 - current.b, 0.75);

    function updateScriptStatus(run, statusText = '') {
      if (!run || !run.statusLine || !run.statusLabel) return;
      const base = `Script run (${run.sentCount}/${run.totalCount})`;
      const suffix = statusText ? ` ${statusText}` : '';
      const plainText = `${base}${suffix}`;
      const displayText = (!debugMode && run.done) ? plainText : plainText;
      run.statusLabel.textContent = displayText;
      run.statusLine.dataset.rawContent = displayText;
      run.statusLine.title = run.done ? (run.hidden ? 'Click to show sent script messages' : 'Click to hide sent script messages') : 'Script is running';
      run.statusLine.style.cursor = run.done ? 'pointer' : 'default';
      run.statusLine.classList.toggle('scriptRunComplete', !!run.done);
      run.statusLine.style.display = debugMode ? '' : 'none';
      if (run.statusHint) {
        run.statusHint.style.display = debugMode ? '' : 'none';
      }
    }

    function createScriptStatusMessage(run) {
      const wrapper = document.createElement('div');
      wrapper.className = 'scriptRunStatus';

      const label = document.createElement('span');
      label.className = 'scriptRunStatusLabel';
      wrapper.appendChild(label);

      const hint = document.createElement('span');
      hint.className = 'scriptRunStatusHint';
      hint.textContent = ' click to hide/show lines after completion';
      wrapper.appendChild(hint);

      const line = addMessage(wrapper, 'system');
      line.dataset.scriptRunId = String(run.id);
      line.style.display = debugMode ? '' : 'none';
      run.statusLine = line;
      run.statusLabel = label;
      run.statusHint = hint;

      wrapper.addEventListener('click', () => {
        if (!run.done) return;
        setScriptGroupVisibility(run, !run.hidden);
        updateScriptStatus(run, run.finalStatusText || 'completed');
      });

      updateScriptStatus(run, 'running...');
      return line;
    }

    async function runScriptLines(run) {
      for (let index = 0; index < run.lines.length; index += 1) {
        if (run.cancelled) break;
        const lineText = run.lines[index];
        if (lineText.trim()) {
          const line = addMessage(`${currentNickname}: ${lineText}`, 'user');
          line.dataset.scriptRunId = String(run.id);
          line.dataset.scriptMessageId = `${run.id}-${run.messageIds.length + 1}`;
          run.messageIds.push(line.dataset.scriptMessageId);
          run.sentCount += 1;
          applyScriptMessageStyling(line, run.sentCount);
        }
        updateScriptStatus(run, 'running...');
        if (index < run.lines.length - 1 && !run.cancelled) {
          await sleep(330);
        }
      }

      run.done = true;
      if (run.cancelled) {
        run.finalStatusText = 'stopped';
      } else {
        run.finalStatusText = 'completed';
      }
      setScriptGroupVisibility(run, true);
      updateScriptStatus(run, run.finalStatusText);
      if (run.statusHint) {
        run.statusHint.textContent = ' click to hide/show lines';
      }
      if (activeScriptRun && activeScriptRun.id === run.id) {
        activeScriptRun = null;
      }
    }

    function startScriptRunFromText(fileText, filename = 'script.txt') {
      if (activeScriptRun) {
        activeScriptRun.cancelled = true;
      }

      const normalizedText = String(fileText || '').replace(/\r\n?/g, '\n');
      const lines = normalizedText.split('\n');
      const run = {
        id: ++scriptRunCounter,
        filename,
        lines,
        totalCount: lines.length,
        sentCount: 0,
        messageIds: [],
        hidden: false,
        done: false,
        cancelled: false,
        finalStatusText: ''
      };

      scriptRuns.push(run);
      activeScriptRun = run;
      createScriptStatusMessage(run);
      runScriptLines(run);
    }

    function handleScriptLoadSelection(event) {
      const [file] = Array.from(event.target.files || []);
      event.target.value = '';
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          startScriptRunFromText(String(reader.result || ''), file.name || 'script.txt');
        } catch (error) {
          addSystemMessage(`Failed to load script file: ${error && error.message ? error.message : 'Invalid file'}`);
        }
      };
      reader.onerror = () => {
        addSystemMessage('Failed to read script file');
      };
      reader.readAsText(file);
    }

    function sanitizeUrl(rawUrl) {
      const value = rawUrl.trim();
      if (!value) return null;

      const withProtocol = /^[a-zA-Z][a-zA-Z\d+.-]*:\/\//.test(value) ? value : `https://${value}`;

      try {
        const parsed = new URL(withProtocol);
        if (!['http:', 'https:'].includes(parsed.protocol)) {
          return null;
        }
        return parsed.toString();
      } catch (error) {
        return null;
      }
    }

    function getCommandCatalog() {
      const pageCommands = pageCommandRegistry.map((entry) => entry.name);
      if (document.body.classList.contains('embedded') && pageCommandMeta.pageOnly) {
        return Array.from(new Set(['/help', ...pageCommands])).sort((a, b) => a.localeCompare(b));
      }
      return Array.from(new Set([...builtInCommandList, ...pageCommands])).sort((a, b) => a.localeCompare(b));
    }

    function setPageCommands(payload = []) {
      const source = Array.isArray(payload) ? { commands: payload } : (payload && typeof payload === 'object' ? payload : {});
      const commands = Array.isArray(source.commands) ? source.commands : [];
      pageCommandRegistry = commands
        .filter((entry) => entry && typeof entry.name === 'string' && entry.name.trim().startsWith('/'))
        .map((entry) => ({
          name: entry.name.trim().toLowerCase(),
          desc: entry.desc ? String(entry.desc) : 'page command',
          usage: entry.usage ? String(entry.usage) : entry.name.trim(),
          execute: entry.execute !== false,
          // ADDED: Parent pages can explicitly replace a built-in command instead of
          // relying on a hardcoded list inside chat-sandbox.html.
          replaceBuiltIn: entry.replaceBuiltIn === true,
          passthroughBuiltIn: entry.passthroughBuiltIn === true,
          hidden: entry.hidden === true,
          suggestions: Array.isArray(entry.suggestions) ? entry.suggestions.map((value) => String(value || '').trim()).filter(Boolean) : []
        }));
      pageCommandMeta = {
        pageOnly: !!source.pageOnly,
        pageId: typeof source.pageId === 'string' ? source.pageId : '',
        title: typeof source.title === 'string' ? source.title : '',
        sourceKey: typeof source.sourceKey === 'string' ? source.sourceKey : ''
      };
    }

    function getPageCommandDefinition(command) {
      const normalized = String(command || '').trim().toLowerCase();
      return pageCommandRegistry.find((entry) => entry.name === normalized) || null;
    }

    function dispatchPageCommand(command, raw, args) {
      pendingPageCommand = { command, raw };
      window.parent.postMessage({
        type: 'pageChatExecute',
        command,
        raw,
        args
      }, '*');
    }

    function getMergedHelpCommands() {
      const showPageOnlyHelp = document.body.classList.contains('embedded') && pageCommandMeta.pageOnly && pageCommandRegistry.length > 0;
      const pageCommands = pageCommandRegistry.map((entry) => ({
        fromPage: true,
        name: entry.name,
        value: entry.usage || entry.name,
        execute: entry.execute !== false,
        desc: entry.desc || 'page command',
        hidden: entry.hidden === true,
        suggestions: Array.isArray(entry.suggestions) ? entry.suggestions.slice() : []
      }));
      const helpCommand = builtInCommands.find((entry) => entry.name === '/help');
      const mergedCommands = showPageOnlyHelp ? [helpCommand, ...pageCommands].filter(Boolean) : [...builtInCommands, ...pageCommands];
      return Array.from(mergedCommands.reduce((map, entry) => {
        const key = String(entry.name || '').toLowerCase();
        if (!key) return map;
        if (!map.has(key) || entry.fromPage) map.set(key, entry);
        return map;
      }, new Map()).values()).sort((a, b) => a.name.localeCompare(b.name));
    }

    let activeCommandPicker = null;

    function isShooterNumberPickerCommand(command = {}) {

    function isShooterChoicePickerCommand(command = {}) {

    function isShooterCheatermodeCommand(command = {}) {

    function getShooterChoicePickerOptions(command = {}) {
      const suggestions = command && Array.isArray(command.suggestions) && command.suggestions.length
        ? command.suggestions
        : ['normal', 'big_bullets', 'glitch'];
      return suggestions
        .map((value) => String(value || '').trim())
        .filter(Boolean);
    }

    function getShooterNumberPickerDefaultValue(commandName = '') {
      const normalized = String(commandName || '').trim().toLowerCase();
      if (normalized === '/hearts') return 4;
      if (normalized === '/game_speed') return 1;
      if (normalized === '/bombs') return 3;
      if (normalized === '/lives') return 1;
      if (normalized === '/shields') return 0;
      return 0;
    }

    function getShooterNumberPickerConfig(commandName = '') {
      const normalized = String(commandName || '').trim().toLowerCase();
      if (normalized === '/hearts') {
        return { min: 1, max: 100, step: 1, infiniteValue: 100 };
      }
      if (normalized === '/game_speed') {
        return { min: -5, max: 20, step: 1, infiniteValue: null };
      }
      if (normalized === '/bombs' || normalized === '/lives' || normalized === '/shields') {
        return { min: 0, max: 100, step: 1, infiniteValue: 100 };
      }
      return { min: 0, max: 999, step: 1, infiniteValue: null };
    }

    function formatShooterNumberPickerValue(commandName = '', value = 0) {
      const config = getShooterNumberPickerConfig(commandName);
      const safeValue = Math.max(config.min, Math.min(config.max, Number(value) || 0));
      if (config.infiniteValue !== null && safeValue >= config.infiniteValue) {
        return '∞';
      }
      return String(safeValue);
    }

    function clampShooterColorValue(value, min, max) {
      return Math.max(min, Math.min(max, Number(value)));
    }

    function normalizeShooterColorHex(value) {
      const raw = String(value || '').trim();
      if (/^#[0-9a-f]{6}$/i.test(raw)) return raw.toLowerCase();
      if (/^#[0-9a-f]{3}$/i.test(raw)) {
        return `#${raw[1]}${raw[1]}${raw[2]}${raw[2]}${raw[3]}${raw[3]}`.toLowerCase();
      }
      return '#4b0076';
    }

    function rgbToHsl(r, g, b) {
      const red = clampShooterColorValue(r, 0, 255) / 255;
      const green = clampShooterColorValue(g, 0, 255) / 255;
      const blue = clampShooterColorValue(b, 0, 255) / 255;
      const max = Math.max(red, green, blue);
      const min = Math.min(red, green, blue);
      let hue = 0;
      let saturation = 0;
      const lightness = (max + min) / 2;

      if (max !== min) {
        const delta = max - min;
        saturation = lightness > 0.5 ? delta / (2 - max - min) : delta / (max + min);
        switch (max) {
          case red:
            hue = ((green - blue) / delta) + (green < blue ? 6 : 0);
            break;
          case green:
            hue = ((blue - red) / delta) + 2;
            break;
          default:
            hue = ((red - green) / delta) + 4;
            break;
        }
        hue *= 60;
      }

      return {
        hue,
        saturation,
        lightness
      };
    }

    function hexToHsl(hexValue) {
      const safeHex = normalizeShooterColorHex(hexValue);
      const red = parseInt(safeHex.slice(1, 3), 16);
      const green = parseInt(safeHex.slice(3, 5), 16);
      const blue = parseInt(safeHex.slice(5, 7), 16);
      return rgbToHsl(red, green, blue);
    }

    function hslToHex(hue, saturation, lightness) {
      let safeHue = Number(hue) % 360;
      if (safeHue < 0) safeHue += 360;
      const safeSaturation = clampShooterColorValue(saturation, 0, 1);
      const safeLightness = clampShooterColorValue(lightness, 0, 1);

      const chroma = (1 - Math.abs((2 * safeLightness) - 1)) * safeSaturation;
      const huePrime = safeHue / 60;
      const x = chroma * (1 - Math.abs((huePrime % 2) - 1));
      let redPrime = 0;
      let greenPrime = 0;
      let bluePrime = 0;

      if (huePrime >= 0 && huePrime < 1) {
        redPrime = chroma; greenPrime = x;
      } else if (huePrime < 2) {
        redPrime = x; greenPrime = chroma;
      } else if (huePrime < 3) {
        greenPrime = chroma; bluePrime = x;
      } else if (huePrime < 4) {
        greenPrime = x; bluePrime = chroma;
      } else if (huePrime < 5) {
        redPrime = x; bluePrime = chroma;
      } else {
        redPrime = chroma; bluePrime = x;
      }

      const match = safeLightness - (chroma / 2);
      const red = Math.round((redPrime + match) * 255);
      const green = Math.round((greenPrime + match) * 255);
      const blue = Math.round((bluePrime + match) * 255);
      return `#${[red, green, blue].map((channel) => channel.toString(16).padStart(2, '0')).join('')}`;
    }

    function getShooterBackgroundColorDefaultState() {
      const parsed = hexToHsl('#4b0076');
      return {
        hue: parsed.hue,
        saturation: Math.max(0.7, parsed.saturation || 0.86),
        lightness: Math.max(0.18, Math.min(0.82, parsed.lightness || 0.23))
      };
    }

    function closeActiveCommandPicker() {
      if (!activeCommandPicker || !activeCommandPicker.item) {
        activeCommandPicker = null;
        notifyParentChatSandboxState();
        return;
      }
      const { item, picker } = activeCommandPicker;
      item.classList.remove('commandNumberPickerOpen');
      item.removeAttribute('data-number-picker-active');
      item.removeAttribute('data-number-picker-command');
      item.removeAttribute('data-color-picker-active');
      item.removeAttribute('data-color-picker-command');
      item.removeAttribute('data-choice-picker-active');
      item.removeAttribute('data-choice-picker-command');
      item.removeAttribute('data-text-picker-active');
      item.removeAttribute('data-text-picker-command');
      if (picker && picker.parentNode) picker.parentNode.removeChild(picker);
      activeCommandPicker = null;
      notifyParentChatSandboxState();
    }

    function updateActiveCommandPicker(delta = 0) {
      if (!activeCommandPicker) return false;
      if (activeCommandPicker.kind === 'number') {
        if (!activeCommandPicker.valueNode) return false;
        const config = activeCommandPicker.config || getShooterNumberPickerConfig(activeCommandPicker.command);
        if (delta) {
          const stepAmount = Number(config.step || 1) * Number(delta);
          const nextValue = Math.max(config.min, Math.min(config.max, Number(activeCommandPicker.value || 0) + stepAmount));
          activeCommandPicker.value = nextValue;
        }
        activeCommandPicker.valueNode.textContent = formatShooterNumberPickerValue(activeCommandPicker.command, activeCommandPicker.value);
        return true;
      }
      if (activeCommandPicker.kind === 'color') {
        if (!activeCommandPicker.valueNode || !activeCommandPicker.swatchNode) return false;
        const axis = activeCommandPicker.pendingAxis || 'x';
        if (delta) {
          if (axis === 'x') {
            activeCommandPicker.hue = ((Number(activeCommandPicker.hue || 0) + (Number(delta) * 14)) % 360 + 360) % 360;
          } else {
            activeCommandPicker.lightness = clampShooterColorValue(Number(activeCommandPicker.lightness || 0.35) + (Number(delta) * 0.05), 0.08, 0.9);
          }
        }
        activeCommandPicker.pendingAxis = null;
        const hexValue = hslToHex(activeCommandPicker.hue, activeCommandPicker.saturation, activeCommandPicker.lightness);
        activeCommandPicker.valueNode.textContent = hexValue;
        activeCommandPicker.valueNode.dataset.hexValue = hexValue;
        activeCommandPicker.swatchNode.style.background = hexValue;
        if (activeCommandPicker.hintNode) {
          const hueText = `${Math.round(activeCommandPicker.hue)}°`;
          const lightText = `${Math.round(activeCommandPicker.lightness * 100)}%`;
          activeCommandPicker.hintNode.textContent = `H ${hueText} • L ${lightText}`;
        }
        return true;
      }
      if (activeCommandPicker.kind === 'choice') {
        if (!activeCommandPicker.valueNode) return false;
        const options = Array.isArray(activeCommandPicker.options) ? activeCommandPicker.options : [];
        if (!options.length) return false;
        if (delta) {
          activeCommandPicker.index = (Number(activeCommandPicker.index || 0) + Number(delta) + options.length) % options.length;
        }
        activeCommandPicker.valueNode.textContent = options[activeCommandPicker.index] || options[0];
        return true;
      }
      return false;
    }

    function submitActiveCommandPicker() {
      if (!activeCommandPicker || !activeCommandPicker.command) return false;
      let rawCommand = activeCommandPicker.command;
      if (activeCommandPicker.kind === 'number') {
        const config = activeCommandPicker.config || getShooterNumberPickerConfig(activeCommandPicker.command);
        const submittedValue = (config.infiniteValue !== null && Number(activeCommandPicker.value || 0) >= config.infiniteValue)
          ? config.infiniteValue
          : activeCommandPicker.value;
        rawCommand = `${activeCommandPicker.command} ${submittedValue}`;
      } else if (activeCommandPicker.kind === 'color') {
        const currentHex = activeCommandPicker.valueNode && activeCommandPicker.valueNode.dataset
          ? activeCommandPicker.valueNode.dataset.hexValue
          : hslToHex(activeCommandPicker.hue, activeCommandPicker.saturation, activeCommandPicker.lightness);
        rawCommand = `${activeCommandPicker.command} ${currentHex || '#4b0076'}`;
      } else if (activeCommandPicker.kind === 'choice') {
        const options = Array.isArray(activeCommandPicker.options) ? activeCommandPicker.options : [];
        const selected = options[activeCommandPicker.index] || options[0] || '';
        rawCommand = `${activeCommandPicker.command} ${selected}`.trim();
      } else if (activeCommandPicker.kind === 'text') {
        const typed = activeCommandPicker.input ? String(activeCommandPicker.input.value || '').trim() : '';
        rawCommand = `${activeCommandPicker.command} ${typed}`.trim();
      }
      const itemToRefocus = activeCommandPicker.item || null;
      closeActiveCommandPicker();
      showChatBar();
      chatBar.value = rawCommand;
      moveCursorToEnd();
      submitMessage();
      if (itemToRefocus && typeof itemToRefocus.focus === 'function') {
        try { itemToRefocus.focus(); } catch (error) {}
      }
      return true;
    }

    function openCommandTextPicker(item, command = {}) {

    function openCommandColorPicker(item, command = {}) {

      };

      }

    }

    function handleActiveCommandPickerKeydown(event) {
      if (!activeCommandPicker || !activeCommandPicker.item) return false;
      const target = event && event.target ? event.target : null;
      if (target && target !== activeCommandPicker.item && !activeCommandPicker.item.contains(target)) {
        return false;
      }

      if (event.key === 'ArrowUp') {
        event.preventDefault();
        event.stopPropagation();
        if (activeCommandPicker.kind === 'color') activeCommandPicker.pendingAxis = 'y';
        return updateActiveCommandPicker(activeCommandPicker.kind === 'choice' ? -1 : 1);
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        event.stopPropagation();
        if (activeCommandPicker.kind === 'color') activeCommandPicker.pendingAxis = 'y';
        return updateActiveCommandPicker(activeCommandPicker.kind === 'choice' ? 1 : -1);
      }
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        event.stopPropagation();
        if (activeCommandPicker.kind === 'color') activeCommandPicker.pendingAxis = 'x';
        return updateActiveCommandPicker(1);
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        event.stopPropagation();
        if (activeCommandPicker.kind === 'color') activeCommandPicker.pendingAxis = 'x';
        return updateActiveCommandPicker(-1);
      }
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        event.stopPropagation();
        return submitActiveCommandPicker();
      }
      if (event.key === 'Escape' || event.key === 'Backspace') {
        event.preventDefault();
        event.stopPropagation();
        closeActiveCommandPicker();
        return true;
      }
      return false;
    }

    document.addEventListener('keydown', (event) => {
      handleActiveCommandPickerKeydown(event);
    }, true);

    document.addEventListener('focusin', (event) => {
      if (!activeCommandPicker || !activeCommandPicker.item) return;
      const target = event && event.target ? event.target : null;
      if (target && target !== activeCommandPicker.item && !activeCommandPicker.item.contains(target)) {
        closeActiveCommandPicker();
      }
    });

    function createCommandListMessageNode(titleText, commandNames = [], options = {}) {
      const wrapper = document.createElement('div');
      if (options && typeof options.panelType === 'string' && options.panelType.trim()) {
        wrapper.dataset.commandPanelType = options.panelType.trim();
      }

      const title = document.createElement('div');
      const titleStrong = document.createElement('strong');
      titleStrong.textContent = titleText;

      const commands = getMergedHelpCommands().filter((command) => {
        const normalized = String(command.name || '').toLowerCase();
        if (allowed.size && !allowed.has(normalized)) {
          return false;
        }
        if (!allowed.size && !showHiddenCommands && (command.hidden === true || shouldHideHelpCommandByDefault(normalized))) {

              submitActiveCommandPicker();

              openCommandColorPicker(item, command);
            }
            return;
          }
          if (isShooterChoicePickerCommand(command)) {
            if (activeCommandPicker && activeCommandPicker.item === item && activeCommandPicker.kind === 'choice') {
              submitActiveCommandPicker();
            } else {
              openCommandChoicePicker(item, command);
            }
            return;
          }
          if (isShooterCheatermodeCommand(command)) {

    function createMediaRecords(type, fileList) {
      const records = Array.from(fileList || [])
        .map(file => {
          const inferredType = type === 'mixed' ? inferMediaType(file) : (file && file.type && file.type.startsWith(`${type}/`) ? type : null);
          if (!file || !inferredType) return null;
          const relativePath = file.webkitRelativePath || file.name;
          const parts = relativePath.split('/');
          const folderPath = parts.length > 1 ? parts.slice(0, -1).join('/') : '/';
          return {
            name: file.name,
            type: inferredType,
            url: URL.createObjectURL(file),
            relativePath,
            folderPath
          };
        })
        .filter(Boolean);

      records.sort((a, b) => a.relativePath.localeCompare(b.relativePath, undefined, { numeric: true, sensitivity: 'base' }));
      return records;

    function resetCommandCycle() {
      commandCycleIndex = -1;
      commandCyclePrefix = '';
    }

    function getCommandTokenInfo() {
      const value = chatBar.value;
      const trimmedLeft = value.trimStart();

      if (!trimmedLeft.startsWith('/')) {
        return null;
      }

      const slashIndex = value.indexOf('/');
      const caret = chatBar.selectionStart ?? value.length;
      const firstSpaceAfterSlash = value.indexOf(' ', slashIndex);

      if (firstSpaceAfterSlash !== -1 && caret > firstSpaceAfterSlash) {
        return null;
      }

      const tokenEnd = firstSpaceAfterSlash === -1 ? value.length : firstSpaceAfterSlash;
      const token = value.slice(slashIndex, tokenEnd);

      return {
        value,
        slashIndex,
        tokenEnd,
        token
      };
    }

    function getMatchingCommands(prefix) {
      const normalized = prefix.toLowerCase();
      return getCommandCatalog()
        .filter(command => command.startsWith(normalized))
        .slice()
        .sort((a, b) => a.localeCompare(b));
    }

    function cycleCommandSuggestion(direction = 1) {
      const info = getCommandTokenInfo();
      if (!info) return false;

      const token = info.token || '/';
      const normalizedToken = token.toLowerCase();

      if (!commandCyclePrefix || !normalizedToken.startsWith(commandCyclePrefix.toLowerCase())) {
        commandCyclePrefix = token;
        commandCycleIndex = -1;
      }

      const matches = getMatchingCommands(commandCyclePrefix || '/');
      if (matches.length === 0) return false;

      if (commandCycleIndex === -1) {
        const exactPrefixIndex = matches.findIndex(cmd => cmd.toLowerCase() === normalizedToken);

        if (exactPrefixIndex !== -1) {
          commandCycleIndex = exactPrefixIndex;
          commandCycleIndex = (commandCycleIndex + direction + matches.length) % matches.length;
        } else {
          commandCycleIndex = direction >= 0 ? 0 : matches.length - 1;
        }
      } else {
        commandCycleIndex = (commandCycleIndex + direction + matches.length) % matches.length;
      }

      const selected = matches[commandCycleIndex];
      chatBar.value = info.value.slice(0, info.slashIndex) + selected + info.value.slice(info.tokenEnd);
      moveCursorToEnd();
      return true;
    }

    function getCommandArgumentSuggestionInfo() {
      const value = chatBar.value;
      const caret = chatBar.selectionStart ?? value.length;
      const trimmedLeft = value.trimStart();

      if (!trimmedLeft.startsWith('/')) {
        return null;
      }

      const slashIndex = value.indexOf('/');
      const firstSpaceAfterSlash = value.indexOf(' ', slashIndex);
      if (firstSpaceAfterSlash === -1 || caret <= firstSpaceAfterSlash) {
        return null;
      }

      const commandToken = value.slice(slashIndex, firstSpaceAfterSlash).toLowerCase();
      const pageCommand = getPageCommandDefinition(commandToken);
      const builtInCommand = builtInCommands.find((entry) => entry.name === commandToken) || null;
      const suggestions = [
        ...(pageCommand && Array.isArray(pageCommand.suggestions) ? pageCommand.suggestions : []),
        ...(builtInCommand && Array.isArray(builtInCommand.suggestions) ? builtInCommand.suggestions : [])
      ].map((value) => String(value || '').trim()).filter(Boolean);
      if (!suggestions.length) {
        return null;
      }

      const argumentText = value.slice(firstSpaceAfterSlash + 1, caret);
      const suffix = value.slice(caret);
      return {
        value,
        caret,
        commandToken,
        argumentStart: firstSpaceAfterSlash + 1,
        argumentEnd: caret,
        argumentText,
        suffix,
        suggestions
      };
    }

    function cycleCommandArgumentSuggestion(direction = 1) {
      const info = getCommandArgumentSuggestionInfo();
      if (!info) return false;

      const cycleKeyPrefix = `${info.commandToken} `;
      let normalizedPrefix = info.argumentText.trim().toLowerCase();
      if (commandCyclePrefix && commandCyclePrefix.startsWith(cycleKeyPrefix) && commandCycleIndex !== -1) {
        const previousPrefix = commandCyclePrefix.slice(cycleKeyPrefix.length).toLowerCase();
        const previousMatches = info.suggestions
          .filter((entry) => entry.toLowerCase().startsWith(previousPrefix));
        const previousSelection = previousMatches[commandCycleIndex];
        if (previousSelection && previousSelection.toLowerCase() === normalizedPrefix) {
          normalizedPrefix = previousPrefix;
        }
      }
      const matches = info.suggestions
        .filter((entry) => entry.toLowerCase().startsWith(normalizedPrefix));

      if (!matches.length) {
        return false;
      }

      const effectiveCyclePrefix = `${info.commandToken} ${normalizedPrefix}`;
      if (!commandCyclePrefix || commandCyclePrefix !== effectiveCyclePrefix) {
        commandCyclePrefix = effectiveCyclePrefix;
        commandCycleIndex = -1;
      }

      if (commandCycleIndex === -1) {
        const exactPrefixIndex = matches.findIndex((entry) => entry.toLowerCase() === normalizedPrefix);
        if (exactPrefixIndex !== -1) {
          commandCycleIndex = exactPrefixIndex;
          commandCycleIndex = (commandCycleIndex + direction + matches.length) % matches.length;
        } else {
          commandCycleIndex = direction >= 0 ? 0 : matches.length - 1;
        }
      } else {
        commandCycleIndex = (commandCycleIndex + direction + matches.length) % matches.length;
      }

      const selected = matches[commandCycleIndex];
      chatBar.value = `${info.value.slice(0, info.argumentStart)}${selected}${info.suffix}`;
      moveCursorToEnd();
      return true;
    }

    function getFirstMatchingArgumentSuggestion(info) {
      if (!info || !Array.isArray(info.suggestions) || !info.suggestions.length) {
        return null;
      }
      const normalizedPrefix = info.argumentText.trim().toLowerCase();
      const matches = info.suggestions
        .filter((entry) => entry.toLowerCase().startsWith(normalizedPrefix));
      return matches.length ? matches[0] : null;
    }

    function getInlineSuggestionState() {
      const value = chatBar.value;
      const caret = chatBar.selectionStart ?? value.length;
      if (!value.trimStart().startsWith('/') || caret !== value.length) {
        return null;
      }

      const argumentInfo = getCommandArgumentSuggestionInfo();
      if (argumentInfo) {
        const suggestion = getFirstMatchingArgumentSuggestion(argumentInfo);
        if (suggestion && suggestion.toLowerCase() !== argumentInfo.argumentText.trim().toLowerCase()) {
          const typedArgument = argumentInfo.value.slice(0, argumentInfo.argumentStart) + argumentInfo.argumentText;
          const completionRemainder = suggestion.slice(argumentInfo.argumentText.trim().length);
          return {
            fullSuggestion: `${typedArgument}${suggestion.slice(argumentInfo.argumentText.length)}`,
            typedText: argumentInfo.value,
            remainder: completionRemainder
          };
        }
        return null;
      }

      const commandInfo = getCommandTokenInfo();
      if (!commandInfo) {
        return null;
      }

      const token = commandInfo.token || '/';
      const matches = getMatchingCommands(token);
      if (matches.length) {
        const match = matches[0];
        if (match.toLowerCase() !== token.toLowerCase()) {
          return {
            fullSuggestion: match,
            typedText: token,
            remainder: match.slice(token.length)
          };
        }

      }

      return null;
    }

    function renderInlineSuggestion() {
      const suggestionState = getInlineSuggestionState();
      if (!suggestionState || !suggestionState.remainder) {
        if (chatGhost) chatGhost.style.visibility = 'hidden';
        if (chatGhostTyped) chatGhostTyped.textContent = '';
        if (chatGhostRemainder) chatGhostRemainder.textContent = '';
        return false;
      }
      if (chatGhost) chatGhost.style.visibility = 'visible';
      if (chatGhostTyped) chatGhostTyped.textContent = suggestionState.typedText;
      if (chatGhostRemainder) chatGhostRemainder.textContent = suggestionState.remainder;
      return true;
    }

    function acceptInlineSuggestion() {
      const suggestionState = getInlineSuggestionState();
      if (!suggestionState || !suggestionState.remainder) {
        return false;
      }
      chatBar.value = suggestionState.fullSuggestion;
      moveCursorToEnd();
      updateChatBarVisualState();
      renderInlineSuggestion();
      return true;
    }


    function positionDvdLogo(force = false) {
      if (!dvdOverlay || !dvdLogo) return;
      const viewportWidth = Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0, 1);
      const viewportHeight = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, 1);
      const logoRect = dvdLogo.getBoundingClientRect();
      const logoWidth = Math.max(logoRect.width || dvdLogo.offsetWidth || 180, 1);
      const logoHeight = Math.max(logoRect.height || dvdLogo.offsetHeight || Math.round(logoWidth * 0.45), 1);
      const maxX = Math.max(0, viewportWidth - logoWidth);
      const maxY = Math.max(0, viewportHeight - logoHeight);

      if (!dvdState.initialized || force) {
        dvdState.x = Math.min(Math.max(dvdState.x, 0), maxX);
        dvdState.y = Math.min(Math.max(dvdState.y, 0), maxY);
        dvdState.initialized = true;
      } else {
        dvdState.x = Math.min(Math.max(dvdState.x, 0), maxX);
        dvdState.y = Math.min(Math.max(dvdState.y, 0), maxY);
      }

      dvdLogo.style.transform = `translate3d(${dvdState.x}px, ${dvdState.y}px, 0)`;

    function stepDvdAnimation(now) {
      if (!dvdEnabled || !dvdOverlay || !dvdLogo) {
        dvdAnimationFrameId = null;
        return;
      }

      if (!dvdLastTime) {
        dvdLastTime = now;
      }

      const deltaMs = Math.min(32, Math.max(0, now - dvdLastTime));
      dvdLastTime = now;

      const viewportWidth = Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0, 1);
      const viewportHeight = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, 1);
      const logoRect = dvdLogo.getBoundingClientRect();
      const logoWidth = Math.max(logoRect.width || dvdLogo.offsetWidth || 180, 1);
      const logoHeight = Math.max(logoRect.height || dvdLogo.offsetHeight || Math.round(logoWidth * 0.45), 1);
      const maxX = Math.max(0, viewportWidth - logoWidth);
      const maxY = Math.max(0, viewportHeight - logoHeight);

      dvdState.x += dvdState.vx * deltaMs;
      dvdState.y += dvdState.vy * deltaMs;

      if (dvdState.x <= 0) {
        dvdState.x = 0;
        dvdState.vx = Math.abs(dvdState.vx);
      } else if (dvdState.x >= maxX) {
        dvdState.x = maxX;
        dvdState.vx = -Math.abs(dvdState.vx);
      }

      if (dvdState.y <= 0) {
        dvdState.y = 0;
        dvdState.vy = Math.abs(dvdState.vy);
      } else if (dvdState.y >= maxY) {
        dvdState.y = maxY;
        dvdState.vy = -Math.abs(dvdState.vy);
      }

      dvdHue = (dvdHue + ((dvdHueShiftSpeedDegPerSecond * deltaMs) / 1000)) % 360;

    function createDvdInstance(group = 'dvd', sourceOverride = '') {
      const groupInstances = getGroupInstances(group);
