<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doodle-book-simple-topdown-v2</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a10;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #uploadBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.45);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font: 600 14px/1 Arial, sans-serif;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(8px);
    }
    #pdfInput { display: none; }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      place-items: center;
      color: white;
      font: 600 16px/1.4 Arial, sans-serif;
      background: rgba(0,0,0,0.22);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <label id="uploadBtn" for="pdfInput">Upload PDF</label>
  <input id="pdfInput" type="file" accept="application/pdf" />
  <div id="loading">Loading PDF…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>

  <script>
    const input = document.getElementById('pdfInput');
    const loading = document.getElementById('loading');

    if (!window.THREE) throw new Error('Three.js failed to load.');
    if (!window.pdfjsLib) throw new Error('PDF.js failed to load.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

    let renderer, scene, camera;
    let pedestal, shadow;
    let coverPivot, coverMesh;
    let underPageMesh;
    let textures = [];

    let pageWidth = 1.45;
    let pageHeight = 2.0;
    let currentTopIndex = 0;
    let isOpen = false;
    let activeFlip = null;

    init();
    buildSceneObjects();
    animate();

    input.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (file) await loadPdf(file);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') turnForward();
      if (e.key === 'ArrowRight') turnBackward();
    });

    window.addEventListener('resize', onResize);

    function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a10);

      camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.01, 100);
      camera.position.set(0.0, 5.6, 0.01);
      camera.lookAt(0, 0, 0);

      const hemi = new THREE.HemisphereLight(0xe8ecff, 0x1b1d28, 1.15);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 1.7);
      key.position.set(1.8, 4.8, 1.2);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9db0ff, 0.35);
      fill.position.set(-2.5, 2.0, -1.5);
      scene.add(fill);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function makeColorTexture(color, w = 768, h = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, h);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function makePaperMaterial() {
      return new THREE.MeshPhongMaterial({
        color: 0xf6f4ee,
        side: THREE.DoubleSide,
        shininess: 2
      });
    }

    function buildSceneObjects() {
      pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(2.15, 2.3, 0.24, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x30374f,
          roughness: 0.84,
          metalness: 0.04,
          clearcoat: 0.1
        })
      );
      pedestal.position.set(0, -0.28, 0);
      pedestal.receiveShadow = true;
      scene.add(pedestal);

      const pedestalTop = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.2, 0.03, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x434d6a,
          roughness: 0.56,
          metalness: 0.04,
          clearcoat: 0.18
        })
      );
      pedestalTop.position.set(0, -0.14, 0);
      pedestalTop.receiveShadow = true;
      scene.add(pedestalTop);

      shadow = new THREE.Mesh(
        new THREE.CircleGeometry(1.45, 48),
        new THREE.ShadowMaterial({ opacity: 0.22 })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.set(0.05, -0.125, 0);
      shadow.receiveShadow = true;
      scene.add(shadow);

      underPageMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth, pageHeight),
        makePaperMaterial()
      );
      underPageMesh.rotation.x = -Math.PI / 2;
      underPageMesh.position.set(0.02, -0.040, 0);
      underPageMesh.receiveShadow = true;
      scene.add(underPageMesh);

      coverPivot = new THREE.Group();
      coverPivot.position.set(-pageWidth * 0.5, -0.035, 0);
      scene.add(coverPivot);

      const coverMat = new THREE.MeshPhongMaterial({
        map: makeColorTexture('#6f5a86'),
        side: THREE.DoubleSide,
        shininess: 8,
        specular: new THREE.Color(0x1c1c1c)
      });

      coverMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth, pageHeight, 24, 12),
        coverMat
      );
      coverMesh.rotation.x = -Math.PI / 2;
      coverMesh.position.set(pageWidth * 0.5, 0, 0);
      coverMesh.castShadow = true;
      coverMesh.receiveShadow = true;
      coverPivot.add(coverMesh);

      applyTextures();
    }

    function applyTextures() {
      const topTex = textures[currentTopIndex] || makeColorTexture('#6f5a86');
      const underTex = textures[currentTopIndex + 1] || null;

      coverMesh.material.map = topTex;
      coverMesh.material.needsUpdate = true;

      if (underTex) {
        const oldMat = underPageMesh.material;
        underPageMesh.material = new THREE.MeshPhongMaterial({
          map: underTex,
          side: THREE.DoubleSide,
          shininess: 2,
          specular: new THREE.Color(0x111111)
        });
        oldMat.dispose?.();
      } else {
        const oldMat = underPageMesh.material;
        underPageMesh.material = makePaperMaterial();
        oldMat.dispose?.();
      }

      isOpen = false;
      coverPivot.rotation.z = 0;
      resetCoverGeometry();
    }

    async function loadPdf(file) {
      loading.style.display = 'grid';
      try {
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const count = pdf.numPages;
        if (count < 1) throw new Error('PDF has no pages.');

        const probePage = await pdf.getPage(1);
        const probeViewport = probePage.getViewport({ scale: 1 });
        pageHeight = 2.0;
        pageWidth = pageHeight * (probeViewport.width / probeViewport.height);

        const renderScale = chooseScale(probeViewport.width, probeViewport.height, count);
        const newTextures = [];

        for (let i = 1; i <= count; i++) {
          loading.textContent = 'Loading PDF… ' + i + ' / ' + count;
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: renderScale });

          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          await page.render({ canvasContext: ctx, viewport }).promise;

          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          tex.needsUpdate = true;
          newTextures.push(tex);
        }

        disposeTextures();
        textures = newTextures;
        currentTopIndex = 0;

        rebuildGeometry();
        applyTextures();
      } catch (err) {
        console.error(err);
        alert('Failed to load PDF: ' + err.message);
      }
      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    function chooseScale(w, h, count) {
      const area = w * h;
      if (count > 80) return 1.0;
      if (count > 40) return area > 800000 ? 1.0 : 1.15;
      if (count > 20) return area > 900000 ? 1.1 : 1.3;
      return area > 1200000 ? 1.15 : 1.45;
    }

    function disposeTextures() {
      for (const tex of textures) tex?.dispose?.();
      textures = [];
    }

    function rebuildGeometry() {
      coverMesh.geometry.dispose();
      coverMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight, 24, 12);
      coverMesh.position.set(pageWidth * 0.5, 0, 0);
      coverPivot.position.set(-pageWidth * 0.5, -0.035, 0);

      underPageMesh.geometry.dispose();
      underPageMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
      underPageMesh.position.set(0.02, -0.040, 0);

      shadow.geometry.dispose();
      shadow.geometry = new THREE.CircleGeometry(Math.max(pageWidth, pageHeight) * 0.75, 48);
      shadow.position.set(0.05, -0.125, 0);

      resetCoverGeometry();
    }

    function turnForward() {
      if (activeFlip || isOpen || currentTopIndex >= textures.length - 1) return;
      activeFlip = {
        direction: 1,
        start: performance.now(),
        duration: 800
      };
    }

    function turnBackward() {
      if (activeFlip || !isOpen || currentTopIndex <= 0) return;
      activeFlip = {
        direction: -1,
        start: performance.now(),
        duration: 800
      };
    }

    function updateFlip() {
      if (!activeFlip) return;
      const t = Math.min(1, (performance.now() - activeFlip.start) / activeFlip.duration);
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      let progress;
      if (activeFlip.direction === 1) {
        progress = eased;
      } else {
        progress = 1 - eased;
      }

      coverPivot.rotation.z = Math.PI * progress;
      deformCover(progress);

      if (t >= 1) {
        if (activeFlip.direction === 1) {
          isOpen = true;
        } else {
          currentTopIndex -= 1;
          applyTextures();
        }

        if (activeFlip.direction === 1 && isOpen) {
          // keep geometry flat at fully opened state
          resetCoverGeometry();
        }

        activeFlip = null;
      }
    }

    function resetCoverGeometry() {
      const geom = coverMesh.geometry;
      const pos = geom.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x0 = pos.getX(i);
        const y0 = pos.getY(i);
        pos.setZ(i, 0);
        pos.setX(i, x0);
        pos.setY(i, y0);
      }
      pos.needsUpdate = true;
      geom.computeVertexNormals();
    }

    function deformCover(progress) {
      resetCoverGeometry();

      const pos = coverMesh.geometry.attributes.position;
      const halfW = pageWidth * 0.5;
      const halfH = pageHeight * 0.5;
      const curl = Math.sin(progress * Math.PI);

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);

        const xNorm = (x + halfW) / pageWidth;
        const yNorm = y / halfH;

        const spinePull = Math.pow(1 - xNorm, 2.5) * curl * 0.06;
        const sweepY = Math.sin(xNorm * Math.PI) * curl * 0.06 * (0.3 + (1 - Math.abs(yNorm)) * 0.7);
        const bendZ = Math.sin(xNorm * Math.PI) * curl * 0.08;

        pos.setX(i, x - spinePull);
        pos.setY(i, y + sweepY);
        pos.setZ(i, bendZ);
      }

      pos.needsUpdate = true;
      coverMesh.geometry.computeVertexNormals();
    }

    function animate() {
      requestAnimationFrame(animate);
      updateFlip();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
