<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doodle-book-topdown-rigid-hinge</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a10; }
    canvas { display: block; width: 100%; height: 100%; }
    #uploadBtn {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.45); color: #fff; border-radius: 999px;
      padding: 10px 14px; font: 600 14px/1 Arial, sans-serif; cursor: pointer;
      user-select: none; backdrop-filter: blur(8px);
    }
    #pdfInput { display: none; }
    #loading {
      position: fixed; inset: 0; z-index: 15; display: none; place-items: center;
      color: white; font: 600 16px/1.4 Arial, sans-serif;
      background: rgba(0,0,0,0.22); pointer-events: none;
    }
  </style>
</head>
<body>
  <label id="uploadBtn" for="pdfInput">Upload PDF</label>
  <input id="pdfInput" type="file" accept="application/pdf" />
  <div id="loading">Loading PDF…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>

  <script>
    const input = document.getElementById('pdfInput');
    const loading = document.getElementById('loading');

    if (!window.THREE) throw new Error('Three.js failed to load.');
    if (!window.pdfjsLib) throw new Error('PDF.js failed to load.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

    let renderer, scene, camera;
    let pedestal, pedestalTop, shadow;
    let underPageMesh;
    let turningPivot, turningFrontMesh, turningBackMesh;
    let textures = [];
    let fallbackTex = null;

    let pageWidth = 1.45;
    let pageHeight = 2.0;
    let currentIndex = 0;
    let activeFlip = null;

    init();
    buildScene();
    animate();

    input.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (file) await loadPdf(file);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goForward();
      if (e.key === 'ArrowLeft') goBackward();
    });

    window.addEventListener('resize', onResize);

    function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a10);

      camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.01, 100);
      camera.position.set(0.0, 5.6, 0.01);
      camera.lookAt(0, 0, 0);

      const hemi = new THREE.HemisphereLight(0xe8ecff, 0x1b1d28, 1.15);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 1.7);
      key.position.set(1.8, 4.8, 1.2);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9db0ff, 0.35);
      fill.position.set(-2.5, 2.0, -1.5);
      scene.add(fill);

      fallbackTex = makeColorTexture('#6f5a86');
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function makeColorTexture(color, w = 768, h = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, h);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function makePaperMaterial() {
      return new THREE.MeshPhongMaterial({
        color: 0xf6f4ee,
        side: THREE.DoubleSide,
        shininess: 2
      });
    }

    function makeTexturedPaperMaterial(tex) {
      return new THREE.MeshPhongMaterial({
        map: tex,
        side: THREE.DoubleSide,
        shininess: 2,
        specular: new THREE.Color(0x111111)
      });
    }

    function textureAt(index) {
      return textures[index] || fallbackTex;
    }

    function buildScene() {
      pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(2.15, 2.3, 0.24, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x30374f,
          roughness: 0.84,
          metalness: 0.04,
          clearcoat: 0.1
        })
      );
      pedestal.position.set(0, -0.28, 0);
      pedestal.receiveShadow = true;
      scene.add(pedestal);

      pedestalTop = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.2, 0.03, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x434d6a,
          roughness: 0.56,
          metalness: 0.04,
          clearcoat: 0.18
        })
      );
      pedestalTop.position.set(0, -0.14, 0);
      pedestalTop.receiveShadow = true;
      scene.add(pedestalTop);

      shadow = new THREE.Mesh(
        new THREE.CircleGeometry(1.45, 48),
        new THREE.ShadowMaterial({ opacity: 0.22 })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.set(0, -0.125, 0);
      shadow.receiveShadow = true;
      scene.add(shadow);

      underPageMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth, pageHeight),
        makePaperMaterial()
      );
      underPageMesh.rotation.x = -Math.PI / 2;
      underPageMesh.position.set(0, -0.040, 0);
      underPageMesh.receiveShadow = true;
      scene.add(underPageMesh);

      turningPivot = new THREE.Group();
      turningPivot.position.set(-pageWidth * 0.5, -0.035, 0);
      scene.add(turningPivot);

      turningFrontMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth, pageHeight),
        new THREE.MeshPhongMaterial({
          map: fallbackTex,
          side: THREE.FrontSide,
          shininess: 8,
          specular: new THREE.Color(0x1c1c1c)
        })
      );
      turningFrontMesh.rotation.x = -Math.PI / 2;
      turningFrontMesh.position.set(pageWidth * 0.5, 0.0006, 0);
      turningFrontMesh.castShadow = true;
      turningFrontMesh.receiveShadow = true;
      turningPivot.add(turningFrontMesh);

      turningBackMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth, pageHeight),
        new THREE.MeshPhongMaterial({
          color: 0xf6f4ee,
          side: THREE.FrontSide,
          shininess: 2
        })
      );
      turningBackMesh.rotation.x = Math.PI / 2;
      turningBackMesh.position.set(pageWidth * 0.5, -0.0006, 0);
      turningBackMesh.castShadow = true;
      turningBackMesh.receiveShadow = true;
      turningPivot.add(turningBackMesh);

      rebuildGeometry();
      applyClosedState();
    }

    function rebuildGeometry() {
      underPageMesh.geometry.dispose();
      underPageMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
      underPageMesh.position.set(0, -0.040, 0);

      turningFrontMesh.geometry.dispose();
      turningFrontMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
      turningFrontMesh.position.set(pageWidth * 0.5, 0.0006, 0);

      turningBackMesh.geometry.dispose();
      turningBackMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
      turningBackMesh.position.set(pageWidth * 0.5, -0.0006, 0);

      turningPivot.position.set(-pageWidth * 0.5, -0.035, 0);

      shadow.geometry.dispose();
      shadow.geometry = new THREE.CircleGeometry(Math.max(pageWidth, pageHeight) * 0.75, 48);
      shadow.position.set(0, -0.125, 0);
    }

    function setTurningFrontTexture(tex) {
      turningFrontMesh.material.map = tex;
      turningFrontMesh.material.needsUpdate = true;
    }

    function setUnderTexture(tex) {
      const oldMat = underPageMesh.material;
      underPageMesh.material = tex ? makeTexturedPaperMaterial(tex) : makePaperMaterial();
      oldMat.dispose?.();
    }

    function applyClosedState() {
      turningPivot.rotation.z = 0;
      setTurningFrontTexture(textureAt(currentIndex));
      setUnderTexture(textures[currentIndex + 1] || null);
    }

    async function loadPdf(file) {
      loading.style.display = 'grid';
      try {
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const count = pdf.numPages;
        if (count < 1) throw new Error('PDF has no pages.');

        const probePage = await pdf.getPage(1);
        const probeViewport = probePage.getViewport({ scale: 1 });
        pageHeight = 2.0;
        pageWidth = pageHeight * (probeViewport.width / probeViewport.height);

        const renderScale = chooseScale(probeViewport.width, probeViewport.height, count);
        const newTextures = [];

        for (let i = 1; i <= count; i++) {
          loading.textContent = 'Loading PDF… ' + i + ' / ' + count;
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: renderScale });

          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          await page.render({ canvasContext: ctx, viewport }).promise;

          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          tex.needsUpdate = true;
          newTextures.push(tex);
        }

        for (const tex of textures) tex?.dispose?.();
        textures = newTextures;
        currentIndex = 0;
        activeFlip = null;
        rebuildGeometry();
        applyClosedState();
      } catch (err) {
        console.error(err);
        alert('Failed to load PDF: ' + err.message);
      }
      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    function chooseScale(w, h, count) {
      const area = w * h;
      if (count > 80) return 1.0;
      if (count > 40) return area > 800000 ? 1.0 : 1.15;
      if (count > 20) return area > 900000 ? 1.1 : 1.3;
      return area > 1200000 ? 1.15 : 1.45;
    }

    function goForward() {
      if (activeFlip) return;
      if (currentIndex >= textures.length - 1) return;

      activeFlip = {
        dir: 1,
        fromIndex: currentIndex,
        toIndex: currentIndex + 1,
        start: performance.now(),
        duration: 850
      };

      setTurningFrontTexture(textureAt(activeFlip.fromIndex));
      setUnderTexture(textureAt(activeFlip.toIndex));
      turningPivot.rotation.z = 0;
    }

    function goBackward() {
      if (activeFlip) return;
      if (currentIndex <= 0) return;

      activeFlip = {
        dir: -1,
        fromIndex: currentIndex,
        toIndex: currentIndex - 1,
        start: performance.now(),
        duration: 850
      };

      setTurningFrontTexture(textureAt(activeFlip.toIndex));
      setUnderTexture(textureAt(activeFlip.fromIndex));
      turningPivot.rotation.z = Math.PI;
    }

    function updateFlip() {
      if (!activeFlip) return;

      const t = Math.min(1, (performance.now() - activeFlip.start) / activeFlip.duration);
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      if (activeFlip.dir === 1) {
        turningPivot.rotation.z = Math.PI * eased;
      } else {
        turningPivot.rotation.z = Math.PI * (1 - eased);
      }

      if (t >= 1) {
        currentIndex = activeFlip.toIndex;
        activeFlip = null;
        applyClosedState();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      updateFlip();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
