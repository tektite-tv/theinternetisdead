<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doodle-book-working-turns</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a10;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #pdfInput { display: none; }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      place-items: center;
      color: white;
      font: 600 16px/1.4 Arial, sans-serif;
      background: rgba(0,0,0,0.22);
      pointer-events: none;
    }
    .hud-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      pointer-events: auto;
      width: 56px;
      height: 56px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: rgba(255,255,255,0.95);
      font: 700 28px/1 Arial, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .hud-nav:active {
      transform: translateY(-50%) scale(0.98);
    }
    #hudPrev { left: 16px; }
    #hudNext { right: 16px; }
  </style>
</head>
<body>
  <button id="hudPrev" class="hud-nav" aria-label="Previous page">←</button>
  <button id="hudNext" class="hud-nav" aria-label="Next page">→</button>
  <div id="loading">Loading PDF…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>

  <script>
    const loading = document.getElementById('loading');
    const hudPrev = document.getElementById('hudPrev');
    const hudNext = document.getElementById('hudNext');

    if (!window.THREE) throw new Error('Three.js failed to load.');
    if (!window.pdfjsLib) throw new Error('PDF.js failed to load.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

    let renderer, scene, camera;
    let pedestal, pedestalTop, shadow;
    let leftBaseMesh, rightBaseMesh, leftTopMesh;
    let turnPivot, turnFrontMesh, turnBackMesh;

    let textures = [];
    let fallbackTex;
    let raycaster = new THREE.Raycaster();
    let pointer = new THREE.Vector2();

    let pageWidth = 1.45;
    let pageHeight = 2.0;
    let currentIndex = 0; // right visible page index. == textures.length means book closed on left with last page visible
    let activeFlip = null;
    let lastKeyTime = 0;

    let camYaw = 0;
    let camPitch = -1.08;
    let camDistance = 5.6;

    init();
    buildScene();
    animate();
    loadDefaultPdf();

    window.addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      if (e.repeat) return;
      const now = performance.now();
      if (now - lastKeyTime < 160) return;
      lastKeyTime = now;

      if (e.key === 'ArrowRight') {
        stepForward();
      } else if (e.key === 'ArrowLeft') {
        stepBackward();
      }
    });

    hudNext.addEventListener('click', (e) => {
      e.preventDefault();
      stepForward();
    });

    hudPrev.addEventListener('click', (e) => {
      e.preventDefault();
      stepBackward();
    });

    window.addEventListener('resize', onResize);

    function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a10);

      camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.01, 100);
      updateCamera();

      const hemi = new THREE.HemisphereLight(0xe8ecff, 0x1b1d28, 1.15);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 1.7);
      key.position.set(1.8, 4.8, 1.2);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9db0ff, 0.35);
      fill.position.set(-2.5, 2.0, -1.5);
      scene.add(fill);

      fallbackTex = makeSolidTexture('#6f5a86');
    }


    function updateCamera() {
      const targetX = 0;
      const targetY = 0;
      const targetZ = 0;

      const x = Math.sin(camYaw) * Math.cos(camPitch) * camDistance;
      const y = Math.sin(-camPitch) * camDistance;
      const z = Math.cos(camYaw) * Math.cos(camPitch) * camDistance * 0.12;

      camera.position.set(x, y, z);
      camera.lookAt(targetX, targetY, targetZ);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateCamera();
    }

    function makeSolidTexture(color, w = 768, h = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, h);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function makePaperMaterial() {
      return new THREE.MeshPhongMaterial({
        color: 0xf6f4ee,
        side: THREE.DoubleSide,
        shininess: 2
      });
    }

    function makePrintedMaterial(tex) {
      return new THREE.MeshPhongMaterial({
        map: tex,
        side: THREE.DoubleSide,
        shininess: 5,
        specular: new THREE.Color(0x111111)
      });
    }

    function setMaterial(mesh, mat) {
      const old = mesh.material;
      mesh.material = mat;
      old.dispose?.();
    }

    function texAt(i) {
      return textures[i] || fallbackTex;
    }

    function buildScene() {
      pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(2.15, 2.3, 0.24, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x30374f,
          roughness: 0.84,
          metalness: 0.04,
          clearcoat: 0.1
        })
      );
      pedestal.position.set(0, -0.28, 0);
      pedestal.receiveShadow = true;
      scene.add(pedestal);

      pedestalTop = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 2.2, 0.03, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x434d6a,
          roughness: 0.56,
          metalness: 0.04,
          clearcoat: 0.18
        })
      );
      pedestalTop.position.set(0, -0.14, 0);
      pedestalTop.receiveShadow = true;
      scene.add(pedestalTop);

      shadow = new THREE.Mesh(
        new THREE.CircleGeometry(1.6, 48),
        new THREE.ShadowMaterial({ opacity: 0.22 })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.set(0, -0.125, 0);
      shadow.receiveShadow = true;
      scene.add(shadow);

      leftBaseMesh = new THREE.Mesh(new THREE.PlaneGeometry(pageWidth, pageHeight), makePaperMaterial());
      leftBaseMesh.rotation.x = -Math.PI / 2;
      leftBaseMesh.position.set(-pageWidth * 0.5, -0.040, 0);
      leftBaseMesh.receiveShadow = true;
      leftBaseMesh.visible = false;
      scene.add(leftBaseMesh);

      leftTopMesh = new THREE.Mesh(new THREE.PlaneGeometry(pageWidth, pageHeight), makePrintedMaterial(texAt(0)));
      leftTopMesh.rotation.x = -Math.PI / 2;
      leftTopMesh.position.set(-pageWidth * 0.5, -0.0392, 0);
      leftTopMesh.receiveShadow = true;
      leftTopMesh.visible = false;
      scene.add(leftTopMesh);

      rightBaseMesh = new THREE.Mesh(
        new THREE.BoxGeometry(pageWidth, 0.05, pageHeight),
        new THREE.MeshPhysicalMaterial({
          color: 0x6f5a86,
          roughness: 0.9,
          metalness: 0.02,
          clearcoat: 0.08
        })
      );
      rightBaseMesh.rotation.set(0, 0, 0);
      rightBaseMesh.position.set(pageWidth * 0.5, -0.015, 0);
      rightBaseMesh.castShadow = true;
      rightBaseMesh.receiveShadow = true;
      scene.add(rightBaseMesh);

      turnPivot = new THREE.Group();
      turnPivot.position.set(0, -0.035, 0);
      scene.add(turnPivot);

      turnFrontMesh = new THREE.Mesh(new THREE.PlaneGeometry(pageWidth, pageHeight), makePrintedMaterial(texAt(0)));
      turnFrontMesh.rotation.x = -Math.PI / 2;
      turnFrontMesh.position.set(pageWidth * 0.5, 0.0007, 0);
      turnFrontMesh.castShadow = true;
      turnFrontMesh.receiveShadow = true;
      turnFrontMesh.renderOrder = 10;
      turnPivot.add(turnFrontMesh);

      turnBackMesh = new THREE.Mesh(new THREE.PlaneGeometry(pageWidth, pageHeight), makePaperMaterial());
      turnBackMesh.rotation.x = Math.PI / 2;
      turnBackMesh.position.set(pageWidth * 0.5, -0.0007, 0);
      turnBackMesh.castShadow = true;
      turnBackMesh.receiveShadow = true;
      turnBackMesh.renderOrder = 9;
      turnPivot.add(turnBackMesh);

      rebuildGeometry();
      renderRest();
    }

    function rebuildGeometry() {
      for (const mesh of [leftBaseMesh, leftTopMesh, turnFrontMesh, turnBackMesh]) {
        mesh.geometry.dispose();
        mesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);
      }
      rightBaseMesh.geometry.dispose();
      rightBaseMesh.geometry = new THREE.PlaneGeometry(pageWidth, pageHeight);

      leftBaseMesh.position.set(-pageWidth * 0.5, -0.040, 0);
      leftTopMesh.position.set(-pageWidth * 0.5, -0.0392, 0);
      rightBaseMesh.position.set(pageWidth * 0.5, -0.040, 0);
      rightBaseMesh.rotation.x = -Math.PI / 2;
      turnFrontMesh.position.set(pageWidth * 0.5, 0.0007, 0);
      turnBackMesh.position.set(pageWidth * 0.5, -0.0007, 0);
      turnPivot.position.set(0, -0.035, 0);

      shadow.geometry.dispose();
      shadow.geometry = new THREE.CircleGeometry(Math.max(pageWidth, pageHeight) * 0.78, 48);
      shadow.position.set(0, -0.125, 0);
    }

    function renderRest() {
      turnPivot.visible = false;
      turnPivot.rotation.z = 0;
      turnFrontMesh.visible = true;
      turnBackMesh.visible = true;
      turnFrontMesh.scale.x = 1;
      turnBackMesh.scale.x = 1;
      turnFrontMesh.scale.y = 1;
      turnBackMesh.scale.y = 1;
      turnFrontMesh.renderOrder = 10;
      turnBackMesh.renderOrder = 9;

      leftBaseMesh.visible = false;
      leftTopMesh.visible = false;
      rightBaseMesh.visible = false;

      if (textures.length === 0) {
        rightBaseMesh.visible = true;
        if (!(rightBaseMesh.geometry instanceof THREE.BoxGeometry)) {
          rightBaseMesh.geometry.dispose();
          rightBaseMesh.geometry = new THREE.BoxGeometry(pageWidth, 0.05, pageHeight);
        }
        rightBaseMesh.rotation.set(0, 0, 0);
        rightBaseMesh.position.set(pageWidth * 0.5, -0.015, 0);
        setMaterial(rightBaseMesh, new THREE.MeshPhysicalMaterial({
          color: 0x6f5a86,
          roughness: 0.9,
          metalness: 0.02,
          clearcoat: 0.08
        }));
        return;
      }

      if (currentIndex === 0) {
        rightBaseMesh.visible = true;
        setMaterial(rightBaseMesh, makePrintedMaterial(texAt(0)));
        return;
      }

      if (currentIndex < textures.length) {
        leftBaseMesh.visible = currentIndex > 0;
        if (currentIndex > 0) {
          setMaterial(leftBaseMesh, makePaperMaterial());
        }

        rightBaseMesh.visible = true;
        setMaterial(rightBaseMesh, makePrintedMaterial(texAt(currentIndex)));
        return;
      }

      // final resting state: last PDF page on the LEFT with no white page on the right
      leftBaseMesh.visible = true;
      setMaterial(leftBaseMesh, makePaperMaterial());
      leftTopMesh.visible = true;
      setMaterial(leftTopMesh, makePrintedMaterial(texAt(textures.length - 1)));
      rightBaseMesh.visible = false;
    }

    async function loadDefaultPdf() {
      loading.style.display = 'grid';
      try {
        const response = await fetch('/experiments/pdf-viewer/pdfs/doodle-book.pdf');
        if (!response.ok) {
          throw new Error('Failed to load /experiments/pdf-viewer/pdfs/doodle-book.pdf');
        }
        const bytes = await response.arrayBuffer();
        await loadPdfBytes(bytes);
      } catch (err) {
        console.error(err);
        alert('Failed to load default PDF: ' + err.message);
      }
      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    async function loadPdfBytes(bytes) {
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      const count = pdf.numPages;
      if (count < 1) throw new Error('PDF has no pages.');

      const probePage = await pdf.getPage(1);
      const probeViewport = probePage.getViewport({ scale: 1 });
      pageHeight = 2.0;
      pageWidth = pageHeight * (probeViewport.width / probeViewport.height);

      const renderScale = chooseScale(probeViewport.width, probeViewport.height, count);
      const newTextures = [];

      for (let i = 1; i <= count; i++) {
        loading.textContent = 'Loading PDF… ' + i + ' / ' + count;
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: renderScale });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport }).promise;

        const tex = new THREE.CanvasTexture(canvas);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
        tex.needsUpdate = true;
        newTextures.push(tex);
      }

      for (const tex of textures) tex?.dispose?.();
      textures = newTextures;
      currentIndex = 0;
      activeFlip = null;
      rebuildGeometry();
      renderRest();
    }

    async function loadPdf(file) {
      loading.style.display = 'grid';
      try {
        const bytes = await file.arrayBuffer();
        await loadPdfBytes(bytes);
      } catch (err) {
        console.error(err);
        alert('Failed to load PDF: ' + err.message);
      }

      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    function chooseScale(w, h, count) {
      const area = w * h;
      if (count > 80) return 1.0;
      if (count > 40) return area > 800000 ? 1.0 : 1.15;
      if (count > 20) return area > 900000 ? 1.1 : 1.3;
      return area > 1200000 ? 1.15 : 1.45;
    }

    function stepForward() {
      if (activeFlip) return;
      if (textures.length === 0) return;
      if (currentIndex >= textures.length - 1) return;

      activeFlip = {
        dir: 1,
        fromIndex: currentIndex,
        toIndex: currentIndex + 1,
        start: performance.now(),
        duration: 850
      };

      leftBaseMesh.visible = currentIndex > 0;
      if (currentIndex > 0) {
        setMaterial(leftBaseMesh, makePaperMaterial());
      }
      leftTopMesh.visible = false;

      const isFinalClose = activeFlip.fromIndex === textures.length - 2;
      if (isFinalClose) {
        // Final forward turn:
        // second-last page swings; last page is revealed statically on the left after crossover
        // so it does not rotate with the hinge.
        rightBaseMesh.visible = false;
        leftBaseMesh.visible = true;
        setMaterial(leftBaseMesh, makePaperMaterial());
        leftTopMesh.visible = false;
        setMaterial(leftTopMesh, makePrintedMaterial(texAt(textures.length - 1)));

        setMaterial(turnFrontMesh, makePrintedMaterial(texAt(textures.length - 2)));
        setMaterial(turnBackMesh, makePaperMaterial());

        turnFrontMesh.renderOrder = 11;
        turnBackMesh.renderOrder = 10;
      } else {
        rightBaseMesh.visible = true;
        setMaterial(rightBaseMesh, makePrintedMaterial(texAt(activeFlip.toIndex)));
        setMaterial(turnFrontMesh, makePrintedMaterial(texAt(activeFlip.fromIndex)));
        setMaterial(turnBackMesh, makePaperMaterial());

        turnFrontMesh.renderOrder = 10;
        turnBackMesh.renderOrder = 9;
      }

      turnPivot.visible = true;
      turnPivot.rotation.z = 0;
    }

    function stepBackward() {
      if (activeFlip) return;
      if (textures.length === 0) return;
      if (currentIndex <= 0) return;

      const fromFinalLeft = currentIndex === textures.length;

      activeFlip = {
        dir: -1,
        fromIndex: currentIndex,
        toIndex: fromFinalLeft ? textures.length - 2 : currentIndex - 1,
        start: performance.now(),
        duration: 850
      };

      // Background pages beneath the moving sheet
      if (fromFinalLeft) {
        // Re-opening from the final-left state keeps the white base visible on the left.
        leftBaseMesh.visible = true;
        setMaterial(leftBaseMesh, makePaperMaterial());
      } else if (activeFlip.toIndex > 0) {
        leftBaseMesh.visible = true;
        setMaterial(leftBaseMesh, makePaperMaterial());
      } else {
        leftBaseMesh.visible = false;
      }

      leftTopMesh.visible = false;
      if (fromFinalLeft) {
        // Do not reveal the second-last page on the right until the reverse animation finishes.
        rightBaseMesh.visible = false;
      } else {
        rightBaseMesh.visible = true;
        // Keep the current right-page image visible during the backward transition.
        setMaterial(rightBaseMesh, makePrintedMaterial(texAt(activeFlip.fromIndex)));
      }

      turnPivot.visible = true;
      turnFrontMesh.renderOrder = 10;
      turnBackMesh.renderOrder = 9;
      turnPivot.rotation.z = Math.PI;

      if (fromFinalLeft) {
        // Undo the final close:
        // keep the last page as a static left display at first; the turning sheet reveals
        // the second-last page only after the crossover.
        leftTopMesh.visible = true;
        setMaterial(leftTopMesh, makePrintedMaterial(texAt(textures.length - 1)));
        setMaterial(turnFrontMesh, makePrintedMaterial(texAt(textures.length - 2)));
        setMaterial(turnBackMesh, makePaperMaterial());
        turnFrontMesh.scale.x = 1;
        turnBackMesh.scale.x = 1;
      } else {
        // Natural backward turn:
        // when moving from page N back to page N-1, the transition layer should be page N-1
        // swinging from left to right.
        setMaterial(turnFrontMesh, makePrintedMaterial(texAt(activeFlip.toIndex)));
        setMaterial(turnBackMesh, makePaperMaterial());
      }
    }

    function updateFlip() {
      if (!activeFlip) return;

      const t = Math.min(1, (performance.now() - activeFlip.start) / activeFlip.duration);
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      const isFinalForward = activeFlip.dir === 1 && activeFlip.fromIndex === textures.length - 2;

      if (activeFlip.dir === 1) {
        turnPivot.rotation.z = Math.PI * eased;
      } else {
        turnPivot.rotation.z = Math.PI * (1 - eased);
      }

      if (isFinalForward) {
        // First half: show the penultimate page on the moving sheet.
        // Second half: stop showing the moving sheet and reveal the static last page on the left.
        turnFrontMesh.visible = eased < 0.5;
        turnBackMesh.visible = false;
        leftTopMesh.visible = eased >= 0.5;
        turnFrontMesh.scale.y = 1;
        turnBackMesh.scale.y = 1;
      } else if (activeFlip.dir === -1 && activeFlip.fromIndex === textures.length) {
        // Reverse from the ending:
        // keep the static last page on the left at first, then hide it after crossover
        // and show the second-last page on the moving sheet.
        leftTopMesh.visible = eased <= 0.5;
        turnFrontMesh.visible = eased > 0.5;
        turnBackMesh.visible = false;
        turnFrontMesh.scale.x = 1;
        turnBackMesh.scale.x = 1;
        turnFrontMesh.scale.y = 1;
        turnBackMesh.scale.y = 1;
      } else {
        turnFrontMesh.visible = true;
        turnBackMesh.visible = true;
        turnFrontMesh.scale.y = 1;
        turnBackMesh.scale.y = 1;
      }

      if (t >= 1) {
        if (isFinalForward) {
          currentIndex = textures.length;
        } else {
          currentIndex = activeFlip.toIndex;
        }
        activeFlip = null;
        renderRest();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      updateFlip();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
