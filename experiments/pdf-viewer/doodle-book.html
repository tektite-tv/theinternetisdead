<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doodle-book</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07070c;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #uploadBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.48);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font: 600 14px/1 Arial, sans-serif;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(8px);
    }
    #pdfInput { display: none; }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      place-items: center;
      color: white;
      font: 600 16px/1.4 Arial, sans-serif;
      background: rgba(0,0,0,0.22);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <label id="uploadBtn" for="pdfInput">Upload PDF</label>
  <input id="pdfInput" type="file" accept="application/pdf" />
  <div id="loading">Loading PDF…</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>

  <script>
    const input = document.getElementById('pdfInput');
    const loading = document.getElementById('loading');

    if (!window.THREE) {
      alert('Three.js failed to load.');
      throw new Error('Three.js failed to load.');
    }
    if (!window.pdfjsLib) {
      alert('PDF.js failed to load.');
      throw new Error('PDF.js failed to load.');
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

    let renderer, scene, camera;
    let bookRoot = null;
    let staticGroup = null;
    let pageGroup = null;
    let textures = [];
    let pages = [];
    let totalPages = 0;
    let currentIndex = 0;
    let activeFlip = null;

    let pageWidth = 1.45;
    let pageHeight = 2.0;
    let pageThickness = 0.0022;
    let stackThickness = 0.18;

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let yaw = 0.45;
    let pitch = -0.42;
    let targetYaw = yaw;
    let targetPitch = pitch;
    let cameraDistance = 5.1;

    initScene();
    animate();

    input.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) await loadPdf(file);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') turnForward();
      if (e.key === 'ArrowRight') turnBackward();
    });

    window.addEventListener('pointerdown', (e) => {
      if (e.target === input || e.target === document.getElementById('uploadBtn')) return;
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      targetYaw += dx * 0.006;
      targetPitch += dy * 0.004;
      targetPitch = Math.max(-1.2, Math.min(0.1, targetPitch));
    });

    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointercancel', () => isDragging = false);

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      cameraDistance += e.deltaY * 0.003;
      cameraDistance = Math.max(2.8, Math.min(9, cameraDistance));
    }, { passive: false });

    window.addEventListener('dblclick', () => {
      targetYaw = 0.45;
      targetPitch = -0.42;
      cameraDistance = 5.1;
    });

    window.addEventListener('resize', onResize);

    function initScene() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x07070c);
      scene.fog = new THREE.Fog(0x07070c, 7, 15);

      camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 100);
      updateCamera();

      const hemi = new THREE.HemisphereLight(0xe7eaff, 0x161822, 1.25);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 2.0);
      key.position.set(3.5, 5.5, 4.0);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9aafff, 0.35);
      fill.position.set(-4, 2, -3);
      scene.add(fill);

      const table = new THREE.Mesh(
        new THREE.CylinderGeometry(3.3, 3.55, 0.22, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x2c3148,
          roughness: 0.88,
          metalness: 0.03,
          clearcoat: 0.1
        })
      );
      table.position.set(0, -0.48, 0);
      table.receiveShadow = true;
      scene.add(table);

      const tableTop = new THREE.Mesh(
        new THREE.CylinderGeometry(3.36, 3.36, 0.03, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x3d4563,
          roughness: 0.55,
          metalness: 0.04,
          clearcoat: 0.18
        })
      );
      tableTop.position.set(0, -0.34, 0);
      tableTop.receiveShadow = true;
      scene.add(tableTop);

      buildEmptyBook();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateCamera() {
      camera.position.set(
        Math.sin(yaw) * cameraDistance,
        1.0 + (-pitch * 1.2),
        Math.cos(yaw) * cameraDistance
      );
      camera.lookAt(0, 0.25, 0);
    }

    function buildEmptyBook() {
      if (bookRoot) {
        scene.remove(bookRoot);
      }

      bookRoot = new THREE.Group();
      bookRoot.position.set(0, 0.02, 0);
      scene.add(bookRoot);

      staticGroup = new THREE.Group();
      pageGroup = new THREE.Group();
      bookRoot.add(staticGroup);
      bookRoot.add(pageGroup);

      const coverMat = new THREE.MeshPhysicalMaterial({
        color: 0x6f5a86,
        roughness: 0.9,
        metalness: 0.02,
        clearcoat: 0.08
      });

      const spineMat = new THREE.MeshPhysicalMaterial({
        color: 0x4f4162,
        roughness: 0.92
      });

      const paperEdgeMat = new THREE.MeshPhysicalMaterial({
        color: 0xf0ece4,
        roughness: 0.95
      });

      const coverThickness = 0.035;
      const coverW = pageWidth + 0.08;
      const coverH = pageHeight + 0.08;

      const leftCover = new THREE.Mesh(
        new THREE.BoxGeometry(coverW, coverThickness, coverH),
        coverMat
      );
      leftCover.position.set(-pageWidth * 0.5, -0.03, 0);
      leftCover.castShadow = true;
      leftCover.receiveShadow = true;
      staticGroup.add(leftCover);

      const rightCover = new THREE.Mesh(
        new THREE.BoxGeometry(coverW, coverThickness, coverH),
        coverMat
      );
      rightCover.position.set(pageWidth * 0.5, -0.03, 0);
      rightCover.castShadow = true;
      rightCover.receiveShadow = true;
      staticGroup.add(rightCover);

      const spine = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, coverThickness + stackThickness + 0.02, coverH),
        spineMat
      );
      spine.position.set(0, 0.0, 0);
      spine.castShadow = true;
      spine.receiveShadow = true;
      staticGroup.add(spine);

      const leftStack = new THREE.Mesh(
        new THREE.BoxGeometry(pageWidth * 0.97, stackThickness, pageHeight * 0.98),
        paperEdgeMat
      );
      leftStack.position.set(-pageWidth * 0.5, 0.02, 0);
      leftStack.castShadow = true;
      leftStack.receiveShadow = true;
      staticGroup.add(leftStack);

      const rightStack = new THREE.Mesh(
        new THREE.BoxGeometry(pageWidth * 0.97, stackThickness, pageHeight * 0.98),
        paperEdgeMat
      );
      rightStack.position.set(pageWidth * 0.5, 0.02, 0);
      rightStack.castShadow = true;
      rightStack.receiveShadow = true;
      staticGroup.add(rightStack);

      const centerShadow = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth * 2.8, pageHeight * 1.65),
        new THREE.ShadowMaterial({ opacity: 0.22 })
      );
      centerShadow.rotation.x = -Math.PI / 2;
      centerShadow.position.set(0, -0.33, 0);
      centerShadow.receiveShadow = true;
      staticGroup.add(centerShadow);
    }

    async function loadPdf(file) {
      loading.style.display = 'grid';

      try {
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        totalPages = pdf.numPages;

        const firstPage = await pdf.getPage(1);
        const probe = firstPage.getViewport({ scale: 1 });
        const aspect = probe.width / probe.height;
        pageHeight = 2.0;
        pageWidth = pageHeight * aspect;
        pageThickness = 0.0022;
        stackThickness = Math.min(0.22, Math.max(0.08, totalPages * pageThickness * 0.65));

        const newTextures = [];
        const renderScale = chooseScale(probe.width, probe.height, totalPages);

        for (let i = 1; i <= totalPages; i++) {
          loading.textContent = 'Loading PDF… ' + i + ' / ' + totalPages;
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: renderScale });

          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          await page.render({ canvasContext: ctx, viewport }).promise;

          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          tex.needsUpdate = true;
          newTextures.push(tex);
        }

        disposeTextures();
        textures = newTextures;
        currentIndex = 0;
        buildEmptyBook();
        buildPages();
        layoutPagesInstant();
      } catch (err) {
        console.error(err);
        alert('Failed to load PDF: ' + err.message);
      }

      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    function chooseScale(w, h, count) {
      const area = w * h;
      if (count > 80) return 1.0;
      if (count > 40) return area > 800000 ? 1.0 : 1.15;
      if (count > 20) return area > 900000 ? 1.1 : 1.3;
      return area > 1200000 ? 1.15 : 1.45;
    }

    function disposeTextures() {
      for (const tex of textures) {
        if (tex && tex.dispose) tex.dispose();
      }
      textures = [];
    }

    function clearPageGroup() {
      if (!pageGroup) return;
      while (pageGroup.children.length) {
        const child = pageGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose && m.dispose());
        else if (child.material) child.material.dispose();
      }
      pages = [];
    }

    function buildPages() {
      clearPageGroup();

      for (let i = 0; i < textures.length; i++) {
        const geometry = new THREE.PlaneGeometry(pageWidth, pageHeight, 30, 18);

        const front = new THREE.MeshPhongMaterial({
          map: textures[i],
          side: THREE.DoubleSide,
          shininess: 8,
          specular: new THREE.Color(0x1c1c1c)
        });

        const backCanvas = document.createElement('canvas');
        backCanvas.width = 64;
        backCanvas.height = 64;
        const backCtx = backCanvas.getContext('2d');
        backCtx.fillStyle = '#f5f2eb';
        backCtx.fillRect(0, 0, 64, 64);

        const backTex = new THREE.CanvasTexture(backCanvas);
        backTex.colorSpace = THREE.SRGBColorSpace;

        const back = new THREE.MeshPhongMaterial({
          map: backTex,
          side: THREE.DoubleSide,
          shininess: 2
        });

        const mesh = new THREE.Mesh(geometry, [front, back]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        mesh.userData = {
          index: i,
          progress: 0
        };

        pageGroup.add(mesh);
        pages.push(mesh);
      }
    }

    function layoutPagesInstant() {
      for (const page of pages) {
        const turned = page.userData.index < currentIndex;
        page.userData.progress = turned ? 1 : 0;
        applyPageState(page, page.userData.progress);
      }
    }

    function turnForward() {
      if (!pages.length || activeFlip || currentIndex >= totalPages) return;
      activeFlip = {
        pageIndex: currentIndex,
        from: 0,
        to: 1,
        start: performance.now(),
        duration: 900,
        dir: 1
      };
    }

    function turnBackward() {
      if (!pages.length || activeFlip || currentIndex <= 0) return;
      activeFlip = {
        pageIndex: currentIndex - 1,
        from: 1,
        to: 0,
        start: performance.now(),
        duration: 900,
        dir: -1
      };
    }

    function updateFlip() {
      if (!activeFlip) return;

      const t = Math.min(1, (performance.now() - activeFlip.start) / activeFlip.duration);
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      const page = pages[activeFlip.pageIndex];
      const p = activeFlip.from + (activeFlip.to - activeFlip.from) * eased;
      page.userData.progress = p;
      applyPageState(page, p);

      if (t >= 1) {
        currentIndex += activeFlip.dir;
        activeFlip = null;
        layoutPagesInstant();
      }
    }

    function applyPageState(page, progress) {
      const idx = page.userData.index;
      const turned = progress >= 0.5;

      const leftCount = Math.max(0, Math.min(currentIndex, totalPages));
      const rightCount = Math.max(0, totalPages - currentIndex);

      const turnedBefore = idx < currentIndex ? idx : Math.max(0, currentIndex - 1);
      const unturnedBefore = idx >= currentIndex ? (idx - currentIndex) : 0;

      let centerX, yOffset, zOffset;
      if (progress <= 0.001) {
        centerX = pageWidth * 0.5;
        yOffset = 0.12 + Math.min(unturnedBefore * pageThickness * 0.45, stackThickness * 0.5);
        zOffset = unturnedBefore * 0.0006;
      } else if (progress >= 0.999) {
        centerX = -pageWidth * 0.5;
        yOffset = 0.12 + Math.min(turnedBefore * pageThickness * 0.45, stackThickness * 0.5);
        zOffset = -turnedBefore * 0.0006;
      } else {
        const blend = progress;
        centerX = pageWidth * 0.5 * (1 - blend) + (-pageWidth * 0.5) * blend;
        yOffset = 0.145 + Math.sin(progress * Math.PI) * 0.02;
        zOffset = 0.01 + Math.sin(progress * Math.PI) * 0.03;
      }

      page.position.set(centerX, yOffset, zOffset);
      page.rotation.set(-Math.PI / 2, -Math.PI * progress, 0);

      deformPage(page.geometry, progress, turned);

      page.renderOrder = turned ? 200 + idx : 400 + (totalPages - idx);
    }

    function deformPage(geometry, progress, turned) {
      const pos = geometry.attributes.position;
      const halfW = pageWidth * 0.5;
      const halfH = pageHeight * 0.5;
      const curl = Math.sin(progress * Math.PI);
      const flipDir = turned ? -1 : 1;

      for (let i = 0; i < pos.count; i++) {
        const x0 = pos.getX(i);
        const y0 = pos.getY(i);

        const xNorm = (x0 + halfW) / pageWidth;
        const yNorm = y0 / halfH;

        let bendZ = Math.sin(xNorm * Math.PI) * curl * 0.16;
        bendZ += Math.sin(xNorm * Math.PI * 0.5) * curl * 0.08;
        bendZ *= 0.62 + (1 - Math.abs(yNorm)) * 0.38;

        let sweepY = Math.sin(xNorm * Math.PI) * curl * 0.12 * flipDir;
        sweepY *= 0.28 + (1 - Math.abs(yNorm)) * 0.72;

        const spinePull = Math.pow(1 - xNorm, 2.5) * curl * 0.14;
        const wrinkle = Math.sin((yNorm + 1) * Math.PI) * curl * 0.012;

        pos.setX(i, x0 - spinePull);
        pos.setY(i, y0 + sweepY);
        pos.setZ(i, bendZ + wrinkle);
      }

      pos.needsUpdate = true;
      geometry.computeVertexNormals();
    }

    function animate() {
      requestAnimationFrame(animate);

      yaw += (targetYaw - yaw) * 0.08;
      pitch += (targetPitch - pitch) * 0.08;
      updateCamera();
      updateFlip();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
