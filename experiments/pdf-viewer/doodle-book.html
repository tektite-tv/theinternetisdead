<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doodle-book</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b10;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #uploadBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.48);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font: 600 14px/1 Arial, sans-serif;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(8px);
    }

    #pdfInput {
      display: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      place-items: center;
      color: white;
      font: 600 16px/1.4 Arial, sans-serif;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <label id="uploadBtn" for="pdfInput">Upload PDF</label>
  <input id="pdfInput" type="file" accept="application/pdf" />
  <div id="loading">Loading PDF…</div>

  <!-- Fixed library URLs -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>

  <script>
    const input = document.getElementById('pdfInput');
    const loading = document.getElementById('loading');

    if (!window.pdfjsLib) {
      alert('PDF.js failed to load.');
      throw new Error('PDF.js failed to load.');
    }
    if (!window.THREE) {
      alert('Three.js failed to load.');
      throw new Error('Three.js failed to load.');
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';

    let renderer, scene, camera;
    let bookGroup = null;
    let pageMeshes = [];
    let pageTextures = [];
    let currentPage = 0;
    let totalPages = 0;
    let pageWidth = 1.55;
    let pageHeight = 2.1;
    let pageThicknessStep = 0.0017;
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let targetRotX = -0.22;
    let targetRotY = 0.28;
    let rotX = targetRotX;
    let rotY = targetRotY;
    let cameraDistance = 4.8;
    let activeFlip = null;

    init();
    animate();

    input.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) {
        await loadPdf(file);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'ArrowLeft') prevPage();
    });

    window.addEventListener('pointerdown', (e) => {
      if (e.target === input || e.target === document.getElementById('uploadBtn')) return;
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      targetRotY += dx * 0.006;
      targetRotX += dy * 0.004;
      targetRotX = Math.max(-1.1, Math.min(0.35, targetRotX));
    });

    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointercancel', () => isDragging = false);

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      cameraDistance += e.deltaY * 0.003;
      cameraDistance = Math.max(2.3, Math.min(9, cameraDistance));
    }, { passive: false });

    window.addEventListener('dblclick', () => {
      targetRotX = -0.22;
      targetRotY = 0.28;
      cameraDistance = 4.8;
    });

    function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0b10);
      scene.fog = new THREE.Fog(0x0b0b10, 7, 16);

      camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 100);
      updateCamera();

      const hemi = new THREE.HemisphereLight(0xdadfff, 0x151821, 1.3);
      scene.add(hemi);

      const key = new THREE.DirectionalLight(0xffffff, 2.0);
      key.position.set(3.5, 5.5, 4);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x9fb3ff, 0.45);
      fill.position.set(-4, 2, -3);
      scene.add(fill);

      const table = new THREE.Mesh(
        new THREE.CylinderGeometry(3.1, 3.35, 0.22, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x242632,
          roughness: 0.88,
          metalness: 0.03,
          clearcoat: 0.12
        })
      );
      table.position.set(0, -0.45, 0);
      table.receiveShadow = true;
      scene.add(table);

      const tableTop = new THREE.Mesh(
        new THREE.CylinderGeometry(3.18, 3.18, 0.03, 72),
        new THREE.MeshPhysicalMaterial({
          color: 0x303242,
          roughness: 0.56,
          metalness: 0.05,
          clearcoat: 0.24
        })
      );
      tableTop.position.set(0, -0.31, 0);
      tableTop.receiveShadow = true;
      scene.add(tableTop);

      window.addEventListener('resize', onResize);
    }

    function updateCamera() {
      camera.position.set(Math.sin(rotY) * cameraDistance, 1.0 + rotX * -0.75, Math.cos(rotY) * cameraDistance);
      camera.lookAt(0, 0.72, 0);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    async function loadPdf(file) {
      loading.style.display = 'grid';

      try {
        const bytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        totalPages = pdf.numPages;

        const firstPage = await pdf.getPage(1);
        const probe = firstPage.getViewport({ scale: 1 });
        const aspect = probe.width / probe.height;
        pageHeight = 2.15;
        pageWidth = pageHeight * aspect;
        pageThicknessStep = Math.min(0.0022, 0.1 / Math.max(totalPages, 8));

        const textures = [];
        const renderScale = chooseScale(probe.width, probe.height, totalPages);

        for (let i = 1; i <= totalPages; i++) {
          loading.textContent = 'Loading PDF… ' + i + ' / ' + totalPages;
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: renderScale });

          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          await page.render({ canvasContext: ctx, viewport }).promise;

          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
          textures.push(texture);
        }

        destroyBook();
        pageTextures = textures;
        buildBook(textures);
        currentPage = 0;
        setPagesInstant();
      } catch (err) {
        console.error(err);
        alert('Failed to load PDF: ' + err.message);
      }

      loading.style.display = 'none';
      loading.textContent = 'Loading PDF…';
    }

    function chooseScale(w, h, count) {
      const area = w * h;
      if (count > 80) return 1.0;
      if (count > 40) return area > 800000 ? 1.0 : 1.15;
      if (count > 20) return area > 900000 ? 1.1 : 1.3;
      return area > 1200000 ? 1.15 : 1.45;
    }

    function destroyBook() {
      if (!bookGroup) return;
      scene.remove(bookGroup);
      bookGroup.traverse((obj) => {
        if (obj.isMesh) {
          if (obj.geometry) obj.geometry.dispose();
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose && m.dispose());
          else if (obj.material) obj.material.dispose();
        }
      });
      pageTextures.forEach(t => t.dispose && t.dispose());
      pageMeshes = [];
      pageTextures = [];
      bookGroup = null;
    }

    function buildBook(textures) {
      bookGroup = new THREE.Group();
      bookGroup.position.y = 0.28;
      scene.add(bookGroup);

      const stackThickness = Math.min(0.5, Math.max(0.08, textures.length * pageThicknessStep));

      const coverMat = new THREE.MeshPhysicalMaterial({
        color: 0x6f5678,
        roughness: 0.9,
        metalness: 0.02,
        clearcoat: 0.12
      });

      const spineMat = new THREE.MeshPhysicalMaterial({
        color: 0x52405f,
        roughness: 0.92
      });

      const paperEdgeMat = new THREE.MeshPhysicalMaterial({
        color: 0xf4f0e8,
        roughness: 0.95
      });

      const leftCover = new THREE.Mesh(
        new THREE.BoxGeometry(pageWidth + 0.08, 0.045, pageHeight + 0.08),
        coverMat
      );
      leftCover.rotation.z = Math.PI / 2;
      leftCover.position.set(-pageWidth * 0.5 - 0.02, -0.02, 0);
      leftCover.castShadow = true;
      leftCover.receiveShadow = true;

      const rightCover = leftCover.clone();
      rightCover.position.x = pageWidth * 0.5 + 0.02;

      const spine = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, stackThickness + 0.03, pageHeight + 0.1),
        spineMat
      );
      spine.rotation.z = Math.PI / 2;
      spine.position.set(0, -0.02, 0);
      spine.castShadow = true;
      spine.receiveShadow = true;

      const paperStack = new THREE.Mesh(
        new THREE.BoxGeometry(pageWidth * 0.98, stackThickness, pageHeight * 0.985),
        paperEdgeMat
      );
      paperStack.position.set(0, 0.001, 0);
      paperStack.castShadow = true;
      paperStack.receiveShadow = true;

      bookGroup.add(leftCover, rightCover, spine, paperStack);

      pageMeshes = textures.map((texture, i) => createPageMesh(texture, i));
      pageMeshes.forEach(mesh => bookGroup.add(mesh));

      const shadow = new THREE.Mesh(
        new THREE.PlaneGeometry(pageWidth * 2.3, pageHeight * 1.55),
        new THREE.ShadowMaterial({ opacity: 0.24 })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.set(0, -0.305, 0);
      shadow.receiveShadow = true;
      bookGroup.add(shadow);
    }

    function createPageMesh(texture, index) {
      const geometry = new THREE.PlaneGeometry(pageWidth, pageHeight, 32, 18);
      geometry.rotateY(Math.PI / 2);

      const front = new THREE.MeshPhongMaterial({
        map: texture,
        side: THREE.FrontSide,
        shininess: 8,
        specular: new THREE.Color(0x181818),
        transparent: true
      });

      const blankCanvas = document.createElement('canvas');
      blankCanvas.width = 64;
      blankCanvas.height = 64;
      const bctx = blankCanvas.getContext('2d');
      bctx.fillStyle = '#f5f2eb';
      bctx.fillRect(0, 0, 64, 64);

      const blankTex = new THREE.CanvasTexture(blankCanvas);
      blankTex.colorSpace = THREE.SRGBColorSpace;

      const back = new THREE.MeshPhongMaterial({
        map: blankTex,
        side: THREE.BackSide,
        shininess: 4
      });

      const mesh = new THREE.Mesh(geometry, [front, back]);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { index, progress: 0 };
      return mesh;
    }

    function setPagesInstant() {
      for (let i = 0; i < pageMeshes.length; i++) {
        const turned = i < currentPage;
        pageMeshes[i].userData.progress = turned ? 1 : 0;
        applyPageState(pageMeshes[i], turned ? 1 : 0);
      }
    }

    function nextPage() {
      if (!pageMeshes.length || activeFlip || currentPage >= totalPages) return;
      activeFlip = {
        index: currentPage,
        from: 0,
        to: 1,
        start: performance.now(),
        duration: 850,
        dir: 1
      };
    }

    function prevPage() {
      if (!pageMeshes.length || activeFlip || currentPage <= 0) return;
      activeFlip = {
        index: currentPage - 1,
        from: 1,
        to: 0,
        start: performance.now(),
        duration: 850,
        dir: -1
      };
    }

    function updateFlip() {
      if (!activeFlip) return;
      const t = Math.min(1, (performance.now() - activeFlip.start) / activeFlip.duration);
      const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      const mesh = pageMeshes[activeFlip.index];
      const p = activeFlip.from + (activeFlip.to - activeFlip.from) * eased;
      mesh.userData.progress = p;
      applyPageState(mesh, p);

      if (t >= 1) {
        currentPage += activeFlip.dir;
        activeFlip = null;
      }
    }

    function applyPageState(mesh, progress) {
      const i = mesh.userData.index;
      const baseY = i * pageThicknessStep - (totalPages * pageThicknessStep * 0.5) + 0.025;
      const turned = progress >= 0.5;

      mesh.position.set(0, baseY + (1 - Math.abs(progress - 0.5) * 2) * 0.012, turned ? -(i + 1) * 0.0004 : (i + 1) * 0.0004);
      mesh.rotation.set(0, -Math.PI * progress, 0);

      bendGeometry(mesh.geometry, progress, turned);

      const curl = Math.sin(progress * Math.PI);
      mesh.material[0].opacity = 0.86 + curl * 0.14;
      mesh.renderOrder = turned ? 1 + i : 200 + (totalPages - i);
    }

    function bendGeometry(geometry, progress, turned) {
      const pos = geometry.attributes.position;
      const halfW = pageWidth / 2;
      const halfH = pageHeight / 2;
      const flipDir = turned ? -1 : 1;
      const curl = Math.sin(progress * Math.PI);

      for (let i = 0; i < pos.count; i++) {
        const ox = pos.getX(i);
        const oy = pos.getY(i);
        const xNorm = (ox + halfW) / pageWidth;
        const yNorm = oy / halfH;

        let bendZ = Math.sin(xNorm * Math.PI) * curl * 0.22;
        bendZ += Math.sin(xNorm * Math.PI * 0.5) * curl * 0.08;
        bendZ *= 0.62 + (1 - Math.abs(yNorm)) * 0.38;

        let sweepX = Math.sin(xNorm * Math.PI) * curl * 0.12 * flipDir;
        sweepX *= 0.34 + (1 - Math.abs(yNorm)) * 0.66;

        const spinePull = Math.pow(1 - xNorm, 2.4) * curl * 0.17;
        const wrinkle = Math.sin((yNorm + 1) * Math.PI) * curl * 0.015;

        pos.setX(i, ox + sweepX - spinePull);
        pos.setZ(i, bendZ + wrinkle);
      }

      pos.needsUpdate = true;
      geometry.computeVertexNormals();
    }

    function animate() {
      requestAnimationFrame(animate);

      rotX += (targetRotX - rotX) * 0.08;
      rotY += (targetRotY - rotY) * 0.08;
      updateCamera();
      updateFlip();

      if (bookGroup) {
        bookGroup.rotation.x = rotX;
        bookGroup.rotation.y = rotY;
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
