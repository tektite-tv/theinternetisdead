<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex Mandala Tessellation Field - Lite</title>
  <style>
    /*
      Vortex Mandala Tessellation Field - Lite

      Changes from the previous overcooked silicon soup:
      - No text overlay.
      - Much lower draw density.
      - No getImageData/putImageData speckle pass, because that was the lag goblin.
      - Softer center with no white-hot glow washing out the mandala.
      - Fewer rings, fewer branches, fewer shapes, less additive abuse.
      - Still procedural, mirrored, noisy, triangular/square, vortex-mandala weirdness.
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="vortex"></canvas>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("vortex");
      const ctx = canvas.getContext("2d", { alpha: false });

      let w = 0;
      let h = 0;
      let dpr = 1;
      let cx = 0;
      let cy = 0;
      let maxR = 0;
      let frame = 0;
      let paused = false;
      let seed = Math.floor(Math.random() * 999999999);

      const TAU = Math.PI * 2;
      const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

      const QUALITY = {
        rings: 32,
        layers: 5,
        symmetry: 12,
        branchCount: 4,
        branchSteps: 26,
        noiseDots: 650,
        frameStep: 1
      };

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function fract(v) {
        return v - Math.floor(v);
      }

      function hash(n) {
        return fract(Math.sin(n * 91.3458 + seed * 0.000031) * 47453.5453123);
      }

      function hash2(x, y, salt = 0) {
        return hash(x * 127.1 + y * 311.7 + salt * 74.3);
      }

      function smoothNoise(x, y, salt = 0) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = fract(x);
        const fy = fract(y);

        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);

        const a = hash2(ix, iy, salt);
        const b = hash2(ix + 1, iy, salt);
        const c = hash2(ix, iy + 1, salt);
        const d = hash2(ix + 1, iy + 1, salt);

        return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
      }

      function fbm(x, y, octaves = 3, salt = 0) {
        let value = 0;
        let amp = 0.5;
        let freq = 1;
        let norm = 0;

        for (let i = 0; i < octaves; i++) {
          value += smoothNoise(x * freq, y * freq, salt + i * 31.17) * amp;
          norm += amp;
          amp *= 0.54;
          freq *= 2.0;
        }

        return value / norm;
      }

      function resize() {
        dpr = clamp(window.devicePixelRatio || 1, 1, 1.5);
        w = window.innerWidth;
        h = window.innerHeight;

        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;

        cx = w * 0.5;
        cy = h * 0.5;
        maxR = Math.hypot(cx, cy);
      }

      function polygonPath(sides, r) {
        ctx.beginPath();

        for (let i = 0; i < sides; i++) {
          const a = -Math.PI / 2 + i * TAU / sides;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.closePath();
      }

      function palette(layer, alpha) {
        const drift = Math.sin(frame * 0.002 + layer) * 10;
        return [
          `hsla(${112 + layer * 18 + drift}, 100%, 48%, ${alpha})`,
          `hsla(${190 + layer * 16 - drift}, 100%, 54%, ${alpha * 0.62})`,
          `hsla(${304 + layer * 11 + drift}, 100%, 58%, ${alpha * 0.42})`
        ];
      }

      function drawShape(x, y, size, angle, sides, layer, alpha) {
        const colors = palette(layer, alpha);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.globalCompositeOperation = "lighter";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // Only two chromatic passes now. Three was trying to mine crypto with a kaleidoscope.
        for (let i = 0; i < 2; i++) {
          ctx.save();
          ctx.translate((i === 0 ? -0.45 : 0.45) * (layer + 1), (i === 0 ? 0.35 : -0.35) * (layer + 1));
          ctx.rotate((i - 0.5) * 0.015);
          polygonPath(sides, size * (1 - i * 0.09));
          ctx.strokeStyle = colors[i];
          ctx.lineWidth = Math.max(0.28, size * 0.018);
          ctx.stroke();
          ctx.restore();
        }

        if (size > 13) {
          ctx.globalCompositeOperation = "source-over";
          ctx.rotate(Math.PI / sides);
          polygonPath(sides === 3 ? 4 : 3, size * 0.36);
          ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.08})`;
          ctx.lineWidth = Math.max(0.22, size * 0.008);
          ctx.stroke();
        }

        ctx.restore();
      }

      function vortexAngle(rNorm, theta, layer) {
        const swirl = 4.1 * (1 - rNorm) + layer * 0.11;
        const pulse = Math.sin(rNorm * 22 - frame * 0.009 + layer) * 0.06;
        return theta + swirl + pulse;
      }

      function drawMandalaRings() {
        const rings = QUALITY.rings;
        const symmetry = QUALITY.symmetry;
        const time = frame * 0.003;

        for (let layer = 0; layer < QUALITY.layers; layer++) {
          const layerScale = 1 - layer * 0.055;
          const layerAlpha = 0.085 + layer * 0.014;

          for (let r = 3; r < rings; r++) {
            const rNorm = r / rings;
            const ringRadius = Math.pow(rNorm, 1.38) * maxR * 0.84 * layerScale;
            const count = Math.max(symmetry, Math.floor(symmetry + r * 0.86));
            const cell = TAU / count;

            for (let i = 0; i < count; i++) {
              const baseTheta = i * cell;

              const n = fbm(
                Math.cos(baseTheta * 1.7 + layer) * 1.8 + rNorm * 4.2,
                Math.sin(baseTheta * 1.7 - layer) * 1.8 - rNorm * 4.2,
                3,
                layer * 101 + r * 9
              );

              const petal = Math.sin(baseTheta * symmetry + rNorm * 10 - time);
              const gate = n + petal * 0.11 + Math.sin(rNorm * TAU * 5) * 0.08;

              if (gate < 0.55) continue;

              const theta = vortexAngle(rNorm, baseTheta, layer);
              const wobble = (n - 0.5) * 22;
              const rr = ringRadius + wobble;
              const x = cx + Math.cos(theta) * rr;
              const y = cy + Math.sin(theta) * rr;

              // Keep the exact center less crowded so it doesn't become a glowing traffic accident.
              if (Math.hypot(x - cx, y - cy) < Math.min(w, h) * 0.09) continue;

              const centerFalloff = 1 - rNorm;
              const size = (3 + n * 12) * (0.72 + centerFalloff * 0.95);
              const sides = (r + i + layer) % 3 === 0 ? 4 : 3;
              const angle = theta + rNorm * TAU * 2.2 + layer * Math.PI / 9 + n * TAU;

              drawShape(x, y, size, angle, sides, layer, layerAlpha + n * 0.17);
            }
          }
        }
      }

      function drawRecursivePetals() {
        const symmetry = 10;

        for (let s = 0; s < symmetry; s++) {
          const wedge = s * TAU / symmetry;

          for (let branch = 0; branch < QUALITY.branchCount; branch++) {
            const twist = branch * GOLDEN_ANGLE + frame * 0.0012 * (branch % 2 ? -1 : 1);

            for (let j = 0; j < QUALITY.branchSteps; j++) {
              const q = j / QUALITY.branchSteps;
              const spiral = q * q * maxR * 0.72;
              const theta = wedge + twist * 0.16 + q * (3.05 + branch * 0.17);
              const n = fbm(
                Math.cos(theta) * 2.5 + q * 4,
                Math.sin(theta) * 2.5 - q * 4,
                3,
                800 + branch * 61
              );

              if (n < 0.48) continue;

              const x = cx + Math.cos(theta) * spiral;
              const y = cy + Math.sin(theta) * spiral;

              if (Math.hypot(x - cx, y - cy) < Math.min(w, h) * 0.08) continue;

              const pinch = Math.sin(q * Math.PI);
              const size = 2.5 + pinch * 13 * n;
              const sides = branch % 2 ? 3 : 4;

              drawShape(
                x,
                y,
                size,
                theta + Math.PI / 2 + n * TAU,
                sides,
                branch + 2,
                0.09 + n * 0.15
              );
            }
          }
        }
      }

      function drawCentralCore() {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.globalCompositeOperation = "lighter";

        // Darker, cleaner core. No nuclear-white bloom. Civilization continues.
        const coreRadius = Math.min(w, h) * 0.105;
        const rings = 7;

        for (let r = rings; r >= 1; r--) {
          const q = r / rings;
          const count = 6 + r * 3;
          const radius = Math.pow(q, 1.65) * coreRadius;

          for (let i = 0; i < count; i++) {
            const a = i * TAU / count + r * GOLDEN_ANGLE + frame * 0.0018 * (r % 2 ? 1 : -1);
            const n = fbm(Math.cos(a) * r * 0.2, Math.sin(a) * r * 0.2, 3, 1200 + r);

            ctx.save();
            ctx.translate(Math.cos(a) * radius, Math.sin(a) * radius);
            ctx.rotate(a * 2 + n * TAU);
            polygonPath(r % 2 ? 3 : 4, 2 + n * 5.5);
            ctx.strokeStyle = palette(r, 0.11 + n * 0.12)[r % 3];
            ctx.lineWidth = 0.35 + n * 0.45;
            ctx.stroke();
            ctx.restore();
          }
        }

        ctx.globalCompositeOperation = "source-over";
        const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, coreRadius * 1.55);
        grd.addColorStop(0, "rgba(0, 0, 0, 0.25)");
        grd.addColorStop(0.32, "rgba(0, 80, 48, 0.07)");
        grd.addColorStop(0.7, "rgba(0, 20, 38, 0.045)");
        grd.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(0, 0, coreRadius * 1.55, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawEdgeEchoes() {
        const count = 16;
        const edgeR = maxR * 0.82;

        for (let i = 0; i < count; i++) {
          const a = i * TAU / count + frame * 0.0007;
          const n = fbm(Math.cos(a) * 5, Math.sin(a) * 5, 3, 2200 + i);
          const x = cx + Math.cos(a) * edgeR;
          const y = cy + Math.sin(a) * edgeR;

          drawShape(
            x,
            y,
            10 + n * 24,
            a + Math.PI / 4 + n,
            i % 2 ? 3 : 4,
            i % QUALITY.layers,
            0.09 + n * 0.12
          );
        }
      }

      function drawCheapStaticDots() {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (let i = 0; i < QUALITY.noiseDots; i++) {
          const x = hash(i * 4.13 + seed) * w;
          const y = hash(i * 8.71 + seed) * h;
          const n = hash(i * 13.19 + frame * 0.08);

          if (n < 0.52) continue;

          const channel = Math.floor(hash(i + 99.1) * 3);
          const alpha = 0.05 + n * 0.16;
          const size = 0.45 + hash(i + 33.3) * 1.1;

          if (channel === 0) ctx.fillStyle = `rgba(0,255,70,${alpha})`;
          else if (channel === 1) ctx.fillStyle = `rgba(0,190,255,${alpha})`;
          else ctx.fillStyle = `rgba(255,40,220,${alpha})`;

          ctx.fillRect(x, y, size, size);
        }

        ctx.restore();
      }

      function render() {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);

        const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        bg.addColorStop(0, "rgba(2, 0, 7, 0.92)");
        bg.addColorStop(0.42, "rgba(0, 0, 0, 0.98)");
        bg.addColorStop(1, "rgba(0, 0, 0, 1)");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        drawMandalaRings();
        drawRecursivePetals();
        drawCentralCore();
        drawEdgeEchoes();
        drawCheapStaticDots();

        // Slight dark glaze to stop the additive blend from turning into neon oatmeal.
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(0,0,0,0.10)";
        ctx.fillRect(0, 0, w, h);

        if (!paused) frame += QUALITY.frameStep;
        requestAnimationFrame(render);
      }

      function saveFrame() {
        const a = document.createElement("a");
        a.download = `vortex-mandala-lite-${seed}-${frame}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      function reseed() {
        seed = Math.floor(Math.random() * 999999999);
        frame = 0;
      }

      window.addEventListener("resize", resize);

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (key === " ") {
          event.preventDefault();
          paused = !paused;
        }

        if (key === "r") reseed();
        if (key === "s") saveFrame();
      });

      window.addEventListener("click", () => {
        paused = !paused;
      });

      resize();
      render();
    })();
  </script>
</body>
</html>
