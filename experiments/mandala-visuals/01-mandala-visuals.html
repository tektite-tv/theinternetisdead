<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPU Ascension Tessellation Field</title>
  <style>
    /*
      GPU Ascension Tessellation Field
      Single-file HTML canvas background.

      What it does, because apparently the silicon afterlife needs paperwork:
      - Renders a self-similar noisy tessellation field.
      - Uses repeated rotated triangles and squares.
      - Mirrors/rotates repeated wedges for kaleidoscopic symmetry.
      - Uses additive blending and RGB channel offsets for "GPU died but found religion" energy.
      - Click/tap toggles animation pause.
      - Press S to save a PNG frame.
      - Press R to reseed the pattern.
    */

    :root {
      --bg: #000;
      --text: rgba(210, 255, 210, 0.8);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .hud {
      position: fixed;
      left: 14px;
      bottom: 12px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      text-shadow: 0 0 8px rgba(0, 255, 80, 0.85);
      user-select: none;
      pointer-events: none;
      opacity: 0.72;
      mix-blend-mode: screen;
    }

    .hud strong {
      color: rgba(255, 255, 255, 0.92);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <canvas id="field" aria-label="Procedural noisy self-similar tessellation background"></canvas>
  <div class="hud">
    <strong>GPU_ASCENSION_FIELD</strong><br />
    click: pause · R: reseed · S: save frame
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("field");
      const ctx = canvas.getContext("2d", { alpha: false });

      let width = 0;
      let height = 0;
      let dpr = 1;
      let cx = 0;
      let cy = 0;
      let radius = 0;
      let frame = 0;
      let paused = false;
      let seed = Math.floor(Math.random() * 2 ** 31);

      const TAU = Math.PI * 2;
      const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function mix(a, b, t) {
        return a + (b - a) * t;
      }

      function fract(value) {
        return value - Math.floor(value);
      }

      function hash(n) {
        // A cheap deterministic hash. Not cryptographic, because nobody needs
        // military-grade triangle placement unless geometry has declared war.
        return fract(Math.sin(n * 127.1 + seed * 0.013) * 43758.5453123);
      }

      function hash2(x, y, salt = 0) {
        return hash(x * 269.5 + y * 183.3 + salt * 97.7);
      }

      function valueNoise(x, y, salt = 0) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = fract(x);
        const fy = fract(y);

        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);

        const a = hash2(ix, iy, salt);
        const b = hash2(ix + 1, iy, salt);
        const c = hash2(ix, iy + 1, salt);
        const d = hash2(ix + 1, iy + 1, salt);

        return mix(mix(a, b, ux), mix(c, d, ux), uy);
      }

      function fbm(x, y, octaves = 5, salt = 0) {
        let value = 0;
        let amplitude = 0.5;
        let frequency = 1;
        let norm = 0;

        for (let i = 0; i < octaves; i++) {
          value += amplitude * valueNoise(x * frequency, y * frequency, salt + i * 19.19);
          norm += amplitude;
          amplitude *= 0.52;
          frequency *= 2.03;
        }

        return value / norm;
      }

      function resize() {
        dpr = clamp(window.devicePixelRatio || 1, 1, 2);
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;

        cx = width * 0.5;
        cy = height * 0.5;
        radius = Math.hypot(cx, cy);
      }

      function colorFor(layer, n, alpha = 0.48) {
        const hueBase = (seed * 0.00003 + layer * 37 + n * 120) % 360;
        const hue = (hueBase + 70 * Math.sin(frame * 0.003 + layer)) % 360;
        const sat = 92 + 8 * Math.sin(layer * 2.1);
        const lum = 46 + 12 * Math.sin(n * 4.0 + layer);
        return `hsla(${hue}, ${sat}%, ${lum}%, ${alpha})`;
      }

      function drawPolygon(sides, size) {
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
          const a = -Math.PI / 2 + (TAU * i) / sides;
          const x = Math.cos(a) * size;
          const y = Math.sin(a) * size;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
      }

      function drawGlyph(x, y, size, angle, layer, n) {
        const noisy = fbm(x * 0.008 + layer, y * 0.008 - layer, 4, layer);
        const sides = noisy > 0.58 ? 4 : 3;
        const strokeSize = Math.max(0.45, size * 0.035);
        const alpha = clamp(0.14 + noisy * 0.58, 0.15, 0.76);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // RGB offset passes. Humanity invented chromatic aberration, then GPUs
        // made it a death certificate. Efficient work, honestly.
        const offsets = [
          [-1.7,  0.9, "rgba(0,255,70,"],
          [ 1.4, -1.1, "rgba(0,180,255,"],
          [ 0.2,  1.7, "rgba(255,40,230,"]
        ];

        ctx.lineWidth = strokeSize;
        ctx.globalCompositeOperation = "lighter";

        for (let i = 0; i < offsets.length; i++) {
          const [ox, oy, prefix] = offsets[i];
          ctx.save();
          ctx.translate(ox * (0.5 + layer * 0.06), oy * (0.5 + layer * 0.06));
          ctx.rotate((i - 1) * 0.018 * (layer + 1));
          drawPolygon(sides, size);
          ctx.strokeStyle = `${prefix}${alpha * (0.56 + i * 0.09)})`;
          ctx.stroke();

          if (noisy > 0.66 && size < 54) {
            ctx.globalAlpha = 0.26;
            ctx.fillStyle = `${prefix}${alpha * 0.18})`;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          ctx.restore();
        }

        if (noisy > 0.76) {
          ctx.rotate(Math.PI / sides);
          drawPolygon(sides === 3 ? 4 : 3, size * 0.48);
          ctx.strokeStyle = colorFor(layer, n, 0.24);
          ctx.lineWidth = Math.max(0.35, strokeSize * 0.66);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawRadialShard(angle, scale, layer) {
        const rings = 24;
        const jitterPower = 38 + layer * 12;
        const cellBase = mix(18, 72, layer / 7);

        for (let r = 0; r < rings; r++) {
          const ringT = r / rings;
          const ringRadius = ringT * radius * scale;
          const count = Math.max(6, Math.floor(TAU * ringRadius / cellBase));

          for (let i = 0; i < count; i++) {
            const localT = i / count;
            const a = angle + localT * TAU + layer * GOLDEN_ANGLE;
            const n = fbm(
              Math.cos(a) * 2.5 + ringT * 4.0,
              Math.sin(a) * 2.5 - ringT * 4.0,
              5,
              layer * 11
            );

            if (n < 0.43) continue;

            const wobble = (n - 0.5) * jitterPower;
            const x = cx + Math.cos(a) * (ringRadius + wobble);
            const y = cy + Math.sin(a) * (ringRadius + wobble);
            const size = cellBase * (0.28 + n * 0.72) * (1.18 - ringT * 0.35);
            const rot = a * (layer % 2 ? -2 : 2) + frame * 0.002 * (layer + 1) + n * TAU;

            drawGlyph(x, y, size, rot, layer, n);
          }
        }
      }

      function drawTessellationLayer(layer) {
        const grid = [144, 96, 64, 42, 28, 18, 12, 8][layer];
        const time = frame * 0.0035;
        const cols = Math.ceil(width / grid) + 4;
        const rows = Math.ceil(height / grid) + 4;
        const ox = -grid * 2 + ((Math.sin(time * (0.7 + layer * 0.11)) * grid) % grid);
        const oy = -grid * 2 + ((Math.cos(time * (0.5 + layer * 0.07)) * grid) % grid);

        for (let gy = 0; gy < rows; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const x0 = ox + gx * grid;
            const y0 = oy + gy * grid;

            const dx = x0 - cx;
            const dy = y0 - cy;
            const dist = Math.hypot(dx, dy) / radius;
            const polar = Math.atan2(dy, dx);
            const k = fbm(
              gx * 0.33 + Math.cos(polar * 4) * 0.7,
              gy * 0.33 + Math.sin(polar * 4) * 0.7,
              5,
              layer * 101
            );

            const ring = Math.sin(dist * Math.PI * (8 + layer * 1.6) - time * (1.2 + layer * 0.2));
            const gate = k + ring * 0.12 + (1 - dist) * 0.12;
            if (gate < 0.47) continue;

            const mirrorX = Math.abs(x0 - cx);
            const mirrorY = Math.abs(y0 - cy);
            const qx = cx + (x0 < cx ? -mirrorX : mirrorX);
            const qy = cy + (y0 < cy ? -mirrorY : mirrorY);

            const size = grid * (0.2 + k * 0.66);
            const angle = Math.round((polar + k * TAU) / (Math.PI / 4)) * (Math.PI / 4);
            drawGlyph(qx, qy, size, angle + layer * Math.PI / 8, layer, k);
          }
        }
      }

      function drawCenterMandala() {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.globalCompositeOperation = "lighter";

        const pulse = 1 + Math.sin(frame * 0.018) * 0.04;
        const maxR = Math.min(width, height) * 0.34 * pulse;

        for (let ring = 0; ring < 9; ring++) {
          const sides = ring % 2 === 0 ? 4 : 3;
          const count = 8 + ring * 4;
          const ringRadius = maxR * (ring + 1) / 9;

          for (let i = 0; i < count; i++) {
            const a = (TAU * i) / count + ring * GOLDEN_ANGLE + frame * 0.0018 * (ring % 2 ? -1 : 1);
            const n = fbm(Math.cos(a) * ring, Math.sin(a) * ring, 4, ring + 999);
            const x = Math.cos(a) * ringRadius;
            const y = Math.sin(a) * ringRadius;
            const size = 5 + n * 18 + ring * 1.3;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(a * 2 + n * TAU);
            drawPolygon(sides, size);
            ctx.lineWidth = 0.75 + ring * 0.04;
            ctx.strokeStyle = colorFor(ring, n, 0.25 + n * 0.25);
            ctx.stroke();
            ctx.restore();
          }
        }

        ctx.restore();
      }

      function drawScanSpeckle() {
        const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = image.data;
        const amount = 9500;

        // Tiny additive speckles, seeded per frame but spatially deterministic enough
        // to feel like a stable cosmic PCB rash.
        for (let i = 0; i < amount; i++) {
          const p = Math.floor(hash(i + frame * 0.7) * (data.length / 4)) * 4;
          const strength = 35 + hash(i + 31.7) * 170;
          const channel = Math.floor(hash(i + 91.2) * 3);
          data[p + channel] = clamp(data[p + channel] + strength, 0, 255);
          data[p + 3] = 255;
        }

        ctx.putImageData(image, 0, 0);
      }

      function render() {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, width, height);

        ctx.globalCompositeOperation = "lighter";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (let layer = 0; layer < 8; layer++) {
          drawTessellationLayer(layer);
        }

        for (let i = 0; i < 12; i++) {
          drawRadialShard((TAU * i) / 12, 1.02, i % 8);
        }

        drawCenterMandala();

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(0, 0, width, height);

        drawScanSpeckle();

        if (!paused) frame++;
        requestAnimationFrame(render);
      }

      function saveFrame() {
        const link = document.createElement("a");
        link.download = `gpu-ascension-field-${seed}-${frame}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      function reseed() {
        seed = Math.floor(Math.random() * 2 ** 31);
        frame = 0;
      }

      window.addEventListener("resize", resize);
      window.addEventListener("click", () => {
        paused = !paused;
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (key === "s") saveFrame();
        if (key === "r") reseed();
        if (key === " ") {
          event.preventDefault();
          paused = !paused;
        }
      });

      resize();
      render();
    })();
  </script>
</body>
</html>
