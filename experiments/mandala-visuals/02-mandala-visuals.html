<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortex Mandala Tessellation Field</title>
  <style>
    /*
      Vortex Mandala Tessellation Field
      Single-file procedural canvas background.

      No text overlay.
      No UI.
      Just a mathematically over-caffeinated vortex mandala made from
      rotated triangles, squares, mirrored wedges, recursive rings, and RGB noise.
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="vortex"></canvas>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("vortex");
      const ctx = canvas.getContext("2d", { alpha: false });

      let w = 0;
      let h = 0;
      let dpr = 1;
      let cx = 0;
      let cy = 0;
      let maxR = 0;
      let frame = 0;
      let seed = Math.floor(Math.random() * 999999999);
      let paused = false;

      const TAU = Math.PI * 2;
      const PHI = (1 + Math.sqrt(5)) / 2;
      const GOLDEN_ANGLE = TAU * (1 - 1 / PHI);

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function fract(v) {
        return v - Math.floor(v);
      }

      function hash(n) {
        return fract(Math.sin(n * 91.3458 + seed * 0.000031) * 47453.5453123);
      }

      function hash2(x, y, salt = 0) {
        return hash(x * 127.1 + y * 311.7 + salt * 74.3);
      }

      function smoothNoise(x, y, salt = 0) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = fract(x);
        const fy = fract(y);

        const ux = fx * fx * (3 - 2 * fx);
        const uy = fy * fy * (3 - 2 * fy);

        const a = hash2(ix, iy, salt);
        const b = hash2(ix + 1, iy, salt);
        const c = hash2(ix, iy + 1, salt);
        const d = hash2(ix + 1, iy + 1, salt);

        return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
      }

      function fbm(x, y, octaves = 5, salt = 0) {
        let value = 0;
        let amp = 0.5;
        let freq = 1;
        let norm = 0;

        for (let i = 0; i < octaves; i++) {
          value += smoothNoise(x * freq, y * freq, salt + i * 41.17) * amp;
          norm += amp;
          amp *= 0.53;
          freq *= 2.08;
        }

        return value / norm;
      }

      function resize() {
        dpr = clamp(window.devicePixelRatio || 1, 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        cx = w * 0.5;
        cy = h * 0.5;
        maxR = Math.hypot(cx, cy);
      }

      function polygonPath(sides, r) {
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
          const a = -Math.PI / 2 + i * TAU / sides;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
      }

      function neonStroke(layer, alpha) {
        const hueA = (102 + layer * 31 + Math.sin(frame * 0.005 + layer) * 18) % 360;
        const hueB = (178 + layer * 29 + Math.cos(frame * 0.004 + layer) * 22) % 360;
        const hueC = (296 + layer * 17 + Math.sin(frame * 0.003 + layer) * 16) % 360;

        return [
          `hsla(${hueA}, 100%, 52%, ${alpha})`,
          `hsla(${hueB}, 100%, 58%, ${alpha * 0.74})`,
          `hsla(${hueC}, 100%, 60%, ${alpha * 0.58})`
        ];
      }

      function drawShape(x, y, size, angle, sides, layer, alpha) {
        const colors = neonStroke(layer, alpha);
        const split = 0.85 + layer * 0.08;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.globalCompositeOperation = "lighter";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.translate(
            Math.cos(angle + i * TAU / 3) * split,
            Math.sin(angle + i * TAU / 3) * split
          );
          ctx.rotate((i - 1) * 0.012 * (layer + 1));
          polygonPath(sides, size * (1 - i * 0.08));
          ctx.strokeStyle = colors[i];
          ctx.lineWidth = Math.max(0.35, size * (0.025 + i * 0.006));
          ctx.stroke();
          ctx.restore();
        }

        if (size > 8 && layer % 2 === 0) {
          ctx.rotate(Math.PI / sides);
          polygonPath(sides === 3 ? 4 : 3, size * 0.43);
          ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.16})`;
          ctx.lineWidth = Math.max(0.25, size * 0.012);
          ctx.stroke();
        }

        ctx.restore();
      }

      function vortexMap(rNorm, theta, layer) {
        const swirl = 5.7 * (1 - rNorm) + layer * 0.17;
        const pulse = Math.sin(rNorm * 34 - frame * 0.018 + layer) * 0.12;
        const spiralA = theta + swirl + pulse;
        const spiralB = theta - swirl * 0.58 - pulse * 0.65;
        return { spiralA, spiralB };
      }

      function drawMandalaRings() {
        const rings = 58;
        const symmetry = 16;
        const t = frame * 0.006;

        for (let layer = 0; layer < 9; layer++) {
          const layerScale = 1 - layer * 0.045;
          const layerAlpha = 0.16 + layer * 0.018;
          const ringOffset = layer * 0.37;

          for (let r = 2; r < rings; r++) {
            const rNorm = (r + ringOffset) / rings;
            const ringRadius = Math.pow(rNorm, 1.34) * maxR * 0.92 * layerScale;
            const count = Math.max(12, Math.floor(symmetry + r * 1.8));
            const cell = TAU / count;

            for (let i = 0; i < count; i++) {
              const baseTheta = i * cell;
              const mirroredTheta = Math.round(baseTheta / (TAU / symmetry)) * (TAU / symmetry);
              const wedgePhase = baseTheta - mirroredTheta;

              const noise = fbm(
                Math.cos(baseTheta * 2 + layer) * 2.2 + rNorm * 5.7,
                Math.sin(baseTheta * 2 - layer) * 2.2 - rNorm * 5.7,
                5,
                layer * 133 + r * 7
              );

              const petal = Math.sin(baseTheta * symmetry * 0.5 + rNorm * 15 - t * 2.2);
              const gate = noise + petal * 0.18 + Math.sin(rNorm * TAU * 7.0) * 0.12;

              if (gate < 0.48) continue;

              const { spiralA, spiralB } = vortexMap(rNorm, baseTheta, layer);
              const theta = lerp(spiralA, spiralB, 0.22 + noise * 0.18);
              const bend = Math.sin(wedgePhase * symmetry + rNorm * 20) * 9;
              const rr = ringRadius + (noise - 0.5) * 42 + bend;

              const x = cx + Math.cos(theta) * rr;
              const y = cy + Math.sin(theta) * rr;

              const centerFalloff = 1 - rNorm;
              const size = (3.2 + noise * 18) * (0.65 + centerFalloff * 1.65) * (1 + layer * 0.035);
              const sides = (r + i + layer) % 3 === 0 ? 4 : 3;
              const angle = theta + rNorm * TAU * 3.2 + layer * Math.PI / 8 + noise * TAU;

              drawShape(x, y, size, angle, sides, layer, layerAlpha + noise * 0.32);
            }
          }
        }
      }

      function drawRecursivePetals() {
        const symmetry = 12;
        const branches = 7;

        for (let s = 0; s < symmetry; s++) {
          const wedge = s * TAU / symmetry;

          for (let branch = 0; branch < branches; branch++) {
            const twist = branch * GOLDEN_ANGLE + frame * 0.002 * (branch % 2 ? -1 : 1);
            const steps = 48;
            const branchAlpha = 0.18 + branch * 0.018;

            for (let j = 0; j < steps; j++) {
              const q = j / steps;
              const spiral = q * q * maxR * 0.78;
              const pinch = Math.sin(q * Math.PI);
              const theta = wedge + twist * 0.22 + q * (3.5 + branch * 0.23) + Math.sin(q * 20 + frame * 0.01) * 0.055;

              const n = fbm(
                Math.cos(theta) * 4 + q * 7,
                Math.sin(theta) * 4 - q * 7,
                4,
                800 + branch * 61
              );

              if (n < 0.38) continue;

              const x = cx + Math.cos(theta) * spiral;
              const y = cy + Math.sin(theta) * spiral;
              const size = 2.4 + pinch * 21 * n;
              const sides = branch % 2 ? 3 : 4;

              drawShape(
                x,
                y,
                size,
                theta + Math.PI / 2 + n * TAU,
                sides,
                branch + 2,
                branchAlpha + n * 0.24
              );
            }
          }
        }
      }

      function drawCentralCore() {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.globalCompositeOperation = "lighter";

        const rings = 18;
        for (let r = rings; r >= 1; r--) {
          const q = r / rings;
          const count = 8 + r * 4;
          const radius = Math.pow(q, 1.55) * Math.min(w, h) * 0.28;

          for (let i = 0; i < count; i++) {
            const a = i * TAU / count + r * GOLDEN_ANGLE + frame * 0.003 * (r % 2 ? 1 : -1);
            const n = fbm(Math.cos(a) * r * 0.3, Math.sin(a) * r * 0.3, 4, 1200 + r);
            const petalR = radius * (0.82 + n * 0.28);
            const x = Math.cos(a) * petalR;
            const y = Math.sin(a) * petalR;
            const sides = r % 2 ? 3 : 4;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(a * 2.0 + n * TAU);
            polygonPath(sides, 2 + n * 12 * (1 - q * 0.25));
            ctx.strokeStyle = neonStroke(r, 0.22 + n * 0.34)[r % 3];
            ctx.lineWidth = 0.4 + n * 1.2;
            ctx.stroke();
            ctx.restore();
          }
        }

        const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.min(w, h) * 0.16);
        grd.addColorStop(0, "rgba(255,255,255,0.35)");
        grd.addColorStop(0.18, "rgba(0,255,120,0.20)");
        grd.addColorStop(0.45, "rgba(0,140,255,0.10)");
        grd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(0, 0, Math.min(w, h) * 0.18, 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawEdgeKaleidoscope() {
        const symmetry = 24;
        const edgeR = maxR * 0.88;

        for (let i = 0; i < symmetry; i++) {
          const a = i * TAU / symmetry + frame * 0.001;
          const n = fbm(Math.cos(a) * 8, Math.sin(a) * 8, 5, 2200 + i);
          const x = cx + Math.cos(a) * edgeR;
          const y = cy + Math.sin(a) * edgeR;

          drawShape(
            x,
            y,
            18 + n * 42,
            a + Math.PI / 4 + n,
            i % 2 ? 3 : 4,
            i % 9,
            0.18 + n * 0.28
          );
        }
      }

      function drawMicroNoise() {
        const image = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = image.data;
        const pixels = data.length / 4;
        const speckles = Math.floor(Math.min(19000, pixels * 0.012));

        for (let i = 0; i < speckles; i++) {
          const p = Math.floor(hash(i * 3.73 + frame * 0.37) * pixels) * 4;
          const c = Math.floor(hash(i + 54.1) * 3);
          const boost = 45 + hash(i + 111.9) * 185;
          data[p + c] = clamp(data[p + c] + boost, 0, 255);

          if (hash(i + 6.6) > 0.78) {
            data[p + ((c + 1) % 3)] = clamp(data[p + ((c + 1) % 3)] + boost * 0.55, 0, 255);
          }

          data[p + 3] = 255;
        }

        ctx.putImageData(image, 0, 0);
      }

      function render() {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);

        const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        bg.addColorStop(0, "rgba(10,0,20,0.72)");
        bg.addColorStop(0.34, "rgba(0,0,0,0.96)");
        bg.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        drawMandalaRings();
        drawRecursivePetals();
        drawCentralCore();
        drawEdgeKaleidoscope();

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(0,0,0,0.14)";
        ctx.fillRect(0, 0, w, h);

        drawMicroNoise();

        if (!paused) frame++;
        requestAnimationFrame(render);
      }

      function saveFrame() {
        const a = document.createElement("a");
        a.download = `vortex-mandala-tessellation-${seed}-${frame}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      function reseed() {
        seed = Math.floor(Math.random() * 999999999);
        frame = 0;
      }

      window.addEventListener("resize", resize);

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (key === " ") {
          event.preventDefault();
          paused = !paused;
        }

        if (key === "r") reseed();
        if (key === "s") saveFrame();
      });

      window.addEventListener("click", () => {
        paused = !paused;
      });

      resize();
      render();
    })();
  </script>
</body>
</html>
