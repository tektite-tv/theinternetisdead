<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Non-Euclidean 4D Infinite Vortex Flight</title>
  <style>
    /*
      RGB Non-Euclidean 4D Infinite Vortex Flight

      Patch goal:
      - Infinitely stacks the mandala behind itself.
      - Makes the camera feel like it is flying through it forever.
      - Adds pseudo non-Euclidean curvature by bending radius/depth with hyperbolic-like math.
      - Adds pseudo 4D projection by rotating generated 4D points through XW/YW/ZW planes,
        then projecting them back into 3D. Yes, fake 4D, because browsers remain tragically 3D.
      - Keeps deterministic 33.3% red / green / blue object buckets.
      - Keeps center active without turning it into an RGB flashbang.
      - No overlay. No UI. Just the geometry tunnel doing unsupervised theology.

      Controls:
      - Click or Space: pause/resume
      - R: reseed
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";

    let seed = Math.floor(Math.random() * 999999999);
    let frame = 0;
    let paused = false;

    const TAU = Math.PI * 2;
    const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

    const SETTINGS = {
      stacks: 18,
      ringsPerStack: 12,
      symmetry: 12,
      layers: 4,
      coreRings: 5,
      coreSymmetry: 10,
      stars: 850,

      stackSpacing: 210,
      tunnelLength: 18 * 210,
      flySpeed: 4.25,
      spinSpeed: 0.0032,

      objectScale: 0.82,
      centerVoid: 38,
      ringSpread: 360,

      hyperbolicCurve: 0.42,
      fourthDimStrength: 0.58,
      dprMax: 1.45
    };

    const RGB = [
      { name: "red",   color: new THREE.Color(1.0, 0.13, 0.09) },
      { name: "green", color: new THREE.Color(0.0, 1.0, 0.34) },
      { name: "blue",  color: new THREE.Color(0.14, 0.46, 1.0) }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.00175);

    const camera = new THREE.PerspectiveCamera(
      66,
      window.innerWidth / window.innerHeight,
      0.1,
      6200
    );
    camera.position.set(0, 0, 560);
    camera.lookAt(0, 0, -220);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, SETTINGS.dprMax));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const world = new THREE.Group();
    const tunnel = new THREE.Group();
    const starfield = new THREE.Group();

    scene.add(world);
    world.add(tunnel);
    world.add(starfield);

    const ambient = new THREE.AmbientLight(0x15152c, 0.62);
    scene.add(ambient);

    const pointA = new THREE.PointLight(0x33ff99, 0.82, 1800);
    pointA.position.set(280, -220, 500);
    scene.add(pointA);

    const pointB = new THREE.PointLight(0x3355ff, 0.74, 1900);
    pointB.position.set(-320, 240, 240);
    scene.add(pointB);

    const pointC = new THREE.PointLight(0xff2222, 0.50, 1600);
    pointC.position.set(0, 0, 720);
    scene.add(pointC);

    function fract(v) {
      return v - Math.floor(v);
    }

    function hash(n) {
      return fract(Math.sin(n * 91.3458 + seed * 0.000031) * 47453.5453123);
    }

    function hash2(x, y, salt = 0) {
      return hash(x * 127.1 + y * 311.7 + salt * 74.3);
    }

    function smoothNoise(x, y, salt = 0) {
      const ix = Math.floor(x);
      const iy = Math.floor(y);
      const fx = fract(x);
      const fy = fract(y);

      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);

      const a = hash2(ix, iy, salt);
      const b = hash2(ix + 1, iy, salt);
      const c = hash2(ix, iy + 1, salt);
      const d = hash2(ix + 1, iy + 1, salt);

      return THREE.MathUtils.lerp(
        THREE.MathUtils.lerp(a, b, ux),
        THREE.MathUtils.lerp(c, d, ux),
        uy
      );
    }

    function fbm(x, y, octaves = 3, salt = 0) {
      let value = 0;
      let amp = 0.5;
      let freq = 1;
      let norm = 0;

      for (let i = 0; i < octaves; i++) {
        value += smoothNoise(x * freq, y * freq, salt + i * 31.17) * amp;
        norm += amp;
        amp *= 0.54;
        freq *= 2.0;
      }

      return value / norm;
    }

    function colorIndex(id) {
      return Math.floor(hash(id) * 3);
    }

    function rotate2(a, b, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return [a * c - b * s, a * s + b * c];
    }

    function project4Dto3D(x, y, z, w4, time, id) {
      // 4D-ish rotation through XW, YW, and ZW planes, then perspective projection.
      // It is fake, yes. So is most institutional confidence. We proceed.
      let tx = x;
      let ty = y;
      let tz = z;
      let tw = w4;

      [tx, tw] = rotate2(tx, tw, time * 0.00072 + hash(id + 1.1) * TAU);
      [ty, tw] = rotate2(ty, tw, time * -0.00061 + hash(id + 2.2) * TAU);
      [tz, tw] = rotate2(tz, tw, time * 0.00053 + hash(id + 3.3) * TAU);

      const projectionDistance = 820;
      const factor = projectionDistance / (projectionDistance - tw * SETTINGS.fourthDimStrength);

      return {
        x: tx * factor,
        y: ty * factor,
        z: tz * factor,
        factor
      };
    }

    function hyperbolicRadius(baseRadius, stackNorm, theta, layer) {
      const curve = SETTINGS.hyperbolicCurve;
      const saddle = Math.sin(theta * 2 + stackNorm * TAU * 3 + layer) * 0.22;
      const bend = 1 + curve * Math.tanh((stackNorm - 0.5) * 2.3) + saddle;
      return baseRadius * bend;
    }

    function makeTriangleGeometry() {
      const shape = new THREE.Shape();
      const r = 1;

      for (let i = 0; i < 3; i++) {
        const a = -Math.PI / 2 + i * TAU / 3;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;

        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }

      shape.closePath();

      return new THREE.ExtrudeGeometry(shape, {
        depth: 0.055,
        bevelEnabled: false
      });
    }

    const triangleGeometry = makeTriangleGeometry();
    const squareGeometry = new THREE.BoxGeometry(1.45, 1.45, 0.055);

    const lineTriangleGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 1, 0),
      new THREE.Vector3(-0.866, -0.5, 0),
      new THREE.Vector3(0.866, -0.5, 0),
      new THREE.Vector3(0, 1, 0)
    ]);

    const lineSquareGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.7, -0.7, 0),
      new THREE.Vector3(0.7, -0.7, 0),
      new THREE.Vector3(0.7, 0.7, 0),
      new THREE.Vector3(-0.7, 0.7, 0),
      new THREE.Vector3(-0.7, -0.7, 0)
    ]);

    function makeMaterials() {
      return RGB.map((entry) => ({
        solid: new THREE.MeshBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.13,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        }),
        line: new THREE.LineBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.48,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        }),
        coreLine: new THREE.LineBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.33,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      }));
    }

    let materials = makeMaterials();

    const objects = [];
    const stackGroups = [];
    const stars = [];

    function clearGroup(group) {
      while (group.children.length) {
        group.remove(group.children[0]);
      }
    }

    function addShape(parent, id, sides, x, y, z, w4, size, angle, layer, isCore = false) {
      const ci = colorIndex(id);
      const mats = materials[ci];
      const group = new THREE.Group();

      const solidGeometry = sides === 3 ? triangleGeometry : squareGeometry;
      const lineGeometry = sides === 3 ? lineTriangleGeometry : lineSquareGeometry;

      const mesh = new THREE.Mesh(solidGeometry, mats.solid);
      const line = new THREE.Line(lineGeometry, isCore ? mats.coreLine : mats.line);

      mesh.scale.setScalar(size);
      line.scale.setScalar(size * 1.1);

      group.add(mesh);
      group.add(line);

      group.position.set(x, y, z);
      group.rotation.set(
        Math.sin(id * 0.013) * 0.42,
        Math.cos(id * 0.017) * 0.42,
        angle
      );

      group.userData = {
        id,
        baseX: x,
        baseY: y,
        baseZ: z,
        baseW: w4,
        baseAngle: angle,
        baseSize: size,
        layer,
        isCore,
        radial: Math.hypot(x, y),
        orbitRate: (isCore ? 0.0010 : 0.00045) + hash(id + 5.5) * (isCore ? 0.0013 : 0.0010),
        spinRate: (hash(id + 8.8) > 0.5 ? 1 : -1) * ((isCore ? 0.007 : 0.004) + hash(id + 9.9) * 0.008),
        breatheRate: (isCore ? 0.014 : 0.009) + hash(id + 11.1) * 0.014,
        breathePhase: hash(id + 12.2) * TAU
      };

      parent.add(group);
      objects.push(group);
    }

    function buildStack(stackIndex) {
      const stack = new THREE.Group();
      stack.userData = {
        stackIndex,
        baseZ: -stackIndex * SETTINGS.stackSpacing
      };

      tunnel.add(stack);
      stackGroups.push(stack);

      const stackNorm = stackIndex / SETTINGS.stacks;
      const stackTwist = stackIndex * GOLDEN_ANGLE;

      for (let layer = 0; layer < SETTINGS.layers; layer++) {
        const layerScale = 1 - layer * 0.06;

        for (let r = 2; r < SETTINGS.ringsPerStack; r++) {
          const rNorm = r / SETTINGS.ringsPerStack;
          const baseRadius = SETTINGS.centerVoid + Math.pow(rNorm, 1.25) * SETTINGS.ringSpread * layerScale;
          const count = Math.max(SETTINGS.symmetry, Math.floor(SETTINGS.symmetry + r * 1.3));
          const cell = TAU / count;

          for (let i = 0; i < count; i++) {
            const id = stackIndex * 10000000 + layer * 100000 + r * 1000 + i;
            const baseTheta = i * cell + stackTwist * 0.15;

            const n = fbm(
              Math.cos(baseTheta * 1.5 + layer) * 1.7 + stackNorm * 6,
              Math.sin(baseTheta * 1.5 - layer) * 1.7 - rNorm * 5,
              3,
              layer * 101 + r * 9 + stackIndex * 13
            );

            const petal = Math.sin(baseTheta * SETTINGS.symmetry + rNorm * 9 + stackIndex * 0.7);
            const gate = n + petal * 0.08 + Math.sin(rNorm * TAU * 4 + stackIndex) * 0.055;

            if (gate < 0.535) continue;

            const spiral = SETTINGS.spiralPull * (1 - rNorm) + layer * 0.17 + stackTwist;
            const theta = baseTheta + spiral;

            const curvedRadius = hyperbolicRadius(baseRadius, stackNorm, theta, layer);
            const rr = curvedRadius + (n - 0.5) * 18;

            let x = Math.cos(theta) * rr;
            let y = Math.sin(theta) * rr;
            let z = stack.userData.baseZ + Math.sin(baseTheta * 2.6 + layer + stackIndex) * 46;
            let w4 = Math.sin(theta * 2 + stackNorm * TAU + layer) * 160 + (rNorm - 0.5) * 220;

            if (Math.hypot(x, y) < SETTINGS.centerVoid) continue;

            const projected = project4Dto3D(x, y, z, w4, 0, id);

            const centerBoost = 1 - rNorm;
            const size = (4.0 + n * 11.8) * (0.72 + centerBoost * 0.76) * SETTINGS.objectScale * projected.factor;
            const sides = (r + i + layer + stackIndex) % 3 === 0 ? 4 : 3;
            const angle = theta + rNorm * TAU * 2.0 + layer * Math.PI / 9 + n * TAU;

            addShape(stack, id, sides, projected.x, projected.y, projected.z - stack.userData.baseZ, w4, size, angle, layer, false);
          }
        }
      }

      buildCoreForStack(stack, stackIndex, stackNorm, stackTwist);
    }

    function buildCoreForStack(stack, stackIndex, stackNorm, stackTwist) {
      for (let ring = 1; ring <= SETTINGS.coreRings; ring++) {
        const q = ring / SETTINGS.coreRings;
        const radius = 18 + Math.pow(q, 1.14) * 104;
        const count = SETTINGS.coreSymmetry + ring * 3;

        for (let i = 0; i < count; i++) {
          const id = 800000000 + stackIndex * 10000000 + ring * 1000 + i;
          const theta = i * TAU / count + ring * GOLDEN_ANGLE + stackTwist * 0.2;
          const n = fbm(Math.cos(theta) * ring * 0.32, Math.sin(theta) * ring * 0.32, 3, 3000 + ring + stackIndex);

          const warpedRadius = hyperbolicRadius(radius + (n - 0.5) * 8, stackNorm, theta, ring);
          const x = Math.cos(theta) * warpedRadius;
          const y = Math.sin(theta) * warpedRadius;
          const z = stack.userData.baseZ - 50 + (q - 0.5) * 120 + Math.sin(theta * 3) * 10;
          const w4 = Math.cos(theta * 2 + stackNorm * TAU) * 130;

          const projected = project4Dto3D(x, y, z, w4, 0, id);

          const sides = (i + ring + stackIndex) % 2 ? 3 : 4;
          const size = (2.6 + n * 6.5) * (1.04 - q * 0.12) * projected.factor;

          addShape(
            stack,
            id,
            sides,
            projected.x,
            projected.y,
            projected.z - stack.userData.baseZ,
            w4,
            size,
            theta * 2 + n * TAU,
            ring,
            true
          );
        }
      }

      for (let ring = 0; ring < 3; ring++) {
        const ci = (ring + stackIndex) % 3;
        const radius = 34 + ring * 32;
        const points = [];

        for (let i = 0; i <= 120; i++) {
          const t = i / 120;
          const theta = t * TAU;
          const w4 = Math.sin(theta * 2 + stackNorm * TAU) * 95;
          const p = project4Dto3D(
            Math.cos(theta) * radius,
            Math.sin(theta) * radius,
            stack.userData.baseZ - 72 - ring * 20,
            w4,
            0,
            900000000 + stackIndex * 10000 + ring * 100 + i
          );
          points.push(new THREE.Vector3(p.x, p.y, p.z - stack.userData.baseZ));
        }

        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.LineLoop(geometry, materials[ci].coreLine);
        line.userData = {
          ring,
          stackIndex,
          spinRate: (ring % 2 ? -1 : 1) * (0.0014 + ring * 0.0004)
        };
        stack.add(line);
      }
    }

    function buildStarfield() {
      for (let i = 0; i < SETTINGS.stars; i++) {
        const id = 15000000 + i;
        const ci = colorIndex(id);
        const c = RGB[ci].color;
        const geometry = new THREE.BufferGeometry();

        const theta = hash(i * 2.1) * TAU;
        const rad = 180 + Math.pow(hash(i * 3.7), 0.55) * 1100;
        const z = -SETTINGS.tunnelLength + hash(i * 4.4) * SETTINGS.tunnelLength;
        const w4 = (hash(i * 9.5) - 0.5) * 300;
        const p = project4Dto3D(Math.cos(theta) * rad, Math.sin(theta) * rad, z, w4, 0, id);

        geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute([p.x, p.y, p.z], 3)
        );

        const material = new THREE.PointsMaterial({
          color: c,
          size: 1.1 + hash(i * 5.5) * 2.1,
          transparent: true,
          opacity: 0.27,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const point = new THREE.Points(geometry, material);
        point.userData = {
          id,
          baseTheta: theta,
          baseRad: rad,
          baseZ: z,
          baseW: w4,
          orbitRate: 0.00015 + hash(i * 6.6) * 0.0005
        };

        starfield.add(point);
        stars.push(point);
      }
    }

    function buildWorld() {
      objects.length = 0;
      stackGroups.length = 0;
      stars.length = 0;
      clearGroup(tunnel);
      clearGroup(starfield);

      for (let i = 0; i < SETTINGS.stacks; i++) {
        buildStack(i);
      }

      buildStarfield();
    }

    function wrapZ(z) {
      const len = SETTINGS.tunnelLength;
      while (z > SETTINGS.stackSpacing * 2) z -= len;
      while (z < -len + SETTINGS.stackSpacing * 2) z += len;
      return z;
    }

    function updateObject(obj) {
      const u = obj.userData;
      const time = frame;
      const orbit = time * u.orbitRate;
      const radial = Math.hypot(u.baseX, u.baseY);
      const baseTheta = Math.atan2(u.baseY, u.baseX);

      const radialLimit = u.isCore ? 190 : 520;
      const spiralDrag = (1 - Math.min(1, radial / radialLimit)) * time * (u.isCore ? 0.0032 : 0.0020);
      const theta = baseTheta + orbit + spiralDrag;

      const localX = Math.cos(theta) * radial;
      const localY = Math.sin(theta) * radial;
      const localZ = u.baseZ + Math.sin(time * (u.isCore ? 0.010 : 0.007) + u.id * 0.01) * (u.isCore ? 8 : 14);
      const localW = u.baseW + Math.sin(time * 0.006 + u.id * 0.003) * 38;

      const projected = project4Dto3D(localX, localY, localZ, localW, time, u.id);

      const parentBaseZ = obj.parent && obj.parent.userData ? obj.parent.userData.baseZ : 0;

      obj.position.x = projected.x;
      obj.position.y = projected.y;
      obj.position.z = projected.z - parentBaseZ;

      const breathe = 1 + Math.sin(time * u.breatheRate + u.breathePhase) * (u.isCore ? 0.07 : 0.05);
      obj.scale.setScalar(breathe * THREE.MathUtils.clamp(projected.factor, 0.58, 1.72));

      obj.rotation.z = u.baseAngle + time * u.spinRate + theta * 0.12;
      obj.rotation.x = Math.sin(time * 0.0032 + u.id * 0.02) * (u.isCore ? 0.28 : 0.40);
      obj.rotation.y = Math.cos(time * 0.0026 + u.id * 0.015) * (u.isCore ? 0.28 : 0.40);
    }

    function updateWorld() {
      const fly = frame * SETTINGS.flySpeed;
      const globalSpin = frame * SETTINGS.spinSpeed;

      world.rotation.z = globalSpin * 0.35;
      world.rotation.x = Math.sin(frame * 0.0011) * 0.040;
      world.rotation.y = Math.cos(frame * 0.0013) * 0.045;

      tunnel.rotation.z = globalSpin * 0.76;
      tunnel.rotation.y = Math.sin(frame * 0.0017) * 0.075;

      for (const stack of stackGroups) {
        const originalZ = stack.userData.baseZ;
        stack.position.z = wrapZ(originalZ + fly);
        stack.rotation.z = globalSpin * (0.45 + stack.userData.stackIndex * 0.015);
      }

      for (const obj of objects) {
        updateObject(obj);
      }

      for (const childStack of stackGroups) {
        for (const child of childStack.children) {
          if (child.userData && typeof child.userData.spinRate === "number") {
            child.rotation.z = frame * child.userData.spinRate;
          }
        }
      }

      for (const star of stars) {
        const u = star.userData;
        const theta = u.baseTheta + frame * u.orbitRate;
        const z = wrapZ(u.baseZ + fly * 0.65);
        const w4 = u.baseW + Math.sin(frame * 0.003 + u.id) * 50;
        const p = project4Dto3D(
          Math.cos(theta) * u.baseRad,
          Math.sin(theta) * u.baseRad,
          z,
          w4,
          frame,
          u.id
        );

        star.position.x = p.x;
        star.position.y = p.y;
        star.position.z = p.z;
      }

      camera.position.x = Math.sin(frame * 0.00125) * 38;
      camera.position.y = Math.cos(frame * 0.0011) * 30;
      camera.position.z = 560 + Math.sin(frame * 0.0014) * 26;

      const lookX = Math.sin(frame * 0.0017) * 38;
      const lookY = Math.cos(frame * 0.0015) * 28;
      camera.lookAt(lookX, lookY, -360);
    }

    function animate() {
      if (!paused) {
        frame++;
        updateWorld();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function reseed() {
      seed = Math.floor(Math.random() * 999999999);
      frame = 0;
      buildWorld();
      updateWorld();
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, SETTINGS.dprMax));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener("click", () => {
      paused = !paused;
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === " ") {
        event.preventDefault();
        paused = !paused;
      }

      if (key === "r") {
        reseed();
      }
    });

    buildWorld();
    updateWorld();
    animate();
  </script>
</body>
</html>
