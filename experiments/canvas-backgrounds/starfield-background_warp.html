<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/images/pngs/dead-favicon.png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>/experiments/canvas-backgrounds/starfield-background_warp.html</title>
<style>
  /*
    background.html
    Single-file extraction of the shooter-game Level 1 starfield background.

    This intentionally keeps the canvas sizing/rendering style close to the
    source game instead of doing fancy high-DPI scaling. The old game used
    canvas.width = window.innerWidth and canvas.height = window.innerHeight,
    because apparently crisp modern rendering was too emotionally stable.
  */

  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #004e2f;
    overflow: hidden;
    color: #0f0;
    font-family: monospace;
  }

  body {
    touch-action: none;
  }

  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
/*
  Extracted background-only starfield.

  Kept from shooter-game:
  - black canvas background
  - three parallax star layers
  - exact layer counts, vertical speeds, parallax multipliers, size ranges
  - exact alpha values per layer
  - exact resize behavior: canvas.width/height = window.innerWidth/Height
  - exact menu/start-screen idle sway formula

  Added:
  - mouse-driven horizontal starfield parallax
  - top-to-bottom forced perspective depth
  - faint original starfield layer under the reactive stars

  Removed:
  - player
  - enemies
  - bullets
  - bombs
  - menus
  - HUD
  - pause
  - audio
  - controller logic
  - keyboard gameplay logic
  - post-FX
*/

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const aberrationSourceCanvas = document.createElement("canvas");
const aberrationSourceCtx = aberrationSourceCanvas.getContext("2d");
const aberrationTintCanvas = document.createElement("canvas");
const aberrationTintCtx = aberrationTintCanvas.getContext("2d");
const scanlineCanvas = document.createElement("canvas");
const scanlineCtx = scanlineCanvas.getContext("2d");
const vignetteMaskCanvas = document.createElement("canvas");
const vignetteMaskCtx = vignetteMaskCanvas.getContext("2d");
const vignetteTintCanvas = document.createElement("canvas");
const vignetteTintCtx = vignetteTintCanvas.getContext("2d");

document.body.style.touchAction = "none";
canvas.style.touchAction = "none";

// Mirrors the old runtime helper used by the starfield setup.
function rand(min, max){
  return min + Math.random() * (max - min);
}

/* =======================
   Parallax Starfield
======================= */
const starLayers = [
  { count: 153, baseSpeedY: 40,  parallaxX: 0.35, sizeMin: 1, sizeMax: 2 },
  { count: 102, baseSpeedY: 80,  parallaxX: 0.60, sizeMin: 1, sizeMax: 3 },
  { count: 60,  baseSpeedY: 140, parallaxX: 0.90, sizeMin: 2, sizeMax: 4 }
];
const starColors = [
  { rgb: [255, 70, 70], css: "rgb(255,70,70)" },
  { rgb: [70, 255, 120], css: "rgb(70,255,120)" },
  { rgb: [80, 150, 255], css: "rgb(80,150,255)" }
];
const backgroundHueBase = 156;
const backgroundHueSpeed = 18;

let stars = [];
let backingStars = [];
let playerVxSmoothed = 0;
let starfieldReady = false;
let time = 0;
let last = performance.now();
let scanlinePattern = null;
let cursorPressScale = 1;
const bentPoint = { x: 0, y: 0 };
let sceneTwist = 0;
let sceneTwistDirection = 1;
let sceneTwistTime = 0;
let sceneTwistSpin = 0;
let sceneTwistMode = true;
let sceneTwistPhase = 0;
let sceneTwistPhaseTime = 0;
let nextSceneTwistDirection = 1;

const pointer = {
  x: 0,
  y: 0,
  lastX: 0,
  lastY: 0,
  erasing: false,
  dvdMode: true,
  dvdVx: 390,
  dvdVy: 285,
  active: false
};
const blackHoleTrail = [
  { x: 0, y: 0, r: 30, alpha: 1 },
  { x: 0, y: 0, r: 25, alpha: 0.8 },
  { x: 0, y: 0, r: 20, alpha: 0.6 },
  { x: 0, y: 0, r: 15, alpha: 0.4 },
  { x: 0, y: 0, r: 10, alpha: 0.2 },
  { x: 0, y: 0, r: 8, alpha: 0.16 },
  { x: 0, y: 0, r: 6, alpha: 0.12 },
  { x: 0, y: 0, r: 4, alpha: 0.1 },
  { x: 0, y: 0, r: 3, alpha: 0.08 }
];
let blackHoleTrailReady = false;

// In the original game this value was passed into updateStarfield().
// This preserves the same visual scale for the menu/start-screen idle sway.
const playerSpeed = 7;

// Use the start-menu / non-playing idle sway, because this file has no
// gameplay input. To mimic gameplay with no left/right movement, set this to 0.
const MENU_IDLE_SWAY_STRENGTH = 0.15;

function randomStarColor(){
  return starColors[Math.floor(Math.random() * starColors.length)];
}

function resetStar(st, layer, y){
  const vanishingSpread = canvas.width * rand(0.18, 0.52);
  st.x = canvas.width / 2 + rand(-vanishingSpread, vanishingSpread);
  st.y = y;
  st.s = rand(layer.sizeMin, layer.sizeMax);
  st.vyMul = rand(0.7, 1.3);
  st.color = randomStarColor();
  st.colorCss = st.color.css;
  st.isPlus = Math.random() < 0.5;
  st.vacuum = 0;
}

function createOriginalStar(layer){
  const color = randomStarColor();
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: rand(layer.sizeMin, layer.sizeMax),
    vyMul: rand(0.7, 1.3),
    color,
    colorCss: color.css,
    isPlus: Math.random() < 0.5,
    angle: rand(0, Math.PI * 2),
    spinDir: Math.random() < 0.5 ? -1 : 1,
    spinMul: rand(0.65, 1.35),
    vacuum: 0
  };
}

function recycleBackingStar(st, layer){
  st.x = Math.random() * canvas.width;
  st.y = rand(-24, -4);
  st.s = rand(layer.sizeMin, layer.sizeMax);
  st.vyMul = rand(0.7, 1.3);
  st.angle = rand(0, Math.PI * 2);
  st.spinDir = Math.random() < 0.5 ? -1 : 1;
  st.spinMul = rand(0.65, 1.35);
  st.vacuum = 0;
}

function resetStarfield(){
  stars = starLayers.map(layer => {
    const arr = [];
    for (let i = 0; i < layer.count; i++){
      const st = {};
      resetStar(st, layer, Math.random() * canvas.height);
      arr.push(st);
    }
    return arr;
  });

  backingStars = starLayers.map(layer => {
    const arr = [];
    for (let i = 0; i < layer.count; i++){
      arr.push(createOriginalStar(layer));
    }
    return arr;
  });

  starfieldReady = true;
}

function queueVacuumStars(){
  if (!starfieldReady) return;

  const radius = 90;
  const radiusSq = radius * radius;

  for (let li = 0; li < starLayers.length; li++){
    for (const st of backingStars[li]){
      const size = st.s * 2;
      const cx = st.x + size * 0.5;
      const cy = st.y + size * 0.5;
      const dx = cx - pointer.x;
      const dy = cy - pointer.y;

      if (dx * dx + dy * dy <= radiusSq){
        st.vacuum = 1;
      }
    }

    for (const st of stars[li]){
      const depth = Math.max(0, Math.min(1, st.y / canvas.height));
      const apparentSize = st.s * (0.45 + depth * depth * 2.9);
      const cx = st.x + apparentSize * 0.5;
      const cy = st.y + apparentSize * 0.5;
      const dx = cx - pointer.x;
      const dy = cy - pointer.y;

      if (dx * dx + dy * dy <= radiusSq){
        st.vacuum = 1;
      }
    }
  }
}

function updateVacuumedStar(st, dt, recycle){
  if (!st.vacuum) return false;

  const dx = pointer.x - st.x;
  const dy = pointer.y - st.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const pull = Math.min(1, dt * 8.5);

  st.x += dx * pull;
  st.y += dy * pull;
  st.vacuum += dt * 3.5;

  if (dist < 4 || st.vacuum >= 1.85){
    recycle();
    return true;
  }

  return true;
}

function updateStarfield(dt){
  if (!starfieldReady) return;

  // Original non-playing/start-menu branch:
  // vxIntent = 0.15 * Math.sin(time * 0.6)
  const vxIntent = pointer.active
    ? Math.max(-1, Math.min(1, (pointer.x / canvas.width - 0.5) * 2))
    : MENU_IDLE_SWAY_STRENGTH * Math.sin(time * 0.6);

  const targetVx = vxIntent * playerSpeed * 55;
  playerVxSmoothed += (targetVx - playerVxSmoothed) * Math.min(1, dt * 8);

  for (let li = 0; li < starLayers.length; li++){
    const layer = starLayers[li];
    const arr = backingStars[li];
    const driftX = -playerVxSmoothed * layer.parallaxX * 0.12;
    const driftY = layer.baseSpeedY * 0.55;

    for (const st of arr){
      if (updateVacuumedStar(st, dt, () => recycleBackingStar(st, layer))){
        continue;
      }

      st.x += driftX * dt;
      st.y += driftY * st.vyMul * dt;
      st.angle += playerVxSmoothed * 0.015 * st.spinDir * st.spinMul * dt;

      if (st.y > canvas.height + 10) st.y = -10;
      if (st.x < -10) st.x = canvas.width + 10;
      if (st.x > canvas.width + 10) st.x = -10;
    }
  }

  for (let li = 0; li < starLayers.length; li++){
    const layer = starLayers[li];
    const arr = stars[li];

    const driftX = -playerVxSmoothed * layer.parallaxX;
    const driftY = layer.baseSpeedY;

    for (const st of arr){
      if (updateVacuumedStar(st, dt, () => resetStar(st, layer, rand(-24, -4)))){
        continue;
      }

      const depth = Math.max(0, Math.min(1, st.y / canvas.height));
      const perspective = 0.45 + depth * depth * 3.8;
      const outwardX = (st.x - canvas.width / 2) * depth * depth * (0.55 + li * 0.16);

      st.x += (driftX + outwardX) * dt;
      st.y += driftY * st.vyMul * perspective * dt;

      if (
        st.y > canvas.height + 24 ||
        st.x < -24 ||
        st.x > canvas.width + 24
      ){
        resetStar(st, layer, rand(-24, -4));
      }
    }
  }
}

function drawPlusStar(targetCtx, cx, cy, size){
  const arm = Math.max(1, size * 0.35);
  targetCtx.fillRect(cx - arm * 0.5, cy - size * 0.5, arm, size);
  targetCtx.fillRect(cx - size * 0.5, cy - arm * 0.5, size, arm);
}

function drawAsteriskStar(targetCtx, cx, cy, size){
  const radius = size * 0.72;
  targetCtx.lineWidth = Math.max(1, size * 0.22);
  targetCtx.lineCap = "square";
  targetCtx.beginPath();
  for (let i = 0; i < 3; i++){
    const angle = i * Math.PI / 3;
    const dx = Math.cos(angle) * radius;
    const dy = Math.sin(angle) * radius;
    targetCtx.moveTo(cx - dx, cy - dy);
    targetCtx.lineTo(cx + dx, cy + dy);
  }
  targetCtx.stroke();
}

function getBlackHoleBentPosition(x, y, strength, out){
  if (!pointer.active){
    out.x = x;
    out.y = y;
    return out;
  }

  const dx = x - pointer.x;
  const dy = y - pointer.y;
  const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
  const radius = 199;

  if (dist > radius){
    out.x = x;
    out.y = y;
    return out;
  }

  const influence = Math.pow(1 - dist / radius, 2);
  const pull = Math.min(38, 16 / dist) * influence * strength;
  const swirl = 98 * influence * strength;
  const nx = dx / dist;
  const ny = dy / dist;
  const tangentX = -ny;
  const tangentY = nx;

  out.x = x + tangentX * swirl - nx * pull;
  out.y = y + tangentY * swirl - ny * pull;
  return out;
}

function drawBlackHoleCursor(targetCtx){
  if (!pointer.active) return;

  targetCtx.save();
  targetCtx.globalCompositeOperation = "lighter";
  for (let i = blackHoleTrail.length - 1; i >= 0; i--){
    const circle = blackHoleTrail[i];
    const radius = circle.r * cursorPressScale;
    const glowHue = (time * 42 + i * 8) % 360;
    const glowAlpha = circle.alpha * 0.18;

    targetCtx.fillStyle = `hsla(${glowHue},100%,55%,${glowAlpha})`;
    targetCtx.shadowColor = `hsla(${glowHue},100%,55%,${glowAlpha})`;
    targetCtx.shadowBlur = 34 + radius * 0.7;
    targetCtx.beginPath();
    targetCtx.arc(circle.x, circle.y, radius + 10, 0, Math.PI * 2);
    targetCtx.fill();
  }

  targetCtx.globalCompositeOperation = "source-over";
  targetCtx.lineWidth = 3;

  for (let i = blackHoleTrail.length - 1; i >= 0; i--){
    const circle = blackHoleTrail[i];
    const radius = circle.r * cursorPressScale;
    const outlineHue = (time * 42 + i * 8) % 360;
    targetCtx.fillStyle = `rgba(0,0,0,${circle.alpha})`;
    targetCtx.strokeStyle = `hsla(${outlineHue},100%,50%,${circle.alpha})`;
    targetCtx.beginPath();
    targetCtx.arc(circle.x, circle.y, radius, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.stroke();
  }

  targetCtx.restore();
}

function resetBlackHoleTrail(){
  for (const circle of blackHoleTrail){
    circle.x = pointer.x;
    circle.y = pointer.y;
  }
  blackHoleTrailReady = true;
}

function updateDVDCursor(dt){
  if (!pointer.dvdMode) return;

  const radius = blackHoleTrail[0].r * cursorPressScale;
  pointer.lastX = pointer.x;
  pointer.lastY = pointer.y;
  pointer.x += pointer.dvdVx * dt;
  pointer.y += pointer.dvdVy * dt;

  if (pointer.x < radius){
    pointer.x = radius;
    pointer.dvdVx = Math.abs(pointer.dvdVx);
  } else if (pointer.x > canvas.width - radius){
    pointer.x = canvas.width - radius;
    pointer.dvdVx = -Math.abs(pointer.dvdVx);
  }

  if (pointer.y < radius){
    pointer.y = radius;
    pointer.dvdVy = Math.abs(pointer.dvdVy);
  } else if (pointer.y > canvas.height - radius){
    pointer.y = canvas.height - radius;
    pointer.dvdVy = -Math.abs(pointer.dvdVy);
  }

  pointer.active = true;
}

function updateBlackHoleTrail(dt){
  const targetScale = pointer.erasing ? 1.24 : 1;
  cursorPressScale += (targetScale - cursorPressScale) * Math.min(1, dt * 10);

  if (!pointer.active){
    blackHoleTrailReady = false;
    return;
  }

  if (!blackHoleTrailReady) resetBlackHoleTrail();

  blackHoleTrail[0].x = pointer.x;
  blackHoleTrail[0].y = pointer.y;

  for (let i = 1; i < blackHoleTrail.length; i++){
    const leader = blackHoleTrail[i - 1];
    const circle = blackHoleTrail[i];
    const follow = Math.min(1, dt * (10 - i * 0.65));

    circle.x += (leader.x - circle.x) * follow;
    circle.y += (leader.y - circle.y) * follow;

    const dx = circle.x - leader.x;
    const dy = circle.y - leader.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxSeparate = leader.r + circle.r;

    if (dist > maxSeparate){
      circle.x = leader.x + dx / dist * maxSeparate;
      circle.y = leader.y + dy / dist * maxSeparate;
    }
  }
}

function drawCRTOverlay(){
  ctx.save();
  ctx.globalCompositeOperation = "multiply";
  ctx.fillStyle = scanlinePattern || "rgba(0,0,0,0.10)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  const vignetteHue = (263 + time * 18) % 360;

  vignetteTintCtx.clearRect(0, 0, canvas.width, canvas.height);
  vignetteTintCtx.globalCompositeOperation = "source-over";
  vignetteTintCtx.drawImage(vignetteMaskCanvas, 0, 0);
  vignetteTintCtx.globalCompositeOperation = "source-in";
  vignetteTintCtx.fillStyle = `hsl(${vignetteHue},100%,20%)`;
  vignetteTintCtx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(vignetteTintCanvas, 0, 0);
}

function rebuildVignetteMask(){
  vignetteMaskCanvas.width = canvas.width;
  vignetteMaskCanvas.height = canvas.height;
  vignetteMaskCtx.clearRect(0, 0, canvas.width, canvas.height);

  const inset = Math.max(78, Math.min(canvas.width, canvas.height) * 0.155);
  const radius = Math.max(120, Math.min(canvas.width, canvas.height) * 0.31);
  const glow = Math.max(canvas.width, canvas.height) * 0.36;

  vignetteMaskCtx.save();
  vignetteMaskCtx.shadowColor = "rgba(0,0,0,0.70)";
  vignetteMaskCtx.shadowBlur = glow;
  const blurSteps = [
    { expand: 0, alpha: 0.06 },
    { expand: 10, alpha: 0.045 },
    { expand: 22, alpha: 0.032 },
    { expand: 38, alpha: 0.022 },
    { expand: 58, alpha: 0.014 }
  ];

  for (const step of blurSteps){
    const x = Math.max(0, inset - step.expand);
    const y = Math.max(0, inset - step.expand);
    const w = Math.max(1, canvas.width - x * 2);
    const h = Math.max(1, canvas.height - y * 2);

    vignetteMaskCtx.beginPath();
    vignetteMaskCtx.rect(0, 0, canvas.width, canvas.height);
    vignetteMaskCtx.roundRect(x, y, w, h, radius + step.expand);
    vignetteMaskCtx.fillStyle = `rgba(0,0,0,${step.alpha})`;
    vignetteMaskCtx.fill("evenodd");
  }
  vignetteMaskCtx.restore();
}

function resizeEffectCanvases(){
  aberrationSourceCanvas.width = canvas.width;
  aberrationSourceCanvas.height = canvas.height;
  aberrationTintCanvas.width = canvas.width;
  aberrationTintCanvas.height = canvas.height;
  vignetteMaskCanvas.width = canvas.width;
  vignetteMaskCanvas.height = canvas.height;
  vignetteTintCanvas.width = canvas.width;
  vignetteTintCanvas.height = canvas.height;
  ctx.imageSmoothingEnabled = false;
  aberrationSourceCtx.imageSmoothingEnabled = false;
  aberrationTintCtx.imageSmoothingEnabled = false;
  vignetteMaskCtx.imageSmoothingEnabled = false;
  vignetteTintCtx.imageSmoothingEnabled = false;
}

function rebuildScanlinePattern(){
  scanlineCanvas.width = 1;
  scanlineCanvas.height = 4;
  scanlineCtx.clearRect(0, 0, 1, 4);
  scanlineCtx.fillStyle = "rgba(0,0,0,0.10)";
  scanlineCtx.fillRect(0, 0, 1, 1);
  scanlinePattern = ctx.createPattern(scanlineCanvas, "repeat");
}

function drawTintedAberration(color, offsetX, alpha){
  aberrationTintCtx.clearRect(0, 0, canvas.width, canvas.height);
  aberrationTintCtx.globalCompositeOperation = "source-over";
  aberrationTintCtx.globalAlpha = 1;
  aberrationTintCtx.drawImage(aberrationSourceCanvas, offsetX, 0);
  aberrationTintCtx.globalCompositeOperation = "source-atop";
  aberrationTintCtx.fillStyle = color;
  aberrationTintCtx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = "screen";
  ctx.drawImage(aberrationTintCanvas, 0, 0);
}

function applyChromaticAberration(){
  const mouseIntent = pointer.active
    ? Math.max(-1, Math.min(1, (pointer.x / canvas.width - 0.5) * 2))
    : Math.sin(time * 0.45) * 0.18;
  const shift = mouseIntent * 7;
  const smear = Math.sign(shift || 1) * 3.5;

  ctx.save();
  drawTintedAberration("rgb(255,0,0)", shift + smear, 0.13);
  drawTintedAberration("rgb(0,255,0)", -shift * 0.28, 0.08);
  drawTintedAberration("rgb(0,80,255)", -shift - smear, 0.13);
  ctx.restore();
}

function drawStarForeground(targetCtx){
  if (!starfieldReady) return;

  for (let li = 0; li < starLayers.length; li++){
    const arr = backingStars[li];

    for (const st of arr){
      const size = st.s * 2;
      const vacuumScale = st.vacuum ? Math.max(0.05, 1 - (st.vacuum - 1) / 0.85) : 1;
      const drawSize = size * vacuumScale;
      const cx = st.x + size * 0.5;
      const cy = st.y + size * 0.5;
      const bent = getBlackHoleBentPosition(cx, cy, 0.72, bentPoint);
      targetCtx.fillStyle = st.colorCss;
      targetCtx.save();
      targetCtx.globalAlpha = vacuumScale;
      targetCtx.translate(bent.x, bent.y);
      targetCtx.rotate(st.angle);
      if (st.isPlus){
        drawPlusStar(targetCtx, 0, 0, drawSize * 1.5);
      } else {
        targetCtx.strokeStyle = targetCtx.fillStyle;
        drawAsteriskStar(targetCtx, 0, 0, drawSize);
      }
      targetCtx.restore();
    }
  }

  for (let li = 0; li < starLayers.length; li++){
    const arr = stars[li];

    for (const st of arr){
      const depth = Math.max(0, Math.min(1, st.y / canvas.height));
      const apparentSize = st.s * (0.45 + depth * depth * 2.9);
      const vacuumScale = st.vacuum ? Math.max(0.05, 1 - (st.vacuum - 1) / 0.85) : 1;
      const drawSize = apparentSize * vacuumScale;
      const bent = getBlackHoleBentPosition(
        st.x + apparentSize * 0.5,
        st.y + apparentSize * 0.5,
        0.95 + depth * 0.45,
        bentPoint
      );
      targetCtx.fillStyle = st.colorCss;
      targetCtx.save();
      targetCtx.globalAlpha = vacuumScale;
      if (st.isPlus){
        const arm = Math.max(1, drawSize * 0.35);
        const mid = drawSize * 0.5 - arm * 0.5;
        targetCtx.fillRect(bent.x - drawSize * 0.5 + mid, bent.y - drawSize * 0.5, arm, drawSize);
        targetCtx.fillRect(bent.x - drawSize * 0.5, bent.y - drawSize * 0.5 + mid, drawSize, arm);
      } else {
        targetCtx.fillRect(bent.x - drawSize * 0.5, bent.y - drawSize * 0.5, drawSize, drawSize);
      }
      targetCtx.restore();
    }
  }

}

function drawStarfield(){
  const hue = (backgroundHueBase + time * backgroundHueSpeed) % 360;
  ctx.fillStyle = `hsl(${hue}, 100%, 15%)`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  aberrationSourceCtx.clearRect(0, 0, canvas.width, canvas.height);
  drawStarForeground(aberrationSourceCtx);
  ctx.drawImage(aberrationSourceCanvas, 0, 0);
  applyChromaticAberration();
  drawCRTOverlay();
  drawBlackHoleCursor(ctx);
}

function triggerSceneTwist(){
  sceneTwistMode = !sceneTwistMode;
  if (!sceneTwistMode){
    sceneTwistTime = 0;
    pointer.dvdMode = false;
    pointer.erasing = false;
    pointer.active = false;
    blackHoleTrailReady = false;
    return;
  }

  pointer.dvdMode = true;
  pointer.erasing = false;
  pointer.active = true;
  if (!pointer.x || !pointer.y){
    pointer.x = canvas.width * 0.5;
    pointer.y = canvas.height * 0.5;
  }
  pointer.dvdVx = Math.abs(pointer.dvdVx || 390) * (Math.random() < 0.5 ? -1 : 1);
  pointer.dvdVy = Math.abs(pointer.dvdVy || 285) * (Math.random() < 0.5 ? -1 : 1);
  blackHoleTrailReady = false;

  sceneTwistDirection = nextSceneTwistDirection;
  nextSceneTwistDirection *= -1;
  sceneTwistPhase = 0;
  sceneTwistPhaseTime = 0;
  sceneTwistSpin = 0;
  sceneTwist = 1.35;
}

function updateSceneTwist(dt){
  if (sceneTwistMode){
    sceneTwistPhaseTime += dt;
    sceneTwist += (1.35 - sceneTwist) * Math.min(1, dt * 7);

    if (sceneTwistPhase === 0 || sceneTwistPhase === 2){
      sceneTwistSpin += sceneTwistDirection * dt * 5.2;
    } else {
      sceneTwistSpin += -sceneTwistDirection * dt * 5.2;
    }

    if (sceneTwistPhaseTime >= 5){
      sceneTwistPhaseTime = 0;
      sceneTwistPhase = (sceneTwistPhase + 1) % 4;
      if (sceneTwistPhase === 2){
        sceneTwistDirection *= -1;
      }
    }
  } else {
    sceneTwist += (0 - sceneTwist) * Math.min(1, dt * 3.2);
    sceneTwistSpin += (0 - sceneTwistSpin) * Math.min(1, dt * 2.2);
  }
}

function applySceneTwistWarp(){
  if (sceneTwist < 0.001) return;

  aberrationSourceCtx.clearRect(0, 0, canvas.width, canvas.height);
  aberrationSourceCtx.drawImage(canvas, 0, 0);

  const cx = canvas.width * 0.5;
  const cy = canvas.height * 0.5;
  const maxRadius = Math.sqrt(cx * cx + cy * cy);
  const rings = 72;
  const baseScale = 1 + sceneTwist * 0.18;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = rings; i > 0; i--){
    const outer = maxRadius * i / rings;
    const inner = maxRadius * (i - 1) / rings;
    const mid = (outer + inner) * 0.5;
    const depth = Math.max(0, 1 - mid / maxRadius);
    const twist = sceneTwistDirection * sceneTwist * (depth * depth * 5.4 + depth * 0.65) + sceneTwistSpin * (0.25 + depth * depth);
    const drainScale = baseScale + sceneTwist * depth * depth * 0.34;
    const wobbleX = Math.cos(time * 8 + depth * 18) * sceneTwist * depth * 10;
    const wobbleY = Math.sin(time * 7 + depth * 16) * sceneTwist * depth * 10;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, outer + 3, 0, Math.PI * 2);
    ctx.arc(cx, cy, Math.max(0, inner - 3), 0, Math.PI * 2, true);
    ctx.clip("evenodd");
    ctx.translate(cx + wobbleX, cy + wobbleY);
    ctx.rotate(twist);
    ctx.scale(drainScale, drainScale);
    ctx.drawImage(aberrationSourceCanvas, -cx, -cy);
    ctx.restore();
  }

  const coreRadius = Math.min(canvas.width, canvas.height) * (0.035 + sceneTwist * 0.045);
  const drain = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius * 3.2);
  drain.addColorStop(0, "rgba(0,0,0,0.88)");
  drain.addColorStop(0.35, "rgba(0,0,0,0.46)");
  drain.addColorStop(1, "rgba(0,0,0,0)");

  ctx.save();
  ctx.globalCompositeOperation = "multiply";
  ctx.fillStyle = drain;
  ctx.beginPath();
  ctx.arc(cx, cy, coreRadius * 3.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* =======================
   Mouse Starfield Control
======================= */
function setPointerPosition(event){
  if (pointer.dvdMode) return;

  const rect = canvas.getBoundingClientRect();
  const nextX = event.clientX - rect.left;
  const nextY = event.clientY - rect.top;

  pointer.lastX = pointer.x;
  pointer.lastY = pointer.y;
  pointer.x = nextX;
  pointer.y = nextY;
  pointer.active = true;

  if (pointer.erasing){
    queueVacuumStars();
  }
}

function startErasing(event){
  if (event.button !== 0) return;
  if (pointer.dvdMode) return;

  const rect = canvas.getBoundingClientRect();
  pointer.x = event.clientX - rect.left;
  pointer.y = event.clientY - rect.top;
  pointer.lastX = pointer.x;
  pointer.lastY = pointer.y;
  pointer.erasing = true;
  pointer.active = true;
  queueVacuumStars();
  canvas.setPointerCapture(event.pointerId);
}

function stopErasing(event){
  pointer.erasing = false;
  if (canvas.hasPointerCapture(event.pointerId)){
    canvas.releasePointerCapture(event.pointerId);
  }
}

function toggleDVDCursorMode(){
  pointer.dvdMode = !pointer.dvdMode;
  pointer.erasing = false;
  pointer.active = true;

  if (pointer.dvdMode){
    if (!pointer.x || !pointer.y){
      pointer.x = canvas.width * 0.5;
      pointer.y = canvas.height * 0.5;
    }

    pointer.dvdVx = Math.abs(pointer.dvdVx || 390) * (Math.random() < 0.5 ? -1 : 1);
    pointer.dvdVy = Math.abs(pointer.dvdVy || 285) * (Math.random() < 0.5 ? -1 : 1);
    blackHoleTrailReady = false;
  }
}

canvas.addEventListener("pointerdown", startErasing);
canvas.addEventListener("pointermove", setPointerPosition);
canvas.addEventListener("pointerenter", setPointerPosition);
canvas.addEventListener("pointerup", stopErasing);
canvas.addEventListener("pointercancel", stopErasing);
canvas.addEventListener("pointerleave", () => {
  if (pointer.dvdMode) return;

  pointer.active = false;
  pointer.erasing = false;
});

function canvasToBlob(sourceCanvas){
  return new Promise(resolve => {
    sourceCanvas.toBlob(resolve, "image/png");
  });
}

async function copyScreenshotToClipboard(){
  if (!navigator.clipboard || typeof ClipboardItem === "undefined") return;

  const blob = await canvasToBlob(canvas);
  if (!blob) return;

  await navigator.clipboard.write([
    new ClipboardItem({ [blob.type]: blob })
  ]);
}

window.addEventListener("keydown", event => {
  const target = event.target;
  const isTyping = target && (
    target.tagName === "INPUT" ||
    target.tagName === "TEXTAREA" ||
    target.isContentEditable
  );

  if (!isTyping && event.shiftKey && event.key.toLowerCase() === "s"){
    event.preventDefault();
    copyScreenshotToClipboard().catch(() => {});
    return;
  }

  if (!isTyping && event.shiftKey && event.key.toLowerCase() === "m"){
    event.preventDefault();
    toggleDVDCursorMode();
    return;
  }

  if (!isTyping && !event.repeat && event.key.toLowerCase() === "y"){
    event.preventDefault();
    triggerSceneTwist();
    return;
  }

  if (isTyping || event.repeat || event.key.toLowerCase() !== "f") return;

  event.preventDefault();
  if (document.fullscreenElement){
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
});

/* =======================
   Resize
======================= */
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  resizeEffectCanvases();
  rebuildScanlinePattern();
  rebuildVignetteMask();
  resetStarfield();

  if (pointer.dvdMode){
    pointer.x = canvas.width * 0.5;
    pointer.y = canvas.height * 0.5;
    pointer.active = true;
    blackHoleTrailReady = false;
  }
}
window.addEventListener("resize", resize);

function frame(now){
  const dt = Math.min(0.05, Math.max(0, (now - last) / 1000));
  last = now;
  time += dt;

  updateStarfield(dt);
  updateDVDCursor(dt);
  updateBlackHoleTrail(dt);
  updateSceneTwist(dt);
  drawStarfield();
  applySceneTwistWarp();

  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
