<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/media/images/pngs/dead-favicon.png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>/experiments/canvas-backgrounds/starfield-background_reactive.html</title>
<style>
  /*
    background.html
    Single-file extraction of the shooter-game Level 1 starfield background.

    This intentionally keeps the canvas sizing/rendering style close to the
    source game instead of doing fancy high-DPI scaling. The old game used
    canvas.width = window.innerWidth and canvas.height = window.innerHeight,
    because apparently crisp modern rendering was too emotionally stable.
  */

  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #004e2f;
    overflow: hidden;
    color: #0f0;
    font-family: monospace;
  }

  body {
    touch-action: none;
  }

  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
/*
  Extracted background-only starfield.

  Kept from shooter-game:
  - black canvas background
  - three parallax star layers
  - exact layer counts, vertical speeds, parallax multipliers, size ranges
  - exact alpha values per layer
  - exact resize behavior: canvas.width/height = window.innerWidth/Height
  - exact menu/start-screen idle sway formula

  Added:
  - mouse-driven horizontal starfield parallax
  - top-to-bottom forced perspective depth
  - faint original starfield layer under the reactive stars

  Removed:
  - player
  - enemies
  - bullets
  - bombs
  - menus
  - HUD
  - pause
  - audio
  - controller logic
  - keyboard gameplay logic
  - post-FX
*/

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const aberrationSourceCanvas = document.createElement("canvas");
const aberrationSourceCtx = aberrationSourceCanvas.getContext("2d");
const aberrationTintCanvas = document.createElement("canvas");
const aberrationTintCtx = aberrationTintCanvas.getContext("2d");

document.body.style.touchAction = "none";
canvas.style.touchAction = "none";

// Mirrors the old runtime helper used by the starfield setup.
function rand(min, max){
  return min + Math.random() * (max - min);
}

/* =======================
   Parallax Starfield
======================= */
const starLayers = [
  { count: 180, baseSpeedY: 40,  parallaxX: 0.35, sizeMin: 1, sizeMax: 2 },
  { count: 120, baseSpeedY: 80,  parallaxX: 0.60, sizeMin: 1, sizeMax: 3 },
  { count: 70,  baseSpeedY: 140, parallaxX: 0.90, sizeMin: 2, sizeMax: 4 }
];
const starColors = [
  [255, 70, 70],
  [70, 255, 120],
  [80, 150, 255]
];
const backgroundHueBase = 156;
const backgroundHueSpeed = 18;

let stars = [];
let backingStars = [];
let playerVxSmoothed = 0;
let starfieldReady = false;
let time = 0;
let last = performance.now();

const pointer = {
  x: 0,
  y: 0,
  active: false
};
const blackHoleTrail = [
  { x: 0, y: 0, r: 30 },
  { x: 0, y: 0, r: 25 },
  { x: 0, y: 0, r: 20 },
  { x: 0, y: 0, r: 15 },
  { x: 0, y: 0, r: 10 }
];
let blackHoleTrailReady = false;

// In the original game this value was passed into updateStarfield().
// This preserves the same visual scale for the menu/start-screen idle sway.
const playerSpeed = 7;

// Use the start-menu / non-playing idle sway, because this file has no
// gameplay input. To mimic gameplay with no left/right movement, set this to 0.
const MENU_IDLE_SWAY_STRENGTH = 0.15;

function randomStarColor(){
  return starColors[Math.floor(Math.random() * starColors.length)];
}

function resetStar(st, layer, y){
  const vanishingSpread = canvas.width * rand(0.18, 0.52);
  st.x = canvas.width / 2 + rand(-vanishingSpread, vanishingSpread);
  st.y = y;
  st.s = rand(layer.sizeMin, layer.sizeMax);
  st.vyMul = rand(0.7, 1.3);
  st.color = randomStarColor();
  st.isPlus = Math.random() < 0.5;
}

function createOriginalStar(layer){
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: rand(layer.sizeMin, layer.sizeMax),
    vyMul: rand(0.7, 1.3),
    color: randomStarColor(),
    isPlus: Math.random() < 0.5,
    angle: rand(0, Math.PI * 2),
    spinDir: Math.random() < 0.5 ? -1 : 1,
    spinMul: rand(0.65, 1.35)
  };
}

function resetStarfield(){
  stars = starLayers.map(layer => {
    const arr = [];
    for (let i = 0; i < layer.count; i++){
      const st = {};
      resetStar(st, layer, Math.random() * canvas.height);
      arr.push(st);
    }
    return arr;
  });

  backingStars = starLayers.map(layer => {
    const arr = [];
    for (let i = 0; i < layer.count; i++){
      arr.push(createOriginalStar(layer));
    }
    return arr;
  });

  starfieldReady = true;
}

function updateStarfield(dt){
  if (!starfieldReady) return;

  // Original non-playing/start-menu branch:
  // vxIntent = 0.15 * Math.sin(time * 0.6)
  const vxIntent = pointer.active
    ? Math.max(-1, Math.min(1, (pointer.x / canvas.width - 0.5) * 2))
    : MENU_IDLE_SWAY_STRENGTH * Math.sin(time * 0.6);

  const targetVx = vxIntent * playerSpeed * 55;
  playerVxSmoothed += (targetVx - playerVxSmoothed) * Math.min(1, dt * 8);

  for (let li = 0; li < starLayers.length; li++){
    const layer = starLayers[li];
    const arr = backingStars[li];
    const driftX = -playerVxSmoothed * layer.parallaxX * 0.12;
    const driftY = layer.baseSpeedY * 0.55;

    for (const st of arr){
      st.x += driftX * dt;
      st.y += driftY * st.vyMul * dt;
      st.angle += playerVxSmoothed * 0.015 * st.spinDir * st.spinMul * dt;

      if (st.y > canvas.height + 10) st.y = -10;
      if (st.x < -10) st.x = canvas.width + 10;
      if (st.x > canvas.width + 10) st.x = -10;
    }
  }

  for (let li = 0; li < starLayers.length; li++){
    const layer = starLayers[li];
    const arr = stars[li];

    const driftX = -playerVxSmoothed * layer.parallaxX;
    const driftY = layer.baseSpeedY;

    for (const st of arr){
      const depth = Math.max(0, Math.min(1, st.y / canvas.height));
      const perspective = 0.45 + depth * depth * 3.8;
      const outwardX = (st.x - canvas.width / 2) * depth * depth * (0.55 + li * 0.16);

      st.x += (driftX + outwardX) * dt;
      st.y += driftY * st.vyMul * perspective * dt;

      if (
        st.y > canvas.height + 24 ||
        st.x < -24 ||
        st.x > canvas.width + 24
      ){
        resetStar(st, layer, rand(-24, -4));
      }
    }
  }
}

function drawPlusStar(targetCtx, cx, cy, size){
  const arm = Math.max(1, size * 0.35);
  targetCtx.fillRect(cx - arm * 0.5, cy - size * 0.5, arm, size);
  targetCtx.fillRect(cx - size * 0.5, cy - arm * 0.5, size, arm);
}

function drawAsteriskStar(targetCtx, cx, cy, size){
  const radius = size * 0.72;
  targetCtx.lineWidth = Math.max(1, size * 0.22);
  targetCtx.lineCap = "square";
  targetCtx.beginPath();
  for (let i = 0; i < 3; i++){
    const angle = i * Math.PI / 3;
    const dx = Math.cos(angle) * radius;
    const dy = Math.sin(angle) * radius;
    targetCtx.moveTo(cx - dx, cy - dy);
    targetCtx.lineTo(cx + dx, cy + dy);
  }
  targetCtx.stroke();
}

function getBlackHoleBentPosition(x, y, strength){
  if (!pointer.active) return { x, y };

  const dx = x - pointer.x;
  const dy = y - pointer.y;
  const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
  const radius = 199;

  if (dist > radius) return { x, y };

  const influence = Math.pow(1 - dist / radius, 2);
  const pull = Math.min(38, 16 / dist) * influence * strength;
  const swirl = 98 * influence * strength;
  const nx = dx / dist;
  const ny = dy / dist;
  const tangentX = -ny;
  const tangentY = nx;

  return {
    x: x + tangentX * swirl - nx * pull,
    y: y + tangentY * swirl - ny * pull
  };
}

function drawBlackHoleCursor(targetCtx){
  if (!pointer.active) return;

  targetCtx.save();
  targetCtx.fillStyle = "#000";
  targetCtx.lineWidth = 3;

  for (let i = blackHoleTrail.length - 1; i >= 0; i--){
    const circle = blackHoleTrail[i];
    const alpha = i === 0 ? 1 : 1 - i * 0.2;
    const outlineHue = (time * 42 + i * 8) % 360;
    targetCtx.fillStyle = `rgba(0,0,0,${alpha})`;
    targetCtx.strokeStyle = `hsla(${outlineHue},100%,50%,${alpha})`;
    targetCtx.beginPath();
    targetCtx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.stroke();
  }

  targetCtx.restore();
}

function resetBlackHoleTrail(){
  for (const circle of blackHoleTrail){
    circle.x = pointer.x;
    circle.y = pointer.y;
  }
  blackHoleTrailReady = true;
}

function updateBlackHoleTrail(dt){
  if (!pointer.active){
    blackHoleTrailReady = false;
    return;
  }

  if (!blackHoleTrailReady) resetBlackHoleTrail();

  blackHoleTrail[0].x = pointer.x;
  blackHoleTrail[0].y = pointer.y;

  for (let i = 1; i < blackHoleTrail.length; i++){
    const leader = blackHoleTrail[i - 1];
    const circle = blackHoleTrail[i];
    const follow = Math.min(1, dt * (10 - i * 1.25));

    circle.x += (leader.x - circle.x) * follow;
    circle.y += (leader.y - circle.y) * follow;

    const dx = circle.x - leader.x;
    const dy = circle.y - leader.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxSeparate = (leader.r + circle.r) * 0.5;

    if (dist > maxSeparate){
      circle.x = leader.x + dx / dist * maxSeparate;
      circle.y = leader.y + dy / dist * maxSeparate;
    }
  }
}

function drawCRTOverlay(){
  ctx.save();
  ctx.globalCompositeOperation = "multiply";
  ctx.fillStyle = "rgba(0,0,0,0.10)";
  for (let y = 0; y < canvas.height; y += 4){
    ctx.fillRect(0, y, canvas.width, 1);
  }
  ctx.restore();

  const inset = Math.max(78, Math.min(canvas.width, canvas.height) * 0.155);
  const radius = Math.max(120, Math.min(canvas.width, canvas.height) * 0.31);
  const glow = Math.max(canvas.width, canvas.height) * 0.36;
  const vignetteHue = (263 + time * 18) % 360;

  ctx.save();
  ctx.shadowColor = `hsla(${vignetteHue},100%,20%,0.70)`;
  ctx.shadowBlur = glow;
  const blurSteps = [
    { expand: 0, alpha: 0.06 },
    { expand: 10, alpha: 0.045 },
    { expand: 22, alpha: 0.032 },
    { expand: 38, alpha: 0.022 },
    { expand: 58, alpha: 0.014 }
  ];

  for (const step of blurSteps){
    const x = Math.max(0, inset - step.expand);
    const y = Math.max(0, inset - step.expand);
    const w = Math.max(1, canvas.width - x * 2);
    const h = Math.max(1, canvas.height - y * 2);

    ctx.beginPath();
    ctx.rect(0, 0, canvas.width, canvas.height);
    ctx.roundRect(x, y, w, h, radius + step.expand);
    ctx.fillStyle = `hsla(${vignetteHue},100%,20%,${step.alpha})`;
    ctx.fill("evenodd");
  }
  ctx.restore();
}

function resizeEffectCanvases(){
  aberrationSourceCanvas.width = canvas.width;
  aberrationSourceCanvas.height = canvas.height;
  aberrationTintCanvas.width = canvas.width;
  aberrationTintCanvas.height = canvas.height;
}

function drawTintedAberration(color, offsetX, alpha){
  aberrationTintCtx.clearRect(0, 0, canvas.width, canvas.height);
  aberrationTintCtx.globalCompositeOperation = "source-over";
  aberrationTintCtx.globalAlpha = 1;
  aberrationTintCtx.drawImage(aberrationSourceCanvas, offsetX, 0);
  aberrationTintCtx.globalCompositeOperation = "source-atop";
  aberrationTintCtx.fillStyle = color;
  aberrationTintCtx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = "screen";
  ctx.drawImage(aberrationTintCanvas, 0, 0);
}

function applyChromaticAberration(){
  const mouseIntent = pointer.active
    ? Math.max(-1, Math.min(1, (pointer.x / canvas.width - 0.5) * 2))
    : Math.sin(time * 0.45) * 0.18;
  const shift = mouseIntent * 7;
  const smear = Math.sign(shift || 1) * 3.5;

  ctx.save();
  drawTintedAberration("rgb(255,0,0)", shift + smear, 0.13);
  drawTintedAberration("rgb(0,255,0)", -shift * 0.28, 0.08);
  drawTintedAberration("rgb(0,80,255)", -shift - smear, 0.13);
  drawTintedAberration("rgb(255,0,0)", (shift + smear) * 1.7, 0.05);
  drawTintedAberration("rgb(0,80,255)", (-shift - smear) * 1.7, 0.05);
  ctx.restore();
}

function drawStarForeground(targetCtx){
  if (!starfieldReady) return;

  for (let li = 0; li < starLayers.length; li++){
    const arr = backingStars[li];
    const alpha = 1;

    for (const st of arr){
      const size = st.s * 2;
      const cx = st.x + size * 0.5;
      const cy = st.y + size * 0.5;
      const bent = getBlackHoleBentPosition(cx, cy, 0.72);
      targetCtx.fillStyle = `rgba(${st.color[0]},${st.color[1]},${st.color[2]},${alpha})`;
      targetCtx.save();
      targetCtx.translate(bent.x, bent.y);
      targetCtx.rotate(st.angle);
      if (st.isPlus){
        drawPlusStar(targetCtx, 0, 0, size * 1.5);
      } else {
        targetCtx.strokeStyle = targetCtx.fillStyle;
        drawAsteriskStar(targetCtx, 0, 0, size);
      }
      targetCtx.restore();
    }
  }

  for (let li = 0; li < starLayers.length; li++){
    const arr = stars[li];
    const alpha = 1;

    for (const st of arr){
      const depth = Math.max(0, Math.min(1, st.y / canvas.height));
      const apparentSize = st.s * (0.45 + depth * depth * 2.9);
      const bent = getBlackHoleBentPosition(
        st.x + apparentSize * 0.5,
        st.y + apparentSize * 0.5,
        0.95 + depth * 0.45
      );
      targetCtx.fillStyle = `rgba(${st.color[0]},${st.color[1]},${st.color[2]},${alpha})`;
      if (st.isPlus){
        const arm = Math.max(1, apparentSize * 0.35);
        const mid = apparentSize * 0.5 - arm * 0.5;
        targetCtx.fillRect(bent.x - apparentSize * 0.5 + mid, bent.y - apparentSize * 0.5, arm, apparentSize);
        targetCtx.fillRect(bent.x - apparentSize * 0.5, bent.y - apparentSize * 0.5 + mid, apparentSize, arm);
      } else {
        targetCtx.fillRect(bent.x - apparentSize * 0.5, bent.y - apparentSize * 0.5, apparentSize, apparentSize);
      }
    }
  }

}

function drawStarfield(){
  const hue = (backgroundHueBase + time * backgroundHueSpeed) % 360;
  ctx.fillStyle = `hsl(${hue}, 100%, 15%)`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  aberrationSourceCtx.clearRect(0, 0, canvas.width, canvas.height);
  drawStarForeground(aberrationSourceCtx);
  ctx.drawImage(aberrationSourceCanvas, 0, 0);
  applyChromaticAberration();
  drawCRTOverlay();
  drawBlackHoleCursor(ctx);
}

/* =======================
   Mouse Starfield Control
======================= */
function setPointerPosition(event){
  const rect = canvas.getBoundingClientRect();
  pointer.x = event.clientX - rect.left;
  pointer.y = event.clientY - rect.top;
  pointer.active = true;
}

canvas.addEventListener("pointermove", setPointerPosition);
canvas.addEventListener("pointerenter", setPointerPosition);
canvas.addEventListener("pointerleave", () => {
  pointer.active = false;
});

function canvasToBlob(sourceCanvas){
  return new Promise(resolve => {
    sourceCanvas.toBlob(resolve, "image/png");
  });
}

async function copyScreenshotToClipboard(){
  if (!navigator.clipboard || typeof ClipboardItem === "undefined") return;

  const blob = await canvasToBlob(canvas);
  if (!blob) return;

  await navigator.clipboard.write([
    new ClipboardItem({ [blob.type]: blob })
  ]);
}

window.addEventListener("keydown", event => {
  const target = event.target;
  const isTyping = target && (
    target.tagName === "INPUT" ||
    target.tagName === "TEXTAREA" ||
    target.isContentEditable
  );

  if (!isTyping && event.shiftKey && event.key.toLowerCase() === "s"){
    event.preventDefault();
    copyScreenshotToClipboard().catch(() => {});
    return;
  }

  if (isTyping || event.repeat || event.key.toLowerCase() !== "f") return;

  event.preventDefault();
  if (document.fullscreenElement){
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
});

/* =======================
   Resize
======================= */
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  resizeEffectCanvases();
  resetStarfield();
}
window.addEventListener("resize", resize);

function frame(now){
  const dt = Math.min(0.05, Math.max(0, (now - last) / 1000));
  last = now;
  time += dt;

  updateStarfield(dt);
  updateBlackHoleTrail(dt);
  drawStarfield();

  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
