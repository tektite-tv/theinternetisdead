<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>README directory</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      box-sizing: border-box;
      margin: 0;
      padding: 2rem;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
    }

    nav {
      max-height: 40vh;
      overflow: auto;
      border: 1px solid #ddd;
      padding: 1rem;
      margin-bottom: 2rem;
    }

    section {
      padding-top: 1rem;
      margin-top: 2rem;
      border-top: 1px solid #ddd;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .source-link {
      display: inline-block;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>README directory</h1>
    <nav aria-label="Table of contents">
      <h2>Table of Contents</h2>
      <ol id="toc"></ol>
    </nav>
    <div id="readmes" aria-live="polite">Loading README files...</div>
  </main>

  <script>
    const toc = document.querySelector('#toc');
    const readmes = document.querySelector('#readmes');

    function slugFor(filename) {
      return filename.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderInline(markdown) {
      return escapeHtml(markdown).replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, '\n').trim().split('\n');
      const html = [];
      let listOpen = false;

      function closeList() {
        if (listOpen) {
          html.push('</ul>');
          listOpen = false;
        }
      }

      for (const line of lines) {
        if (!line.trim()) {
          closeList();
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
          continue;
        }

        const listItem = line.match(/^-\s+(.+)$/);
        if (listItem) {
          if (!listOpen) {
            html.push('<ul>');
            listOpen = true;
          }
          html.push(`<li>${renderInline(listItem[1])}</li>`);
          continue;
        }

        closeList();
        html.push(`<p>${renderInline(line)}</p>`);
      }

      closeList();
      return html.join('\n');
    }

    async function loadReadmes() {
      const response = await fetch('../JSON/readmes.json');
      if (!response.ok) {
        throw new Error(`Unable to load readmes.json: ${response.status}`);
      }

      const filenames = await response.json();
      readmes.textContent = '';

      for (const filename of filenames) {
        const id = slugFor(filename);
        const tocItem = document.createElement('li');
        const tocLink = document.createElement('a');
        tocLink.href = `#${id}`;
        tocLink.textContent = filename;
        tocItem.append(tocLink);
        toc.append(tocItem);

        const readmeResponse = await fetch(filename);
        const markdown = readmeResponse.ok
          ? await readmeResponse.text()
          : `# ${filename}\n\nUnable to load this README.`;

        const section = document.createElement('section');
        section.id = id;

        const sourceLink = document.createElement('a');
        sourceLink.className = 'source-link';
        sourceLink.href = filename;
        sourceLink.textContent = filename;
        section.append(sourceLink);

        const article = document.createElement('article');
        article.innerHTML = renderMarkdown(markdown);
        section.append(article);
        readmes.append(section);
      }
    }

    loadReadmes().catch((error) => {
      readmes.textContent = error.message;
    });
  </script>
</body>
</html>
