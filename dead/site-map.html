<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Map | theinternetisdead.org</title>
  <style>
    :root {
      --bg: #09000f;
      --panel: #190029;
      --purple: #4b0076;
      --lime: #b6ff00;
      --text: #ecddff;
      --muted: #b88be8;
      --border: rgba(182,255,0,.8);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #37116e 0, var(--bg) 42%, #000 100%);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      padding: 24px;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      border: 2px solid var(--border);
      background: rgba(10,0,18,.86);
      box-shadow: 0 0 24px rgba(182,255,0,.22), inset 0 0 40px rgba(75,0,118,.36);
      padding: 24px;
    }
    h1, h2 { color: var(--lime); text-shadow: 0 0 10px rgba(182,255,0,.42); }
    h1 { margin-top: 0; font-size: clamp(2rem, 5vw, 4rem); }
    .meta { color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin: 0 0 22px; }
    input, select {
      background: #06000b;
      border: 1px solid var(--lime);
      color: var(--lime);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    input { flex: 1 1 260px; }
    select { flex: 0 1 180px; }
    .count {
      border: 1px solid rgba(182,255,0,.45);
      padding: 12px 14px;
      color: var(--muted);
      background: rgba(75,0,118,.25);
    }
    section {
      margin: 18px 0;
      padding: 16px;
      border: 1px solid rgba(182,255,0,.35);
      background: rgba(75,0,118,.18);
    }
    h2 { margin: 0 0 12px; font-size: 1.25rem; }
    ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(182,255,0,.22);
      background: rgba(0,0,0,.32);
      padding: 10px 12px;
      overflow-wrap: anywhere;
    }
    a:hover, a:focus {
      color: #000;
      background: var(--lime);
      text-shadow: none;
    }
    .path { color: var(--muted); font-size: .9em; }
    a:hover .path, a:focus .path { color: #281044; }
    .hidden { display: none; }
    .error { border-color: #ff4d6d; color: #ffd6df; }
  </style>
</head>
<body>
<main>
  <h1>Site Map</h1>
  <p class="meta" id="meta">Loading <code>/dead/JSON/repo-index.json</code>. The machine is thinking, allegedly.</p>
  <div class="controls">
    <input id="filter" type="search" placeholder="Filter paths, like games, experiments, assets..." autocomplete="off">
    <select id="type-filter" aria-label="Filter by item type">
      <option value="all">All</option>
      <option value="directory">Folders</option>
      <option value="file">Files</option>
    </select>
    <div class="count"><span id="visible-count">0</span> / <span id="total-count">0</span> visible</div>
  </div>
  <div id="site-map-list" aria-live="polite"></div>
  <script>
    const repoIndexUrl = '/dead/JSON/repo-index.json';
    const meta = document.getElementById('meta');
    const filter = document.getElementById('filter');
    const typeFilter = document.getElementById('type-filter');
    const visibleCount = document.getElementById('visible-count');
    const totalCount = document.getElementById('total-count');
    const list = document.getElementById('site-map-list');
    let items = [];

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function titleize(value) {
      return String(value || 'Root')
        .replace(/.[^.]+$/, '')
        .replace(/[-_]+/g, ' ')
        .replace(/w/g, char => char.toUpperCase());
    }

    function normalizeItems(repoIndex) {
      if (Array.isArray(repoIndex.items)) return repoIndex.items;
      if (Array.isArray(repoIndex.folders)) {
        return repoIndex.folders.map(href => ({
type: 'directory',
name: href === '/' ? 'Root' : href.split('/').filter(Boolean).at(-1),
path: href === '/' ? '' : href.replace(/^//, '').replace(//$/, ''),
href,
parent: href.split('/').filter(Boolean).slice(0, -1).join('/') || '.',
depth: href.split('/').filter(Boolean).length
        }));
      }
      return [];
    }

    function isHiddenPath(item) {
      return String(item.path || '').split('/').some(part => part.startsWith('.'));
    }

    function groupLabel(parent) {
      if (!parent || parent === '.') return 'Root';
      return '/' + parent.replace(/^//, '').replace(//$/, '') + '/';
    }

    function render() {
      const groups = new Map();
      items.forEach(item => {
        const parent = item.parent || '.';
        if (!groups.has(parent)) groups.set(parent, []);
        groups.get(parent).push(item);
      });

      const groupHtml = [...groups.entries()].map(([parent, groupItems]) => {
        const label = groupLabel(parent);
        const rows = groupItems.map(item => {
const href = item.href || '/' + item.path + (item.type === 'directory' ? '/' : '');
const displayPath = href;
const type = item.type || 'file';
const name = item.name || displayPath;
return '<li data-path="' + escapeHtml(displayPath.toLowerCase()) + '" data-type="' + escapeHtml(type) + '"><a href="' + escapeHtml(href) + '">' + escapeHtml(titleize(name)) + '<br><span class="path">' + escapeHtml(displayPath) + ' • ' + escapeHtml(type) + '</span></a></li>';
        }).join('');
        return '<section data-section="' + escapeHtml(label.toLowerCase()) + '"><h2>' + escapeHtml(label) + ' <span class="path">(' + groupItems.length + ')</span></h2><ul>' + rows + '</ul></section>';
      }).join('');

      list.innerHTML = groupHtml;
      totalCount.textContent = items.length;
      applyFilter();
    }

    function applyFilter() {
      const q = filter.value.trim().toLowerCase();
      const selectedType = typeFilter.value;
      const nodes = [...document.querySelectorAll('li[data-path]')];
      const sections = [...document.querySelectorAll('section[data-section]')];
      let visible = 0;

      nodes.forEach(item => {
        const matchesText = !q || item.dataset.path.includes(q);
        const matchesType = selectedType === 'all' || item.dataset.type === selectedType;
        const show = matchesText && matchesType;
        item.classList.toggle('hidden', !show);
        if (show) visible += 1;
      });

      sections.forEach(section => {
        const hasVisible = !!section.querySelector('li:not(.hidden)');
        section.classList.toggle('hidden', !hasVisible);
      });

      visibleCount.textContent = visible;
    }

    async function loadRepoIndex() {
      try {
        const response = await fetch(repoIndexUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const repoIndex = await response.json();
        items = normalizeItems(repoIndex).filter(item => !isHiddenPath(item));
        meta.innerHTML = 'Generated live from <code>' + repoIndexUrl + '</code>. Showing ' + items.length + ' public-ish entries. Dotfiles and dotfolders are banished to the shadow realm.';
        render();
      } catch (error) {
        meta.classList.add('error');
        meta.textContent = 'Could not load ' + repoIndexUrl + ': ' + error.message;
      }
    }

    filter.addEventListener('input', applyFilter);
    typeFilter.addEventListener('change', applyFilter);
    loadRepoIndex();
  </script>
</main>
</body>
</html>
