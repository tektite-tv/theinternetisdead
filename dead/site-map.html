<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Map | theinternetisdead.org</title>
  <style>
    :root {
      --bg: #09000f;
      --panel: #190029;
      --purple: #4b0076;
      --lime: #b6ff00;
      --text: #ecddff;
      --muted: #b88be8;
      --border: rgba(182,255,0,.8);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #37116e 0, var(--bg) 42%, #000 100%);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      padding: 24px;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      border: 2px solid var(--border);
      background: rgba(10,0,18,.86);
      box-shadow: 0 0 24px rgba(182,255,0,.22), inset 0 0 40px rgba(75,0,118,.36);
      padding: 24px;
    }
    h1, h2 { color: var(--lime); text-shadow: 0 0 10px rgba(182,255,0,.42); }
    h1 { margin-top: 0; font-size: clamp(2rem, 5vw, 4rem); }
    .meta { color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin: 0 0 22px; }
    input, select, button {
      background: #06000b;
      border: 1px solid var(--lime);
      color: var(--lime);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    button { cursor: pointer; }
    button:hover, button:focus {
      background: var(--lime);
      color: #000;
    }
    input { flex: 1 1 260px; }
    select { flex: 0 1 180px; }
    .count {
      border: 1px solid rgba(182,255,0,.45);
      padding: 12px 14px;
      color: var(--muted);
      background: rgba(75,0,118,.25);
    }
    #site-map-list {
      border: 1px solid rgba(182,255,0,.35);
      background: rgba(75,0,118,.18);
      padding: 16px;
    }
    .tree-root,
    .tree-children {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tree-children {
      margin-left: 18px;
      padding-left: 14px;
      border-left: 1px dashed rgba(182,255,0,.25);
    }
    .tree-node {
      margin: 7px 0;
    }
    details.folder {
      border: 1px solid rgba(182,255,0,.2);
      background: rgba(0,0,0,.22);
    }
    details.folder[open] {
      border-color: rgba(182,255,0,.46);
      background: rgba(75,0,118,.16);
    }
    summary {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--lime);
      padding: 10px 12px;
      overflow-wrap: anywhere;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: "▸";
      color: var(--lime);
      display: inline-block;
      width: 1ch;
    }
    details[open] > summary::before { content: "▾"; }
    .folder-link,
    .file-link {
      color: inherit;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    .entry-main {
      min-width: 0;
      flex: 1 1 auto;
    }
    .entry-size {
      flex: 0 0 auto;
      margin-left: auto;
      white-space: nowrap;
      color: var(--lime);
      opacity: .86;
      text-align: right;
      font-size: .92em;
      text-shadow: 0 0 7px rgba(182,255,0,.25);
    }
    .file-link {
      align-items: center;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    .folder-link:hover,
    .folder-link:focus {
      text-decoration: underline;
    }
    .file-link {
      color: var(--text);
      border: 1px solid rgba(182,255,0,.22);
      background: rgba(0,0,0,.32);
      padding: 10px 12px;
    }
    .file-link:hover,
    .file-link:focus {
      color: #000;
      background: var(--lime);
      text-shadow: none;
    }
    .path,
    .folder-count {
      color: var(--muted);
      font-size: .9em;
    }
    .file-link:hover .path,
    .file-link:focus .path,
    .file-link:hover .entry-size,
    .file-link:focus .entry-size { color: #281044; }
    .hidden { display: none !important; }
    .error { border-color: #ff4d6d; color: #ffd6df; }
    code { color: var(--lime); }
    @media (max-width: 720px) {
      body { padding: 12px; }
      main { padding: 16px; }
      .tree-children { margin-left: 8px; padding-left: 10px; }
      summary { align-items: flex-start; }
      .entry-size { font-size: .8em; padding-top: 2px; }
    }
  </style>
</head>
<body>
<main>
  <h1>Site Map</h1>
  <p class="meta" id="meta">Loading <code>/dead/JSON/repo-index.json</code>. The machine is thinking, allegedly.</p>
  <div class="controls">
    <input id="filter" type="search" placeholder="Filter paths, like games, experiments, assets..." autocomplete="off">
    <select id="type-filter" aria-label="Filter by item type">
      <option value="all">All</option>
      <option value="directory">Folders</option>
      <option value="file">Files</option>
    </select>
    <button id="expand-all" type="button">Expand All</button>
    <button id="collapse-all" type="button">Collapse All</button>
    <div class="count"><span id="visible-count">0</span> / <span id="total-count">0</span> visible</div>
  </div>
  <div id="site-map-list" aria-live="polite"></div>
  <script>
    const repoIndexUrls = [
      '/dead/JSON/repo-index.json',
      './JSON/repo-index.json',
      'JSON/repo-index.json'
    ];

    const meta = document.getElementById('meta');
    const filter = document.getElementById('filter');
    const typeFilter = document.getElementById('type-filter');
    const visibleCount = document.getElementById('visible-count');
    const totalCount = document.getElementById('total-count');
    const list = document.getElementById('site-map-list');
    const expandAll = document.getElementById('expand-all');
    const collapseAll = document.getElementById('collapse-all');
    let items = [];
    let treeRoot = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function stripSlashes(value) {
      return String(value || '').replace(/^\/+/, '').replace(/\/+$/, '');
    }

    function titleize(value) {
      const clean = String(value || 'Root')
        .replace(/\.[^.]+$/, '')
        .replace(/[-_]+/g, ' ')
        .trim();
      return clean.replace(/\b\w/g, char => char.toUpperCase()) || 'Root';
    }

    function normalizeItems(repoIndex) {
      if (repoIndex && Array.isArray(repoIndex.items)) return repoIndex.items;
      if (Array.isArray(repoIndex)) return repoIndex;
      if (repoIndex && repoIndex.byPath && typeof repoIndex.byPath === 'object') return Object.values(repoIndex.byPath);
      return [];
    }

    function isHiddenPath(item) {
      const path = stripSlashes(item.path || item.href || item.name || '');
      return path.split('/').some(part => part.startsWith('.'));
    }

    function cleanItem(item) {
      const type = item.type === 'directory' ? 'directory' : 'file';
      const path = stripSlashes(item.path || item.href || item.name || '');
      const href = item.href || '/' + path + (type === 'directory' ? '/' : '');
      const pathParts = path.split('/').filter(Boolean);
      const name = item.name || pathParts.at(-1) || 'Root';
      const parent = item.parent ? stripSlashes(item.parent) : pathParts.slice(0, -1).join('/') || '.';
      return { ...item, type, path, href, name, parent };
    }

    function makeNode(path, name, item = null) {
      return {
        path,
        name,
        item,
        directories: new Map(),
        files: []
      };
    }

    function ensureDirectory(root, path) {
      const cleanPath = stripSlashes(path);
      if (!cleanPath || cleanPath === '.') return root;

      let current = root;
      let currentPath = '';
      cleanPath.split('/').filter(Boolean).forEach(part => {
        currentPath = currentPath ? currentPath + '/' + part : part;
        if (!current.directories.has(part)) {
          current.directories.set(part, makeNode(currentPath, part));
        }
        current = current.directories.get(part);
      });
      return current;
    }

    function buildTree(sourceItems) {
      const root = makeNode('', 'Root');

      sourceItems
        .filter(item => item.type === 'directory')
        .sort((a, b) => a.path.localeCompare(b.path))
        .forEach(item => {
          const node = ensureDirectory(root, item.path);
          node.item = item;
          node.name = item.name || node.name;
        });

      sourceItems
        .filter(item => item.type !== 'directory')
        .sort((a, b) => a.path.localeCompare(b.path))
        .forEach(item => {
          const parentNode = ensureDirectory(root, item.parent);
          parentNode.files.push(item);
        });

      return root;
    }

    function summarizeDirectory(node) {
      let fileCount = node.files.length;
      let folderCount = node.directories.size;
      let totalSize = node.files.reduce((sum, item) => sum + getItemSize(item), 0);
      node.directories.forEach(child => {
        const childSummary = summarizeDirectory(child);
        fileCount += childSummary.files;
        folderCount += childSummary.folders;
        totalSize += childSummary.size;
      });
      return { files: fileCount, folders: folderCount, size: totalSize };
    }

    function renderDirectory(node, isRoot = false) {
      const childDirectories = [...node.directories.values()].sort((a, b) => a.name.localeCompare(b.name));
      const childFiles = [...node.files].sort((a, b) => a.name.localeCompare(b.name));
      const childHtml = [
        ...childDirectories.map(child => renderDirectory(child)),
        ...childFiles.map(renderFile)
      ].join('');

      if (isRoot) return '<ul class="tree-root">' + childHtml + '</ul>';

      const item = node.item || cleanItem({ type: 'directory', path: node.path, name: node.name });
      const summary = summarizeDirectory(node);
      const href = item.href || '/' + stripSlashes(node.path) + '/';
      const folderLabel = titleize(node.name);
      return '<li class="tree-node" data-path="' + escapeHtml(href.toLowerCase()) + '" data-type="directory">' +
        '<details class="folder">' +
          '<summary>' +
            '<span class="entry-main"><a class="folder-link" href="' + escapeHtml(href) + '">📁 ' + escapeHtml(folderLabel) + '</a><br><span class="folder-count">' + summary.folders + ' folders / ' + summary.files + ' files</span></span>' +
            '<span class="entry-size">' + formatBytes(summary.size) + '</span>' +
          '</summary>' +
          '<ul class="tree-children">' + childHtml + '</ul>' +
        '</details>' +
      '</li>';
    }

    function renderFile(item) {
      const displayPath = item.href;
      const name = item.name || displayPath;
      return '<li class="tree-node" data-path="' + escapeHtml(displayPath.toLowerCase()) + '" data-type="file">' +
        '<a class="file-link" href="' + escapeHtml(item.href) + '"><span class="entry-main">📄 ' + escapeHtml(titleize(name)) + '<br><span class="path">' + escapeHtml(displayPath) + ' • file</span></span><span class="entry-size">' + formatBytes(getItemSize(item)) + '</span></a>' +
      '</li>';
    }

    function render() {
      treeRoot = buildTree(items);
      const html = renderDirectory(treeRoot, true);
      list.innerHTML = html || '<section class="error"><h2>No entries found</h2><p>The repo index loaded, but it had nothing useful in it. Naturally.</p></section>';
      totalCount.textContent = items.length;
      applyFilter();
    }

    function revealParents(item) {
      let current = item.parentElement;
      while (current) {
        if (current.tagName === 'DETAILS') current.open = true;
        current = current.parentElement;
      }
    }

    function applyFilter() {
      const q = filter.value.trim().toLowerCase();
      const selectedType = typeFilter.value;
      const nodes = [...document.querySelectorAll('li[data-path]')];
      let visible = 0;

      nodes.forEach(item => {
        const matchesText = !q || item.dataset.path.includes(q);
        const matchesType = selectedType === 'all' || item.dataset.type === selectedType;
        const show = matchesText && matchesType;
        item.classList.toggle('hidden', !show);
        if (show) {
          visible += 1;
          if (q) revealParents(item);
        }
      });

      [...document.querySelectorAll('details.folder')].forEach(details => {
        const childItems = [...details.querySelectorAll(':scope > .tree-children > li[data-path]')];
        const hasVisibleChild = childItems.some(child => !child.classList.contains('hidden'));
        const selfNode = details.closest('li[data-path]');
        const selfVisible = selfNode && !selfNode.classList.contains('hidden');

        if (q || selectedType !== 'all') {
          if (!selfVisible && !hasVisibleChild) selfNode?.classList.add('hidden');
          if (hasVisibleChild) {
            selfNode?.classList.remove('hidden');
            details.open = true;
          }
        }
      });

      visibleCount.textContent = visible;
    }

    async function fetchRepoIndex() {
      let lastError = null;
      for (const url of repoIndexUrls) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) throw new Error('HTTP ' + response.status);
          const repoIndex = await response.json();
          return { repoIndex, url };
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error('Unknown fetch failure');
    }

    async function loadRepoIndex() {
      try {
        const { repoIndex, url } = await fetchRepoIndex();
        items = normalizeItems(repoIndex)
          .map(cleanItem)
          .filter(item => item.path && !isHiddenPath(item));

        meta.innerHTML = 'Generated live from <code>' + escapeHtml(url) + '</code>. Showing ' + items.length + ' public-ish entries, nested and closed by default like a civilized haunted filing cabinet.';
        render();
      } catch (error) {
        meta.classList.add('error');
        meta.textContent = 'Could not load repo-index.json: ' + error.message;
      }
    }

    filter.addEventListener('input', applyFilter);
    typeFilter.addEventListener('change', applyFilter);
    expandAll.addEventListener('click', () => document.querySelectorAll('details.folder').forEach(details => { details.open = true; }));
    collapseAll.addEventListener('click', () => document.querySelectorAll('details.folder').forEach(details => { details.open = false; }));
    loadRepoIndex();
  </script>
</main>
</body>
</html>
