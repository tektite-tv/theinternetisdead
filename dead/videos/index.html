<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>/dead/videos/</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #00ff00;
      font-family: "Courier New", monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <p>Routing video through the root shell...</p>

  <script>
    function getVideoIdFromRoute() {
      const params = new URLSearchParams(window.location.search);
      const queryVideoId = params.get('vid') || params.get('id') || params.get('v') || '';
      if (queryVideoId.trim()) return queryVideoId.trim();

      const pathMatch = window.location.pathname.match(/^\/dead\/videos\/([^/]+)\/?$/);
      return pathMatch ? decodeURIComponent(pathMatch[1]) : '';
    }

    const videoId = getVideoIdFromRoute();
    if (videoId) {
      window.sessionStorage.setItem('deadVideoId', videoId);
    }

    window.location.replace('/');
  </script>
</body>
</html>
