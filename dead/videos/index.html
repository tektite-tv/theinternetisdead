<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>/dead/videos/</title>
<script>
(function redirectToHomeWatchState(){
    const pathMatch = window.location.pathname.match(/^\/dead\/videos\/([^/]+)\/?$/);
    if(pathMatch){
        window.sessionStorage.setItem("deadVideoId", decodeURIComponent(pathMatch[1]));
    }
    window.location.replace(`/${window.location.hash || ""}`);
})();
</script>
</head>
<body></body>
</html>
