<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/media/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>/dead/pages/youtube-list-grid/</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#youtube-list-grid-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="youtube-list-grid-frame" src="/dead/pages/youtube-list-grid/youtube-list-grid.html"></iframe>
</div>

<script>
async function loadOverlay(){
    try{
        const res = await fetch("/dead/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /dead/pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

const frame = document.getElementById("youtube-list-grid-frame");

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.syncOverlayLayout = syncLayout;

loadOverlay();

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>
  <script>
const wrapperHomePath = "/dead/pages/youtube-list-grid/";

function normalizeInitialWrapperVideoRoute() {
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get("v");
    if (!videoId) return;

    const canonicalPath = "/dead/pages/youtube-list-grid/watch/";
    if (window.location.pathname === canonicalPath) return;

    window.history.replaceState(
        { videoId },
        "",
        `${canonicalPath}?v=${encodeURIComponent(videoId)}`
    );
}

function updateWrapperVideoRoute(action, videoId) {
    const nextUrl = action === "open" && videoId
        ? `/dead/pages/youtube-list-grid/watch/?v=${encodeURIComponent(videoId)}`
        : wrapperHomePath;
    window.history.replaceState({ videoId: videoId || null }, "", nextUrl);
}

function sendInitialWrapperVideoToFrame() {
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get("v");
    if (!videoId || !frame.contentWindow) return;
    frame.contentWindow.postMessage({ type: "youtubeGridOpenVideo", videoId }, "*");
}

window.addEventListener("message", (event) => {
    const data = event.data || {};
    if (event.source !== frame.contentWindow || data.type !== "youtubeGridVideoState") return;
    updateWrapperVideoRoute(data.action, String(data.videoId || ""));
});

normalizeInitialWrapperVideoRoute();

frame.addEventListener("load", sendInitialWrapperVideoToFrame);
</script>

<script src="/scripts/hide-overlay.js"></script>
</body>
</html>
