<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>theinternetisdead // passphrase gate</title>
  <!-- updated-image-sha:b05b24c0f2588c6e -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #020403;
      --acid: #76ff7a;
      --acid-dim: rgba(118, 255, 122, 0.45);
      --purple: #9d4dff;
      --warn: #ff4df3;
      --panel: rgba(0, 0, 0, 0.52);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #020403;
      overflow: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(157, 77, 255, 0.16), transparent 36%),
        radial-gradient(circle at 50% 100%, rgba(118, 255, 122, 0.08), transparent 42%),
        linear-gradient(180deg, #020403 0%, #050806 100%);
      color: var(--acid);
      font-family: Consolas, "Courier New", monospace;
    }

    main {
      width: min(100vw, 1400px);
      height: 100svh;
      padding: clamp(6px, 1.4vmin, 14px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: clamp(6px, 1.2vmin, 10px);
      text-align: center;
      border: 1px solid rgba(118, 255, 122, 0.22);
      box-shadow:
        0 0 22px rgba(118, 255, 122, 0.12),
        inset 0 0 46px rgba(157, 77, 255, 0.09);
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.035) 0px,
          rgba(255,255,255,0.035) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: screen;
      opacity: 0.42;
      z-index: 10;
    }

    main::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 18px / 40px;
      pointer-events: none;
      box-shadow:
        inset 0 0 38px rgba(0, 0, 0, 0.88),
        inset 0 0 120px rgba(0, 0, 0, 0.56);
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(0.72rem, 1.8vmin, 1.35rem);
      line-height: 1.05;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--acid-dim), 2px 0 0 rgba(255, 77, 243, 0.2);
      position: relative;
      z-index: 3;
    }

    .stage {
      position: relative;
      width: min(100%, calc((100svh - 112px) * 1.5588235294));
      max-width: 100%;
      max-height: calc(100svh - 112px);
      aspect-ratio: 1448 / 1086;
      margin: 0 auto;
      align-self: center;
      border: 1px solid rgba(118, 255, 122, 0.35);
      background: #000;
      overflow: hidden;
      box-shadow:
        0 0 28px rgba(157, 77, 255, 0.22),
        inset 0 0 42px rgba(0, 0, 0, 0.85);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      display: block;
    }

    .status {
      min-height: 1.35em;
      margin: 0;
      font-size: clamp(0.72rem, 1.55vmin, 0.95rem);
      color: rgba(215, 255, 218, 0.88);
      text-shadow: 0 0 8px rgba(118, 255, 122, 0.45);
      position: relative;
      z-index: 3;
      white-space: nowrap;
    }

    .aside {
      display: inline-block;
      min-width: min(48ch, 48vw);
      margin-left: 0.65rem;
      color: var(--acid);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 130ms ease, transform 130ms ease;
      text-align: left;
      text-shadow: 0 0 10px rgba(118, 255, 122, 0.5);
    }

    .aside.show {
      opacity: 1;
      transform: translateX(0);
    }

    .aside.hint {
      color: var(--warn);
      text-shadow: 0 0 10px rgba(255, 77, 243, 0.55);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: nowrap;
      position: relative;
      z-index: 3;
    }

    input, button {
      border: 1px solid rgba(118, 255, 122, 0.62);
      background: rgba(0, 0, 0, 0.82);
      color: var(--acid);
      font: inherit;
      font-size: clamp(0.72rem, 1.55vmin, 0.95rem);
      padding: clamp(0.48rem, 1.2vmin, 0.8rem) clamp(0.65rem, 1.6vmin, 0.95rem);
      box-shadow: inset 0 0 12px rgba(118, 255, 122, 0.08);
    }

    input {
      width: min(430px, 58vw);
      min-width: 0;
      outline: none;
    }

    input:focus {
      border-color: var(--warn);
      box-shadow: 0 0 12px rgba(255, 77, 243, 0.22), inset 0 0 12px rgba(118, 255, 122, 0.08);
    }

    button {
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(118, 255, 122, 0.13);
      box-shadow: 0 0 16px rgba(118, 255, 122, 0.2);
    }

    button:disabled,
    input:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .unlocked {
      color: #fff;
      text-shadow: 0 0 10px #76ff7a, 0 0 22px #9d4dff;
    }

    @media (max-width: 760px) {
      main {
        grid-template-rows: auto auto auto auto;
      }

      .stage {
        width: 100%;
        max-height: calc(100svh - 142px);
      }

      .status {
        white-space: normal;
      }

      .aside {
        display: block;
        min-width: 0;
        margin: 0.35rem 0 0;
        text-align: center;
      }

      .controls {
        flex-wrap: wrap;
      }

      input {
        width: min(430px, 88vw);
      }
    }
  </style>
</head>

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const input = document.getElementById("passphrase");
    const button = document.getElementById("unlock");
    const status = document.getElementById("status");
    const promptText = document.getElementById("prompt");
    const aside = document.getElementById("aside");

    const wrongRemarks = [
      "(bold guess from the carbon-based sector)",
      "(the machine spirit remains unimpressed)",
      "(not even close, but the confidence was vintage)",
      "(somewhere, a login form just learned shame)",
      "(the haunted iframe coughs politely)"
    ];

    const hints = [
      "(hint: no spaces, no dots, all lowercase, like a domain got flattened)",
      "(hint: the site name is already whispering it at you)",
      "(hint: Where are you right now on the web?)"
    ];

    let wrongGuessCount = 0;
    let hintCount = 0;
    let lastRemark = -1;

    const img = new Image();
    img.src = DATA_URI;

    let sourceCanvas, sourceCtx, sourceData;
    let unlocked = false;
    let frame = 0;
    let liveGlitching = false;
    let liveFrame = 0;
function rnd(seed) {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }

    function drawScrambled() {
      if (!sourceCanvas || unlocked) return;

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const tile = 30;
      const cols = Math.ceil(canvas.width / tile);
      const rows = Math.ceil(canvas.height / tile);
      const seedBase = 1337 + Math.floor(frame / 3) * 97;

      ctx.save();
      ctx.globalAlpha = 0.92;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = y * cols + x;
          const r1 = rnd(seedBase + i * 11);
          const r2 = rnd(seedBase + i * 17);
          const sx = Math.floor(r1 * cols) * tile;
          const sy = Math.floor(r2 * rows) * tile;
          const wobbleX = Math.floor((rnd(seedBase + i * 23) - 0.5) * 36);
          const wobbleY = Math.floor((rnd(seedBase + i * 29) - 0.5) * 22);
          const dx = x * tile + wobbleX;
          const dy = y * tile + wobbleY;
          const sw = Math.min(tile, canvas.width - sx);
          const sh = Math.min(tile, canvas.height - sy);
          ctx.drawImage(sourceCanvas, sx, sy, sw, sh, dx, dy, sw, sh);
        }
      }

      ctx.restore();

      for (let y = 0; y < canvas.height; y += 3) {
        const offset = Math.floor((rnd(seedBase + y * 31) - 0.5) * 90);
        if (Math.abs(offset) > 18) {
          ctx.drawImage(canvas, 0, y, canvas.width, 2, offset, y, canvas.width, 2);
        }
      }

      for (let i = 0; i < 42; i++) {
        const x = Math.floor(rnd(seedBase + i * 41) * canvas.width);
        const y = Math.floor(rnd(seedBase + i * 43) * canvas.height);
        const w = Math.floor(8 + rnd(seedBase + i * 47) * 180);
        const h = Math.floor(4 + rnd(seedBase + i * 53) * 55);
        ctx.globalAlpha = 0.16 + rnd(seedBase + i * 59) * 0.28;
        ctx.fillStyle = rnd(seedBase + i * 61) > 0.55 ? "#76ff7a" : "#9d4dff";
        ctx.fillRect(x, y, w, h);
      }

      ctx.globalAlpha = 1;
      frame++;
      requestAnimationFrame(drawScrambled);
    }

    function drawLiveGlitch() {
      if (!sourceCanvas || !unlocked || !liveGlitching) return;

      ctx.globalAlpha = 1;
      ctx.drawImage(sourceCanvas, 0, 0);

      const seedBase = 9001 + liveFrame * 13;
      const twitch = rnd(seedBase) > 0.78;

      if (twitch) {
        const slices = 2 + Math.floor(rnd(seedBase + 1) * 5);
        for (let i = 0; i < slices; i++) {
          const y = Math.floor(rnd(seedBase + i * 17) * canvas.height);
          const sliceHeight = 1 + Math.floor(rnd(seedBase + i * 19) * 10);
          const offset = Math.floor((rnd(seedBase + i * 23) - 0.5) * 34);
          ctx.globalAlpha = 0.88;
          ctx.drawImage(sourceCanvas, 0, y, canvas.width, sliceHeight, offset, y, canvas.width, sliceHeight);
        }

        ctx.globalAlpha = 0.08;
        ctx.fillStyle = rnd(seedBase + 77) > 0.5 ? "#76ff7a" : "#ff4df3";
        const blockY = Math.floor(rnd(seedBase + 79) * canvas.height);
        ctx.fillRect(0, blockY, canvas.width, 2 + Math.floor(rnd(seedBase + 83) * 7));
      }

      ctx.globalAlpha = 0.12;
      for (let y = liveFrame % 5; y < canvas.height; y += 5) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        ctx.fillRect(0, y, canvas.width, 1);
      }

      ctx.globalAlpha = 1;
      liveFrame++;
      requestAnimationFrame(drawLiveGlitch);
    }

    function showAside(message, isHint = false) {
      aside.textContent = message;
      aside.classList.toggle("hint", isHint);
      aside.classList.remove("show");
      void aside.offsetWidth;
      aside.classList.add("show");
    }

    function randomRemark() {
      let index = Math.floor(Math.random() * wrongRemarks.length);
      if (wrongRemarks.length > 1) {
        while (index === lastRemark) index = Math.floor(Math.random() * wrongRemarks.length);
      }
      lastRemark = index;
      return wrongRemarks[index];
    }

    function unlock() {
      const attempt = input.value.trim();
      if (attempt !== SECRET) {
        wrongGuessCount++;
        status.classList.remove("unlocked");
        promptText.textContent = "Enter the secret passphrase.";

        if (wrongGuessCount % 3 === 0) {
          const hint = hints[Math.min(hintCount, hints.length - 1)];
          hintCount++;
          showAside(hint, true);
        } else {
          showAside(randomRemark(), false);
        }

        input.select();
        return;
      }

      unlocked = true;
      promptText.textContent = "passphrase accepted // original signal restored";
      aside.textContent = "";
      aside.classList.remove("show", "hint");
      status.classList.add("unlocked");
      input.disabled = true;
      button.disabled = true;

      let alpha = 0;
      function reveal() {
        ctx.globalAlpha = 1;
        ctx.drawImage(canvas, 0, 0);
        ctx.globalAlpha = alpha;
        ctx.drawImage(sourceCanvas, 0, 0);
        alpha += 0.045;
        if (alpha < 1) requestAnimationFrame(reveal);
        else {
          ctx.globalAlpha = 1;
          ctx.drawImage(sourceCanvas, 0, 0);
          liveGlitching = true;
          drawLiveGlitch();
        }
      }
      reveal();
    }

    button.addEventListener("click", unlock);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    img.onload = () => {
      sourceCanvas = document.createElement("canvas");
      sourceCanvas.width = canvas.width;
      sourceCanvas.height = canvas.height;
      sourceCtx = sourceCanvas.getContext("2d");
      sourceCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
      drawScrambled();
    };
  </script>
</body>
</html>
