<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEC Remote</title>
  <style>
    :root {
      --bg: #090014;
      --panel: #170026;
      --lime: #b6ff00;
      --purple: #9b4dff;
      --text: #f4eaff;
      --danger: #ff3b6b;
      --muted: #9d8caf;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(155, 77, 255, 0.28), transparent 45%),
        linear-gradient(180deg, #090014, #020006);
      color: var(--text);
      font-family: Consolas, Monaco, "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .remote {
      width: min(430px, 100%);
      background: rgba(23, 0, 38, 0.92);
      border: 2px solid var(--purple);
      border-radius: 24px;
      box-shadow:
        0 0 24px rgba(155, 77, 255, 0.45),
        inset 0 0 18px rgba(182, 255, 0, 0.06);
      padding: 18px;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--lime);
      font-size: 1.4rem;
      text-align: center;
      text-shadow: 0 0 8px rgba(182, 255, 0, 0.7);
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .row.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .row.four {
      grid-template-columns: repeat(4, 1fr);
    }

    button {
      border: 1px solid var(--lime);
      background: #10001c;
      color: var(--lime);
      min-height: 58px;
      border-radius: 16px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      box-shadow:
        0 0 10px rgba(182, 255, 0, 0.18),
        inset 0 0 12px rgba(155, 77, 255, 0.15);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.96);
      background: var(--lime);
      color: #10001c;
    }

    .power {
      border-color: var(--danger);
      color: var(--danger);
    }

    .wide {
      grid-column: span 3;
    }

    .status {
      margin-top: 14px;
      padding: 10px;
      min-height: 42px;
      border: 1px dashed rgba(182, 255, 0, 0.45);
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="remote">
    <h1>CEC REMOTE</h1>
    <div class="sub">jins-pi.local · haunted HDMI button rectangle</div>

    <section class="grid">
      <div class="row two">
        <button class="power" data-command="power">POWER</button>
        <button class="power" data-command="standby">STANDBY</button>
      </div>

      <div class="row">
        <button data-command="home">HOME</button>
        <button data-command="up">▲</button>
        <button data-command="back">BACK</button>
      </div>

      <div class="row">
        <button data-command="left">◀</button>
        <button data-command="select">OK</button>
        <button data-command="right">▶</button>
      </div>

      <div class="row">
        <button data-command="menu">MENU</button>
        <button data-command="down">▼</button>
        <button data-command="exit">EXIT</button>
      </div>

      <div class="row three">
        <button data-command="vol_down">VOL −</button>
        <button data-command="mute">MUTE</button>
        <button data-command="vol_up">VOL +</button>
      </div>

      <div class="row three">
        <button data-command="rewind">⏪</button>
        <button data-command="play_pause">⏯</button>
        <button data-command="fast_forward">⏩</button>
      </div>

      <div class="row two">
        <button data-command="input">INPUT</button>
        <button data-command="info">INFO</button>
      </div>
    </section>

    <div id="status" class="status">Ready.</div>
  </main>

  <script>
    const statusBox = document.getElementById("status");

    async function sendCommand(command) {
      statusBox.textContent = `Sending: ${command}`;

      try {
        const response = await fetch("/api/cec", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ command })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Unknown error");
        }

        statusBox.textContent = `Sent: ${command}\n${data.output || "OK"}`;
      } catch (error) {
        statusBox.textContent = `Failed: ${command}\n${error.message}`;
      }
    }

    document.querySelectorAll("button[data-command]").forEach((button) => {
      button.addEventListener("click", () => {
        sendCommand(button.dataset.command);
      });
    });
  </script>
</body>
</html>
