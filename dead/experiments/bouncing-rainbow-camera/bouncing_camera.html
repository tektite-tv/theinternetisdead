<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bouncing Camera Goblin</title>
  <style>
    :root {
      --scale: 0.5;
      --cam-w: min(42vw, 520px);
      --cam-h: calc(var(--cam-w) * 0.5625);
      --outline: 10px;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #b6ff00;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
    }

    #cameraBox {
      position: fixed;
      left: 0;
      top: 0;
      width: calc(var(--cam-w) * var(--scale));
      height: calc(var(--cam-h) * var(--scale));
      border: calc(var(--outline) * var(--scale)) solid hsl(280 100% 60%);
      border-radius: calc(var(--radius) * var(--scale));
      overflow: hidden;
      background: #111;
      box-shadow:
        0 0 24px hsl(280 100% 60% / 0.85),
        inset 0 0 18px rgb(255 255 255 / 0.12);
      transform: translate3d(0, 0, 0);
      will-change: transform, border-color, box-shadow, filter;
      animation: hueSpin 4s linear infinite;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
      filter: saturate(1.25) contrast(1.05);
    }

    #permissionPanel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgb(130 0 255 / 0.18), transparent 38%),
        #000;
      z-index: 5;
    }

    #permissionCard {
      width: min(46vw, 260px);
      padding: 14px;
      border: 2px solid #b6ff00;
      border-radius: 10px;
      background: rgb(0 0 0 / 0.86);
      box-shadow: 0 0 28px rgb(182 255 0 / 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(0.9rem, 2.5vw, 1.5rem);
      line-height: 1;
      color: #d36bff;
      text-shadow: 0 0 12px rgb(211 107 255 / 0.8);
    }

    p {
      margin: 0 0 20px;
      color: #caff61;
      font-size: 0.5rem;
      line-height: 1.45;
    }

    button {
      border: 2px solid #b6ff00;
      border-radius: 999px;
      padding: 6px 9px;
      background: #111;
      color: #b6ff00;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 18px rgb(182 255 0 / 0.35);
    }

    button:hover {
      background: #b6ff00;
      color: #050505;
    }

    #status {
      min-height: 1.4em;
      margin-top: 16px;
      color: #ff66d9;
    }

    @keyframes hueSpin {
      from {
        filter: hue-rotate(0deg);
      }
      to {
        filter: hue-rotate(360deg);
      }
    }

    @media (max-width: 700px) {
      :root {
        --cam-w: 74vw;
        --cam-h: calc(var(--cam-w) * 0.75);
      }
    }
  </style>
</head>
<body>
  <main id="permissionPanel">
    <section id="permissionCard">
      <h1>Camera Bounce</h1>
      <p>This page asks for camera access, then hurls your webcam around a black void like technology was a mistake.</p>
      <button id="startButton" type="button">Enable Camera</button>
      <div id="status" aria-live="polite"></div>
    </section>
  </main>

  <div id="cameraBox" aria-hidden="true">
    <video id="camera" autoplay playsinline muted></video>
  </div>

  <script>
    const startButton = document.getElementById("startButton");
    const permissionPanel = document.getElementById("permissionPanel");
    const statusText = document.getElementById("status");
    const cameraBox = document.getElementById("cameraBox");
    const video = document.getElementById("camera");

    let x = 24;
    let y = 24;
    let vx = 4.2;
    let vy = 3.1;
    let lastTime = performance.now();

    function clampToScreen() {
      const rect = cameraBox.getBoundingClientRect();
      const maxX = Math.max(0, window.innerWidth - rect.width);
      const maxY = Math.max(0, window.innerHeight - rect.height);

      x = Math.min(Math.max(x, 0), maxX);
      y = Math.min(Math.max(y, 0), maxY);
    }

    function animate(now) {
      const delta = Math.min((now - lastTime) / 16.67, 3);
      lastTime = now;

      const rect = cameraBox.getBoundingClientRect();
      const maxX = Math.max(0, window.innerWidth - rect.width);
      const maxY = Math.max(0, window.innerHeight - rect.height);

      x += vx * delta;
      y += vy * delta;

      if (x <= 0 || x >= maxX) {
        vx *= -1;
        x = Math.min(Math.max(x, 0), maxX);
      }

      if (y <= 0 || y >= maxY) {
        vy *= -1;
        y = Math.min(Math.max(y, 0), maxY);
      }

      cameraBox.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      requestAnimationFrame(animate);
    }

    async function startCamera() {
      statusText.textContent = "Requesting camera access... because apparently the void needs a face.";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        permissionPanel.style.display = "none";
        cameraBox.setAttribute("aria-hidden", "false");
        clampToScreen();
      } catch (error) {
        statusText.textContent = `Camera failed: ${error.message || "permission denied"}`;
      }
    }

    startButton.addEventListener("click", startCamera);
    window.addEventListener("resize", clampToScreen);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
