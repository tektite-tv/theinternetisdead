<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Infinite Spiral Vortex Mandala - Three.js 3D</title>
  <style>
    /*
      RGB Infinite Spiral Vortex Mandala - Three.js 3D

      Same idea as the 2D canvas version, dragged into the third dimension
      like a GPU being politely escorted into the afterlife.

      Notes:
      - Uses Three.js from a CDN.
      - No text overlay.
      - Deterministic red / green / blue object buckets.
      - Roughly 33.3% red, 33.3% green, 33.3% blue.
      - Objects are triangles and squares/planes arranged in mirrored spiral rings.
      - Whole structure rotates forever with a vortex tunnel / mandala feel.
      - Click or Space: pause
      - R: reseed
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";

    let seed = Math.floor(Math.random() * 999999999);
    let frame = 0;
    let paused = false;

    const TAU = Math.PI * 2;
    const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

    const SETTINGS = {
      rings: 34,
      symmetry: 14,
      layers: 5,
      branches: 6,
      branchSteps: 30,
      starDots: 900,
      spinSpeed: 0.0036,
      spiralPull: 5.4,
      tunnelDepth: 980,
      objectScale: 1.0
    };

    const RGB = [
      { name: "red",   color: new THREE.Color(1.0, 0.11, 0.08), emissive: new THREE.Color(0.75, 0.02, 0.01) },
      { name: "green", color: new THREE.Color(0.0, 1.0, 0.28),  emissive: new THREE.Color(0.0, 0.72, 0.16) },
      { name: "blue",  color: new THREE.Color(0.12, 0.42, 1.0), emissive: new THREE.Color(0.02, 0.18, 0.8) }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.0018);

    const camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      0.1,
      2600
    );
    camera.position.set(0, 0, 720);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.6));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const root = new THREE.Group();
    const tunnel = new THREE.Group();
    const starfield = new THREE.Group();

    scene.add(root);
    root.add(tunnel);
    root.add(starfield);

    const ambient = new THREE.AmbientLight(0x222244, 0.75);
    scene.add(ambient);

    const pointA = new THREE.PointLight(0x33ff99, 1.3, 1500);
    pointA.position.set(220, -180, 360);
    scene.add(pointA);

    const pointB = new THREE.PointLight(0x3355ff, 1.0, 1400);
    pointB.position.set(-260, 180, 220);
    scene.add(pointB);

    const pointC = new THREE.PointLight(0xff2222, 0.8, 1300);
    pointC.position.set(0, 0, 650);
    scene.add(pointC);

    function fract(v) {
      return v - Math.floor(v);
    }

    function hash(n) {
      return fract(Math.sin(n * 91.3458 + seed * 0.000031) * 47453.5453123);
    }

    function hash2(x, y, salt = 0) {
      return hash(x * 127.1 + y * 311.7 + salt * 74.3);
    }

    function smoothNoise(x, y, salt = 0) {
      const ix = Math.floor(x);
      const iy = Math.floor(y);
      const fx = fract(x);
      const fy = fract(y);

      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);

      const a = hash2(ix, iy, salt);
      const b = hash2(ix + 1, iy, salt);
      const c = hash2(ix, iy + 1, salt);
      const d = hash2(ix + 1, iy + 1, salt);

      return THREE.MathUtils.lerp(
        THREE.MathUtils.lerp(a, b, ux),
        THREE.MathUtils.lerp(c, d, ux),
        uy
      );
    }

    function fbm(x, y, octaves = 3, salt = 0) {
      let value = 0;
      let amp = 0.5;
      let freq = 1;
      let norm = 0;

      for (let i = 0; i < octaves; i++) {
        value += smoothNoise(x * freq, y * freq, salt + i * 31.17) * amp;
        norm += amp;
        amp *= 0.54;
        freq *= 2.0;
      }

      return value / norm;
    }

    function colorIndex(id) {
      return Math.floor(hash(id) * 3);
    }

    function makeTriangleGeometry() {
      const shape = new THREE.Shape();
      const r = 1;
      for (let i = 0; i < 3; i++) {
        const a = -Math.PI / 2 + i * TAU / 3;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      shape.closePath();

      return new THREE.ExtrudeGeometry(shape, {
        depth: 0.08,
        bevelEnabled: false
      });
    }

    const triangleGeometry = makeTriangleGeometry();
    const squareGeometry = new THREE.BoxGeometry(1.55, 1.55, 0.08);
    const lineTriangleGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 1, 0),
      new THREE.Vector3(-0.866, -0.5, 0),
      new THREE.Vector3(0.866, -0.5, 0),
      new THREE.Vector3(0, 1, 0)
    ]);
    const lineSquareGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.7, -0.7, 0),
      new THREE.Vector3(0.7, -0.7, 0),
      new THREE.Vector3(0.7, 0.7, 0),
      new THREE.Vector3(-0.7, 0.7, 0),
      new THREE.Vector3(-0.7, -0.7, 0)
    ]);

    function makeMaterials() {
      return RGB.map((entry) => ({
        solid: new THREE.MeshBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.28,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        }),
        line: new THREE.LineBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.72,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      }));
    }

    let materials = makeMaterials();
    const objects = [];
    const stars = [];

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();

        if (child.geometry) child.geometry.dispose();
        if (child.material && !Array.isArray(child.material)) {
          // Shared materials are intentionally not disposed here.
        }
      }
    }

    function addShape(id, sides, x, y, z, size, angle, layer, alpha) {
      const ci = colorIndex(id);
      const mats = materials[ci];
      const group = new THREE.Group();

      const solidGeometry = sides === 3 ? triangleGeometry : squareGeometry;
      const lineGeometry = sides === 3 ? lineTriangleGeometry : lineSquareGeometry;

      const mesh = new THREE.Mesh(solidGeometry, mats.solid);
      const line = new THREE.Line(lineGeometry, mats.line);

      mesh.scale.setScalar(size);
      line.scale.setScalar(size * 1.08);

      group.add(mesh);
      group.add(line);

      group.position.set(x, y, z);
      group.rotation.set(
        Math.sin(id * 0.013) * 0.55,
        Math.cos(id * 0.017) * 0.55,
        angle
      );

      group.userData = {
        id,
        baseX: x,
        baseY: y,
        baseZ: z,
        baseAngle: angle,
        baseSize: size,
        layer,
        alpha,
        colorIndex: ci,
        orbitRate: 0.00065 + hash(id + 5.5) * 0.0014,
        spinRate: (hash(id + 8.8) > 0.5 ? 1 : -1) * (0.006 + hash(id + 9.9) * 0.012),
        breatheRate: 0.012 + hash(id + 11.1) * 0.02,
        breathePhase: hash(id + 12.2) * TAU
      };

      tunnel.add(group);
      objects.push(group);
    }

    function buildMandala() {
      objects.length = 0;
      stars.length = 0;

      clearGroup(tunnel);
      clearGroup(starfield);

      const rings = SETTINGS.rings;
      const symmetry = SETTINGS.symmetry;
      const tunnelDepth = SETTINGS.tunnelDepth;

      for (let layer = 0; layer < SETTINGS.layers; layer++) {
        const layerScale = 1 - layer * 0.055;
        const layerAlpha = 0.13 + layer * 0.012;

        for (let r = 2; r < rings; r++) {
          const rNorm = r / rings;
          const ringRadius = Math.pow(rNorm, 1.22) * 430 * layerScale;
          const count = Math.max(symmetry, Math.floor(symmetry + r * 1.08));
          const cell = TAU / count;
          const depthPhase = (1 - rNorm) * tunnelDepth - tunnelDepth * 0.45;

          for (let i = 0; i < count; i++) {
            const baseTheta = i * cell;
            const id = layer * 100000 + r * 1000 + i;

            const n = fbm(
              Math.cos(baseTheta * 1.65 + layer) * 1.9 + rNorm * 4.6,
              Math.sin(baseTheta * 1.65 - layer) * 1.9 - rNorm * 4.6,
              3,
              layer * 101 + r * 9
            );

            const petal = Math.sin(baseTheta * symmetry + rNorm * 12);
            const gate = n + petal * 0.12 + Math.sin(rNorm * TAU * 5) * 0.08;

            if (gate < 0.49) continue;

            const spiral = SETTINGS.spiralPull * (1 - rNorm) + layer * 0.18;
            const theta = baseTheta + spiral;
            const wobble = (n - 0.5) * 24;
            const rr = ringRadius + wobble;

            const x = Math.cos(theta) * rr;
            const y = Math.sin(theta) * rr;
            const z = depthPhase + Math.sin(baseTheta * 3 + layer) * 65;

            if (Math.hypot(x, y) < 28) continue;

            const centerBoost = 1 - rNorm;
            const size = (5.2 + n * 15.5) * (0.78 + centerBoost * 1.06) * SETTINGS.objectScale;
            const sides = (r + i + layer) % 3 === 0 ? 4 : 3;
            const angle = theta + rNorm * TAU * 2.25 + layer * Math.PI / 9 + n * TAU;

            addShape(id, sides, x, y, z, size, angle, layer, layerAlpha + n * 0.2);
          }
        }
      }

      for (let s = 0; s < 12; s++) {
        const wedge = s * TAU / 12;

        for (let branch = 0; branch < SETTINGS.branches; branch++) {
          const twist = branch * GOLDEN_ANGLE;

          for (let j = 1; j < SETTINGS.branchSteps; j++) {
            const q = j / SETTINGS.branchSteps;
            const id = 5000000 + s * 100000 + branch * 1000 + j;
            const spiralR = q * q * 410;
            const theta = wedge + twist * 0.17 + q * (3.35 + branch * 0.18);
            const n = fbm(
              Math.cos(theta) * 2.7 + q * 4.4,
              Math.sin(theta) * 2.7 - q * 4.4,
              3,
              800 + branch * 61
            );

            if (n < 0.42) continue;

            const x = Math.cos(theta) * spiralR;
            const y = Math.sin(theta) * spiralR;
            const z = (0.5 - q) * tunnelDepth * 0.72 + Math.sin(q * TAU + branch) * 80;

            if (Math.hypot(x, y) < 28) continue;

            const pinch = Math.sin(q * Math.PI);
            const size = (4.0 + pinch * 16 * n) * SETTINGS.objectScale;
            const sides = branch % 2 ? 3 : 4;

            addShape(
              id,
              sides,
              x,
              y,
              z,
              size,
              theta + Math.PI / 2 + n * TAU,
              branch + 2,
              0.14 + n * 0.18
            );
          }
        }
      }

      for (let i = 0; i < SETTINGS.starDots; i++) {
        const id = 15000000 + i;
        const ci = colorIndex(id);
        const c = RGB[ci].color;

        const starGeometry = new THREE.BufferGeometry();
        const theta = hash(i * 2.1) * TAU;
        const rad = 120 + Math.pow(hash(i * 3.7), 0.55) * 880;
        const z = -720 + hash(i * 4.4) * 1500;

        starGeometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute([
            Math.cos(theta) * rad,
            Math.sin(theta) * rad,
            z
          ], 3)
        );

        const starMaterial = new THREE.PointsMaterial({
          color: c,
          size: 1.6 + hash(i * 5.5) * 2.5,
          transparent: true,
          opacity: 0.42,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const point = new THREE.Points(starGeometry, starMaterial);
        point.userData = {
          baseTheta: theta,
          baseRad: rad,
          baseZ: z,
          orbitRate: 0.00025 + hash(i * 6.6) * 0.0007
        };

        starfield.add(point);
        stars.push(point);
      }
    }

    function updateObjects() {
      const globalSpin = frame * SETTINGS.spinSpeed;

      root.rotation.z = globalSpin * 0.75;
      root.rotation.x = Math.sin(frame * 0.0011) * 0.08;
      root.rotation.y = Math.cos(frame * 0.0013) * 0.08;

      tunnel.rotation.z = globalSpin * 0.8;
      tunnel.rotation.y = Math.sin(frame * 0.0017) * 0.12;

      for (const obj of objects) {
        const u = obj.userData;
        const t = frame;
        const orbit = t * u.orbitRate;
        const radial = Math.hypot(u.baseX, u.baseY);
        const baseTheta = Math.atan2(u.baseY, u.baseX);
        const spiralDrag = (1 - Math.min(1, radial / 470)) * t * 0.0024;
        const theta = baseTheta + orbit + spiralDrag;

        obj.position.x = Math.cos(theta) * radial;
        obj.position.y = Math.sin(theta) * radial;
        obj.position.z = u.baseZ + Math.sin(t * 0.008 + u.id * 0.01) * 18;

        const breathe = 1 + Math.sin(t * u.breatheRate + u.breathePhase) * 0.09;
        obj.scale.setScalar(breathe);

        obj.rotation.z = u.baseAngle + t * u.spinRate;
        obj.rotation.x = Math.sin(t * 0.004 + u.id * 0.02) * 0.55;
        obj.rotation.y = Math.cos(t * 0.003 + u.id * 0.015) * 0.55;
      }

      for (const star of stars) {
        const u = star.userData;
        const theta = u.baseTheta + frame * u.orbitRate;
        star.position.x = Math.cos(theta) * u.baseRad;
        star.position.y = Math.sin(theta) * u.baseRad;
        star.position.z = u.baseZ + Math.sin(frame * 0.002 + u.baseRad * 0.01) * 45;
      }

      camera.position.x = Math.sin(frame * 0.0015) * 46;
      camera.position.y = Math.cos(frame * 0.0012) * 34;
      camera.position.z = 690 + Math.sin(frame * 0.0018) * 70;
      camera.lookAt(0, 0, -40);
    }

    function animate() {
      if (!paused) {
        frame++;
        updateObjects();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function reseed() {
      seed = Math.floor(Math.random() * 999999999);
      frame = 0;
      buildMandala();
      updateObjects();
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.6));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener("click", () => {
      paused = !paused;
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === " ") {
        event.preventDefault();
        paused = !paused;
      }

      if (key === "r") {
        reseed();
      }
    });

    buildMandala();
    updateObjects();
    animate();
  </script>
</body>
</html>
