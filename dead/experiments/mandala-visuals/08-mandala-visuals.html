<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Infinite Spiral Vortex Mandala - Three.js 3D Balanced Core</title>
  <style>
    /*
      RGB Infinite Spiral Vortex Mandala - Three.js 3D Balanced Core

      This patch fixes the "empty haunted donut" problem:
      - Center is active again, but not blown out.
      - Added a dim central mandala/core lattice.
      - Added mid-radius spiral arms so the field has more motion/detail.
      - Slightly brighter materials, but still below nuclear-screen-burn territory.
      - Kept extra spacing from the previous version.
      - Red / green / blue buckets remain roughly equal.
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";

    let seed = Math.floor(Math.random() * 999999999);
    let frame = 0;
    let paused = false;

    const TAU = Math.PI * 2;
    const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

    const SETTINGS = {
      rings: 30,
      symmetry: 12,
      layers: 5,
      branches: 5,
      branchSteps: 26,
      coreRings: 7,
      coreSymmetry: 10,
      starDots: 620,
      spinSpeed: 0.0033,
      spiralPull: 4.95,
      tunnelDepth: 1120,
      objectScale: 0.86,
      centerVoid: 54,
      ringSpread: 540
    };

    const RGB = [
      { name: "red",   color: new THREE.Color(1.0, 0.13, 0.09) },
      { name: "green", color: new THREE.Color(0.0, 1.0, 0.34) },
      { name: "blue",  color: new THREE.Color(0.14, 0.46, 1.0) }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.00215);

    const camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      0.1,
      2800
    );
    camera.position.set(0, 0, 820);
    camera.lookAt(0, 0, -60);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.45));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const root = new THREE.Group();
    const tunnel = new THREE.Group();
    const core = new THREE.Group();
    const starfield = new THREE.Group();

    scene.add(root);
    root.add(tunnel);
    root.add(core);
    root.add(starfield);

    const ambient = new THREE.AmbientLight(0x16162a, 0.64);
    scene.add(ambient);

    const pointA = new THREE.PointLight(0x33ff99, 0.90, 1500);
    pointA.position.set(260, -200, 460);
    scene.add(pointA);

    const pointB = new THREE.PointLight(0x3355ff, 0.76, 1500);
    pointB.position.set(-300, 220, 360);
    scene.add(pointB);

    const pointC = new THREE.PointLight(0xff2222, 0.58, 1400);
    pointC.position.set(0, 0, 720);
    scene.add(pointC);

    function fract(v) {
      return v - Math.floor(v);
    }

    function hash(n) {
      return fract(Math.sin(n * 91.3458 + seed * 0.000031) * 47453.5453123);
    }

    function hash2(x, y, salt = 0) {
      return hash(x * 127.1 + y * 311.7 + salt * 74.3);
    }

    function smoothNoise(x, y, salt = 0) {
      const ix = Math.floor(x);
      const iy = Math.floor(y);
      const fx = fract(x);
      const fy = fract(y);

      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);

      const a = hash2(ix, iy, salt);
      const b = hash2(ix + 1, iy, salt);
      const c = hash2(ix, iy + 1, salt);
      const d = hash2(ix + 1, iy + 1, salt);

      return THREE.MathUtils.lerp(
        THREE.MathUtils.lerp(a, b, ux),
        THREE.MathUtils.lerp(c, d, ux),
        uy
      );
    }

    function fbm(x, y, octaves = 3, salt = 0) {
      let value = 0;
      let amp = 0.5;
      let freq = 1;
      let norm = 0;

      for (let i = 0; i < octaves; i++) {
        value += smoothNoise(x * freq, y * freq, salt + i * 31.17) * amp;
        norm += amp;
        amp *= 0.54;
        freq *= 2.0;
      }

      return value / norm;
    }

    function colorIndex(id) {
      return Math.floor(hash(id) * 3);
    }

    function makeTriangleGeometry() {
      const shape = new THREE.Shape();
      const r = 1;

      for (let i = 0; i < 3; i++) {
        const a = -Math.PI / 2 + i * TAU / 3;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;

        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }

      shape.closePath();

      return new THREE.ExtrudeGeometry(shape, {
        depth: 0.06,
        bevelEnabled: false
      });
    }

    const triangleGeometry = makeTriangleGeometry();
    const squareGeometry = new THREE.BoxGeometry(1.45, 1.45, 0.06);

    const lineTriangleGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 1, 0),
      new THREE.Vector3(-0.866, -0.5, 0),
      new THREE.Vector3(0.866, -0.5, 0),
      new THREE.Vector3(0, 1, 0)
    ]);

    const lineSquareGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.7, -0.7, 0),
      new THREE.Vector3(0.7, -0.7, 0),
      new THREE.Vector3(0.7, 0.7, 0),
      new THREE.Vector3(-0.7, 0.7, 0),
      new THREE.Vector3(-0.7, -0.7, 0)
    ]);

    function makeMaterials() {
      return RGB.map((entry) => ({
        solid: new THREE.MeshBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.16,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          side: THREE.DoubleSide
        }),
        line: new THREE.LineBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.55,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        }),
        coreLine: new THREE.LineBasicMaterial({
          color: entry.color,
          transparent: true,
          opacity: 0.38,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      }));
    }

    let materials = makeMaterials();
    const objects = [];
    const coreObjects = [];
    const stars = [];

    function clearGroup(group) {
      while (group.children.length) {
        group.remove(group.children[0]);
      }
    }

    function addShape(parent, list, id, sides, x, y, z, size, angle, layer, isCore = false) {
      const ci = colorIndex(id);
      const mats = materials[ci];
      const group = new THREE.Group();

      const solidGeometry = sides === 3 ? triangleGeometry : squareGeometry;
      const lineGeometry = sides === 3 ? lineTriangleGeometry : lineSquareGeometry;

      const mesh = new THREE.Mesh(solidGeometry, mats.solid);
      const line = new THREE.Line(lineGeometry, isCore ? mats.coreLine : mats.line);

      mesh.scale.setScalar(size);
      line.scale.setScalar(size * 1.08);

      group.add(mesh);
      group.add(line);

      group.position.set(x, y, z);
      group.rotation.set(
        Math.sin(id * 0.013) * 0.48,
        Math.cos(id * 0.017) * 0.48,
        angle
      );

      group.userData = {
        id,
        baseX: x,
        baseY: y,
        baseZ: z,
        baseAngle: angle,
        baseSize: size,
        layer,
        isCore,
        orbitRate: (isCore ? 0.0009 : 0.00045) + hash(id + 5.5) * (isCore ? 0.0014 : 0.0010),
        spinRate: (hash(id + 8.8) > 0.5 ? 1 : -1) * ((isCore ? 0.007 : 0.004) + hash(id + 9.9) * 0.009),
        breatheRate: (isCore ? 0.014 : 0.009) + hash(id + 11.1) * 0.014,
        breathePhase: hash(id + 12.2) * TAU
      };

      parent.add(group);
      list.push(group);
    }

    function buildCore() {
      for (let ring = 1; ring <= SETTINGS.coreRings; ring++) {
        const q = ring / SETTINGS.coreRings;
        const radius = 22 + Math.pow(q, 1.18) * 128;
        const count = SETTINGS.coreSymmetry + ring * 4;

        for (let i = 0; i < count; i++) {
          const id = 9000000 + ring * 1000 + i;
          const theta = i * TAU / count + ring * GOLDEN_ANGLE;
          const n = fbm(Math.cos(theta) * ring * 0.35, Math.sin(theta) * ring * 0.35, 3, 3000 + ring);
          const r = radius + (n - 0.5) * 10;
          const z = -85 + (q - 0.5) * 180 + Math.sin(theta * 3) * 12;

          const x = Math.cos(theta) * r;
          const y = Math.sin(theta) * r;
          const sides = (i + ring) % 2 ? 3 : 4;

          // Small, separated core objects: active center, not radioactive pudding.
          const size = (3.0 + n * 7.8) * (1.1 - q * 0.18);

          addShape(
            core,
            coreObjects,
            id,
            sides,
            x,
            y,
            z,
            size,
            theta * 2 + n * TAU,
            ring,
            true
          );
        }
      }

      // A few faint RGB rings, because empty center was too funeral-home chic.
      for (let ring = 0; ring < 4; ring++) {
        const ci = ring % 3;
        const radius = 42 + ring * 34;
        const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, TAU, false, 0);
        const points = curve.getPoints(120).map((p) => new THREE.Vector3(p.x, p.y, -60 - ring * 28));
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.LineLoop(geometry, materials[ci].coreLine);
        line.userData = {
          ring,
          spinRate: (ring % 2 ? -1 : 1) * (0.0015 + ring * 0.0004)
        };
        core.add(line);
      }
    }

    function buildMandala() {
      objects.length = 0;
      coreObjects.length = 0;
      stars.length = 0;

      clearGroup(tunnel);
      clearGroup(core);
      clearGroup(starfield);

      const rings = SETTINGS.rings;
      const symmetry = SETTINGS.symmetry;
      const tunnelDepth = SETTINGS.tunnelDepth;

      for (let layer = 0; layer < SETTINGS.layers; layer++) {
        const layerScale = 1 - layer * 0.060;

        for (let r = 3; r < rings; r++) {
          const rNorm = r / rings;

          const ringRadius = (Math.pow(rNorm, 1.38) * SETTINGS.ringSpread + SETTINGS.centerVoid) * layerScale;
          const count = Math.max(symmetry, Math.floor(symmetry + r * 0.82));
          const cell = TAU / count;
          const depthPhase = (1 - rNorm) * tunnelDepth - tunnelDepth * 0.48;

          for (let i = 0; i < count; i++) {
            const baseTheta = i * cell;
            const id = layer * 100000 + r * 1000 + i;

            const n = fbm(
              Math.cos(baseTheta * 1.55 + layer) * 1.55 + rNorm * 3.8,
              Math.sin(baseTheta * 1.55 - layer) * 1.55 - rNorm * 3.8,
              3,
              layer * 101 + r * 9
            );

            const petal = Math.sin(baseTheta * symmetry + rNorm * 10);
            const gate = n + petal * 0.09 + Math.sin(rNorm * TAU * 4) * 0.055;

            // Slightly less strict than the spacious version, so there is actually a composition here.
            if (gate < 0.53) continue;

            const spiral = SETTINGS.spiralPull * (1 - rNorm) + layer * 0.18;
            const theta = baseTheta + spiral;
            const wobble = (n - 0.5) * 20;
            const rr = ringRadius + wobble;

            const x = Math.cos(theta) * rr;
            const y = Math.sin(theta) * rr;
            const z = depthPhase + Math.sin(baseTheta * 2.6 + layer) * 72;

            if (Math.hypot(x, y) < SETTINGS.centerVoid) continue;

            const centerBoost = 1 - rNorm;
            const size = (4.5 + n * 13.0) * (0.72 + centerBoost * 0.82) * SETTINGS.objectScale;
            const sides = (r + i + layer) % 3 === 0 ? 4 : 3;
            const angle = theta + rNorm * TAU * 2.1 + layer * Math.PI / 9 + n * TAU;

            addShape(tunnel, objects, id, sides, x, y, z, size, angle, layer);
          }
        }
      }

      for (let s = 0; s < 12; s++) {
        const wedge = s * TAU / 12;

        for (let branch = 0; branch < SETTINGS.branches; branch++) {
          const twist = branch * GOLDEN_ANGLE;

          for (let j = 2; j < SETTINGS.branchSteps; j++) {
            const q = j / SETTINGS.branchSteps;
            const id = 5000000 + s * 100000 + branch * 1000 + j;

            const spiralR = SETTINGS.centerVoid + 24 + q * q * 430;
            const theta = wedge + twist * 0.16 + q * (3.15 + branch * 0.17);
            const n = fbm(
              Math.cos(theta) * 2.4 + q * 3.8,
              Math.sin(theta) * 2.4 - q * 3.8,
              3,
              800 + branch * 61
            );

            if (n < 0.46) continue;

            const x = Math.cos(theta) * spiralR;
            const y = Math.sin(theta) * spiralR;
            const z = (0.5 - q) * tunnelDepth * 0.76 + Math.sin(q * TAU + branch) * 96;

            if (Math.hypot(x, y) < SETTINGS.centerVoid) continue;

            const pinch = Math.sin(q * Math.PI);
            const size = (3.8 + pinch * 13.2 * n) * SETTINGS.objectScale;
            const sides = branch % 2 ? 3 : 4;

            addShape(
              tunnel,
              objects,
              id,
              sides,
              x,
              y,
              z,
              size,
              theta + Math.PI / 2 + n * TAU,
              branch + 2
            );
          }
        }
      }

      buildCore();

      for (let i = 0; i < SETTINGS.starDots; i++) {
        const id = 15000000 + i;
        const ci = colorIndex(id);
        const c = RGB[ci].color;

        const starGeometry = new THREE.BufferGeometry();
        const theta = hash(i * 2.1) * TAU;
        const rad = 150 + Math.pow(hash(i * 3.7), 0.55) * 930;
        const z = -820 + hash(i * 4.4) * 1660;

        starGeometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute([
            Math.cos(theta) * rad,
            Math.sin(theta) * rad,
            z
          ], 3)
        );

        const starMaterial = new THREE.PointsMaterial({
          color: c,
          size: 1.2 + hash(i * 5.5) * 2.0,
          transparent: true,
          opacity: 0.31,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });

        const point = new THREE.Points(starGeometry, starMaterial);
        point.userData = {
          baseTheta: theta,
          baseRad: rad,
          baseZ: z,
          orbitRate: 0.00018 + hash(i * 6.6) * 0.0005
        };

        starfield.add(point);
        stars.push(point);
      }
    }

    function updateObjectList(list, radialLimit, coreMode = false) {
      for (const obj of list) {
        const u = obj.userData;
        const t = frame;
        const orbit = t * u.orbitRate;
        const radial = Math.hypot(u.baseX, u.baseY);
        const baseTheta = Math.atan2(u.baseY, u.baseX);
        const spiralDrag = (1 - Math.min(1, radial / radialLimit)) * t * (coreMode ? 0.0032 : 0.0020);
        const theta = baseTheta + orbit + spiralDrag;

        obj.position.x = Math.cos(theta) * radial;
        obj.position.y = Math.sin(theta) * radial;
        obj.position.z = u.baseZ + Math.sin(t * (coreMode ? 0.010 : 0.007) + u.id * 0.01) * (coreMode ? 9 : 14);

        const breathe = 1 + Math.sin(t * u.breatheRate + u.breathePhase) * (coreMode ? 0.075 : 0.055);
        obj.scale.setScalar(breathe);

        obj.rotation.z = u.baseAngle + t * u.spinRate;
        obj.rotation.x = Math.sin(t * 0.0032 + u.id * 0.02) * (coreMode ? 0.30 : 0.42);
        obj.rotation.y = Math.cos(t * 0.0026 + u.id * 0.015) * (coreMode ? 0.30 : 0.42);
      }
    }

    function updateObjects() {
      const globalSpin = frame * SETTINGS.spinSpeed;

      root.rotation.z = globalSpin * 0.62;
      root.rotation.x = Math.sin(frame * 0.0011) * 0.055;
      root.rotation.y = Math.cos(frame * 0.0013) * 0.055;

      tunnel.rotation.z = globalSpin * 0.78;
      tunnel.rotation.y = Math.sin(frame * 0.0017) * 0.085;

      core.rotation.z = -globalSpin * 1.55;
      core.rotation.x = Math.sin(frame * 0.0019) * 0.035;
      core.rotation.y = Math.cos(frame * 0.0016) * 0.035;

      updateObjectList(objects, 570, false);
      updateObjectList(coreObjects, 220, true);

      for (const child of core.children) {
        if (child.userData && typeof child.userData.spinRate === "number") {
          child.rotation.z = frame * child.userData.spinRate;
        }
      }

      for (const star of stars) {
        const u = star.userData;
        const theta = u.baseTheta + frame * u.orbitRate;
        star.position.x = Math.cos(theta) * u.baseRad;
        star.position.y = Math.sin(theta) * u.baseRad;
        star.position.z = u.baseZ + Math.sin(frame * 0.0018 + u.baseRad * 0.01) * 36;
      }

      camera.position.x = Math.sin(frame * 0.0013) * 34;
      camera.position.y = Math.cos(frame * 0.0011) * 26;
      camera.position.z = 805 + Math.sin(frame * 0.0015) * 48;
      camera.lookAt(0, 0, -80);
    }

    function animate() {
      if (!paused) {
        frame++;
        updateObjects();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function reseed() {
      seed = Math.floor(Math.random() * 999999999);
      frame = 0;
      buildMandala();
      updateObjects();
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.45));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener("click", () => {
      paused = !paused;
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === " ") {
        event.preventDefault();
        paused = !paused;
      }

      if (key === "r") {
        reseed();
      }
    });

    buildMandala();
    updateObjects();
    animate();
  </script>
</body>
</html>
