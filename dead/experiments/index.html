<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/dead/experiments/experiments.html</title>
<script>
const standaloneParams = new URLSearchParams(window.location.search);
const allowStandalone = standaloneParams.get('standalone') === 'true';

if (window.top === window.self && !allowStandalone) {
  const shellFramePath = '/dead/experiments/' + window.location.search + window.location.hash;
  window.sessionStorage.setItem('deadRootShellFramePath', shellFramePath);
  window.location.replace('/?frame=' + encodeURIComponent(shellFramePath));
}
</script>
<style>
:root{
  --page-bg:#000;
  --panel-bg:#512A67;
  --text:#00ff00;
  --accent:#00ff00;
  --hover-bg:#2a0042;
  --font:"Courier New", monospace;
}

*{box-sizing:border-box;}
html,body{
  margin:0;
  color:var(--text);
  font-family:var(--font);
  overflow:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

html{
  background:transparent !important;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar{
  display:none;
}


body{
  padding:20px;
  position:relative;
  min-height:100vh;
  min-height:100dvh;
  background:transparent !important;
  isolation:isolate;
}

.header,
#links,
.edit-note{
  position:relative;
  z-index:1;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  margin-bottom:24px;
}

.header-copy{
  flex:1 1 auto;
  min-width:0;
}

.title{
  font-size:24px;
  font-weight:bold;
  margin:0 0 6px 0;
}

.subtitle{
  margin:0;
  opacity:.8;
  font-size:14px;
}

button{
  height:40px;
  padding:0 16px;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  color:var(--text);
  font-family:var(--font);
  cursor:pointer;
}

button:hover,
a.post:hover,
a.post:hover .post-copy{
  background:var(--hover-bg);
  background-color:var(--hover-bg);
}

#links{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:20px;
}

#links.list-view{
  display:block;
}

a.post{
  display:block;
  color:var(--text);
  text-decoration:none;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  background-color:var(--panel-bg);
  padding:10px;
}

.post-copy{
  background:var(--panel-bg);
}

.grid-view .post .thumb{
  aspect-ratio:16/9;
  margin-bottom:10px;
}

.list-view .post{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}

.list-view .post .thumb{
  width:160px;
  flex:0 0 160px;
  aspect-ratio:16/9;
}

.thumb{
  border:2px solid var(--accent);
  overflow:hidden;
  background:var(--panel-bg);
  position:relative;
}

.thumb img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.post-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:6px;
}

.post-desc{
  font-size:13px;
  opacity:.8;
  line-height:1.35;
}

.edit-note{
  margin-top:28px;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  padding:14px;
  font-size:14px;
  line-height:1.45;
}

code{
  color:var(--text);
}

@media (max-width: 900px){
  .header{
    flex-direction:column;
    align-items:stretch;
  }
}

@media (max-width: 768px){
  body{padding:12px;}
  .title{font-size:20px;}
  #links,
  #links.grid-view{
    grid-template-columns:1fr;
  }
  .list-view .post{
    display:block;
  }
  .list-view .post .thumb{
    width:100%;
    margin-bottom:10px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-copy">
    <h1 class="title">Web Experiments by @Honestly_Thomas (Tektite)</h1>
    <p class="subtitle">Weird ideas I vibe-coded into reality with ChatGPT.</p>
  </div>
</div>

<div id="links" class="list-view"></div>
<div class="edit-note">
  All experiments painstakingly hand vibe-coded in ChatGPT by Thomas Harrison aka @Honestly_Thomas (Tektite) / Copyright 2026 / theinternetisdead.org
</div>

<script>
const linksData = [
  {
    title: "Blotter Visualizer",
    description: "A visual experiment tucked under /dead/experiments/blotter-visualizer/.",
    url: "/dead/experiments/blotter-visualizer/",
    image: "/dead/images/link-thumbnails/dead-experiments-blotter-visualizer.png"
  },
  {
    title: "Canvas Backgrounds",
    description: "A collection of animated canvas background experiments.",
    url: "/dead/experiments/canvas-backgrounds/",
    image: "/dead/images/link-thumbnails/dead-experiments-canvas-backgrounds.png"
  },
  {
    title: "Chat Sandbox",
    description: "A Minecraft-esque chat/command messaging system for interacting with my site.",
    url: "/dead/experiments/chat-sandbox/",
    image: "/dead/images/link-thumbnails/dead-experiments-chat-sandbox.png"
  },
  {
    title: "God's Eye Art",
    description: "I made this recursive art in photoshop when I was 20 years old and I named it gods-eye.png and apparently turned it into a website using math.",
    url: "/dead/experiments/gods-eye/",
    image: "/dead/images/link-thumbnails/dead-experiments-gods-eye.png"
  },
  {
    title: "Mandala Visuals",
    description: "A series of mandala visual experiments.",
    url: "/dead/experiments/mandala-visuals/",
    image: "/dead/images/link-thumbnails/dead-experiments-mandala-visuals.png"
  },
  {
    title: "Photosphere Planet View",
    description: "Wrap an image around the planet/skybox to create some really trippy effects man.",
    url: "/dead/experiments/photosphere/",
    image: "/dead/images/link-thumbnails/dead-experiments-photosphere.png"
  },
  {
    title: "Sound Machine",
    description: "Make crazy sounding noises with a cool waveform visualizer I made just for you!",
    url: "/dead/experiments/sound-machine/",
    image: "/dead/images/link-thumbnails/dead-experiments-sound-machine.png"
  },
  {
    title: "Stacks",
    description: "A stacked-layout visual experiment.",
    url: "/dead/experiments/stacks/",
    image: "/dead/images/link-thumbnails/dead-experiments-stacks.png"
  },
  {
    title: "Test",
    description: "Experimental test pages and sketches.",
    url: "/dead/experiments/test/",
    image: "/dead/images/link-thumbnails/dead-experiments-test-habisky-mofo.png"
  }
];

const linksEl = document.getElementById('links');
const fallbackImage = "/dead/images/pngs/static.gif";

function renderLinks(){
  linksEl.className = 'list-view';
  linksEl.innerHTML = linksData.map(link => `
    <a class="post" href="${link.url}" data-index-frame-src="${link.url}">
      <div class="thumb"><img src="${link.image || fallbackImage}" alt="${link.title}"></div>
      <div class="post-copy">
        <div class="post-title">${link.title}</div>
        <div class="post-desc">${link.description || ''}</div>
      </div>
    </a>
  `).join('');
}

function getStandaloneUrl(frameSrc){
  const url = new URL(frameSrc, window.location.origin);
  url.pathname = url.pathname.replace(/\/?$/, '/index.html');
  url.searchParams.set('standalone', 'true');
  return url.href;
}

function openLinkInRootFrame(event){
  const link = event.target.closest('a[data-index-frame-src]');
  if (!link) return;

  const frameSrc = link.getAttribute('data-index-frame-src');
  if (event.shiftKey && frameSrc) {
    event.preventDefault();
    window.location.href = getStandaloneUrl(frameSrc);
    return;
  }

  const parentController = window.parent && window.parent !== window
    ? window.parent.indexFrameController
    : null;

  if (!frameSrc || !parentController || typeof parentController.setSource !== 'function') {
    return;
  }

  event.preventDefault();
  parentController.setSource(frameSrc, { historyMode: 'push' });
}

linksEl.addEventListener('click', openLinkInRootFrame);

renderLinks();
</script>

</body>
</html>
