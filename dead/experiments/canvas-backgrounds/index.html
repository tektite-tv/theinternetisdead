<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>/dead/experiments/canvas-backgrounds/</title>
<script>
const standaloneParams = new URLSearchParams(window.location.search);
const allowStandalone = standaloneParams.get('standalone') === 'true';

if (window.top === window.self && !allowStandalone) {
  window.sessionStorage.setItem('deadRootShellFramePath', '/dead/experiments/canvas-backgrounds/' + window.location.search + window.location.hash);
  window.location.replace('/');
}
</script>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(0, 0, 0, 0.72);
      --panel-border: rgba(180, 255, 90, 0.8);
      --panel-text: #d7ff7a;
      --muted-text: rgba(255, 255, 255, 0.72);
      --fullscreen-transition: opacity 180ms ease, transform 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #background-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      pointer-events: auto;
    }

    #info-panel {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      max-width: min(32rem, calc(100vw - 2rem));
      padding: 0.75rem 0.9rem;
      border: 2px solid var(--panel-border);
      border-radius: 0.9rem;
      background: var(--panel-bg);
      color: var(--panel-text);
      box-shadow: 0 0 18px rgba(180, 255, 90, 0.22);
      cursor: pointer;
      user-select: none;
      z-index: 2;
      transition: var(--fullscreen-transition);
    }

    body.fullscreen-clean #info-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateY(0.75rem);
    }

    #title-row {
      display: flex;
      gap: 0.55rem;
      align-items: baseline;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    #counter {
      color: var(--muted-text);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    #background-description {
      display: block;
      margin-top: 0.45rem;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.88rem;
      line-height: 1.35;
      text-transform: none;
    }

    #hint {
      margin-top: 0.35rem;
      color: var(--muted-text);
      font-size: 0.85rem;
    }

    #empty-state {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      color: var(--panel-text);
      text-align: center;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      z-index: 3;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <iframe id="background-frame" title="Canvas background preview"></iframe>

  <aside id="info-panel" aria-live="polite">
    <div id="title-row">
      <span id="background-title">Loading backgrounds...</span>
      <span id="counter"></span>
    </div>
    <div id="background-description">Summoning the wallpaper goblins...</div>
    <div id="hint">← / → switch backgrounds. F toggles fullscreen.</div>
  </aside>

  <main id="empty-state" class="hidden">
    <div>
      <strong>No canvas backgrounds found.</strong><br />
      Add HTML files to this folder and let the workflow regenerate /dead/JSON/canvas-backgrounds-index.json.
    </div>
  </main>

  <script>
    (() => {
      const INDEX_URL = '/dead/JSON/canvas-backgrounds-index.json';
      const frame = document.getElementById('background-frame');
      const title = document.getElementById('background-title');
      const counter = document.getElementById('counter');
      const hint = document.getElementById('hint');
      const description = document.getElementById('background-description');
      const emptyState = document.getElementById('empty-state');
      const infoPanel = document.getElementById('info-panel');

      const WALLPAPER_DESCRIPTIONS = {
        'cursed-background': 'Jagged purple staircase runes on black. Looks like a haunted carpet pattern achieved sentience. 9/10 cursed, sadly effective.',
        'demon-ascii': 'An ASCII demon sulking in terminal darkness. Very “your command prompt has unresolved childhood issues.” 8/10 menace.',
        'dot-lavalamp': 'Soft glowing blobs drifting around like a lava lamp got a math degree. 7/10, dangerously soothing.',
        'rainbow-background': 'A loud rainbow wash screaming optimism at a web page that did not consent. 8/10 color crime, somehow charming.',
        'starfield-background': 'Classic drifting stars, tasteful little fake cosmos for people who refuse ordinary black backgrounds. 8/10 space wallpaper behavior.',
        'starfield-background-reactive': 'A reactive starfield twitching like space just discovered user engagement. 9/10, annoyingly cool.',
        'starfield-background_reactive': 'A reactive starfield twitching like space just discovered user engagement. 9/10, annoyingly cool.',
        'starfield-background-warp': 'Warp tunnel stars doing sci-fi speed lines for a browser pretending it has engines. 9/10 ridiculous propulsion.',
        'starfield-background_warp': 'Warp tunnel stars doing sci-fi speed lines for a browser pretending it has engines. 9/10 ridiculous propulsion.'
      };

      let backgrounds = [];
      let currentIndex = 0;
      let frameKeyHandler = null;

      function normalizeEntry(entry) {
        if (typeof entry === 'string') {
          return {
            title: entry.replace(/\.html$/i, '').replace(/[-_]/g, ' '),
            path: `./${entry}`
          };
        }

        const file = entry.file || entry.path || '';
        return {
          title: entry.title || file.replace(/^\.\//, '').replace(/\.html$/i, '').replace(/[-_]/g, ' '),
          path: entry.path || `./${file}`
        };
      }

      function getBackgroundDescription(background) {
        const rawName = (background.path || background.title || '')
          .split('/')
          .pop()
          .replace(/\.html$/i, '');
        const normalizedName = rawName.replace(/_/g, '-');

        return WALLPAPER_DESCRIPTIONS[rawName]
          || WALLPAPER_DESCRIPTIONS[normalizedName]
          || 'Mystery wallpaper doing mystery wallpaper things. The machine refuses to explain itself, naturally. 6/10 suspicious.';
      }

      function showBackground(index) {
        if (!backgrounds.length) return;

        currentIndex = ((index % backgrounds.length) + backgrounds.length) % backgrounds.length;
        const background = backgrounds[currentIndex];

        frame.src = background.path;
        title.textContent = background.title || background.path;
        counter.textContent = `${currentIndex + 1} / ${backgrounds.length}`;
        description.textContent = getBackgroundDescription(background);
        hint.textContent = '← / → switch backgrounds. F toggles fullscreen.';
      }

      function nextBackground() {
        showBackground(currentIndex + 1);
      }

      function previousBackground() {
        showBackground(currentIndex - 1);
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (error) {
          console.warn('Fullscreen toggle failed:', error);
        }
      }

      function syncFullscreenChrome() {
        document.body.classList.toggle('fullscreen-clean', Boolean(document.fullscreenElement));
      }

      function handleNavigationKey(event) {
        const key = event.key.toLowerCase();

        if (key === 'arrowright') {
          event.preventDefault();
          nextBackground();
          return;
        }

        if (key === 'arrowleft') {
          event.preventDefault();
          previousBackground();
          return;
        }

        if (key === 'f') {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function attachFrameKeyboardControls() {
        try {
          const frameWindow = frame.contentWindow;
          if (!frameWindow) return;

          if (frameKeyHandler) {
            frameWindow.removeEventListener('keydown', frameKeyHandler);
          }

          frameKeyHandler = event => handleNavigationKey(event);
          frameWindow.addEventListener('keydown', frameKeyHandler);
        } catch (error) {
          // Cross-origin frames should not happen here, but iframe focus is a goblin circus.
        }
      }

      async function loadIndex() {
        try {
          const response = await fetch(`${INDEX_URL}?v=${Date.now()}`);
          if (!response.ok) throw new Error(`Could not load ${INDEX_URL}`);

          const data = await response.json();
          backgrounds = Array.isArray(data) ? data.map(normalizeEntry).filter(item => item.path) : [];

          if (!backgrounds.length) {
            emptyState.classList.remove('hidden');
            infoPanel.classList.add('hidden');
            return;
          }

          showBackground(0);
        } catch (error) {
          title.textContent = 'canvas-backgrounds-index.json failed to load';
          counter.textContent = '';
          console.error(error);
        }
      }

      infoPanel.addEventListener('click', nextBackground);
      frame.addEventListener('load', attachFrameKeyboardControls);
      document.addEventListener('keydown', handleNavigationKey);
      document.addEventListener('fullscreenchange', syncFullscreenChrome);

      loadIndex();
    })();
  </script>
</body>
</html>
