<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/media/images/pngs/dead-favicon.png" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>/dead/experiments/canvas-backgrounds/</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(0, 0, 0, 0.72);
      --panel-border: rgba(180, 255, 90, 0.8);
      --panel-text: #d7ff7a;
      --muted-text: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    #background-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      pointer-events: none;
    }

    #background-frame.is-interactive {
      pointer-events: auto;
    }

    #info-panel {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      max-width: min(32rem, calc(100vw - 2rem));
      padding: 0.75rem 0.9rem;
      border: 2px solid var(--panel-border);
      border-radius: 0.9rem;
      background: var(--panel-bg);
      color: var(--panel-text);
      box-shadow: 0 0 18px rgba(180, 255, 90, 0.22);
      user-select: none;
      z-index: 2;
    }

    #title-row {
      display: flex;
      gap: 0.55rem;
      align-items: baseline;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    #counter {
      color: var(--muted-text);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    #hint {
      margin-top: 0.25rem;
      color: var(--muted-text);
      font-size: 0.85rem;
    }

    #empty-state {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      color: var(--panel-text);
      text-align: center;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      z-index: 3;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <iframe id="background-frame" title="Canvas background preview"></iframe>

  <aside id="info-panel" aria-live="polite">
    <div id="title-row">
      <span id="background-title">Loading backgrounds...</span>
      <span id="counter"></span>
    </div>
    <div id="hint">Click anywhere to switch backgrounds.</div>
  </aside>

  <main id="empty-state" class="hidden">
    <div>
      <strong>No canvas backgrounds found.</strong><br />
      Add HTML files to this folder and let the workflow regenerate index.json.
    </div>
  </main>

  <script>
    (() => {
      const INDEX_URL = './index.json';
      const frame = document.getElementById('background-frame');
      const title = document.getElementById('background-title');
      const counter = document.getElementById('counter');
      const hint = document.getElementById('hint');
      const emptyState = document.getElementById('empty-state');
      const infoPanel = document.getElementById('info-panel');

      let backgrounds = [];
      let currentIndex = 0;

      function normalizeEntry(entry) {
        if (typeof entry === 'string') {
          return {
            title: entry.replace(/\.html$/i, '').replace(/[-_]/g, ' '),
            path: `./${entry}`
          };
        }

        const file = entry.file || entry.path || '';
        return {
          title: entry.title || file.replace(/^\.\//, '').replace(/\.html$/i, '').replace(/[-_]/g, ' '),
          path: entry.path || `./${file}`,
          interactive: Boolean(entry.interactive)
        };
      }

      function showBackground(index) {
        if (!backgrounds.length) return;

        currentIndex = ((index % backgrounds.length) + backgrounds.length) % backgrounds.length;
        const background = backgrounds[currentIndex];

        frame.src = background.path;
        frame.classList.toggle('is-interactive', Boolean(background.interactive));
        title.textContent = background.title || background.path;
        counter.textContent = `${currentIndex + 1} / ${backgrounds.length}`;
        hint.textContent = background.interactive
          ? 'Move/click to interact. Click this panel or use arrow keys to switch.'
          : 'Click anywhere to switch backgrounds.';
      }

      function nextBackground() {
        showBackground(currentIndex + 1);
      }

      async function loadIndex() {
        try {
          const response = await fetch(`${INDEX_URL}?v=${Date.now()}`);
          if (!response.ok) throw new Error(`Could not load ${INDEX_URL}`);

          const data = await response.json();
          backgrounds = Array.isArray(data) ? data.map(normalizeEntry).filter(item => item.path) : [];

          if (!backgrounds.length) {
            emptyState.classList.remove('hidden');
            infoPanel.classList.add('hidden');
            return;
          }

          showBackground(0);
        } catch (error) {
          title.textContent = 'index.json failed to load';
          counter.textContent = '';
          console.error(error);
        }
      }

      document.addEventListener('click', nextBackground);
      document.addEventListener('keydown', event => {
        if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          nextBackground();
        }

        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          showBackground(currentIndex - 1);
        }
      });

      loadIndex();
    })();
  </script>
</body>
</html>
