<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>theinternetisdead.org feeds</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
    }

    #site-shell,
    #main-content,
    #tektite-header-frame,
    #tektite-frame {
      background-color: #000;
    }

    body {
      position: relative;
      --overlay-height: 76px;
      --tektite-header-height: 0px;
      --tektite-header-collapsed-height: 0px;
      --site-scale: 0.75;
    }

    #site-shell {
      position: fixed;
      left: 0;
      top: var(--overlay-height, 76px);
      width: calc(100% / var(--site-scale));
      height: calc((100vh - var(--overlay-height, 76px)) / var(--site-scale));
      transform: scale(var(--site-scale));
      transform-origin: top left;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #overlay-container {
      width: 100%;
      flex: 0 0 auto;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    #main-content {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    #tektite-header-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0;
      border: none;
      display: block;
      overflow: hidden;
      z-index: 30;
      pointer-events: none;
      transform: translateY(-100%);
      transition: transform 240ms ease;
    }

    body.feed-header-open #tektite-header-frame {
      pointer-events: auto;
      transform: translateY(0);
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #mobile-feed-header-hit-target {
      display: none;
    }

    .overlay-error {
      padding: 12px 16px;
      background: #111;
      color: #ff6666;
      border-bottom: 1px solid #333;
      font-family: monospace;
    }

    @media (max-width: 768px) {
      #site-shell {
        top: var(--overlay-height, 76px);
        height: calc((100vh - var(--overlay-height, 76px)) / var(--site-scale));
      }

      #tektite-header-frame {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        width: 100%;
        flex: 0 0 auto;
        pointer-events: auto;
        transform: none;
        transition: none;
        z-index: 1100;
      }

      #main-content {
        flex: 0 0 auto;
        height: calc(100% - var(--tektite-header-collapsed-height, 0px));
      }

      #mobile-feed-header-hit-target {
        position: fixed;
        top: var(--overlay-height, 76px);
        left: 0;
        right: 0;
        display: block;
        height: 60px;
        z-index: 1200;
        background: transparent;
        pointer-events: auto;
        touch-action: pan-y;
        cursor: grab;
      }

      body.feed-header-open #tektite-header-frame {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <div id="site-shell">
    <iframe
      id="tektite-header-frame"
      src="/dead/stuff/stuff-for-index/feeds/feeds-header.html"
      title="Tektite Feed Header"
      loading="eager"
      scrolling="no"
    ></iframe>
    <div id="main-content">
      <iframe
        id="tektite-frame"
        src="/dead/stuff/stuff-for-index/feeds/feeds.html"
        title="Tektite Index"
        loading="eager"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <div id="mobile-feed-header-hit-target" aria-hidden="true"></div>

  <script>
    const overlayContainer = document.getElementById('overlay-container');
    const tektiteHeaderFrame = document.getElementById('tektite-header-frame');
    const tektiteFrame = document.getElementById('tektite-frame');
    const mobileFeedHeaderHitTarget = document.getElementById('mobile-feed-header-hit-target');
    let tektiteHeaderHeight = 0;
    let tektiteHeaderCollapsedHeight = 0;
    let overlayHovering = false;
    let feedHeaderHovering = false;
    let mobileFeedHeaderDragging = false;
    let mobileFeedHeaderMoved = false;
    let mobileFeedHeaderStartY = 0;
    let mobileFeedHeaderStartProgress = 0;
    let mobileFeedHeaderProgress = 0;

    async function loadOverlay() {
      try {
        const response = await fetch('/dead/stuff/nav/nav.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load /dead/stuff/nav/nav.html');
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
          if (node.nodeName && node.nodeName.toLowerCase() === 'script') {
            scripts.push(node);
          } else {
            fragment.appendChild(node.cloneNode(true));
          }
        });

        overlayContainer.innerHTML = '';
        overlayContainer.appendChild(fragment);

        scripts.forEach((oldScript) => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach((attr) => {
            newScript.setAttribute(attr.name, attr.value);
          });
          newScript.textContent = oldScript.textContent;
          overlayContainer.appendChild(newScript);
        });

        syncOverlayLayoutHeight();
        requestAnimationFrame(syncOverlayLayoutHeight);
      } catch (error) {
        console.error('Error loading /dead/stuff/nav/nav.html', error);
        overlayContainer.innerHTML = '<div class="overlay-error">Error loading /dead/stuff/nav/nav.html</div>';
      }
    }

    function syncOverlayLayoutHeight() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root');
      const overlayHeight = overlayRoot ? Math.ceil(overlayRoot.getBoundingClientRect().height) : overlayContainer.offsetHeight;
      document.body.style.setProperty('--overlay-height', `${Math.max(overlayHeight, 1)}px`);
    }

    function setTektiteHeaderHeight(height) {
      const nextHeight = Math.max(0, parseInt(height, 10) || 0);
      if (nextHeight === tektiteHeaderHeight) return;
      tektiteHeaderHeight = nextHeight;
      tektiteHeaderFrame.style.height = `${tektiteHeaderHeight}px`;
      document.body.style.setProperty('--tektite-header-height', `${tektiteHeaderHeight}px`);
      if (isMobileFeedHeaderLayout()) {
        if (!tektiteHeaderCollapsedHeight || nextHeight < tektiteHeaderCollapsedHeight) {
          tektiteHeaderCollapsedHeight = nextHeight;
          document.body.style.setProperty('--tektite-header-collapsed-height', `${tektiteHeaderCollapsedHeight}px`);
        }
      } else {
        tektiteHeaderCollapsedHeight = nextHeight;
        document.body.style.setProperty('--tektite-header-collapsed-height', `${tektiteHeaderCollapsedHeight}px`);
      }
    }

    function measureTektiteHeader() {
      try {
        const doc = tektiteHeaderFrame.contentDocument || (tektiteHeaderFrame.contentWindow && tektiteHeaderFrame.contentWindow.document);
        if (!doc) return;
        const measured = Math.ceil(doc.documentElement.scrollHeight || doc.body.scrollHeight || 0);
        if (measured > 0) {
          setTektiteHeaderHeight(measured);
        }
      } catch (error) {
        console.warn('Unable to measure tektite header iframe', error);
      }
    }

    function isMobileFeedHeaderLayout() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function syncFeedHeaderVisibility() {
      document.body.classList.toggle('feed-header-open', isMobileFeedHeaderLayout() || overlayHovering || feedHeaderHovering);
    }

    function setMobileFeedHeaderProgress(progress, animated = false) {
      mobileFeedHeaderProgress = Math.max(0, Math.min(1, Number(progress) || 0));
      if (tektiteHeaderFrame.contentWindow) {
        tektiteHeaderFrame.contentWindow.postMessage({
          type: 'feedHeaderMobileDrawerProgress',
          progress: mobileFeedHeaderProgress,
          animated
        }, '*');
      }
    }

    const initialRootPath = '/dead/stuff/stuff-for-index/feeds/feeds-host.html';

    function getRootVideoIdFromRoute() {
      const params = new URLSearchParams(window.location.search);
      const queryVideoId = params.get('vid') || params.get('id') || '';
      if (queryVideoId.trim()) return queryVideoId.trim();

      const pathMatch = window.location.pathname.match(/^\/dead\/videos\/([^/]+)\/?$/);
      if (pathMatch) return decodeURIComponent(pathMatch[1]);

      const pendingVideoId = window.sessionStorage.getItem('deadVideoId') || '';
      if (pendingVideoId) {
        window.sessionStorage.removeItem('deadVideoId');
      }
      return pendingVideoId;
    }

    function getRootVideoUrl(videoId) {
      return `/?video_embed=${encodeURIComponent(videoId)}`;
    }

    function normalizeInitialRootVideoRoute() {
      const videoId = getRootVideoIdFromRoute();
      if (!videoId) return;

      const canonicalUrl = getRootVideoUrl(videoId);
      if (window.location.pathname === canonicalUrl && !window.location.search) return;

      window.history.replaceState(
        { videoId },
        '',
        canonicalUrl + (window.location.hash || '')
      );
    }

    function updateRootVideoRoute(action, videoId, videoTitle = '') {
      const nextUrl = action === 'open' && videoId
        ? getRootVideoUrl(videoId)
        : initialRootPath;
      window.history.replaceState({ videoId: videoId || null }, '', nextUrl);
    }

    function sendInitialRootVideoToFrame() {
      const videoId = getRootVideoIdFromRoute();
      if (!videoId || !tektiteFrame.contentWindow) return;
      tektiteFrame.contentWindow.postMessage({ type: 'feedGridOpenVideo', videoId }, '*');
    }

    function requestFeedHeaderState() {
      if (tektiteFrame.contentWindow) {
        tektiteFrame.contentWindow.postMessage({ type: 'feedGridHeaderCommand', action: 'requestState' }, '*');
      }
    }

    overlayContainer.addEventListener('mouseenter', () => {
      overlayHovering = true;
      syncFeedHeaderVisibility();
    });

    overlayContainer.addEventListener('mouseleave', () => {
      overlayHovering = false;
      syncFeedHeaderVisibility();
    });

    tektiteHeaderFrame.addEventListener('mouseenter', () => {
      feedHeaderHovering = true;
      syncFeedHeaderVisibility();
    });

    tektiteHeaderFrame.addEventListener('mouseleave', () => {
      feedHeaderHovering = false;
      syncFeedHeaderVisibility();
    });

    mobileFeedHeaderHitTarget.addEventListener('pointerdown', (event) => {
      if (!isMobileFeedHeaderLayout()) return;
      mobileFeedHeaderDragging = true;
      mobileFeedHeaderMoved = false;
      mobileFeedHeaderStartY = event.clientY;
      mobileFeedHeaderStartProgress = mobileFeedHeaderProgress;
      mobileFeedHeaderHitTarget.setPointerCapture(event.pointerId);
      mobileFeedHeaderHitTarget.style.cursor = 'grabbing';
    });

    mobileFeedHeaderHitTarget.addEventListener('pointermove', (event) => {
      if (!mobileFeedHeaderDragging || !isMobileFeedHeaderLayout()) return;
      const delta = event.clientY - mobileFeedHeaderStartY;
      if (Math.abs(delta) > 4) mobileFeedHeaderMoved = true;
      setMobileFeedHeaderProgress(mobileFeedHeaderStartProgress + (delta / 120), false);
      event.preventDefault();
    });

    function endMobileFeedHeaderDrag(event) {
      if (!mobileFeedHeaderDragging) return;
      mobileFeedHeaderDragging = false;
      mobileFeedHeaderHitTarget.style.cursor = '';
      try {
        mobileFeedHeaderHitTarget.releasePointerCapture(event.pointerId);
      } catch (error) {}
      if (!mobileFeedHeaderMoved) {
        setMobileFeedHeaderProgress(mobileFeedHeaderStartProgress > 0.5 ? 0 : 1, true);
        return;
      }
      setMobileFeedHeaderProgress(mobileFeedHeaderProgress >= 0.35 ? 1 : 0, true);
    }

    mobileFeedHeaderHitTarget.addEventListener('pointerup', endMobileFeedHeaderDrag);
    mobileFeedHeaderHitTarget.addEventListener('pointercancel', endMobileFeedHeaderDrag);

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (event.source === tektiteHeaderFrame.contentWindow && data.type === 'feedGridHeaderSize') {
        setTektiteHeaderHeight(data.height);
        return;
      }

      if (event.source === tektiteHeaderFrame.contentWindow && data.type === 'feedGridHeaderCommand') {
        if (tektiteFrame.contentWindow) {
          tektiteFrame.contentWindow.postMessage(data, '*');
        }
        return;
      }

      if (event.source === tektiteFrame.contentWindow && data.type === 'feedGridHeaderState') {
        if (tektiteHeaderFrame.contentWindow) {
          tektiteHeaderFrame.contentWindow.postMessage(data, '*');
        }
        return;
      }

      if (event.source === tektiteFrame.contentWindow && data.type === 'feedGridVideoState') {
        updateRootVideoRoute(data.action, String(data.videoId || ''), String(data.videoTitle || ''));
      }
    });

    window.addEventListener('resize', () => {
      syncOverlayLayoutHeight();
      syncFeedHeaderVisibility();
      measureTektiteHeader();
    });

    tektiteHeaderFrame.addEventListener('load', () => {
      measureTektiteHeader();
      requestFeedHeaderState();
      syncFeedHeaderVisibility();
    });

    tektiteFrame.addEventListener('load', () => {
      sendInitialRootVideoToFrame();
      requestFeedHeaderState();
    });

    normalizeInitialRootVideoRoute();
    loadOverlay();
    syncFeedHeaderVisibility();
  </script>
</body>
</html>
