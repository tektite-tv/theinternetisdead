<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <link rel="preload" as="image" href="/dead/images/pngs/static.gif" />
  <title>Gaming Channels I Watch</title>
  <style>
    :root{
      --page-bg:black;
      --page-background:var(--page-bg);
      --panel-bg:#4b0076;
      --panel-background:var(--panel-bg);
      --page-text:#00ff00;
      --accent-color:var(--page-text);
      --header-bg:rgba(75,0,118,.5);
      --header-control-height:40px;
      --button-hover-bg:#2a0042;
      --thumbnail-filter: rgba(0, 255, 0, 0);
      --page-font-family:"Courier New", monospace;
      --page-font-scale:1;
      --feed-grid-gap:20px;
      --feed-card-padding:10px;
      --feed-visible-grid-rows:1;
      --feed-fit-gap-count:3;
      --feed-load-more-height:var(--header-control-height);
      --feed-grid-card-size:min(
        calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3),
        calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
      );
      --feed-header-row-gap:var(--feed-grid-gap);
      --feed-posts-x:20px;
      --feed-control-button-size:var(--header-control-height);
      /* UPDATED: mirror feeds.html's exact three-column math so this
         grid lines up when both pages are stacked inside feeds-bridge.html. */
      --feed-desktop-column-width:calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3);
    }

    *{box-sizing:border-box;}

    html,body{
      overflow-x:hidden;
      background:#000;
      color:var(--page-text);
      font-family:var(--page-font-family);
      margin:0;
      overflow:auto;
      scrollbar-width:none;
      -ms-overflow-style:none;
      font-size:calc(16px * var(--page-font-scale));
    }

    html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}

    body{
      min-height:100vh;
      min-height:100dvh;
    }

    a{color:inherit;}

    @keyframes overlay-ui-hueshift{
      from{filter:hue-rotate(0deg);}
      to{filter:hue-rotate(360deg);}
    }

    @keyframes overlay-ui-color-hueshift{
      0%{color:#00ff00;border-color:#00ff00;}
      33%{color:#00ffff;border-color:#00ffff;}
      66%{color:#ff00ff;border-color:#ff00ff;}
      100%{color:#00ff00;border-color:#00ff00;}
    }

    .shell{
      width:100%;
      min-height:100vh;
      min-height:100dvh;
      margin:0;
      padding:0;
      background:#000;
      position:relative;
      isolation:isolate;
    }

    header{
      display:flex;
      align-items:stretch;
      justify-content:center;
      flex-wrap:nowrap;
      gap:var(--feed-header-row-gap) var(--feed-grid-gap);
      padding:13px 20px var(--feed-header-row-gap);
      background:var(--header-bg);
      position:relative;
      z-index:20;
    }

    .titlePanel,
    .channelPicker,
    .controls{
      width:var(--feed-desktop-column-width);
      flex:0 0 var(--feed-desktop-column-width);
      min-width:0;
    }

    .titlePanel,
    .channelPicker{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:var(--header-control-height);
      padding:0 10px;
      background:#000;
      border:1px solid var(--accent-color);
      color:var(--page-text);
    }

    .channelPicker{
      padding:0;
    }

    .titlePanel select,
    .channelPicker select{
      width:100%;
      height:100%;
      min-height:var(--header-control-height);
      border:0;
      background:#000;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:calc(21px * var(--page-font-scale));
      font-weight:700;
      line-height:1.15;
      text-align:center;
    }

    .subtitle{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:var(--header-control-height);
      margin:0;
      padding:0 10px;
      background:#000;
      border:1px solid var(--accent-color);
      color:var(--page-text);
      font-size:calc(11px * var(--page-font-scale));
      font-weight:700;
      line-height:1.25;
      text-align:center;
      overflow:hidden;
    }

    .controls{
      display:flex;
      align-items:stretch;
      align-self:stretch;
      gap:6px;
      position:relative;
      z-index:21;
    }

    button,
    select,
    input{
      min-height:var(--header-control-height);
      border:1px solid var(--accent-color);
      background:#000;
      color:var(--page-text);
      font-family:var(--page-font-family);
      font-weight:700;
      font-size:calc(12px * var(--page-font-scale));
      box-sizing:border-box;
      outline:none;
      border-radius:0;
    }

    input{
      flex:1 1 0;
      min-width:0;
      padding:0 8px;
      font-size:calc(14px * var(--page-font-scale));
    }

    input::placeholder{color:var(--page-text);opacity:1;}

    select{
      flex:0 0 auto;
      width:124px;
      padding:0 8px;
      cursor:pointer;
    }

    #sortSelect{
      width:104px;
    }

    button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      align-self:stretch;
      height:auto;
      padding:0 10px;
      cursor:pointer;
      flex:0 0 auto;
      width:auto;
      min-width:var(--feed-control-button-size);
      white-space:nowrap;
    }

    #refreshButton{
      width:112px;
      padding:0 8px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    button:hover,
    button:focus-visible,
    select:hover,
    select:focus-visible,
    input:hover,
    input:focus-visible,
    a:hover,
    a:focus-visible{
      animation:overlay-ui-hueshift 1.8s linear infinite;
      outline:none;
    }

    .status{
      margin:0;
      padding:10px 20px;
      text-align:center;
      background:#000;
      color:var(--page-text);
      font-weight:700;
      font-size:calc(14px * var(--page-font-scale));
      line-height:1.35;
      position:relative;
      z-index:2;
    }

    .status strong{color:var(--accent-color);}

    #grid{
      padding:var(--feed-grid-gap) var(--feed-posts-x);
      margin-bottom:0;
      min-height:calc(100vh - 120px);
      min-height:calc(100dvh - 120px);
      box-sizing:border-box;
      position:relative;
      isolation:isolate;
      background-color:#000;
      overflow:hidden;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, var(--feed-grid-card-size));
      column-gap:var(--feed-grid-gap);
      row-gap:var(--feed-grid-gap);
      align-items:stretch;
      align-content:start;
      justify-content:center;
    }

    .card{
      border:2px solid var(--accent-color);
      padding:var(--feed-card-padding);
      cursor:pointer;
      background:var(--panel-background);
      box-sizing:border-box;
      aspect-ratio:1;
      height:auto;
      overflow:hidden;
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .card:hover,
    .card:focus-within{
      background:var(--button-hover-bg);
      background-color:var(--button-hover-bg);
    }

    .thumb-wrap{
      flex:1 1 auto;
      min-height:0;
      aspect-ratio:auto;
      overflow:hidden;
      border:2px solid var(--accent-color);
      margin-bottom:10px;
      background:var(--panel-background) url("/dead/images/pngs/static.gif") center / 100% 100% no-repeat;
      position:relative;
      isolation:isolate;
      display:block;
    }

    .card:hover .thumb-wrap,
    .card:focus-within .thumb-wrap{
      background-color:var(--button-hover-bg);
    }

    .thumb{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
      opacity:1;
      transition:opacity 1200ms ease;
    }

    .content{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-height:0;
      color:var(--page-text);
    }

    .channel{
      font-size:calc(13px * var(--page-font-scale));
      font-weight:700;
      opacity:.82;
      line-height:1.3;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .title{
      margin:0;
      font-size:calc(17px * var(--page-font-scale));
      font-weight:700;
      line-height:1.25;
      height:3.75em;
      overflow:hidden;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:3;
    }

    .title a{
      color:inherit;
      text-decoration:none;
    }

    .title a:hover,
    .title a:focus-visible{
      animation:overlay-ui-hueshift 1.8s linear infinite;
      outline:none;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:calc(13px * var(--page-font-scale));
      font-weight:700;
      opacity:.82;
      line-height:1.3;
      height:2.6em;
      overflow:hidden;
    }

    .summary{
      display:none;
    }

    .empty,
    .error{
      grid-column:1 / -1;
      padding:var(--feed-card-padding);
      border:2px solid var(--accent-color);
      background:var(--panel-background);
      color:var(--page-text);
      font-weight:700;
      line-height:1.5;
      text-align:center;
    }

    .error{
      border-color:#ff4d8d;
      color:#ffd8e6;
    }


    .video-lightbox{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,.88);
    }

    .video-lightbox.is-open{
      display:flex;
    }

    .video-lightbox-panel{
      width:min(1100px, calc(100vw - 40px));
      aspect-ratio:16 / 9;
      background:#000;
      border:2px solid var(--accent-color);
      box-shadow:0 0 0 6px rgba(75,0,118,.6);
      position:relative;
    }

    .video-lightbox iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .video-lightbox-close{
      position:absolute;
      left:50%;
      top:calc(100% + 14px);
      transform:translateX(-50%);
      min-width:0;
      min-height:0;
      height:auto;
      padding:0;
      border:0;
      background:transparent;
      color:var(--page-text);
      font-family:var(--page-font-family);
      font-size:calc(16px * var(--page-font-scale));
      font-weight:700;
      line-height:1.4;
      cursor:pointer;
      white-space:nowrap;
    }

    @media (max-width:768px){
      .video-lightbox{
        padding:8px;
      }

      .video-lightbox-panel{
        width:calc(100vw - 16px);
      }

      .video-lightbox-close{
        top:calc(100% + 12px);
        right:auto;
        bottom:auto;
        font-size:calc(15px * var(--page-font-scale));
      }
    }

    .sr-only{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    @media (max-width:768px){
      :root{
        --feed-card-padding:8px;
        --feed-grid-gap:calc(2 * var(--feed-card-padding));
        --feed-grid-card-size:min(
          calc(100vw - (2 * var(--feed-posts-x))),
          calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
        );
        --feed-header-row-gap:10px;
        --feed-posts-x:8px;
      }

      header{
        padding:16px 12px var(--feed-header-row-gap);
        flex-direction:column;
        align-items:stretch;
        gap:var(--feed-header-row-gap);
      }

      .titlePanel,
      .channelPicker,
      .controls{
        width:100%;
        flex:0 0 auto;
      }

      .titlePanel,
      .channelPicker,
      .channelPicker select,
      button,
      select,
      input{
        min-height:46px;
      }

      .subtitle{
        font-size:calc(11px * var(--page-font-scale));
      }

      h1{
        font-size:calc(19.5px * var(--page-font-scale));
      }

      .controls{
        display:flex;
        align-items:stretch;
        align-self:stretch;
        gap:6px;
        flex-wrap:nowrap;
      }

      input{
        flex:1 1 auto;
        min-width:0;
        font-size:calc(14px * var(--page-font-scale));
      }

      select,
      button{
        flex:0 0 auto;
        width:auto;
        padding:0 8px;
        font-size:calc(12px * var(--page-font-scale));
        white-space:nowrap;
      }

      #grid{
        padding:var(--feed-grid-gap) var(--feed-posts-x);
      }

      #sortSelect,
      #refreshButton{
        width:auto;
      }

      .grid{
        grid-template-columns:var(--feed-grid-card-size);
        gap:var(--feed-grid-gap);
      }

      .card{
        padding:var(--feed-card-padding);
      }

      .title{
        font-size:calc(16px * var(--page-font-scale));
      }

      .meta,
      .channel{
        font-size:calc(12.5px * var(--page-font-scale));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="titlePanel" aria-label="Group selector">
        <label class="sr-only" for="groupSelect">Select channel group</label>
        <select id="groupSelect">
          <option value="all">All Channels I Watch</option>
        </select>
      </div>

      <div class="channelPicker" aria-label="Channel title selector">
        <label class="sr-only" for="titleSelect">Select channel title</label>
        <select id="titleSelect">
          <option value="all">All Channel Titles</option>
        </select>
      </div>

      <div class="controls" aria-label="Playlist controls">
        <label class="sr-only" for="searchInput">Search videos</label>
        <input id="searchInput" type="search" placeholder="Search title, channel, or summary..." autocomplete="off" />

        <label class="sr-only" for="sortSelect">Sort order</label>
        <select id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>

        <button id="refreshButton" type="button">Refresh Feeds</button>
      </div>
    </header>

    <section id="status" class="status" role="status" aria-live="polite">Loading playlist config...</section>
    <section id="grid" class="grid" aria-label="YouTube RSS video grid"></section>

    <div id="videoLightbox" class="video-lightbox" aria-hidden="true">
      <div class="video-lightbox-panel" role="dialog" aria-modal="true" aria-label="Embedded YouTube video player">
        <button id="videoLightboxClose" class="video-lightbox-close" type="button" aria-label="Close video">[Close Video]</button>
        <iframe
          id="videoLightboxFrame"
          title="YouTube video player"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </div>
  </main>

  <script>
    /*
      playlist-grid.html
      Reads gaming-grid.json, fetches YouTube RSS feeds for each channel ID,
      merges videos, then sorts them chronologically by published/release date.

      IMPORTANT LOCAL TESTING NOTE:
      Browser fetch() usually blocks local file:// JSON loading.
      Run this folder through a local server instead:
        python -m http.server 8000
      Then open:
        http://localhost:8000/gaming-grid.html

      CORS NOTE, because the web remains a political hostage situation:
      YouTube RSS feeds generally do not send browser-friendly CORS headers.
      This file supports RSS-to-JSON proxy templates in gaming-grid.json.
      For quick testing, the template uses AllOrigins. For production, use your own proxy.
    */

    const CONFIG_URL = "gaming-grid.json";

    const state = {
      config: null,
      items: [],
      filteredItems: [],
      loading: false,
      errors: [],
      groupCycleTimer: null,
      groupCycleDelayMs: 5000
    };

    const els = {
      status: document.getElementById("status"),
      grid: document.getElementById("grid"),
      search: document.getElementById("searchInput"),
      sort: document.getElementById("sortSelect"),
      group: document.getElementById("groupSelect"),
      title: document.getElementById("titleSelect"),
      refresh: document.getElementById("refreshButton"),
      lightbox: document.getElementById("videoLightbox"),
      lightboxFrame: document.getElementById("videoLightboxFrame"),
      lightboxClose: document.getElementById("videoLightboxClose")
    };

    init();

    async function init() {
      bindEvents();
      await loadEverything();
      applyChannelSortFromUrl();
      openVideoFromUrl();
      startGroupCycle();
    }

    function bindEvents() {
      els.search.addEventListener("input", renderFilteredGrid);
      els.sort.addEventListener("change", renderFilteredGrid);
      els.group.addEventListener("change", () => {
        updateChannelSortUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());
        renderFilteredGrid();
        restartGroupCycle();
      });
      els.title.addEventListener("change", renderFilteredGrid);
      els.refresh.addEventListener("click", async () => {
        await loadEverything();
        startGroupCycle();
      });

      els.grid.addEventListener("click", event => {
        const videoLink = event.target.closest("[data-video-embed]");
        if (!videoLink) return;

        const videoId = videoLink.getAttribute("data-video-embed");
        if (!videoId) return;

        event.preventDefault();
        openVideoLightbox(videoId, true);
      });

      els.lightbox.addEventListener("click", event => {
        if (!event.target.closest("iframe")) closeVideoLightbox(true);
      });

      els.lightboxClose.addEventListener("click", () => closeVideoLightbox(true));

      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && els.lightbox.classList.contains("is-open")) {
          closeVideoLightbox(true);
        }
      });

      window.addEventListener("popstate", () => {
        applyChannelSortFromUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());
        renderFilteredGrid();
        openVideoFromUrl();
      });
    }


    function applyChannelSortFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const requestedGroup = params.get("channel_sort");

      if (!requestedGroup || !els.group) return;

      const matchingOption = [...els.group.options].find(option =>
        option.value.toLowerCase() === requestedGroup.toLowerCase()
      );

      els.group.value = matchingOption ? matchingOption.value : "all";
    }

    function updateChannelSortUrl() {
      const url = new URL(window.location.href);
      const selectedGroup = els.group.value || "all";

      if (selectedGroup === "all") {
        url.searchParams.delete("channel_sort");
      } else {
        url.searchParams.set("channel_sort", selectedGroup);
      }

      history.pushState({ channel_sort: selectedGroup }, "", url);
    }


    function startGroupCycle() {
      stopGroupCycle();

      state.groupCycleTimer = window.setInterval(() => {
        cycleToNextGroup();
      }, state.groupCycleDelayMs);
    }

    function stopGroupCycle() {
      if (state.groupCycleTimer) {
        window.clearInterval(state.groupCycleTimer);
        state.groupCycleTimer = null;
      }
    }

    function restartGroupCycle() {
      startGroupCycle();
    }

    function cycleToNextGroup() {
      if (!els.group || els.group.options.length <= 1) return;

      const options = [...els.group.options].filter(option => option.value !== "all");
      if (!options.length) return;

      const currentIndex = options.findIndex(option => option.value === els.group.value);
      const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % options.length : 0;
      els.group.value = options[nextIndex].value;

      updateChannelSortUrl();
      populateTitleSelect(getEnabledChannelsForSelectedGroup());
      renderFilteredGrid();
    }

    async function loadEverything() {
      if (state.loading) return;
      stopGroupCycle();

      state.loading = true;
      state.errors = [];
      state.items = [];
      setStatus("Loading playlist config...");
      renderGridMessage("Fetching the config. Tiny machine prayers being whispered into JSON.");

      try {
        state.config = await fetchJson(CONFIG_URL);
        validateConfig(state.config);

        const enabledChannels = state.config.channels.filter(channel => channel.enabled !== false);
        const maxPerChannel = Number(state.config.maxItemsPerChannel || 12);
        populateGroupSelect(enabledChannels);
        applyChannelSortFromUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());

        if (!enabledChannels.length) {
          setStatus("No enabled channels found in gaming-grid.json.");
          renderGridMessage("No channels are enabled. Flip at least one channel to enabled: true, because the grid cannot summon videos from vibes alone.");
          return;
        }

        setStatus(`Loading <strong>${enabledChannels.length}</strong> channel feed${enabledChannels.length === 1 ? "" : "s"}...`);

        const feedResults = await Promise.allSettled(
          enabledChannels.map(channel => loadChannelFeed(channel, maxPerChannel))
        );

        const merged = [];
        feedResults.forEach((result, index) => {
          const channel = enabledChannels[index];
          if (result.status === "fulfilled") {
            merged.push(...result.value);
          } else {
            state.errors.push(`${channel.title || channel.channelId}: ${result.reason.message || result.reason}`);
          }
        });

        state.items = dedupeVideos(merged);
        renderFilteredGrid();
      } catch (error) {
        state.errors.push(error.message || String(error));
        setStatus("Could not load playlist grid.");
        renderGridError(state.errors);
      } finally {
        state.loading = false;
      }
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${url}: HTTP ${response.status}`);
      }
      return response.json();
    }

    function validateConfig(config) {
      if (!config || !Array.isArray(config.channels)) {
        throw new Error("gaming-grid.json must contain a top-level channels array.");
      }
    }

    function populateGroupSelect(channels) {
      const currentValue = els.group.value || "all";
      const groups = [...new Set(channels
        .map(channel => (channel.group || "Ungrouped").trim())
        .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      els.group.innerHTML = [
        '<option value="all">All Channels I Watch</option>',
        ...groups.map(group => `<option value="${escapeAttr(group)}">${escapeHtml(group)} Channels I Watch</option>`)
      ].join("");

      els.group.value = groups.includes(currentValue) ? currentValue : "all";
    }

    function getEnabledChannelsForSelectedGroup() {
      const selectedGroup = els.group.value || "all";
      const channels = state.config?.channels || [];
      return channels
        .filter(channel => channel.enabled !== false)
        .filter(channel => selectedGroup === "all" || (channel.group || "Ungrouped") === selectedGroup);
    }

    function populateTitleSelect(channels) {
      const currentValue = els.title.value || "all";
      const selectedGroup = els.group.value || "all";
      const titleLabel = selectedGroup === "all" ? "All Channel Titles" : `${selectedGroup} Channel Titles`;
      const titles = [...new Set(channels
        .map(channel => (channel.title || channel.channelId || "Untitled Channel").trim())
        .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      els.title.innerHTML = [
        `<option value="all">${escapeHtml(titleLabel)}</option>`,
        ...titles.map(title => `<option value="${escapeAttr(title)}">${escapeHtml(title)}</option>`)
      ].join("");

      els.title.value = titles.includes(currentValue) ? currentValue : "all";
    }

    async function loadChannelFeed(channel, maxPerChannel) {
      if (!channel.channelId) {
        throw new Error("Missing channelId.");
      }

      const rssUrl = buildYoutubeRssUrl(channel.channelId);
      const attempts = buildFeedAttempts(rssUrl);
      const errors = [];

      for (const attempt of attempts) {
        try {
          if (attempt.type === "json") {
            const json = await fetchJson(attempt.url);
            const items = parseRssJsonItems(json, channel, maxPerChannel);
            if (items.length) return items;
            errors.push(`${attempt.label}: no items returned`);
          } else {
            const xmlText = await fetchText(attempt.url);
            const items = parseXmlFeed(xmlText, channel, maxPerChannel);
            if (items.length) return items;
            errors.push(`${attempt.label}: no RSS entries returned`);
          }
        } catch (error) {
          errors.push(`${attempt.label}: ${error.message || error}`);
        }
      }

      throw new Error(`All feed fetch attempts failed. ${errors.slice(0, 4).join(" | ")}`);
    }

    function buildYoutubeRssUrl(channelId) {
      return `https://www.youtube.com/feeds/videos.xml?channel_id=${encodeURIComponent(channelId)}`;
    }

    function buildFeedAttempts(rssUrl) {
      const jsonTemplates = Array.isArray(state.config?.feedJsonProxyUrls) ? state.config.feedJsonProxyUrls : [];
      const xmlTemplates = Array.isArray(state.config?.feedProxyUrls) ? state.config.feedProxyUrls : [];
      const legacyTemplate = state.config?.feedProxyUrl ? [state.config.feedProxyUrl] : [];

      const attempts = [];

      jsonTemplates.forEach((template, index) => {
        attempts.push({
          type: "json",
          label: `JSON proxy ${index + 1}`,
          url: applyProxyTemplate(template, rssUrl)
        });
      });

      [...xmlTemplates, ...legacyTemplate].forEach((template, index) => {
        attempts.push({
          type: "xml",
          label: `XML proxy ${index + 1}`,
          url: applyProxyTemplate(template, rssUrl)
        });
      });

      // Last attempt: direct RSS. This usually fails in browsers because CORS, but it can work in permissive environments.
      attempts.push({
        type: "xml",
        label: "Direct YouTube RSS",
        url: rssUrl
      });

      return attempts;
    }

    function applyProxyTemplate(template, rssUrl) {
      return String(template)
        .replaceAll("{url}", encodeURIComponent(rssUrl))
        .replaceAll("{rawUrl}", rssUrl);
    }

    async function fetchText(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const contentType = response.headers.get("content-type") || "";

      // AllOrigins-style JSON wrapper support, because every proxy invents a new tiny religion.
      if (contentType.includes("application/json")) {
        const data = await response.json();
        if (typeof data.contents === "string") return data.contents;
        if (typeof data.body === "string") return data.body;
        if (typeof data.data === "string") return data.data;
        return JSON.stringify(data);
      }

      return response.text();
    }

    function parseXmlFeed(xmlText, channel, maxPerChannel) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");

      const parserError = xml.querySelector("parsererror");
      if (parserError) {
        throw new Error("RSS XML could not be parsed.");
      }

      const feedTitle = textOf(xml, "feed > title") || channel.title || channel.channelId;
      const entries = [...xml.querySelectorAll("entry")].slice(0, maxPerChannel);

      return entries.map(entry => parseEntry(entry, {
        channelTitle: channel.title || feedTitle,
        channelId: channel.channelId,
        group: channel.group || ""
      }));
    }

    function parseRssJsonItems(json, channel, maxPerChannel) {
      const items = Array.isArray(json?.items) ? json.items.slice(0, maxPerChannel) : [];
      return items.map(item => {
        const link = item.link || item.guid || "#";
        const videoId = getVideoIdFromUrl(link);
        const published = item.pubDate || item.published || item.isoDate || "";
        const thumbnail = item.thumbnail || item.enclosure?.link || getYoutubeThumbnail(videoId);
        const title = item.title || "Untitled video";

        return {
          id: videoId || link,
          videoId,
          title,
          link,
          thumbnail,
          summary: stripHtml(item.description || item.content || ""),
          published,
          updated: item.updated || "",
          timestamp: Date.parse(published || item.updated) || 0,
          channelTitle: channel.title || json?.feed?.title || channel.channelId,
          channelId: channel.channelId,
          group: channel.group || ""
        };
      });
    }

    function getVideoIdFromUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.searchParams.get("v") || parsed.pathname.split("/").filter(Boolean).pop() || "";
      } catch {
        return "";
      }
    }

    function parseEntry(entry, channelInfo) {
      const videoId = textOf(entry, "videoId") || textOf(entry, "yt\\:videoId");
      const title = textOf(entry, "title") || "Untitled video";
      const published = textOf(entry, "published") || textOf(entry, "updated") || "";
      const updated = textOf(entry, "updated") || "";
      const link = entry.querySelector("link")?.getAttribute("href") || (videoId ? `https://www.youtube.com/watch?v=${videoId}` : "#");
      const mediaGroup = entry.querySelector("group, media\\:group");
      const thumbnail = mediaGroup?.querySelector("thumbnail, media\\:thumbnail")?.getAttribute("url") || getYoutubeThumbnail(videoId);
      const summary = textOf(mediaGroup || entry, "description") || textOf(mediaGroup || entry, "media\\:description") || textOf(entry, "summary") || "";

      return {
        id: videoId || link,
        videoId,
        title,
        link,
        thumbnail,
        summary: stripHtml(summary),
        published,
        updated,
        timestamp: Date.parse(published || updated) || 0,
        channelTitle: channelInfo.channelTitle,
        channelId: channelInfo.channelId,
        group: channelInfo.group
      };
    }

    function textOf(root, selector) {
      return root?.querySelector(selector)?.textContent?.trim() || "";
    }

    function stripHtml(value) {
      const div = document.createElement("div");
      div.innerHTML = value || "";
      return div.textContent.trim();
    }

    function getYoutubeThumbnail(videoId) {
      return videoId ? `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "";
    }

    function dedupeVideos(items) {
      const seen = new Map();
      items.forEach(item => {
        if (!seen.has(item.id)) seen.set(item.id, item);
      });
      return [...seen.values()];
    }

    function renderFilteredGrid() {
      const query = els.search.value.trim().toLowerCase();
      const sortOrder = els.sort.value;
      const selectedGroup = els.group.value || "all";
      const selectedTitle = els.title.value;

      state.filteredItems = state.items
        .filter(item => selectedGroup === "all" || item.group === selectedGroup)
        .filter(item => selectedTitle === "all" || item.channelTitle === selectedTitle)
        .filter(item => {
          if (!query) return true;
          return [item.title, item.channelTitle, item.summary, item.group]
            .join(" ")
            .toLowerCase()
            .includes(query);
        })
        .sort((a, b) => sortOrder === "oldest" ? a.timestamp - b.timestamp : b.timestamp - a.timestamp);

      if (state.errors.length) {
        setStatus(`<span style="color:#ffb6cf;">${state.errors.length} feed error${state.errors.length === 1 ? "" : "s"}.</span>`);
      } else {
        setStatus("");
      }

      if (state.errors.length && !state.items.length) {
        renderGridError(state.errors);
        return;
      }

      if (!state.filteredItems.length) {
        renderGridMessage(query ? "No videos match your search." : "No videos found in the loaded feeds.");
        return;
      }

      els.grid.innerHTML = state.filteredItems.map(renderCard).join("");
    }

    function renderCard(item) {
      const dateLabel = item.timestamp ? new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(new Date(item.timestamp)) : "Unknown date";

      const localEmbedUrl = item.videoId ? buildLocalEmbedUrl(item.videoId) : item.link;
      const embedData = item.videoId ? ` data-video-embed="${escapeAttr(item.videoId)}"` : "";
      const externalAttrs = item.videoId ? "" : ' target="_blank" rel="noopener noreferrer"';

      return `
        <article class="card">
          <a class="thumb-wrap" href="${escapeAttr(localEmbedUrl)}"${externalAttrs}${embedData} aria-label="Watch ${escapeAttr(item.title)}">
            <img class="thumb" src="${escapeAttr(item.thumbnail)}" alt="" loading="lazy" referrerpolicy="no-referrer" />
          </a>
          <div class="content">
            <span class="channel" title="${escapeAttr(item.channelTitle)}">${escapeHtml(item.channelTitle)}</span>
            <h2 class="title">
              <a href="${escapeAttr(localEmbedUrl)}"${externalAttrs}${embedData}>${escapeHtml(item.title)}</a>
            </h2>
            <div class="meta">
              <span>${escapeHtml(dateLabel)}</span>
              ${item.group ? `<span>• ${escapeHtml(item.group)}</span>` : ""}
            </div>
            ${item.summary ? `<p class="summary">${escapeHtml(item.summary)}</p>` : ""}
          </div>
        </article>
      `;
    }


    function buildLocalEmbedUrl(videoId) {
      const url = new URL(window.location.href);
      url.searchParams.set("video_embed", videoId);
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function openVideoFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get("video_embed");
      if (videoId) {
        openVideoLightbox(videoId, false);
      } else {
        closeVideoLightbox(false);
      }
    }

    function openVideoLightbox(videoId, updateUrl) {
      if (!videoId) return;

      els.lightboxFrame.src = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?autoplay=1&rel=0`;
      els.lightbox.classList.add("is-open");
      els.lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";

      if (updateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("video_embed", videoId);
        history.pushState({ video_embed: videoId }, "", url);
      }
    }

    function closeVideoLightbox(updateUrl) {
      els.lightbox.classList.remove("is-open");
      els.lightbox.setAttribute("aria-hidden", "true");
      els.lightboxFrame.src = "";
      document.body.style.overflow = "";

      if (updateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.delete("video_embed");
        history.pushState({}, "", `${url.pathname}${url.search}${url.hash}`);
      }
    }

    function renderGridMessage(message) {
      els.grid.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function renderGridError(errors) {
      els.grid.innerHTML = `
        <div class="error">
          <strong>Feed loading failed.</strong><br />
          ${errors.map(error => `<div>• ${escapeHtml(error)}</div>`).join("")}
          <br />
          If you opened this through <code>file://</code>, run a local server. If feeds fail in a browser, use a CORS-friendly proxy in <code>gaming-grid.json</code>.
        </div>
      `;
    }

    function setStatus(html) {
      els.status.innerHTML = html;
      els.status.hidden = !html;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
