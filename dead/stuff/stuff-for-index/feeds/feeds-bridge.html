#feedCanvasBackground{

}

@keyframes feed-bg-pattern-slide{
from{background-position:0 0;}
to{background-position:88px 88px;}
}

body.feed-sort-transition{
animation: feed-sort-rgb-fade 2.4s ease-in-out;
}

body.feed-sort-transition::before,
body.feed-sort-transition::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
z-index:99998;
opacity:0;
mix-blend-mode:screen;
}

body.feed-sort-transition::before{
background:
linear-gradient(rgba(255,0,80,.24), rgba(255,0,80,.24)),
repeating-linear-gradient(0deg, rgba(255,255,255,.2) 0 1px, transparent 1px 5px);
animation: feed-sort-rgb-red 2.4s ease-in-out;
}

body.feed-sort-transition::after{
background:
linear-gradient(rgba(0,170,255,.24), rgba(0,170,255,.24)),
repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,255,90,.18) 2px 4px);
animation: feed-sort-rgb-cyan 2.4s ease-in-out;
}

@keyframes feed-sort-rgb-fade{
0%{opacity:1;filter:none;transform:translate(0,0);}
18%{opacity:.96;filter:contrast(1.08) saturate(1.2);transform:translate(-1px,.5px);}
36%{opacity:.82;filter:contrast(1.22) saturate(1.55) hue-rotate(6deg);transform:translate(1.5px,-.5px);}
50%{opacity:.68;filter:contrast(1.38) saturate(1.85) hue-rotate(10deg);transform:translate(-2px,0);}
64%{opacity:.82;filter:contrast(1.22) saturate(1.55) hue-rotate(-6deg);transform:translate(1px,.5px);}
82%{opacity:.96;filter:contrast(1.08) saturate(1.2);transform:translate(-.5px,0);}
100%{opacity:1;filter:none;transform:translate(0,0);}
}

@keyframes feed-sort-rgb-red{
0%,100%{opacity:0;transform:translateX(0);}
20%{opacity:.12;transform:translateX(-2px);}
42%{opacity:.34;transform:translateX(4px);}
54%{opacity:.48;transform:translateX(-5px);}
74%{opacity:.18;transform:translateX(2px);}
}

@keyframes feed-sort-rgb-cyan{
0%,100%{opacity:0;transform:translateX(0);}
18%{opacity:.1;transform:translateX(2px);}
40%{opacity:.3;transform:translateX(-4px);}
52%{opacity:.44;transform:translateX(5px);}
76%{opacity:.16;transform:translateX(-2px);}
}

.grid{
display:grid;
grid-template-columns:repeat(var(--cols,3), var(--feed-grid-card-size));
column-gap:var(--feed-grid-gap);
row-gap:var(--feed-grid-gap);

.list .post{

.thumb-grid{

.grid .post:hover .thumb-grid,

.thumb-grid img{width:100%;height:100%;object-fit:cover;display:block;background:#000;opacity:0;transition:opacity 1200ms ease;}
.thumb-grid img.is-loaded{opacity:1;}

.thumb-list{width:160px;border:2px solid var(--accent-color);background:var(--panel-background) url("/dead/images/pngs/static.gif") center / 100% 100% no-repeat;position:relative;overflow:hidden;isolation:isolate;}

.post-title{font-size:calc(17px * var(--page-font-scale));font-weight:700;line-height:1.25;opacity:1;transition:opacity 180ms ease;}
.post-date{font-size:calc(13px * var(--page-font-scale));font-weight:700;opacity:.82;line-height:1.3;transition:opacity 180ms ease;}

.post.thumbnail-pending .post-title,
.post.thumbnail-pending .post-date{
opacity:0;
}

.post.thumbnail-pending .thumb-grid::after,
.post.thumbnail-pending .thumb-list::after{
content:"Loading image...";
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
color:lime;
font-family:"Courier New", monospace;

pointer-events:none;

}

.grid .post-title{

}

.grid .post-date{
height:2.6em;
overflow:hidden;

.post-link{

    :root{

        calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
      );
      --feed-header-row-gap:var(--feed-grid-gap);

      -ms-overflow-style:none;

<script>
/* MODIFIED: feeds-header.html script is now native inside feeds-bridge.html. Wrapped to avoid global collisions. */
(() => {

const HONESTLY_THOMAS_URL="https://www.youtube.com/@Honestly_Thomas";
const CRYPTID_MEMES_URL="https://www.youtube.com/@Cryptid_Memes";
const MESSAGE_LIST_PATH="/dead/JSON/message-list.json";
const DEFAULT_HEADER_MESSAGE="Loading message...";
const DEFAULT_MESSAGE_DISPLAY_MS=12000;
const RANDOM_MESSAGE_MIN_DELAY_MS=45000;
const RANDOM_MESSAGE_MAX_DELAY_MS=180000;
const headerEl=document.querySelector("header");
const mobileHeaderHandle=document.querySelector(".mobileHeaderHandle");
const headerMessagePanel=document.querySelector(".headerMessagePanel");
const headerMessageText=document.querySelector(".headerMessagePanelText");
const channelHomeLink=document.getElementById("channelHomeLink");
const channelLogoLinks=Array.from(document.querySelectorAll(".logoLink"));
const controlsEl=document.querySelector(".controls");
const channelTitleEl=document.getElementById("channelTitle");
const sortStatePanel=document.getElementById("sortStatePanel");
const mobileSortStatePanel=document.getElementById("mobileSortStatePanel");
const searchInput=document.getElementById("videoSearch");
const patternSpeedInput=document.getElementById("patternSpeed");
const gridBtn=document.getElementById("gridBtn");
const modeBtn=document.getElementById("modeBtn");
const gridMenu=document.getElementById("gridMenu");
const gridPageSelect=document.getElementById("gridPageSelect");
const defaultChannelLogoUrls=[
"/dead/images/pngs/oldtube.png",
"/dead/images/pngs/oldtube-alt-1.png",
"/dead/images/pngs/oldtube-alt-2.png"
];
let customChannelLogoUrls=[];
let channelLogoHoverIntervalId=null;
let channelLogoHoverIndex=0;
const SORT_CYCLE_INTERVAL_MS=15000;
const channelLogoHoverIntervalMs=SORT_CYCLE_INTERVAL_MS;
let mobileChannelCycleIntervalId=null;
let mobileChannelCycleLinksState=false;
let mobileDrawerProgress=0;
let mobileDrawerDragging=false;
let mobileDrawerStartY=0;
let mobileDrawerStartProgress=0;
let mobileDrawerMoved=false;
let mobileDrawerLastY=0;
let mobileDrawerLastTime=0;
let mobileDrawerVelocity=0;
let mobileDrawerHideTimeoutId=null;
let headerMessageDefault=DEFAULT_HEADER_MESSAGE;
let headerMessageRevertTimeoutId=null;
let headerMessageRandomTimeoutIds=[];
let headerMessageTimedEntries=[];
let headerMessageClockIntervalId=null;
let headerMessageLastTimedKeys=new Set();
let headerMessageFadeTimeoutId=null;
let headerStandardMessages=[];
let headerStandardCycleIntervalId=null;
let headerStandardCycleIndex=-1;
let headerStandardCycleActive=false;
const mobileDrawerSnapTransition="transform 360ms cubic-bezier(.16, 1, .3, 1)";

function isMobileHeaderLayout(){
return window.matchMedia("(max-width: 768px)").matches;
}

function postToParent(message){
try{
if(window.parent && window.parent !== window){
window.parent.postMessage(message, "*");
}
}catch(error){
console.warn("Unable to post feed header message", error);
}
}

function postCommand(action, extra={}){
postToParent({ type:"feedGridHeaderCommand", action, ...extra });
}

function bindContentOnlyLinks(){
document.querySelectorAll(".channelHeader a").forEach((link)=>{
link.addEventListener("click", (event)=>{
if(event.target !== link) return;
event.preventDefault();
});
});
}

function postSize(){
window.requestAnimationFrame(()=>{
let height=Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || headerEl.offsetHeight || 0);
if(isMobileHeaderLayout()){
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
height=drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress);
}
postToParent({ type:"feedGridHeaderSize", height });
});
}

function getMobileDrawerMetrics(){
const totalHeight=Math.ceil(headerEl.scrollHeight || headerEl.offsetHeight || headerEl.getBoundingClientRect().height || 0);
return {
totalHeight,
travel:totalHeight,
visibleHeight:0,
rowGap:0
};
}

function applyMobileDrawerTransform(drawerMetrics=getMobileDrawerMetrics()){
headerEl.style.transform=`translate3d(0, ${-Math.ceil(drawerMetrics.travel * (1 - mobileDrawerProgress))}px, 0)`;
}

function setMobileDrawerProgress(progress, animated=false){
mobileDrawerProgress=Math.max(0, Math.min(1, Number(progress) || 0));
if(isMobileHeaderLayout()){
if(mobileDrawerHideTimeoutId !== null){
window.clearTimeout(mobileDrawerHideTimeoutId);
mobileDrawerHideTimeoutId=null;
}
headerEl.style.transition=animated ? mobileDrawerSnapTransition : "none";
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
headerEl.style.visibility="visible";
headerEl.style.pointerEvents=mobileDrawerProgress > 0.05 ? "auto" : "none";
document.body.classList.toggle("mobile-drawer-open", mobileDrawerProgress > 0.98);
postToParent({ type:"feedGridHeaderSize", height:drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress) });
if(animated && mobileDrawerProgress <= 0.001){
mobileDrawerHideTimeoutId=window.setTimeout(()=>{
mobileDrawerHideTimeoutId=null;
}, 380);
}
}else{
headerEl.style.transition="";
headerEl.style.transform="";
headerEl.style.visibility="";
headerEl.style.pointerEvents="";
document.body.classList.remove("mobile-drawer-open");
}
postSize();
}

function finishMobileDrawerDrag(){
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const projectedProgress=mobileDrawerProgress + ((mobileDrawerVelocity * 180) / drawerHeight);
setMobileDrawerProgress(projectedProgress >= 0.35 ? 1 : 0, true);
}

function updateTintFilters(){
return true;
}

function getActiveChannelLogoUrls(){
return customChannelLogoUrls.length ? [...customChannelLogoUrls] : [...defaultChannelLogoUrls];
}

function getPrimaryChannelLogoUrl(){
return customChannelLogoUrls.length ? customChannelLogoUrls[0] : "/dead/images/pngs/oldtube.png";
}

function applyChannelLogoAsset(logoSrc){
channelLogoLinks.forEach((link)=>{
const img=link.querySelector(".channelLogo");
const layer=link.querySelector(".channelLogoTintLayer");
if(img){
img.src=logoSrc;
img.style.objectFit="contain";
img.addEventListener("load", ()=>{
syncControlButtonSize();
postSize();
}, { once:true });
}
if(layer){
const safeUrl=String(logoSrc).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
layer.style.webkitMaskSize="contain";
layer.style.maskSize="contain";
}
});
syncControlButtonSize();
postSize();
}

function stopChannelLogoHoverCycle(resetToPrimary=true){
if(channelLogoHoverIntervalId !== null){
window.clearInterval(channelLogoHoverIntervalId);
channelLogoHoverIntervalId=null;
}
channelLogoHoverIndex=0;
if(resetToPrimary){
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
}
}

function startChannelLogoHoverCycle(){
const urls=getActiveChannelLogoUrls();
if(urls.length <= 1) return;
stopChannelLogoHoverCycle(false);
channelLogoHoverIndex=1 % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
channelLogoHoverIntervalId=window.setInterval(()=>{
channelLogoHoverIndex=(channelLogoHoverIndex + 1) % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
}, channelLogoHoverIntervalMs);
}

function bindChannelLogoHoverCycle(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader || channelHeader.dataset.hoverCycleBound === "true") return;
channelHeader.addEventListener("mouseenter", ()=>{
if(isMobileHeaderLayout()) return;
if(getActiveChannelLogoUrls().length > 1){

function showTemporaryHeaderMessage(message, durationMs=DEFAULT_MESSAGE_DISPLAY_MS){
if(headerStandardCycleActive) return;
if(headerMessageRevertTimeoutId !== null){
window.clearTimeout(headerMessageRevertTimeoutId);
}
setHeaderMessage(message);
headerMessageRevertTimeoutId=window.setTimeout(()=>{
headerMessageRevertTimeoutId=null;
setHeaderMessage(headerMessageDefault);
}, Math.max(1000, Number(durationMs) || DEFAULT_MESSAGE_DISPLAY_MS));
}

function normalizeHeaderMessageEntry(entry){
if(!entry || typeof entry !== "object") return null;
const message=String(entry.random_message || entry.message || "").trim();
if(!message) return null;
return {
message,
messageTime:String(entry.message_time || "random").trim() || "random",
messageDate:String(entry.message_date || "").trim(),
durationMs:Math.max(1000, Number(entry.display_duration_ms) || DEFAULT_MESSAGE_DISPLAY_MS)
};
}

function getHeaderMessageEntries(data){
const groups=Array.isArray(data && data.message_groups) ? data.message_groups : [];
return groups.flatMap((group)=>{
const regularMessages=Array.isArray(group && group.messages) ? group.messages : [];
const randomMessages=Array.isArray(group && group.random_messages) ? group.random_messages : [];
const messages=[...regularMessages, ...randomMessages];
return messages.map(normalizeHeaderMessageEntry).filter(Boolean);
});
}

function getStandardHeaderMessages(data){
return getHeaderMessageEntries(data)
.filter((entry)=>entry.messageTime.toLowerCase() === "standard")
.map((entry)=>entry.message)
.filter(Boolean);
}

function parseHeaderMessageTime(messageTime){
const parts=String(messageTime || "").trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
if(!parts) return null;
const hours=Number(parts[1]);
const minutes=Number(parts[2]);
const seconds=parts[3] === undefined ? 0 : Number(parts[3]);
if(hours > 23 || minutes > 59 || seconds > 59) return null;
return { hours, minutes, seconds, hasSeconds:parts[3] !== undefined };
}

function requestOverlayClockSnapshot(){
return new Promise((resolve)=>{
const requestId=`header-message-clock-${Date.now()}-${Math.random().toString(16).slice(2)}`;
const timeoutId=window.setTimeout(()=>{
window.removeEventListener("message", handleClockResponse);
resolve(null);
}, 1000);

function handleClockResponse(event){
const data=event.data || {};
if(data.type !== "overlayClockTimeState" || data.requestId !== requestId) return;
window.clearTimeout(timeoutId);
window.removeEventListener("message", handleClockResponse);
resolve(data.clock || null);
}

window.addEventListener("message", handleClockResponse);
if(window.top && window.top !== window){
window.top.postMessage({ type:"overlayClockTimeRequest", requestId }, "*");
}else{
window.postMessage({ type:"overlayClockTimeRequest", requestId }, "*");
}
});
}

function clearHeaderMessageSchedules(){
headerMessageRandomTimeoutIds.forEach((timeoutId)=>window.clearTimeout(timeoutId));
headerMessageRandomTimeoutIds=[];
headerMessageTimedEntries=[];
headerMessageLastTimedKeys=new Set();
if(headerMessageClockIntervalId !== null){
window.clearInterval(headerMessageClockIntervalId);
headerMessageClockIntervalId=null;
}
if(headerMessageRevertTimeoutId !== null){
window.clearTimeout(headerMessageRevertTimeoutId);
headerMessageRevertTimeoutId=null;
}
}

function scheduleRandomHeaderMessage(entry){
const delay=RANDOM_MESSAGE_MIN_DELAY_MS + Math.random() * (RANDOM_MESSAGE_MAX_DELAY_MS - RANDOM_MESSAGE_MIN_DELAY_MS);
const timeoutId=window.setTimeout(()=>{
showTemporaryHeaderMessage(entry.message, entry.durationMs);
scheduleRandomHeaderMessage(entry);
}, delay);
headerMessageRandomTimeoutIds.push(timeoutId);
}

async function checkTimedHeaderMessages(){
if(!headerMessageTimedEntries.length) return;
const clock=await requestOverlayClockSnapshot();
if(!clock) return;
headerMessageTimedEntries.forEach((entry)=>{
if(!entry.scheduledTime) return;
if(entry.messageDate && String(clock.dateKey || "") !== entry.messageDate) return;
const matches=Number(clock.hours) === entry.scheduledTime.hours
&& Number(clock.minutes) === entry.scheduledTime.minutes
&& (!entry.scheduledTime.hasSeconds || Number(clock.seconds || 0) === entry.scheduledTime.seconds);
if(!matches) return;
const shownKey=`${clock.dateKey || "unknown"}-${entry.messageDate || "daily"}-${entry.messageTime}-${entry.message}`;
if(headerMessageLastTimedKeys.has(shownKey)) return;
headerMessageLastTimedKeys.add(shownKey);
showTemporaryHeaderMessage(entry.message, entry.durationMs);
});
}

function scheduleTimedHeaderMessages(entries){
headerMessageTimedEntries=entries
.map((entry)=>({ ...entry, scheduledTime:parseHeaderMessageTime(entry.messageTime) }))
.filter((entry)=>entry.scheduledTime);
if(!headerMessageTimedEntries.length) return;
checkTimedHeaderMessages();
headerMessageClockIntervalId=window.setInterval(checkTimedHeaderMessages, 1000);
}

function scheduleHeaderMessages(entries){
clearHeaderMessageSchedules();
const timedEntries=[];
entries.forEach((entry)=>{
if(entry.messageTime.toLowerCase() === "standard"){
return;
}
if(entry.messageTime.toLowerCase() === "random"){
scheduleRandomHeaderMessage(entry);
return;
}
timedEntries.push(entry);
});
scheduleTimedHeaderMessages(timedEntries);
}

function showNextStandardHeaderMessage(){
if(!headerStandardMessages.length) return;
headerStandardCycleIndex=(headerStandardCycleIndex + 1) % headerStandardMessages.length;
setHeaderMessage(headerStandardMessages[headerStandardCycleIndex], true);

function startStandardHeaderMessageCycle(){

function stopStandardHeaderMessageCycle(){

headerStandardCycleIntervalId=null;
}
headerStandardCycleActive=false;
headerStandardCycleIndex=-1;
showDefaultHeaderMessage();
}

function toggleStandardHeaderMessageCycle(){
if(headerStandardCycleActive){
stopStandardHeaderMessageCycle();

}
startStandardHeaderMessageCycle();
}

function bindHeaderMessagePanelInteractions(){

console.warn("Unable to load header message list", error);

}
}

function syncStateIndicatorLinks(state={}){

});

});

mobileHeaderHandle.addEventListener("pointerdown", (event)=>{
if(!isMobileHeaderLayout()) return;
mobileDrawerDragging=true;
mobileDrawerMoved=false;
mobileDrawerStartY=event.clientY;
mobileDrawerStartProgress=mobileDrawerProgress;
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=performance.now();
mobileDrawerVelocity=0;
mobileHeaderHandle.setPointerCapture(event.pointerId);
mobileHeaderHandle.style.cursor="grabbing";
});

mobileHeaderHandle.addEventListener("pointermove", (event)=>{
if(!mobileDrawerDragging || !isMobileHeaderLayout()) return;
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const delta=event.clientY - mobileDrawerStartY;
if(Math.abs(delta) > 4) mobileDrawerMoved=true;
const now=performance.now();
const elapsed=Math.max(1, now - mobileDrawerLastTime);
const instantVelocity=(event.clientY - mobileDrawerLastY) / elapsed;
mobileDrawerVelocity=(mobileDrawerVelocity * 0.65) + (instantVelocity * 0.35);
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=now;
setMobileDrawerProgress(mobileDrawerStartProgress + (delta / drawerHeight), false);
event.preventDefault();
});

function endMobileDrawerPointer(event){
if(!mobileDrawerDragging) return;
mobileDrawerDragging=false;
mobileHeaderHandle.style.cursor="";
try{
mobileHeaderHandle.releasePointerCapture(event.pointerId);
}catch(error){}
finishMobileDrawerDrag();
}

mobileHeaderHandle.addEventListener("pointerup", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("pointercancel", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("click", ()=>{
if(!isMobileHeaderLayout() || mobileDrawerMoved) return;
setMobileDrawerProgress(mobileDrawerProgress > 0.5 ? 0 : 1, true);
});

window.addEventListener("message", (event)=>{
const data=event.data || {};
if(data.type === "feedHeaderMobileDrawerProgress"){
setMobileDrawerProgress(data.progress, Boolean(data.animated));
return;
}
if(data.type === "feedGridHeaderState"){
applyState(data);
}
});

window.addEventListener("resize", ()=>{
syncControlButtonSize();
fitHeaderRectangleChildren();
syncMobileChannelCycle();
if(!isMobileHeaderLayout()){
setMobileDrawerProgress(0, false);
if(headerStandardCycleActive){
stopStandardHeaderMessageCycle();
}
}
postSize();
});

const resizeObserver=new ResizeObserver(postSize);
resizeObserver.observe(document.documentElement);
resizeObserver.observe(document.body);

document.addEventListener("DOMContentLoaded", ()=>{
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
bindChannelLogoHoverCycle();
syncMobileChannelCycle();
bindContentOnlyLinks();
bindHeaderMessagePanelInteractions();
updateTintFilters();
loadHeaderMessages();
syncControlButtonSize();
fitHeaderRectangleChildren();
setMobileDrawerProgress(0, false);
postCommand("requestState");
postSize();
});

})();
</script>

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");
}

function parseUploadDate(value){
const raw = String(value || "").trim();
if(!/^\d{8}$/.test(raw)) return 0;
const year = Number(raw.slice(0,4));
const month = Number(raw.slice(4,6)) - 1;
const day = Number(raw.slice(6,8));
return Date.UTC(year, month, day) / 1000;
}

function getSortableTimestamp(video){
if(Number.isFinite(video.release_timestamp)) return video.release_timestamp;
if(Number.isFinite(video.timestamp)) return video.timestamp;
const parsedUploadDate = parseUploadDate(video.upload_date);
if(parsedUploadDate) return parsedUploadDate;
return 0;
}

function formatVideoDate(post){
const timestamp = Number(post.sortTimestamp || 0);
if(!timestamp) return "";
return new Date(timestamp * 1000).toLocaleDateString(undefined, {
year: "numeric",
month: "short",
day: "numeric"
});
}

function formatViewCount(value){
const count = Number(value || 0);
if(!Number.isFinite(count) || count <= 0) return "";
return `${count.toLocaleString()} view${count === 1 ? "" : "s"}`;
}

function buildPostMeta(post){

}

}

function buildThumbnailCandidates(video){
const thumbs = Array.isArray(video.thumbnails) ? video.thumbnails.filter(Boolean) : [];
const candidates = [];

function addCandidate(url){
if(url && !candidates.includes(url)) candidates.push(url);
}

function getThumbScore(thumb){
const width = Number(thumb && thumb.width || 0);
const height = Number(thumb && thumb.height || 0);
const url = String(thumb && thumb.url || "");
const hasQuery = url.includes("?");
return (width * height) - (hasQuery ? 1 : 0);
}

const hdPatterns = [
/maxresdefault\.(jpg|webp)(?:\?|$)/i,
/sddefault\.(jpg|webp)(?:\?|$)/i,
/hq720\.(jpg|webp)(?:\?|$)/i,
/hqdefault\.(jpg|webp)(?:\?|$)/i
];

for(const pattern of hdPatterns){
thumbs
.filter((thumb)=>pattern.test(String(thumb && thumb.url || "")))
.sort((a,b)=>getThumbScore(b) - getThumbScore(a))
.forEach((thumb)=>addCandidate(String(thumb && thumb.url || "")));
}

const preferred = thumbs[3] || thumbs[thumbs.length - 1];
if(preferred && preferred.url) addCandidate(preferred.url);
thumbs.forEach((thumb)=>addCandidate(String(thumb && thumb.url || "")));
addCandidate(`https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`);

return candidates;
}

function pickThumbnailUrl(video){
return buildThumbnailCandidates(video)[0] || `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;
}

function applyThumbnailSource(thumb, layer, url, altText){
let img = thumb.querySelector("img");
if(!img){
img = document.createElement("img");
img.alt = altText || "Video thumbnail";
thumb.insertBefore(img, layer || null);
}
if(layer){
const safeUrl = String(url).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
}
if(img.dataset.thumbnailSrc === url) return;
img.dataset.thumbnailSrc = url;
img.src = url;
img.classList.add("is-loaded");
}

function markThumbnailReady(card){
if(!card) return;
card.classList.remove("thumbnail-pending");
card.classList.add("thumbnail-ready");
}

function getThumbnailCacheKey(post){
return String(post && (post.id || post.thumb || post.title) || "");
}

function getThumbnailCandidates(post){
return Array.isArray(post.thumbCandidates) && post.thumbCandidates.length
? post.thumbCandidates
: [post.thumb].filter(Boolean);
}

function prepareThumbnailCard(post, card){
const thumb = card.querySelector(".thumb-grid, .thumb-list");
const layer = card.querySelector(".thumbTintLayer");

if(!thumb) return null;
const img = thumb.querySelector("img");
const altText = thumb.dataset.thumbnailAlt || `${post.title || "Video"} thumbnail`;
card.classList.add("thumbnail-pending");
card.classList.remove("thumbnail-ready");
if(img){
img.classList.remove("is-loaded");
}
if(layer){
layer.style.removeProperty("--tint-mask");
}
return { post, card, thumb, layer, altText };
}

function resolveThumbnailSource(post){
const cacheKey = getThumbnailCacheKey(post);
if(cacheKey && thumbnailSourceCache.has(cacheKey)){
return Promise.resolve(thumbnailSourceCache.get(cacheKey));
}

const candidates = getThumbnailCandidates(post);
if(!candidates.length){
if(cacheKey) thumbnailSourceCache.set(cacheKey, THUMBNAIL_FALLBACK);
return Promise.resolve(THUMBNAIL_FALLBACK);
}

return new Promise((resolve)=>{
function finish(url){
const resolvedUrl = url || THUMBNAIL_FALLBACK;
if(cacheKey) thumbnailSourceCache.set(cacheKey, resolvedUrl);
resolve(resolvedUrl);
}

function tryCandidate(index){
if(index >= candidates.length){
finish(THUMBNAIL_FALLBACK);
return;
}

const probe = new Image();
probe.onload = ()=>{
const isTinyPlaceholder = probe.naturalWidth <= 120 && probe.naturalHeight <= 90;
if(isTinyPlaceholder){
tryCandidate(index + 1);
return;
}
finish(candidates[index]);
};
probe.onerror = ()=>tryCandidate(index + 1);
probe.src = candidates[index];
}

tryCandidate(0);
});
}

function attachThumbnailFallback(post, card){
const target = prepareThumbnailCard(post, card);
if(!target) return Promise.resolve();
return resolveThumbnailSource(post).then((url)=>{
if(!card.isConnected) return;
applyThumbnailSource(target.thumb, target.layer, url, target.altText);
markThumbnailReady(card);
});
}

function loadThumbnailBatchInSequence(targets){
let sequence = Promise.resolve();
targets.forEach((target)=>{
sequence = sequence.then(()=>resolveThumbnailSource(target.post).then((url)=>{
target.resolvedUrl = url;
}));
});
return sequence.then(()=>{
targets.forEach((target)=>{
if(!target.card.isConnected) return;
applyThumbnailSource(target.thumb, target.layer, target.resolvedUrl, target.altText);
markThumbnailReady(target.card);
});
window.requestAnimationFrame(postHeaderState);
});
}

function getFilteredPosts(query){
const normalizedQuery = String(query || "").trim().toLowerCase();
const matches = normalizedQuery
? posts.filter((post)=>`${post.title} ${post.description} ${post.channel} ${post.uploader}`.toLowerCase().includes(normalizedQuery))
: [...posts];
return matches.sort((a,b)=>{
const aTimestamp = Number(a.sortTimestamp || 0);
const bTimestamp = Number(b.sortTimestamp || 0);
const aViews = Number(a.views || 0);
const bViews = Number(b.views || 0);
const sortMode = sortModes[sortModeIndex];
const aHasTimestamp = aTimestamp > 0;
const bHasTimestamp = bTimestamp > 0;

if(sortMode === "newest" || sortMode === "oldest"){
if(aHasTimestamp && bHasTimestamp && aTimestamp !== bTimestamp){
return sortMode === "newest" ? bTimestamp - aTimestamp : aTimestamp - bTimestamp;
}
if(a.sourceIndex !== b.sourceIndex){
return sortMode === "newest" ? a.sourceIndex - b.sourceIndex : b.sourceIndex - a.sourceIndex;
}
if(aViews !== bViews){
return bViews - aViews;
}
}else{
if(aViews !== bViews){
return sortMode === "most-viewed" ? bViews - aViews : aViews - bViews;
}
if(aHasTimestamp && bHasTimestamp && aTimestamp !== bTimestamp){
return bTimestamp - aTimestamp;
}
if(a.sourceIndex !== b.sourceIndex){
return a.sourceIndex - b.sourceIndex;
}
}
return a.sourceIndex - b.sourceIndex;
});
}

function resolveCanvasBackgroundUrl(entry){

.trim()
.replace(/^\.\/+/, "");
try{
const url = new URL(file, window.location.origin + CANVAS_BACKGROUNDS_BASE_PATH);
return `${url.pathname}${url.search}${url.hash}`;
}catch(error){
return `${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`;
}
}

function normalizeCanvasBackgroundEntry(entry){
if(!entry || typeof entry !== "object") return null;
const file = String(entry.file || entry.path || "").trim().replace(/^\.\/+/, "");
if(!file) return null;
return {
title:String(entry.title || file).trim(),
file,

};
}

function ensureFeedCanvasBackgroundFrame(){
if(canvasBackgroundFrame && canvasBackgroundFrame.isConnected) return canvasBackgroundFrame;
canvasBackgroundFrame=document.createElement("iframe");
canvasBackgroundFrame.id="feedCanvasBackground";
canvasBackgroundFrame.title="Feed canvas background";
canvasBackgroundFrame.setAttribute("aria-hidden","true");
canvasBackgroundFrame.tabIndex=-1;
canvasBackgroundFrame.loading="eager";
if(currentCanvasBackground && currentCanvasBackground.url){
canvasBackgroundFrame.src=currentCanvasBackground.url;
}else{
canvasBackgroundFrame.src=`${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`;
}
postsEl.prepend(canvasBackgroundFrame);
return canvasBackgroundFrame;
}

function findCanvasBackground(value){
const requested = String(value || "").trim().toLowerCase();
if(!requested){
return canvasBackgrounds.find((entry)=>entry.file === DEFAULT_CANVAS_BACKGROUND_FILE) || canvasBackgrounds[0] || null;
}
return canvasBackgrounds.find((entry)=>{
return entry.title.toLowerCase() === requested
|| entry.file.toLowerCase() === requested
|| entry.path.toLowerCase() === requested
|| entry.url.toLowerCase() === requested
|| entry.file.toLowerCase().includes(requested)
|| entry.title.toLowerCase().includes(requested);
}) || null;
}

function setCanvasBackground(value){
const match = findCanvasBackground(value) || {
title:"Starfield Background",
file:DEFAULT_CANVAS_BACKGROUND_FILE,
path:`./${DEFAULT_CANVAS_BACKGROUND_FILE}`,
url:`${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`
};
currentCanvasBackground=match;
ensureFeedCanvasBackgroundFrame().src=match.url;
return match;
}

function cycleCanvasBackground(direction=1){
if(!canvasBackgrounds.length) return setCanvasBackground(DEFAULT_CANVAS_BACKGROUND_FILE);
const currentIndex = Math.max(0, canvasBackgrounds.findIndex((entry)=>currentCanvasBackground && entry.url === currentCanvasBackground.url));
const nextIndex = (currentIndex + direction + canvasBackgrounds.length) % canvasBackgrounds.length;
return setCanvasBackground(canvasBackgrounds[nextIndex].file);
}

uploader: data.uploader || data.channel || "",
uploader_url: data.uploader_url || data.channel_url || ""

...entry,

async function loadFeedData(){
let primaryData = null;
let primaryError = null;

try{
primaryData = await fetchJson(FEED_DATA_PATH);
const primaryEntries = Array.isArray(primaryData.entries) ? primaryData.entries : [];
if(primaryEntries.length){
return primaryData;
}
console.warn(`Primary feed at ${FEED_DATA_PATH} is empty; falling back to ${FALLBACK_FEED_DATA_PATH}.`);
}catch(error){
primaryError = error;
console.warn(`Unable to load ${FEED_DATA_PATH}; falling back to ${FALLBACK_FEED_DATA_PATH}.`, error);
}

try{
const fallbackData = normalizeLegacyFeedData(await fetchJson(FALLBACK_FEED_DATA_PATH));
if(Array.isArray(fallbackData.entries) && fallbackData.entries.length){
return fallbackData;
}
}catch(fallbackError){
console.error(`Unable to load fallback feed from ${FALLBACK_FEED_DATA_PATH}.`, fallbackError);
if(primaryError){
throw primaryError;
}
throw fallbackError;
}

return primaryData || { title: "Channel Feed", channels: [], entries: [] };
}

return a;

function buildCube(){

cubeContainer.innerHTML="";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(
70,
cubeContainer.clientWidth/cubeContainer.clientHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
cubeContainer.appendChild(renderer.domElement);

camera.position.z=6;

const light=new THREE.AmbientLight(0xffffff,1);
scene.add(light);

let shuffled=shuffle(filtered);

const materials=[];

function buildFaceTexture(face){

let canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=512;
let ctx=canvas.getContext("2d");

let texture=new THREE.CanvasTexture(canvas);

let cell=canvas.width/gridSize;

for(let y=0;y<gridSize;y++){
for(let x=0;x<gridSize;x++){

let i=face*(gridSize*gridSize)+y*gridSize+x;
let v=shuffled[i];
if(!v) continue;

let img=new Image();
img.crossOrigin="anonymous";
img.src=v.thumb;

img.onload=()=>{
ctx.drawImage(img,x*cell,y*cell,cell,cell);
texture.needsUpdate=true;
};

}
}

return texture;
}

for(let f=0;f<6;f++){
materials.push(new THREE.MeshBasicMaterial({map:buildFaceTexture(f)}));
}

const cube=new THREE.Mesh(
new THREE.BoxGeometry(4,4,4),
materials
);

scene.add(cube);

let dragging=false;
let px=0,py=0;

renderer.domElement.addEventListener("mousedown",e=>{
dragging=true;
px=e.clientX;
py=e.clientY;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",e=>{

if(!dragging) return;

let dx=e.clientX-px;
let dy=e.clientY-py;

cube.rotation.y+=dx*0.01;
cube.rotation.x+=dy*0.01;

px=e.clientX;
py=e.clientY;

});

renderer.domElement.addEventListener("click",e=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((e.clientX-rect.left)/rect.width)*2-1,
-((e.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hits=raycaster.intersectObject(cube);

if(hits.length){

let face=Math.floor(hits[0].faceIndex/2);
let uv=hits[0].uv;

let cellX=Math.floor(uv.x*gridSize);
let cellY=Math.floor((1-uv.y)*gridSize);

let index=face*(gridSize*gridSize)+cellY*gridSize+cellX;

let video=shuffled[index];

if(video){
openVideo(video);
}

}

});

renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
camera.aspect=cubeContainer.clientWidth/cubeContainer.clientHeight;
camera.updateProjectionMatrix();

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

}

<script>
/* MODIFIED: gaming-grid.html script is now native inside feeds-bridge.html. Wrapped to avoid global collisions. */
(() => {

    /*
      playlist-grid.html
      Reads gaming-grid.json, fetches YouTube RSS feeds for each channel ID,
      merges videos, then sorts them chronologically by published/release date.

      IMPORTANT LOCAL TESTING NOTE:
      Browser fetch() usually blocks local file:// JSON loading.
      Run this folder through a local server instead:
        python -m http.server 8000
      Then open:
        http://localhost:8000/gaming-grid.html

      CORS NOTE, because the web remains a political hostage situation:
      YouTube RSS feeds generally do not send browser-friendly CORS headers.
      This file supports RSS-to-JSON proxy templates in gaming-grid.json.
      For quick testing, the template uses AllOrigins. For production, use your own proxy.
    */

    const CONFIG_URL = "/dead/stuff/stuff-for-index/feeds/gaming-grid/gaming-grid.json";

    const state = {
      config: null,
      items: [],
      filteredItems: [],
      loading: false,
      errors: [],
      groupCycleTimer: null,
      groupCycleIdleTimer: null,
      groupCycleDelayMs: 5000,
      groupCycleIdleDelayMs: 10000
    };

    const els = {
      status: document.getElementById("gamingStatus"),
      grid: document.getElementById("gamingGrid"),
      search: document.getElementById("gamingSearchInput"),
      sort: document.getElementById("gamingSortSelect"),
      group: document.getElementById("gamingGroupSelect"),
      title: document.getElementById("gamingTitleSelect"),
      refresh: document.getElementById("gamingRefreshButton"),
      lightbox: document.getElementById("gamingVideoLightbox"),
      lightboxFrame: document.getElementById("gamingVideoLightboxFrame"),
      lightboxClose: document.getElementById("gamingVideoLightboxClose")
    };

    init();

    async function init() {
      bindEvents();
      await loadEverything();
      applyChannelSortFromUrl();
      openVideoFromUrl();
      scheduleGroupCycleAfterIdle();
    }

    function bindEvents() {
      bindIdleDetectionEvents();

      els.search.addEventListener("input", renderFilteredGrid);
      els.sort.addEventListener("change", renderFilteredGrid);
      els.group.addEventListener("change", () => {
        updateChannelSortUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());
        renderFilteredGrid();
        scheduleGroupCycleAfterIdle();
      });
      els.title.addEventListener("change", renderFilteredGrid);
      els.refresh.addEventListener("click", async () => {
        await loadEverything();
        scheduleGroupCycleAfterIdle();
      });

      els.grid.addEventListener("click", event => {
        const videoLink = event.target.closest("[data-video-embed]");
        if (!videoLink) return;

        const videoId = videoLink.getAttribute("data-video-embed");
        if (!videoId) return;

        event.preventDefault();
        openVideoLightbox(videoId, true);
      });

      els.lightbox.addEventListener("click", event => {
        if (!event.target.closest("iframe")) closeVideoLightbox(true);
      });

      els.lightboxClose.addEventListener("click", event => {
        event.stopPropagation();
        closeVideoLightbox(true);
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && els.lightbox.classList.contains("is-open")) {
          closeVideoLightbox(true);
        }
      });

      window.addEventListener("popstate", () => {
        applyChannelSortFromUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());
        renderFilteredGrid();
        openVideoFromUrl();
      });
    }


    function bindIdleDetectionEvents() {
      ["pointerdown", "keydown", "wheel", "touchstart", "input", "change"].forEach(eventName => {
        document.addEventListener(eventName, handleUserInteractionForGroupCycle, {
          passive: true,
          capture: true
        });
      });
    }

    function handleUserInteractionForGroupCycle() {
      scheduleGroupCycleAfterIdle();
    }


    function applyChannelSortFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const requestedGroup = params.get("channel_sort");

      if (!requestedGroup || !els.group) return;

      const matchingOption = [...els.group.options].find(option =>
        option.value.toLowerCase() === requestedGroup.toLowerCase()
      );

      els.group.value = matchingOption ? matchingOption.value : "all";
    }

    function updateChannelSortUrl() {
      const url = new URL(window.location.href);
      const selectedGroup = els.group.value || "all";

      if (selectedGroup === "all") {
        url.searchParams.delete("channel_sort");
      } else {
        url.searchParams.set("channel_sort", selectedGroup);
      }

      history.pushState({ channel_sort: selectedGroup }, "", url);
    }


    function startGroupCycle() {
      stopGroupCycle();

      state.groupCycleTimer = window.setInterval(() => {
        cycleToNextGroup();
      }, state.groupCycleDelayMs);
    }

    function stopGroupCycle() {
      if (state.groupCycleTimer) {
        window.clearInterval(state.groupCycleTimer);
        state.groupCycleTimer = null;
      }
    }

    function clearGroupCycleIdleTimer() {
      if (state.groupCycleIdleTimer) {
        window.clearTimeout(state.groupCycleIdleTimer);
        state.groupCycleIdleTimer = null;
      }
    }

    function scheduleGroupCycleAfterIdle() {
      stopGroupCycle();

      clearGroupCycleIdleTimer();

      state.groupCycleIdleTimer = window.setTimeout(() => {
        state.groupCycleIdleTimer = null;
        startGroupCycle();
      }, state.groupCycleIdleDelayMs);
    }

    function cycleToNextGroup() {
      if (state.loading || els.lightbox.classList.contains("is-open")) return;
      if (!els.group || els.group.options.length <= 1) return;

      const options = [...els.group.options].filter(option => option.value !== "all");
      if (!options.length) return;

      const currentIndex = options.findIndex(option => option.value === els.group.value);
      const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % options.length : 0;
      els.group.value = options[nextIndex].value;

      updateChannelSortUrl();
      populateTitleSelect(getEnabledChannelsForSelectedGroup());
      renderFilteredGrid();
    }

    async function loadEverything() {
      if (state.loading) return;
      stopGroupCycle();
      clearGroupCycleIdleTimer();

      state.loading = true;
      state.errors = [];
      state.items = [];
      setStatus("Loading playlist config...");
      renderGridMessage("Fetching the config. Tiny machine prayers being whispered into JSON.");

      try {
        state.config = await fetchJson(CONFIG_URL);
        validateConfig(state.config);

        const enabledChannels = state.config.channels.filter(channel => channel.enabled !== false);
        const maxPerChannel = Number(state.config.maxItemsPerChannel || 12);
        populateGroupSelect(enabledChannels);
        applyChannelSortFromUrl();
        populateTitleSelect(getEnabledChannelsForSelectedGroup());

        if (!enabledChannels.length) {
          setStatus("No enabled channels found in gaming-grid.json.");
          renderGridMessage("No channels are enabled. Flip at least one channel to enabled: true, because the grid cannot summon videos from vibes alone.");
          return;
        }

        setStatus(`Loading <strong>${enabledChannels.length}</strong> channel feed${enabledChannels.length === 1 ? "" : "s"}...`);

        const feedResults = await Promise.allSettled(
          enabledChannels.map(channel => loadChannelFeed(channel, maxPerChannel))
        );

        const merged = [];
        feedResults.forEach((result, index) => {
          const channel = enabledChannels[index];
          if (result.status === "fulfilled") {
            merged.push(...result.value);
          } else {
            state.errors.push(`${channel.title || channel.channelId}: ${result.reason.message || result.reason}`);
          }
        });

        state.items = dedupeVideos(merged);
        renderFilteredGrid();
      } catch (error) {
        state.errors.push(error.message || String(error));
        setStatus("Could not load playlist grid.");
        renderGridError(state.errors);
      } finally {
        state.loading = false;
      }
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${url}: HTTP ${response.status}`);
      }
      return response.json();
    }

    function validateConfig(config) {
      if (!config || !Array.isArray(config.channels)) {
        throw new Error("gaming-grid.json must contain a top-level channels array.");
      }
    }

    function populateGroupSelect(channels) {
      const currentValue = els.group.value || "all";
      const groups = [...new Set(channels
        .map(channel => (channel.group || "Ungrouped").trim())
        .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      els.group.innerHTML = [
        '<option value="all">All Channels I Watch</option>',
        ...groups.map(group => `<option value="${escapeAttr(group)}">${escapeHtml(group)} Channels I Watch</option>`)
      ].join("");

      els.group.value = groups.includes(currentValue) ? currentValue : "all";
    }

    function getEnabledChannelsForSelectedGroup() {
      const selectedGroup = els.group.value || "all";
      const channels = state.config?.channels || [];
      return channels
        .filter(channel => channel.enabled !== false)
        .filter(channel => selectedGroup === "all" || (channel.group || "Ungrouped") === selectedGroup);
    }

    function populateTitleSelect(channels) {
      const currentValue = els.title.value || "all";
      const selectedGroup = els.group.value || "all";
      const titleLabel = selectedGroup === "all" ? "All Channel Titles" : `${selectedGroup} Channel Titles`;
      const titles = [...new Set(channels
        .map(channel => (channel.title || channel.channelId || "Untitled Channel").trim())
        .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      els.title.innerHTML = [
        `<option value="all">${escapeHtml(titleLabel)}</option>`,
        ...titles.map(title => `<option value="${escapeAttr(title)}">${escapeHtml(title)}</option>`)
      ].join("");

      els.title.value = titles.includes(currentValue) ? currentValue : "all";
    }

    async function loadChannelFeed(channel, maxPerChannel) {
      if (!channel.channelId) {
        throw new Error("Missing channelId.");
      }

      const rssUrl = buildYoutubeRssUrl(channel.channelId);
      const attempts = buildFeedAttempts(rssUrl);
      const errors = [];

      for (const attempt of attempts) {
        try {
          if (attempt.type === "json") {
            const json = await fetchJson(attempt.url);
            const items = parseRssJsonItems(json, channel, maxPerChannel);
            if (items.length) return items;
            errors.push(`${attempt.label}: no items returned`);
          } else {
            const xmlText = await fetchText(attempt.url);
            const items = parseXmlFeed(xmlText, channel, maxPerChannel);
            if (items.length) return items;
            errors.push(`${attempt.label}: no RSS entries returned`);
          }
        } catch (error) {
          errors.push(`${attempt.label}: ${error.message || error}`);
        }
      }

      throw new Error(`All feed fetch attempts failed. ${errors.slice(0, 4).join(" | ")}`);
    }

    function buildYoutubeRssUrl(channelId) {
      return `https://www.youtube.com/feeds/videos.xml?channel_id=${encodeURIComponent(channelId)}`;
    }

    function buildFeedAttempts(rssUrl) {
      const jsonTemplates = Array.isArray(state.config?.feedJsonProxyUrls) ? state.config.feedJsonProxyUrls : [];
      const xmlTemplates = Array.isArray(state.config?.feedProxyUrls) ? state.config.feedProxyUrls : [];
      const legacyTemplate = state.config?.feedProxyUrl ? [state.config.feedProxyUrl] : [];

      const attempts = [];

      jsonTemplates.forEach((template, index) => {
        attempts.push({
          type: "json",
          label: `JSON proxy ${index + 1}`,
          url: applyProxyTemplate(template, rssUrl)
        });
      });

      [...xmlTemplates, ...legacyTemplate].forEach((template, index) => {
        attempts.push({
          type: "xml",
          label: `XML proxy ${index + 1}`,
          url: applyProxyTemplate(template, rssUrl)
        });
      });

      // Last attempt: direct RSS. This usually fails in browsers because CORS, but it can work in permissive environments.
      attempts.push({
        type: "xml",
        label: "Direct YouTube RSS",
        url: rssUrl
      });

      return attempts;
    }

    function applyProxyTemplate(template, rssUrl) {
      return String(template)
        .replaceAll("{url}", encodeURIComponent(rssUrl))
        .replaceAll("{rawUrl}", rssUrl);
    }

    async function fetchText(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const contentType = response.headers.get("content-type") || "";

      // AllOrigins-style JSON wrapper support, because every proxy invents a new tiny religion.
      if (contentType.includes("application/json")) {
        const data = await response.json();
        if (typeof data.contents === "string") return data.contents;
        if (typeof data.body === "string") return data.body;
        if (typeof data.data === "string") return data.data;
        return JSON.stringify(data);
      }

      return response.text();
    }

    function parseXmlFeed(xmlText, channel, maxPerChannel) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");

      const parserError = xml.querySelector("parsererror");
      if (parserError) {
        throw new Error("RSS XML could not be parsed.");
      }

      const feedTitle = textOf(xml, "feed > title") || channel.title || channel.channelId;
      const entries = [...xml.querySelectorAll("entry")].slice(0, maxPerChannel);

      return entries.map(entry => parseEntry(entry, {
        channelTitle: channel.title || feedTitle,
        channelId: channel.channelId,
        group: channel.group || ""
      }));
    }

    function parseRssJsonItems(json, channel, maxPerChannel) {
      const items = Array.isArray(json?.items) ? json.items.slice(0, maxPerChannel) : [];
      return items.map(item => {
        const link = item.link || item.guid || "#";
        const videoId = getVideoIdFromUrl(link);
        const published = item.pubDate || item.published || item.isoDate || "";
        const thumbnail = item.thumbnail || item.enclosure?.link || getYoutubeThumbnail(videoId);
        const title = item.title || "Untitled video";

        return {
          id: videoId || link,
          videoId,
          title,
          link,
          thumbnail,
          summary: stripHtml(item.description || item.content || ""),
          published,
          updated: item.updated || "",
          timestamp: Date.parse(published || item.updated) || 0,
          channelTitle: channel.title || json?.feed?.title || channel.channelId,
          channelId: channel.channelId,
          group: channel.group || ""
        };
      });
    }

    function getVideoIdFromUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.searchParams.get("v") || parsed.pathname.split("/").filter(Boolean).pop() || "";
      } catch {
        return "";
      }
    }

    function parseEntry(entry, channelInfo) {
      const videoId = textOf(entry, "videoId") || textOf(entry, "yt\\:videoId");
      const title = textOf(entry, "title") || "Untitled video";
      const published = textOf(entry, "published") || textOf(entry, "updated") || "";
      const updated = textOf(entry, "updated") || "";
      const link = entry.querySelector("link")?.getAttribute("href") || (videoId ? `https://www.youtube.com/watch?v=${videoId}` : "#");
      const mediaGroup = entry.querySelector("group, media\\:group");
      const thumbnail = mediaGroup?.querySelector("thumbnail, media\\:thumbnail")?.getAttribute("url") || getYoutubeThumbnail(videoId);
      const summary = textOf(mediaGroup || entry, "description") || textOf(mediaGroup || entry, "media\\:description") || textOf(entry, "summary") || "";

      return {
        id: videoId || link,
        videoId,
        title,
        link,
        thumbnail,
        summary: stripHtml(summary),
        published,
        updated,
        timestamp: Date.parse(published || updated) || 0,
        channelTitle: channelInfo.channelTitle,
        channelId: channelInfo.channelId,
        group: channelInfo.group
      };
    }

    function textOf(root, selector) {
      return root?.querySelector(selector)?.textContent?.trim() || "";
    }

    function stripHtml(value) {
      const div = document.createElement("div");
      div.innerHTML = value || "";
      return div.textContent.trim();
    }

    function getYoutubeThumbnail(videoId) {
      return videoId ? `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "";
    }

    function dedupeVideos(items) {
      const seen = new Map();
      items.forEach(item => {
        if (!seen.has(item.id)) seen.set(item.id, item);
      });
      return [...seen.values()];
    }

    function renderFilteredGrid() {
      const query = els.search.value.trim().toLowerCase();
      const sortOrder = els.sort.value;
      const selectedGroup = els.group.value || "all";
      const selectedTitle = els.title.value;

      state.filteredItems = state.items
        .filter(item => selectedGroup === "all" || item.group === selectedGroup)
        .filter(item => selectedTitle === "all" || item.channelTitle === selectedTitle)
        .filter(item => {
          if (!query) return true;
          return [item.title, item.channelTitle, item.summary, item.group]
            .join(" ")
            .toLowerCase()
            .includes(query);
        })
        .sort((a, b) => sortOrder === "oldest" ? a.timestamp - b.timestamp : b.timestamp - a.timestamp);

      if (state.errors.length) {
        setStatus(`<span style="color:#ffb6cf;">${state.errors.length} feed error${state.errors.length === 1 ? "" : "s"}.</span>`);
      } else {
        setStatus("");
      }

      if (state.errors.length && !state.items.length) {
        renderGridError(state.errors);
        return;
      }

      if (!state.filteredItems.length) {
        renderGridMessage(query ? "No videos match your search." : "No videos found in the loaded feeds.");
        return;
      }

      els.grid.innerHTML = state.filteredItems.map(renderCard).join("");
    }

    function renderCard(item) {
      const dateLabel = item.timestamp ? new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(new Date(item.timestamp)) : "Unknown date";

      const localEmbedUrl = item.videoId ? buildLocalEmbedUrl(item.videoId) : item.link;
      const embedData = item.videoId ? ` data-video-embed="${escapeAttr(item.videoId)}"` : "";
      const externalAttrs = item.videoId ? "" : ' target="_blank" rel="noopener noreferrer"';

      return `
        <article class="card">
          <a class="thumb-wrap" href="${escapeAttr(localEmbedUrl)}"${externalAttrs}${embedData} aria-label="Watch ${escapeAttr(item.title)}">
            <img class="thumb" src="${escapeAttr(item.thumbnail)}" alt="" loading="lazy" referrerpolicy="no-referrer" />
          </a>
          <div class="content">
            <span class="channel" title="${escapeAttr(item.channelTitle)}">${escapeHtml(item.channelTitle)}</span>
            <h2 class="title">
              <a href="${escapeAttr(localEmbedUrl)}"${externalAttrs}${embedData}>${escapeHtml(item.title)}</a>
            </h2>
            <div class="meta">
              <span>${escapeHtml(dateLabel)}</span>
              ${item.group ? `<span>• ${escapeHtml(item.group)}</span>` : ""}
            </div>
            ${item.summary ? `<p class="summary">${escapeHtml(item.summary)}</p>` : ""}
          </div>
        </article>
      `;
    }


    function buildLocalEmbedUrl(videoId) {
      const url = new URL(window.location.href);
      url.searchParams.set("video_embed", videoId);
      return `${url.pathname}${url.search}${url.hash}`;
    }

    function openVideoFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get("video_embed");
      if (videoId) {
        openVideoLightbox(videoId, false);
      } else {
        closeVideoLightbox(false);
      }
    }

    function openVideoLightbox(videoId, updateUrl) {
      if (!videoId) return;

      stopGroupCycle();
      clearGroupCycleIdleTimer();

      const item = state.items.find(entry => entry.id === videoId) || state.filteredItems.find(entry => entry.id === videoId) || null;
      if (typeof window.tektiteOpenUnifiedFeedVideo === "function") {
        window.tektiteOpenUnifiedFeedVideo({
          id: videoId,
          title: item?.title || "Gaming Grid Video",
          description: item?.summary || "",
          date: item?.published || item?.updated || "",
          published: item?.published || "",
          views: "",
          thumb: item?.thumbnail || "",
          thumbCandidates: item?.thumbnail ? [item.thumbnail] : [],
          channel: item?.channelTitle || item?.channelId || "Gaming Grid",
          uploader: item?.channelTitle || item?.channelId || "Gaming Grid",
          channelUrl: item?.channelId ? `https://www.youtube.com/channel/${encodeURIComponent(item.channelId)}` : "",
          group: item?.group || ""
        });
      } else {
        els.lightboxFrame.src = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?autoplay=1&rel=0`;
        els.lightbox.classList.add("is-open");
        els.lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      if (updateUrl) {
        postVideoStateToBridge("open", videoId, item?.title || document.title || "Gaming Grid");
        const url = new URL(window.location.href);
        url.searchParams.set("video_embed", videoId);
        url.searchParams.delete("vid");
        history.pushState({ video_embed: videoId }, "", url);
      }
    }

    function closeVideoLightbox(updateUrl) {
      if (typeof window.tektiteCloseUnifiedFeedVideo === "function") {
        window.tektiteCloseUnifiedFeedVideo();
      }
      els.lightbox.classList.remove("is-open");
      els.lightbox.setAttribute("aria-hidden", "true");
      els.lightboxFrame.src = "";
      document.body.style.overflow = "";

      if (updateUrl) {
        postVideoStateToBridge("close", "", "");
        const url = new URL(window.location.href);
        url.searchParams.delete("video_embed");
        url.searchParams.delete("vid");
        history.pushState({}, "", `${url.pathname}${url.search}${url.hash}`);
      }

      scheduleGroupCycleAfterIdle();
    }

    function postVideoStateToBridge(action, videoId, videoTitle = document.title || "Gaming Grid") {
      if (!window.parent || window.parent === window) return;

      window.parent.postMessage({
        type: "feedGridVideoState",
        action,
        videoId: videoId || "",
        videoTitle: videoTitle || document.title || "Gaming Grid"
      }, "*");
    }

    window.addEventListener("message", event => {
      const data = event.data || {};
      if (data.type === "feedGridOpenVideo" && data.videoId) {
        openVideoLightbox(String(data.videoId), false);
      }
      if (data.type === "feedGridCloseVideo") {
        closeVideoLightbox(false);
      }
    });

    function renderGridMessage(message) {
      els.grid.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function renderGridError(errors) {
      els.grid.innerHTML = `
        <div class="error">
          <strong>Feed loading failed.</strong><br />
          ${errors.map(error => `<div>• ${escapeHtml(error)}</div>`).join("")}
          <br />
          If you opened this through <code>file://</code>, run a local server. If feeds fail in a browser, use a CORS-friendly proxy in <code>gaming-grid.json</code>.
        </div>
      `;
    }

    function setStatus(html) {
      els.status.innerHTML = html;
      els.status.hidden = !html;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  
})();
</script>

</body>
