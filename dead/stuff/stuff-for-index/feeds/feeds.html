<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preload" as="image" href="/dead/images/pngs/static.gif">
<title>/dead/stuff/stuff-for-index/feeds/feeds.html</title>

<style>
:root{
--page-bg:black;
--page-background:var(--page-bg);
--panel-bg:#4b0076;
--panel-background:var(--panel-bg);
--page-text:#00ff00;
--accent-color:var(--page-text);
--header-bg:rgba(75,0,118,.5);
--header-control-height:40px;
--button-hover-bg:#2a0042;
--tektite-logo-filter: rgba(0, 255, 0, 0);
--thumbnail-filter: rgba(0, 255, 0, 0);
--page-font-family:"Courier New", monospace;
--page-font-scale:1;
--feed-grid-gap:20px;
--feed-card-padding:10px;
--feed-visible-grid-rows:1;
--feed-fit-gap-count:3;
--feed-load-more-visible-height:var(--header-control-height);
--feed-load-more-height:var(--header-control-height);
--feed-grid-card-size:min(
calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3),
calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
);
--feed-header-row-gap:var(--feed-grid-gap);
--feed-posts-x:20px;
--feed-control-button-size:var(--header-control-height);
--feed-bg-pattern-duration:8s;
}
html,body{
overflow-x:hidden;

background:#000;
color:var(--page-text);
font-family:var(--page-font-family);
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
font-size:calc(16px * var(--page-font-scale));
}

/* MODIFIED: page font scaling should affect text only.
   It must ignore images, so do not zoom the full document. */
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:stretch;
justify-content:center;
gap:var(--feed-header-row-gap) var(--feed-grid-gap);
padding:13px 20px var(--feed-header-row-gap);
background:var(--header-bg);
position:relative;
z-index:20;
}

.channelHeader{
display:flex;
align-items:stretch;
gap:6px;
width:calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3);
min-width:0;
}
.channelHeader a{
display:flex;
align-items:center;
text-decoration:none;
color:inherit;
}
.channelHeader .logoLink{
position:relative;
display:inline-flex;
align-items:center;
justify-content:center;
isolation:isolate;
background:#000;
border:1px solid var(--accent-color);
min-height:var(--header-control-height);
box-sizing:border-box;
padding:4px 8px;
flex:1 1 112px;
min-width:82px;
gap:0;
}
.channelLogoPrompt{
font-size:clamp(12px, calc(0.86vw * var(--page-font-scale)), 20px);
font-weight:bold;
line-height:1;
white-space:nowrap;
flex:0 0 auto;
}
.channelLogoImageWrap{
position:relative;
display:inline-flex;
align-items:center;
justify-content:center;
height:auto;
max-width:100%;
flex:0.82 1 auto;
min-width:0;
}
.channelLogo{height:auto;width:100%;max-width:100%;display:block;object-fit:contain;}
.channelLogoTintLayer,
.thumbTintLayer{
position:absolute;
inset:0;
pointer-events:none;
mix-blend-mode:color;
-webkit-mask-image:var(--tint-mask);
mask-image:var(--tint-mask);
-webkit-mask-repeat:no-repeat;
mask-repeat:no-repeat;
-webkit-mask-position:center;
mask-position:center;
-webkit-mask-size:contain;
mask-size:contain;
}
.channelLogoTintLayer{
background:var(--tektite-logo-filter);
}

.thumbTintLayer{
background:var(--thumbnail-filter);
-webkit-mask-size:cover;
mask-size:cover;
}
.channelTitle{
font-size:calc(11px * var(--page-font-scale));
font-weight:bold;
display:flex;
align-items:stretch;
gap:6px;
flex-wrap:nowrap;
min-width:0;
flex:0 0 auto;
}
.channelHandleLink{
display:inline-flex !important;
align-items:center;
gap:5px;
justify-content:flex-end;
color:inherit;
text-decoration:none;
line-height:1;
background:#000;
border:1px solid var(--accent-color);
min-height:var(--header-control-height);
box-sizing:border-box;
padding:0 6px;
min-width:0;
flex:0 0 auto;
overflow:visible;
}
.channelHandleLink span{
min-width:0;
flex:0 0 auto;
overflow:visible;
text-overflow:clip;
white-space:nowrap;
text-align:right;
}
.channelHandleAvatar{
width:20px;
height:20px;
border-radius:50%;
object-fit:cover;
display:block;
border:1px solid var(--accent-color);
flex:0 0 20px;
}

.controls{
display:flex;
align-items:stretch;
align-self:stretch;
gap:6px;
position:relative;
z-index:21;
width:calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3);
min-width:0;
}

.sortStatePanel{
display:flex;
align-items:center;
justify-content:center;
width:calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3);
min-width:0;
min-height:var(--header-control-height);
box-sizing:border-box;
padding:0 10px;
background:#000;
border:1px solid var(--accent-color);
color:var(--page-text);
font-size:calc(21px * var(--page-font-scale));
font-weight:700;
line-height:1.15;
text-align:center;
}

@keyframes overlay-ui-hueshift {
from { filter: hue-rotate(0deg); }
to { filter: hue-rotate(360deg); }
}

@keyframes overlay-ui-color-hueshift {
0%{color:#00ff00;border-color:#00ff00;}
33%{color:#00ffff;border-color:#00ffff;}
66%{color:#ff00ff;border-color:#ff00ff;}
100%{color:#00ff00;border-color:#00ff00;}
}

a:hover,
a:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
}

#videoTitle a[href*="youtube.com"],
#videoTitle a[href*="youtu.be"]{
display:inline-flex;
align-items:center;
justify-content:center;
background:#000;
border:1px solid var(--accent-color);
padding:6px 10px;
}

#videoSearch{
width:auto;
height:auto;
min-height:var(--header-control-height);
border:1px solid var(--accent-color);
background:#000;
color:var(--page-text);
padding:0 8px;
font-family:var(--page-font-family);
font-weight:700;
font-size:calc(14px * var(--page-font-scale));
box-sizing:border-box;
min-width:0;
flex:1 1 0;
}

#videoSearch::placeholder{
color:var(--page-text);
opacity:1;
}

#videoSearch:hover,
#videoSearch:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

button{
display:inline-flex;
align-items:center;
justify-content:center;
align-self:stretch;
height:auto;
min-height:var(--header-control-height);
padding:0;
border:1px solid var(--accent-color);
background:#000;color:var(--page-text);
cursor:pointer;
font-family:var(--page-font-family);
font-weight:700;
font-size:calc(12px * var(--page-font-scale));
box-sizing:border-box;
min-width:0;
flex:0 0 auto;
width:var(--feed-control-button-size);
aspect-ratio:1;
}

button:hover,
button:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

#gridBtn,
#modeBtn{
aspect-ratio:auto;
padding:0 10px;
width:calc((var(--feed-sort-buttons-width, calc((2 * var(--feed-control-button-size)) + 6px)) - 6px) / 2);
}

#gridMenu{
position:absolute;
top:50px;
right:0;
background:var(--panel-background);
border:2px solid var(--accent-color);
padding:25px;
display:none;
z-index:999;
}

#gridControl{
width:220px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.gridMenuLabel{
font-size:calc(14px * var(--page-font-scale));
white-space:nowrap;
}

#gridPageSelect{
height:40px;
min-width:108px;
border:2px solid var(--accent-color);
background:var(--panel-background);
color:var(--page-text);
padding:0 12px;
font-family:var(--page-font-family);
}

#posts{
padding:var(--feed-grid-gap) var(--feed-posts-x);
margin-bottom:0;
min-height:100vh;
min-height:100dvh;
box-sizing:border-box;
position:relative;
isolation:isolate;
background-color:#000;
overflow:hidden;
}

#feedCanvasBackground{
position:absolute;
inset:0;
width:100%;
height:100%;
border:0;
display:block;
z-index:0;
background:#000;
pointer-events:none;
}

@keyframes feed-bg-pattern-slide{
from{background-position:0 0;}
to{background-position:88px 88px;}
}

body.feed-sort-transition{
animation: feed-sort-rgb-fade 2.4s ease-in-out;
}

body.feed-sort-transition::before,
body.feed-sort-transition::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
z-index:99998;
opacity:0;
mix-blend-mode:screen;
}

body.feed-sort-transition::before{
background:
linear-gradient(rgba(255,0,80,.24), rgba(255,0,80,.24)),
repeating-linear-gradient(0deg, rgba(255,255,255,.2) 0 1px, transparent 1px 5px);
animation: feed-sort-rgb-red 2.4s ease-in-out;
}

body.feed-sort-transition::after{
background:
linear-gradient(rgba(0,170,255,.24), rgba(0,170,255,.24)),
repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,255,90,.18) 2px 4px);
animation: feed-sort-rgb-cyan 2.4s ease-in-out;
}

@keyframes feed-sort-rgb-fade{
0%{opacity:1;filter:none;transform:translate(0,0);}
18%{opacity:.96;filter:contrast(1.08) saturate(1.2);transform:translate(-1px,.5px);}
36%{opacity:.82;filter:contrast(1.22) saturate(1.55) hue-rotate(6deg);transform:translate(1.5px,-.5px);}
50%{opacity:.68;filter:contrast(1.38) saturate(1.85) hue-rotate(10deg);transform:translate(-2px,0);}
64%{opacity:.82;filter:contrast(1.22) saturate(1.55) hue-rotate(-6deg);transform:translate(1px,.5px);}
82%{opacity:.96;filter:contrast(1.08) saturate(1.2);transform:translate(-.5px,0);}
100%{opacity:1;filter:none;transform:translate(0,0);}
}

@keyframes feed-sort-rgb-red{
0%,100%{opacity:0;transform:translateX(0);}
20%{opacity:.12;transform:translateX(-2px);}
42%{opacity:.34;transform:translateX(4px);}
54%{opacity:.48;transform:translateX(-5px);}
74%{opacity:.18;transform:translateX(2px);}
}

@keyframes feed-sort-rgb-cyan{
0%,100%{opacity:0;transform:translateX(0);}
18%{opacity:.1;transform:translateX(2px);}
40%{opacity:.3;transform:translateX(-4px);}
52%{opacity:.44;transform:translateX(5px);}
76%{opacity:.16;transform:translateX(-2px);}
}

.grid{
display:grid;
grid-template-columns:repeat(var(--cols,3), var(--feed-grid-card-size));
column-gap:var(--feed-grid-gap);
row-gap:var(--feed-grid-gap);
align-items:stretch;
align-content:center;
justify-content:center;
}

.list .post{
display:flex;
align-items:center;
gap:var(--feed-grid-gap);
margin-bottom:var(--feed-grid-gap);
border:2px solid var(--accent-color);
padding:var(--feed-card-padding);
background:var(--panel-background);
}

.grid .post{
border:2px solid var(--accent-color);
padding:var(--feed-card-padding);
cursor:pointer;
background:var(--panel-background);
box-sizing:border-box;
aspect-ratio:1;
height:auto;
overflow:hidden;
position:relative;
z-index:1;
}

.grid .post:hover,
.grid .post:focus-within{
background:var(--button-hover-bg);
background-color:var(--button-hover-bg);
}

.grid .post-link{
height:100%;
display:flex;
flex-direction:column;
min-height:0;
}

.thumb-grid{
flex:1 1 auto;
min-height:0;
aspect-ratio:auto;
overflow:hidden;
border:2px solid var(--accent-color);
margin-bottom:10px;
background:var(--panel-background) url("/dead/images/pngs/static.gif") center / 100% 100% no-repeat;
position:relative;
isolation:isolate;
}

.grid .post:hover .thumb-grid,
.grid .post:focus-within .thumb-grid{
background-color:var(--button-hover-bg);
}

.thumb-grid img{width:100%;height:100%;object-fit:cover;display:block;background:#000;opacity:0;transition:opacity 1200ms ease;}
.thumb-grid img.is-loaded{opacity:1;}

.thumb-list{width:160px;border:2px solid var(--accent-color);background:var(--panel-background) url("/dead/images/pngs/static.gif") center / 100% 100% no-repeat;position:relative;overflow:hidden;isolation:isolate;}
.thumb-list img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#000;opacity:0;transition:opacity 1200ms ease;}
.thumb-list img.is-loaded{opacity:1;}

.post-title{font-size:calc(17px * var(--page-font-scale));font-weight:700;line-height:1.25;opacity:1;transition:opacity 180ms ease;}
.post-date{font-size:calc(13px * var(--page-font-scale));font-weight:700;opacity:.82;line-height:1.3;transition:opacity 180ms ease;}

.post.thumbnail-pending .post-title,
.post.thumbnail-pending .post-date{
opacity:0;
}

.post.thumbnail-pending .thumb-grid::after,
.post.thumbnail-pending .thumb-list::after{
content:"Loading image...";
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
color:lime;
font-family:"Courier New", monospace;
font-size:12px;
line-height:1;
text-align:center;
pointer-events:none;
z-index:2;
}

.grid .post-title{
height:3.75em;
overflow:hidden;
display:-webkit-box;
-webkit-box-orient:vertical;
-webkit-line-clamp:3;
}

.grid .post-date{
height:2.6em;
overflow:hidden;
display:-webkit-box;
-webkit-box-orient:vertical;
-webkit-line-clamp:2;
}

.post-link{
display:block;
color:inherit;
text-decoration:none;
}

.post-link:hover,
.post-link:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

#loadMore{
display:flex;
align-items:center;
justify-content:center;
grid-column:2;
justify-self:stretch;
margin:0;
padding:0 12px;
width:100%;

height:var(--header-control-height);

#loadMore:hover,
#loadMore:focus-visible{

}

#videoViewport{

height:100dvh;

overflow:hidden;
isolation:isolate;
}

#videoCanvasBackground{
position:absolute;
inset:0;
width:100%;
height:100%;

#videoTitle{

margin:0;
text-align:center;

max-width:100%;

}

#videoTitle .videoChannelLink{

#videoTitle .videoChannelAvatar{

height:32px;
border-radius:50%;

}

#videoFrame{
width:min(100%,960px,calc(52dvh * 16 / 9));

max-height:52dvh;

border:2px solid var(--accent-color);

}


#videoExcerpt{

text-align:center;

margin-top:10px;
}

#videoExcerpt a{
color:var(--page-text);
text-decoration:none;
cursor:pointer;
}

#videoFull{
flex:1 1 auto;
min-height:0;
width:min(100%,960px,calc(52dvh * 16 / 9));
max-width:100%;
box-sizing:border-box;
margin:0 auto;
display:none;
line-height:1.32;

text-align:center;

#videoFull::-webkit-scrollbar{
display:none;
}

#videoFull.is-empty{

}


#closeVideo{

font-size:calc(20px * var(--page-font-scale));
color:var(--page-text);

#closeVideo:hover{

}

#videoMeta{
flex:0 0 auto;
margin:0;
font-size:calc(16px * var(--page-font-scale));

opacity:1;
color:var(--accent-color);

}

#videoMeta .videoMetaLine{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
gap:10px;
}

#videoMeta .videoMetaDivider{
opacity:.85;
}

.status{text-align:center;padding:10px;}

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");
}

function parseUploadDate(value){
const raw = String(value || "").trim();
if(!/^\d{8}$/.test(raw)) return 0;
const year = Number(raw.slice(0,4));
const month = Number(raw.slice(4,6)) - 1;
const day = Number(raw.slice(6,8));
return Date.UTC(year, month, day) / 1000;
}

function getSortableTimestamp(video){
if(Number.isFinite(video.release_timestamp)) return video.release_timestamp;
if(Number.isFinite(video.timestamp)) return video.timestamp;

if(parsedUploadDate) return parsedUploadDate;
return 0;
}

function formatVideoDate(post){
const timestamp = Number(post.sortTimestamp || 0);
if(!timestamp) return "";
return new Date(timestamp * 1000).toLocaleDateString(undefined, {
year: "numeric",
month: "short",
day: "numeric"
});
}

function formatViewCount(value){
const count = Number(value || 0);
if(!Number.isFinite(count) || count <= 0) return "";
return `${count.toLocaleString()} view${count === 1 ? "" : "s"}`;
}

}

return safeUrl

}

return `<div class="videoMetaLine">${content}</div>`;
}

function buildThumbnailCandidates(video){
const thumbs = Array.isArray(video.thumbnails) ? video.thumbnails.filter(Boolean) : [];
const candidates = [];

function addCandidate(url){
if(url && !candidates.includes(url)) candidates.push(url);
}

function getThumbScore(thumb){
const width = Number(thumb && thumb.width || 0);
const height = Number(thumb && thumb.height || 0);
const url = String(thumb && thumb.url || "");
const hasQuery = url.includes("?");
return (width * height) - (hasQuery ? 1 : 0);
}

const hdPatterns = [
/maxresdefault\.(jpg|webp)(?:\?|$)/i,
/sddefault\.(jpg|webp)(?:\?|$)/i,
/hq720\.(jpg|webp)(?:\?|$)/i,
/hqdefault\.(jpg|webp)(?:\?|$)/i
];

for(const pattern of hdPatterns){
thumbs
.filter((thumb)=>pattern.test(String(thumb && thumb.url || "")))
.sort((a,b)=>getThumbScore(b) - getThumbScore(a))
.forEach((thumb)=>addCandidate(String(thumb && thumb.url || "")));
}

const preferred = thumbs[3] || thumbs[thumbs.length - 1];
if(preferred && preferred.url) addCandidate(preferred.url);
thumbs.forEach((thumb)=>addCandidate(String(thumb && thumb.url || "")));
addCandidate(`https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`);

return candidates;
}

function pickThumbnailUrl(video){
return buildThumbnailCandidates(video)[0] || `https://i.ytimg.com/vi/${video.id}/hqdefault.jpg`;
}

function applyThumbnailSource(thumb, layer, url, altText){
let img = thumb.querySelector("img");
if(!img){
img = document.createElement("img");
img.alt = altText || "Video thumbnail";
thumb.insertBefore(img, layer || null);
}
if(layer){
const safeUrl = String(url).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
}
if(img.dataset.thumbnailSrc === url) return;
img.dataset.thumbnailSrc = url;
img.src = url;
img.classList.add("is-loaded");
}

function markThumbnailReady(card){
if(!card) return;
card.classList.remove("thumbnail-pending");
card.classList.add("thumbnail-ready");
}

function getThumbnailCacheKey(post){
return String(post && (post.id || post.thumb || post.title) || "");
}

function getThumbnailCandidates(post){
return Array.isArray(post.thumbCandidates) && post.thumbCandidates.length
? post.thumbCandidates
: [post.thumb].filter(Boolean);
}

function prepareThumbnailCard(post, card){
const thumb = card.querySelector(".thumb-grid, .thumb-list");
const layer = card.querySelector(".thumbTintLayer");

if(!thumb) return null;
const img = thumb.querySelector("img");
const altText = thumb.dataset.thumbnailAlt || `${post.title || "Video"} thumbnail`;
card.classList.add("thumbnail-pending");
card.classList.remove("thumbnail-ready");
if(img){
img.classList.remove("is-loaded");
}
if(layer){
layer.style.removeProperty("--tint-mask");
}
return { post, card, thumb, layer, altText };
}

function resolveThumbnailSource(post){
const cacheKey = getThumbnailCacheKey(post);
if(cacheKey && thumbnailSourceCache.has(cacheKey)){
return Promise.resolve(thumbnailSourceCache.get(cacheKey));
}

const candidates = getThumbnailCandidates(post);
if(!candidates.length){
if(cacheKey) thumbnailSourceCache.set(cacheKey, THUMBNAIL_FALLBACK);
return Promise.resolve(THUMBNAIL_FALLBACK);
}

return new Promise((resolve)=>{
function finish(url){
const resolvedUrl = url || THUMBNAIL_FALLBACK;
if(cacheKey) thumbnailSourceCache.set(cacheKey, resolvedUrl);
resolve(resolvedUrl);
}

function tryCandidate(index){
if(index >= candidates.length){
finish(THUMBNAIL_FALLBACK);
return;
}

const probe = new Image();
probe.onload = ()=>{
const isTinyPlaceholder = probe.naturalWidth <= 120 && probe.naturalHeight <= 90;
if(isTinyPlaceholder){
tryCandidate(index + 1);
return;
}
finish(candidates[index]);
};
probe.onerror = ()=>tryCandidate(index + 1);
probe.src = candidates[index];
}

tryCandidate(0);
});
}

function attachThumbnailFallback(post, card){
const target = prepareThumbnailCard(post, card);
if(!target) return Promise.resolve();
return resolveThumbnailSource(post).then((url)=>{
if(!card.isConnected) return;
applyThumbnailSource(target.thumb, target.layer, url, target.altText);
markThumbnailReady(card);
});
}

function loadThumbnailBatchInSequence(targets){
let sequence = Promise.resolve();
targets.forEach((target)=>{
sequence = sequence.then(()=>resolveThumbnailSource(target.post).then((url)=>{
target.resolvedUrl = url;
}));
});
return sequence.then(()=>{
targets.forEach((target)=>{
if(!target.card.isConnected) return;
applyThumbnailSource(target.thumb, target.layer, target.resolvedUrl, target.altText);
markThumbnailReady(target.card);
});
window.requestAnimationFrame(postHeaderState);
});
}

function getFilteredPosts(query){
const normalizedQuery = String(query || "").trim().toLowerCase();
const matches = normalizedQuery
? posts.filter((post)=>`${post.title} ${post.description} ${post.channel} ${post.uploader}`.toLowerCase().includes(normalizedQuery))
: [...posts];
return matches.sort((a,b)=>{
const aTimestamp = Number(a.sortTimestamp || 0);
const bTimestamp = Number(b.sortTimestamp || 0);
const aViews = Number(a.views || 0);
const bViews = Number(b.views || 0);
const sortMode = sortModes[sortModeIndex];
const aHasTimestamp = aTimestamp > 0;
const bHasTimestamp = bTimestamp > 0;

if(sortMode === "newest" || sortMode === "oldest"){
if(aHasTimestamp && bHasTimestamp && aTimestamp !== bTimestamp){
return sortMode === "newest" ? bTimestamp - aTimestamp : aTimestamp - bTimestamp;
}
if(a.sourceIndex !== b.sourceIndex){
return sortMode === "newest" ? a.sourceIndex - b.sourceIndex : b.sourceIndex - a.sourceIndex;
}
if(aViews !== bViews){
return bViews - aViews;
}
}else{
if(aViews !== bViews){
return sortMode === "most-viewed" ? bViews - aViews : aViews - bViews;
}
if(aHasTimestamp && bHasTimestamp && aTimestamp !== bTimestamp){
return bTimestamp - aTimestamp;
}
if(a.sourceIndex !== b.sourceIndex){
return a.sourceIndex - b.sourceIndex;
}
}
return a.sourceIndex - b.sourceIndex;
});
}

function resolveCanvasBackgroundUrl(entry){
const file = String(entry && (entry.file || entry.path || entry.url) || DEFAULT_CANVAS_BACKGROUND_FILE)
.trim()
.replace(/^\.\/+/, "");
try{
const url = new URL(file, window.location.origin + CANVAS_BACKGROUNDS_BASE_PATH);
return `${url.pathname}${url.search}${url.hash}`;
}catch(error){
return `${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`;
}
}

function normalizeCanvasBackgroundEntry(entry){
if(!entry || typeof entry !== "object") return null;
const file = String(entry.file || entry.path || "").trim().replace(/^\.\/+/, "");
if(!file) return null;
return {
title:String(entry.title || file).trim(),
file,
path:String(entry.path || file).trim(),
url:resolveCanvasBackgroundUrl({...entry, file})
};
}

function ensureFeedCanvasBackgroundFrame(){
if(canvasBackgroundFrame && canvasBackgroundFrame.isConnected) return canvasBackgroundFrame;
canvasBackgroundFrame=document.createElement("iframe");
canvasBackgroundFrame.id="feedCanvasBackground";
canvasBackgroundFrame.title="Feed canvas background";
canvasBackgroundFrame.setAttribute("aria-hidden","true");
canvasBackgroundFrame.tabIndex=-1;
canvasBackgroundFrame.loading="eager";
if(currentCanvasBackground && currentCanvasBackground.url){
canvasBackgroundFrame.src=currentCanvasBackground.url;
}else{
canvasBackgroundFrame.src=`${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`;
}
postsEl.prepend(canvasBackgroundFrame);
return canvasBackgroundFrame;
}

function findCanvasBackground(value){
const requested = String(value || "").trim().toLowerCase();
if(!requested){
return canvasBackgrounds.find((entry)=>entry.file === DEFAULT_CANVAS_BACKGROUND_FILE) || canvasBackgrounds[0] || null;
}
return canvasBackgrounds.find((entry)=>{
return entry.title.toLowerCase() === requested
|| entry.file.toLowerCase() === requested
|| entry.path.toLowerCase() === requested
|| entry.url.toLowerCase() === requested
|| entry.file.toLowerCase().includes(requested)
|| entry.title.toLowerCase().includes(requested);
}) || null;
}

function setCanvasBackground(value){
const match = findCanvasBackground(value) || {
title:"Starfield Background",
file:DEFAULT_CANVAS_BACKGROUND_FILE,
path:`./${DEFAULT_CANVAS_BACKGROUND_FILE}`,
url:`${CANVAS_BACKGROUNDS_BASE_PATH}${DEFAULT_CANVAS_BACKGROUND_FILE}`
};
currentCanvasBackground=match;
ensureFeedCanvasBackgroundFrame().src=match.url;
return match;
}

function cycleCanvasBackground(direction=1){
if(!canvasBackgrounds.length) return setCanvasBackground(DEFAULT_CANVAS_BACKGROUND_FILE);
const currentIndex = Math.max(0, canvasBackgrounds.findIndex((entry)=>currentCanvasBackground && entry.url === currentCanvasBackground.url));
const nextIndex = (currentIndex + direction + canvasBackgrounds.length) % canvasBackgrounds.length;
return setCanvasBackground(canvasBackgrounds[nextIndex].file);
}

async function loadCanvasBackgroundIndex(){
try{
const response = await fetch(CANVAS_BACKGROUNDS_INDEX_PATH, { cache:"no-store" });
if(!response.ok) throw new Error(`Failed to load ${CANVAS_BACKGROUNDS_INDEX_PATH}`);
const data = await response.json();
canvasBackgrounds = (Array.isArray(data) ? data : [])
.map(normalizeCanvasBackgroundEntry)
.filter(Boolean);
}catch(error){
console.warn("Unable to load canvas background index", error);
canvasBackgrounds=[];
}
setCanvasBackground(DEFAULT_CANVAS_BACKGROUND_FILE);
}

async function fetchJson(path){
const response = await fetch(path, { cache: "no-store" });
if(!response.ok) throw new Error(`${path} failed`);
return response.json();
}

function normalizeLegacyFeedData(data){
const channelMeta = {
channel: data.channel || data.uploader || "",
channel_id: data.channel_id || data.id || "",
channel_url: data.channel_url || data.uploader_url || "",
uploader: data.uploader || data.channel || "",
uploader_url: data.uploader_url || data.channel_url || ""
};

const entries = Array.isArray(data.entries)
? data.entries.map((entry)=>({
...entry,
channel: entry?.channel || channelMeta.channel,
channel_id: entry?.channel_id || channelMeta.channel_id,
channel_url: entry?.channel_url || channelMeta.channel_url,
uploader: entry?.uploader || channelMeta.uploader,
uploader_url: entry?.uploader_url || channelMeta.uploader_url
}))
: [];

return {
title: data.title || "Channel Feed",
channels: channelMeta.channel || channelMeta.uploader ? [channelMeta] : [],
entries
};
}

async function loadFeedData(){
let primaryData = null;
let primaryError = null;

try{
primaryData = await fetchJson(FEED_DATA_PATH);
const primaryEntries = Array.isArray(primaryData.entries) ? primaryData.entries : [];
if(primaryEntries.length){
return primaryData;
}
console.warn(`Primary feed at ${FEED_DATA_PATH} is empty; falling back to ${FALLBACK_FEED_DATA_PATH}.`);
}catch(error){
primaryError = error;
console.warn(`Unable to load ${FEED_DATA_PATH}; falling back to ${FALLBACK_FEED_DATA_PATH}.`, error);
}

try{
const fallbackData = normalizeLegacyFeedData(await fetchJson(FALLBACK_FEED_DATA_PATH));
if(Array.isArray(fallbackData.entries) && fallbackData.entries.length){
return fallbackData;
}
}catch(fallbackError){
console.error(`Unable to load fallback feed from ${FALLBACK_FEED_DATA_PATH}.`, fallbackError);
if(primaryError){
throw primaryError;
}
throw fallbackError;
}

return primaryData || { title: "Channel Feed", channels: [], entries: [] };
}




async function loadPosts(){

try{
const data = await loadFeedData();
applyFeedMetadata(data);

posts = (data.entries || []).map((v, index) => {
const thumbCandidates = buildThumbnailCandidates(v);
return ({

id: v.id,
title: v.title || "",
description: v.description || "",
date: "",
duration: v.duration || 0,
views: v.view_count || 0,
thumb: thumbCandidates[0] || pickThumbnailUrl(v),
thumbCandidates,
channel: v.channel || v.uploader || data.channel || data.uploader || "",
uploader: v.uploader || v.channel || data.uploader || data.channel || "",
channelUrl: v.channel_url || v.uploader_url || data.channel_url || data.uploader_url || "",
sourceIndex: index,
sortTimestamp: getSortableTimestamp(v)
});
});

refreshFilteredPosts();

if(!posts.length){
statusEl.textContent="NO FEED ITEMS FOUND";
statusEl.style.display="block";
if(modeBtn) modeBtn.disabled=true;
loadBtn.style.display="none";
render();
return;
}

statusEl.style.display="none";
if(modeBtn) modeBtn.disabled=false;

updateSortButton();
syncGridPaging();
render();
startSortCycle();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED DATA";

}

}



const initialStandalonePath = window.location.pathname;

function notifyVideoRouteChange(action,id,videoTitle=""){
try{
if(window.parent && window.parent !== window){
window.parent.postMessage({
 type:"feedGridVideoState",
 action,
 videoId:id || "",
 videoTitle:videoTitle || ""
}, "*");
return;
}
}catch(e){
console.warn("Unable to notify parent about feed route change", e);
}

const nextUrl = action === "open" && id
 ? `/dead/videos/?vid=${encodeURIComponent(id)}`
 : initialStandalonePath;
window.history.replaceState({ videoId: id || null }, "", nextUrl);
}

function closeVideo(){
videoViewport.style.display="none";
frame.src="";
notifyVideoRouteChange("close","");
}

function openVideo(post){
if(!post || !post.id) return;
const id = post.id;
const title = post.title || "";
const description = post.description || "";

frame.src="https://www.youtube.com/embed/"+id;
notifyVideoRouteChange("open",id,title);

document.getElementById("videoTitle").innerHTML =
buildVideoChannelHtml(post);

let clean=(description||"")
.replace(/<br\s*\/?>/gi,"\n")
.replace(/<[^>]*>/g,"")
.trim();

document.getElementById("videoMeta").innerHTML = buildVideoMetaHtml(post);
const videoFullEl = document.getElementById("videoFull");
const hasDescription = Boolean(clean);
videoFullEl.textContent = hasDescription ? clean : "No description available.";
videoFullEl.classList.toggle("is-empty", !hasDescription);
videoFullEl.style.display = "block";

videoViewport.style.display="flex";

document.getElementById("closeVideo").onclick = closeVideo;

}

function render(){
updateTintFilters();
updateViewButton();
postsEl.className=view;
if(document.body.dataset.sortTransition === "true"){
document.body.classList.add("feed-sort-transition");
}
postsEl.style.gridTemplateColumns=isMobile()
? "var(--feed-grid-card-size)"
: "repeat("+gridSize+", var(--feed-grid-card-size))";

Array.from(postsEl.children).forEach((child)=>{
if(child.id !== "feedCanvasBackground") child.remove();
});
ensureFeedCanvasBackgroundFrame();

const data=filtered.slice(0,visible);
const visibleGridRows = view === "grid" ? Math.max(1, Math.ceil(data.length / gridSize)) : 1;
const hasMoreItems = visible < filtered.length;
postsEl.style.setProperty("--feed-visible-grid-rows", String(visibleGridRows));
postsEl.style.setProperty("--feed-fit-gap-count", String(hasMoreItems ? visibleGridRows + 2 : visibleGridRows + 1));
postsEl.style.setProperty("--feed-load-more-height", hasMoreItems ? "var(--feed-load-more-visible-height)" : "0px");

const thumbnailTargets = [];

data.forEach(p=>{

const el=document.createElement("div");
el.className="post";

if(view==="grid"){
el.innerHTML=`
<a class="post-link" href="https://youtube.com/watch?v=${encodeURIComponent(p.id)}" target="_blank" rel="noopener noreferrer">
<div class="thumb-grid" data-thumbnail-alt="${escapeHtml(p.title)} thumbnail">
<span class="thumbTintLayer" aria-hidden="true"></span>
</div>
<div class="post-title">${escapeHtml(p.title)}</div>
<div class="post-date">${escapeHtml(buildPostMeta(p))}</div>
</a>`;

el.querySelector(".post-link").onclick=(event)=>{
event.preventDefault();
openVideo(p);
};
}
else{
el.innerHTML=`
<a class="post-link" href="https://youtube.com/watch?v=${encodeURIComponent(p.id)}" target="_blank" rel="noopener noreferrer">
<div class="thumb-list" data-thumbnail-alt="${escapeHtml(p.title)} thumbnail">
<span class="thumbTintLayer" aria-hidden="true"></span>
</div>
</a>
<div>
<a class="post-link post-title" href="https://youtube.com/watch?v=${encodeURIComponent(p.id)}" target="_blank" rel="noopener noreferrer">${escapeHtml(p.title)}</a>
<a class="post-link post-date" href="https://youtube.com/watch?v=${encodeURIComponent(p.id)}" target="_blank" rel="noopener noreferrer">${escapeHtml(buildPostMeta(p))}</a>

</div>`;

el.querySelectorAll(".post-link").forEach((link)=>{
link.onclick=(event)=>{
event.preventDefault();
openVideo(p);
};
});
}

const thumbnailTarget = prepareThumbnailCard(p, el);
if(thumbnailTarget){
thumbnailTargets.push(thumbnailTarget);
}
postsEl.appendChild(el);

});

loadThumbnailBatchInSequence(thumbnailTargets);
postsEl.appendChild(loadBtn);
if(!hasMoreItems) loadBtn.style.display="none";
else loadBtn.style.display="flex";
window.requestAnimationFrame(postHeaderState);
}

if(gridBtn){
gridBtn.onclick=()=>{
gridMenu.style.display="none";
if(view==="grid"){
view="list";
visible=3;
}else{
view="grid";
gridPageCount=1;
syncGridPaging();
}
render();
}
}

loadBtn.onclick=()=>{
if(view==="list"){
visible+=3;
}else{
const maxPages=getMaxGridPages();
if(gridPageCount<maxPages){
gridPageCount++;
updateGridPageOptions();
visible=getGridVisibleCount();
}
}
render();
}

if(searchInput){
searchInput.addEventListener("input",()=>{
refreshFilteredPosts();
syncGridPaging();
render();
});
}


const cubeContainer=document.getElementById("cubeContainer");

function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

if(modeBtn){
modeBtn.onclick=()=>{
pauseSortCycleForUser();
cycleSortMode(true);
}
}

function stopSortCycle(){
if(sortCycleIntervalId !== null){
window.clearInterval(sortCycleIntervalId);
sortCycleIntervalId=null;
}
}

function pauseSortCycleForUser(){
stopSortCycle();
if(sortIdleTimeoutId !== null){
window.clearTimeout(sortIdleTimeoutId);
}
sortIdleTimeoutId=window.setTimeout(()=>{
sortIdleTimeoutId=null;
startSortCycle();
}, SORT_IDLE_RESUME_MS);
}

function clearSortTransitionTimers(){
if(sortTransitionTimeoutId !== null){
window.clearTimeout(sortTransitionTimeoutId);
sortTransitionTimeoutId=null;
}
if(sortTransitionRenderTimeoutId !== null){
window.clearTimeout(sortTransitionRenderTimeoutId);
sortTransitionRenderTimeoutId=null;
}
}

function applyNextSortMode(){
sortModeIndex = (sortModeIndex + 1) % sortModes.length;
updateSortButton();
refreshFilteredPosts();
render();
}

function cycleSortMode(animated=false){
if(!posts.length || (modeBtn && modeBtn.disabled)) return;

clearSortTransitionTimers();

if(!animated){
applyNextSortMode();
return;
}

document.body.dataset.sortTransition = "true";
document.body.classList.remove("feed-sort-transition");
void document.body.offsetWidth;
document.body.classList.add("feed-sort-transition");

sortTransitionRenderTimeoutId=window.setTimeout(()=>{
applyNextSortMode();
}, SORT_TRANSITION_MS / 2);

sortTransitionTimeoutId=window.setTimeout(()=>{
document.body.classList.remove("feed-sort-transition");
delete document.body.dataset.sortTransition;
sortTransitionTimeoutId=null;
sortTransitionRenderTimeoutId=null;
}, SORT_TRANSITION_MS);
}

function startSortCycle(){
stopSortCycle();
sortCycleIntervalId=window.setInterval(()=>{
cycleSortMode(true);
}, SORT_CYCLE_INTERVAL_MS);
}

function buildCube(){

cubeContainer.innerHTML="";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(
70,
cubeContainer.clientWidth/cubeContainer.clientHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
cubeContainer.appendChild(renderer.domElement);

camera.position.z=6;

const light=new THREE.AmbientLight(0xffffff,1);
scene.add(light);

let shuffled=shuffle(filtered);

const materials=[];

function buildFaceTexture(face){

let canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=512;
let ctx=canvas.getContext("2d");

let texture=new THREE.CanvasTexture(canvas);

let cell=canvas.width/gridSize;

for(let y=0;y<gridSize;y++){
for(let x=0;x<gridSize;x++){

let i=face*(gridSize*gridSize)+y*gridSize+x;
let v=shuffled[i];
if(!v) continue;

let img=new Image();
img.crossOrigin="anonymous";
img.src=v.thumb;

img.onload=()=>{
ctx.drawImage(img,x*cell,y*cell,cell,cell);
texture.needsUpdate=true;
};

}
}

return texture;
}

for(let f=0;f<6;f++){
materials.push(new THREE.MeshBasicMaterial({map:buildFaceTexture(f)}));
}

const cube=new THREE.Mesh(
new THREE.BoxGeometry(4,4,4),
materials
);

scene.add(cube);

let dragging=false;
let px=0,py=0;

renderer.domElement.addEventListener("mousedown",e=>{
dragging=true;
px=e.clientX;
py=e.clientY;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",e=>{

if(!dragging) return;

let dx=e.clientX-px;
let dy=e.clientY-py;

cube.rotation.y+=dx*0.01;
cube.rotation.x+=dy*0.01;

px=e.clientX;
py=e.clientY;

});

renderer.domElement.addEventListener("click",e=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((e.clientX-rect.left)/rect.width)*2-1,
-((e.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hits=raycaster.intersectObject(cube);

if(hits.length){

let face=Math.floor(hits[0].faceIndex/2);
let uv=hits[0].uv;

let cellX=Math.floor(uv.x*gridSize);
let cellY=Math.floor((1-uv.y)*gridSize);

let index=face*(gridSize*gridSize)+cellY*gridSize+cellX;

let video=shuffled[index];

if(video){
openVideo(video);
}

}

});

window.addEventListener("resize",()=>{
renderer.setSize(cubeContainer.clientWidth,cubeContainer.clientHeight);
camera.aspect=cubeContainer.clientWidth/cubeContainer.clientHeight;
camera.updateProjectionMatrix();
});

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

}


window.addEventListener("resize",()=>{
if(view==="grid"){
syncGridPaging();
}
syncControlButtonSize();
render();
});

window.addEventListener("message", (event) => {
const data = event.data || {};
if (data.type === "feedGridHeaderCommand") {
const action = String(data.action || "");
if(action === "search"){
headerSearchQuery = String(data.query || "");
if(searchInput) searchInput.value = headerSearchQuery;
refreshFilteredPosts();
syncGridPaging();
render();
return;
}
if(action === "toggleView"){
window.tektiteChatApi.setView(view === "grid" ? "list" : "grid");
return;
}
if(action === "setView"){
window.tektiteChatApi.setView(data.view);
return;
}
if(action === "toggleSort"){
window.tektiteChatApi.toggleSort();
return;
}
if(action === "setGridPage"){
window.tektiteChatApi.setGridPage(data.page);
return;
}
if(action === "setPatternSpeed"){
setFeedBgPatternSpeed(data.speed);
return;
}
if(action === "setCanvasBackground"){
setCanvasBackground(data.background || data.file || data.title || data.path);
return;
}
if(action === "cycleCanvasBackground"){
cycleCanvasBackground(Number(data.direction) || 1);
return;
}
if(action === "openVideo"){
const requestedId = String(data.videoId || "").trim();
const video = filtered.find((post)=>post.id === requestedId) || posts.find((post)=>post.id === requestedId);
if(video) openVideo(video);
return;
}
if(action === "requestState"){
postHeaderState();
return;
}
}
if (data.type !== "feedGridOpenVideo") return;
const requestedId = String(data.videoId || "").trim();
if (!requestedId) return;
const video = posts.find((post) => post.id === requestedId);
if (!video) return;
openVideo(video);
});

window.tektiteChatApi = {
  setView(nextView){
    view = nextView === 'list' ? 'list' : 'grid';
    if (view === 'list') {
      visible = 3;
      if(gridMenu) gridMenu.style.display = 'none';
    } else {
      syncGridPaging();
    }
    render();
    return `View set to ${view}`;
  },
  setGridPage(nextPage){
    gridPageCount = Math.max(1, Math.min(getMaxGridPages(), parseInt(nextPage, 10) || 1));
    syncGridPaging();
    render();
    return `Grid page set to ${gridPageCount}`;
  },
  setGridSize(nextSize){
    return this.setGridPage(nextSize);
  },
  search(term){
    const query = String(term || '').trim().toLowerCase();
    headerSearchQuery = term || '';
    if(searchInput) searchInput.value = headerSearchQuery;
    refreshFilteredPosts();
    syncGridPaging();
    render();
    return query ? `Showing ${filtered.length} result(s) for "${term}"` : 'Search cleared';
  },
  toggleSort(){
    pauseSortCycleForUser();
    cycleSortMode(true);
    return `Sort is now ${currentSortButtonTitle.toLowerCase()}`;
  },
  toggleMode(){
    return this.toggleSort();
  },
  setCanvasBackground(value){
    const background = setCanvasBackground(value);
    return `Canvas background set to ${background.title}`;
  },
  cycleCanvasBackground(direction=1){
    const background = cycleCanvasBackground(direction);
    return `Canvas background set to ${background.title}`;
  },
  getCanvasBackgrounds(){
    return canvasBackgrounds.slice();
  }
};


document.addEventListener("DOMContentLoaded",()=>{
  if(channelHomeLink){
  channelHomeLink.addEventListener("click", ()=>{
    channelHomeLink.href = getRandomChannelUrl();
  });
  }
  applyChannelLogoAsset(getPrimaryChannelLogoUrl());
  bindChannelLogoHoverCycle();
  updateTintFilters();
  syncControlButtonSize();
  loadCanvasBackgroundIndex();
  loadPosts().then(() => {
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get("v");
    if (!requestedId) return;
    const video = posts.find((post) => post.id === requestedId);
    if (!video) return;
    openVideo(video);
  });
});

</script>
