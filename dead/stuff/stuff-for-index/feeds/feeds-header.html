<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>/dead/stuff/stuff-for-index/feeds/feeds-header.html</title>

<style>
:root{
--page-bg:black;
--page-background:var(--page-bg);
--panel-bg:#512A67;
--panel-background:var(--panel-bg);
--page-text:#00ff00;
--accent-color:var(--page-text);
--header-bg:rgba(81,42,103,.5);
--header-control-height:40px;
--tektite-logo-filter: rgba(0, 255, 0, 0);
--page-font-family:"Courier New", monospace;
--page-font-scale:1;
--feed-grid-gap:20px;
--feed-card-padding:10px;
--feed-visible-grid-rows:1;
--feed-fit-gap-count:3;
--feed-load-more-visible-height:var(--header-control-height);
--feed-load-more-height:var(--header-control-height);
--feed-grid-card-size:min(
calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3),
calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
);
--feed-header-row-gap:var(--feed-grid-gap);
--feed-posts-x:20px;
--feed-control-button-size:var(--header-control-height);
--feed-mobile-header-height:60px;
--feed-mobile-dock-height:56px;
}

html,
body{
margin:0;
overflow:hidden;
background:transparent;
color:var(--page-text);
font-family:var(--page-font-family);
font-size:calc(16px * var(--page-font-scale));
scrollbar-width:none;
-ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:stretch;
justify-content:center;
gap:var(--feed-header-row-gap) var(--feed-grid-gap);
padding:var(--feed-header-row-gap) 20px;
background:var(--header-bg) !important;
border-bottom:3px solid lime;
position:relative;
z-index:20;
box-sizing:border-box;
}

.channelHeader{
display:grid;
grid-template-columns:minmax(0,.9fr) 3px minmax(0,1.05fr) 3px minmax(0,1.05fr);
align-items:stretch;
gap:0;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
box-sizing:border-box;
background:#000;
border:3px solid var(--accent-color);
overflow:hidden;
}

.channelHeader a{
display:flex;
align-items:center;
text-decoration:none;
color:inherit;
min-width:0;
overflow:hidden;
}

.channelHeader .logoLink{
position:relative;
display:inline-flex;
align-items:center;
justify-content:center;
isolation:isolate;
background:transparent;
border:none;
height:100%;
min-height:0;
box-sizing:border-box;
padding:4px 8px;
flex:initial;
min-width:0;
gap:0;
overflow:hidden;
}

.channelLogoPrompt{
font-size:clamp(12px, calc(0.86vw * var(--page-font-scale)), 20px);
font-weight:bold;
line-height:1;
white-space:nowrap;
flex:0 0 auto;
min-width:0;
overflow:visible;
text-overflow:clip;
}

.channelLogoImageWrap{
position:relative;
display:none;
align-items:center;
justify-content:center;
height:auto;
max-width:100%;
flex:1 1 0;
min-width:0;
overflow:hidden;
}

.channelLogo{
height:auto;
width:100%;
max-width:100%;
display:block;
object-fit:contain;
}

.channelHeader:hover .channelLogoPrompt,
.channelHeader:focus-within .channelLogoPrompt{
display:none;
}

.channelHeader:hover .channelLogoImageWrap,
.channelHeader:focus-within .channelLogoImageWrap{
display:inline-flex;
}

.channelLogoTintLayer{
position:absolute;
inset:0;
pointer-events:none;
mix-blend-mode:color;
background:var(--tektite-logo-filter);
-webkit-mask-image:var(--tint-mask);
mask-image:var(--tint-mask);
-webkit-mask-repeat:no-repeat;
mask-repeat:no-repeat;
-webkit-mask-position:center;
mask-position:center;
-webkit-mask-size:contain;
mask-size:contain;
}

.channelTitle{
font-size:calc(11px * var(--page-font-scale));
font-weight:bold;
display:contents;
align-items:stretch;
gap:0;
flex-wrap:nowrap;
min-width:0;
flex:initial;
position:relative;
overflow:hidden;
}

.channelHandleLink{
display:inline-flex !important;
align-items:center;
gap:5px;
justify-content:center;
color:inherit;
text-decoration:none;
line-height:1;
background:transparent;
border:none;
height:100%;
min-height:0;
box-sizing:border-box;
padding:0 6px;
min-width:0;
flex:initial;
overflow:hidden;
position:relative;
}

.channelDivider,
.controlDivider{
display:block;
align-self:stretch;
flex:0 0 1px;
flex-basis:3px;
width:3px;
min-width:3px;
background:var(--accent-color);
pointer-events:none;
}

.channelHeader:focus-within,
.channelHeader:hover,
.controlsPlaceholder:hover,
.headerMessagePanel:hover,
.headerMessagePanel:focus-visible,
.headerControlBtn:hover,
.headerControlBtn:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
}

.channelHandleLink span{
min-width:0;
flex:1 1 auto;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
text-align:center;
display:none;
}

.channelHandleAvatar{
width:20px;
height:20px;
border-radius:50%;
object-fit:cover;
display:block;
border:1px solid var(--accent-color);
flex:0 0 20px;
min-width:14px;
}

.channelHeader:hover .channelHandleAvatar,
.channelHeader:focus-within .channelHandleAvatar{
display:none;
}

.channelHeader:hover .channelHandleLink span,
.channelHeader:focus-within .channelHandleLink span{
display:block;
}

.controlsPlaceholder{
display:grid;
grid-template-columns:calc((var(--feed-grid-card-size) - 6px) / 2) 6px calc((var(--feed-grid-card-size) - 6px) / 2);
align-items:stretch;
align-self:stretch;
gap:0;
position:relative;
z-index:21;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
box-sizing:border-box;
background:transparent;
border:none;
overflow:hidden;
}

.headerMessagePanel,
.headerControlBtn,
.headerCommandPanel{
display:flex;
align-items:center;
justify-content:center;
box-sizing:border-box;
appearance:none;
margin:0;
background:#000;
border:3px solid var(--accent-color);
color:var(--page-text);
font-family:var(--page-font-family);
font-weight:700;
line-height:1;
text-align:center;
overflow:hidden;
white-space:nowrap;
pointer-events:auto;
cursor:pointer;
}

.headerMessagePanel{
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
align-self:flex-start;
flex:0 0 auto;
padding:0 10px;
font-size:calc(21px * var(--page-font-scale));
cursor:pointer;
}

.headerControlBtn{
display:none;
width:100%;
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
padding:0 10px;
font-size:var(--controls-button-font-size, calc(12px * var(--page-font-scale)));
}

.headerCommandPanel{
grid-column:1 / -1;
width:100%;
min-width:0;
max-width:100%;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
padding:0 12px;
font-size:calc(17px * var(--page-font-scale));
text-decoration:none;
-webkit-tap-highlight-color:transparent;
}

.headerCommandPanelText{
display:block;
max-width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

#headerGridBtn{
grid-column:1;
}

#headerModeBtn{
grid-column:3;
}

.headerMessagePanelText{
display:block;
max-width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
opacity:1;
transition:opacity 260ms ease;
}

@keyframes overlay-ui-hueshift {
from { filter: hue-rotate(0deg); }
to { filter: hue-rotate(360deg); }
}

a:hover,
a:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

.channelHeader a:hover,
.channelHeader a:focus-visible{
animation:none !important;
}

.mobileHeaderHandle{
display:none;
}

@media (max-width: 768px){
:root{
--feed-card-padding:8px;
--feed-grid-gap:calc(2 * var(--feed-card-padding));
--feed-load-more-visible-height:46px;
--feed-grid-card-size:min(
calc(100vw - (2 * var(--feed-posts-x))),
calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
);
--feed-header-row-gap:5px;
--feed-posts-x:8px;
}

body{
overflow:hidden;
}

.mobileHeaderHandle{
display:none;
align-items:center;
justify-content:center;
width:100%;
min-height:0;
padding:0;
background:transparent;
border:none;
color:var(--page-text);
font-size:20px;
font-weight:700;
line-height:1;
pointer-events:auto;
touch-action:pan-y;
cursor:grab;
box-sizing:border-box;
flex-direction:column;
gap:4px;
}

.mobileHeaderHandle::before{
content:"";
}

.mobileHeaderHandle::after{
content:"";
display:none;
}

header{
position:absolute;
top:0;
left:0;
right:0;
padding:var(--feed-header-row-gap) var(--feed-posts-x);
background:var(--header-bg) !important;
flex-direction:column;
align-items:stretch;
gap:var(--feed-header-row-gap);
justify-content:flex-start;
width:100%;
min-width:0;
min-height:0;
box-sizing:border-box;
transform:translateY(0);
visibility:visible;
will-change:transform;
}

.channelHeader,
.controlsPlaceholder,
.headerMessagePanel{
width:100%;
flex:0 0 auto;
height:var(--header-control-height);
min-height:var(--header-control-height);
max-height:var(--header-control-height);
}

.channelHeader{
gap:0;
display:grid;
grid-template-columns:1fr 1fr;
flex-wrap:nowrap;
align-self:stretch;
min-width:0;
height:var(--header-control-height);
max-height:var(--header-control-height);
}

.channelHeader .logoLink{
padding:4px 6px;
flex:initial;
align-self:stretch;
width:auto;
min-width:0;
gap:5px;
}

.channelHeader .channelLogoPrompt{
display:inline-block;
font-size:calc(17px * var(--page-font-scale));
}

.channelHeader .channelLogoImageWrap{
display:inline-flex;
flex:0 1 52px;
max-width:52px;
}

.channelTitle{
font-size:calc(10px * var(--page-font-scale));
line-height:1;
white-space:nowrap;
overflow:visible;
text-overflow:clip;
text-align:left;
min-width:0;
flex:initial;
gap:0;
display:contents;
flex-wrap:nowrap;
align-items:stretch;
}

.channelHandleLink{
min-width:0;
flex:initial;
padding:0 6px;
font-size:calc(10px * var(--page-font-scale));
justify-content:center;
text-align:center;
overflow:hidden;
}

.channelDivider{
display:none;
}

.channelHeader .logoLink,
.channelHeader .channelHandleLink{
display:none !important;
width:100%;
height:100%;
}

.channelHeader.mobile-channel-sub-state .logoLink{
display:flex !important;
grid-column:1 / -1;
}

.channelHeader.mobile-channel-links-state .channelHandleLink{
display:flex !important;
grid-column:auto;
}

.channelHandleAvatar{
display:block;
width:20px;
height:20px;
flex:0 0 20px;
}

.channelHandleLink span{
display:block;
}

.channelHeader.mobile-channel-sub-state .logoLink .channelLogoPrompt,
.channelHeader.mobile-channel-sub-state .logoLink .channelLogoImageWrap{
display:inline-flex;
}

.channelHeader:hover .channelLogoPrompt,
.channelHeader:focus-within .channelLogoPrompt,
.channelHeader:hover .channelLogoImageWrap,
.channelHeader:focus-within .channelLogoImageWrap{
display:inline-flex;
}

.controlsPlaceholder{
display:grid;
grid-template-columns:calc((100% - 6px) / 2) 6px calc((100% - 6px) / 2);
align-items:stretch;
align-self:stretch;
gap:0;
flex-wrap:nowrap;
width:100%;
}

.headerCommandPanel{
display:flex;
}

.headerControlBtn{
display:none;
}

.headerMessagePanel{
display:flex;
order:-1;
font-size:calc(17px * var(--page-font-scale));
padding:0 8px;
}

}
</style>
</head>

<body>
<header>
<div class="channelHeader">
<a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="logoLink" id="channelHomeLink">
<span class="channelLogoPrompt">Sub to me on...</span>
<span class="channelLogoImageWrap">
<img src="/dead/images/pngs/oldtube.png" class="channelLogo" alt="Channel feed logo">
<span class="channelLogoTintLayer" aria-hidden="true" style="--tint-mask: url('/dead/images/pngs/oldtube.png');"></span>
</span>
</a>
<div class="channelTitle" id="channelTitle"><span class="channelDivider" aria-hidden="true"></span><a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/dead/images/pngs/honestly-thomas.png" class="channelHandleAvatar" alt="Honestly Thomas avatar"><span>@Honestly_Thomas</span></a><span class="channelDivider" aria-hidden="true"></span><a href="https://www.youtube.com/@Cryptid_Memes" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/dead/images/pngs/cryptid-memes.png" class="channelHandleAvatar" alt="Cryptid Memes avatar"><span>@Cryptid_Memes</span></a></div>
</div>

<button class="headerMessagePanel" id="headerRandomVideoBtn" type="button">
<span class="headerMessagePanelText">Watch Random Video</span>
</button>

<div class="controlsPlaceholder">
<button class="headerCommandPanel" id="headerCommandBtn" type="button" aria-label="Open chat command input"><span class="headerCommandPanelText">Enter command...</span></button>
<button class="headerControlBtn" id="headerGridBtn" type="button">View</button>
<button class="headerControlBtn" id="headerModeBtn" type="button" disabled>Newest</button>
</div>
<div class="mobileHeaderHandle" title="Drag header down">
</div>
</header>

<script>
const HONESTLY_THOMAS_URL="https://www.youtube.com/@Honestly_Thomas";
const CRYPTID_MEMES_URL="https://www.youtube.com/@Cryptid_Memes";
const headerEl=document.querySelector("header");
const mobileHeaderHandle=document.querySelector(".mobileHeaderHandle");
const channelHomeLink=document.getElementById("channelHomeLink");
const channelLogoLinks=Array.from(document.querySelectorAll(".logoLink"));
const controlsEl=document.querySelector(".controlsPlaceholder");
const headerRandomVideoBtn=document.getElementById("headerRandomVideoBtn");
const headerCommandBtn=document.getElementById("headerCommandBtn");
const headerGridBtn=document.getElementById("headerGridBtn");
const headerModeBtn=document.getElementById("headerModeBtn");
const headerMessageText=document.querySelector(".headerMessagePanelText");
const channelTitleEl=document.getElementById("channelTitle");
const defaultChannelLogoUrls=[
"/dead/images/pngs/oldtube.png",
"/dead/images/pngs/oldtube-alt-1.png",
"/dead/images/pngs/oldtube-alt-2.png"
];
let customChannelLogoUrls=[];
let channelLogoHoverIntervalId=null;
let channelLogoHoverIndex=0;
const SORT_CYCLE_INTERVAL_MS=15000;
const channelLogoHoverIntervalMs=SORT_CYCLE_INTERVAL_MS;
let mobileChannelCycleIntervalId=null;
let mobileChannelCycleLinksState=false;
let mobileDrawerProgress=0;
let mobileDrawerDragging=false;
let mobileDrawerStartY=0;
let mobileDrawerStartProgress=0;
let mobileDrawerMoved=false;
let mobileDrawerLastY=0;
let mobileDrawerLastTime=0;
let mobileDrawerVelocity=0;
let mobileDrawerHideTimeoutId=null;
const mobileDrawerSnapTransition="transform 360ms cubic-bezier(.16, 1, .3, 1)";

function isMobileHeaderLayout(){
return window.matchMedia("(max-width: 768px)").matches;
}

function postToParent(message){
try{
if(window.parent && window.parent !== window){
window.parent.postMessage(message, "*");
}
}catch(error){
console.warn("Unable to post feed header message", error);
}
}

function postCommand(action, extra={}){
postToParent({ type:"feedGridHeaderCommand", action, ...extra });
}

function openCommandInput(){
try{
if(window.top && window.top !== window){
window.top.postMessage({ type:"openChatFromChild", seedSlash:true }, "*");
return;
}
window.postMessage({ type:"openChatFromChild", seedSlash:true }, "*");
}catch(error){
console.warn("Unable to request command input", error);
}
}

function bindContentOnlyLinks(){
document.querySelectorAll(".channelHeader a").forEach((link)=>{
link.addEventListener("click", (event)=>{
if(event.target !== link) return;
event.preventDefault();
});
});
}

function postSize(){
window.requestAnimationFrame(()=>{
let height=Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || headerEl.offsetHeight || 0);
if(isMobileHeaderLayout()){
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
height=drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress);
}
postToParent({ type:"feedGridHeaderSize", height });
});
}

function getMobileDrawerMetrics(){
const totalHeight=Math.ceil(headerEl.scrollHeight || headerEl.offsetHeight || headerEl.getBoundingClientRect().height || 0);
return {
totalHeight,
travel:totalHeight,
visibleHeight:0,
rowGap:0
};
}

function applyMobileDrawerTransform(drawerMetrics=getMobileDrawerMetrics()){
headerEl.style.transform=`translate3d(0, ${-Math.ceil(drawerMetrics.travel * (1 - mobileDrawerProgress))}px, 0)`;
}

function setMobileDrawerProgress(progress, animated=false){
mobileDrawerProgress=Math.max(0, Math.min(1, Number(progress) || 0));
if(isMobileHeaderLayout()){
if(mobileDrawerHideTimeoutId !== null){
window.clearTimeout(mobileDrawerHideTimeoutId);
mobileDrawerHideTimeoutId=null;
}
headerEl.style.transition=animated ? mobileDrawerSnapTransition : "none";
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
headerEl.style.visibility="visible";
headerEl.style.pointerEvents=mobileDrawerProgress > 0.05 ? "auto" : "none";
document.body.classList.toggle("mobile-drawer-open", mobileDrawerProgress > 0.98);
postToParent({ type:"feedGridHeaderSize", height:drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress) });
if(animated && mobileDrawerProgress <= 0.001){
mobileDrawerHideTimeoutId=window.setTimeout(()=>{
mobileDrawerHideTimeoutId=null;
}, 380);
}
}else{
headerEl.style.transition="";
headerEl.style.transform="";
headerEl.style.visibility="";
headerEl.style.pointerEvents="";
document.body.classList.remove("mobile-drawer-open");
}
postSize();
}

function finishMobileDrawerDrag(){
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const projectedProgress=mobileDrawerProgress + ((mobileDrawerVelocity * 180) / drawerHeight);
setMobileDrawerProgress(projectedProgress >= 0.35 ? 1 : 0, true);
}

function updateTintFilters(){
return true;
}

function getActiveChannelLogoUrls(){
return customChannelLogoUrls.length ? [...customChannelLogoUrls] : [...defaultChannelLogoUrls];
}

function getPrimaryChannelLogoUrl(){
return customChannelLogoUrls.length ? customChannelLogoUrls[0] : "/dead/images/pngs/oldtube.png";
}

function applyChannelLogoAsset(logoSrc){
channelLogoLinks.forEach((link)=>{
const img=link.querySelector(".channelLogo");
const layer=link.querySelector(".channelLogoTintLayer");
if(img){
img.src=logoSrc;
img.style.objectFit="contain";
img.addEventListener("load", ()=>{
syncControlButtonSize();
postSize();
}, { once:true });
}
if(layer){
const safeUrl=String(logoSrc).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
layer.style.webkitMaskSize="contain";
layer.style.maskSize="contain";
}
});
syncControlButtonSize();
postSize();
}

function stopChannelLogoHoverCycle(resetToPrimary=true){
if(channelLogoHoverIntervalId !== null){
window.clearInterval(channelLogoHoverIntervalId);
channelLogoHoverIntervalId=null;
}
channelLogoHoverIndex=0;
if(resetToPrimary){
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
}
}

function startChannelLogoHoverCycle(){
const urls=getActiveChannelLogoUrls();
if(urls.length <= 1) return;
stopChannelLogoHoverCycle(false);
channelLogoHoverIndex=1 % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
channelLogoHoverIntervalId=window.setInterval(()=>{
channelLogoHoverIndex=(channelLogoHoverIndex + 1) % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
}, channelLogoHoverIntervalMs);
}

function bindChannelLogoHoverCycle(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader || channelHeader.dataset.hoverCycleBound === "true") return;
channelHeader.addEventListener("mouseenter", ()=>{
if(isMobileHeaderLayout()) return;
if(getActiveChannelLogoUrls().length > 1){
startChannelLogoHoverCycle();
}
});
channelHeader.addEventListener("mouseleave", ()=>{
if(isMobileHeaderLayout()) return;
stopChannelLogoHoverCycle(true);
});
channelHeader.dataset.hoverCycleBound="true";
}

function syncMobileChannelCycleClass(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader) return;
const mobile=isMobileHeaderLayout();
channelHeader.classList.toggle("mobile-channel-sub-state", mobile && !mobileChannelCycleLinksState);
channelHeader.classList.toggle("mobile-channel-links-state", mobile && mobileChannelCycleLinksState);
}

function stopMobileChannelCycle(){
if(mobileChannelCycleIntervalId !== null){
window.clearInterval(mobileChannelCycleIntervalId);
mobileChannelCycleIntervalId=null;
}
mobileChannelCycleLinksState=false;
syncMobileChannelCycleClass();
}

function startMobileChannelCycle(){
if(!isMobileHeaderLayout()){
stopMobileChannelCycle();
return;
}
syncMobileChannelCycleClass();
if(mobileChannelCycleIntervalId !== null) return;
mobileChannelCycleIntervalId=window.setInterval(()=>{
mobileChannelCycleLinksState=!mobileChannelCycleLinksState;
syncMobileChannelCycleClass();
fitHeaderRectangleChildren();
}, SORT_CYCLE_INTERVAL_MS);
}

function syncMobileChannelCycle(){
if(isMobileHeaderLayout()){
startMobileChannelCycle();
}else{
stopMobileChannelCycle();
}
}

window.setTektiteLogoUrls = function setTektiteLogoUrls(urls){
customChannelLogoUrls = Array.isArray(urls)
? urls.map((url)=>String(url || "").trim()).filter(Boolean)
: [];
stopChannelLogoHoverCycle(false);
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
updateTintFilters();
return true;
};

window.resetTektiteLogoUrls = function resetTektiteLogoUrls(){
customChannelLogoUrls = [];
stopChannelLogoHoverCycle(false);
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
updateTintFilters();
return true;
};

function getRandomChannelUrl(){
return Math.random() < 0.5 ? HONESTLY_THOMAS_URL : CRYPTID_MEMES_URL;
}

function syncControlButtonSize(){
if(!controlsEl) return;
window.requestAnimationFrame(()=>{
const rect=controlsEl.getBoundingClientRect();
const style=window.getComputedStyle(controlsEl);
const borderY=(parseFloat(style.borderTopWidth) || 0) + (parseFloat(style.borderBottomWidth) || 0);
const innerHeight=Math.max(1, Math.round(rect.height - borderY));
document.documentElement.style.setProperty("--feed-control-button-size", `${innerHeight}px`);
postSize();
});
}

function syncSortButtonGroupWidth(){
postSize();
}

function setFontSizeForAll(elements, size){
elements.forEach((element)=>{
if(element) element.style.fontSize=`${size}px`;
});
}

function fitChannelHeaderChildren(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader || window.getComputedStyle(channelHeader).display === "none") return;
const handleTextEls=Array.from(channelHeader.querySelectorAll(".channelHandleLink span"));
const textEls=handleTextEls.filter(Boolean);
let size=11;
setFontSizeForAll(textEls, size);
while(size > 7 && channelHeader.scrollWidth > channelHeader.clientWidth){
size-=1;
setFontSizeForAll(textEls, size);
}
handleTextEls.forEach((textEl)=>{
const link=textEl.closest(".channelHandleLink");
if(!link) return;
let handleSize=11;
textEl.style.display="block";
textEl.style.fontSize=`${handleSize}px`;
while(handleSize > 7 && textEl.scrollWidth > Math.max(1, link.clientWidth - 8)){
handleSize-=1;
textEl.style.fontSize=`${handleSize}px`;
}
textEl.style.display="";
});
}

function fitControlsChildren(){
if(!controlsEl || window.getComputedStyle(controlsEl).display === "none") return;
let inputSize=14;
let buttonSize=12;
document.documentElement.style.setProperty("--controls-text-font-size", `${inputSize}px`);
document.documentElement.style.setProperty("--controls-button-font-size", `${buttonSize}px`);
while(inputSize > 8 && controlsEl.scrollWidth > controlsEl.clientWidth){
inputSize-=1;
buttonSize=Math.max(8, buttonSize - 1);
document.documentElement.style.setProperty("--controls-text-font-size", `${inputSize}px`);
document.documentElement.style.setProperty("--controls-button-font-size", `${buttonSize}px`);
}
}

function fitHeaderRectangleChildren(){
window.requestAnimationFrame(()=>{
fitChannelHeaderChildren();
fitControlsChildren();
postSize();
});
}

function applyGridSizingState(state={}){
const root=document.documentElement;
const gridCardSize=String(state.gridCardSize || "").trim();
const gridVisibleRows=String(state.gridVisibleRows || "").trim();
const gridFitGapCount=String(state.gridFitGapCount || "").trim();
const gridLoadMoreHeight=String(state.gridLoadMoreHeight || "").trim();
if(gridCardSize){
root.style.setProperty("--feed-grid-card-size", gridCardSize);
}
if(gridVisibleRows){
root.style.setProperty("--feed-visible-grid-rows", gridVisibleRows);
}
if(gridFitGapCount){
root.style.setProperty("--feed-fit-gap-count", gridFitGapCount);
}
if(gridLoadMoreHeight){
root.style.setProperty("--feed-load-more-height", gridLoadMoreHeight);
}
fitHeaderRectangleChildren();
}

function getSortButtonText(sortMode){
if(sortMode === "newest") return "Newest";
if(sortMode === "oldest") return "Oldest";
if(sortMode === "most-viewed") return "Most Viewed";
if(sortMode === "least-viewed") return "Least Viewed";
if(sortMode === "alphabetical") return "Sort: A-Z";
if(sortMode === "reverse-alphabetical") return "Sort: Z-A";
if(sortMode === "source-order") return "Sort: Source Order";
return "Sort";
}

function applyState(state){
applyGridSizingState(state);
if(headerMessageText){
headerMessageText.textContent="Watch Random Video";
}
if(headerGridBtn){
headerGridBtn.textContent="View";
headerGridBtn.title=state.view === "list" ? "Current view: list" : "Current view: grid";
headerGridBtn.setAttribute("aria-label", headerGridBtn.title);
headerGridBtn.disabled=false;
}
if(headerModeBtn){
headerModeBtn.textContent=String(state.sortButtonText || getSortButtonText(state.sortMode));
headerModeBtn.title=String(state.sortButtonTitle || "Change sort");
headerModeBtn.setAttribute("aria-label", headerModeBtn.title);
headerModeBtn.disabled=Boolean(state.sortDisabled);
}
if(headerRandomVideoBtn){
headerRandomVideoBtn.disabled=Boolean(state.sortDisabled);
}
syncControlButtonSize();
fitHeaderRectangleChildren();
}

channelHomeLink.addEventListener("click", ()=>{
channelHomeLink.href=getRandomChannelUrl();
});

if(headerRandomVideoBtn){
headerRandomVideoBtn.addEventListener("click", ()=>{
postCommand("openRandomVideo");
});
}

if(headerCommandBtn){
headerCommandBtn.addEventListener("click", openCommandInput);
}

if(headerGridBtn){
headerGridBtn.addEventListener("click", ()=>{
postCommand("toggleView");
});
}

if(headerModeBtn){
headerModeBtn.addEventListener("click", ()=>{
postCommand("toggleSort");
});
}

mobileHeaderHandle.addEventListener("pointerdown", (event)=>{
if(!isMobileHeaderLayout()) return;
mobileDrawerDragging=true;
mobileDrawerMoved=false;
mobileDrawerStartY=event.clientY;
mobileDrawerStartProgress=mobileDrawerProgress;
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=performance.now();
mobileDrawerVelocity=0;
mobileHeaderHandle.setPointerCapture(event.pointerId);
mobileHeaderHandle.style.cursor="grabbing";
});

mobileHeaderHandle.addEventListener("pointermove", (event)=>{
if(!mobileDrawerDragging || !isMobileHeaderLayout()) return;
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const delta=event.clientY - mobileDrawerStartY;
if(Math.abs(delta) > 4) mobileDrawerMoved=true;
const now=performance.now();
const elapsed=Math.max(1, now - mobileDrawerLastTime);
const instantVelocity=(event.clientY - mobileDrawerLastY) / elapsed;
mobileDrawerVelocity=(mobileDrawerVelocity * 0.65) + (instantVelocity * 0.35);
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=now;
setMobileDrawerProgress(mobileDrawerStartProgress + (delta / drawerHeight), false);
event.preventDefault();
});

function endMobileDrawerPointer(event){
if(!mobileDrawerDragging) return;
mobileDrawerDragging=false;
mobileHeaderHandle.style.cursor="";
try{
mobileHeaderHandle.releasePointerCapture(event.pointerId);
}catch(error){}
finishMobileDrawerDrag();
}

mobileHeaderHandle.addEventListener("pointerup", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("pointercancel", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("click", ()=>{
if(!isMobileHeaderLayout() || mobileDrawerMoved) return;
setMobileDrawerProgress(mobileDrawerProgress > 0.5 ? 0 : 1, true);
});

window.addEventListener("message", (event)=>{
const data=event.data || {};
if(data.type === "feedHeaderMobileDrawerProgress"){
setMobileDrawerProgress(data.progress, Boolean(data.animated));
return;
}
if(data.type === "feedGridHeaderState"){
applyState(data);
}
});

window.addEventListener("resize", ()=>{
syncControlButtonSize();
fitHeaderRectangleChildren();
syncMobileChannelCycle();
if(!isMobileHeaderLayout()){
setMobileDrawerProgress(0, false);
}
postSize();
});

const resizeObserver=new ResizeObserver(postSize);
resizeObserver.observe(document.documentElement);
resizeObserver.observe(document.body);

document.addEventListener("DOMContentLoaded", ()=>{
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
bindChannelLogoHoverCycle();
syncMobileChannelCycle();
bindContentOnlyLinks();
updateTintFilters();
syncControlButtonSize();
fitHeaderRectangleChildren();
setMobileDrawerProgress(0, false);
postCommand("requestState");
postSize();
});
</script>
</body>
