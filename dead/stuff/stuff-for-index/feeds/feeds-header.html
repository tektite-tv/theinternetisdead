<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>/dead/stuff/stuff-for-index/feeds/feeds-header.html</title>

<style>
:root{
--page-bg:black;
--page-background:var(--page-bg);
--panel-bg:#4b0076;
--panel-background:var(--panel-bg);
--page-text:#00ff00;
--accent-color:var(--page-text);
--header-bg:rgba(75,0,118,.5);
--header-control-height:40px;
--tektite-logo-filter: rgba(0, 255, 0, 0);
--page-font-family:"Courier New", monospace;
--page-font-scale:1;
--feed-grid-gap:20px;
--feed-card-padding:10px;
--feed-visible-grid-rows:1;
--feed-fit-gap-count:3;
--feed-load-more-visible-height:var(--header-control-height);
--feed-load-more-height:var(--header-control-height);
--feed-grid-card-size:min(
calc((100vw - (2 * var(--feed-posts-x)) - (2 * var(--feed-grid-gap))) / 3),
calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
);
--feed-header-row-gap:var(--feed-grid-gap);
--feed-posts-x:20px;
--feed-control-button-size:var(--header-control-height);
--feed-mobile-header-height:60px;
--feed-mobile-dock-height:56px;
}

html,
body{
margin:0;
overflow:hidden;
background:transparent;
color:var(--page-text);
font-family:var(--page-font-family);
font-size:calc(16px * var(--page-font-scale));
scrollbar-width:none;
-ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:stretch;
justify-content:center;
gap:var(--feed-header-row-gap) var(--feed-grid-gap);
padding:var(--feed-header-row-gap) 20px;
background:var(--header-bg) !important;
border-bottom:3px solid lime;
position:relative;
z-index:20;
box-sizing:border-box;
}

.channelHeader{
display:grid;
grid-template-columns:minmax(0,.9fr) 3px minmax(0,1.05fr) 3px minmax(0,1.05fr);
align-items:stretch;
gap:0;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
box-sizing:border-box;
background:#000;
border:3px solid var(--accent-color);
overflow:hidden;
}

.channelHeader a{
display:flex;
align-items:center;
text-decoration:none;
color:inherit;
min-width:0;
overflow:hidden;
}

.channelHeader .logoLink{
position:relative;
display:inline-flex;
align-items:center;
justify-content:center;
isolation:isolate;
background:transparent;
border:none;
height:100%;
min-height:0;
box-sizing:border-box;
padding:4px 8px;
flex:initial;
min-width:0;
gap:0;
overflow:hidden;
}

.channelLogoPrompt{
font-size:clamp(12px, calc(0.86vw * var(--page-font-scale)), 20px);
font-weight:bold;
line-height:1;
white-space:nowrap;
flex:0 0 auto;
min-width:0;
overflow:visible;
text-overflow:clip;
}

.channelLogoImageWrap{
position:relative;
display:none;
align-items:center;
justify-content:center;
height:auto;
max-width:100%;
flex:1 1 0;
min-width:0;
overflow:hidden;
}

.channelLogo{
height:auto;
width:100%;
max-width:100%;
display:block;
object-fit:contain;
}

.channelHeader:hover .channelLogoPrompt,
.channelHeader:focus-within .channelLogoPrompt{
display:none;
}

.channelHeader:hover .channelLogoImageWrap,
.channelHeader:focus-within .channelLogoImageWrap{
display:inline-flex;
}

.channelLogoTintLayer{
position:absolute;
inset:0;
pointer-events:none;
mix-blend-mode:color;
background:var(--tektite-logo-filter);
-webkit-mask-image:var(--tint-mask);
mask-image:var(--tint-mask);
-webkit-mask-repeat:no-repeat;
mask-repeat:no-repeat;
-webkit-mask-position:center;
mask-position:center;
-webkit-mask-size:contain;
mask-size:contain;
}

.channelTitle{
font-size:calc(11px * var(--page-font-scale));
font-weight:bold;
display:contents;
align-items:stretch;
gap:0;
flex-wrap:nowrap;
min-width:0;
flex:initial;
position:relative;
overflow:hidden;
}

.channelHandleLink{
display:inline-flex !important;
align-items:center;
gap:5px;
justify-content:center;
color:inherit;
text-decoration:none;
line-height:1;
background:transparent;
border:none;
height:100%;
min-height:0;
box-sizing:border-box;
padding:0 6px;
min-width:0;
flex:initial;
overflow:hidden;
position:relative;
}

.channelDivider,
.controlDivider{
display:block;
align-self:stretch;
flex:0 0 1px;
flex-basis:3px;
width:3px;
min-width:3px;
background:var(--accent-color);
pointer-events:none;
}

.channelHeader:focus-within,
.channelHeader:hover,
.controls:focus-within,
.controls:hover{
animation: overlay-ui-hueshift 1.8s linear infinite;
}

.channelHandleLink span{
min-width:0;
flex:1 1 auto;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
text-align:center;
display:none;
}

.channelHandleAvatar{
width:20px;
height:20px;
border-radius:50%;
object-fit:cover;
display:block;
border:1px solid var(--accent-color);
flex:0 0 20px;
min-width:14px;
}

.channelHeader:hover .channelHandleAvatar,
.channelHeader:focus-within .channelHandleAvatar{
display:none;
}

.channelHeader:hover .channelHandleLink span,
.channelHeader:focus-within .channelHandleLink span{
display:block;
}

.controls{
display:flex;
align-items:stretch;
align-self:stretch;
gap:0;
position:relative;
z-index:21;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
box-sizing:border-box;
background:#000;
border:3px solid var(--accent-color);
overflow:hidden;
}

.controls > *{
min-width:0;
overflow:hidden;
}

.sortStatePanel{
display:none;
align-items:center;
justify-content:center;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
align-self:flex-start;
box-sizing:border-box;
padding:0 10px;
background:#000;
border:3px solid var(--accent-color);
color:var(--page-text);
font-size:calc(21px * var(--page-font-scale));
font-weight:700;
line-height:1.15;
text-align:center;
text-decoration:none;
cursor:pointer;
overflow:hidden;
user-select:none;
-webkit-tap-highlight-color:transparent;
}

.sortStatePanel:hover,
.sortStatePanel:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

.sortStatePanel.is-disabled{
cursor:default;
opacity:.72;
}

.headerMessagePanel{
display:flex;
align-items:center;
justify-content:center;
width:var(--feed-grid-card-size);
min-width:0;
height:var(--header-control-height);
min-height:0;
max-height:var(--header-control-height);
align-self:flex-start;
box-sizing:border-box;
flex:0 0 auto;
padding:0 10px;
background:#000;
border:3px solid var(--accent-color);
color:var(--page-text);
font-size:calc(21px * var(--page-font-scale));
font-weight:700;
line-height:1;
text-align:center;
overflow:hidden;
white-space:nowrap;
pointer-events:auto;
cursor:pointer;
}

.headerMessagePanelText{
display:block;
max-width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
opacity:1;
transition:opacity 260ms ease;
}

.stateIndicatorText{
display:block;
max-width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
font-size:var(--state-indicator-font-size, 21px);
line-height:1;
}

@keyframes overlay-ui-hueshift {
from { filter: hue-rotate(0deg); }
to { filter: hue-rotate(360deg); }
}

@keyframes state-indicator-hueshift {
from { filter: hue-rotate(0deg); }
to { filter: hue-rotate(360deg); }
}

a:hover,
a:focus-visible,
button:hover,
button:focus-visible,
#videoSearch:hover,
#videoSearch:focus-visible{
animation: overlay-ui-hueshift 1.8s linear infinite;
outline:none;
}

.sortStatePanel:hover,
.sortStatePanel:focus-visible{
outline:none;
}

.channelHeader a:hover,
.channelHeader a:focus-visible,
.controls button:hover,
.controls button:focus-visible,
.controls input:hover,
.controls input:focus-visible{
animation:none !important;
}

#videoSearch{
width:auto;
height:100%;
min-height:0;
border:none;
background:transparent;
color:var(--page-text);
padding:0 8px;
font-family:var(--page-font-family);
font-weight:700;
font-size:var(--controls-button-font-size, calc(12px * var(--page-font-scale)));
box-sizing:border-box;
min-width:0;
flex:1 1 0;
text-overflow:ellipsis;
}

#videoSearch::placeholder{
color:var(--page-text);
opacity:1;
}

#patternSpeed{
display:none;
align-self:stretch;
width:86px;
min-width:72px;
accent-color:var(--accent-color);
background:#000;
border:none;
box-sizing:border-box;
padding:0 6px;
cursor:pointer;
}

#patternSpeed:hover,
#patternSpeed:focus-visible{
animation:none !important;
outline:none;
}

button{
display:inline-flex;
align-items:center;
justify-content:center;
align-self:stretch;
height:100%;
min-height:0;
padding:0;
border:none;
background:transparent;
color:var(--page-text);
cursor:pointer;
font-family:var(--page-font-family);
font-weight:700;
font-size:var(--controls-button-font-size, calc(12px * var(--page-font-scale)));
box-sizing:border-box;
min-width:0;
flex:0 1 var(--feed-control-button-size);
width:var(--feed-control-button-size);
aspect-ratio:1;
}

button:disabled{
cursor:default;
opacity:.65;
}

#gridBtn,
#modeBtn{
aspect-ratio:1;
padding:0;
width:var(--feed-control-button-size);
height:var(--feed-control-button-size);
flex:0 1 var(--feed-control-button-size);
min-width:0;
min-height:var(--feed-control-button-size);
line-height:1;
text-align:center;
white-space:normal;
overflow:hidden;
overflow-wrap:anywhere;
}

#gridMenu{
position:absolute;
top:50px;
right:0;
background:var(--panel-background);
border:2px solid var(--accent-color);
padding:25px;
display:none;
z-index:999;
}

#gridControl{
width:220px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.gridMenuLabel{
font-size:calc(14px * var(--page-font-scale));
white-space:nowrap;
}

#gridPageSelect{
height:40px;
min-width:108px;
border:2px solid var(--accent-color);
background:var(--panel-background);
color:var(--page-text);
padding:0 12px;
font-family:var(--page-font-family);
}

.mobileSortDock{
display:none;
}

.mobileHeaderHandle{
display:none;
}

@media (max-width: 768px){

--feed-card-padding:8px;
--feed-grid-gap:calc(2 * var(--feed-card-padding));
--feed-load-more-visible-height:46px;
--feed-grid-card-size:min(
calc(100vw - (2 * var(--feed-posts-x))),
calc((100dvh - (var(--feed-fit-gap-count) * var(--feed-grid-gap)) - var(--feed-load-more-height)) / var(--feed-visible-grid-rows))
);

}

body{
overflow:hidden;
}

.mobileHeaderHandle{

justify-content:center;
width:100%;

padding:0;

border:none;

font-weight:700;

pointer-events:auto;
touch-action:pan-y;
cursor:grab;

}

header{

top:0;

right:0;
padding:var(--feed-header-row-gap) var(--feed-posts-x);
background:var(--header-bg) !important;

gap:var(--feed-header-row-gap);
justify-content:flex-start;
width:100%;
min-width:0;

</style>
</head>

<body>
<header>
<div class="channelHeader">
<a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="logoLink" id="channelHomeLink">
<span class="channelLogoPrompt">Sub to me on...</span>
<span class="channelLogoImageWrap">
<img src="/dead/images/pngs/oldtube.png" class="channelLogo" alt="Channel feed logo">
<span class="channelLogoTintLayer" aria-hidden="true" style="--tint-mask: url('/dead/images/pngs/oldtube.png');"></span>
</span>
</a>
<div class="channelTitle" id="channelTitle"><span class="channelDivider" aria-hidden="true"></span><a href="https://www.youtube.com/@Honestly_Thomas" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/dead/images/pngs/honestly-thomas.png" class="channelHandleAvatar" alt="Honestly Thomas avatar"><span>@Honestly_Thomas</span></a><span class="channelDivider" aria-hidden="true"></span><a href="https://www.youtube.com/@Cryptid_Memes" target="_blank" rel="noopener noreferrer" class="channelHandleLink"><img src="/dead/images/pngs/cryptid-memes.png" class="channelHandleAvatar" alt="Cryptid Memes avatar"><span>@Cryptid_Memes</span></a></div>
</div>

<div class="headerMessagePanel" aria-hidden="true">
<span class="headerMessagePanelText">Loading message...</span>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Feed...">
<input id="patternSpeed" type="range" min="0.1" max="5" step="0.1" value="1" title="Pattern speed">
<span class="controlDivider" aria-hidden="true"></span>
<button id="gridBtn">View</button>
<span class="controlDivider" aria-hidden="true"></span>
<button id="modeBtn" disabled>Sort</button>

<div id="gridMenu">
<div id="gridControl">
<label for="gridPageSelect" class="gridMenuLabel">Grid Pages</label>
<select id="gridPageSelect"></select>
</div>
</div>
</div>
<div class="mobileHeaderHandle" title="Drag header down">
</div>
</header>

<script>
const HONESTLY_THOMAS_URL="https://www.youtube.com/@Honestly_Thomas";
const CRYPTID_MEMES_URL="https://www.youtube.com/@Cryptid_Memes";
const MESSAGE_LIST_PATH="/dead/JSON/message-list.json";
const DEFAULT_HEADER_MESSAGE="Loading message...";
const DEFAULT_MESSAGE_DISPLAY_MS=12000;
const RANDOM_MESSAGE_MIN_DELAY_MS=45000;
const RANDOM_MESSAGE_MAX_DELAY_MS=180000;
const headerEl=document.querySelector("header");
const mobileHeaderHandle=document.querySelector(".mobileHeaderHandle");
const headerMessagePanel=document.querySelector(".headerMessagePanel");
const headerMessageText=document.querySelector(".headerMessagePanelText");
const channelHomeLink=document.getElementById("channelHomeLink");
const channelLogoLinks=Array.from(document.querySelectorAll(".logoLink"));
const controlsEl=document.querySelector(".controls");
const channelTitleEl=document.getElementById("channelTitle");
const sortStatePanel=document.getElementById("sortStatePanel");
const mobileSortStatePanel=document.getElementById("mobileSortStatePanel");
const searchInput=document.getElementById("videoSearch");
const patternSpeedInput=document.getElementById("patternSpeed");
const gridBtn=document.getElementById("gridBtn");
const modeBtn=document.getElementById("modeBtn");
const gridMenu=document.getElementById("gridMenu");
const gridPageSelect=document.getElementById("gridPageSelect");
const defaultChannelLogoUrls=[
"/dead/images/pngs/oldtube.png",
"/dead/images/pngs/oldtube-alt-1.png",
"/dead/images/pngs/oldtube-alt-2.png"
];
let customChannelLogoUrls=[];
let channelLogoHoverIntervalId=null;
let channelLogoHoverIndex=0;
const SORT_CYCLE_INTERVAL_MS=15000;
const channelLogoHoverIntervalMs=SORT_CYCLE_INTERVAL_MS;
let mobileChannelCycleIntervalId=null;
let mobileChannelCycleLinksState=false;
let mobileDrawerProgress=0;
let mobileDrawerDragging=false;
let mobileDrawerStartY=0;
let mobileDrawerStartProgress=0;
let mobileDrawerMoved=false;
let mobileDrawerLastY=0;
let mobileDrawerLastTime=0;
let mobileDrawerVelocity=0;
let mobileDrawerHideTimeoutId=null;
let headerMessageDefault=DEFAULT_HEADER_MESSAGE;
let headerMessageRevertTimeoutId=null;
let headerMessageRandomTimeoutIds=[];
let headerMessageTimedEntries=[];
let headerMessageClockIntervalId=null;
let headerMessageLastTimedKeys=new Set();
let headerMessageFadeTimeoutId=null;
let headerStandardMessages=[];
let headerStandardCycleIntervalId=null;
let headerStandardCycleIndex=-1;
let headerStandardCycleActive=false;
const mobileDrawerSnapTransition="transform 360ms cubic-bezier(.16, 1, .3, 1)";

function isMobileHeaderLayout(){
return window.matchMedia("(max-width: 768px)").matches;
}

function postToParent(message){
try{
if(window.parent && window.parent !== window){
window.parent.postMessage(message, "*");
}
}catch(error){
console.warn("Unable to post feed header message", error);
}
}

function postCommand(action, extra={}){
postToParent({ type:"feedGridHeaderCommand", action, ...extra });
}

function bindContentOnlyLinks(){
document.querySelectorAll(".channelHeader a").forEach((link)=>{
link.addEventListener("click", (event)=>{
if(event.target !== link) return;
event.preventDefault();
});
});
}

function postSize(){
window.requestAnimationFrame(()=>{
let height=Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || headerEl.offsetHeight || 0);
if(isMobileHeaderLayout()){
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
height=drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress);
}
postToParent({ type:"feedGridHeaderSize", height });
});
}

function getMobileDrawerMetrics(){
const totalHeight=Math.ceil(headerEl.scrollHeight || headerEl.offsetHeight || headerEl.getBoundingClientRect().height || 0);
return {
totalHeight,
travel:totalHeight,
visibleHeight:0,
rowGap:0
};
}

function applyMobileDrawerTransform(drawerMetrics=getMobileDrawerMetrics()){
headerEl.style.transform=`translate3d(0, ${-Math.ceil(drawerMetrics.travel * (1 - mobileDrawerProgress))}px, 0)`;
}

function setMobileDrawerProgress(progress, animated=false){
mobileDrawerProgress=Math.max(0, Math.min(1, Number(progress) || 0));
if(isMobileHeaderLayout()){
if(mobileDrawerHideTimeoutId !== null){
window.clearTimeout(mobileDrawerHideTimeoutId);
mobileDrawerHideTimeoutId=null;
}
headerEl.style.transition=animated ? mobileDrawerSnapTransition : "none";
const drawerMetrics=getMobileDrawerMetrics();
applyMobileDrawerTransform(drawerMetrics);
headerEl.style.visibility="visible";
headerEl.style.pointerEvents=mobileDrawerProgress > 0.05 ? "auto" : "none";
document.body.classList.toggle("mobile-drawer-open", mobileDrawerProgress > 0.98);
postToParent({ type:"feedGridHeaderSize", height:drawerMetrics.visibleHeight + Math.ceil(drawerMetrics.travel * mobileDrawerProgress) });
if(animated && mobileDrawerProgress <= 0.001){
mobileDrawerHideTimeoutId=window.setTimeout(()=>{
mobileDrawerHideTimeoutId=null;
}, 380);
}
}else{
headerEl.style.transition="";
headerEl.style.transform="";
headerEl.style.visibility="";
headerEl.style.pointerEvents="";
document.body.classList.remove("mobile-drawer-open");
}
postSize();
}

function finishMobileDrawerDrag(){
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const projectedProgress=mobileDrawerProgress + ((mobileDrawerVelocity * 180) / drawerHeight);
setMobileDrawerProgress(projectedProgress >= 0.35 ? 1 : 0, true);
}

function updateTintFilters(){
return true;
}

function getActiveChannelLogoUrls(){
return customChannelLogoUrls.length ? [...customChannelLogoUrls] : [...defaultChannelLogoUrls];
}

function getPrimaryChannelLogoUrl(){
return customChannelLogoUrls.length ? customChannelLogoUrls[0] : "/dead/images/pngs/oldtube.png";
}

function applyChannelLogoAsset(logoSrc){
channelLogoLinks.forEach((link)=>{
const img=link.querySelector(".channelLogo");
const layer=link.querySelector(".channelLogoTintLayer");
if(img){
img.src=logoSrc;
img.style.objectFit="contain";
img.addEventListener("load", ()=>{
syncControlButtonSize();
postSize();
}, { once:true });
}
if(layer){
const safeUrl=String(logoSrc).replace(/'/g, "\\'");
layer.style.setProperty("--tint-mask", `url('${safeUrl}')`);
layer.style.webkitMaskSize="contain";
layer.style.maskSize="contain";
}
});
syncControlButtonSize();
postSize();
}

function stopChannelLogoHoverCycle(resetToPrimary=true){
if(channelLogoHoverIntervalId !== null){
window.clearInterval(channelLogoHoverIntervalId);
channelLogoHoverIntervalId=null;
}
channelLogoHoverIndex=0;
if(resetToPrimary){
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
}
}

function startChannelLogoHoverCycle(){
const urls=getActiveChannelLogoUrls();
if(urls.length <= 1) return;
stopChannelLogoHoverCycle(false);
channelLogoHoverIndex=1 % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
channelLogoHoverIntervalId=window.setInterval(()=>{
channelLogoHoverIndex=(channelLogoHoverIndex + 1) % urls.length;
applyChannelLogoAsset(urls[channelLogoHoverIndex]);
}, channelLogoHoverIntervalMs);
}

function bindChannelLogoHoverCycle(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader || channelHeader.dataset.hoverCycleBound === "true") return;
channelHeader.addEventListener("mouseenter", ()=>{
if(isMobileHeaderLayout()) return;
if(getActiveChannelLogoUrls().length > 1){
startChannelLogoHoverCycle();
}
});
channelHeader.addEventListener("mouseleave", ()=>{
if(isMobileHeaderLayout()) return;
stopChannelLogoHoverCycle(true);
});
channelHeader.dataset.hoverCycleBound="true";
}

function syncMobileChannelCycleClass(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader) return;
const mobile=isMobileHeaderLayout();
channelHeader.classList.toggle("mobile-channel-sub-state", mobile && !mobileChannelCycleLinksState);
channelHeader.classList.toggle("mobile-channel-links-state", mobile && mobileChannelCycleLinksState);
}

function stopMobileChannelCycle(){
if(mobileChannelCycleIntervalId !== null){
window.clearInterval(mobileChannelCycleIntervalId);
mobileChannelCycleIntervalId=null;
}
mobileChannelCycleLinksState=false;
syncMobileChannelCycleClass();
}

function startMobileChannelCycle(){
if(!isMobileHeaderLayout()){
stopMobileChannelCycle();
return;
}
syncMobileChannelCycleClass();
if(mobileChannelCycleIntervalId !== null) return;
mobileChannelCycleIntervalId=window.setInterval(()=>{
mobileChannelCycleLinksState=!mobileChannelCycleLinksState;
syncMobileChannelCycleClass();
fitHeaderRectangleChildren();
}, SORT_CYCLE_INTERVAL_MS);
}

function syncMobileChannelCycle(){
if(isMobileHeaderLayout()){
startMobileChannelCycle();
}else{
stopMobileChannelCycle();
}
}

window.setTektiteLogoUrls = function setTektiteLogoUrls(urls){
customChannelLogoUrls = Array.isArray(urls)
? urls.map((url)=>String(url || "").trim()).filter(Boolean)
: [];
stopChannelLogoHoverCycle(false);

updateTintFilters();
return true;
};

window.resetTektiteLogoUrls = function resetTektiteLogoUrls(){
customChannelLogoUrls = [];
stopChannelLogoHoverCycle(false);
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
updateTintFilters();
return true;
};

function getRandomChannelUrl(){

}

function syncControlButtonSize(){

window.requestAnimationFrame(()=>{

const style=window.getComputedStyle(controlsEl);
const borderY=(parseFloat(style.borderTopWidth) || 0) + (parseFloat(style.borderBottomWidth) || 0);
const innerHeight=Math.max(1, Math.round(rect.height - borderY));
document.documentElement.style.setProperty("--feed-control-button-size", `${innerHeight}px`);
postSize();
});
}

function syncSortButtonGroupWidth(){

}

const selected=Math.max(1, Math.min(maxPages, parseInt(currentPage, 10) || 1));

function setStateIndicatorText(text){
const label=String(text || "");
[sortStatePanel, mobileSortStatePanel].forEach((link)=>{
if(!link) return;
const textEl=link.querySelector(".stateIndicatorText");
if(textEl){
textEl.textContent=label;

link.textContent=label;

function fitTextInsideLink(link, maxSize, minSize){
const textEl=link && link.querySelector(".stateIndicatorText");
if(!link || !textEl) return;
textEl.style.fontSize=`${maxSize}px`;
const availableWidth=Math.max(1, link.clientWidth - 20);
const availableHeight=Math.max(1, link.clientHeight - 6);
let size=maxSize;
while(size > minSize && (textEl.scrollWidth > availableWidth || textEl.scrollHeight > availableHeight)){
size-=1;
textEl.style.fontSize=`${size}px`;
}
}

function fitStateIndicatorText(){
window.requestAnimationFrame(()=>{
if(sortStatePanel && window.getComputedStyle(sortStatePanel).display !== "none"){
fitTextInsideLink(sortStatePanel, 21, 9);
}
if(mobileSortStatePanel && window.getComputedStyle(mobileSortStatePanel).display !== "none"){

}
postSize();
});
}

function setFontSizeForAll(elements, size){
elements.forEach((element)=>{
if(element) element.style.fontSize=`${size}px`;
});
}

function fitChannelHeaderChildren(){
const channelHeader=document.querySelector(".channelHeader");
if(!channelHeader || window.getComputedStyle(channelHeader).display === "none") return;
const handleTextEls=Array.from(channelHeader.querySelectorAll(".channelHandleLink span"));
const textEls=handleTextEls.filter(Boolean);
let size=11;
setFontSizeForAll(textEls, size);
while(size > 7 && channelHeader.scrollWidth > channelHeader.clientWidth){
size-=1;
setFontSizeForAll(textEls, size);
}
handleTextEls.forEach((textEl)=>{
const link=textEl.closest(".channelHandleLink");
if(!link) return;
let handleSize=11;
textEl.style.display="block";
textEl.style.fontSize=`${handleSize}px`;
while(handleSize > 7 && textEl.scrollWidth > Math.max(1, link.clientWidth - 8)){
handleSize-=1;
textEl.style.fontSize=`${handleSize}px`;
}
textEl.style.display="";
});
}

function fitControlsChildren(){
if(!controlsEl || window.getComputedStyle(controlsEl).display === "none") return;
let inputSize=14;
let buttonSize=12;
document.documentElement.style.setProperty("--controls-text-font-size", `${inputSize}px`);
document.documentElement.style.setProperty("--controls-button-font-size", `${buttonSize}px`);
while(inputSize > 8 && controlsEl.scrollWidth > controlsEl.clientWidth){
inputSize-=1;
buttonSize=Math.max(8, buttonSize - 1);
document.documentElement.style.setProperty("--controls-text-font-size", `${inputSize}px`);
document.documentElement.style.setProperty("--controls-button-font-size", `${buttonSize}px`);
}
}

function fitHeaderRectangleChildren(){
window.requestAnimationFrame(()=>{
fitChannelHeaderChildren();
fitStateIndicatorText();
fitControlsChildren();
postSize();
});
}

function setHeaderMessage(message, fade=false){
if(!headerMessageText) return;
const nextMessage=String(message || "").trim() || DEFAULT_HEADER_MESSAGE;
if(headerMessageFadeTimeoutId !== null){
window.clearTimeout(headerMessageFadeTimeoutId);
headerMessageFadeTimeoutId=null;
}
if(fade){
headerMessageText.style.opacity="0";
headerMessageFadeTimeoutId=window.setTimeout(()=>{
headerMessageText.textContent=nextMessage;
headerMessageText.style.opacity="1";
headerMessageFadeTimeoutId=null;
fitHeaderRectangleChildren();
}, 260);
return;
}
headerMessageText.textContent=nextMessage;
headerMessageText.style.opacity="1";
fitHeaderRectangleChildren();
}

function showDefaultHeaderMessage(){
if(headerMessageRevertTimeoutId !== null){
window.clearTimeout(headerMessageRevertTimeoutId);
headerMessageRevertTimeoutId=null;
}
setHeaderMessage(headerMessageDefault);
}

function showTemporaryHeaderMessage(message, durationMs=DEFAULT_MESSAGE_DISPLAY_MS){
if(headerStandardCycleActive) return;
if(headerMessageRevertTimeoutId !== null){
window.clearTimeout(headerMessageRevertTimeoutId);
}
setHeaderMessage(message);
headerMessageRevertTimeoutId=window.setTimeout(()=>{
headerMessageRevertTimeoutId=null;
setHeaderMessage(headerMessageDefault);
}, Math.max(1000, Number(durationMs) || DEFAULT_MESSAGE_DISPLAY_MS));
}

function normalizeHeaderMessageEntry(entry){
if(!entry || typeof entry !== "object") return null;
const message=String(entry.random_message || entry.message || "").trim();
if(!message) return null;
return {
message,
messageTime:String(entry.message_time || "random").trim() || "random",
messageDate:String(entry.message_date || "").trim(),
durationMs:Math.max(1000, Number(entry.display_duration_ms) || DEFAULT_MESSAGE_DISPLAY_MS)
};
}

function getHeaderMessageEntries(data){
const groups=Array.isArray(data && data.message_groups) ? data.message_groups : [];
return groups.flatMap((group)=>{
const regularMessages=Array.isArray(group && group.messages) ? group.messages : [];
const randomMessages=Array.isArray(group && group.random_messages) ? group.random_messages : [];
const messages=[...regularMessages, ...randomMessages];
return messages.map(normalizeHeaderMessageEntry).filter(Boolean);
});
}

function getStandardHeaderMessages(data){
return getHeaderMessageEntries(data)
.filter((entry)=>entry.messageTime.toLowerCase() === "standard")
.map((entry)=>entry.message)
.filter(Boolean);
}

function parseHeaderMessageTime(messageTime){
const parts=String(messageTime || "").trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
if(!parts) return null;
const hours=Number(parts[1]);
const minutes=Number(parts[2]);
const seconds=parts[3] === undefined ? 0 : Number(parts[3]);
if(hours > 23 || minutes > 59 || seconds > 59) return null;
return { hours, minutes, seconds, hasSeconds:parts[3] !== undefined };
}

function requestOverlayClockSnapshot(){
return new Promise((resolve)=>{
const requestId=`header-message-clock-${Date.now()}-${Math.random().toString(16).slice(2)}`;
const timeoutId=window.setTimeout(()=>{
window.removeEventListener("message", handleClockResponse);
resolve(null);
}, 1000);

function handleClockResponse(event){
const data=event.data || {};
if(data.type !== "overlayClockTimeState" || data.requestId !== requestId) return;
window.clearTimeout(timeoutId);
window.removeEventListener("message", handleClockResponse);
resolve(data.clock || null);
}

window.addEventListener("message", handleClockResponse);
if(window.top && window.top !== window){
window.top.postMessage({ type:"overlayClockTimeRequest", requestId }, "*");
}else{
window.postMessage({ type:"overlayClockTimeRequest", requestId }, "*");
}
});
}

function clearHeaderMessageSchedules(){
headerMessageRandomTimeoutIds.forEach((timeoutId)=>window.clearTimeout(timeoutId));
headerMessageRandomTimeoutIds=[];
headerMessageTimedEntries=[];
headerMessageLastTimedKeys=new Set();
if(headerMessageClockIntervalId !== null){
window.clearInterval(headerMessageClockIntervalId);
headerMessageClockIntervalId=null;
}
if(headerMessageRevertTimeoutId !== null){
window.clearTimeout(headerMessageRevertTimeoutId);
headerMessageRevertTimeoutId=null;
}
}

function scheduleRandomHeaderMessage(entry){
const delay=RANDOM_MESSAGE_MIN_DELAY_MS + Math.random() * (RANDOM_MESSAGE_MAX_DELAY_MS - RANDOM_MESSAGE_MIN_DELAY_MS);
const timeoutId=window.setTimeout(()=>{
showTemporaryHeaderMessage(entry.message, entry.durationMs);
scheduleRandomHeaderMessage(entry);
}, delay);
headerMessageRandomTimeoutIds.push(timeoutId);
}

async function checkTimedHeaderMessages(){
if(!headerMessageTimedEntries.length) return;
const clock=await requestOverlayClockSnapshot();
if(!clock) return;
headerMessageTimedEntries.forEach((entry)=>{
if(!entry.scheduledTime) return;
if(entry.messageDate && String(clock.dateKey || "") !== entry.messageDate) return;
const matches=Number(clock.hours) === entry.scheduledTime.hours
&& Number(clock.minutes) === entry.scheduledTime.minutes
&& (!entry.scheduledTime.hasSeconds || Number(clock.seconds || 0) === entry.scheduledTime.seconds);
if(!matches) return;
const shownKey=`${clock.dateKey || "unknown"}-${entry.messageDate || "daily"}-${entry.messageTime}-${entry.message}`;
if(headerMessageLastTimedKeys.has(shownKey)) return;
headerMessageLastTimedKeys.add(shownKey);
showTemporaryHeaderMessage(entry.message, entry.durationMs);
});
}

function scheduleTimedHeaderMessages(entries){
headerMessageTimedEntries=entries
.map((entry)=>({ ...entry, scheduledTime:parseHeaderMessageTime(entry.messageTime) }))
.filter((entry)=>entry.scheduledTime);
if(!headerMessageTimedEntries.length) return;
checkTimedHeaderMessages();
headerMessageClockIntervalId=window.setInterval(checkTimedHeaderMessages, 1000);
}

function scheduleHeaderMessages(entries){
clearHeaderMessageSchedules();
const timedEntries=[];
entries.forEach((entry)=>{
if(entry.messageTime.toLowerCase() === "standard"){
return;
}
if(entry.messageTime.toLowerCase() === "random"){
scheduleRandomHeaderMessage(entry);
return;
}
timedEntries.push(entry);
});
scheduleTimedHeaderMessages(timedEntries);
}

function showNextStandardHeaderMessage(){
if(!headerStandardMessages.length) return;
headerStandardCycleIndex=(headerStandardCycleIndex + 1) % headerStandardMessages.length;
setHeaderMessage(headerStandardMessages[headerStandardCycleIndex], true);
}

function startStandardHeaderMessageCycle(){
if(!headerStandardMessages.length || headerStandardCycleActive) return;
headerStandardCycleActive=true;
headerStandardCycleIndex=-1;
showNextStandardHeaderMessage();
headerStandardCycleIntervalId=window.setInterval(showNextStandardHeaderMessage, 3000);
}

function stopStandardHeaderMessageCycle(){
if(headerStandardCycleIntervalId !== null){
window.clearInterval(headerStandardCycleIntervalId);
headerStandardCycleIntervalId=null;
}
headerStandardCycleActive=false;
headerStandardCycleIndex=-1;
showDefaultHeaderMessage();
}

function toggleStandardHeaderMessageCycle(){
if(headerStandardCycleActive){
stopStandardHeaderMessageCycle();
return;
}
startStandardHeaderMessageCycle();
}

function bindHeaderMessagePanelInteractions(){
if(!headerMessagePanel || headerMessagePanel.dataset.messageCycleBound === "true") return;
headerMessagePanel.dataset.messageCycleBound="true";
headerMessagePanel.addEventListener("mouseenter", ()=>{
if(isMobileHeaderLayout()) return;
startStandardHeaderMessageCycle();
});
headerMessagePanel.addEventListener("mouseleave", ()=>{
if(isMobileHeaderLayout()) return;
stopStandardHeaderMessageCycle();
});
headerMessagePanel.addEventListener("click", ()=>{
if(!isMobileHeaderLayout()) return;
toggleStandardHeaderMessageCycle();
});
}

async function loadHeaderMessages(){
try{
const response=await fetch(MESSAGE_LIST_PATH, { cache:"no-store" });
if(!response.ok) throw new Error(`Failed to load ${MESSAGE_LIST_PATH}`);
const data=await response.json();
headerMessageDefault=String(data && data.default_message && data.default_message.message || DEFAULT_HEADER_MESSAGE).trim() || DEFAULT_HEADER_MESSAGE;
headerStandardMessages=getStandardHeaderMessages(data);
showDefaultHeaderMessage();
scheduleHeaderMessages(getHeaderMessageEntries(data));
}catch(error){
console.warn("Unable to load header message list", error);
headerMessageDefault=DEFAULT_HEADER_MESSAGE;
headerStandardMessages=[];
showDefaultHeaderMessage();
scheduleHeaderMessages([]);
}
}

function syncStateIndicatorLinks(state={}){
const videoId=String(state.firstVideoId || "").trim();
const videoTitle=String(state.firstVideoTitle || "").trim();
const href=videoId ? `/dead/videos/?vid=${encodeURIComponent(videoId)}` : "/";
const title=videoId
? `Open first visible video${videoTitle ? `: ${videoTitle}` : ""}`
: "No visible video";
[sortStatePanel, mobileSortStatePanel].forEach((link)=>{
if(!link) return;
link.href=href;
link.dataset.videoId=videoId;
link.title=title;
link.setAttribute("aria-label", title);
link.classList.toggle("is-disabled", !videoId);
});
}

function applyGridSizingState(state={}){
const root=document.documentElement;
const gridCardSize=String(state.gridCardSize || "").trim();
const gridVisibleRows=String(state.gridVisibleRows || "").trim();
const gridFitGapCount=String(state.gridFitGapCount || "").trim();
const gridLoadMoreHeight=String(state.gridLoadMoreHeight || "").trim();
if(gridCardSize){
root.style.setProperty("--feed-grid-card-size", gridCardSize);
}
if(gridVisibleRows){
root.style.setProperty("--feed-visible-grid-rows", gridVisibleRows);
}
if(gridFitGapCount){
root.style.setProperty("--feed-fit-gap-count", gridFitGapCount);
}
if(gridLoadMoreHeight){
root.style.setProperty("--feed-load-more-height", gridLoadMoreHeight);
}
fitHeaderRectangleChildren();
}

function applyState(state){
applyGridSizingState(state);
if(typeof state.query === "string" && searchInput.value !== state.query){
searchInput.value=state.query;
}
if(state.sortPanelText){
setStateIndicatorText(state.sortPanelText);
}
syncStateIndicatorLinks(state);
if(state.sortButtonTitle){
modeBtn.title=state.sortButtonTitle;
modeBtn.setAttribute("aria-label", state.sortButtonTitle);
}
if(Number.isFinite(Number(state.patternSpeed))){
patternSpeedInput.value=String(state.patternSpeed);
patternSpeedInput.title=`Pattern speed: ${state.patternSpeed}x`;
}
modeBtn.disabled=Boolean(state.sortDisabled);
gridBtn.title=state.view === "list" ? "Current view: list" : "Current view: grid";
gridBtn.setAttribute("aria-label", gridBtn.title);
updateGridPageOptions(state.maxGridPages, state.gridPageCount);
syncControlButtonSize();
fitHeaderRectangleChildren();
}

function handleStateIndicatorClick(event){
const link=event.currentTarget;
const videoId=String(link && link.dataset.videoId || "").trim();
if(!videoId) return;
event.preventDefault();
event.stopPropagation();
postCommand("openVideo", { videoId });
}

searchInput.addEventListener("input", ()=>{
postCommand("search", { query:searchInput.value });
});

patternSpeedInput.addEventListener("input", ()=>{
const speed=Number(patternSpeedInput.value) || 1;
patternSpeedInput.title=`Pattern speed: ${speed}x`;
postCommand("setPatternSpeed", { speed });
});

gridBtn.addEventListener("click", ()=>{
gridMenu.style.display="none";
postCommand("toggleView");
});

modeBtn.addEventListener("click", ()=>{
postCommand("toggleSort");
});

if(sortStatePanel){
sortStatePanel.addEventListener("click", handleStateIndicatorClick);
}
if(mobileSortStatePanel){
mobileSortStatePanel.addEventListener("click", handleStateIndicatorClick);
}

gridPageSelect.addEventListener("change", ()=>{
postCommand("setGridPage", { page:gridPageSelect.value });
});

channelHomeLink.addEventListener("click", ()=>{
channelHomeLink.href=getRandomChannelUrl();
});

mobileHeaderHandle.addEventListener("pointerdown", (event)=>{
if(!isMobileHeaderLayout()) return;
mobileDrawerDragging=true;
mobileDrawerMoved=false;
mobileDrawerStartY=event.clientY;
mobileDrawerStartProgress=mobileDrawerProgress;
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=performance.now();
mobileDrawerVelocity=0;
mobileHeaderHandle.setPointerCapture(event.pointerId);
mobileHeaderHandle.style.cursor="grabbing";
});

mobileHeaderHandle.addEventListener("pointermove", (event)=>{
if(!mobileDrawerDragging || !isMobileHeaderLayout()) return;
const drawerHeight=Math.max(1, getMobileDrawerMetrics().travel);
const delta=event.clientY - mobileDrawerStartY;
if(Math.abs(delta) > 4) mobileDrawerMoved=true;
const now=performance.now();
const elapsed=Math.max(1, now - mobileDrawerLastTime);
const instantVelocity=(event.clientY - mobileDrawerLastY) / elapsed;
mobileDrawerVelocity=(mobileDrawerVelocity * 0.65) + (instantVelocity * 0.35);
mobileDrawerLastY=event.clientY;
mobileDrawerLastTime=now;
setMobileDrawerProgress(mobileDrawerStartProgress + (delta / drawerHeight), false);
event.preventDefault();
});

function endMobileDrawerPointer(event){
if(!mobileDrawerDragging) return;
mobileDrawerDragging=false;
mobileHeaderHandle.style.cursor="";
try{
mobileHeaderHandle.releasePointerCapture(event.pointerId);
}catch(error){}
finishMobileDrawerDrag();
}

mobileHeaderHandle.addEventListener("pointerup", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("pointercancel", endMobileDrawerPointer);
mobileHeaderHandle.addEventListener("click", ()=>{
if(!isMobileHeaderLayout() || mobileDrawerMoved) return;
setMobileDrawerProgress(mobileDrawerProgress > 0.5 ? 0 : 1, true);
});

window.addEventListener("message", (event)=>{
const data=event.data || {};
if(data.type === "feedHeaderMobileDrawerProgress"){
setMobileDrawerProgress(data.progress, Boolean(data.animated));
return;
}
if(data.type === "feedGridHeaderState"){
applyState(data);
}
});

window.addEventListener("resize", ()=>{
syncControlButtonSize();
fitHeaderRectangleChildren();
syncMobileChannelCycle();
if(!isMobileHeaderLayout()){
setMobileDrawerProgress(0, false);
if(headerStandardCycleActive){
stopStandardHeaderMessageCycle();
}
}
postSize();
});

const resizeObserver=new ResizeObserver(postSize);
resizeObserver.observe(document.documentElement);
resizeObserver.observe(document.body);

document.addEventListener("DOMContentLoaded", ()=>{
applyChannelLogoAsset(getPrimaryChannelLogoUrl());
bindChannelLogoHoverCycle();
syncMobileChannelCycle();
bindContentOnlyLinks();
bindHeaderMessagePanelInteractions();
updateTintFilters();
loadHeaderMessages();
syncControlButtonSize();
fitHeaderRectangleChildren();
setMobileDrawerProgress(0, false);
postCommand("requestState");
postSize();
});
