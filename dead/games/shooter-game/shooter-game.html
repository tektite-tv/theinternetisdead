<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>/dead/games/shooter-game/shooter-game.html</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #main-content {
      width: 100%;
      height: 100%;
      position: relative;
      background: transparent;
    }

    #gameLoopFailBackground {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 140ms ease, visibility 0s linear 140ms;
      background: #000;
      color: rgba(255,0,0,0.72);
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: clamp(120px, 38vw, 560px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 0.85;
      text-shadow: 0 0 18px rgba(255,0,0,0.75), 0 0 42px rgba(128,0,255,0.55), 8px 8px 0 rgba(0,0,0,0.75);
    }

    #gameLoopFailBackground::after {
      content: "GAME LOOP HEARTBEAT LOST";
      position: absolute;
      left: 50%;
      top: calc(50% + min(22vw, 210px));
      transform: translateX(-50%);
      color: #00ff66;
      font-family: "Courier New", monospace;
      font-size: clamp(14px, 2.8vw, 36px);
      letter-spacing: 0.12em;
      text-shadow: 0 0 8px rgba(0,255,102,0.85), 2px 2px 0 #000;
      white-space: nowrap;
    }

    body.game-loop-failed #gameLoopFailBackground {
      opacity: 1;
      visibility: visible;
      transition: opacity 140ms ease;
    }

    #tektite-frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    #chat-sandbox-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  
  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>
</head>
<body>
  <div id="main-content">
    <div id="gameLoopFailBackground" aria-hidden="true" hidden>404</div>
    <iframe
      id="tektite-frame"
      src="/dead/games/shooter-game/assets/levels/shooter-game-level1.html"
      title="Tektite Shooter Game"
      loading="eager"
      allowfullscreen
    ></iframe>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/dead/experiments/chat-sandbox/chat-sandbox.html"
    title="Shooter Chat Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    (function(){
      const FAIL_CLASS = 'game-loop-failed';
      const FAIL_AFTER_MS = 2200;
      let hasReceivedHeartbeat = false;
      let lastHeartbeat = 0;
      let forcedFailureVisible = false;

      function getFailureBackground(){
        return document.getElementById('gameLoopFailBackground');
      }

      function showGameLoopFailure(options = {}){
        if (options && options.forced) {
          forcedFailureVisible = true;
        }
        const failureBackground = getFailureBackground();
        if (failureBackground) {
          failureBackground.hidden = false;
        }
        document.body.classList.add(FAIL_CLASS);
      }

      function clearGameLoopFailure(options = {}){
        if (options && options.clearForced) {
          forcedFailureVisible = false;
        }
        if (!forcedFailureVisible) {
          document.body.classList.remove(FAIL_CLASS);
          const failureBackground = getFailureBackground();
          if (failureBackground) {
            failureBackground.hidden = true;
          }
        }
      }

      function resetGameLoopWatch(options = {}){
        hasReceivedHeartbeat = false;
        lastHeartbeat = 0;
        clearGameLoopFailure(options);
      }

      clearGameLoopFailure({ clearForced: true });

      window.__tektiteResetGameLoopWatch = resetGameLoopWatch;
      window.__tektiteShowGameLoopFailure = function(){
        showGameLoopFailure({ forced: true });
      };
      window.__tektiteClearForcedGameLoopFailure = function(){
        resetGameLoopWatch({ clearForced: true });
      };

      window.addEventListener('message', (event) => {
        const data = event && event.data ? event.data : null;
        if (!data || data.type !== 'tektite:game-loop-heartbeat') return;
        hasReceivedHeartbeat = true;
        lastHeartbeat = Date.now();
        clearGameLoopFailure();
      });

      setInterval(() => {
        if (forcedFailureVisible) return;
        if (!hasReceivedHeartbeat || !lastHeartbeat) return;
        if (Date.now() - lastHeartbeat > FAIL_AFTER_MS){
          showGameLoopFailure();
        }
      }, 500);

      window.addEventListener('load', () => resetGameLoopWatch({ clearForced: true }), { once: true });
    })();
  </script>

  <script>
    (function(){
      const LEVEL1_SRC = "/dead/games/shooter-game/assets/levels/shooter-game-level1.html";
      const LEVEL2_SRC = "/dead/games/shooter-game/assets/levels/shooter-game-level2.html";
      const levelFrame = document.getElementById("tektite-frame");

      function buildLevelSrc(basePath, params){
        const url = new URL(basePath, window.location.origin);
        const entries = params && typeof params === "object" ? Object.entries(params) : [];
        for (const [key, value] of entries){
          if (value === undefined || value === null) continue;
          url.searchParams.set(key, String(value));
        }
        url.searchParams.set("reload", String(Date.now()));
        return url.pathname + url.search;
      }

      function navigateToLevel(basePath, params){
        if (!levelFrame) return;
        if (typeof window.__tektiteResetGameLoopWatch === "function"){
          window.__tektiteResetGameLoopWatch({ clearForced: true });
        }
        levelFrame.src = buildLevelSrc(basePath, params);
      }

      window.addEventListener('message', (event) => {
        const data = event && event.data ? event.data : null;
        if (data && data.type === 'tektite:continue-to-level2'){
          navigateToLevel(LEVEL2_SRC, { autostart: 1, startWave: 1 });
          return;
        }
        if (data && data.type === 'tektite:return-to-level1'){
          navigateToLevel(LEVEL1_SRC);
          return;
        }
        if (!data || data.type !== 'tektite:save-screenshot') return;

        if (window.parent && window.parent !== window){
          try{
            window.parent.postMessage({ type: 'tektite:save-screenshot' }, '*');
            return;
          }catch(error){
            console.error('Screenshot forward failed:', error);
          }
        }

        if (typeof window.tektiteSaveScreenshot === 'function'){
          window.tektiteSaveScreenshot();
        }
      });
    })();
  </script>
  <script src="/dead/games/shooter-game/assets/scripts/saved-images-storage.js"></script>
  <script src="/dead/games/shooter-game/assets/scripts/screenshot-shortcut.js"></script>
  <script src="/dead/games/shooter-game/assets/scripts/images-panel-viewer-host-patch.js"></script>
  <script src="/dead/games/shooter-game/assets/scripts/shooter-game-chat.js"></script>
</body>
</html>
