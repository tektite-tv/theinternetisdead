<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/dead/images/pngs/dead-favicon.png" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/dead/games/</title>
<script>
const standaloneParams = new URLSearchParams(window.location.search);
const allowStandalone = standaloneParams.get('standalone') === 'true';

if (window.top === window.self && !allowStandalone) {
  const shellFramePath = '/dead/games/';
  window.sessionStorage.setItem('deadRootShellFramePath', shellFramePath);
  window.location.replace('/?frame=' + encodeURIComponent(shellFramePath));
}
</script>
<style>
:root{
  --page-bg:#000;
  --panel-bg:#4b0076;
  --text:#00ff00;
  --accent:#00ff00;
  --hover-bg:#2a0042;
  --font:"Courier New", monospace;
}

*{box-sizing:border-box;}
html,body{
  margin:0;
  color:var(--text);
  font-family:var(--font);
  overflow:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

html{
  background:transparent !important;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar{
  display:none;
}


body{
  padding:20px;
  position:relative;
  min-height:100vh;
  min-height:100dvh;
  background:transparent !important;
  isolation:isolate;
}

.header,
#links,
.edit-note{
  position:relative;
  z-index:1;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  margin-bottom:24px;
}

.header-copy{
  flex:1 1 auto;
  min-width:0;
}

.title{
  font-size:24px;
  font-weight:bold;
  margin:0 0 6px 0;
}

.subtitle{
  margin:0;
  opacity:.8;
  font-size:14px;
}

.controls{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:nowrap;
  margin:0;
  flex:0 0 auto;
}

#searchInput{
  width:260px;
  max-width:100%;
  height:40px;
  padding:0 12px;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  color:var(--text);
  font-family:var(--font);
}

#searchInput::placeholder{
  color:var(--text);
  opacity:1;
}

button{
  height:40px;
  padding:0 16px;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  color:var(--text);
  font-family:var(--font);
  cursor:pointer;
}

button:hover,
a.post:hover,
a.post:hover .post-copy{
  background:var(--hover-bg);
  background-color:var(--hover-bg);
}

#links{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:20px;
}

#links.list-view{
  display:block;
}

a.post{
  display:block;
  color:var(--text);
  text-decoration:none;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  background-color:var(--panel-bg);
  padding:10px;
}

.post-copy{
  background:var(--panel-bg);
}

.grid-view .post .thumb{
  aspect-ratio:16/9;
  margin-bottom:10px;
}

.list-view .post{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}

.list-view .post .thumb{
  width:160px;
  flex:0 0 160px;
}

.thumb{
  border:2px solid var(--accent);
  overflow:hidden;
  background:var(--panel-bg);
}

.thumb img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.post-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:6px;
}

.post-desc{
  font-size:13px;
  opacity:.8;
  line-height:1.35;
}

.edit-note{
  margin-top:28px;
  border:2px solid var(--accent);
  background:var(--panel-bg);
  padding:14px;
  font-size:14px;
  line-height:1.45;
}

code{
  color:var(--text);
}

@media (max-width: 900px){
  .header{
    flex-direction:column;
    align-items:stretch;
  }
  .controls{
    flex-wrap:wrap;
  }
}

@media (max-width: 768px){
  body{padding:12px;}
  .title{font-size:20px;}
  #links,
  #links.grid-view{
    grid-template-columns:1fr;
  }
  .list-view .post{
    display:block;
  }
  .list-view .post .thumb{
    width:100%;
    margin-bottom:10px;
  }
  .controls{
    width:100%;
  }
  #searchInput{
    width:100%;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-copy">
    <h1 class="title">Dead Internet Games by @Honestly_Thomas (Tektite)</h1>
    <p class="subtitle">Play with my website it feels good!</p>
  </div>

</div>

<div id="links" class="grid-view" aria-live="polite"></div>

<div class="edit-note">
  All games painstakingly hand vibe-coded in ChatGPT by Thomas Harrison aka @Honestly_Thomas (Tektite) / Copyright 2026 / theinternetisdead.org
</div>


<script>
const linksEl = document.getElementById('links');
const fallbackImage = '/dead/images/pngs/static.gif';
const gameMetadata = {
  '/dead/games/shooter-game/': {
    title: "Tektite's Shooter Game",
    description: 'I had a bunch of random images I turned into a decent and fun Galaga clone with lots of secrets!',
    image: '/dead/images/link-thumbnails/dead-games-shooter-game.png'
  },
  '/dead/games/tektite-3D-game/': {
    title: "Tektite's 3D Game",
    description: 'A weird little 3D terrain/game experiment. Nature, but with more JavaScript crimes.',
    image: '/dead/images/link-thumbnails/dead-games-tektite-3D-game.png'
  }
};

const fallbackGameLinks = Object.keys(gameMetadata);

function normalizeFolderPath(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  try {
    const url = new URL(raw, window.location.origin);
    return url.pathname.replace(/\/{2,}/g, '/').replace(/\/?$/, '/');
  } catch (error) {
    return raw.replace(/\/{2,}/g, '/').replace(/\/?$/, '/');
  }
}

function titleFromFolder(folderPath) {
  const slug = normalizeFolderPath(folderPath).split('/').filter(Boolean).pop() || 'game';
  return slug
    .split('-')
    .filter(Boolean)
    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
    .join(' ');
}

function thumbnailFromFolder(folderPath) {
  const slugPath = normalizeFolderPath(folderPath)
    .replace(/^\//, '')
    .replace(/\/$/, '')
    .replace(/\//g, '-');
  return `/dead/images/link-thumbnails/${slugPath}.png`;
}

function renderLinks(folderPaths) {
  const seen = new Set();
  const links = folderPaths
    .map(normalizeFolderPath)
    .filter((folderPath) => /^\/dead\/games\/[^/]+\/$/.test(folderPath))
    .filter((folderPath) => {
      if (seen.has(folderPath)) return false;
      seen.add(folderPath);
      return true;
    })
    .sort((a, b) => titleFromFolder(a).localeCompare(titleFromFolder(b)));

  linksEl.innerHTML = links.map((folderPath) => {
    const meta = gameMetadata[folderPath] || {};
    const title = meta.title || titleFromFolder(folderPath);
    const description = meta.description || `A game folder under ${folderPath}. It exists, therefore the menu must acknowledge it, as civilization demands.`;
    const image = meta.image || thumbnailFromFolder(folderPath);
    return `
      <a class="post" href="${folderPath}" data-index-frame-src="${folderPath}">
        <div class="thumb"><img src="${image}" alt="${title}" onerror="this.onerror=null;this.src='${fallbackImage}'"></div>
        <div class="post-copy">
          <div class="post-title">${title}</div>
          <div class="post-desc">${description}</div>
        </div>
      </a>
    `;
  }).join('');
}

function getStandaloneUrl(frameSrc) {
  const url = new URL(frameSrc, window.location.origin);
  const path = url.pathname.replace(/\/{2,}/g, '/');
  url.pathname = path.endsWith('/index.html') ? path : path.replace(/\/?$/, '/index.html');
  url.searchParams.set('standalone', 'true');
  return url.href;
}

function openLinkInRootFrame(event) {
  const link = event.target.closest('[data-index-frame-src]');
  if (!link) return;

  const frameSrc = link.getAttribute('data-index-frame-src') || '';
  if (!frameSrc) return;

  if (event.shiftKey) {
    event.preventDefault();
    window.location.href = getStandaloneUrl(frameSrc);
    return;
  }

  const parentController = window.parent && window.parent !== window
    ? window.parent.indexFrameController
    : null;

  event.preventDefault();

  if (!parentController || typeof parentController.setSource !== 'function') {
    window.location.href = frameSrc;
    return;
  }

  parentController.setSource(frameSrc, { historyMode: 'push' });
}

function loadGamesFromRepoIndex() {
  renderLinks(fallbackGameLinks);

  fetch('/dead/JSON/repo-index.json', { cache: 'no-cache' })
    .then((response) => (response.ok ? response.json() : null))
    .then((data) => {
      const folders = data && Array.isArray(data.folders) ? data.folders : [];
      const gameFolders = folders.filter((folderPath) => /^\/dead\/games\/[^/]+\/$/.test(String(folderPath || '')));
      if (gameFolders.length) renderLinks(gameFolders);
    })
    .catch(() => {
      renderLinks(fallbackGameLinks);
    });
}

document.addEventListener('click', openLinkInRootFrame, true);
loadGamesFromRepoIndex();
</script>
</body>
</html>
