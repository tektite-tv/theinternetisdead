<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:monospace;
}

/* TOP BAR */

.topbar{
height:60px;
background:#3b0066;
display:flex;
align-items:center;
padding-left:15px;
padding-right:15px;
}

/* HAMBURGER */

.hamburger{

width:40px;
height:40px;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;
cursor:pointer;
user-select:none;

color:lime;

line-height:1;
transform:translateY(-2px);

transition:
box-shadow .15s ease,
background .15s ease,
transform .15s ease;

}

.hamburger:hover{

background:rgba(0,255,0,0.5);

box-shadow:
0 0 0 2px lime,
0 0 10px lime,
0 0 20px lime;

transform:translateY(-2px) scale(1.1);

}

/* LOGO */

.logo{
margin-left:15px;
height:60px;
display:flex;
align-items:center;
}

.logo a{
display:flex;
align-items:center;
justify-content:center;
padding:0;

transition:
transform .15s ease,
box-shadow .15s ease,
background .15s ease;
}

.logo img{
height:40px;
width:auto;
display:block;
}

.logo a:hover{

transform:scale(1.075);

background:rgba(0,255,0,0.5);

box-shadow:
0 0 0 2px lime,
0 0 10px lime,
0 0 20px lime;

}

/* spacer pushes clock right */

.spacer{
flex:1;
}

/* CLOCK */

.clock{
display:flex;
align-items:center;
}

.clock-box{

display:flex;
align-items:center;
justify-content:center;

padding:4px;

transition:
transform .15s ease,
box-shadow .15s ease,
background .15s ease;

}

.clock-box:hover{

transform:scale(1.075);

background:rgba(0,255,0,0.5);

box-shadow:
0 0 0 2px lime,
0 0 10px lime,
0 0 20px lime;

}

.clock-box iframe{
display:block;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1a1a1a;
transition:left 0.25s;
box-shadow:2px 0 10px rgba(0,0,0,0.6);
overflow-y:auto;
}

.sidebar.open{
left:0;
}

.sidebar-menu{
padding:20px;
}

/* SIDEBAR ITEM */

.sidebar-item{
margin-bottom:12px;
transition:box-shadow .15s ease;
}

.sidebar-item:hover{

box-shadow:
0 0 0 2px lime,
0 0 10px lime,
0 0 20px lime;

}

/* MENU LINK */

.sidebar-menu a{
display:block;
background:#3b0066;
color:lime;
text-decoration:none;
border:2px solid black;
padding:10px;
text-align:center;
font-weight:bold;
position:relative;
z-index:2;
}

/* PREVIEW WINDOW */

.sidebar-preview{

width:100%;
aspect-ratio:16/9;

overflow:hidden;

max-height:0;
opacity:0;

transition:
max-height .25s ease,
opacity .25s ease;

background:black;

}

/* scaled page preview */

.sidebar-preview iframe{

width:400%;
height:400%;

transform:scale(.25);
transform-origin:top left;

border:none;
pointer-events:none;

}

.sidebar-item:hover .sidebar-preview{

max-height:200px;
opacity:1;

}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div class="spacer"></div>

<div class="clock">
<div class="clock-box">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2"
frameborder="0"
width="200"
height="36"
allowtransparency="true"></iframe>
</div>
</div>

</div>


<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>


<div class="sidebar-menu">


<div class="sidebar-item">

<a href="/tektite-photosphere.html">
Tektite's Photosphere
</a>

<div class="sidebar-preview">
<iframe loading="lazy" src="/tektite-photosphere.html"></iframe>
</div>

</div>


<div class="sidebar-item">

<a href="/tektite-image-editor.html">
Tektite's Image Editor
</a>

<div class="sidebar-preview">
<iframe loading="lazy" src="/tektite-image-editor.html"></iframe>
</div>

</div>


<div class="sidebar-item">

<a href="/tektite-sound-machine.html">
Tektite's Sound Machine
</a>

<div class="sidebar-preview">
<iframe loading="lazy" src="/tektite-sound-machine.html"></iframe>
</div>

</div>


</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
