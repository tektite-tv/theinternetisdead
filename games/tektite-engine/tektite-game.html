<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas Backgrounds</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-text: #d7ff7a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    #background-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      pointer-events: none;
    }





    #empty-state {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      color: var(--panel-text);
      text-align: center;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      z-index: 3;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <iframe id="background-frame" title="Canvas background preview"></iframe>


  <main id="empty-state" class="hidden">
    <div>
      <strong>No canvas backgrounds found.</strong><br />
      Add HTML files to this folder and let the workflow regenerate index.json.
    </div>
  </main>

  <script>
    (() => {
      const INDEX_URL = './index.json';
      const frame = document.getElementById('background-frame');
      const emptyState = document.getElementById('empty-state');

      let backgrounds = [];
      let currentIndex = 0;

      function normalizeEntry(entry) {
        if (typeof entry === 'string') {
          return {
            title: entry.replace(/\.html$/i, '').replace(/[-_]/g, ' '),
            path: `./${entry}`
          };
        }

        const file = entry.file || entry.path || '';
        return {
          title: entry.title || file.replace(/^\.\//, '').replace(/\.html$/i, '').replace(/[-_]/g, ' '),
          path: entry.path || `./${file}`
        };
      }

      function showBackground(index) {
        if (!backgrounds.length) return;

        currentIndex = ((index % backgrounds.length) + backgrounds.length) % backgrounds.length;
        const background = backgrounds[currentIndex];

        frame.src = background.path;
      }

      function nextBackground() {
        showBackground(currentIndex + 1);
      }

      async function loadIndex() {
        try {
          const response = await fetch(`${INDEX_URL}?v=${Date.now()}`);
          if (!response.ok) throw new Error(`Could not load ${INDEX_URL}`);

          const data = await response.json();
          backgrounds = Array.isArray(data) ? data.map(normalizeEntry).filter(item => item.path) : [];

          if (!backgrounds.length) {
            emptyState.classList.remove('hidden');
            return;
          }

          showBackground(0);
        } catch (error) {
          emptyState.classList.remove('hidden');
          emptyState.innerHTML = '<div><strong>index.json failed to load.</strong><br />Check that the generated file exists in this folder.</div>';
          console.error(error);
        }
      }

      document.addEventListener('click', nextBackground);
      document.addEventListener('keydown', event => {
        if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          nextBackground();
        }

        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          showBackground(currentIndex - 1);
        }
      });

      loadIndex();
    })();
  </script>
</body>
</html>
