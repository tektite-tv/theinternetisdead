<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.com/games/shooter-game</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#shooter-game-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}

  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="shooter-game-frame" src="/games/shooter-game/shooter-game.html"></iframe>
</div>

<script>
async function loadOverlay(){
    try{
        const res = await fetch("/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

const frame = document.getElementById("shooter-game-frame");

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.syncOverlayLayout = syncLayout;

loadOverlay();

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));

(function(){
    let relayTimer = null;

    function serializeGamepads(){
        try{
            const pads = (navigator.getGamepads && navigator.getGamepads()) ? navigator.getGamepads() : [];
            if (!pads || !pads.length) return [];
            return Array.from(pads).map((gp) => {
                if (!gp) return null;
                return {
                    id: gp.id || "",
                    index: typeof gp.index === "number" ? gp.index : 0,
                    connected: gp.connected !== false,
                    mapping: gp.mapping || "",
                    timestamp: typeof gp.timestamp === "number" ? gp.timestamp : 0,
                    axes: Array.isArray(gp.axes) ? Array.from(gp.axes) : [],
                    buttons: Array.isArray(gp.buttons) ? gp.buttons.map((b) => ({
                        pressed: !!(b && b.pressed),
                        touched: !!(b && b.touched),
                        value: b && typeof b.value === "number" ? b.value : (b && b.pressed ? 1 : 0)
                    })) : []
                };
            });
        } catch(_){ return []; }
    }

    function relayGamepads(){
        if (!frame || !frame.contentWindow) return;
        frame.contentWindow.postMessage({
            type: "tektite:gamepad-state",
            source: "index.html",
            gamepads: serializeGamepads(),
            sentAt: Date.now()
        }, "*");
    }

    function startRelay(){
        if (relayTimer) return;
        relayTimer = window.setInterval(relayGamepads, 16);
    }

    function stopRelay(){
        if (!relayTimer) return;
        window.clearInterval(relayTimer);
        relayTimer = null;
    }

    frame && frame.addEventListener("load", relayGamepads);
    window.addEventListener("focus", startRelay);
    window.addEventListener("blur", stopRelay);
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible"){
            startRelay();
            relayGamepads();
        } else {
            stopRelay();
        }
    });
    window.addEventListener("gamepadconnected", () => {
        startRelay();
        relayGamepads();
    });
    window.addEventListener("gamepaddisconnected", relayGamepads);
    startRelay();
})();
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>
  <script src="/scripts/hide-overlay.js"></script>
</body>
</html>
