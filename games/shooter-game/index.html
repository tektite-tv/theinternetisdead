<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.com/games/shooter-game</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;
    overflow:hidden;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

#app-shell{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    background:#000;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
    width:100%;
}

#shooter-game-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:block;
    z-index:1;
    background:#000;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #app-shell{
        height:100dvh;
        min-height:100dvh;
    }
}

  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>

</head>

<body>

<div id="app-shell">
    <div id="overlay-container"></div>
    <iframe id="shooter-game-frame" src="/games/shooter-game/shooter-game.html"></iframe>
</div>

<script>
async function loadOverlay(){
    try{
        const res = await fetch("/pages/overlay.html", { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to load /pages/overlay.html");
        const html = await res.text();
        const container = document.getElementById("overlay-container");
        const temp = document.createElement("div");
        temp.innerHTML = html;

        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
            if (node.nodeName && node.nodeName.toLowerCase() === "script") {
                scripts.push(node);
            } else {
                fragment.appendChild(node.cloneNode(true));
            }
        });

        container.innerHTML = "";
        container.appendChild(fragment);

        scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
                newScript.setAttribute(attr.name, attr.value);
            });
            newScript.textContent = oldScript.textContent;
            container.appendChild(newScript);
        });

        syncLayout();
    }catch(error){
        console.error("Error loading overlay:", error);
    }
}

const frame = document.getElementById("shooter-game-frame");

function syncLayout(){
    const overlayContainer = document.getElementById("overlay-container");
    const overlayHeight = overlayContainer ? overlayContainer.offsetHeight : 0;
    frame.style.top = overlayHeight + "px";
    frame.style.height = "calc(100dvh - " + overlayHeight + "px)";
}

window.syncOverlayLayout = syncLayout;

loadOverlay();

window.addEventListener("resize", syncLayout);
window.addEventListener("orientationchange", syncLayout);
window.addEventListener("load", syncLayout);

const resizeObserver = new ResizeObserver(syncLayout);
resizeObserver.observe(document.getElementById("overlay-container"));
</script>


<script>
(function(){
    const shooterFrame = document.getElementById('shooter-game-frame');
    let lastForward = 0;
    let relayToken = 0;

    function serializeGamepad(gp){
        if (!gp) return null;
        return {
            index: typeof gp.index === 'number' ? gp.index : 0,
            id: gp.id || '',
            axes: Array.isArray(gp.axes) ? gp.axes.slice(0) : Array.from(gp.axes || []),
            buttons: Array.from(gp.buttons || []).map((button) => ({
                pressed: !!(button && button.pressed),
                touched: !!(button && button.touched),
                value: button && typeof button.value === 'number' ? button.value : ((button && button.pressed) ? 1 : 0)
            }))
        };
    }

    function getPrimaryGamepad(){
        try{
            const pads = (navigator.getGamepads && navigator.getGamepads()) ? navigator.getGamepads() : [];
            if (!pads || !pads.length) return null;
            for (let i = 0; i < pads.length; i++){
                if (pads[i]) return pads[i];
            }
        }catch(error){}
        return null;
    }

    function forwardGamepadState(targetWindow){
        if (!targetWindow) return;
        targetWindow.postMessage({
            type: 'tektite:gamepad-state',
            relayToken: ++relayToken,
            gamepad: serializeGamepad(getPrimaryGamepad())
        }, '*');
    }

    function relayLoop(now){
        if (!lastForward || (now - lastForward) >= 16){
            forwardGamepadState(shooterFrame && shooterFrame.contentWindow);
            lastForward = now;
        }
        requestAnimationFrame(relayLoop);
    }

    window.addEventListener('gamepadconnected', () => {
        forwardGamepadState(shooterFrame && shooterFrame.contentWindow);
    });
    window.addEventListener('gamepaddisconnected', () => {
        forwardGamepadState(shooterFrame && shooterFrame.contentWindow);
    });
    window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'tektite:request-gamepad-sync'){
            forwardGamepadState(shooterFrame && shooterFrame.contentWindow);
        }
    });

    requestAnimationFrame(relayLoop);
})();
</script>

  <script src="/scripts/screenshot-shortcut.js"></script>
  <script src="/scripts/hide-overlay.js"></script>
</body>
</html>
