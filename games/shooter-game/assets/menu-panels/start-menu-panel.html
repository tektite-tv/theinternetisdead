<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blank Panel - Start Game</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: Arial, sans-serif;
    }

    .menu-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: transparent;
    }

    .menu-panel {
      position: relative;
      width: min(50vw, 540px);
      aspect-ratio: 16 / 9;
      background: rgba(75, 0, 118, 0.94);
      border: 5px solid limegreen;
      border-radius: 24px;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45) inset, 0 16px 40px rgba(0,0,0,0.55);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .start-button {
      appearance: none;
      border: 4px solid limegreen;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.35);
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: clamp(20px, 2.2vw, 32px);
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 18px 36px;
      cursor: pointer;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.35) inset;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .start-button:hover,
    .start-button:focus-visible {
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45) inset, 0 0 18px rgba(50, 205, 50, 0.35);
      outline: none;
    }

    .start-button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="menu-stage">
    <div class="menu-panel">
      <button class="start-button" id="start-button" type="button">Start Game</button>
    </div>
  </div>

  <script>
    (function () {
      const startButton = document.getElementById('start-button');

      startButton.addEventListener('click', function () {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'menu-content:action', action: 'start-game' }, '*');
        } else {
          console.log('Start Game clicked');
        }
      });
    })();
  </script>
</body>
</html>
