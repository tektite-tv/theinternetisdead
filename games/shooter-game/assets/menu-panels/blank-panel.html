<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blank Panel</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    body {
      position: relative;
      font-family: Arial, sans-serif;
    }
    .menu-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: transparent;
      transition: opacity 180ms ease;
    }
    .menu-stage.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .menu-panel {
      position: relative;
      width: min(50vw, 540px);
      aspect-ratio: 16 / 9;
      background: rgba(75, 0, 118, 0.94);
      border: 5px solid limegreen;
      border-radius: 24px;
      box-sizing: border-box;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45) inset, 0 16px 40px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .menu-content-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      display: block;
    }
    .menu-watermark {
      position: absolute;
      right: 12px;
      bottom: 8px;
      z-index: 5;
      color: rgba(220,255,220,0.45);
      font: 11px/1 monospace;
      letter-spacing: 0.08em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="menu-stage" class="menu-stage">
    <div class="menu-panel">
      <iframe id="menu-content-frame" class="menu-content-frame" title="Menu Content"></iframe>
    </div>
  </div>

  <script>
    (function () {
      const stage = document.getElementById('menu-stage');
      const contentFrame = document.getElementById('menu-content-frame');
      let currentMenu = 'start';
      let currentSrc = '../assets/menus/start-menu.html';
      let latestState = null;

      function notifyParent(message) {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(message, '*');
        }
      }

      function applyMenu(menu, src) {
        currentMenu = menu || 'start';
        currentSrc = src || '';

        if (!currentSrc) {
          stage.classList.add('hidden');
          contentFrame.removeAttribute('src');
          return;
        }

        stage.classList.remove('hidden');
        if (contentFrame.getAttribute('src') !== currentSrc) {
          contentFrame.setAttribute('src', currentSrc);
        } else {
          postStateToContent();
        }
      }

      function postStateToContent() {
        if (!contentFrame.contentWindow || !latestState) return;
        contentFrame.contentWindow.postMessage({ type: 'runtime:state', state: latestState }, '*');
      }

      window.addEventListener('message', function (event) {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        if (data.type === 'menu-layer:set-menu') {
          applyMenu(data.menu, data.src);
          return;
        }

        if (data.type === 'runtime:state') {
          latestState = data.state || null;
          postStateToContent();
          return;
        }

        if (data.type === 'menu-content:action') {
          notifyParent(data);
        }
      });

      contentFrame.addEventListener('load', function () {
        postStateToContent();
      });

      window.addEventListener('load', function () {
        notifyParent({ type: 'menu-layer:ready' });
      });
    })();
  </script>
</body>
</html>
