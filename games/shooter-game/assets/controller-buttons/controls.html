<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Xbox One Controller Inputs</title>
<meta name="description" content="Interactive Xbox controller input overlay using the Gamepad API.">
<meta name="asset-source" content="Controller image derived from Wikimedia Commons File:Black Xbox Controller.jpg by Kjaskren, dedicated to the public domain under CC0 1.0. Cropped top-down derivative and overlay WebP icons generated locally for this project.">
<link rel="license" href="https://creativecommons.org/publicdomain/zero/1.0/">
<style>
  :root{
    color-scheme: dark;
    --highlight:#ff00ff;
  }

  *{ box-sizing:border-box; }

  html,
  body{
    margin:0;
    min-height:100%;
    background:#050607;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100dvh;
    padding:0;
    overflow:hidden;
  }

  .stage{
    width:100vw;
    height:100dvh;
  }

  .controller-map{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
  }

  .controller-base{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    user-select:none;
    pointer-events:none;
  }

  .control-icon{
    --strength:0;
    position:absolute;
    width:var(--w, 9%);
    transform:translate(-50%, -50%) scale(calc(0.92 + (var(--strength) * 0.12)));
    opacity:1;
    filter:drop-shadow(0 0 0 rgba(255,0,255,0));
    transition:opacity 80ms linear, transform 80ms linear, filter 80ms linear;
    user-select:none;
    pointer-events:none;
  }

  .control-icon.active{
    opacity:1;
    filter:hue-rotate(220deg) saturate(2.2) drop-shadow(0 0 calc(var(--strength) * 18px) rgba(255,0,255,0.95));
  }

  .controller-map.disconnected .control-icon{
    opacity:1;
  }

  .extra-panel{
    display:none;
  }

  .extra-button{
    display:none;
    min-width:72px;
    padding:6px 10px;
    border:1px solid rgba(255,0,255,0.28);
    background:rgba(0,0,0,0.42);
    color:rgba(234,255,240,0.68);
  }

  .extra-button.active{
    color:#001407;
    background:var(--highlight);
    border-color:var(--highlight);
    box-shadow:0 0 14px rgba(255,0,255,0.58);
  }

  @media (max-width: 720px){
    .control-icon{
      width:calc(var(--w, 9%) * 1.08);
    }
  }
</style>
</head>
<body>
  <!--
    Controller source: https://commons.wikimedia.org/wiki/File:Black_Xbox_Controller.jpg
    Author: Kjaskren
    License: CC0 1.0 Universal Public Domain Dedication
    This page uses a cropped top-down derivative plus locally generated WebP overlay icons.
  -->
  <main class="stage">
    <div id="controllerMap" class="controller-map disconnected" aria-label="Xbox One controller input map">
      <img class="controller-base" src="./xbox-controller-topdown.webp" alt="Top-down black Xbox controller">

      <img class="control-icon" data-button="6" data-threshold="0.08" src="./left-trigger.webp" alt="Left trigger" style="left:24%; top:6%; --w:12%;">
      <img class="control-icon" data-button="7" data-threshold="0.08" src="./right-trigger.webp" alt="Right trigger" style="left:75%; top:6%; --w:12%;">
      <img class="control-icon" data-button="4" src="./left-bumper.webp" alt="Left bumper" style="left:24%; top:14%; --w:13%;">
      <img class="control-icon" data-button="5" src="./right-bumper.webp" alt="Right bumper" style="left:75%; top:14%; --w:13%;">

      <img class="control-icon" data-button="10" src="./left-stick-click.webp" alt="Left stick press" style="left:19%; top:32%; --w:9%;">
      <img class="control-icon" data-axis-stick="left" src="./left-stick.webp" alt="Left stick movement" style="left:19%; top:32%; --w:11%;">
      <img class="control-icon" data-axis="1" data-axis-direction="-1" src="./left-stick-up.webp" alt="Left stick up" style="left:19%; top:21%; --w:6%;">
      <img class="control-icon" data-axis="1" data-axis-direction="1" src="./left-stick-down.webp" alt="Left stick down" style="left:19%; top:44%; --w:6%;">
      <img class="control-icon" data-axis="0" data-axis-direction="-1" src="./left-stick-left.webp" alt="Left stick left" style="left:12%; top:32%; --w:6%;">
      <img class="control-icon" data-axis="0" data-axis-direction="1" src="./left-stick-right.webp" alt="Left stick right" style="left:26%; top:32%; --w:6%;">

      <img class="control-icon" data-button="11" src="./right-stick-click.webp" alt="Right stick press" style="left:63%; top:54%; --w:9%;">
      <img class="control-icon" data-axis-stick="right" src="./right-stick.webp" alt="Right stick movement" style="left:63%; top:54%; --w:11%;">
      <img class="control-icon" data-axis="3" data-axis-direction="-1" src="./right-stick-up.webp" alt="Right stick up" style="left:63%; top:43%; --w:6%;">
      <img class="control-icon" data-axis="3" data-axis-direction="1" src="./right-stick-down.webp" alt="Right stick down" style="left:63%; top:66%; --w:6%;">
      <img class="control-icon" data-axis="2" data-axis-direction="-1" src="./right-stick-left.webp" alt="Right stick left" style="left:56%; top:54%; --w:6%;">
      <img class="control-icon" data-axis="2" data-axis-direction="1" src="./right-stick-right.webp" alt="Right stick right" style="left:70%; top:54%; --w:6%;">

      <img class="control-icon" data-button="8" src="./view.webp" alt="View button" style="left:42.5%; top:37%; --w:6%;">
      <img class="control-icon" data-button="16" src="./xbox.webp" alt="Xbox button" style="left:50%; top:22%; --w:7%;">
      <img class="control-icon" data-button="9" src="./menu.webp" alt="Menu button" style="left:57%; top:37%; --w:6%;">

      <img class="control-icon" data-button="3" src="./button-y.webp" alt="Y button" style="left:77.5%; top:24%; --w:7%;">
      <img class="control-icon" data-button="2" src="./button-x.webp" alt="X button" style="left:71%; top:37%; --w:7%;">
      <img class="control-icon" data-button="1" src="./button-b.webp" alt="B button" style="left:84.5%; top:35.5%; --w:7%;">
      <img class="control-icon" data-button="0" src="./button-a.webp" alt="A button" style="left:77.5%; top:51%; --w:7%;">

      <img class="control-icon" data-button="12" src="./dpad-up.webp" alt="D-pad up" style="left:36%; top:49%; --w:6%;">
      <img class="control-icon" data-button="13" src="./dpad-down.webp" alt="D-pad down" style="left:36%; top:65%; --w:6%;">
      <img class="control-icon" data-button="14" src="./dpad-left.webp" alt="D-pad left" style="left:30%; top:57%; --w:6%;">
      <img class="control-icon" data-button="15" src="./dpad-right.webp" alt="D-pad right" style="left:41.5%; top:57%; --w:6%;">
    </div>
  </main>

  <section id="extraButtons" class="extra-panel" aria-label="Additional gamepad buttons"></section>

<script>
(function(){
  const STANDARD_NAMES = [
    'A', 'B', 'X', 'Y', 'LB', 'RB', 'LT', 'RT',
    'View', 'Menu', 'LS Click', 'RS Click',
    'D-pad Up', 'D-pad Down', 'D-pad Left', 'D-pad Right', 'Xbox'
  ];
  const DEADZONE = 0.22;
  const map = document.getElementById('controllerMap');
  const status = document.getElementById('status');
  const extraButtons = document.getElementById('extraButtons');
  const buttonIcons = Array.from(document.querySelectorAll('[data-button]'));
  const axisIcons = Array.from(document.querySelectorAll('[data-axis]'));
  const stickIcons = Array.from(document.querySelectorAll('[data-axis-stick]'));
  const extraNodes = new Map();
  let selectedGamepadIndex = null;

  function getGamepads(){
    if (!navigator.getGamepads) return [];
    return Array.from(navigator.getGamepads()).filter(Boolean);
  }

  function pickGamepad(){
    const pads = getGamepads();
    if (selectedGamepadIndex !== null) {
      const current = pads.find((pad) => pad.index === selectedGamepadIndex);
      if (current) return current;
    }
    return pads[0] || null;
  }

  function setIconStrength(icon, strength){
    const clamped = Math.max(0, Math.min(1, Number(strength) || 0));
    icon.style.setProperty('--strength', clamped.toFixed(3));
    icon.classList.toggle('active', clamped > 0.08);
  }

  function getButtonStrength(button){
    if (!button) return 0;
    if (typeof button.value === 'number') return Math.max(button.pressed ? 1 : 0, button.value);
    return button.pressed ? 1 : 0;
  }

  function updateButtonIcons(gamepad){
    buttonIcons.forEach((icon) => {
      const index = Number(icon.dataset.button);
      const threshold = Number(icon.dataset.threshold || 0.5);
      const raw = getButtonStrength(gamepad.buttons[index]);
      setIconStrength(icon, raw >= threshold ? raw : 0);
    });
  }

  function updateAxisIcons(gamepad){
    axisIcons.forEach((icon) => {
      const axisIndex = Number(icon.dataset.axis);
      const direction = Number(icon.dataset.axisDirection);
      const value = Number(gamepad.axes[axisIndex]) || 0;
      const directed = direction < 0 ? -value : value;
      const strength = directed > DEADZONE ? (directed - DEADZONE) / (1 - DEADZONE) : 0;
      setIconStrength(icon, strength);
    });

    stickIcons.forEach((icon) => {
      const left = icon.dataset.axisStick === 'left';
      const x = Number(gamepad.axes[left ? 0 : 2]) || 0;
      const y = Number(gamepad.axes[left ? 1 : 3]) || 0;
      const magnitude = Math.min(1, Math.sqrt((x * x) + (y * y)));
      const strength = magnitude > DEADZONE ? (magnitude - DEADZONE) / (1 - DEADZONE) : 0;
      setIconStrength(icon, strength);
    });
  }

  function ensureExtraNode(index){
    if (extraNodes.has(index)) return extraNodes.get(index);
    const node = document.createElement('div');
    node.className = 'extra-button';
    node.textContent = `B${index}`;
    extraButtons.appendChild(node);
    extraNodes.set(index, node);
    return node;
  }

  function updateExtraButtons(gamepad){
    gamepad.buttons.forEach((button, index) => {
      if (index < STANDARD_NAMES.length) return;
      const node = ensureExtraNode(index);
      const strength = getButtonStrength(button);
      node.style.display = 'block';
      node.classList.toggle('active', strength > 0.08);
      node.textContent = `B${index} ${Math.round(strength * 100)}%`;
    });
  }

  function summarizeActiveInputs(gamepad){
    const names = [];
    gamepad.buttons.forEach((button, index) => {
      const strength = getButtonStrength(button);
      if (strength <= 0.08) return;
      names.push(STANDARD_NAMES[index] || `B${index}`);
    });

    const axes = gamepad.axes || [];
    if ((Number(axes[0]) || 0) < -DEADZONE) names.push('LS Left');
    if ((Number(axes[0]) || 0) > DEADZONE) names.push('LS Right');
    if ((Number(axes[1]) || 0) < -DEADZONE) names.push('LS Up');
    if ((Number(axes[1]) || 0) > DEADZONE) names.push('LS Down');
    if ((Number(axes[2]) || 0) < -DEADZONE) names.push('RS Left');
    if ((Number(axes[2]) || 0) > DEADZONE) names.push('RS Right');
    if ((Number(axes[3]) || 0) < -DEADZONE) names.push('RS Up');
    if ((Number(axes[3]) || 0) > DEADZONE) names.push('RS Down');
    return names;
  }

  function clearIcons(){
    [...buttonIcons, ...axisIcons, ...stickIcons].forEach((icon) => setIconStrength(icon, 0));
    extraNodes.forEach((node) => node.classList.remove('active'));
  }

  function tick(){
    const gamepad = pickGamepad();
    if (!gamepad){
      map.classList.add('disconnected');
      if (status) status.textContent = 'Connect a controller and press a button';
      clearIcons();
      requestAnimationFrame(tick);
      return;
    }

    selectedGamepadIndex = gamepad.index;
    map.classList.remove('disconnected');
    updateButtonIcons(gamepad);
    updateAxisIcons(gamepad);
    updateExtraButtons(gamepad);
    const active = summarizeActiveInputs(gamepad);
    if (status) status.textContent = active.length ? active.join(' + ') : `${gamepad.id || 'Gamepad'} ready`;
    requestAnimationFrame(tick);
  }

  window.addEventListener('gamepadconnected', (event) => {
    selectedGamepadIndex = event.gamepad.index;
  });

  window.addEventListener('gamepaddisconnected', (event) => {
    if (selectedGamepadIndex === event.gamepad.index) selectedGamepadIndex = null;
  });

  tick();
})();
</script>
</body>
</html>
