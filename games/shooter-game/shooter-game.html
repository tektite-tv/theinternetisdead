<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #main-content {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  
  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>
</head>
<body>
  <div id="main-content">
    <iframe
      id="tektite-frame"
      src="/games/shooter-game/shooter-game-level1.html"
      title="Tektite Shooter Game"
      loading="eager"
      allow="gamepad *; fullscreen *"
      allowfullscreen
      tabindex="0"
    ></iframe>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/experiments/chat-sandbox/chat-sandbox.html"
    title="Shooter Chat Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>



  <script>
    (function(){
      const gameFrame = document.getElementById("tektite-frame");
      const mainContent = document.getElementById("main-content");

      function focusGameFrame(){
        try { window.focus(); } catch(_) {}
        try { document.body && document.body.focus && document.body.focus(); } catch(_) {}
        try { mainContent && mainContent.focus && mainContent.focus(); } catch(_) {}
        try { gameFrame && gameFrame.focus && gameFrame.focus(); } catch(_) {}
        try {
          if (gameFrame && gameFrame.contentWindow && gameFrame.contentWindow.focus) {
            gameFrame.contentWindow.focus();
          }
        } catch(_) {}
      }

      window.addEventListener("load", focusGameFrame, { passive: true });
      window.addEventListener("focus", focusGameFrame, { passive: true });
      window.addEventListener("click", focusGameFrame, { passive: true });
      window.addEventListener("pointerdown", focusGameFrame, { passive: true });
      window.addEventListener("gamepadconnected", focusGameFrame, { passive: true });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) focusGameFrame();
      });

      window.addEventListener("message", (event) => {
        const data = event && event.data ? event.data : null;
        if (!data || typeof data !== "object") return;
        if (data.type === "tektite:continue-to-level2") {
          if (gameFrame) {
            gameFrame.src = "/games/shooter-game/shooter-game-level2.html";
            setTimeout(focusGameFrame, 50);
            setTimeout(focusGameFrame, 250);
          }
        } else if (data.type === "tektite:return-to-level1") {
          if (gameFrame) {
            gameFrame.src = "/games/shooter-game/shooter-game-level1.html";
            setTimeout(focusGameFrame, 50);
            setTimeout(focusGameFrame, 250);
          }
        }
      });
    })();
  </script>

  <script src="/games/shooter-game/shooter-game-chat.js"></script>
</body>
</html>
