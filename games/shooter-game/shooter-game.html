<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #main-content {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  
  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>
</head>
<body>
  <div id="main-content">
    <iframe
      id="tektite-frame"
      src="/games/shooter-game/shooter-game-level1.html"
      title="Tektite Shooter Game"
      loading="eager"
      allowfullscreen
    ></iframe>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/experiments/chat-sandbox/chat-sandbox.html"
    title="Shooter Chat Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    (function(){
      const tektiteFrame = document.getElementById('tektite-frame');
      const chatSandboxFrame = document.getElementById('chat-sandbox-frame');
      let lastForward = 0;
      let relayToken = 0;

      function serializeGamepad(gp){
        if (!gp) return null;
        return {
          index: typeof gp.index === 'number' ? gp.index : 0,
          id: gp.id || '',
          axes: Array.isArray(gp.axes) ? gp.axes.slice(0) : Array.from(gp.axes || []),
          buttons: Array.from(gp.buttons || []).map((button) => ({
            pressed: !!(button && button.pressed),
            touched: !!(button && button.touched),
            value: button && typeof button.value === 'number' ? button.value : ((button && button.pressed) ? 1 : 0)
          }))
        };
      }

      function getPrimaryGamepad(){
        try{
          const pads = (navigator.getGamepads && navigator.getGamepads()) ? navigator.getGamepads() : [];
          if (!pads || !pads.length) return null;
          for (let i = 0; i < pads.length; i++){
            if (pads[i]) return pads[i];
          }
        }catch(error){}
        return null;
      }

      function forwardGamepadState(targetWindow){
        if (!targetWindow) return;
        const gp = getPrimaryGamepad();
        targetWindow.postMessage({
          type: 'tektite:gamepad-state',
          relayToken: ++relayToken,
          gamepad: serializeGamepad(gp)
        }, '*');
      }

      function relayLoop(now){
        if (!lastForward || (now - lastForward) >= 16){
          forwardGamepadState(tektiteFrame && tektiteFrame.contentWindow);
          lastForward = now;
        }
        requestAnimationFrame(relayLoop);
      }

      window.addEventListener('gamepadconnected', () => {
        forwardGamepadState(tektiteFrame && tektiteFrame.contentWindow);
      });
      window.addEventListener('gamepaddisconnected', () => {
        forwardGamepadState(tektiteFrame && tektiteFrame.contentWindow);
      });
      window.addEventListener('message', (event) => {
        if (event.source === chatSandboxFrame?.contentWindow) return;
        const data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.type === 'tektite:request-gamepad-sync'){
          forwardGamepadState(tektiteFrame && tektiteFrame.contentWindow);
        }
      });

      requestAnimationFrame(relayLoop);
    })();
  </script>

  <script src="/games/shooter-game/shooter-game-chat.js"></script>
</body>
</html>
