<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #main-content {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <iframe
      id="tektite-frame"
      src="/games/shooter-game/shooter-game-level1.html"
      title="Tektite Shooter Game"
      loading="eager"
      allowfullscreen
    ></iframe>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/experiments/chat-sandbox/chat-sandbox.html"
    title="Shooter Chat Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script src="/games/shooter-game/shooter-game-chat.js"></script>
</body>
</html>
