<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #main-content {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
  
  /* Kill browser click-flash / focus indicator artifacts */
  html, body, canvas, button, select, input, textarea, label, div, iframe {
    -webkit-tap-highlight-color: transparent;
  }
  *:focus,
  *:focus-visible,
  *:active{
    outline: none !important;
    box-shadow: none !important;
  }
  body{
    caret-color: transparent;
  }
  canvas, .panel, button, select, label, #main-content, #app-shell, #overlay-container, #shooter-game-frame, #tektite-frame{
    user-select:none;
    -webkit-user-select:none;
  }
</style>
</head>
<body>
  <div id="main-content">
    <iframe
      id="tektite-frame"
      src="/games/shooter-game/shooter-game-level1.html"
      title="Tektite Shooter Game"
      loading="eager"
      allowfullscreen
    ></iframe>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/experiments/chat-sandbox/chat-sandbox.html"
    title="Shooter Chat Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>


  <script>
    (function(){
      const tektiteFrame = document.getElementById("tektite-frame");
      let relayFrame = null;
      let relayTimer = null;

      function serializeGamepads(){
        try{
          const pads = (navigator.getGamepads && navigator.getGamepads()) ? navigator.getGamepads() : [];
          if (!pads || !pads.length) return [];
          return Array.from(pads).map((gp) => {
            if (!gp) return null;
            return {
              id: gp.id || "",
              index: typeof gp.index === "number" ? gp.index : 0,
              connected: gp.connected !== false,
              mapping: gp.mapping || "",
              timestamp: typeof gp.timestamp === "number" ? gp.timestamp : 0,
              axes: Array.isArray(gp.axes) ? Array.from(gp.axes) : [],
              buttons: Array.isArray(gp.buttons) ? gp.buttons.map((b) => ({
                pressed: !!(b && b.pressed),
                touched: !!(b && b.touched),
                value: b && typeof b.value === "number" ? b.value : (b && b.pressed ? 1 : 0)
              })) : []
            };
          });
        }catch(_){ return []; }
      }

      function getRelayTarget(){
        try{
          if (!tektiteFrame || !tektiteFrame.contentWindow) return null;
          const nested = tektiteFrame.contentDocument && tektiteFrame.contentDocument.getElementById("tektite-frame");
          if (nested && nested.contentWindow) return nested.contentWindow;
          return tektiteFrame.contentWindow;
        }catch(_){
          return tektiteFrame && tektiteFrame.contentWindow ? tektiteFrame.contentWindow : null;
        }
      }

      function postGamepads(gamepads, source){
        const target = getRelayTarget();
        if (!target) return;
        target.postMessage({
          type: "tektite:gamepad-state",
          source: source || "shooter-game.html",
          gamepads: Array.isArray(gamepads) ? gamepads : [],
          sentAt: Date.now()
        }, "*");
      }

      function relayGamepads(){
        postGamepads(serializeGamepads(), "shooter-game.html");
      }

      function startRelay(){
        if (relayTimer) return;
        relayTimer = window.setInterval(relayGamepads, 16);
      }

      function stopRelay(){
        if (!relayTimer) return;
        window.clearInterval(relayTimer);
        relayTimer = null;
      }

      tektiteFrame && tektiteFrame.addEventListener("load", relayGamepads);
      window.addEventListener("focus", startRelay);
      window.addEventListener("blur", stopRelay);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible"){
          startRelay();
          relayGamepads();
        }else{
          stopRelay();
        }
      });
      window.addEventListener("gamepadconnected", () => {
        startRelay();
        relayGamepads();
      });
      window.addEventListener("gamepaddisconnected", relayGamepads);
      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || typeof data !== "object") return;
        if (data.type !== "tektite:gamepad-state") return;
        postGamepads(data.gamepads, data.source || "parent");
      });
      startRelay();
    })();
  </script>

  <script src="/games/shooter-game/shooter-game-chat.js"></script>
</body>
</html>
