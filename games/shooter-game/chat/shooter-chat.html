<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter Chat</title>
  <link rel="preload" href="/games/shooter-game/assets/scripts/shooter-game-chat.js" as="script" />
  <style>
    :root{
      --lime:#00ff66;
      --purple:#4b0076;
      --deep-purple:rgba(21,0,42,0.92);
      --panel:rgba(0,0,0,0.84);
      --red:#ff3333;
      --white:#fff;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:transparent;
      color:var(--white);
      font-family:"Courier New", monospace;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    *{box-sizing:border-box;}
    button,input{font:inherit;}
    button{cursor:pointer;}
    #chatRoot{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity 120ms ease, visibility 0s linear 120ms;
    }
    body.chatOpen #chatRoot{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      transition:opacity 120ms ease;
    }
    #chatPanel{
      /* Match the fixed Start menu footprint used by the level overlays.
         The slash menu is now a true shooter-game menu, not a bottom chat slab. */
      --shooter-menu-footprint-width:min(520px, 92vw);
      --shooter-menu-footprint-height:min(430px, calc(100vh - 32px));
      --shooter-menu-footprint-padding:18px 18px 16px;
      --shooter-menu-footprint-radius:16px;
      width:var(--shooter-menu-footprint-width);
      max-width:var(--shooter-menu-footprint-width);
      height:var(--shooter-menu-footprint-height);
      max-height:var(--shooter-menu-footprint-height);
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:var(--shooter-menu-footprint-padding);
      border:3px solid var(--lime);
      border-radius:var(--shooter-menu-footprint-radius);
      background:linear-gradient(180deg, rgba(75,0,118,0.88), rgba(0,0,0,0.91));
      box-shadow:0 0 0 2px rgba(75,0,118,0.82), 0 0 28px rgba(0,255,102,0.32);
      text-shadow:1px 1px 0 #000;
      transform:scale(0.975);
      transform-origin:center center;
      overflow:hidden;
    }
    #chatHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:34px;
    }
    #chatTitle{
      color:var(--lime);
      font-weight:900;
      letter-spacing:0.04em;
      text-transform:uppercase;
      font-size:14px;
    }
    #chatModeBadge{
      color:#fff;
      font-size:12px;
      opacity:0.9;
      margin-left:8px;
      text-transform:none;
    }
    #chatCloseBtn{
      appearance:none;
      border:2px solid var(--lime);
      border-radius:10px;
      background:#000;
      color:var(--red);
      min-width:38px;
      min-height:32px;
      font-size:18px;
      font-weight:900;
      line-height:1;
    }
    #chatCloseBtn:hover,#chatCloseBtn:focus{
      background:var(--purple);
      color:#fff;
      outline:none;
      box-shadow:0 0 14px rgba(0,255,102,0.48);
    }
    #messagesWrap{
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      overscroll-behavior:contain;
      max-height:none;
      padding:10px;
      border:1px solid rgba(0,255,102,0.45);
      border-radius:12px;
      background:rgba(0,0,0,0.66);
      scrollbar-color:var(--lime) #000;
    }
    #messages{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .chatLine{
      margin:0;
      padding:6px 8px;
      border-left:3px solid rgba(0,255,102,0.55);
      background:rgba(255,255,255,0.045);
      line-height:1.35;
      word-break:break-word;
      white-space:pre-wrap;
      font-size:14px;
    }
    .chatLine.system .prefix{color:var(--red);font-weight:900;}
    .chatLine.result .prefix{color:var(--lime);font-weight:900;}
    .chatLine.error{border-left-color:var(--red);}
    .chatLine.error .prefix{color:var(--red);font-weight:900;}
    .chatLine.user .prefix{color:#adff2f;font-weight:900;}
    #cheatermodeHoldStatus{
      display:none;
      padding:8px 10px;
      border:1px solid var(--lime);
      border-radius:10px;
      background:rgba(0,0,0,0.72);
      color:#fff;
      font-size:13px;
      font-weight:900;
      text-align:center;
    }
    #cheatermodeHoldStatus.active{display:block;}
    #chatForm{
      display:flex;
      gap:8px;
      align-items:center;
    }
    #chatBar{
      flex:1;
      min-width:0;
      border:2px solid var(--lime);
      border-radius:10px;
      background:#000;
      color:#fff;
      padding:10px 12px;
      caret-color:var(--lime);
      outline:none;
    }
    #chatBar:focus{
      box-shadow:0 0 18px rgba(0,255,102,0.38);
    }
    #chatSubmit{
      border:2px solid var(--lime);
      border-radius:10px;
      background:#000;
      color:var(--lime);
      padding:10px 14px;
      font-weight:900;
      min-width:74px;
    }
    #chatSubmit:hover,#chatSubmit:focus{
      background:var(--purple);
      color:#fff;
      outline:none;
    }
    #helpPanel{
      display:none;
      flex:0 1 128px;
      min-height:0;
      overflow-y:auto;
      border:1px solid rgba(0,255,102,0.45);
      border-radius:12px;
      padding:10px;
      background:rgba(0,0,0,0.54);
      scrollbar-color:var(--lime) #000;
    }
    #helpPanel.visible{display:block;}
    #helpHeader{
      color:var(--lime);
      font-size:13px;
      font-weight:900;
      margin:0 0 8px;
      text-transform:uppercase;
    }
    #helpList{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .helpListItem{
      margin:0;
      padding:0;
    }
    .helpItem{
      appearance:none;
      width:100%;
      display:grid;
      grid-template-columns:minmax(128px, 0.8fr) minmax(0, 1.4fr) minmax(150px, 1fr);
      align-items:center;
      gap:10px;
      text-align:left;
      border:1px solid rgba(0,255,102,0.5);
      border-radius:8px;
      background:rgba(75,0,118,0.46);
      color:#fff;
      padding:6px 8px;
      min-height:34px;
    }
    .helpItem:hover,.helpItem:focus,.helpItem.controllerFocus{
      outline:2px solid var(--lime) !important;
      background:rgba(75,0,118,0.88);
      box-shadow:0 0 12px rgba(0,255,102,0.35);
    }
    .helpName{display:block;color:var(--lime);font-weight:900;}
    .helpDesc{display:block;font-size:12px;opacity:0.94;line-height:1.25;}
    .helpUsage{display:block;font-size:11px;color:#d9ffd9;opacity:0.72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #suggestions{
      display:none;
      flex-wrap:wrap;
      gap:6px;
      padding:2px 0 0;
    }
    #suggestions.visible{display:flex;}
    .suggestionBtn{
      border:1px solid rgba(0,255,102,0.55);
      border-radius:999px;
      background:#000;
      color:#fff;
      padding:4px 8px;
      font-size:12px;
    }
    .suggestionBtn:hover,.suggestionBtn:focus{background:var(--purple);outline:1px solid var(--lime);}
    @media (max-width:700px){
      #chatRoot{padding:8px;}
      #chatPanel{
        --shooter-menu-footprint-width:min(520px, calc(100vw - 16px));
        --shooter-menu-footprint-height:min(400px, calc(100vh - 24px));
        padding:14px;
      }
      #chatSubmit{min-width:58px;padding-inline:10px;}
      .helpItem{grid-template-columns:1fr;gap:2px;}
      .helpUsage{white-space:normal;}
    }
  </style>
</head>
<body>
  <main id="chatRoot" aria-live="polite">
    <section id="chatPanel" role="dialog" aria-label="Shooter chat commands">
      <header id="chatHeader">
        <div id="chatTitle">Tektite Shooter Chat <span id="chatModeBadge">keyboard/mouse</span></div>
        <button id="chatCloseBtn" type="button" aria-label="Close chat" data-chat-close>×</button>
      </header>
      <div id="messagesWrap" tabindex="0">
        <div id="messages"></div>
      </div>
      <div id="cheatermodeHoldStatus" role="status"></div>
      <section id="helpPanel" aria-label="Command help">
        <p id="helpHeader">Commands</p>
        <ul id="helpList"></ul>
      </section>
      <div id="suggestions" aria-label="Command suggestions"></div>
      <form id="chatForm" autocomplete="off">
        <input id="chatBar" data-chat-prompt type="text" spellcheck="false" autocomplete="off" placeholder="Press / for commands" />
        <button id="chatSubmit" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="/games/shooter-game/assets/scripts/shooter-game-chat.js"></script>
</body>
</html>
