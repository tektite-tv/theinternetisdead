<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>theinternetisdead.org</title>

<style>
html,
body{
    margin:0;
    width:100%;
    min-height:100%;
    background:#111;
    font-family:"Courier New", monospace;

    overflow:auto;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;                /* Chrome / Safari / Opera */
}

/* overlay container */
#overlay-container{
    position:relative;
    z-index:1000;
    width:100%;
}

#photosphere-frame{
    display:block;
    width:100%;
    height:100dvh;
    min-height:100svh;
    border:none;
}

@media (max-width: 700px){
    body{
        overscroll-behavior-y:none;
    }

    #photosphere-frame{
        height:100dvh;
        min-height:100dvh;
    }
}
</style>

</head>

<body>

<!-- overlay loads first -->
<div id="overlay-container"></div>

<!-- photosphere loads BELOW it -->
<iframe id="photosphere-frame" src="/photosphere.html"></iframe>

<script>
fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}
const frame=document.getElementById("photosphere-frame");

function syncViewportHeight(){
    const vh = window.innerHeight;
    frame.style.height = vh + "px";
}

syncViewportHeight();
window.addEventListener("resize", syncViewportHeight);
window.addEventListener("orientationchange", syncViewportHeight);
</script>

</body>
</html>
