<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
      --overlay-height: 76px;
    }

    /* Keep the same zoomed-out shell behavior as index.html so the page layout
       does not suddenly feel like it was hit with a shovel. */
    #site-shell {
      position: fixed;
      left: 0;
      top: var(--overlay-height, 76px);
      width: 133.333333%;
      height: calc((100vh - var(--overlay-height, 76px)) / 0.75);
      transform: scale(0.75);
      transform-origin: top left;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #overlay-container {
      width: 100%;
      flex: 0 0 auto;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    #main-content {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      z-index: 1;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    #chat-sandbox-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      z-index: 9999;
      display: block;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #chat-sandbox-frame.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .overlay-error {
      padding: 12px 16px;
      background: #111;
      color: #ff6666;
      border-bottom: 1px solid #333;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <div id="site-shell">
    <div id="main-content">
      <iframe
        id="tektite-frame"
        src="/games/shooter-game/shooter-game.html"
        title="Tektite Shooter Game"
        loading="eager"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <iframe
    id="chat-sandbox-frame"
    src="/chat-sandbox.html"
    title="Chat Sandbox Overlay"
    loading="eager"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    const overlayContainer = document.getElementById('overlay-container');
    const chatSandboxFrame = document.getElementById('chat-sandbox-frame');
    const tektiteFrame = document.getElementById('tektite-frame');

    let chatSandboxVisible = false;
    let chatSandboxReady = false;

    function getChatWindow() {
      return chatSandboxFrame && chatSandboxFrame.contentWindow ? chatSandboxFrame.contentWindow : null;
    }

    async function loadOverlay() {
      try {
        const response = await fetch('/overlay.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load /overlay.html');
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
          if (node.nodeName.toLowerCase() === 'script') scripts.push(node);
          else fragment.appendChild(node.cloneNode(true));
        });

        overlayContainer.innerHTML = '';
        overlayContainer.appendChild(fragment);

        scripts.forEach((oldScript) => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach((attr) => newScript.setAttribute(attr.name, attr.value));
          newScript.textContent = oldScript.textContent;
          overlayContainer.appendChild(newScript);
        });

        requestAnimationFrame(() => {
          syncOverlayLayoutHeight();
          requestAnimationFrame(syncOverlayLayoutHeight);
        });
      } catch (error) {
        console.error(error);
        overlayContainer.innerHTML = '<div class="overlay-error">Error loading /overlay.html</div>';
      }
    }

    function syncOverlayLayoutHeight() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root');
      const overlayHeight = overlayRoot ? Math.ceil(overlayRoot.getBoundingClientRect().height) : 76;
      document.body.style.setProperty('--overlay-height', `${Math.max(overlayHeight, 1)}px`);
    }

    function setChatFrameVisible(visible) {
      chatSandboxVisible = !!visible;
      chatSandboxFrame.classList.toggle('visible', chatSandboxVisible);
    }

    function postToChatSandbox(message) {
      const chatWindow = getChatWindow();
      if (!chatWindow) return false;
      chatWindow.postMessage(message, '*');
      return true;
    }

    function registerPageCommands() {
      postToChatSandbox({
        type: 'pageChatRegister',
        pageOnly: true,
        pageId: 'tektite-shooter',
        title: 'Tektite Shooter',
        sourceKey: 'tektite-shooter',
        commands: []
      });
    }

    function openChatFromParent(options = {}) {
      setChatFrameVisible(true);
      postToChatSandbox({
        type: 'chatSandboxOpen',
        focus: options.focus !== false,
        seedSlash: !!options.seedSlash
      });
    }

    function closeChatFromParent() {
      postToChatSandbox({ type: 'chatSandboxClose' });
      setChatFrameVisible(false);
    }

    function shouldIgnoreChatShortcutFromEvent(event) {
      const view = event.view || window;
      const doc = view.document || document;
      const activeElement = doc.activeElement;
      const activeTag = activeElement && activeElement.tagName ? activeElement.tagName.toUpperCase() : '';
      return !!(activeElement && (
        activeTag === 'INPUT' ||
        activeTag === 'TEXTAREA' ||
        activeTag === 'SELECT' ||
        activeElement.isContentEditable
      ));
    }

    function handleChatShortcutKeydown(event) {
      if (event.key === '/' && !event.ctrlKey && !event.metaKey && !event.altKey) {
        if (shouldIgnoreChatShortcutFromEvent(event)) return;
        event.preventDefault();
        event.stopPropagation();
        openChatFromParent({ focus: true, seedSlash: true });
        return;
      }

      if (event.key === 'Escape' && chatSandboxVisible) {
        event.preventDefault();
        event.stopPropagation();
        closeChatFromParent();
      }
    }

    function bindChatShortcutToFrame(frame) {
      try {
        const frameWindow = frame && frame.contentWindow;
        const frameDoc = frameWindow && frameWindow.document;
        if (!frameWindow || !frameDoc || frameWindow.__tektiteShooterChatShortcutBound) return;
        frameWindow.addEventListener('keydown', handleChatShortcutKeydown, true);
        frameDoc.addEventListener('keydown', handleChatShortcutKeydown, true);
        frameWindow.__tektiteShooterChatShortcutBound = true;
      } catch (error) {
        console.warn('Unable to bind chat shortcut to frame', error);
      }
    }

    window.addEventListener('message', (event) => {
      if (!event.data) return;

      if (event.source === getChatWindow()) {
        if (event.data.type === 'chatSandboxState') {
          chatSandboxReady = true;
          setChatFrameVisible(!!event.data.visible);
          registerPageCommands();
          return;
        }

        if (event.data.type === 'pageChatExecute') {
          const command = (event.data.command || '').trim();
          postToChatSandbox({
            type: 'pageChatResult',
            announce: true,
            command,
            message: command ? `${command} is not a known command` : 'No page command registered'
          });
          return;
        }
      }

      if (event.data.type === 'openChatFromChild') {
        openChatFromParent({ focus: true, seedSlash: !!event.data.seedSlash });
      }
    });

    window.addEventListener('resize', syncOverlayLayoutHeight);
    window.addEventListener('keydown', handleChatShortcutKeydown, true);

    chatSandboxFrame.addEventListener('load', () => {
      chatSandboxReady = true;
      registerPageCommands();
      bindChatShortcutToFrame(chatSandboxFrame);
    });

    tektiteFrame.addEventListener('load', () => {
      bindChatShortcutToFrame(tektiteFrame);
      if (chatSandboxReady) {
        registerPageCommands();
      }
    });

    loadOverlay();
  </script>
</body>
</html>
