<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tektite Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
      --overlay-height: 76px;
    }

    /* Keep the same zoomed-out shell behavior as index.html so the page layout
       does not suddenly feel like it was hit with a shovel. */
    #site-shell {
      position: fixed;
      left: 0;
      top: var(--overlay-height, 76px);
      width: 133.333333%;
      height: calc((100vh - var(--overlay-height, 76px)) / 0.75);
      transform: scale(0.75);
      transform-origin: top left;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #overlay-container {
      width: 100%;
      flex: 0 0 auto;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    #main-content {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      z-index: 1;
      background: #000;
    }

    #tektite-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    .overlay-error {
      padding: 12px 16px;
      background: #111;
      color: #ff6666;
      border-bottom: 1px solid #333;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="overlay-container"></div>

  <div id="site-shell">
    <div id="main-content">
      <iframe
        id="tektite-frame"
        src="/games/shooter-game/shooter-game.html"
        title="Tektite Shooter Game"
        loading="eager"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script>
    const overlayContainer = document.getElementById('overlay-container');
    const tektiteFrame = document.getElementById('tektite-frame');
    const LEVEL1_SRC = '/games/shooter-game/shooter-game.html';
    const LEVEL2_SRC = '/games/shooter-game/shooter-game-level2.html?autostart=1';
    let hasSwitchedToLevel2 = false;

    async function setIframeFullscreen(shouldEnter) {
      if (!tektiteFrame) return;
      try {
        const fsElement = document.fullscreenElement;
        if (shouldEnter) {
          if (fsElement !== tektiteFrame && tektiteFrame.requestFullscreen) {
            await tektiteFrame.requestFullscreen();
          }
        } else if (fsElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.warn('Fullscreen request failed.', error);
      }
    }

    function switchToLevel2() {
      if (!tektiteFrame || hasSwitchedToLevel2) return;
      hasSwitchedToLevel2 = true;
      const keepFullscreen = document.fullscreenElement === tektiteFrame;
      tektiteFrame.src = LEVEL2_SRC;
      if (keepFullscreen) {
        tektiteFrame.addEventListener('load', () => {
          setIframeFullscreen(true);
        }, { once: true });
      }
    }

    function switchToLevel1Reloaded() {
      if (!tektiteFrame) return;
      hasSwitchedToLevel2 = false;
      const keepFullscreen = document.fullscreenElement === tektiteFrame;
      tektiteFrame.src = `${LEVEL1_SRC}?reload=${Date.now()}`;
      if (keepFullscreen) {
        tektiteFrame.addEventListener('load', () => {
          setIframeFullscreen(true);
        }, { once: true });
      }
    }

    window.addEventListener('message', async (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'tektite:continue-to-level2') {
        switchToLevel2();
      }
      if (data.type === 'tektite:return-to-level1') {
        switchToLevel1Reloaded();
      }
      if (data.type === 'tektite:fullscreen') {
        const action = data.action || 'toggle';
        if (action === 'enter') await setIframeFullscreen(true);
        else if (action === 'exit') await setIframeFullscreen(false);
        else await setIframeFullscreen(document.fullscreenElement !== tektiteFrame);
      }
    });

    async function loadOverlay() {
      try {
        const response = await fetch('/overlay.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load /overlay.html');
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const fragment = document.createDocumentFragment();
        const scripts = [];

        Array.from(temp.childNodes).forEach((node) => {
          if (node.nodeName.toLowerCase() === 'script') {
            scripts.push(node);
          } else {
            fragment.appendChild(node.cloneNode(true));
          }
        });

        overlayContainer.innerHTML = '';
        overlayContainer.appendChild(fragment);

        scripts.forEach((oldScript) => {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach((attr) => {
            newScript.setAttribute(attr.name, attr.value);
          });
          newScript.textContent = oldScript.textContent;
          overlayContainer.appendChild(newScript);
        });

        requestAnimationFrame(() => {
          syncOverlayLayoutHeight();
          requestAnimationFrame(syncOverlayLayoutHeight);
        });
      } catch (error) {
        console.error(error);
        overlayContainer.innerHTML = '<div class="overlay-error">Error loading /overlay.html</div>';
      }
    }

    function syncOverlayLayoutHeight() {
      const overlayRoot = overlayContainer.querySelector('#overlay-root');
      const overlayHeight = overlayRoot ? Math.ceil(overlayRoot.getBoundingClientRect().height) : 76;
      document.body.style.setProperty('--overlay-height', `${Math.max(overlayHeight, 1)}px`);
    }

    window.addEventListener('resize', syncOverlayLayoutHeight);

    loadOverlay();
  </script>
</body>
</html>
